<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🏘️ Neighborhood Explorer — Echo's Vault</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;user-select:none}
canvas{display:block;image-rendering:pixelated;cursor:crosshair}
#ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10}
#hud-top{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:rgba(5,5,16,0.88);border-bottom:1px solid rgba(255,255,255,0.08);pointer-events:auto}
#hud-top .left{color:#e0e0f0;font-size:11px;font-family:monospace;display:flex;gap:12px;align-items:center}
#hud-top .center{color:#ffd700;font-size:11px;font-family:monospace;letter-spacing:2px;text-shadow:0 0 10px #ffd700}
#hud-top .right{display:flex;gap:8px;align-items:center}
#districtSel{background:#0a0a1a;border:1px solid #444;color:#e0e0f0;font-size:11px;padding:4px 8px;border-radius:4px;cursor:pointer;pointer-events:auto}
#hud-bot{position:fixed;bottom:0;left:0;width:100%;display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:rgba(5,5,16,0.88);border-top:1px solid rgba(255,255,255,0.08);pointer-events:auto}
#hud-bot a{color:#b0b0d0;font-size:11px;text-decoration:none;padding:4px 8px;border:1px solid #333;border-radius:4px;transition:all 0.2s}
#hud-bot a:hover{color:#ff6ec7;border-color:#ff6ec7}
#hint{color:#555;font-size:10px;font-family:monospace}
#enter-prompt{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid #ffd700;color:#ffd700;padding:8px 16px;border-radius:6px;font-size:12px;font-family:monospace;pointer-events:none;opacity:0;transition:opacity 0.3s;text-align:center}
#enter-prompt.show{opacity:1}
</style>
</head>
<body>
<div id="ui">
  <div id="hud-top">
    <div class="left">
      <span id="districtLabel">👑 Yu-Gi-Oh Quarter</span>
      <span id="playerLabel">👤 Visitor</span>
      <span id="coinsLabel">🪙 0</span>
    </div>
    <div class="center" id="timeLabel">☀️ DAY</div>
    <div class="right">
      <select id="districtSel" onchange="switchDistrict(this.value)">
        <option value="0">👑 Yu-Gi-Oh Quarter</option>
        <option value="1">⚡ Pokémon Boulevard</option>
        <option value="2">🎴 Anime Alley</option>
        <option value="3">🏴‍☠️ One Piece Harbor</option>
        <option value="4">✨ Lorcana Lane</option>
        <option value="5">🧙 MTG Tower</option>
        <option value="6">🦖 Digimon Den</option>
        <option value="7">🎰 Casino Row</option>
        <option value="8">🎨 Artist Quarter</option>
        <option value="9">🌙 Night Market</option>
      </select>
    </div>
  </div>
</div>
<canvas id="C"></canvas>
<div id="enter-prompt" id="ep">PRESS SPACE to Enter Shop</div>
<div id="hud-bot">
  <a href="dashboard.html">← Dashboard</a>
  <span id="hint">WASD / Arrows to walk · SPACE to enter</span>
  <div style="display:flex;gap:8px">
    <a href="claw.html">🎰 Claw Machine</a>
    <a href="companion.html">🥚 Companion</a>
  </div>
</div>

<script>
const C = document.getElementById('C');
const X = C.getContext('2d');
const WW = 800, WH = 600;
C.width = WW; C.height = WH;

function resize() {
  const s = Math.min(innerWidth / WW, (innerHeight - 0) / WH);
  C.style.width = (WW * s) + 'px';
  C.style.height = (WH * s) + 'px';
}
resize();
addEventListener('resize', resize);

// ─── DISTRICTS ───────────────────────────────────────────────────────────────
const DISTRICTS = [
  {name:'Yu-Gi-Oh Quarter', emoji:'👑', accent:'#ffd700', accent2:'#9b59b6', sky:'#1a0a2e', road:'#1a1a2e', tcg:'yugioh'},
  {name:'Pokémon Boulevard', emoji:'⚡', accent:'#ff3b3b', accent2:'#4a90e2', sky:'#0a1a2e', road:'#0d1a2d', tcg:'pokemon'},
  {name:'Anime Alley', emoji:'🎴', accent:'#ff6eb4', accent2:'#00e5ff', sky:'#1a0a1a', road:'#1a0d1a', tcg:'anime'},
  {name:'One Piece Harbor', emoji:'🏴‍☠️', accent:'#c8960c', accent2:'#1a3a6e', sky:'#0a1020', road:'#0d1520', tcg:'onepiece'},
  {name:'Lorcana Lane', emoji:'✨', accent:'#c39bd3', accent2:'#abebc6', sky:'#12081e', road:'#150b22', tcg:'lorcana'},
  {name:'MTG Tower', emoji:'🧙', accent:'#27ae60', accent2:'#c0392b', sky:'#0a1408', road:'#0d1a0c', tcg:'mtg'},
  {name:'Digimon Den', emoji:'🦖', accent:'#f39c12', accent2:'#2980b9', sky:'#0e1520', road:'#111820', tcg:'digimon'},
  {name:'Casino Row', emoji:'🎰', accent:'#ff2255', accent2:'#ffd700', sky:'#0d0808', road:'#110a0a', tcg:'casino'},
  {name:'Artist Quarter', emoji:'🎨', accent:'#e91e8c', accent2:'#7eb8f7', sky:'#0a0818', road:'#0d0b1a', tcg:'artist'},
  {name:'Night Market', emoji:'🌙', accent:'#18ffff', accent2:'#6c3483', sky:'#030308', road:'#080810', tcg:'night'}
];

const OWNER_NAMES = ['Luna','Rex','Miko','Zara','Finn','Nova','Kai','Sage','Ren','Yuki','Blaze','Iris'];
const SHOP_THEMES = ['Rare Finds','Grail Vault','Card Dojo','Hidden Gems','Dragon Hoard','Star Deck','Trade Post','Vintage Vault','Mint Condition','First Editions'];
const TCG_NAMES = {
  yugioh:['Blue-Eyes White Dragon','Dark Magician','Exodia','Blue-Eyes','Mirror Force','Pot of Greed'],
  pokemon:['Charizard','Pikachu','Mewtwo','Blastoise','Venusaur','Eevee'],
  anime:['Weiss Schwarz','Dandadan','Re:Zero','Evangelion','Chainsaw Man'],
  onepiece:['Luffy','Zoro','Nami','Shanks','Kaido','Whitebeard'],
  lorcana:['Elsa','Moana','Maleficent','Simba','Ariel','Mickey'],
  mtg:['Black Lotus','Mox Ruby','Dual Land','Force of Will','Jace','Lightning Bolt'],
  digimon:['Agumon','Gabumon','WarGreymon','MetalGarurumon','Omnimon'],
  casino:['Lucky Seven','Wild Card','Royal Flush','Jackpot','Ace High'],
  artist:['Original Art','Alter','Custom Proxy','Commission','Sketch Card'],
  night:['Mystery Pack','Sealed Lot','Graded Slab','Bulk Rare','Foil Set']
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let districtIdx = 0;
let district = DISTRICTS[0];

const WORLD_W = 1600;
const WORLD_H = WH;
const ROAD_Y1 = 185;
const ROAD_Y2 = 415;
const SIDEWALK_T = 28;

let camX = 0;
const lerp = (a,b,t) => a+(b-a)*t;
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));

// Player
let player = {x:WORLD_W/2, y:(ROAD_Y1+ROAD_Y2)/2, w:10, h:14, vx:0, vy:0, frame:0, animT:0, dir:2, moving:false};
const SPEED = 1.8;

// Input
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if(e.code==='Space'){e.preventDefault(); tryEnterShop();}
});
addEventListener('keyup', e => keys[e.code] = false);

// ─── SHOPS ───────────────────────────────────────────────────────────────────
let shops = [];

function rngSeed(s){
  s = s|0;
  s = Math.imul(s^(s>>>16), 0x45d9f3b);
  s = Math.imul(s^(s>>>16), 0x45d9f3b);
  return ((s^(s>>>16))>>>0)/0xFFFFFFFF;
}

function generateShops(dIdx) {
  const shops = [];
  const SHOP_W = 160;
  const SHOP_H = 110;
  const total = 8;
  // 4 top, 4 bottom
  for(let i=0;i<total;i++){
    const isTop = i < 4;
    const col = isTop ? i : (i-4);
    const sx = 120 + col * (WORLD_W - 240) / 3;
    const sy = isTop ? (ROAD_Y1 - SHOP_H) : ROAD_Y2;
    const seed = dIdx * 100 + i;
    const ownerIdx = Math.floor(rngSeed(seed)*OWNER_NAMES.length);
    const themeIdx = Math.floor(rngSeed(seed+50)*SHOP_THEMES.length);
    const stars = 1 + Math.floor(rngSeed(seed+10)*5);
    const traffic = 10 + Math.floor(rngSeed(seed+20)*990);
    const open = rngSeed(seed+30) > 0.2;
    const isPlayer = (i === 7);
    const tcgCards = TCG_NAMES[DISTRICTS[dIdx].tcg] || TCG_NAMES.yugioh;
    const featuredCard = tcgCards[Math.floor(rngSeed(seed+40)*tcgCards.length)];
    shops.push({
      id:i, x:sx-SHOP_W/2, y:sy, w:SHOP_W, h:SHOP_H, isTop,
      name: isPlayer ? 'YOUR SHOP' : OWNER_NAMES[ownerIdx]+"'s "+SHOP_THEMES[themeIdx],
      owner: OWNER_NAMES[ownerIdx],
      stars, traffic, open, isPlayer, featuredCard,
      doorX: sx, doorY: isTop ? ROAD_Y1-2 : ROAD_Y2+2,
      lightColor: DISTRICTS[dIdx].accent,
      hue: Math.floor(rngSeed(seed+60)*360)
    });
  }
  return shops;
}

shops = generateShops(districtIdx);

// ─── NPCs ─────────────────────────────────────────────────────────────────────
const NPC_COLORS = ['#ff6ec7','#4fc3f7','#69f0ae','#ffd700','#ef9a9a'];
const SPEECHES = ['Nice cards!','Wow, rare find!','Love this district!','Need that alt art!','PSA 10 someday...','Is that a holographic?','Trade ya!','Check this pull!'];
let npcs = [];

function initNPCs() {
  npcs = [];
  for(let i=0;i<4;i++){
    npcs.push({
      x: 200 + i*350 + Math.random()*100,
      y: ROAD_Y1 + 30 + Math.random()*(ROAD_Y2-ROAD_Y1-60),
      vx: (Math.random()-0.5)*0.8,
      vy: (Math.random()-0.5)*0.4,
      color: NPC_COLORS[i%NPC_COLORS.length],
      speech:'',speechT:0,
      pauseT:0,
      animT:0,frame:0,dir:1
    });
  }
}
initNPCs();

// ─── PARTICLES ────────────────────────────────────────────────────────────────
let leaves = [];
let stars = [];

function initParticles() {
  leaves = [];
  for(let i=0;i<18;i++){
    leaves.push({
      wx: Math.random()*WORLD_W,
      y: Math.random()*WH,
      vy: 0.3+Math.random()*0.5,
      vx: (Math.random()-0.5)*0.3,
      r: 2+Math.random()*3,
      wobble: Math.random()*Math.PI*2,
      opacity: 0.3+Math.random()*0.5,
      color: ['#88cc44','#ffaa22','#ff7722','#cc4422'][Math.floor(Math.random()*4)]
    });
  }
  stars = [];
  for(let i=0;i<60;i++){
    stars.push({
      wx: Math.random()*WORLD_W*1.5,
      y: Math.random()*(ROAD_Y1-20),
      r: Math.random()*1.5,
      twinkle: Math.random()*Math.PI*2,
      speed: 0.02+Math.random()*0.03
    });
  }
}
initParticles();

// ─── STREETLAMPS ──────────────────────────────────────────────────────────────
const lampXs = [200, 530, 870, 1200, 1530];

// ─── TIME / DAY-NIGHT ────────────────────────────────────────────────────────
function getDayFactor() {
  const h = new Date().getHours() + new Date().getMinutes()/60;
  if(h>=6&&h<8) return {t:'dawn',f:(h-6)/2,label:'🌅 DAWN'};
  if(h>=8&&h<17) return {t:'day',f:1,label:'☀️ DAY'};
  if(h>=17&&h<19) return {t:'dusk',f:(19-h)/2,label:'🌇 DUSK'};
  return {t:'night',f:0,label:'🌙 NIGHT'};
}

// ─── SEEN.JSON ────────────────────────────────────────────────────────────────
let seenData = {};
fetch('seen.json').then(r=>r.json()).then(d=>{seenData=d;}).catch(()=>{});

// ─── NEAR SHOP ────────────────────────────────────────────────────────────────
let nearShop = null;
const enterPrompt = document.getElementById('enter-prompt');

function getPlayerFeet() {
  return {x: player.x + player.w/2, y: player.y + player.h};
}

function checkNearShop() {
  const feet = getPlayerFeet();
  nearShop = null;
  for(const s of shops){
    const dx = Math.abs(feet.x - s.doorX);
    const dy = Math.abs(feet.y - s.doorY);
    if(dx < 44 && dy < 36){
      nearShop = s;
      break;
    }
  }
  if(nearShop){
    enterPrompt.classList.add('show');
    const lbl = nearShop.isPlayer ? 'ENTER YOUR SHOP' : 'ENTER: '+nearShop.name;
    enterPrompt.textContent = '▶ SPACE / Click — '+lbl;
  } else {
    enterPrompt.classList.remove('show');
  }
}

function tryEnterShop(){
  if(nearShop){
    window.location.href = 'plot.html?shop='+nearShop.id+'&district='+districtIdx;
  }
}

C.addEventListener('click', ()=>{ if(nearShop) tryEnterShop(); });

// ─── DISTRICT SWITCH ──────────────────────────────────────────────────────────
function switchDistrict(val) {
  districtIdx = parseInt(val);
  district = DISTRICTS[districtIdx];
  shops = generateShops(districtIdx);
  initNPCs();
  initParticles();
  document.getElementById('districtLabel').textContent = district.emoji+' '+district.name;
}

// ─── DRAW HELPERS ─────────────────────────────────────────────────────────────
function px(worldX){ return worldX - camX; }
function drawRect(x,y,w,h,col){ X.fillStyle=col; X.fillRect(x,y,w,h); }
function drawRectS(x,y,w,h,col,lw=1){ X.strokeStyle=col; X.lineWidth=lw; X.strokeRect(x+0.5,y+0.5,w-1,h-1); }

function drawGlow(cx,cy,r,col,alpha=0.4){
  X.save();
  X.globalAlpha = alpha*0.6;
  X.fillStyle = col;
  X.shadowColor = col;
  X.shadowBlur = r*0.8;
  X.beginPath();
  X.arc(cx,cy,r*0.3,0,Math.PI*2);
  X.fill();
  X.shadowBlur=0;
  X.globalAlpha=1;
  X.restore();
}

function drawStars(dt){
  const day = getDayFactor();
  const alpha = 1-day.f;
  if(alpha < 0.05) return;
  for(const s of stars){
    s.twinkle += s.speed;
    const a = alpha*(0.4+0.4*Math.sin(s.twinkle));
    const sx = ((s.wx - camX*0.3) % (WORLD_W*1.5+100) + WORLD_W*1.5+100) % (WORLD_W*1.5+100) - 50;
    if(sx<-10||sx>WW+10) continue;
    X.globalAlpha = a;
    X.fillStyle='#ffffff';
    X.beginPath();
    X.arc(sx, s.y, s.r, 0, Math.PI*2);
    X.fill();
  }
  X.globalAlpha=1;
}

function drawSky(){
  const day = getDayFactor();
  const d = district;
  let topCol, botCol;
  if(day.t==='night'){
    topCol = d.sky;
    botCol = d.sky;
  } else if(day.t==='dawn'){
    topCol = lerpColor(d.sky,'#1a0a05',day.f);
    botCol = lerpColor(d.sky,'#3a1a05',day.f);
  } else if(day.t==='dusk'){
    topCol = lerpColor('#1a0808',d.sky,day.f);
    botCol = lerpColor('#2a1205',d.sky,day.f);
  } else {
    topCol = lerpColor('#080818',d.sky,0.4);
    botCol = d.sky;
  }
  const g = X.createLinearGradient(0,0,0,ROAD_Y1);
  g.addColorStop(0, topCol);
  g.addColorStop(1, botCol);
  X.fillStyle = g;
  X.fillRect(0,0,WW,ROAD_Y1);
}

function lerpColor(c1,c2,t){
  const h=(s)=>[parseInt(s.slice(1,3),16),parseInt(s.slice(3,5),16),parseInt(s.slice(5,7),16)];
  const a=h(c1),b=h(c2);
  const r=(v)=>Math.round(a[v]+(b[v]-a[v])*t);
  return '#'+[r(0),r(1),r(2)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function drawRoad(){
  const d = district;
  // Road base
  X.fillStyle = d.road;
  X.fillRect(0, ROAD_Y1, WW, ROAD_Y2-ROAD_Y1);
  // Sidewalks
  X.fillStyle = '#1c1c2e';
  X.fillRect(0, ROAD_Y1, WW, SIDEWALK_T);
  X.fillRect(0, ROAD_Y2-SIDEWALK_T, WW, SIDEWALK_T);
  // Road center line dashes
  X.setLineDash([18,14]);
  X.strokeStyle = 'rgba(255,255,255,0.12)';
  X.lineWidth = 2;
  X.beginPath();
  const my = (ROAD_Y1+ROAD_Y2)/2;
  X.moveTo(0, my); X.lineTo(WW, my);
  X.stroke();
  X.setLineDash([]);
  // Road texture (subtle)
  for(let tx=(-camX%40);tx<WW;tx+=40){
    X.fillStyle='rgba(255,255,255,0.013)';
    X.fillRect(tx,ROAD_Y1+SIDEWALK_T,2,ROAD_Y2-ROAD_Y1-SIDEWALK_T*2);
  }
  // Below road area (back wall)
  X.fillStyle = '#0d0d18';
  X.fillRect(0, ROAD_Y2, WW, WH-ROAD_Y2);
}

function drawShop(s){
  const sx = px(s.x);
  if(sx > WW+20 || sx+s.w < -20) return;
  const sy = s.y;
  const w = s.w, h = s.h;
  const ac = district.accent;
  const ac2 = district.accent2;
  // Building base
  X.fillStyle = '#12121e';
  X.fillRect(sx, sy, w, h);
  // Roof (district-tinted)
  const roofCol = s.isPlayer ? '#1a2a1a' : lerpColor('#16121e', district.accent, 0.12);
  X.fillStyle = roofCol;
  X.fillRect(sx, sy, w, 14);
  // Player shop special glow
  if(s.isPlayer){
    X.save();
    X.shadowColor = '#00ff88';
    X.shadowBlur = 18;
    X.strokeStyle = '#00ff88';
    X.lineWidth = 2;
    X.strokeRect(sx+1, sy+1, w-2, h-2);
    X.restore();
  }
  // Window (warm interior glow)
  const winY = s.isTop ? sy+18 : sy+8;
  const winW = 28, winH = 22;
  const win1X = sx+14, win2X = sx+w-14-winW;
  // Interior glow
  X.save();
  const ig = X.createRadialGradient(sx+w/2, winY+winH/2, 2, sx+w/2, winY+winH/2, 30);
  ig.addColorStop(0,'rgba(255,220,140,0.18)');
  ig.addColorStop(1,'rgba(255,180,80,0)');
  X.fillStyle=ig;
  X.fillRect(sx, winY-5, w, winH+15);
  X.restore();
  // Windows
  for(const wx of [win1X, win2X]){
    X.fillStyle='rgba(255,210,120,0.85)';
    X.fillRect(wx,winY,winW,winH);
    X.fillStyle='rgba(255,255,180,0.3)';
    X.fillRect(wx+winW/2-1,winY,2,winH);
    X.fillRect(wx,winY+winH/2-1,winW,2);
    X.strokeStyle='#555';
    X.lineWidth=1;
    X.strokeRect(wx,winY,winW,winH);
  }
  // Door
  const doorW=18, doorH=26;
  const doorX = sx+w/2-doorW/2;
  const doorY = s.isTop ? sy+h-doorH : sy;
  X.fillStyle='#0a0a12';
  X.fillRect(doorX, doorY, doorW, doorH);
  X.strokeStyle=ac;
  X.lineWidth=1;
  X.strokeRect(doorX,doorY,doorW,doorH);
  // Door knob
  X.fillStyle='#888';
  X.beginPath();
  X.arc(doorX+(s.isTop?doorW-5:5), doorY+doorH/2, 2, 0, Math.PI*2);
  X.fill();
  // Neon sign
  const signY = s.isTop ? sy+h-doorH-18 : sy+doorH+4;
  X.save();
  X.shadowColor = ac;
  X.shadowBlur = 10;
  X.strokeStyle = ac;
  X.lineWidth = 1.5;
  X.strokeRect(sx+8, signY-8, w-16, 14);
  X.shadowBlur=0;
  X.restore();
  X.fillStyle = s.open ? ac : '#444';
  X.font='bold 7px monospace';
  X.textAlign='center';
  X.fillText(s.open?'OPEN':'CLOSED', sx+w/2, signY+1);
  // Shop name above/below
  const nameY = s.isTop ? sy-3 : sy+h+11;
  X.fillStyle='#d0d0e8';
  X.font='bold 7px monospace';
  X.textAlign='center';
  const nameStr = s.name.length>18?s.name.slice(0,17)+'…':s.name;
  X.fillText(nameStr, sx+w/2, nameY);
  // Stars
  const starsY = s.isTop ? sy-12 : sy+h+21;
  X.font='7px monospace';
  X.fillStyle='#ffd700';
  X.fillText('★'.repeat(s.stars)+'☆'.repeat(5-s.stars), sx+w/2, starsY);
  // Traffic
  X.fillStyle='#666';
  X.font='6px monospace';
  X.fillText('👥 '+s.traffic, sx+w/2, starsY+9);
  // Featured card label (on window)
  X.fillStyle='rgba(255,220,120,0.7)';
  X.font='5px monospace';
  X.fillText(s.featuredCard, sx+w/2, winY+winH+8);
  // Player shop badge
  if(s.isPlayer){
    const col = localStorage.getItem('echovault_collection');
    const count = col ? JSON.parse(col).length : 0;
    const badgeY = s.isTop ? sy+h-doorH-32 : sy+doorH+22;
    X.fillStyle = count>0 ? '#00ff88' : '#ff9900';
    X.font='bold 7px monospace';
    X.textAlign='center';
    X.fillText(count>0 ? '🟢 OPEN ('+count+' cards)' : '→ SET UP SHOP', sx+w/2, badgeY);
  }
  X.textAlign='left';
}

function drawLamp(lx){
  const sx = px(lx);
  if(sx<-20||sx>WW+20) return;
  const day = getDayFactor();
  const lit = day.t==='night'||day.t==='dusk';
  // Pole
  X.fillStyle='#888';
  X.fillRect(sx-2, ROAD_Y1-55, 4, 55+SIDEWALK_T);
  X.fillRect(sx-2, ROAD_Y2-SIDEWALK_T, 4, 55);
  // Lamp head
  X.fillStyle='#aaa';
  X.fillRect(sx-10, ROAD_Y1-58, 20, 6);
  X.fillRect(sx-10, ROAD_Y2+52, 20, 6);
  if(lit){
    // Light cone
    X.save();
    const cg = X.createRadialGradient(sx, ROAD_Y1-55, 0, sx, ROAD_Y1-55, 70);
    cg.addColorStop(0,'rgba(255,240,180,0.18)');
    cg.addColorStop(1,'rgba(255,240,180,0)');
    X.fillStyle=cg;
    X.beginPath();
    X.moveTo(sx,ROAD_Y1-55);
    X.lineTo(sx-50,ROAD_Y1+20);
    X.lineTo(sx+50,ROAD_Y1+20);
    X.closePath();
    X.fill();
    // Bulb
    X.shadowColor='#ffe0a0';
    X.shadowBlur=14;
    X.fillStyle='#ffe0a0';
    X.beginPath();
    X.arc(sx, ROAD_Y1-56, 4, 0, Math.PI*2);
    X.fill();
    X.shadowBlur=0;
    X.restore();
  }
}

function drawTree(wx){
  const sx = px(wx);
  if(sx<-30||sx>WW+30) return;
  const ty = ROAD_Y1+6;
  const ty2 = ROAD_Y2-6-22;
  for(const y of [ty,ty2]){
    X.fillStyle='#4a3010';
    X.fillRect(sx-3,y+14,6,8);
    X.fillStyle='#2a4a18';
    X.beginPath();
    X.arc(sx,y+10,12,0,Math.PI*2);
    X.fill();
    X.fillStyle='#3a6022';
    X.beginPath();
    X.arc(sx-4,y+8,7,0,Math.PI*2);
    X.fill();
  }
}

function drawBench(wx){
  const sx = px(wx);
  if(sx<-30||sx>WW+30) return;
  // Top bench
  X.fillStyle='#5a3a1a';
  X.fillRect(sx-12,ROAD_Y1+SIDEWALK_T-6,24,4);
  X.fillRect(sx-10,ROAD_Y1+SIDEWALK_T-2,4,6);
  X.fillRect(sx+6,ROAD_Y1+SIDEWALK_T-2,4,6);
  // Bottom bench
  X.fillRect(sx-12,ROAD_Y2-SIDEWALK_T+2,24,4);
  X.fillRect(sx-10,ROAD_Y2-SIDEWALK_T+6,4,6);
  X.fillRect(sx+6,ROAD_Y2-SIDEWALK_T+6,4,6);
}

function drawMinimap(){
  const mw=120, mh=50, mx=WW-mw-6, my=32;
  X.fillStyle='rgba(10,10,20,0.82)';
  X.fillRect(mx,my,mw,mh);
  X.strokeStyle='rgba(255,255,255,0.15)';
  X.lineWidth=1;
  X.strokeRect(mx,my,mw,mh);
  // Road strip
  X.fillStyle='rgba(255,255,255,0.06)';
  X.fillRect(mx,my+mh*0.4,mw,mh*0.2);
  // Shops dots
  for(const s of shops){
    const rx = mx + (s.x/WORLD_W)*mw;
    const ry = s.isTop ? my+6 : my+mh-10;
    X.fillStyle = s.isPlayer ? '#00ff88' : district.accent;
    X.fillRect(rx,ry,8,5);
  }
  // Player dot
  const px2 = mx + (player.x/WORLD_W)*mw;
  const py2 = my + mh/2;
  X.fillStyle='#ffffff';
  X.fillRect(px2-2,py2-2,4,4);
  // Viewport box
  const vx = mx + (camX/WORLD_W)*mw;
  const vw = (WW/WORLD_W)*mw;
  X.strokeStyle='rgba(255,255,255,0.3)';
  X.strokeRect(vx,my,vw,mh);
}

function drawNPC(n, dt){
  n.animT += dt;
  if(n.animT > 300){ n.frame = 1-n.frame; n.animT=0; }
  const sx = px(n.x);
  if(sx<-20||sx>WW+20) return;
  const sy = n.y;
  // Body
  X.fillStyle = n.color;
  X.fillRect(sx-4, sy-12, 8, 12);
  // Head
  X.fillStyle = '#ffd8b0';
  X.fillRect(sx-4, sy-20, 8, 8);
  // Legs
  if(n.frame===0){
    X.fillStyle=n.color;
    X.fillRect(sx-4,sy,3,6);
    X.fillRect(sx+1,sy,3,6);
  } else {
    X.fillStyle=n.color;
    X.fillRect(sx-5,sy,3,6);
    X.fillRect(sx+2,sy,3,6);
  }
  // Speech bubble
  if(n.speech && n.speechT>0){
    n.speechT -= dt;
    const bw = n.speech.length*5+10;
    const bx = sx-bw/2, by = sy-38;
    X.fillStyle='rgba(20,20,32,0.88)';
    X.fillRect(bx,by,bw,14);
    X.strokeStyle='rgba(255,255,255,0.3)';
    X.lineWidth=1;
    X.strokeRect(bx,by,bw,14);
    X.fillStyle='#e0e0f0';
    X.font='6px monospace';
    X.textAlign='center';
    X.fillText(n.speech, sx, by+9);
    X.textAlign='left';
    if(n.speechT<=0) n.speech='';
  }
}

function drawPlayer(){
  const sx = px(player.x);
  const sy = player.y;
  const d = district;
  // Shadow
  X.fillStyle='rgba(0,0,0,0.25)';
  X.beginPath();
  X.ellipse(sx+5, sy+player.h+2, 6, 2.5, 0, 0, Math.PI*2);
  X.fill();
  // Body
  X.fillStyle='#4488ff';
  X.fillRect(sx, sy+4, player.w, player.h-8);
  // Head
  X.fillStyle='#ffd8b0';
  X.fillRect(sx+1, sy, player.w-2, 7);
  // Hair
  X.fillStyle='#553311';
  X.fillRect(sx+1,sy,player.w-2,3);
  // Eyes
  X.fillStyle='#222';
  if(player.dir===1){X.fillRect(sx+2,sy+3,2,2);}
  else if(player.dir===3){X.fillRect(sx+6,sy+3,2,2);}
  else{X.fillRect(sx+2,sy+3,2,2);X.fillRect(sx+6,sy+3,2,2);}
  // Legs (animated)
  X.fillStyle='#2244aa';
  if(player.moving){
    const f = player.frame;
    X.fillRect(sx+(f?0:2), sy+player.h-4, 4, 6);
    X.fillRect(sx+(f?5:3), sy+player.h-4, 4, 6);
  } else {
    X.fillRect(sx+1, sy+player.h-4, 4, 6);
    X.fillRect(sx+5, sy+player.h-4, 4, 6);
  }
  // District accent glow ring
  X.save();
  X.shadowColor = d.accent;
  X.shadowBlur = 6;
  X.strokeStyle = d.accent+'88';
  X.lineWidth = 1;
  X.strokeRect(sx-1, sy-1, player.w+2, player.h+8);
  X.restore();
}

function drawLeaves(dt){
  for(const l of leaves){
    l.wobble += 0.02;
    l.wx += l.vx + Math.sin(l.wobble)*0.2;
    l.y += l.vy;
    if(l.y > WH+10) { l.y=-5; l.wx=Math.random()*WORLD_W; }
    if(l.wx > WORLD_W+50) l.wx=0;
    const sx = px(l.wx);
    if(sx<-10||sx>WW+10) continue;
    X.globalAlpha = l.opacity;
    X.fillStyle = l.color;
    X.beginPath();
    X.ellipse(sx, l.y, l.r, l.r*0.6, l.wobble, 0, Math.PI*2);
    X.fill();
  }
  X.globalAlpha=1;
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
let lastT = 0;
let frameCount = 0;

function updatePlayer(dt){
  const left  = keys['ArrowLeft']||keys['KeyA'];
  const right = keys['ArrowRight']||keys['KeyD'];
  const up    = keys['ArrowUp']||keys['KeyW'];
  const down  = keys['ArrowDown']||keys['KeyS'];
  let dx=0, dy=0;
  if(left){dx-=SPEED; player.dir=1;}
  if(right){dx+=SPEED; player.dir=3;}
  if(up){dy-=SPEED; player.dir=0;}
  if(down){dy+=SPEED; player.dir=2;}
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  player.moving = !!(dx||dy);
  if(player.moving){
    player.animT+=dt;
    if(player.animT>180){player.frame=1-player.frame;player.animT=0;}
  }
  const nx = clamp(player.x+dx, 2, WORLD_W-player.w-2);
  const ny = clamp(player.y+dy, ROAD_Y1+SIDEWALK_T-4, ROAD_Y2-player.h-4);
  player.x=nx; player.y=ny;
}

function updateCamera(){
  const targetCamX = player.x + player.w/2 - WW/2;
  camX = clamp(lerp(camX, targetCamX, 0.12), 0, WORLD_W-WW);
}

let npcSpeechTimer = 0;
function updateNPCs(dt){
  npcSpeechTimer -= dt;
  if(npcSpeechTimer < 0){
    npcSpeechTimer = 3000+Math.random()*4000;
    const n = npcs[Math.floor(Math.random()*npcs.length)];
    n.speech = SPEECHES[Math.floor(Math.random()*SPEECHES.length)];
    n.speechT = 2500;
  }
  for(const n of npcs){
    n.animT += dt;
    if(n.pauseT > 0){
      n.pauseT -= dt;
    } else {
      n.x += n.vx;
      n.y += n.vy;
      if(Math.random()<0.005){
        n.vx=(Math.random()-0.5)*1.2;
        n.vy=(Math.random()-0.5)*0.5;
      }
      if(Math.random()<0.003){n.pauseT=800+Math.random()*1500; n.vx=0; n.vy=0;}
      n.x=clamp(n.x,100,WORLD_W-100);
      n.y=clamp(n.y,ROAD_Y1+SIDEWALK_T+2,ROAD_Y2-SIDEWALK_T-20);
    }
    if(n.animT>280){n.frame=1-n.frame;n.animT=0;}
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(dt){
  X.clearRect(0,0,WW,WH);

  // Sky
  drawSky();
  drawStars(dt);

  // Stars parallax bg
  // Road
  drawRoad();

  // Trees (between shops and sidewalk)
  const treeXs = [300,480,700,920,1140,1300];
  for(const tx of treeXs) drawTree(tx);

  // Benches
  const benchXs = [390,590,810,1030,1220];
  for(const bx of benchXs) drawBench(bx);

  // Lamps
  for(const lx of lampXs) drawLamp(lx);

  // Shops
  for(const s of shops) drawShop(s);

  // Leaves
  drawLeaves(dt);

  // NPCs (sorted by Y)
  const sortedNPCs = [...npcs].sort((a,b)=>a.y-b.y);
  for(const n of sortedNPCs) drawNPC(n, dt);

  // Player
  drawPlayer();

  // Night vignette overlay
  const dayF = getDayFactor();
  if(dayF.t==='night'||dayF.t==='dusk'){
    const nightA = dayF.t==='night' ? 0.22 : 0.1;
    X.fillStyle = 'rgba(0,0,15,'+nightA+')';
    X.fillRect(0,0,WW,WH);
  }

  // Minimap
  drawMinimap();

  // Near shop highlight ring
  if(nearShop){
    const s = nearShop;
    const sx = px(s.doorX)-26;
    const sy2 = s.isTop ? ROAD_Y1-2 : ROAD_Y2-4;
    X.save();
    X.shadowColor=district.accent;
    X.shadowBlur=14;
    X.strokeStyle=district.accent;
    X.lineWidth=2;
    X.setLineDash([4,3]);
    X.strokeRect(sx, sy2-2, 52, 20);
    X.setLineDash([]);
    X.restore();
  }
}

// ─── HUD UPDATE ───────────────────────────────────────────────────────────────
let hudTimer = 0;
function updateHUD(dt){
  hudTimer+=dt;
  if(hudTimer>1000){
    hudTimer=0;
    const day = getDayFactor();
    document.getElementById('timeLabel').textContent = day.label;
    const name = localStorage.getItem('visitorName')||'Visitor';
    document.getElementById('playerLabel').textContent = '👤 '+name;
    try{
      const col = JSON.parse(localStorage.getItem('echovault_collection')||'[]');
      const coins = parseInt(localStorage.getItem('echovault_coins')||'0');
      document.getElementById('coinsLabel').textContent = '🪙 '+coins;
    }catch(e){}
  }
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function loop(ts){
  const dt = Math.min(ts - lastT, 50);
  lastT = ts;
  frameCount++;
  updatePlayer(dt);
  updateCamera();
  updateNPCs(dt);
  checkNearShop();
  updateHUD(dt);
  render(dt);
  requestAnimationFrame(loop);
}

// Init HUD
(function initHUD(){
  const d = DISTRICTS[districtIdx];
  document.getElementById('districtLabel').textContent = d.emoji+' '+d.name;
  const name = localStorage.getItem('visitorName')||'Visitor';
  document.getElementById('playerLabel').textContent = '👤 '+name;
  document.getElementById('timeLabel').textContent = getDayFactor().label;
})();

requestAnimationFrame(loop);
</script>
