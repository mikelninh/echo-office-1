const TAU = Math.PI * 2;
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
const easeOut = t => 1 - (1 - t) * (1 - t);
const easeInOut = t => t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
const rng = (a = 0, b = 1) => a + Math.random() * (b - a);
const rngI = (a, b) => Math.floor(rng(a, b + 1));
const hexToRGB = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
const noiseP=[];for(let i=0;i<512;i++)noiseP[i]=(i*131+17)&255;
function noise2D(x, y) {
  const xi = ~~x & 255, yi = ~~y & 255;
  const xf = x - ~~x, yf = y - ~~y;
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  const aa = noiseP[noiseP[xi] + yi], ba = noiseP[noiseP[xi + 1] + yi];
  const ab = noiseP[noiseP[xi] + yi + 1], bb = noiseP[noiseP[xi + 1] + yi + 1];
  return lerp(lerp(aa / 255, ba / 255, u), lerp(ab / 255, bb / 255, u), v);}

let AC = null;

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = AC.createGain(); masterGain.gain.value = 0.7; masterGain.connect(AC.destination);
  sfxGain = AC.createGain(); sfxGain.gain.value = 0.6; sfxGain.connect(masterGain);
  musicGain = AC.createGain(); musicGain.gain.value = 0.12; musicGain.connect(masterGain);}
function createNoise(dur, freq = 4000, q = 1, vol = 0.1, type = 'lowpass') {
  const len = AC.sampleRate * dur;
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf;
  const filt = AC.createBiquadFilter(); filt.type = type; filt.frequency.value = freq; filt.Q.value = q;
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(filt); filt.connect(g); g.connect(sfxGain);
  return {src, gain: g, filter: filt, start: (t = 0) => src.start(AC.currentTime + t) };}
function tone(freq, dur, type = 'sine', vol = 0.15, delay = 0) {
  const t = AC.currentTime + delay;
  const o = AC.createOscillator(); o.type = type; o.frequency.value = freq;
  const g = AC.createGain(); g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + dur + 0.05);}
function sndAmbient() {
  const o1 = AC.createOscillator(); o1.type = 'sine'; o1.frequency.value = 50;
  const g1 = AC.createGain(); g1.gain.value = 0.03;
  o1.connect(g1); g1.connect(masterGain); o1.start();
  const o2 = AC.createOscillator(); o2.type = 'triangle'; o2.frequency.value = 165;
  const g2 = AC.createGain(); g2.gain.value = 0.008;
  const f2 = AC.createBiquadFilter(); f2.type = 'lowpass'; f2.frequency.value = 200;
  o2.connect(f2); f2.connect(g2); g2.connect(masterGain); o2.start();}
function sndServo(dir) {
  if (!AC) return;
  const n = createNoise(0.06, 1200 + dir * 200, 2, 0.04, 'bandpass');
  n.start();}
function sndDrop() {
  if (!AC) return;
  tone(80, 0.15, 'square', 0.15);
  tone(55, 0.2, 'triangle', 0.12, 0.02);
  const n = createNoise(0.3, 800, 1, 0.08);
  n.gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.3);
  n.start();}
function sndDescend() {
  if (!AC) return;
  const n = createNoise(0.08, 1500, 3, 0.05, 'bandpass');

function sndGrip() {
  if (!AC) return;
  tone(600, 0.08, 'square', 0.2);
  tone(900, 0.05, 'square', 0.15, 0.03);

function sndLift(progress) {
  if (!AC) return;
  const f = 200 + progress * 600;
  tone(f, 0.1, 'sawtooth', 0.05);
  if (Math.random() < 0.3) {// Creak
  const n = createNoise(0.08, f * 2, 5, 0.03, 'bandpass');
  n.start();}
}
function sndSlip() {
  if (!AC) return;
  const o = AC.createOscillator(); o.type = 'sawtooth'; o.frequency.value = 400;
  o.frequency.exponentialRampToValueAtTime(80, AC.currentTime + 0.4);
  const g = AC.createGain(); g.gain.value = 0.12;
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.5);
  const f = AC.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 600;
  o.connect(f); f.connect(g); g.connect(sfxGain); o.start(); o.stop(AC.currentTime + 0.6);
  setTimeout(() => {tone(50, 0.15, 'triangle', 0.2);}, 300);}
function sndWinCommon() {tone(880, 0.15, 'sine', 0.2); tone(1100, 0.15, 'sine', 0.2, 0.12);}
function sndWinRare() {
  [523, 659, 784].forEach((f, i) => {tone(f, 0.2, 'sine', 0.18, i * 0.1); tone(f * 1.5, 0.15, 'triangle', 0.06, i * 0.1);});}
function sndWinSuper() {

function sndWinUltra() {

function sndWinLegendary() {
  const notes = [262, 330, 392, 523, 659, 784, 1047, 1319];

  const n = createNoise(0.5, 10000, 0.3, 0.1); n.start();}, 750);

function sndMega() {
  if (!AC) return;
  const o = AC.createOscillator(); o.type = 'sine'; o.frequency.value = 40;
  const g = AC.createGain(); g.gain.value = 0.35;

  o.connect(g); g.connect(sfxGain); o.start(); o.stop(AC.currentTime + 1);

  setTimeout(() => {

    n.start();}, i * 80);}
  const sw = AC.createOscillator(); sw.type = 'sawtooth'; sw.frequency.value = 100;
  sw.frequency.exponentialRampToValueAtTime(2000, AC.currentTime + 0.8);
  const sg = AC.createGain(); sg.gain.value = 0.12;
  sg.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 1.0);
  const sf = AC.createBiquadFilter(); sf.type = 'lowpass'; sf.frequency.value = 3000;

let musicOscs = [];
function startMusic() {
  if (musicPlaying || !AC) return;
  musicPlaying = true;
  const chords = [
  [261.6, 329.6, 392.0], // C
  [220.0, 277.2, 329.6], // Am
  [246.9, 311.1, 370.0], // B
  [196.0, 246.9, 293.7], // G
  ];
  let chordIdx = 0;
  function playChord() {
  if (!musicPlaying) return;
  const chord = chords[chordIdx % chords.length];
  chord.forEach(f => {
    const o = AC.createOscillator(); o.type = 'triangle';
    o.frequency.value = f / 2;
    const g = AC.createGain(); g.gain.value = 0.0;
    g.gain.linearRampToValueAtTime(0.04, AC.currentTime + 0.3);
    g.gain.linearRampToValueAtTime(0.0, AC.currentTime + 2.8 / musicTempo);
    const fl = AC.createBiquadFilter(); fl.type = 'lowpass'; fl.frequency.value = 400;
    o.connect(fl); fl.connect(g); g.connect(musicGain);
    o.start(); o.stop(AC.currentTime + 3.0 / musicTempo);});
  chordIdx++;
  setTimeout(playChord, 3000 / musicTempo);}
  playChord();}
function playWinSound(rarity) {
  if (!AC) return;
  if (rarity === 'legendary') sndWinLegendary();
  else if (rarity === 'ultra') sndWinUltra();
  else if (rarity === 'super') sndWinSuper();
  else if (rarity === 'rare') sndWinRare();
  else sndWinCommon();}
const M = {
  x: 75, y: 110, w: 550, h: 560,
  floorY: 610,
  railY: 148,
  chuteX: 460, chuteW: 70,
  innerX: 85, innerW: 530,

let feltCanvas = null;
function generateFelt() {
  feltCanvas = document.createElement('canvas');
  feltCanvas.width = M.w; feltCanvas.height = 60;
  const fc = feltCanvas.getContext('2d');
  for (let py = 0; py < 60; py++) {
  for (let px = 0; px < M.w; px++) {
    const n = noise2D(px * 0.08, py * 0.08);
    const n2 = noise2D(px * 0.2, py * 0.2) * 0.3;
    const v = 18 + (n + n2) * 20;
    fc.fillStyle = `rgb(${v * 0.6|0},${v * 0.8|0},${v|0})`;
    fc.fillRect(px, py, 1, 1);}
  }
}
const chromeSparkles = [];
for (let i = 0; i < 30; i++) {
  chromeSparkles.push({
  side: Math.random() < 0.5 ? 'left' : (Math.random() < 0.5 ? 'right' : 'top'),
  pos: Math.random(),
  phase: Math.random() * TAU,
  speed: 0.5 + Math.random() * 2,
  });}
let state = 'idle'; // idle, anticipation, dropping, gripping, lifting, returning, returning_empty, win_reveal
let clawX = W / 2, clawY = M.railY;
let clawVelX = 0, clawTargetOpen = 1, clawOpen = 1;
let clawSwingAngle = 0, clawSwingVel = 0;
let clawStrength = 0, isMega = false, megaScale = 1;
let heldPrize = null, heldOffX = 0, heldOffY = 0;
let slipTimer = 0;
let plays = 0, wins = 0, streak = 0;
let moveDir = 0, moveHeld = false;
let shakeX = 0, shakeY = 0, shakeTimer = 0, shakeInt = 0;
let slowMo = 1, slowMoTimer = 0;
let screenFlash = null, screenFlashA = 0;
let liftNoteT = 0;
let descendSndT = 0;
let time = 0, dt = 1/60, realTime = 0;

const RARITY = {
  common:  {bg: '#162040', border: '#2a5090', label: '#6a9ae8', glow: null, particle: '#6a9ae8', gemColor: '#4488cc', weight: 1 },
  rare:    {bg: '#103010', border: '#208040', label: '#40c070', glow: '#40c070', particle: '#40c070', gemColor: '#22aa55', weight: 1.5 },
  super:   {bg: '#2a1848', border: '#7030a0', label: '#b060e0', glow: '#b060e0', particle: '#b060e0', gemColor: '#9944dd', weight: 2 },

const CARD_NAMES = {
  yugioh:  ['Blue-Eyes','Dark Magician','Exodia','Red-Eyes','Pot of Greed'],
  pokemon: ['Charizard','Pikachu Illust','Shadowless','Rayquaza GS','Shining Mew2'],
  dandadan: ['Okarun SR','Momo Ayase','Turbo Granny','Seiko SP','Jiji'],
  onepiece: ['Luffy Alt','Shanks SP','Zoro Alt','Nami Romance','Gear 5'],
  lorcana: ['Elsa D23','Mickey Sorc','Stitch Holo','Belle Enchnt','Maleficent'],
};
const GAME_ICONS = {yugioh: '👑', pokemon: '⚡', dandadan: '👁', onepiece: '🏴', lorcana: '✨' };
let prizes = [];
function makePrize(x, y) {
  const r = Math.random();
  let rarity;
  if (r < 0.35) rarity = 'common';
  else if (r < 0.60) rarity = 'rare';
  else if (r < 0.80) rarity = 'super';
  else if (r < 0.95) rarity = 'ultra';
  else rarity = 'legendary';
  const gk = Object.keys(CARD_NAMES);
  const game = gk[rngI(0, gk.length - 1)];
  const name = CARD_NAMES[game][rngI(0, CARD_NAMES[game].length - 1)];
  // Attach real card data if available
  const realCardData = getRandomCard();
  return {
  x, y, w: 48, h: 64,
  vx: rng(-1, 1), vy: 0,
  rot: rng(-0.3, 0.3), rotV: 0,
  rarity, game, name,
  icon: GAME_ICONS[game],
  grounded: false,
  glowPhase: Math.random() * TAU,
  magnetGlow: 0,
  realCard: realCardData,
  };}
function spawnPrizes() {
  prizes = [];
  const count = 10 + rngI(0, 4);
  for (let i = 0; i < count; i++) {
  const px = M.x + 30 + Math.random() * (M.w - 120);
  const py = M.y + 10 - i * 20;
  const p = makePrize(px, py);
  p.vy = 1 + Math.random() * 2;
  prizes.push(p);}
}
function initDust() {
  dustMotes = [];
  for (let i = 0; i < 40; i++) {
  dustMotes.push({
    x: M.x + rng(10, M.w - 10),
    y: M.y + rng(40, M.h - 80),
    vx: rng(-0.15, 0.15),
    vy: rng(-0.2, -0.05),
    size: rng(0.5, 1.5),
    alpha: rng(0.1, 0.4),
    phase: rng(0, TAU),
  });}
}
function updatePhysics() {
  const g = 0.18 * slowMo;
  for (const p of prizes) {
  if (p === heldPrize) continue;
  p.vy += g;
  p.x += p.vx * slowMo;
  p.y += p.vy * slowMo;
  p.rot += p.rotV * slowMo;
  p.rotV *= 0.97;
  if (p.y + p.h > M.floorY) {
    p.y = M.floorY - p.h;
    if (Math.abs(p.vy) > 1.5 && AC) tone(50 + Math.random() * 40, 0.1, 'triangle', 0.06);
    p.vy *= -0.25;
    if (Math.abs(p.vy) < 0.5) {p.vy = 0; p.grounded = true;}
    p.vx *= 0.75;
    p.rotV *= 0.5;}
  if (p.x < M.x + 8) {p.x = M.x + 8; p.vx = Math.abs(p.vx) * 0.4;}
  if (p.x + p.w > M.x + M.w - 8) {p.x = M.x + M.w - 8 - p.w; p.vx = -Math.abs(p.vx) * 0.4;}
  if (p.y < M.y + 30) {p.y = M.y + 30; p.vy = Math.abs(p.vy) * 0.3;}
  for (const q of prizes) {
    if (q === p || q === heldPrize) continue;
    const ox = Math.min(p.x + p.w, q.x + q.w) - Math.max(p.x, q.x);
    const oy = Math.min(p.y + p.h, q.y + q.h) - Math.max(p.y, q.y);
    if (ox > 0 && oy > 0) {
    if (oy < ox) {
      const push = oy * 0.4;
      if (p.y < q.y) {p.y -= push; q.y += push; p.vy -= 0.3; q.vy += 0.3;}
      else {p.y += push; q.y -= push; p.vy += 0.3; q.vy -= 0.3;}
    } else {
      const push = ox * 0.3;
      if (p.x < q.x) {p.vx -= push * 0.08; q.vx += push * 0.08;}
      else {p.vx += push * 0.08; q.vx -= push * 0.08;}
    }
    p.rotV += (Math.random() - 0.5) * 0.02;}
  }
  p.vx *= 0.985;}
}
function spawnParticle(x, y, vx, vy, color, size, life, grav = 0.08) {

}

}

  const px = (clawX - W / 2) * 0.008;
  const py = (clawY - M.railY) * 0.005;
  X.save();
  X.translate(px, py);
  drawMachine();
  drawDust();
  drawDropPreview();
  for (const p of prizes) {
  if (p === heldPrize) continue;
  const dist = M.floorY - (p.y + p.h);
  if (dist < 60) {
    const alpha = clamp(0.12 - dist * 0.002, 0, 0.12);
    X.fillStyle = `rgba(0,0,0,${alpha})`;
    X.fillRect(p.x + 5, M.floorY + 1, p.w - 10, 2);}
  }
  for (const p of prizes) drawPrize(p);
  drawClaw();
  drawParticles();
  X.restore(); // parallax
  drawMegaOverlay();
  if (screenFlashA > 0 && screenFlash) {
  const rgb = hexToRGB(screenFlash);
  X.fillStyle = `rgba(${rgb.join(',')},${screenFlashA})`;
  X.fillRect(0, 0, W, H);}
  X.restore(); // shake
  drawWinReveal();
  drawHUD();
  drawCollection();
  drawTokenDepletedOverlay();}
const keys = {};
let lastTapTime = 0;
addEventListener('keydown', e => {
  if (e.repeat) return;
  keys[e.code] = true;
  if (e.code === 'Space') {e.preventDefault(); startDrop();}
  if (e.code === 'KeyR') resetGame();});
addEventListener('keyup', e => {keys[e.code] = false;});
let touchActive = false, touchStartY = 0;
C.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!gameStarted) return;
  const touch = e.touches[0];
  const rect = C.getBoundingClientRect();
  const tx = (touch.clientX - rect.left) / rect.width;
  const ty = (touch.clientY - rect.top) / rect.height;
  touchStartY = touch.clientY;
  touchActive = true;
  const now = Date.now();
  if (now - lastTapTime < 300) {startDrop(); lastTapTime = 0; return;}
  lastTapTime = now;
  if (tx < 0.5) moveDir = -1;
  else moveDir = 1;});
C.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  const touch = e.touches[0];
  const dy = touch.clientY - touchStartY;
  if (dy > 50) {startDrop(); touchActive = false; moveDir = 0; return;}
  const rect = C.getBoundingClientRect();
  const tx = (touch.clientX - rect.left) / rect.width;
  if (tx < 0.4) moveDir = -1;
  else if (tx > 0.6) moveDir = 1;
  else moveDir = 0;});
C.addEventListener('touchend', () => {touchActive = false; moveDir = 0;});
C.addEventListener('click', e => {
  const rect = C.getBoundingClientRect();
  const cx = (e.clientX - rect.left) / rect.width * W;
  const cy = (e.clientY - rect.top) / rect.height * H;
  // Top bar "← Dashboard" link
  if (cx < 120 && cy < 14) {
    window.location.href = 'dashboard.html';
    return;
  }
  // Token depleted overlay buttons
  if (showTokenDepletedOverlay) {
    const btnY = H / 2 + 30;
    const btnH = 30;
    // Dashboard button (left)
    if (cx > W / 2 - 140 && cx < W / 2 - 10 && cy > btnY && cy < btnY + btnH) {
      window.location.href = 'dashboard.html'; return;
    }
    // Companion button (right)
    if (cx > W / 2 + 10 && cx < W / 2 + 140 && cy > btnY && cy < btnY + btnH) {
      window.location.href = 'companion.html'; return;
    }
    // Close overlay on any other click
    showTokenDepletedOverlay = false;
    return;
  }
  // Win reveal post-play buttons
  if (revealCard && revealCard.timer > revealCard.duration * 0.5) {
    const btnY2 = H / 2 + 60;
    if (cx > W / 2 - 140 && cx < W / 2 - 10 && cy > btnY2 && cy < btnY2 + 28) {
      window.location.href = 'dashboard.html'; return;
    }
    if (cx > W / 2 + 10 && cx < W / 2 + 140 && cy > btnY2 && cy < btnY2 + 28) {
      window.location.href = 'companion.html'; return;
    }
  }
});
function startDrop() {
  if (state !== 'idle' || !gameStarted) return;
  // Check tokens
  tokenData = getTokenData();
  if (tokenData.tokens <= 0) {
    showTokenDepletedOverlay = true;
    return;
  }
  // Consume a token
  tokenData.tokens--;
  saveTokenData(tokenData);
  initAudio();
  AC.resume();
  if (!musicPlaying) {sndAmbient(); startMusic();}
  plays++;
  hudPop.plays = 10;
  isMega = (plays % MEGA_EVERY === 0);
  if (isMega) {
  sndMega();
  doFlash('#ffd740', 0.35);
  doShake(5, 30);
  window.dispatchEvent(new CustomEvent('clawMega'));
  if (window.ClawSpectator) window.ClawSpectator.onMega();
  spawnElectric(clawX, clawY, 30);}
  clawStrength = rollStrength();
  state = 'anticipation';
  slipTimer = 0;
  streak = isMega ? streak : (heldPrize ? streak : streak); // preserve streak
  if (AC) tone(120, 0.08, 'square', 0.08);}
function resetGame() {
  state = 'idle'; clawX = W / 2; clawY = M.railY;
  clawVelX = 0; clawTargetOpen = 1; clawOpen = 1;
  clawSwingAngle = 0; clawSwingVel = 0;
  heldPrize = null; isMega = false; megaScale = 1;
  slowMoTimer = 0; slowMo = 1;
  revealCard = null;
  spawnPrizes();}
let gameStarted = false;
function initGame() {
  document.getElementById('startScreen').style.display = 'none';
  gameStarted = true;
  initAudio();
  AC.resume();
  sndAmbient();
  startMusic();
  generateFelt();
  spawnPrizes();
  initDust();}
function gameLoop() {
  if (!gameStarted) {requestAnimationFrame(gameLoop); render(); return;}
  if (state === 'idle') {
  if (keys['ArrowLeft'] || keys['KeyA']) moveDir = -1;
  else if (keys['ArrowRight'] || keys['KeyD']) moveDir = 1;
  else if (!touchActive) moveDir = 0;}
  update();
  render();
  requestAnimationFrame(gameLoop);}
generateFelt();
spawnPrizes();
initDust();
gameLoop();
</script>
