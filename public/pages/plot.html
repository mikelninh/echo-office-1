<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo's Vault — My Plot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a14;--surface:#12121f;--surface2:#1a1a2e;
  --border:#2a2a4a;--text:#e0e0f0;--dim:#6a6a8a;
  --accent:#ff6ec7;--gold:#ffd700;--green:#00e676;
  --red:#ff5252;--blue:#448aff;--purple:#b388ff;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;overflow-x:hidden}

/* NAV */
.topbar{position:sticky;top:0;z-index:200;background:rgba(10,10,20,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.topbar .shop-name-display{font-weight:bold;font-size:15px;color:var(--accent);cursor:pointer;letter-spacing:1px}
.topbar .shop-name-display:hover{text-decoration:underline}
.topbar-spacer{flex:1}
.topbar a,.topbar button.nav-btn{color:var(--dim);text-decoration:none;font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:none;cursor:pointer;transition:all .2s}
.topbar a:hover,.topbar button.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.breadcrumb{padding:8px 20px;font-size:11px;color:var(--dim);border-bottom:1px solid var(--border);background:var(--surface)}
.breadcrumb span{color:var(--text)}

/* MAIN LAYOUT */
.main-wrap{display:flex;gap:0;min-height:calc(100vh - 80px)}
.room-area{flex:1;padding:20px;display:flex;flex-direction:column;align-items:center;gap:16px}
.side-panel{width:260px;min-width:220px;background:var(--surface);border-left:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:18px}

/* THEME PICKER */
.theme-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.theme-btn{background:var(--surface2);border:2px solid var(--border);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12px;color:var(--text);transition:all .2s;white-space:nowrap}
.theme-btn:hover{border-color:var(--accent)}
.theme-btn.active{border-color:var(--accent);background:#1a1a3a;color:var(--accent)}

/* CANVAS WRAPPER */
.canvas-wrap{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.8),0 0 80px rgba(0,0,0,.4)}
canvas#room{display:block;cursor:pointer}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;max-width:380px;width:90%;position:relative}
.modal-box h3{font-size:15px;margin-bottom:8px;color:var(--accent)}
.modal-box p{font-size:12px;color:var(--dim);margin-bottom:4px}
.modal-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer}
.modal-close:hover{color:var(--accent)}
.rarity-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:bold;margin-top:6px}
.modal-card-img{width:100%;max-width:200px;display:block;margin:0 auto 12px;border-radius:6px;border:2px solid var(--border)}

/* SHOP STATS PANEL */
.panel-title{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:4px}
.shop-name-edit{display:flex;gap:6px;align-items:center}
.shop-name-edit input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;padding:4px 8px;border-radius:4px;flex:1;outline:none}
.shop-name-edit input:focus{border-color:var(--accent)}
.shop-name-edit button{background:var(--accent);border:none;color:#000;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:bold}
.stat-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.stat-val{color:var(--accent)}
.share-btn{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s;margin-top:4px}
.share-btn:hover{border-color:var(--accent);color:var(--accent)}
.coming-soon{display:inline-block;background:#1a1a00;border:1px solid var(--gold);color:var(--gold);font-size:9px;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}

/* SHELF PANEL */
.shelf-panel{width:100%;max-width:720px}
.shelf-panel h2{font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:12px}
.shelf-items{display:flex;gap:10px;flex-wrap:wrap}
.shelf-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;width:140px;font-size:11px;cursor:pointer;transition:border-color .2s}
.shelf-card:hover{border-color:var(--accent)}
.shelf-card .card-name{color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.shelf-card .card-price{color:var(--gold)}
.shelf-card .for-sale-toggle{margin-top:6px;display:flex;align-items:center;gap:6px;font-size:10px;color:var(--dim)}
.shelf-card .for-sale-toggle input{accent-color:var(--accent);cursor:pointer}
.price-input{background:var(--surface2);border:1px solid var(--border);color:var(--gold);font-family:inherit;font-size:11px;padding:2px 5px;border-radius:4px;width:70px;margin-top:4px;outline:none}
.price-input:focus{border-color:var(--gold)}
.shelf-empty{color:var(--dim);font-size:12px;padding:16px;text-align:center}
.shelf-empty a{color:var(--accent)}
.npc-visit-btn{display:inline-block;margin-top:12px;padding:10px 20px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:12px;font-family:inherit;text-decoration:none}
.npc-visit-btn:hover{opacity:.85}
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-size:12px;cursor:pointer;background:none;border:1px solid var(--border);padding:6px 14px;border-radius:6px;margin-bottom:8px}
.back-btn:hover{border-color:var(--accent)}
</style>
</head>
<body>

<nav class="topbar">
  <span class="shop-name-display" id="navShopName" onclick="focusNameEdit()">My Plot</span>
  <div class="topbar-spacer"></div>
  <a href="index.html">← Neighborhood</a>
  <a href="dashboard.html">📊 Dashboard</a>
  <a href="claw.html">🎰 Claw</a>
</nav>
<div class="breadcrumb" id="breadcrumb">
  Districts &gt; <span>My Quarter</span> &gt; <span id="bcShop">My Shop</span>
</div>

<div class="main-wrap">
  <div class="room-area">
    <div id="npcBackBar" style="display:none;width:100%;max-width:720px">
      <button class="back-btn" onclick="history.back()">← Back to Street</button>
    </div>

    <!-- THEME PICKER -->
    <div class="theme-bar" id="themePicker">
      <button class="theme-btn" data-theme="neon" onclick="setTheme('neon')">🌙 Neon Arcade</button>
      <button class="theme-btn" data-theme="cozy" onclick="setTheme('cozy')">🏠 Cozy Den</button>
      <button class="theme-btn" data-theme="retro" onclick="setTheme('retro')">🎮 Retro Pixel</button>
      <button class="theme-btn" data-theme="gold" onclick="setTheme('gold')">✨ Gold Vault</button>
      <button class="theme-btn" data-theme="crystal" onclick="setTheme('crystal')">🔮 Crystal Cave</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="room" width="700" height="500"></canvas>
    </div>

    <!-- SHOP SHELF -->
    <div class="shelf-panel">
      <h2>🪟 Shop Shelf <span class="coming-soon">Coming Soon: real transactions!</span></h2>
      <div class="shelf-items" id="shelfItems"></div>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel">
    <div>
      <div class="panel-title">🏠 Your Shop</div>
      <div class="shop-name-edit">
        <input type="text" id="shopNameInput" placeholder="Shop name..." maxlength="24">
        <button onclick="saveShopName()">Save</button>
      </div>
    </div>
    <div>
      <div class="panel-title">📊 Stats</div>
      <div class="stat-row"><span>⭐ Rating</span><span class="stat-val" id="statRating">4.2 / 5</span></div>
      <div class="stat-row"><span>👁 Visitors</span><span class="stat-val" id="statVisitors">—</span></div>
      <div class="stat-row"><span>💰 Revenue</span><span class="stat-val">◈ 0 <span class="coming-soon">soon</span></span></div>
      <div class="stat-row"><span>🃏 Cards</span><span class="stat-val" id="statCards">0</span></div>
      <div class="stat-row"><span>🏷 Listed</span><span class="stat-val" id="statListed">0</span></div>
      <button class="share-btn" onclick="shareShop()">🔗 Share Shop</button>
    </div>
    <div>
      <div class="panel-title">🎰 Claw Machine</div>
      <div class="stat-row"><span>🎮 Plays</span><span class="stat-val" id="machPlays">0</span></div>
      <div class="stat-row"><span>🏆 Won</span><span class="stat-val" id="machWon">0</span></div>
      <div class="stat-row"><span>📦 Stock</span><span class="stat-val" id="machStock">—</span></div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px">
        <a href="claw.html" style="display:block;text-align:center;padding:8px;background:linear-gradient(135deg,#ff6ec7,#b388ff);color:#000;text-decoration:none;border-radius:6px;font-weight:bold;font-size:12px">▶ Play My Machine</a>
        <a href="machine-builder.html" style="display:block;text-align:center;padding:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);text-decoration:none;border-radius:6px;font-size:12px">⚙ Customize Machine</a>
      </div>
    </div>
  </div>
</div>

<!-- CARD MODAL -->
<div class="modal-overlay hidden" id="cardModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="modalImg" class="modal-card-img" src="" alt="" style="display:none">
    <h3 id="modalName">Card Name</h3>
    <p id="modalGame" style="margin-bottom:6px"></p>
    <span class="rarity-badge" id="modalRarity"></span>
    <p id="modalPrice" style="margin-top:10px;color:var(--gold)"></p>
  </div>
</div>

<script>
// ─── CONSTANTS ───
const LS = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
  raw: k => localStorage.getItem(k) || ''
};

// ─── URL PARAMS ───
const params = new URLSearchParams(location.search);
const NPC_SHOP_ID = params.get('shop');
const NPC_DISTRICT = params.get('district') || 'yugioh';
const IS_NPC = !!NPC_SHOP_ID;

// ─── STATE ───
let currentTheme = LS.raw('echovault_plot_theme') || 'neon';
let collection = LS.get('echovault_collection') || [];
let shopListings = LS.get('echovault_shop_listings') || {};
let shopName = LS.raw('echovault_plot_shopname') || 'Echo\'s Corner';
let machineConfig = LS.get('echovault_machine_config') || {};
let npcCards = [];
let clickableZones = []; // for canvas hit testing

// ─── THEMES ───
const THEMES = {
  neon: {
    ceilColor: '#0d0020', wallColorL: '#130028', wallColorR: '#0a001a',
    floorColorF: '#1a0035', floorColorB: '#0d001a',
    ambientLight: 'rgba(180,0,255,0.05)', lampColor: '#cc00ff',
    accentA: '#ff00ff', accentB: '#00ffff', accentC: '#ff6ec7',
    wallPattern: 'neon', floorPattern: 'tile', label: '🌙 Neon Arcade'
  },
  cozy: {
    ceilColor: '#1a1000', wallColorL: '#2a1a08', wallColorR: '#221508',
    floorColorF: '#3d2010', floorColorB: '#2a1508',
    ambientLight: 'rgba(255,180,80,0.06)', lampColor: '#ffcc66',
    accentA: '#cc8844', accentB: '#884422', accentC: '#ffbb77',
    wallPattern: 'wood', floorPattern: 'plank', label: '🏠 Cozy Den'
  },
  retro: {
    ceilColor: '#001008', wallColorL: '#001a10', wallColorR: '#000e08',
    floorColorF: '#001a10', floorColorB: '#000e08',
    ambientLight: 'rgba(0,255,128,0.05)', lampColor: '#00ff88',
    accentA: '#00ff44', accentB: '#00cc33', accentC: '#88ffbb',
    wallPattern: 'crt', floorPattern: 'checker', label: '🎮 Retro Pixel'
  },
  gold: {
    ceilColor: '#1a1200', wallColorL: '#2a1e00', wallColorR: '#1e1600',
    floorColorF: '#2a1e00', floorColorB: '#1a1200',
    ambientLight: 'rgba(255,215,0,0.07)', lampColor: '#ffd700',
    accentA: '#ffd700', accentB: '#cc9900', accentC: '#ffe066',
    wallPattern: 'gold', floorPattern: 'marble', label: '✨ Gold Vault'
  },
  crystal: {
    ceilColor: '#000818', wallColorL: '#000d22', wallColorR: '#00081a',
    floorColorF: '#000d22', floorColorB: '#000818',
    ambientLight: 'rgba(100,150,255,0.07)', lampColor: '#88aaff',
    accentA: '#44aaff', accentB: '#8866ff', accentC: '#ccddff',
    wallPattern: 'crystal', floorPattern: 'stone', label: '🔮 Crystal Cave'
  }
};

const RARITY_COLORS = {
  'legendary': { bg: '#1a0800', border: '#ff8800', text: '#ffbb44' },
  'ultra rare': { bg: '#100020', border: '#cc00ff', text: '#dd88ff' },
  'secret rare': { bg: '#001020', border: '#00ccff', text: '#66eeff' },
  'rare': { bg: '#0a0a20', border: '#4488ff', text: '#88aaff' },
  'common': { bg: '#0a0a0a', border: '#444', text: '#888' },
  'default': { bg: '#0a0a0a', border: '#666', text: '#aaa' }
};

function getRarity(title) {
  if (!title) return 'common';
  const t = title.toLowerCase();
  if (t.includes('legend')) return 'legendary';
  if (t.includes('ultra rare') || t.includes('secret rare')) return t.includes('secret') ? 'secret rare' : 'ultra rare';
  if (t.includes('ghost rare')) return 'secret rare';
  if (t.includes('rare') || t.includes('psa 10')) return 'rare';
  return 'common';
}

// ─── NPC NAMES ───
const NPC_NAMES_PREFIX = ['Zephyr','Neon','Pixel','Vault','Dusk','Rune','Echo','Cipher','Storm','Glitch'];
const NPC_NAMES_SUFFIX = ['Emporium','Corner','Hoard','Trove','Cache','Stash','Den','Keep','Archives'];
function npcName(id) {
  const a = NPC_NAMES_PREFIX[(id * 7 + 3) % NPC_NAMES_PREFIX.length];
  const b = NPC_NAMES_SUFFIX[(id * 13 + 5) % NPC_NAMES_SUFFIX.length];
  return `${a}'s ${b}`;
}

// ─── CANVAS SETUP ───
const canvas = document.getElementById('room');
const ctx = canvas.getContext('2d');
const W = 700, H = 500;

function lerp(a, b, t) { return a + (b - a) * t; }

// ─── DRAW ROOM ───
function drawRoom() {
  const T = THEMES[currentTheme];
  ctx.clearRect(0, 0, W, H);

  // --- CEILING ---
  const ceilGrad = ctx.createLinearGradient(0, 0, 0, 150);
  ceilGrad.addColorStop(0, T.ceilColor);
  ceilGrad.addColorStop(1, T.wallColorL);
  ctx.fillStyle = ceilGrad;
  // Ceiling trapezoid (perspective)
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(W, 0);
  ctx.lineTo(W * 0.75, H * 0.35); ctx.lineTo(W * 0.25, H * 0.35);
  ctx.closePath(); ctx.fill();

  // --- LEFT WALL ---
  const lwGrad = ctx.createLinearGradient(0, 0, W * 0.25, 0);
  lwGrad.addColorStop(0, T.wallColorL);
  lwGrad.addColorStop(1, T.wallColorR);
  ctx.fillStyle = lwGrad;
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(W * 0.25, H * 0.35);
  ctx.lineTo(W * 0.25, H * 0.85); ctx.lineTo(0, H);
  ctx.closePath(); ctx.fill();

  // --- RIGHT WALL ---
  const rwGrad = ctx.createLinearGradient(W * 0.75, 0, W, 0);
  rwGrad.addColorStop(0, T.wallColorR);
  rwGrad.addColorStop(1, T.wallColorL);
  ctx.fillStyle = rwGrad;
  ctx.beginPath();
  ctx.moveTo(W, 0); ctx.lineTo(W * 0.75, H * 0.35);
  ctx.lineTo(W * 0.75, H * 0.85); ctx.lineTo(W, H);
  ctx.closePath(); ctx.fill();

  // --- BACK WALL ---
  const bwGrad = ctx.createLinearGradient(W * 0.25, H * 0.35, W * 0.75, H * 0.85);
  bwGrad.addColorStop(0, T.wallColorL);
  bwGrad.addColorStop(1, T.wallColorR);
  ctx.fillStyle = bwGrad;
  ctx.beginPath();
  ctx.moveTo(W * 0.25, H * 0.35); ctx.lineTo(W * 0.75, H * 0.35);
  ctx.lineTo(W * 0.75, H * 0.85); ctx.lineTo(W * 0.25, H * 0.85);
  ctx.closePath(); ctx.fill();

  // --- FLOOR ---
  const flGrad = ctx.createLinearGradient(0, H * 0.85, 0, H);
  flGrad.addColorStop(0, T.floorColorB);
  flGrad.addColorStop(1, T.floorColorF);
  ctx.fillStyle = flGrad;
  ctx.beginPath();
  ctx.moveTo(0, H); ctx.lineTo(W * 0.25, H * 0.85);
  ctx.lineTo(W * 0.75, H * 0.85); ctx.lineTo(W, H);
  ctx.closePath(); ctx.fill();

  drawFloorPattern(T);
  drawWallPattern(T);
  drawOverheadLamp(T);
  drawAmbientLight(T);
  drawDisplayCases(T);
  drawClawMachine(T);
}

function drawFloorPattern(T) {
  ctx.save();
  ctx.globalAlpha = 0.18;
  const p = currentTheme;
  if (p === 'neon' || p === 'retro') {
    ctx.strokeStyle = T.accentA;
    ctx.lineWidth = 1;
    for (let i = 0; i <= 6; i++) {
      const t = i / 6;
      const x0 = lerp(0, W * 0.25, t), y0 = lerp(H, H * 0.85, t);
      const x1 = lerp(W, W * 0.75, t), y1 = lerp(H, H * 0.85, t);
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    }
    for (let j = 0; j <= 6; j++) {
      const t = j / 6;
      const x0 = lerp(0, W * 0.25, t), y0 = lerp(H, H * 0.85, t);
      const x1 = lerp(W * 0.25, W * 0.75, t), y1 = H * 0.85;
      ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    }
  } else if (p === 'cozy') {
    ctx.strokeStyle = T.accentB;
    ctx.lineWidth = 2;
    for (let i = 0; i < 8; i++) {
      const t = i / 8;
      const x = lerp(0, W, t), yw = H * 0.85 + (H - H * 0.85) * 0.1;
      ctx.beginPath(); ctx.moveTo(x, H * 0.85); ctx.lineTo(x, H); ctx.stroke();
    }
  } else if (p === 'gold') {
    ctx.strokeStyle = T.accentA;
    ctx.lineWidth = 1.5;
    for (let i = 0; i <= 5; i++) {
      const t = i / 5;
      const y = lerp(H * 0.85, H, t);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
  } else if (p === 'crystal') {
    ctx.strokeStyle = T.accentA;
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const t = i / 4;
      const y = lerp(H * 0.85, H, t);
      ctx.beginPath(); ctx.moveTo(lerp(0, W * 0.25, t), y);
      ctx.lineTo(lerp(W, W * 0.75, t), y); ctx.stroke();
    }
  }
  ctx.restore();
}

function drawWallPattern(T) {
  ctx.save();
  ctx.globalAlpha = 0.13;
  if (currentTheme === 'neon') {
    ctx.strokeStyle = T.accentC;
    ctx.lineWidth = 1;
    // Horizontal LED strips on back wall
    for (let i = 1; i <= 4; i++) {
      const y = H * 0.35 + i * ((H * 0.85 - H * 0.35) / 5);
      ctx.beginPath(); ctx.moveTo(W * 0.25, y); ctx.lineTo(W * 0.75, y); ctx.stroke();
    }
  } else if (currentTheme === 'cozy') {
    // Bookshelf silhouette on back wall
    ctx.fillStyle = T.accentB;
    for (let i = 0; i < 5; i++) {
      const bx = W * 0.27 + i * 85, by = H * 0.38, bw = 70, bh = 30;
      ctx.fillRect(bx, by, bw, bh);
    }
  } else if (currentTheme === 'gold') {
    // Gold trim borders
    ctx.strokeStyle = T.accentA;
    ctx.lineWidth = 3;
    ctx.strokeRect(W * 0.27, H * 0.37, W * 0.46, H * 0.46);
    ctx.lineWidth = 1;
    ctx.strokeRect(W * 0.29, H * 0.39, W * 0.42, H * 0.42);
  }
  ctx.restore();
}

function drawOverheadLamp(T) {
  const lx = W / 2, ly = H * 0.1;
  // Lamp cord
  ctx.strokeStyle = T.accentA;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, ly); ctx.stroke();

  // Lamp shade (pixel style)
  ctx.fillStyle = T.accentB;
  ctx.beginPath();
  ctx.moveTo(lx - 24, ly); ctx.lineTo(lx + 24, ly);
  ctx.lineTo(lx + 16, ly + 18); ctx.lineTo(lx - 16, ly + 18);
  ctx.closePath(); ctx.fill();

  // Lamp glow
  const grd = ctx.createRadialGradient(lx, ly + 20, 2, lx, ly + 20, 100);
  grd.addColorStop(0, T.lampColor + 'aa');
  grd.addColorStop(1, T.lampColor + '00');
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(lx, ly + 20, 100, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawAmbientLight(T) {
  const grd = ctx.createRadialGradient(W / 2, H * 0.6, 0, W / 2, H * 0.6, W * 0.7);
  grd.addColorStop(0, T.ambientLight);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);
}

// ─── DISPLAY CASES (left wall area of back wall) ───
function drawDisplayCases(T) {
  const cards = IS_NPC ? npcCards : collection;
  const maxShow = 6;
  const show = cards.slice(0, maxShow);

  const startX = W * 0.27, startY = H * 0.42;
  const cols = 3, rows = 2;
  const cw = 58, ch = 72, gapX = 10, gapY = 10;

  clickableZones = [];

  if (show.length === 0) {
    // "Win cards" prompt
    ctx.save();
    ctx.fillStyle = T.accentA + '44';
    ctx.strokeStyle = T.accentA;
    ctx.lineWidth = 1;
    const pw = 230, ph = 50;
    const px = W * 0.27, py = H * 0.44;
    ctx.fillRect(px, py, pw, ph);
    ctx.strokeRect(px, py, pw, ph);
    ctx.fillStyle = T.accentC;
    ctx.font = '11px Courier New';
    ctx.fillText('Win cards in the Claw Machine! →', px + 10, py + 20);
    ctx.fillStyle = T.accentA + '88';
    ctx.font = '10px Courier New';
    ctx.fillText('[ Play claw.html to start your collection ]', px + 10, py + 38);
    ctx.restore();
    return;
  }

  for (let i = 0; i < show.length; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const cx = startX + col * (cw + gapX);
    const cy = startY + row * (ch + gapY);
    const card = show[i];
    const rarity = getRarity(card.title || card.name || '');
    const rc = RARITY_COLORS[rarity] || RARITY_COLORS.default;

    // Frame shadow
    ctx.save();
    ctx.shadowColor = rc.border;
    ctx.shadowBlur = rarity === 'legendary' || rarity === 'secret rare' ? 12 : 4;

    // Card frame
    ctx.fillStyle = rc.bg;
    ctx.strokeStyle = rc.border;
    ctx.lineWidth = 2;
    ctx.fillRect(cx, cy, cw, ch);
    ctx.strokeRect(cx, cy, cw, ch);

    // Card inner art (mini pixelart)
    if (card.imageSm || card.image) {
      // Draw placeholder colored block
      ctx.fillStyle = rc.border + '33';
      ctx.fillRect(cx + 3, cy + 3, cw - 6, ch - 18);
      // Pixel dot art simulation
      for (let pi = 0; pi < 4; pi++) {
        for (let pj = 0; pj < 5; pj++) {
          const hash = (pi * 7 + pj * 13 + i * 31) % 16;
          if (hash > 6) {
            ctx.fillStyle = rc.border + 'aa';
            ctx.fillRect(cx + 3 + pi * 12, cy + 3 + pj * 10, 10, 8);
          }
        }
      }
    }

    // Card name (tiny)
    ctx.fillStyle = rc.text;
    ctx.font = '7px Courier New';
    ctx.textAlign = 'center';
    const shortName = (card.title || card.name || 'Card').substring(0, 10);
    ctx.fillText(shortName, cx + cw / 2, cy + ch - 5);
    ctx.textAlign = 'left';

    ctx.restore();

    // Store clickable zone
    clickableZones.push({ x: cx, y: cy, w: cw, h: ch, card, rarity });
  }
}

// ─── CLAW MACHINE (right side of room) ───
function drawClawMachine(T) {
  const mx = W * 0.62, my = H * 0.38;
  const mw = 90, mh = 120;

  ctx.save();

  // Machine body
  const machGrad = ctx.createLinearGradient(mx, my, mx + mw, my + mh);
  machGrad.addColorStop(0, T.accentB + 'dd');
  machGrad.addColorStop(1, T.accentA + '88');
  ctx.fillStyle = machGrad;
  ctx.strokeStyle = T.accentA;
  ctx.lineWidth = 2;
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeRect(mx, my, mw, mh);

  // Glass window
  ctx.fillStyle = T.accentA + '22';
  ctx.strokeStyle = T.accentC + '88';
  ctx.lineWidth = 1;
  ctx.fillRect(mx + 6, my + 16, mw - 12, mh * 0.55);
  ctx.strokeRect(mx + 6, my + 16, mw - 12, mh * 0.55);

  // Prize balls inside
  const ballColors = [T.accentA, T.accentB, T.accentC, '#ff6ec7', '#00ffcc'];
  const seenStock = (IS_NPC ? npcCards : collection).length;
  const ballCount = Math.min(seenStock + 3, 8);
  for (let b = 0; b < ballCount; b++) {
    const bx = mx + 10 + (b % 4) * 17;
    const by = my + mh * 0.45 + Math.floor(b / 4) * 14;
    const br = 6;
    ctx.fillStyle = ballColors[b % ballColors.length];
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Claw arm (dangling)
  const clawX = mx + mw / 2, clawTopY = my + 16;
  ctx.strokeStyle = T.accentC;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(clawX, clawTopY); ctx.lineTo(clawX, clawTopY + 22); ctx.stroke();
  // Claw prongs
  ctx.beginPath();
  ctx.moveTo(clawX, clawTopY + 22); ctx.lineTo(clawX - 7, clawTopY + 32);
  ctx.moveTo(clawX, clawTopY + 22); ctx.lineTo(clawX, clawTopY + 32);
  ctx.moveTo(clawX, clawTopY + 22); ctx.lineTo(clawX + 7, clawTopY + 32);
  ctx.stroke();

  // Machine label
  ctx.fillStyle = T.accentA;
  ctx.font = 'bold 8px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('CLAW', mx + mw / 2, my + 11);
  ctx.fillText('VAULT', mx + mw / 2, my + mh - 5);
  ctx.textAlign = 'left';

  // Coin slot
  ctx.fillStyle = T.accentB;
  ctx.fillRect(mx + mw - 14, my + mh * 0.7, 8, 3);

  ctx.restore();
}

// ─── THEME CONTROL ───
function setTheme(t) {
  currentTheme = t;
  LS.set('echovault_plot_theme', t);
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === t);
  });
  drawRoom();
}

// ─── CANVAS CLICK ───
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  for (const zone of clickableZones) {
    if (mx >= zone.x && mx <= zone.x + zone.w && my >= zone.y && my <= zone.y + zone.h) {
      openCardModal(zone.card, zone.rarity);
      return;
    }
  }
  // Check claw machine zone
  if (mx >= W * 0.62 && mx <= W * 0.62 + 90 && my >= H * 0.38 && my <= H * 0.38 + 120) {
    location.href = 'claw.html';
  }
});

// ─── CARD MODAL ───
function openCardModal(card, rarity) {
  const rc = RARITY_COLORS[rarity] || RARITY_COLORS.default;
  document.getElementById('modalName').textContent = card.title || card.name || 'Unknown Card';
  document.getElementById('modalGame').textContent = card.game || inferGame(card.title || '');
  const rb = document.getElementById('modalRarity');
  rb.textContent = rarity.toUpperCase();
  rb.style.background = rc.bg;
  rb.style.border = '1px solid ' + rc.border;
  rb.style.color = rc.text;
  const img = document.getElementById('modalImg');
  if (card.imageSm || card.image) {
    img.src = card.imageSm || card.image;
    img.style.display = 'block';
  } else {
    img.style.display = 'none';
  }
  const listing = shopListings[card.title || card.name];
  const priceEl = document.getElementById('modalPrice');
  if (listing && listing.forSale) {
    priceEl.textContent = '◈ ' + listing.price + ' (For Sale)';
  } else {
    priceEl.textContent = '';
  }
  document.getElementById('cardModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('cardModal').classList.add('hidden');
}
document.getElementById('cardModal').addEventListener('click', e => {
  if (e.target === document.getElementById('cardModal')) closeModal();
});

function inferGame(title) {
  const t = title.toLowerCase();
  if (t.includes('yu-gi-oh') || t.includes('yugioh') || t.includes('yu gi oh')) return 'Yu-Gi-Oh!';
  if (t.includes('pokemon') || t.includes('pokémon')) return 'Pokémon TCG';
  if (t.includes('magic') || t.includes('mtg')) return 'Magic: The Gathering';
  return 'Trading Card Game';
}

// ─── SHOP NAME ───
function saveShopName() {
  const val = document.getElementById('shopNameInput').value.trim();
  if (!val) return;
  shopName = val;
  localStorage.setItem('echovault_plot_shopname', val);
  updateNavName();
}

function focusNameEdit() {
  document.getElementById('shopNameInput').focus();
  document.getElementById('shopNameInput').select();
}

function updateNavName() {
  document.getElementById('navShopName').textContent = shopName;
  document.getElementById('bcShop').textContent = shopName;
  document.title = shopName + ' — Echo\'s Vault';
}

// ─── SHARE ───
function shareShop() {
  const slug = shopName.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  const url = 'vault.gg/' + slug;
  alert('🔗 Share your shop:\n\nhttps://' + url + '\n\n(cosmetic preview — launching soon!)');
}

// ─── SHELF UI ───
function renderShelf() {
  const cards = IS_NPC ? npcCards : collection;
  const el = document.getElementById('shelfItems');
  if (!cards || cards.length === 0) {
    el.innerHTML = '<div class="shelf-empty">No cards yet! <a href="claw.html">Play the Claw Machine →</a></div>';
    return;
  }
  el.innerHTML = '';
  cards.forEach((card, idx) => {
    const key = card.title || card.name || `card_${idx}`;
    const listing = shopListings[key] || { forSale: false, price: 10 };
    const div = document.createElement('div');
    div.className = 'shelf-card';
    const shortName = (card.title || card.name || 'Card').substring(0, 24);
    div.innerHTML = `
      <div class="card-name" title="${card.title || card.name || ''}">${shortName}</div>
      <label class="for-sale-toggle">
        <input type="checkbox" ${listing.forSale ? 'checked' : ''} onchange="toggleSale(${idx}, this.checked)"> For Sale
      </label>
      ${listing.forSale ? `<div style="margin-top:4px"><input class="price-input" type="number" min="1" max="9999" value="${listing.price}" onchange="setPrice(${idx}, this.value)" title="Price in ◈"> ◈</div>` : ''}
      ${listing.forSale ? `<div class="card-price">◈ ${listing.price}</div>` : ''}
    `;
    el.appendChild(div);
  });
  updateStats();
}

function toggleSale(idx, checked) {
  const cards = IS_NPC ? npcCards : collection;
  const card = cards[idx];
  const key = card.title || card.name || `card_${idx}`;
  if (!shopListings[key]) shopListings[key] = { forSale: false, price: 10 };
  shopListings[key].forSale = checked;
  LS.set('echovault_shop_listings', shopListings);
  renderShelf();
}

function setPrice(idx, val) {
  const cards = IS_NPC ? npcCards : collection;
  const card = cards[idx];
  const key = card.title || card.name || `card_${idx}`;
  if (!shopListings[key]) shopListings[key] = { forSale: true, price: 10 };
  shopListings[key].price = parseInt(val) || 10;
  LS.set('echovault_shop_listings', shopListings);
}

// ─── STATS ───
function updateStats() {
  const cards = IS_NPC ? npcCards : collection;
  document.getElementById('statCards').textContent = cards.length;
  const listed = Object.values(shopListings).filter(l => l.forSale).length;
  document.getElementById('statListed').textContent = listed;
  document.getElementById('statVisitors').textContent = (Math.floor(Math.random() * 39) + 12) + ' today';
}

function updateMachineStats() {
  const tokenData = LS.get('echovault_claw_tokens');
  const plays = LS.get('echovault_claw_stats') || {};
  document.getElementById('machPlays').textContent = plays.totalPlays || 0;
  document.getElementById('machWon').textContent = plays.totalWon || (collection ? collection.length : 0);
  document.getElementById('machStock').textContent = collection ? collection.length + ' cards' : '—';
}

// ─── NPC MODE ───
async function initNpcMode() {
  const id = parseInt(NPC_SHOP_ID);
  const generatedName = npcName(id);
  shopName = generatedName;
  document.getElementById('navShopName').textContent = generatedName;
  document.getElementById('bcShop').textContent = 'Shop #' + id;
  document.getElementById('breadcrumb').innerHTML =
    'Districts &gt; <span>' + NPC_DISTRICT.charAt(0).toUpperCase() + NPC_DISTRICT.slice(1) + ' Quarter</span> &gt; <span>Shop #' + id + '</span>';
  document.title = generatedName + ' — Echo\'s Vault';
  document.getElementById('npcBackBar').style.display = 'block';
  document.getElementById('themePicker').style.display = 'none';
  document.querySelector('.side-panel').style.display = 'none';

  try {
    const res = await fetch('seen.json');
    const seenData = await res.json();
    let all = Object.values(seenData).filter(e => e.image && e.title);
    // Pick cards "belonging" to this shop via deterministic seeding
    const seed = id * 17;
    npcCards = all.filter((_, i) => ((i + seed) % 5 < 2)).slice(0, 6);
  } catch(e) {
    npcCards = [];
  }

  // Add NPC visit button
  const shelfPanel = document.querySelector('.shelf-panel');
  const visitBtn = document.createElement('a');
  visitBtn.href = 'claw.html?npcShop=' + id + '&district=' + NPC_DISTRICT;
  visitBtn.className = 'npc-visit-btn';
  visitBtn.textContent = '🎰 Visit their Claw Machine';
  shelfPanel.appendChild(visitBtn);
}

// ─── BOOT ───
function init() {
  // Set active theme btn
  document.querySelectorAll('.theme-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === currentTheme);
  });

  // Shop name
  document.getElementById('shopNameInput').value = shopName;
  updateNavName();

  // Update breadcrumb for district if available
  const district = NPC_DISTRICT || 'My Quarter';
  document.getElementById('breadcrumb').innerHTML =
    'Districts &gt; <span>' + district.charAt(0).toUpperCase() + district.slice(1) + ' Quarter</span> &gt; <span id="bcShop">' + shopName + '</span>';

  // Machine stats
  updateMachineStats();

  if (IS_NPC) {
    initNpcMode().then(() => {
      drawRoom();
      renderShelf();
      updateStats();
    });
  } else {
    drawRoom();
    renderShelf();
    updateStats();
  }
}

// Canvas resize
function resizeCanvas() {
  const maxW = Math.min(W, window.innerWidth - 280 - 48);
  const scale = maxW / W;
  canvas.style.width = (W * Math.min(1, scale)) + 'px';
  canvas.style.height = (H * Math.min(1, scale)) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

document.addEventListener('DOMContentLoaded', init);
</script>
