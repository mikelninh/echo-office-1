<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Echo's Vault — The Claw</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#e0e0f0;font-family:'JetBrains Mono',monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;touch-action:none}
canvas{display:block;image-rendering:auto;border-radius:8px;max-width:100vw;max-height:90vh}
.hud{position:fixed;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
.hud-left,.hud-right{pointer-events:auto}
.hud-title{font-family:'Press Start 2P',cursive;font-size:11px;background:linear-gradient(135deg,#ff6ec7,#b388ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hud-sub{font-size:10px;color:#6a6a8a;margin-top:2px}
.hud-stat{font-size:11px;text-align:right;margin-bottom:4px}
.hud-stat span{color:#ffd700;font-weight:700}
.pity-bar{width:120px;height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden;margin-top:4px}
.pity-fill{height:100%;background:linear-gradient(90deg,#ff6ec7,#ffd700);border-radius:4px;transition:width 0.3s}
.controls-hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:10px;color:#6a6a8a;text-align:center;pointer-events:none;z-index:10}
.back-link{position:fixed;bottom:12px;right:12px;font-size:10px;color:#ff6ec7;text-decoration:none;z-index:10}
.grab-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Press Start 2P',cursive;font-size:20px;color:#ffd700;text-shadow:0 0 20px #ffd700,0 0 40px #ff6ec7;pointer-events:none;z-index:20;opacity:0;transition:opacity 0.3s}
.grab-msg.show{opacity:1}
.mega-flash{position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle,rgba(255,215,0,0.3),transparent);pointer-events:none;z-index:15;opacity:0;transition:opacity 0.5s}
.mega-flash.show{opacity:1}
</style>
</head>
<body>

<div class="hud">
  <div class="hud-left">
    <div class="hud-title">THE CLAW</div>
    <div class="hud-sub">Echo's Vault</div>
  </div>
  <div class="hud-right">
    <div class="hud-stat">Plays: <span id="playCount">0</span></div>
    <div class="hud-stat">Won: <span id="wonCount">0</span></div>
    <div class="hud-stat">Strength: <span id="clawPower">???</span></div>
    <div class="hud-stat" style="font-size:9px;color:#6a6a8a">Mega Claw in <span id="megaIn">50</span></div>
    <div class="pity-bar"><div class="pity-fill" id="pityFill" style="width:0%"></div></div>
  </div>
</div>

<div class="grab-msg" id="grabMsg"></div>
<div class="mega-flash" id="megaFlash"></div>

<canvas id="game"></canvas>

<div class="controls-hint" id="controlsHint">← → / WASD Move · SPACE Drop · R Reset</div>
<a href="dashboard.html" class="back-link">← Dashboard</a>

<script>
// ═══ CLAW MACHINE — POLISHED ═══
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const W = 600, H = 700;
canvas.width = W; canvas.height = H;

function resizeCanvas() {
  const scale = Math.min(window.innerWidth / W, (window.innerHeight - 60) / H, 1.5);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ═══ AUDIO ═══
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let ambientStarted = false;
let ambientGain = null;

function playSound(freq, duration, type='sine', vol=0.15) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + duration);
}

function startAmbientHum() {
  if (ambientStarted) return;
  ambientStarted = true;
  ambientGain = audioCtx.createGain();
  ambientGain.gain.value = 0.02;
  ambientGain.connect(audioCtx.destination);
  const o1 = audioCtx.createOscillator();
  o1.type = 'sine'; o1.frequency.value = 55;
  o1.connect(ambientGain); o1.start();
  const o2 = audioCtx.createOscillator();
  o2.type = 'sine'; o2.frequency.value = 82.5;
  const g2 = audioCtx.createGain(); g2.gain.value = 0.5;
  o2.connect(g2); g2.connect(ambientGain); o2.start();
}

function sndMove() { playSound(200, 0.05, 'square', 0.04); }
function sndDrop() { playSound(150, 0.3, 'sawtooth', 0.1); }
function sndGrip() { playSound(400, 0.15, 'square', 0.12); }
function sndThud() { playSound(80, 0.15, 'triangle', 0.15); }

function sndLiftNote(progress) {
  const freq = 300 + progress * 500;
  playSound(freq, 0.12, 'sine', 0.06);
}

function sndSlipSad() {
  [400,350,280,200].forEach((f,i) => setTimeout(() => playSound(f, 0.2, 'sawtooth', 0.08), i*80));
}

function sndWinCommon() { playSound(880, 0.2, 'sine', 0.15); }
function sndWinRare() {
  [523,659,784].forEach((f,i) => setTimeout(() => playSound(f, 0.2, 'sine', 0.15), i*100));
}
function sndWinSuper() {
  [523,659,784,1047,784].forEach((f,i) => setTimeout(() => playSound(f, 0.25, 'sine', 0.18), i*100));
}
function sndWinUltra() {
  [262,330,392,523,659,784,1047].forEach((f,i) => setTimeout(() => {
    playSound(f, 0.3, 'sine', 0.2);
    playSound(f*1.5, 0.2, 'triangle', 0.08);
  }, i*90));
}
function sndWinLegendary() {
  const notes = [262,330,392,523,659,784,1047,1319,1568,1047,1319,1568];
  notes.forEach((f,i) => setTimeout(() => {
    playSound(f, 0.35, 'sine', 0.22);
    playSound(f*0.5, 0.3, 'triangle', 0.1);
    if (i > 6) playSound(f*2, 0.15, 'square', 0.05);
  }, i*110));
  setTimeout(() => { playSound(2093, 0.8, 'sine', 0.25); playSound(1047, 0.8, 'triangle', 0.15); }, 1400);
}
function sndMega() {
  [262,330,392,523,659,784,1047,1319].forEach((f,i) => setTimeout(() => playSound(f, 0.3, 'sine', 0.2), i*80));
}
function sndMiss() { playSound(200, 0.4, 'sawtooth', 0.08); }

function playWinSound(rarity) {
  if (rarity === 'legendary') sndWinLegendary();
  else if (rarity === 'ultra') sndWinUltra();
  else if (rarity === 'super') sndWinSuper();
  else if (rarity === 'rare') sndWinRare();
  else sndWinCommon();
}

// ═══ GAME STATE ═══
const MACHINE = { x: 50, y: 80, w: 500, h: 540, floorY: 560, chuteX: 480, chuteW: 60 };
const RAIL_Y = 115;
const DROP_SPEED = 3;
const LIFT_SPEED = 2;
const GRAVITY = 0.15;

let state = 'idle';
let clawX = W / 2, clawY = RAIL_Y;
let clawVelX = 0; // for smooth acceleration
const CLAW_ACCEL = 0.5, CLAW_MAX_SPEED = 5, CLAW_FRICTION = 0.85;
let clawOpen = 1;
let clawStrength = 0;
let isMega = false;
let heldPrize = null, heldOffsetX = 0, heldOffsetY = 0;
let slipTimer = 0;
let plays = 0, wins = 0;
let moveDir = 0;
let msgTimer = 0, msgText = '';
let shakeTimer = 0, shakeIntensity = 0;
let particles = [];
let frameTime = Date.now();
let slowMoTimer = 0; // frames of slow-mo remaining
let slowMoFactor = 1;
let liftNoteTimer = 0;
let screenFlashColor = null, screenFlashAlpha = 0;

// Pendulum swing for claw
let clawSwingAngle = 0, clawSwingVel = 0;
const SWING_DAMPING = 0.92, SWING_STRENGTH = 0.003;

// Collection shelf — last 5 won cards
let collection = [];

// Near-miss text
let nearMissText = '', nearMissTimer = 0, nearMissColor = '#ff5252';

// Win animation: card flying to shelf
let flyingCards = [];

// ═══ PRIZES ═══
const RARITY_COLORS = {
  common:    { bg:'#1e2d4d', border:'#3a5a8a', label:'#7aabf0', glow:null,      particle:'#7aabf0' },
  rare:      { bg:'#1e3d1e', border:'#3a8a3a', label:'#4ade80', glow:null,      particle:'#4ade80' },
  super:     { bg:'#3a2a5a', border:'#8a3a9a', label:'#c084fc', glow:'#c084fc', particle:'#c084fc' },
  ultra:     { bg:'#4a3a0a', border:'#daa520', label:'#ffd700', glow:'#ffd700', particle:'#ffd700' },
  legendary: { bg:'#4a0a0a', border:'#ff4444', label:'#ff6ec7', glow:'#ff6ec7', particle:'#ff6ec7' },
};

const CARD_NAMES = {
  yugioh:  ['Blue-Eyes White Dragon','Dark Magician','Exodia Head','Red-Eyes B. Dragon','Pot of Greed'],
  pokemon: ['Charizard 1st Ed','Pikachu Illustrator','Shadowless Zard','Gold Star Rayquaza','Shining Mewtwo'],
  dandadan: ['Okarun SR','Momo Ayase','Turbo Granny','Seiko SP','Jiji & Okarun'],
  onepiece: ['Luffy Manga Alt','Shanks SP','Zoro Alt Art','Nami Romance','Gear 5 Luffy'],
  lorcana: ['Elsa D23 Promo','Mickey Sorcerer','Stitch Holo','Belle Enchanted','Maleficent SR'],
};
const GAME_EMOJI = { yugioh:'👑', pokemon:'⚡', dandadan:'👁', onepiece:'🏴', lorcana:'✨' };

let prizes = [];

function makePrize(x, y) {
  const rng = Math.random();
  let rarity, weight;
  if (rng < 0.35) { rarity='common'; weight=1; }
  else if (rng < 0.60) { rarity='rare'; weight=1.5; }
  else if (rng < 0.80) { rarity='super'; weight=2; }
  else if (rng < 0.95) { rarity='ultra'; weight=3; }
  else { rarity='legendary'; weight=5; }
  const gk = Object.keys(CARD_NAMES);
  const game = gk[Math.floor(Math.random()*gk.length)];
  const name = CARD_NAMES[game][Math.floor(Math.random()*CARD_NAMES[game].length)];
  return {
    x, y, w: 50+Math.random()*15, h: 65+Math.random()*10,
    vx: (Math.random()-0.5)*1.5, vy: 0,
    rotation: (Math.random()-0.5)*0.4,
    rarity, weight, game, name, grounded: false,
  };
}

function spawnPrizes() {
  prizes = [];
  const count = 8 + Math.floor(Math.random()*5);
  for (let i = 0; i < count; i++) {
    const px = MACHINE.x + 40 + Math.random()*(MACHINE.w - 140);
    // Start from the top — stagger vertically so they fall and pile up
    const py = MACHINE.y + 20 + Math.random()*60 - i*15;
    const p = makePrize(px, py);
    p.vy = 1 + Math.random()*2; // falling velocity
    prizes.push(p);
  }
}
spawnPrizes();

// ═══ PHYSICS ═══
function updatePhysics() {
  const grav = GRAVITY * slowMoFactor;
  for (const p of prizes) {
    if (p === heldPrize) continue;
    p.vy += grav;
    p.x += p.vx * slowMoFactor;
    p.y += p.vy * slowMoFactor;
    if (p.y + p.h > MACHINE.floorY) {
      p.y = MACHINE.floorY - p.h;
      if (Math.abs(p.vy) > 1.5) sndThud();
      p.vy *= -0.3;
      if (Math.abs(p.vy) < 0.5) { p.vy = 0; p.grounded = true; }
      p.vx *= 0.8;
    }
    if (p.x < MACHINE.x + 10) { p.x = MACHINE.x + 10; p.vx *= -0.5; }
    if (p.x + p.w > MACHINE.x + MACHINE.w - 10) { p.x = MACHINE.x + MACHINE.w - 10 - p.w; p.vx *= -0.5; }
    // prize-to-prize
    for (const q of prizes) {
      if (q === p || q === heldPrize) continue;
      const ox = Math.min(p.x+p.w,q.x+q.w)-Math.max(p.x,q.x);
      const oy = Math.min(p.y+p.h,q.y+q.h)-Math.max(p.y,q.y);
      if (ox > 0 && oy > 0) {
        const push = ox*0.3;
        if (p.x < q.x) { p.vx -= push*0.1; q.vx += push*0.1; }
        else { p.vx += push*0.1; q.vx -= push*0.1; }
        if (oy < ox) {
          if (p.y < q.y) { p.y -= oy*0.5; q.y += oy*0.5; }
          else { p.y += oy*0.5; q.y -= oy*0.5; }
        }
      }
    }
    p.vx *= 0.98;
    p.rotation += p.vx * 0.01;
  }
}

// ═══ CLAW LOGIC ═══
function rollStrength() {
  if (isMega) return 1.0;
  const pityBonus = Math.min(plays % 50, 40) * 0.012;
  return Math.min(0.25 + Math.random()*0.5 + pityBonus, 0.95);
}

function updateClawPowerDisplay() {
  const el = document.getElementById('clawPower');
  if (isMega) { el.textContent='★ MEGA ★'; el.style.color='#ffd700'; }
  else if (clawStrength > 0.7) { el.textContent='■■■ Strong'; el.style.color='#00e676'; }
  else if (clawStrength > 0.4) { el.textContent='■■□ Medium'; el.style.color='#ffab40'; }
  else { el.textContent='■□□ Weak'; el.style.color='#ff5252'; }
}

function startDrop() {
  if (state !== 'idle') return;
  audioCtx.resume(); startAmbientHum();
  plays++;
  const megaAt = 50;
  isMega = (plays % megaAt === 0);
  if (isMega) {
    sndMega();
    document.getElementById('megaFlash').classList.add('show');
    setTimeout(() => document.getElementById('megaFlash').classList.remove('show'), 1500);
    showMsg('★ MEGA CLAW ★', 2000);
    shakeTimer = 30; shakeIntensity = 4;
  }
  clawStrength = rollStrength();
  updateClawPowerDisplay();
  document.getElementById('playCount').textContent = plays;
  const pityPct = ((plays % megaAt)/megaAt)*100;
  document.getElementById('pityFill').style.width = pityPct+'%';
  document.getElementById('megaIn').textContent = megaAt - (plays % megaAt);
  state = 'dropping'; clawOpen = 1;
  sndDrop();
}

function findPrizeUnderClaw() {
  const cx = clawX, cy = clawY + 40;
  let best = null, bestDist = 999;
  for (const p of prizes) {
    if (cx > p.x-5 && cx < p.x+p.w+5 && cy > p.y-10 && cy < p.y+p.h+10) {
      const d = Math.abs(cx-(p.x+p.w/2));
      if (d < bestDist) { bestDist=d; best=p; }
    }
  }
  return best;
}

function showMsg(text, dur=1500) {
  msgText=text; msgTimer=dur;
  const el = document.getElementById('grabMsg');
  el.textContent=text; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function spawnParticles(x, y, color, count=15) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx:(Math.random()-0.5)*6, vy:(Math.random()-0.5)*6-2,
      life:40+Math.random()*20, maxLife:60, size:2+Math.random()*3, color,
    });
  }
}

function spawnBurstParticles(x, y, color, count=40) {
  for (let i = 0; i < count; i++) {
    const ang = (i/count)*Math.PI*2;
    const spd = 2+Math.random()*5;
    particles.push({
      x, y, vx:Math.cos(ang)*spd, vy:Math.sin(ang)*spd-1,
      life:50+Math.random()*30, maxLife:80, size:2+Math.random()*4, color,
    });
  }
}

function triggerNearMiss() {
  slowMoTimer = 30; // ~0.5 seconds of slow-mo
  nearMissText = 'ALMOST!'; nearMissTimer = 90; nearMissColor = '#ff5252';
  shakeTimer = 20; shakeIntensity = 6;
  // Red particles shower
  for (let i = 0; i < 25; i++) {
    particles.push({
      x: MACHINE.x + Math.random()*MACHINE.w, y: MACHINE.y + 40,
      vx:(Math.random()-0.5)*3, vy:1+Math.random()*3,
      life:40+Math.random()*20, maxLife:60, size:2+Math.random()*3, color:'#ff3333',
    });
  }
  sndSlipSad();
}

function triggerWin(prize) {
  wins++;
  document.getElementById('wonCount').textContent = wins;
  const rc = RARITY_COLORS[prize.rarity];
  const msgs = {
    legendary:'★ LEGENDARY! ★', ultra:'✦ ULTRA RARE! ✦',
    super:'◆ SUPER RARE!', rare:'● RARE!', common:'Got it!',
  };
  showMsg(msgs[prize.rarity], 2500);

  // Big burst
  const burstCount = prize.rarity==='legendary'?60 : prize.rarity==='ultra'?45 : prize.rarity==='super'?30 : 20;
  spawnBurstParticles(clawX, clawY+60, rc.particle, burstCount);

  // Screen flash
  screenFlashColor = rc.particle; screenFlashAlpha = prize.rarity==='legendary'?0.5 : prize.rarity==='ultra'?0.35 : 0.2;
  shakeTimer = prize.rarity==='legendary'?25 : 12; shakeIntensity = prize.rarity==='legendary'?6:3;

  playWinSound(prize.rarity);

  // Flying card to collection
  flyingCards.push({
    x: clawX, y: clawY+40,
    targetX: 18, targetY: H-90,
    progress: 0, speed: 0.025,
    rarity: prize.rarity, game: prize.game, name: prize.name, emoji: GAME_EMOJI[prize.game],
  });

  // Add to collection
  collection.unshift({ rarity:prize.rarity, game:prize.game, name:prize.name, emoji:GAME_EMOJI[prize.game] });
  if (collection.length > 5) collection.pop();

  // Remove from play area
  const idx = prizes.indexOf(prize);
  if (idx > -1) prizes.splice(idx, 1);
  heldPrize = null;

  // Refill if low
  if (prizes.length < 5) {
    for (let i = 0; i < 4; i++) {
      setTimeout(() => {
        const p = makePrize(MACHINE.x+60+Math.random()*(MACHINE.w-180), MACHINE.y+20);
        p.vy = 2; prizes.push(p); sndThud();
      }, 500+i*300);
    }
  }
}

// ═══ UPDATE ═══
function update() {
  // Slow-mo
  if (slowMoTimer > 0) { slowMoTimer--; slowMoFactor = 0.3; }
  else { slowMoFactor = 1; }

  // Near-miss text fade
  if (nearMissTimer > 0) nearMissTimer--;

  // Screen flash fade
  if (screenFlashAlpha > 0) screenFlashAlpha = Math.max(0, screenFlashAlpha - 0.015);

  // Claw movement with acceleration
  if (state === 'idle') {
    clawVelX += moveDir * CLAW_ACCEL;
    if (moveDir === 0) clawVelX *= CLAW_FRICTION;
    clawVelX = Math.max(-CLAW_MAX_SPEED, Math.min(CLAW_MAX_SPEED, clawVelX));
    clawX += clawVelX;
    clawX = Math.max(MACHINE.x+40, Math.min(MACHINE.x+MACHINE.w-40, clawX));
    if (Math.abs(clawVelX) > 0.3) sndMove();
  }

  // Pendulum swing
  const accelForce = (state==='idle') ? clawVelX * SWING_STRENGTH : 0;
  clawSwingVel += accelForce;
  clawSwingVel -= clawSwingAngle * 0.05; // spring back
  clawSwingVel *= SWING_DAMPING;
  clawSwingAngle += clawSwingVel;
  clawSwingAngle = Math.max(-0.4, Math.min(0.4, clawSwingAngle));

  // Drop
  if (state === 'dropping') {
    clawY += DROP_SPEED * slowMoFactor;
    const prize = findPrizeUnderClaw();
    if (prize && clawY+40 >= prize.y) {
      state = 'gripping'; clawOpen = 0; sndGrip();
      heldPrize = prize;
      heldOffsetX = clawX-(prize.x+prize.w/2);
      heldOffsetY = clawY+40-prize.y;
      slipTimer = 0;
      setTimeout(() => { if (state==='gripping') state='lifting'; }, 300);
    } else if (clawY+40 >= MACHINE.floorY-10) {
      state = 'gripping'; clawOpen = 0; sndGrip();
      setTimeout(() => { if (state==='gripping') state='lifting'; }, 300);
    }
  }

  // Lifting
  if (state === 'lifting') {
    clawY -= LIFT_SPEED * slowMoFactor;
    // Tension build: ascending notes
    liftNoteTimer++;
    if (liftNoteTimer % 12 === 0 && heldPrize) {
      const progress = 1 - (clawY - RAIL_Y) / (MACHINE.floorY - RAIL_Y);
      sndLiftNote(Math.max(0, progress));
    }

    if (heldPrize) {
      heldPrize.x = clawX-heldPrize.w/2-heldOffsetX;
      heldPrize.y = clawY+40-heldOffsetY;
      heldPrize.vy = 0; heldPrize.vx = 0;
      slipTimer++;
      const slipChance = (heldPrize.weight*0.008)*(1-clawStrength);
      if (!isMega && Math.random() < slipChance && slipTimer > 20) {
        heldPrize.vy = 1; heldPrize.vx = (Math.random()-0.5)*2;
        const nearChute = Math.abs(heldPrize.x-MACHINE.chuteX)<80;
        if (nearChute && clawY < RAIL_Y+100) {
          triggerNearMiss();
        } else {
          showMsg('Slipped!', 1000); sndMiss();
        }
        spawnParticles(heldPrize.x+heldPrize.w/2, heldPrize.y, '#ff5252', 10);
        heldPrize = null; state = 'returning_empty';
      }
    }
    if (clawY <= RAIL_Y) {
      clawY = RAIL_Y; liftNoteTimer = 0;
      state = heldPrize ? 'returning' : 'returning_empty';
    }
  }

  // Returning to chute
  if (state === 'returning') {
    const targetX = MACHINE.x + MACHINE.chuteX;
    const dx = targetX - clawX;
    const spd = Math.min(Math.abs(dx), CLAW_MAX_SPEED) * slowMoFactor;
    clawX += Math.sign(dx) * spd;
    // Update pendulum from horizontal movement
    clawSwingVel += Math.sign(dx) * 0.002;

    if (heldPrize) {
      heldPrize.x = clawX-heldPrize.w/2-heldOffsetX;
      heldPrize.y = clawY+40-heldOffsetY;
      slipTimer++;
      const slipChance = (heldPrize.weight*0.004)*(1-clawStrength);
      if (!isMega && Math.random() < slipChance && slipTimer > 40) {
        heldPrize.vy = 1; heldPrize.vx = (Math.random()-0.5)*3;
        triggerNearMiss();
        spawnParticles(heldPrize.x+heldPrize.w/2, heldPrize.y, '#ff5252', 15);
        heldPrize = null; state = 'returning_empty';
      }
    }
    if (Math.abs(dx) < 3 && heldPrize) {
      triggerWin(heldPrize);
      state = 'returning_empty';
    }
  }

  // Returning empty
  if (state === 'returning_empty') {
    clawY -= LIFT_SPEED;
    if (clawY <= RAIL_Y) { clawY = RAIL_Y; clawOpen = 1; state = 'idle'; isMega = false; }
  }

  updatePhysics();

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx * slowMoFactor; p.y += p.vy * slowMoFactor;
    p.vy += 0.1; p.life--; return p.life > 0;
  });

  // Flying cards
  flyingCards = flyingCards.filter(fc => {
    fc.progress += fc.speed;
    fc.x += (fc.targetX - fc.x) * 0.06;
    fc.y += (fc.targetY - fc.y) * 0.06;
    return fc.progress < 1;
  });

  if (shakeTimer > 0) shakeTimer--;
}

// ═══ RENDER ═══
function render() {
  const now = Date.now();
  ctx.clearRect(0, 0, W, H);
  const shake = shakeTimer > 0 ? (Math.random()-0.5)*shakeIntensity*(shakeTimer/20) : 0;
  ctx.save();
  ctx.translate(shake, shake*0.5);

  // Background
  const bgGrad = ctx.createLinearGradient(0,0,0,H);
  bgGrad.addColorStop(0,'#0a0a14'); bgGrad.addColorStop(1,'#12121f');
  ctx.fillStyle = bgGrad; ctx.fillRect(0,0,W,H);

  // Machine glow pulse
  const glowPulse = 0.5 + Math.sin(now*0.002)*0.3;
  const machGlow = ctx.createRadialGradient(W/2, H/2-30, 50, W/2, H/2-30, 350);
  machGlow.addColorStop(0, `rgba(180,100,255,${0.04*glowPulse})`);
  machGlow.addColorStop(0.5, `rgba(100,50,180,${0.02*glowPulse})`);
  machGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = machGlow; ctx.fillRect(0,0,W,H);

  drawMachine(now);

  // Drop preview line
  if (state === 'idle') {
    ctx.save();
    ctx.setLineDash([4,6]);
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(clawX, clawY+45);
    ctx.lineTo(clawX, MACHINE.floorY);
    ctx.stroke();
    ctx.restore();
  }

  // Prize shadows on floor
  for (const p of prizes) {
    if (p === heldPrize) continue;
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    const shadowY = MACHINE.floorY + 1;
    const dist = MACHINE.floorY - (p.y+p.h);
    const spread = Math.max(0.6, 1 - dist*0.003);
    ctx.fillRect(p.x + p.w*0.1, shadowY, p.w*0.8*spread, 3);
  }

  // Prizes
  for (const p of prizes) drawPrize(p, now);

  // Claw
  drawClaw(now);

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Chute label
  ctx.fillStyle = '#6a6a8a'; ctx.font = '10px "Press Start 2P"'; ctx.textAlign = 'center';
  ctx.fillText('WIN', MACHINE.x+MACHINE.chuteX+MACHINE.chuteW/2, MACHINE.floorY+28);

  // Near-miss text
  if (nearMissTimer > 0) {
    const alpha = Math.min(1, nearMissTimer/30);
    const scale = 1 + (1-alpha)*0.3;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(W/2, H/2 - 40);
    ctx.scale(scale, scale);
    ctx.font = 'bold 28px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff2222';
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 20;
    ctx.fillText(nearMissText, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Flying cards animation
  for (const fc of flyingCards) {
    const rc = RARITY_COLORS[fc.rarity];
    const s = 1 - fc.progress*0.6;
    ctx.save();
    ctx.globalAlpha = 1-fc.progress;
    ctx.translate(fc.x, fc.y);
    ctx.scale(s, s);
    ctx.fillStyle = rc.bg; ctx.strokeStyle = rc.border; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(-15,-20,30,40,3); ctx.fill(); ctx.stroke();
    ctx.fillStyle = rc.label; ctx.font = '12px serif'; ctx.textAlign = 'center';
    ctx.fillText(fc.emoji||'★', 0, 5);
    ctx.restore();
  }

  // Screen flash
  if (screenFlashAlpha > 0 && screenFlashColor) {
    ctx.fillStyle = screenFlashColor;
    ctx.globalAlpha = screenFlashAlpha;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }

  // Collection shelf
  drawCollection(now);

  ctx.restore();
}

function drawMachine(now) {
  const m = MACHINE;

  // Machine outer frame
  ctx.fillStyle = '#1a1a2e'; ctx.strokeStyle = '#2a2a4a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(m.x-10,m.y-20,m.w+20,m.h+60,12); ctx.fill(); ctx.stroke();

  // Glass area
  ctx.fillStyle = 'rgba(10,10,30,0.7)';
  ctx.fillRect(m.x,m.y,m.w,m.h-20);

  // Glass border
  ctx.strokeStyle = '#3a3a5a'; ctx.lineWidth = 2;
  ctx.strokeRect(m.x,m.y,m.w,m.h-20);

  // Glass reflections — diagonal highlight lines
  ctx.save();
  ctx.beginPath();
  ctx.rect(m.x,m.y,m.w,m.h-20);
  ctx.clip();
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = 20;
  ctx.beginPath();
  ctx.moveTo(m.x-20, m.y+120); ctx.lineTo(m.x+160, m.y-20);
  ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.02)'; ctx.lineWidth = 12;
  ctx.beginPath();
  ctx.moveTo(m.x+200, m.y+m.h); ctx.lineTo(m.x+380, m.y+80);
  ctx.stroke();
  ctx.restore();

  // Rail
  ctx.fillStyle = '#3a3a5a'; ctx.fillRect(m.x,RAIL_Y-4,m.w,8);
  ctx.fillStyle = '#4a4a6a'; ctx.fillRect(m.x,RAIL_Y-2,m.w,4);

  // Floor
  const floorGrad = ctx.createLinearGradient(0,m.floorY-30,0,m.floorY);
  floorGrad.addColorStop(0,'transparent');
  floorGrad.addColorStop(1,'rgba(26,26,46,0.8)');
  ctx.fillStyle = floorGrad; ctx.fillRect(m.x,m.floorY-30,m.w,30);
  ctx.fillStyle = '#2a2a4a'; ctx.fillRect(m.x,m.floorY,m.w,4);

  // Chute
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(m.x+m.chuteX,m.floorY-5,m.chuteW,50);
  ctx.strokeStyle = isMega?'#ffd700':'#4a4a6a'; ctx.lineWidth = 2;
  ctx.strokeRect(m.x+m.chuteX,m.floorY-5,m.chuteW,50);

  // Top lights
  const t = now * 0.003;
  const colors = ['#ff6ec7','#ffd700','#00e676','#448aff','#b388ff','#ff5252','#18ffff','#ffab40'];
  for (let i = 0; i < 8; i++) {
    const lx = m.x+30+i*(m.w-40)/7;
    const brightness = Math.sin(t+i*0.8)*0.5+0.5;
    ctx.fillStyle = colors[i%colors.length];
    ctx.globalAlpha = 0.3+brightness*0.7;
    ctx.beginPath(); ctx.arc(lx,m.y-8,4,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Label
  ctx.fillStyle = '#6a6a8a'; ctx.font = '8px "Press Start 2P"'; ctx.textAlign = 'center';
  ctx.fillText("ECHO'S VAULT", m.x+m.w/2, m.y+m.h+25);
}

function drawPrize(p, now) {
  const rc = RARITY_COLORS[p.rarity];
  ctx.save();
  ctx.translate(p.x+p.w/2, p.y+p.h/2);
  ctx.rotate(p.rotation);

  // Ambient glow for ultra/legendary
  if (p.rarity === 'ultra' || p.rarity === 'legendary') {
    const pulse = 0.5+Math.sin(now*0.004+(p.x*0.1))*0.5;
    const glowSize = 20+pulse*15;
    const glowGrad = ctx.createRadialGradient(0,0,0, 0,0,glowSize);
    glowGrad.addColorStop(0, rc.glow.replace(')', `,${0.25*pulse})`).replace('rgb','rgba'));
    glowGrad.addColorStop(1, 'transparent');
    // Convert hex glow to rgba
    ctx.fillStyle = `rgba(${hexToRgb(rc.glow)},${0.25*pulse})`;
    ctx.beginPath(); ctx.arc(0,0,glowSize,0,Math.PI*2); ctx.fill();
  }

  // Animated shimmer border for ultra/legendary
  if (rc.glow) {
    const shimmerHue = (now*0.1 + p.x) % 360;
    ctx.strokeStyle = `hsl(${shimmerHue},80%,60%)`;
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.roundRect(-p.w/2-1,-p.h/2-1,p.w+2,p.h+2,5); ctx.stroke();
  }

  // Card body
  ctx.fillStyle = rc.bg; ctx.strokeStyle = rc.border; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(-p.w/2,-p.h/2,p.w,p.h,4); ctx.fill(); ctx.stroke();

  // Top banner
  ctx.fillStyle = rc.border;
  ctx.beginPath(); ctx.roundRect(-p.w/2,-p.h/2,p.w,14,[4,4,0,0]); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 7px "JetBrains Mono"'; ctx.textAlign = 'center';
  ctx.fillText(p.rarity.toUpperCase(), 0, -p.h/2+10);

  // Art area
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(-p.w/2+4, -p.h/2+16, p.w-8, p.h-32);

  // Larger center emoji
  ctx.font = '18px serif'; ctx.textAlign = 'center';
  ctx.fillText(GAME_EMOJI[p.game]||'★', 0, 8);

  // Bottom: card name
  ctx.fillStyle = '#ccc'; ctx.font = '6px "JetBrains Mono"';
  const shortName = p.name.length>12 ? p.name.substring(0,11)+'..' : p.name;
  ctx.fillText(shortName, 0, p.h/2-5);

  ctx.restore();
}

function drawClaw(now) {
  const cx = clawX, cy = clawY;

  // Cable
  ctx.strokeStyle = '#4a4a6a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx,RAIL_Y); ctx.lineTo(cx,cy); ctx.stroke();

  // Carriage
  ctx.fillStyle = isMega?'#ffd700':'#3a3a5a';
  ctx.fillRect(cx-15,RAIL_Y-8,30,12);

  // Strength glow
  if (state !== 'idle') {
    const gi = clawStrength;
    const glowColor = isMega?`rgba(255,215,0,${gi*0.4})` :
      gi>0.7?`rgba(0,230,118,${gi*0.3})`:gi>0.4?`rgba(255,171,64,${gi*0.3})`:`rgba(255,82,82,${gi*0.3})`;
    ctx.fillStyle = glowColor;
    ctx.beginPath(); ctx.arc(cx,cy+10,20+gi*10,0,Math.PI*2); ctx.fill();
  }

  // Claw head + arms with pendulum swing
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(clawSwingAngle);

  // Head
  ctx.fillStyle = isMega?'#ffd700':'#6a6a8a';
  ctx.fillRect(-10,-5,20,15);

  // Arms
  const oa = clawOpen * 0.5;
  ctx.strokeStyle = isMega?'#ffd700':'#8a8aaa';
  ctx.lineWidth = 3; ctx.lineCap = 'round';

  // Left
  ctx.beginPath(); ctx.moveTo(-5,10); ctx.lineTo(-12-oa*15,35); ctx.lineTo(-8-oa*10,42); ctx.stroke();
  // Right
  ctx.beginPath(); ctx.moveTo(5,10); ctx.lineTo(12+oa*15,35); ctx.lineTo(8+oa*10,42); ctx.stroke();
  // Center
  ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(0,38); ctx.lineTo(0,43); ctx.stroke();

  ctx.restore();
}

function drawCollection(now) {
  if (collection.length === 0) return;
  // Draw shelf area at bottom-left
  const sx = 8, sy = H - 80;
  ctx.fillStyle = 'rgba(20,20,40,0.7)';
  ctx.beginPath(); ctx.roundRect(sx-4, sy-12, collection.length*38+8, 52, 6); ctx.fill();
  ctx.strokeStyle = '#3a3a5a'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(sx-4, sy-12, collection.length*38+8, 52, 6); ctx.stroke();

  ctx.fillStyle = '#6a6a8a'; ctx.font = '6px "Press Start 2P"'; ctx.textAlign = 'left';
  ctx.fillText('WON', sx, sy-4);

  for (let i = 0; i < collection.length; i++) {
    const c = collection[i];
    const rc = RARITY_COLORS[c.rarity];
    const cx = sx + i*38 + 16, cy2 = sy + 16;
    ctx.fillStyle = rc.bg; ctx.strokeStyle = rc.border; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(cx-14,cy2-14,28,34,3); ctx.fill(); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = '12px serif'; ctx.textAlign = 'center';
    ctx.fillText(c.emoji||'★', cx, cy2+4);
    ctx.fillStyle = rc.label; ctx.font = '5px "JetBrains Mono"';
    ctx.fillText(c.rarity.substr(0,3).toUpperCase(), cx, cy2+16);
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16)||200;
  const g = parseInt(hex.slice(3,5),16)||100;
  const b = parseInt(hex.slice(5,7),16)||200;
  return `${r},${g},${b}`;
}

// ═══ INPUT ═══
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code==='Space') { e.preventDefault(); startDrop(); }
  if (e.code==='KeyR') resetGame();
});
window.addEventListener('keyup', e => { keys[e.code]=false; });

let touchStartX = 0, touchActive = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); audioCtx.resume(); startAmbientHum();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const y = (touch.clientY-rect.top)/rect.height*H;
  if (y > H*0.7) startDrop();
  else { touchStartX = (touch.clientX-rect.left)/rect.width*W; touchActive = true; }
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (touch.clientX-rect.left)/rect.width*W;
  const dx = x-touchStartX;
  if (Math.abs(dx)>5) { moveDir = dx>0?1:-1; touchStartX = x; }
});
canvas.addEventListener('touchend', () => { touchActive=false; moveDir=0; });

function resetGame() {
  state='idle'; clawX=W/2; clawY=RAIL_Y; clawOpen=1; clawVelX=0;
  heldPrize=null; isMega=false; slowMoTimer=0;
  clawSwingAngle=0; clawSwingVel=0;
  spawnPrizes();
}

// ═══ GAME LOOP ═══
function gameLoop() {
  if (state==='idle') {
    if (keys['ArrowLeft']||keys['KeyA']) moveDir=-1;
    else if (keys['ArrowRight']||keys['KeyD']) moveDir=1;
    else if (!touchActive) moveDir=0;
  }
  update(); render();
  requestAnimationFrame(gameLoop);
}

if ('ontouchstart' in window) {
  document.getElementById('controlsHint').textContent='Drag to move · Tap bottom to drop';
}

gameLoop();
</script>
