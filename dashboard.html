<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo's Vault — Collectibles Command Center</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@300;400;500;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0a0a14;
  --surface: #12121f;
  --surface2: #1a1a2e;
  --border: #2a2a4a;
  --text: #e0e0f0;
  --dim: #6a6a8a;
  --accent: #ff6ec7;
  --gold: #ffd700;
  --green: #00e676;
  --red: #ff5252;
  --blue: #448aff;
  --purple: #b388ff;
  --orange: #ffab40;
  --cyan: #18ffff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══ HEADER ═══ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, var(--bg) 0%, rgba(10,10,20,0.97) 100%);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo {
  font-family: 'Press Start 2P', cursive;
  font-size: 14px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 8px var(--green);
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.last-update { font-size: 11px; color: var(--dim); }
.station-link {
  font-size: 11px; color: var(--accent); text-decoration: none;
  border: 1px solid var(--accent); padding: 4px 12px; border-radius: 4px;
  transition: all 0.2s;
}
.station-link:hover { background: var(--accent); color: var(--bg); }

/* ═══ TICKER ═══ */
.ticker {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden; white-space: nowrap;
  padding: 8px 0; font-size: 12px;
}
.ticker-inner {
  display: inline-block;
  animation: scroll 45s linear infinite;
}
@keyframes scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ticker-item { display: inline-block; margin: 0 24px; }
.ticker-up { color: var(--green); }
.ticker-down { color: var(--red); }
.ticker-flat { color: var(--dim); }

/* ═══ GRID ═══ */
.dashboard { padding: 24px; max-width: 1440px; margin: 0 auto; }

.section-title {
  font-family: 'Press Start 2P', cursive;
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin: 28px 0 14px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* ═══ MARKET CAP BANNER ═══ */
.market-cap-banner {
  background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 50%, var(--surface) 100%);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px 32px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 32px;
  position: relative;
  overflow: hidden;
}
.market-cap-banner::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--accent), var(--purple), var(--cyan));
}
.mcap-main {}
.mcap-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
.mcap-value { font-size: 36px; font-weight: 700; color: var(--gold); margin: 4px 0; }
.mcap-sub { font-size: 11px; color: var(--dim); }
.mcap-stats { display: flex; gap: 32px; }
.mcap-stat {}
.mcap-stat-value { font-size: 20px; font-weight: 700; }
.mcap-stat-label { font-size: 9px; color: var(--dim); text-transform: uppercase; margin-top: 2px; }

/* ═══ HERO CARDS ═══ */
.hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 8px; }

.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.hero-card:hover { transform: translateY(-2px); border-color: var(--accent); }
.hero-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.hero-yugioh::before { background: linear-gradient(90deg, var(--gold), var(--orange)); }
.hero-dandadan::before { background: linear-gradient(90deg, #ff4081, #e040fb); }

.hero-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
.hero-game { font-size: 16px; font-weight: 700; margin: 4px 0; display:flex; align-items:center; gap:8px; }
.hero-game a { color: inherit; text-decoration: none; }
.hero-game a:hover { color: var(--accent); }
.source-link {
  font-size: 9px; color: var(--accent); text-decoration: none;
  border: 1px solid rgba(255,110,199,0.3); padding: 2px 8px; border-radius: 3px;
  transition: all 0.2s;
}
.source-link:hover { background: var(--accent); color: var(--bg); }
.hero-stat-row { display: flex; gap: 24px; margin-top: 12px; }
.hero-stat {}
.hero-stat-value { font-size: 22px; font-weight: 700; }
.hero-stat-label { font-size: 9px; color: var(--dim); text-transform: uppercase; margin-top: 2px; }
.hero-sparkline { margin-top: 12px; height: 40px; }

/* ═══ MARKET GRID ═══ */
.market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }

.tcg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  transition: transform 0.15s, border-color 0.15s;
}
.tcg-card:hover { transform: translateY(-1px); border-color: var(--accent); }
.tcg-card.collapsed { opacity: 0.6; }
.tcg-card.collapsed:hover { opacity: 0.9; }

.tcg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.tcg-name { font-size: 12px; font-weight: 600; }
.tcg-name a { color: inherit; text-decoration: none; }
.tcg-name a:hover { color: var(--accent); }
.tcg-badge {
  font-size: 9px; padding: 2px 6px; border-radius: 3px;
  font-weight: 500;
}
.badge-up { background: rgba(0,230,118,0.15); color: var(--green); }
.badge-down { background: rgba(255,82,82,0.15); color: var(--red); }
.badge-flat { background: rgba(106,106,138,0.15); color: var(--dim); }

.tcg-price { font-size: 20px; font-weight: 700; margin: 4px 0; }
.tcg-meta { font-size: 10px; color: var(--dim); }
.tcg-sparkline { margin-top: 8px; height: 30px; }
.tcg-alerts {
  margin-top: 8px;
  font-size: 10px;
  color: var(--accent);
  display: flex; align-items: center; gap: 4px;
}
.tcg-mcap { font-size: 10px; color: var(--gold); margin-top: 4px; }

/* ═══ CARD GALLERY ═══ */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
}
.gallery-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  cursor: pointer;
}
.gallery-card:hover {
  transform: translateY(-4px) scale(1.02);
  border-color: var(--accent);
  box-shadow: 0 8px 24px rgba(255,110,199,0.15);
}
.gallery-card img {
  width: 100%; aspect-ratio: 3/4; object-fit: cover;
  display: block; background: var(--surface2);
}
.gallery-card-info {
  padding: 8px 10px;
}
.gallery-card-game { font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
.gallery-card-title { font-size: 10px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gallery-card-price { font-size: 11px; font-weight: 700; margin-top: 4px; }
.gallery-card-title a { color: var(--text); text-decoration: none; }
.gallery-card-title a:hover { color: var(--accent); }
.gallery-placeholder {
  width: 100%; aspect-ratio: 3/4;
  background: linear-gradient(135deg, var(--surface2), var(--surface));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
}

/* ═══ ALERT FEED ═══ */
.alert-feed {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  max-height: 600px;
  overflow-y: auto;
}
.alert-feed::-webkit-scrollbar { width: 4px; }
.alert-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.alert-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(42,42,74,0.5);
  transition: background 0.15s;
}
.alert-item:last-child { border-bottom: none; }
.alert-item:hover { background: rgba(255,110,199,0.05); border-radius: 8px; }

.alert-img {
  width: 64px; height: 88px; border-radius: 6px; object-fit: cover;
  flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
}
.alert-item:hover .alert-img { transform: scale(1.05); box-shadow: 0 4px 16px rgba(255,110,199,0.2); }
.alert-img-placeholder {
  width: 64px; height: 88px; border-radius: 6px; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--dim);
}

.alert-dot {
  width: 6px; height: 6px; border-radius: 50%;
  display: inline-block; vertical-align: middle; margin-right: 4px;
}
.alert-game { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
.alert-title { font-size: 12px; margin: 2px 0; line-height: 1.4; }
.alert-title a { color: var(--text); text-decoration: none; }
.alert-title a:hover { color: var(--accent); }
.alert-price { font-size: 13px; font-weight: 700; margin-top: 4px; }
.alert-time { font-size: 10px; color: var(--dim); margin-left: auto; white-space: nowrap; }

/* ═══ MORNING BRIEF ═══ */
.brief {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.brief-title { font-family: 'Press Start 2P', cursive; font-size: 10px; color: var(--accent); margin-bottom: 12px; }
.brief-text { font-size: 13px; line-height: 1.7; color: var(--text); }
.brief-text strong { color: var(--gold); }

/* ═══ FOOTER ═══ */
.footer {
  text-align: center;
  padding: 32px;
  font-size: 10px;
  color: var(--dim);
  border-top: 1px solid var(--border);
  margin-top: 32px;
}

/* ═══ CANVAS SPARKLINE ═══ */
canvas.spark { display: block; width: 100%; image-rendering: pixelated; }

/* ═══ FILTER TABS ═══ */
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.filter-btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; padding: 4px 12px; border-radius: 4px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--dim); cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--bg); }

/* ═══ PREMIUM BANNER ═══ */
.premium-banner {
  margin-top: 20px;
  background: linear-gradient(135deg, #1a1035 0%, #0f1a2e 40%, #1a1035 100%);
  border: 1px solid rgba(179, 136, 255, 0.25);
  border-radius: 12px;
  padding: 28px 32px;
  position: relative;
  overflow: hidden;
}
.premium-banner::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--accent), var(--purple));
}
.premium-banner::after {
  content: '';
  position: absolute; top: -50%; right: -20%;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,215,0,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.premium-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 28px;
  flex-wrap: wrap;
}
.premium-left { flex: 1; min-width: 260px; }
.premium-heading {
  font-family: 'Press Start 2P', cursive;
  font-size: 13px;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}
.premium-features {
  font-size: 12px;
  color: var(--dim);
  line-height: 1.8;
  margin-bottom: 12px;
}
.premium-features span {
  color: var(--purple);
  margin: 0 6px;
}
.premium-pricing {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.premium-pricing .price-highlight {
  color: var(--gold);
}
.premium-right {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.premium-cta {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  padding: 12px 28px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  color: #0a0a14;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  box-shadow: 0 4px 16px rgba(255,215,0,0.2);
}
.premium-cta:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(255,215,0,0.35);
}
.premium-spots {
  font-size: 11px;
  color: var(--dim);
}
.premium-spots strong {
  color: var(--accent);
}

/* ═══ FOUNDING MEMBER BADGE ═══ */
.founding-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 4px;
  background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,171,64,0.15));
  border: 1px solid rgba(255,215,0,0.3);
  color: var(--gold);
}
.founding-badge::before {
  content: '🏆';
  font-size: 10px;
}

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .hero-row { grid-template-columns: 1fr; }
  .market-grid { grid-template-columns: 1fr 1fr; }
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
  .dashboard { padding: 12px; }
  .market-cap-banner { flex-direction: column; align-items: flex-start; gap: 16px; }
  .mcap-value { font-size: 28px; }
  .premium-inner { flex-direction: column; text-align: center; }
  .premium-right { width: 100%; }
  .two-col { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  .market-grid { grid-template-columns: 1fr; }
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
}

/* ═══ AMBIENT PARTICLES ═══ */
#particles {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; opacity: 0.3;
}
.dashboard, .header, .ticker, .footer { position: relative; z-index: 1; }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div>
      <div class="logo">ECHO'S VAULT</div>
      <div class="logo-sub">Collectibles Command Center</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="last-update" id="lastUpdate">Loading...</span>
    <a href="/" class="station-link">← Back to Station</a>
  </div>
</div>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-inner" id="ticker"></div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">

  <!-- MARKET CAP BANNER -->
  <div class="market-cap-banner" id="mcapBanner"></div>

  <!-- PREMIUM BANNER -->
  <div class="premium-banner" id="premiumBanner"></div>

  <!-- HERO CARDS -->
  <div class="section-title">🎯 Your Focus</div>
  <div class="hero-row" id="heroRow"></div>

  <!-- MARKET GRID -->
  <div class="section-title">📊 Market Overview</div>
  <div class="market-grid" id="marketGrid"></div>

  <!-- CARD GALLERY -->
  <div class="section-title">🎴 Holy Grail Gallery</div>
  <div class="filter-row" id="galleryFilters"></div>
  <div class="gallery-grid" id="galleryGrid"></div>

  <!-- TWO COLUMNS: BRIEF + ALERTS -->
  <div class="two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px">
    <div>
      <div class="section-title">☀️ Morning Brief</div>
      <div class="brief" id="morningBrief"></div>
    </div>
    <div>
      <div class="section-title">🚨 Latest Alerts</div>
      <div class="alert-feed" id="alertFeed"></div>
    </div>
  </div>

</div>

<div class="footer">
  🔮 Echo's Vault · Powered by Echo Station · Data refreshes every 3 hours<br>
  9 TCGs tracked · eBay.com · eBay.de · TCGPlayer · €5,000+ threshold
</div>

<script>
// ═══ AFFILIATE CONFIG ═══
const AFFILIATE = {
  ebayComCampaignId: '', // Mikel will fill this in
  ebayDeCampaignId: '', // Mikel will fill this in
  enabled: false,       // flip to true when IDs are set
};

function affiliateUrl(rawUrl) {
  if (!AFFILIATE.enabled || !rawUrl) return rawUrl;
  try {
    const url = new URL(rawUrl);
    let campaignId = '';
    if (url.hostname.includes('ebay.com')) campaignId = AFFILIATE.ebayComCampaignId;
    else if (url.hostname.includes('ebay.de')) campaignId = AFFILIATE.ebayDeCampaignId;
    if (!campaignId) return rawUrl;
    return `https://rover.ebay.com/rover/1/${campaignId}/2?mpre=${encodeURIComponent(rawUrl)}&toolid=10001&campid=${campaignId}`;
  } catch(e) { return rawUrl; }
}

// ═══ CONFIG ═══
let MARKET_DATA = null;
let SEEN_DATA = null;
let galleryFilter = 'all';

const TCG_CONFIG = {
  yugioh:    { name: 'Yu-Gi-Oh!', emoji: '👑', color: '#ffd700', tier: 'hero', order: 1,
               searchUrl: 'https://www.ebay.com/sch/i.html?_nkw=yugioh&_sacat=183454&_udlo=5000&_sop=13' },
  dandadan:  { name: 'Dandadan', emoji: '👁️‍🗨️', color: '#ff4081', tier: 'hero', order: 2,
               searchUrl: 'https://www.ebay.com/sch/i.html?_nkw=dandadan+weiss+schwarz&_sacat=183454&_udlo=5000&_sop=13' },
  weiss:     { name: 'Weiß Schwarz', emoji: '🎴', color: '#e040fb', tier: 'focus', order: 3,
               searchUrl: 'https://www.ebay.com/sch/i.html?_nkw=weiss+schwarz&_sacat=183454&_udlo=5000&_sop=13' },
  pokemon:   { name: 'Pokémon', emoji: '⚡', color: '#ffeb3b', tier: 'focus', order: 4,
               searchUrl: 'https://www.ebay.com/sch/i.html?_nkw=pokemon+tcg&_sacat=183454&_udlo=5000&_sop=13' },
  digimon:   { name: 'Digimon', emoji: '🦖', color: '#448aff', tier: 'watch', order: 5,
               searchUrl: 'https://www.ebay.com/sch/i.html?_nkw=digimon+card+game+tcg&_sacat=183454&_udlo=5000&_sop=13' },
  lorcana:   { name: 'Lorcana', emoji: '✨', color: '#18ffff', tier: 'watch', order: 6,
               searchUrl: 'https://www.ebay.com/sch/i.html?_nkw=disney+lorcana+tcg&_sacat=183454&_udlo=5000&_sop=13' },
  unionarena:{ name: 'Union Arena', emoji: '⚔️', color: '#b388ff', tier: 'watch', order: 7,
               searchUrl: 'https://www.ebay.com/sch/i.html?_nkw=union+arena+tcg+card&_sacat=183454&_udlo=5000&_sop=13' },
  dragonball:{ name: 'Dragon Ball', emoji: '🐉', color: '#ffab40', tier: 'watch', order: 8,
               searchUrl: 'https://www.ebay.com/sch/i.html?_nkw=dragon+ball+super+card+game&_sacat=183454&_udlo=5000&_sop=13' },
  onepiece:  { name: 'One Piece', emoji: '🏴‍☠️', color: '#ff5252', tier: 'overview', order: 9,
               searchUrl: 'https://www.ebay.com/sch/i.html?_nkw=one+piece+tcg+card&_sacat=183454&_udlo=5000&_sop=13' },
  mtg:       { name: 'MTG', emoji: '🧙', color: '#6a6a8a', tier: 'overview', order: 10,
               searchUrl: 'https://www.ebay.com/sch/i.html?_nkw=mtg&_sacat=183454&_udlo=5000&_sop=13' },
};

// ═══ DATA LOADING ═══
async function loadData() {
  try {
    const [r1, r2] = await Promise.all([
      fetch('market-stats.json').catch(()=>null),
      fetch('seen.json').catch(()=>null),
    ]);
    if (r1 && r1.ok) MARKET_DATA = await r1.json();

  } catch(e) { console.error('Load error:', e); }

  if (!MARKET_DATA) MARKET_DATA = FALLBACK_DATA;
  render();
}

// ═══ HELPERS ═══
function cents(v) { return '€' + (v/100).toLocaleString('de-DE', {minimumFractionDigits:0, maximumFractionDigits:0}); }
function centsK(v) {
  const val = v / 100;
  if (val >= 1000000) return '€' + (val/1000000).toFixed(1) + 'M';
  if (val >= 1000) return '€' + (val/1000).toFixed(0) + 'K';
  return '€' + val.toFixed(0);
}

function getDates() { return Object.keys(MARKET_DATA).sort(); }

function getLatest(gameId) {
  const dates = getDates();
  for (let i = dates.length - 1; i >= 0; i--) {
    if (MARKET_DATA[dates[i]][gameId]) return { date: dates[i], data: MARKET_DATA[dates[i]][gameId] };
  }
  return null;
}

function getHistory(gameId) {
  return getDates().map(d => ({date:d, data: MARKET_DATA[d][gameId] || null})).filter(x=>x.data);
}

function getTrend(gameId) {
  const hist = getHistory(gameId);
  if (hist.length < 2) return { pct: 0, dir: 'flat' };
  const prev = hist[hist.length - 2].data.avgPrice;
  const curr = hist[hist.length - 1].data.avgPrice;
  const pct = ((curr - prev) / prev * 100);
  return { pct, dir: pct > 1 ? 'up' : pct < -1 ? 'down' : 'flat' };
}

function drawSparkline(canvas, values, color) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = canvas.offsetHeight * 2;
  ctx.clearRect(0, 0, w, h);
  if (values.length < 2) return;
  const min = Math.min(...values) * 0.95;
  const max = Math.max(...values) * 1.05;
  const range = max - min || 1;

  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '40');
  grad.addColorStop(1, color + '00');

  ctx.beginPath();
  ctx.moveTo(0, h);
  values.forEach((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  values.forEach((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  const lastX = w;
  const lastY = h - ((values[values.length-1] - min) / range) * h;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function truncate(s, n) { return s.length > n ? s.substring(0, n) + '...' : s; }

function detectGame(title) {
  if (!title) return 'unknown';
  const t = title.toLowerCase();
  if (t.includes('yu-gi-oh') || t.includes('yugioh') || t.includes('blue-eyes') || t.includes('exodia') || t.includes('dark magician')) return 'yugioh';
  if (t.includes('dandadan')) return 'dandadan';
  if (t.includes('weiss schwarz') || t.includes('weiß schwarz')) return 'weiss';
  if (t.includes('pokemon') || t.includes('pokémon') || t.includes('charizard') || t.includes('pikachu')) return 'pokemon';
  if (t.includes('one piece') || t.includes('luffy') || t.includes('zoro') || t.includes('shanks')) return 'onepiece';
  if (t.includes('magic the gathering') || t.includes('mtg') || t.includes('black lotus')) return 'mtg';
  if (t.includes('dragon ball')) return 'dragonball';
  if (t.includes('digimon')) return 'digimon';
  if (t.includes('lorcana')) return 'lorcana';
  if (t.includes('union arena')) return 'unionarena';
  return 'unknown';
}

function makeEbayLink(key) {
  if (key.includes('ebay-com-')) return `https://www.ebay.com/itm/${key.replace('ebay-com-','')}`;
  if (key.includes('ebay-de-')) return `https://www.ebay.de/itm/${key.replace('ebay-de-','')}`;
  if (key.includes('tcg-')) {
    const parts = key.split('-');
    const productId = parts[parts.length - 1];
    return `https://www.tcgplayer.com/product/${productId}`;
  }
  return '#';
}

function renderGallery() {
  const filtersEl = document.getElementById('galleryFilters');
  const gridEl = document.getElementById('galleryGrid');

  if (!SEEN_DATA) {
    gridEl.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:20px;text-align:center;grid-column:1/-1">Loading card data...</div>';
    return;
  }

  // Build card list
  const allCards = Object.entries(SEEN_DATA)
    .map(([key, val]) => ({ key, ...val }))
    .filter(a => a.firstSeen)
    .sort((a, b) => new Date(b.firstSeen) - new Date(a.firstSeen));

  // Get unique games for filter
  const gamesPresent = new Set();
  allCards.forEach(c => {
    const g = c.game || detectGame(c.title);
    if (g !== 'unknown') gamesPresent.add(g);
  });

  // Render filters
  const filterGames = [...gamesPresent].sort((a,b) => (TCG_CONFIG[a]?.order||99) - (TCG_CONFIG[b]?.order||99));
  filtersEl.innerHTML = `
    <button class="filter-btn ${galleryFilter==='all'?'active':''}" onclick="setFilter('all')">All (${allCards.length})</button>
    ${filterGames.map(g => {
      const cfg = TCG_CONFIG[g];
      const count = allCards.filter(c => (c.game||detectGame(c.title)) === g).length;
      return `<button class="filter-btn ${galleryFilter===g?'active':''}" onclick="setFilter('${g}')" style="${galleryFilter===g?'':`border-color:${cfg?.color}30;color:${cfg?.color}`}">${cfg?.emoji||''} ${cfg?.name||g} (${count})</button>`;
    }).join('')}
  `;

  // Filter cards
  const filtered = galleryFilter === 'all' ? allCards : allCards.filter(c => (c.game||detectGame(c.title)) === galleryFilter);
  const display = filtered.slice(0, 60); // show up to 60

  gridEl.innerHTML = display.map(card => {
    const game = card.game || detectGame(card.title);
    const cfg = TCG_CONFIG[game] || { name: 'Unknown', color: '#6a6a8a', emoji: '❓' };
    const link = makeEbayLink(card.key);
    const imgHtml = card.image
      ? `<img src="${card.image}" alt="${(card.title||'').substring(0,30)}" loading="lazy" onerror="this.outerHTML='<div class=gallery-placeholder>${cfg.emoji}</div>'">`
      : `<div class="gallery-placeholder">${cfg.emoji}</div>`;
    return `
      <a href="${affiliateUrl(link)}" target="_blank" class="gallery-card" style="text-decoration:none;color:inherit">
        ${imgHtml}
        <div class="gallery-card-info">
          <div class="gallery-card-game" style="color:${cfg.color}">${cfg.emoji} ${cfg.name}</div>
          <div class="gallery-card-title">${truncate(card.title||'Unknown', 30)}</div>
          ${card.price ? `<div class="gallery-card-price" style="color:${cfg.color}">${card.price}</div>` : ''}
        </div>
      </a>
    `;
  }).join('');

  if (filtered.length > 60) {
    gridEl.innerHTML += `<div style="grid-column:1/-1;text-align:center;color:var(--dim);font-size:11px;padding:12px">Showing 60 of ${filtered.length} cards</div>`;
  }
}

// ═══ AMBIENT PARTICLES ═══
function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h;
  const particles = [];

  function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 35; i++) {
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
      size: Math.random() * 2 + 0.5,
      alpha: Math.random() * 0.5 + 0.1,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,110,199,${p.alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ═══ INIT ═══
initParticles();
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
