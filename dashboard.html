<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo's Vault — Collectibles Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@300;400;500;700&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0a0a14;
  --surface: #12121f;
  --surface2: #1a1a2e;
  --border: #2a2a4a;
  --text: #e0e0f0;
  --dim: #6a6a8a;
  --accent: #ff6ec7;
  --gold: #ffd700;
  --green: #00e676;
  --red: #ff5252;
  --blue: #448aff;
  --purple: #b388ff;
  --orange: #ffab40;
  --cyan: #18ffff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══ HEADER ═══ */
.header {
  position: sticky; top: 0; z-index: 100;
  background: linear-gradient(180deg, var(--bg) 0%, rgba(10,10,20,0.95) 100%);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.logo {
  font-family: 'Press Start 2P', cursive;
  font-size: 14px;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 16px; }
.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 8px var(--green);
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.last-update { font-size: 11px; color: var(--dim); }
.station-link {
  font-size: 11px; color: var(--accent); text-decoration: none;
  border: 1px solid var(--accent); padding: 4px 12px; border-radius: 4px;
  transition: all 0.2s;
}
.station-link:hover { background: var(--accent); color: var(--bg); }

/* ═══ TICKER ═══ */
.ticker {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  overflow: hidden; white-space: nowrap;
  padding: 8px 0; font-size: 12px;
}
.ticker-inner {
  display: inline-block;
  animation: scroll 40s linear infinite;
}
@keyframes scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.ticker-item { display: inline-block; margin: 0 24px; }
.ticker-up { color: var(--green); }
.ticker-down { color: var(--red); }
.ticker-flat { color: var(--dim); }

/* ═══ GRID ═══ */
.dashboard { padding: 24px; max-width: 1400px; margin: 0 auto; }

.section-title {
  font-family: 'Press Start 2P', cursive;
  font-size: 10px;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin: 24px 0 12px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* ═══ HERO CARDS ═══ */
.hero-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
}
.hero-card:hover { transform: translateY(-2px); border-color: var(--accent); }
.hero-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.hero-yugioh::before { background: linear-gradient(90deg, var(--gold), var(--orange)); }
.hero-dandadan::before { background: linear-gradient(90deg, #ff4081, #e040fb); }

.hero-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }
.hero-game { font-size: 16px; font-weight: 700; margin: 4px 0; }
.hero-stat-row { display: flex; gap: 24px; margin-top: 12px; }
.hero-stat { }
.hero-stat-value { font-size: 22px; font-weight: 700; }
.hero-stat-label { font-size: 9px; color: var(--dim); text-transform: uppercase; margin-top: 2px; }
.hero-sparkline { margin-top: 12px; height: 40px; }

/* ═══ MARKET GRID ═══ */
.market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

.tcg-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  transition: transform 0.15s, border-color 0.15s;
  cursor: default;
}
.tcg-card:hover { transform: translateY(-1px); border-color: var(--accent); }
.tcg-card.collapsed { opacity: 0.6; }
.tcg-card.collapsed:hover { opacity: 0.9; }

.tcg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.tcg-name { font-size: 12px; font-weight: 600; }
.tcg-badge {
  font-size: 9px; padding: 2px 6px; border-radius: 3px;
  font-weight: 500;
}
.badge-up { background: rgba(0,230,118,0.15); color: var(--green); }
.badge-down { background: rgba(255,82,82,0.15); color: var(--red); }
.badge-flat { background: rgba(106,106,138,0.15); color: var(--dim); }

.tcg-price { font-size: 20px; font-weight: 700; margin: 4px 0; }
.tcg-meta { font-size: 10px; color: var(--dim); }
.tcg-sparkline { margin-top: 8px; height: 30px; }
.tcg-alerts {
  margin-top: 8px;
  font-size: 10px;
  color: var(--accent);
  display: flex; align-items: center; gap: 4px;
}

/* ═══ ALERT FEED ═══ */
.alert-feed {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  max-height: 500px;
  overflow-y: auto;
}
.alert-feed::-webkit-scrollbar { width: 4px; }
.alert-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.alert-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(42,42,74,0.5);
  transition: background 0.15s;
}
.alert-item:last-child { border-bottom: none; }
.alert-item:hover { background: rgba(255,110,199,0.05); border-radius: 8px; }

.alert-img {
  width: 64px; height: 88px; border-radius: 6px; object-fit: cover;
  flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border);
  transition: transform 0.2s, box-shadow 0.2s;
}
.alert-item:hover .alert-img { transform: scale(1.05); box-shadow: 0 4px 16px rgba(255,110,199,0.2); }
.alert-img-placeholder {
  width: 64px; height: 88px; border-radius: 6px; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: var(--dim);
}

.alert-dot {
  width: 6px; height: 6px; border-radius: 50%;
  margin-top: 6px; flex-shrink: 0;
}
.alert-game { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
.alert-title { font-size: 12px; margin: 2px 0; line-height: 1.4; }
.alert-title a { color: var(--text); text-decoration: none; }
.alert-title a:hover { color: var(--accent); }
.alert-price { font-size: 13px; font-weight: 700; margin-top: 4px; }
.alert-time { font-size: 10px; color: var(--dim); margin-left: auto; white-space: nowrap; }

/* ═══ MORNING BRIEF ═══ */
.brief {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-top: 16px;
}
.brief-title { font-family: 'Press Start 2P', cursive; font-size: 10px; color: var(--accent); margin-bottom: 12px; }
.brief-text { font-size: 13px; line-height: 1.7; color: var(--text); }
.brief-text strong { color: var(--gold); }

/* ═══ FOOTER ═══ */
.footer {
  text-align: center;
  padding: 32px;
  font-size: 10px;
  color: var(--dim);
  border-top: 1px solid var(--border);
  margin-top: 32px;
}

/* ═══ CANVAS SPARKLINE ═══ */
canvas.spark { display: block; width: 100%; image-rendering: pixelated; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .hero-row { grid-template-columns: 1fr; }
  .market-grid { grid-template-columns: 1fr 1fr; }
  .dashboard { padding: 12px; }
}
@media (max-width: 480px) {
  .market-grid { grid-template-columns: 1fr; }
}

/* ═══ AMBIENT PARTICLES ═══ */
#particles {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; opacity: 0.3;
}
.dashboard, .header, .ticker, .footer { position: relative; z-index: 1; }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div>
      <div class="logo">ECHO'S VAULT</div>
      <div class="logo-sub">Collectibles Command Center</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <span class="last-update" id="lastUpdate">Loading...</span>
    <a href="/" class="station-link">← Back to Station</a>
  </div>
</div>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-inner" id="ticker"></div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">

  <!-- HERO CARDS -->
  <div class="section-title">🎯 Your Focus</div>
  <div class="hero-row" id="heroRow"></div>

  <!-- MARKET GRID -->
  <div class="section-title">📊 Market Overview</div>
  <div class="market-grid" id="marketGrid"></div>

  <!-- MORNING BRIEF -->
  <div class="section-title">☀️ Morning Brief</div>
  <div class="brief" id="morningBrief"></div>

  <!-- ALERTS — FULL WIDTH FOR CARD VISUALS -->
  <div class="section-title">🚨 Recent Holy Grails</div>
  <div class="alert-feed" id="alertFeed" style="max-height:700px"></div>

</div>

<div class="footer">
  🔮 Echo's Vault · Powered by Echo Station · Data refreshes every 3 hours<br>
  10 TCGs tracked · eBay.com · eBay.de · €5,000+ threshold
</div>

<script>
// ═══ DATA ═══
// Load market-stats.json from the same directory
let MARKET_DATA = null;
let SEEN_DATA = null;

const TCG_CONFIG = {
  yugioh:    { name: 'Yu-Gi-Oh!', emoji: '👑', color: '#ffd700', tier: 'hero', order: 1 },
  dandadan:  { name: 'Dandadan', emoji: '👁️‍🗨️', color: '#ff4081', tier: 'hero', order: 2 },
  weiss:     { name: 'Weiß Schwarz', emoji: '🎴', color: '#e040fb', tier: 'focus', order: 3 },
  pokemon:   { name: 'Pokémon', emoji: '⚡', color: '#ffeb3b', tier: 'focus', order: 4 },
  digimon:   { name: 'Digimon', emoji: '🦖', color: '#448aff', tier: 'watch', order: 5 },
  lorcana:   { name: 'Lorcana', emoji: '✨', color: '#18ffff', tier: 'watch', order: 6 },
  unionarena:{ name: 'Union Arena', emoji: '⚔️', color: '#b388ff', tier: 'watch', order: 7 },
  dragonball:{ name: 'Dragon Ball', emoji: '🐉', color: '#ffab40', tier: 'watch', order: 8 },
  onepiece:  { name: 'One Piece', emoji: '🏴‍☠️', color: '#ff5252', tier: 'overview', order: 9 },
  mtg:       { name: 'MTG', emoji: '🧙', color: '#6a6a8a', tier: 'overview', order: 10 },
};

async function loadData() {
  try {
    const [statsRes, seenRes] = await Promise.all([
      fetch('/scripts/yugioh-monitor/market-stats.json').catch(() => null),
      fetch('/scripts/yugioh-monitor/seen.json').catch(() => null),
    ]);
    // Try local paths, fall back to relative
    if (statsRes && statsRes.ok) {
      MARKET_DATA = await statsRes.json();
    } else {
      const r2 = await fetch('market-stats.json').catch(() => null);
      if (r2 && r2.ok) MARKET_DATA = await r2.json();
    }
    if (seenRes && seenRes.ok) {
      SEEN_DATA = await seenRes.json();
    } else {
      const r2 = await fetch('seen.json').catch(() => null);
      if (r2 && r2.ok) SEEN_DATA = await r2.json();
    }
  } catch(e) { console.error('Data load error:', e); }

  // Fallback: hardcoded from latest run
  if (!MARKET_DATA) {
    MARKET_DATA = FALLBACK_DATA;
  }

  render();
}

// Hardcoded fallback data from the monitor
const FALLBACK_DATA = {
  "2026-02-15": {"yugioh":{"totalListings":80,"avgPrice":23557,"maxPrice":100000,"newAlerts":3},"pokemon":{"totalListings":172,"avgPrice":10699,"maxPrice":100000,"newAlerts":2},"mtg":{"totalListings":83,"avgPrice":12504,"maxPrice":49826,"newAlerts":0},"onepiece":{"totalListings":129,"avgPrice":9002,"maxPrice":39000,"newAlerts":39},"dragonball":{"totalListings":54,"avgPrice":8520,"maxPrice":60000,"newAlerts":0}},
  "2026-02-16": {"yugioh":{"totalListings":80,"avgPrice":23557,"maxPrice":100000,"newAlerts":0},"pokemon":{"totalListings":175,"avgPrice":10808,"maxPrice":99999,"newAlerts":2},"mtg":{"totalListings":83,"avgPrice":12514,"maxPrice":49826,"newAlerts":0},"onepiece":{"totalListings":136,"avgPrice":8732,"maxPrice":39000,"newAlerts":0},"dragonball":{"totalListings":57,"avgPrice":8436,"maxPrice":60000,"newAlerts":0}},
  "2026-02-17": {"yugioh":{"totalListings":81,"avgPrice":21572,"maxPrice":100000,"newAlerts":1},"pokemon":{"totalListings":176,"avgPrice":11650,"maxPrice":149999,"newAlerts":1},"mtg":{"totalListings":83,"avgPrice":12344,"maxPrice":49746,"newAlerts":0},"onepiece":{"totalListings":131,"avgPrice":9311,"maxPrice":52000,"newAlerts":0},"dragonball":{"totalListings":59,"avgPrice":8319,"maxPrice":60000,"newAlerts":0}},
  "2026-02-18": {"yugioh":{"totalListings":80,"avgPrice":21778,"maxPrice":100000,"newAlerts":0},"pokemon":{"totalListings":172,"avgPrice":12208,"maxPrice":149999,"newAlerts":0},"mtg":{"totalListings":84,"avgPrice":12271,"maxPrice":49523,"newAlerts":0},"onepiece":{"totalListings":136,"avgPrice":9020,"maxPrice":39000,"newAlerts":3},"dragonball":{"totalListings":57,"avgPrice":8434,"maxPrice":60000,"newAlerts":0},"weiss":{"totalListings":15,"avgPrice":9147,"maxPrice":22500,"newAlerts":15},"dandadan":{"totalListings":5,"avgPrice":10219,"maxPrice":22500,"newAlerts":0},"digimon":{"totalListings":10,"avgPrice":13784,"maxPrice":77777,"newAlerts":3},"lorcana":{"totalListings":50,"avgPrice":54745,"maxPrice":99999,"newAlerts":50},"unionarena":{"totalListings":13,"avgPrice":8469,"maxPrice":15000,"newAlerts":2}}
};

function cents(v) { return '€' + (v/100).toLocaleString('de-DE', {minimumFractionDigits:0, maximumFractionDigits:0}); }

function getDates() {
  return Object.keys(MARKET_DATA).sort();
}

function getLatest(gameId) {
  const dates = getDates();
  for (let i = dates.length - 1; i >= 0; i--) {
    if (MARKET_DATA[dates[i]][gameId]) return { date: dates[i], data: MARKET_DATA[dates[i]][gameId] };
  }
  return null;
}

function getHistory(gameId) {
  const dates = getDates();
  return dates.map(d => ({date:d, data: MARKET_DATA[d][gameId] || null})).filter(x=>x.data);
}

function getTrend(gameId) {
  const hist = getHistory(gameId);
  if (hist.length < 2) return { pct: 0, dir: 'flat' };
  const prev = hist[hist.length - 2].data.avgPrice;
  const curr = hist[hist.length - 1].data.avgPrice;
  const pct = ((curr - prev) / prev * 100);
  return { pct, dir: pct > 1 ? 'up' : pct < -1 ? 'down' : 'flat' };
}

function drawSparkline(canvas, values, color) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = canvas.offsetHeight * 2;
  ctx.clearRect(0, 0, w, h);

  if (values.length < 2) return;
  const min = Math.min(...values) * 0.95;
  const max = Math.max(...values) * 1.05;
  const range = max - min || 1;

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '40');
  grad.addColorStop(1, color + '00');

  ctx.beginPath();
  ctx.moveTo(0, h);
  values.forEach((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    ctx.lineTo(x, y);
  });
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  // End dot
  const lastX = w;
  const lastY = h - ((values[values.length-1] - min) / range) * h;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

// ═══ RENDER ═══
function render() {
  const dates = getDates();
  const latestDate = dates[dates.length - 1];
  document.getElementById('lastUpdate').textContent = 'Last scan: ' + latestDate + ' · ' + new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});

  // TICKER
  renderTicker();

  // HERO CARDS (Yu-Gi-Oh + Dandadan)
  renderHeroes();

  // MARKET GRID
  renderMarket();

  // ALERTS
  renderAlerts();

  // MORNING BRIEF
  renderBrief();

  // Draw sparklines after DOM is ready
  requestAnimationFrame(() => {
    document.querySelectorAll('canvas.spark').forEach(c => {
      const gid = c.dataset.game;
      const color = c.dataset.color;
      const hist = getHistory(gid);
      const vals = hist.map(h => h.data.avgPrice);
      if (vals.length) drawSparkline(c, vals, color);
    });
  });
}

function renderTicker() {
  const el = document.getElementById('ticker');
  const games = Object.keys(TCG_CONFIG).sort((a,b) => TCG_CONFIG[a].order - TCG_CONFIG[b].order);
  let html = '';
  games.forEach(gid => {
    const cfg = TCG_CONFIG[gid];
    const latest = getLatest(gid);
    if (!latest) { html += `<span class="ticker-item">${cfg.emoji} ${cfg.name} —</span>`; return; }
    const trend = getTrend(gid);
    const cls = trend.dir === 'up' ? 'ticker-up' : trend.dir === 'down' ? 'ticker-down' : 'ticker-flat';
    const arrow = trend.dir === 'up' ? '▲' : trend.dir === 'down' ? '▼' : '●';
    html += `<span class="ticker-item"><span style="color:${cfg.color}">${cfg.emoji}</span> ${cfg.name} <span class="${cls}">${arrow} ${Math.abs(trend.pct).toFixed(1)}%</span> ${cents(latest.data.avgPrice)} avg</span>`;
  });
  el.innerHTML = html + html; // duplicate for seamless scroll
}

function renderHeroes() {
  const el = document.getElementById('heroRow');
  const heroes = [
    { id: 'yugioh', cls: 'hero-yugioh' },
    { id: 'dandadan', cls: 'hero-dandadan' },
  ];
  el.innerHTML = heroes.map(h => {
    const cfg = TCG_CONFIG[h.id];
    const latest = getLatest(h.id);
    const trend = getTrend(h.id);
    const d = latest ? latest.data : {totalListings:0,avgPrice:0,maxPrice:0,newAlerts:0};
    const trendColor = trend.dir==='up' ? 'var(--green)' : trend.dir==='down' ? 'var(--red)' : 'var(--dim)';
    const trendArrow = trend.dir==='up' ? '▲' : trend.dir==='down' ? '▼' : '●';
    return `
      <div class="hero-card ${h.cls}">
        <div class="hero-label">${cfg.emoji} YOUR FOCUS</div>
        <div class="hero-game">${cfg.name}</div>
        <div class="hero-stat-row">
          <div class="hero-stat">
            <div class="hero-stat-value">${cents(d.avgPrice)}</div>
            <div class="hero-stat-label">Avg Price</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-value">${cents(d.maxPrice)}</div>
            <div class="hero-stat-label">Ceiling</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-value">${d.totalListings}</div>
            <div class="hero-stat-label">Listings</div>
          </div>
          <div class="hero-stat">
            <div class="hero-stat-value" style="color:${trendColor}">${trendArrow} ${Math.abs(trend.pct).toFixed(1)}%</div>
            <div class="hero-stat-label">Trend</div>
          </div>
        </div>
        <div class="hero-sparkline">
          <canvas class="spark" data-game="${h.id}" data-color="${cfg.color}" style="height:40px"></canvas>
        </div>
      </div>
    `;
  }).join('');
}

function renderMarket() {
  const el = document.getElementById('marketGrid');
  const games = Object.keys(TCG_CONFIG)
    .filter(g => !['yugioh','dandadan'].includes(g))
    .sort((a,b) => TCG_CONFIG[a].order - TCG_CONFIG[b].order);

  el.innerHTML = games.map(gid => {
    const cfg = TCG_CONFIG[gid];
    const latest = getLatest(gid);
    const trend = getTrend(gid);
    const d = latest ? latest.data : {totalListings:0,avgPrice:0,maxPrice:0,newAlerts:0};
    const isCollapsed = cfg.tier === 'overview';
    const badgeCls = trend.dir==='up'?'badge-up':trend.dir==='down'?'badge-down':'badge-flat';
    const arrow = trend.dir==='up'?'▲':trend.dir==='down'?'▼':'●';
    return `
      <div class="tcg-card ${isCollapsed?'collapsed':''}">
        <div class="tcg-header">
          <span class="tcg-name" style="color:${cfg.color}">${cfg.emoji} ${cfg.name}</span>
          <span class="tcg-badge ${badgeCls}">${arrow} ${Math.abs(trend.pct).toFixed(1)}%</span>
        </div>
        <div class="tcg-price">${cents(d.avgPrice)}</div>
        <div class="tcg-meta">${d.totalListings} listings · max ${cents(d.maxPrice)}</div>
        <div class="tcg-sparkline">
          <canvas class="spark" data-game="${gid}" data-color="${cfg.color}" style="height:30px"></canvas>
        </div>
        ${d.newAlerts > 0 ? `<div class="tcg-alerts">🔔 ${d.newAlerts} new alerts today</div>` : ''}
      </div>
    `;
  }).join('');
}

function renderAlerts() {
  const el = document.getElementById('alertFeed');
  if (!SEEN_DATA) {
    el.innerHTML = '<div style="color:var(--dim);font-size:12px;padding:20px;text-align:center">Alert data loading...</div>';
    return;
  }

  // Get recent alerts sorted by date
  const alerts = Object.entries(SEEN_DATA)
    .map(([key, val]) => ({ key, ...val }))
    .filter(a => a.firstSeen)
    .sort((a, b) => new Date(b.firstSeen) - new Date(a.firstSeen))
    .slice(0, 30);

  el.innerHTML = alerts.map(a => {
    const game = a.game || (a.key.startsWith('ebay-com-') || a.key.startsWith('ebay-de-') ? detectGame(a.title) : 'unknown');
    const cfg = TCG_CONFIG[game] || { name: 'Unknown', color: '#6a6a8a', emoji: '❓' };
    const date = new Date(a.firstSeen);
    const timeStr = date.toLocaleDateString('de-DE', {day:'numeric',month:'short'});
    const link = a.key.includes('ebay-com-') ? `https://www.ebay.com/itm/${a.key.replace('ebay-com-','')}` :
                 a.key.includes('ebay-de-') ? `https://www.ebay.de/itm/${a.key.replace('ebay-de-','')}` : '#';
    const imgHtml = a.image
      ? `<img class="alert-img" src="${a.image}" alt="${(a.title||'').substring(0,30)}" loading="lazy" onerror="this.outerHTML='<div class=alert-img-placeholder>${cfg.emoji}</div>'">`
      : `<div class="alert-img-placeholder">${cfg.emoji}</div>`;
    const priceHtml = a.price ? `<div class="alert-price" style="color:${cfg.color}">${a.price}</div>` : '';
    return `
      <div class="alert-item">
        <a href="${link}" target="_blank" style="flex-shrink:0">${imgHtml}</a>
        <div style="flex:1;min-width:0">
          <div class="alert-game"><span class="alert-dot" style="background:${cfg.color};display:inline-block;vertical-align:middle;margin-right:4px"></span>${cfg.emoji} ${cfg.name}</div>
          <div class="alert-title"><a href="${link}" target="_blank">${truncate(a.title||'Unknown card',55)}</a></div>
          ${priceHtml}
        </div>
        <div class="alert-time">${timeStr}</div>
      </div>
    `;
  }).join('');
}

function detectGame(title) {
  if (!title) return 'unknown';
  const t = title.toLowerCase();
  if (t.includes('yu-gi-oh') || t.includes('yugioh') || t.includes('blue-eyes') || t.includes('exodia') || t.includes('dark magician')) return 'yugioh';
  if (t.includes('dandadan')) return 'dandadan';
  if (t.includes('weiss') || t.includes('weiß') || t.includes('schwarz')) return 'weiss';
  if (t.includes('pokemon') || t.includes('pokémon') || t.includes('charizard') || t.includes('pikachu')) return 'pokemon';
  if (t.includes('one piece') || t.includes('luffy') || t.includes('zoro') || t.includes('shanks')) return 'onepiece';
  if (t.includes('magic') || t.includes('mtg') || t.includes('black lotus')) return 'mtg';
  if (t.includes('dragon ball')) return 'dragonball';
  if (t.includes('digimon')) return 'digimon';
  if (t.includes('lorcana') || t.includes('disney')) return 'lorcana';
  if (t.includes('union arena')) return 'unionarena';
  return 'unknown';
}

function truncate(s, n) { return s.length > n ? s.substring(0, n) + '...' : s; }

function renderBrief() {
  const el = document.getElementById('morningBrief');
  const dates = getDates();
  const today = dates[dates.length - 1];
  const todayData = MARKET_DATA[today] || {};

  // Generate brief
  const highlights = [];
  Object.entries(todayData).forEach(([gid, d]) => {
    const cfg = TCG_CONFIG[gid];
    if (!cfg) return;
    const trend = getTrend(gid);
    if (Math.abs(trend.pct) > 5) {
      highlights.push(`<strong>${cfg.emoji} ${cfg.name}</strong> ${trend.dir==='up'?'surged':'dropped'} ${Math.abs(trend.pct).toFixed(1)}%`);
    }
    if (d.newAlerts > 5) {
      highlights.push(`<strong>${cfg.emoji} ${cfg.name}</strong> has ${d.newAlerts} new holy grail alerts`);
    }
  });

  const totalListings = Object.values(todayData).reduce((s,d) => s + (d.totalListings||0), 0);
  const totalAlerts = Object.values(todayData).reduce((s,d) => s + (d.newAlerts||0), 0);

  el.innerHTML = `
    <div class="brief-title">☀️ Today's Brief — ${today}</div>
    <div class="brief-text">
      Tracking <strong>${totalListings} listings</strong> across ${Object.keys(todayData).length} TCGs with <strong>${totalAlerts} new alerts</strong> today.<br><br>
      ${highlights.length ? highlights.join('<br>') + '<br><br>' : ''}
      ${highlights.length === 0 ? 'Quiet day across the markets. No major moves. Good time to research and position.' : ''}
      <br><span style="color:var(--dim);font-size:11px">Data refreshes every 3 hours via the Holy Grail Monitor. Threshold: €5,000+</span>
    </div>
  `;
}

// ═══ AMBIENT PARTICLES ═══
function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h;
  const particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 40; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      size: Math.random() * 2 + 0.5,
      alpha: Math.random() * 0.5 + 0.1,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,110,199,${p.alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ═══ INIT ═══
initParticles();
loadData();

// Auto-refresh every 5 minutes
setInterval(loadData, 5 * 60 * 1000);
</script>
