function startLofi(){
  if(lofiInterval)clearInterval(lofiInterval);
  const fl=FLOOR_MUSIC[S.floor]||FLOOR_MUSIC[1];
  currentMusicFloor=S.floor;
  const c=S.audioCtx,bl=60/fl.bpm;
  let ci=0,bi=0;
  function beat(){
    if(!S.musicPlaying){clearInterval(lofiInterval);lofiInterval=null;return}
    if(currentMusicFloor!==S.floor){startLofi();return}
    const n=c.currentTime,ch=fl.chords[ci],sw=bi%2===1?.04:0;
    ch.forEach(f=>{const o=c.createOscillator(),g=c.createGain();o.type=fl.wave;o.frequency.value=f*(1+Math.random()*.003);g.gain.setValueAtTime(fl.padVol,n+sw);g.gain.exponentialRampToValueAtTime(.001,n+sw+bl*.9);o.connect(g);g.connect(S.masterGain);o.start(n+sw);o.stop(n+sw+bl)});
    if(Math.random()>.2&&fl.drumVol>.01){const buf=c.createBuffer(1,c.sampleRate*.05,c.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.3;const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;g.gain.setValueAtTime(fl.drumVol,n+sw);g.gain.exponentialRampToValueAtTime(.001,n+sw+.05);s.connect(g);g.connect(S.masterGain);s.start(n+sw)}
    if(bi===0||bi===2){const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=ch[0]*.5;g.gain.setValueAtTime(fl.bassVol,n);g.gain.exponentialRampToValueAtTime(.001,n+bl*1.5);o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+bl*2)}
    if(Math.random()<.25){const penta=[0,2,4,7,9];const note=ch[0]*Math.pow(2,penta[Math.random()*5|0]/12)*2;const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=note;g.gain.setValueAtTime(.02,n);g.gain.exponentialRampToValueAtTime(.001,n+bl*2);o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+bl*2)}
    bi++;if(bi>=4){bi=0;ci=(ci+1)%4}
  }

}

function initGarden(){
  let g=LS.get('garden',null);
  if(!g){g=PLANT_TYPES.map(pt=>({type:pt.id,planted:Date.now(),lastWatered:0,stage:0,wilting:false}));LS.set('garden',g)}
  S.garden=g;
  const now=Date.now(),day=86400000;
  S.garden.forEach(p=>{const ds=Math.floor((now-p.planted)/day);const dw=p.lastWatered?Math.floor((now-p.lastWatered)/day):999;p.wilting=dw>2;if(!p.wilting)p.stage=Math.min(4,ds)});
}
function waterPlant(idx){
  if(idx<0||idx>=S.garden.length)return;const p=S.garden[idx];
  const now=Date.now(),day=86400000,today=Math.floor(now/day),lastDay=p.lastWatered?Math.floor(p.lastWatered/day):0;
  if(lastDay===today){showThought("Already watered today!");return}
  p.lastWatered=now;p.wilting=false;p.stage=Math.min(4,Math.floor((now-p.planted)/day));
  LS.set('garden',S.garden);showThought(`Watered the ${PLANT_TYPES.find(t=>t.id===p.type).name}! 💧`);
  Coins.earn(1,'water');
}
function harvestPlant(idx){
  if(idx<0||idx>=S.garden.length)return;const p=S.garden[idx];
  if(p.stage<4){showThought("Not ready yet!");return}
  const coins=5+Math.floor(Math.random()*11);
  Coins.earn(coins,'harvest');showThought(`Harvested! +${coins}◈ 🌸`);
  p.planted=Date.now();p.stage=0;p.lastWatered=0;LS.set('garden',S.garden);checkAchievements();
}

function playerColorFromId(id){let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);h=((h%360)+360)%360;return `hsl(${h},70%,60%)`}
function renderRemotePlayer(cx,id,op){
  const sc=3,sz=10,col=playerColorFromId(id);
  cx.save();cx.globalAlpha=.9;cx.translate(op.x-sz*sc/2,op.y-sz*sc);
  // Body (recolor of visitor sprite)
  cx.fillStyle=col;cx.fillRect(2*sc,3*sc,6*sc,5*sc);
  // Hood
  const darker=`hsl(${((parseInt(id,16)||0)%360+360)%360},60%,40%)`;
  cx.fillStyle=darker;cx.fillRect(2*sc,1*sc,6*sc,3*sc);cx.fillRect(1*sc,2*sc,8*sc,2*sc);
  // Face
  cx.fillStyle='#f5d6b8';cx.fillRect(3*sc,2*sc,4*sc,2*sc);
  // Eyes
  cx.fillStyle='#222';cx.fillRect(4*sc,2*sc,sc,sc);cx.fillRect(6*sc,2*sc,sc,sc);
  // Feet
  cx.fillStyle=darker;cx.fillRect(2*sc,8*sc,2*sc,sc);cx.fillRect(6*sc,8*sc,2*sc,sc);
  // Shadow
  cx.fillStyle='rgba(0,0,0,0.2)';cx.fillRect(1*sc,9*sc,8*sc,sc);
  cx.restore();
  // Saber on remote player
  if(op.saber){
    const saberCol=op.saber==='green'?'#00ff44':'#4488ff';
    const swingAmt=op.swingTimer>0?Math.sin(op.swingTimer*Math.PI)*1.2:0;
    const side=op.dir===1?-1:1;
    cx.save();cx.translate(op.x+side*12,op.y-20);cx.rotate(-.8*side+swingAmt*side);
    cx.fillStyle='#666';cx.fillRect(-2,-3,4,10);
    cx.shadowColor=saberCol;cx.shadowBlur=10;
    cx.fillStyle=saberCol;cx.fillRect(-1,-3-28,2,28);
    cx.fillStyle='#fff';cx.fillRect(0,-3-28,1,28);
    cx.shadowBlur=0;cx.restore();
  }
  // Name label
  cx.fillStyle=col;cx.font='bold 9px monospace';cx.textAlign='center';
  cx.fillText(op.name||'Player',op.x,op.y-sz*sc-4);cx.textAlign='left';
}

// §14. COLLISION & OBJECT DETECTION
// ═══════════════════════════════════════
function canMoveTo(x,y){
  const hw=8,hh=4;
  for(const w of WALLS){if(x+hw>w.x&&x-hw<w.x+w.w&&y>w.y&&y-hh<w.y+w.h)return false}
  for(const o of getObjects()){if(!o.collide)continue;if(x+hw>o.x&&x-hw<o.x+o.w&&y>o.y&&y-hh<o.y+o.h)return false}
  return true;
}
function getNearObject(){
  const e=S.echo,range=30;let nearest=null,bestD=range;
  for(const o of getObjects()){if(!o.interact)continue;const cx=Math.max(o.x,Math.min(e.x,o.x+o.w)),cy=Math.max(o.y,Math.min(e.y,o.y+o.h));const d=Math.hypot(e.x-cx,e.y-cy);if(d<bestD){bestD=d;nearest=o}}
  return nearest;
}

const WAVE_LINES=["Hey there! Welcome to my station! 👋","Oh, a visitor! Make yourself at home 🛸","Hi! Click on anything to check it out!","*waves* Hey! Glad you stopped by ✨","Welcome aboard! Feel free to look around 🔮"];

const EchoAI={
  state:'idle',activityTimer:0,currentActivity:null,targetX:0,targetY:0,targetDir:0,routineIdx:0,arriveCallback:null,
  getRoutine(){return getEchoRoutine()},
  nextActivity(){const r=this.getRoutine();this.routineIdx=(this.routineIdx+1)%r.length;this.goToActivity(r[this.routineIdx])},
  goToActivity(actId,cb){
    const spot=ACTIVITY_SPOTS[actId];if(!spot)return;
    // Floor change
    if(spot.floor!==S.echo.floor){S.echo.floor=spot.floor;if(S.floor===spot.floor){S.echo.x=spot.x;S.echo.y=spot.y}}
    this.currentActivity=actId;this.targetX=spot.x;this.targetY=spot.y;this.targetDir=spot.dir;this.state='walking';this.arriveCallback=cb||null;S.echo.sitting=false;
  },
  walkTo(x,y,dir,cb){this.targetX=x;this.targetY=y;this.targetDir=dir||0;this.state='walking';this.arriveCallback=cb||null;this.currentActivity=null;S.echo.sitting=false},
  visitorClickObject(obj){
    if(this.state==='interacting')return;
    this.walkTo(obj.x+obj.w/2,obj.y+obj.h+20,3,()=>{S.nearObject=obj;this.state='interacting';this.activityTimer=0;interact();setTimeout(()=>{if(this.state==='interacting'){this.state='idle';this.activityTimer=0}},3000)});
  },
  visitorClickEcho(){
    if(this.state==='waving')return;
    this.state='waving';S.echo.dir=0;
    showThought(WAVE_LINES[Math.random()*WAVE_LINES.length|0]);
    addChatMsg('Echo',WAVE_LINES[Math.random()*WAVE_LINES.length|0]);
    for(let i=0;i<8;i++)S.particles.push({x:S.echo.x+Math.random()*20-10,y:S.echo.y-30,vx:Math.random()*2-1,vy:-1-Math.random(),life:20,color:'#ffd700',size:2});
    setTimeout(()=>{if(this.state==='waving'){this.state='idle';this.activityTimer=0}},2500);
  },
  update(dt){
    const e=S.echo;if(e.transforming){e.transformTimer+=dt;return}
    this.activityTimer+=dt;
    if(this.state==='walking'){
      if(e.floor!==S.floor){// Echo is on different floor, just teleport
        e.x=this.targetX;e.y=this.targetY;e.dir=this.targetDir;e.moving=false;this.state='activity';this.activityTimer=0;this.onStartActivity();return}
      const dx=this.targetX-e.x,dy=this.targetY-e.y,dist=Math.hypot(dx,dy);
      if(dist<6){e.x=this.targetX;e.y=this.targetY;e.dir=this.targetDir;e.moving=false;e.frame=0;this.state='activity';this.activityTimer=0;if(this.arriveCallback){this.arriveCallback();this.arriveCallback=null}else this.onStartActivity();return}
      const spd=90;e.x+=dx/dist*spd*dt;e.y+=dy/dist*spd*dt;e.moving=true;
      if(Math.abs(dx)>Math.abs(dy))e.dir=dx<0?1:2;else e.dir=dy<0?3:0;
      e.frameTimer+=dt;if(e.frameTimer>.15){e.frame=(e.frame+1)%3;e.frameTimer=0}
    }else if(this.state==='activity'){
      e.moving=false;const spot=ACTIVITY_SPOTS[this.currentActivity];const dur=spot?spot.dur[0]+Math.random()*(spot.dur[1]-spot.dur[0]):20;
      if(this.activityTimer>dur)this.nextActivity();
    }else if(this.state==='idle'){
      e.moving=false;if(this.activityTimer>2)this.nextActivity();
    }else{e.moving=false}
  },
  onStartActivity(){
    const act=this.currentActivity,e=S.echo;
    const thoughts={desk:"Let's write some code.",kitchen:"Coffee time ☕",bed:"Just a quick nap...",sofa:"Time to relax...",crystal:"What does the future hold...",window:"Earth is beautiful...",arcade:"Quick game break!",record:"🎵 Lofi vibes.",growlab:"How are my plants?",server:"All systems nominal.",telescope:"The stars are magnificent tonight...",viewchairs:"So peaceful up here...",hotchoc:"Hot cocoa weather...",fountain:"The water is soothing...",bench:"Nice to sit in nature...",portal:"The portal hums...",workbench:"Let me tinker..."};
    if(thoughts[act])showThought(thoughts[act]);
    if(act==='desk'||act==='sofa'||act==='bed'||act==='viewchairs'||act==='bench')e.sitting=true;
    if(act==='kitchen'){S.caffeine++;LS.set('caffeine',S.caffeine);updateCaffeineHUD()}
    if(act==='record'&&!S.musicPlaying)toggleMusic();
  }
};

// §16. PIXEL AI
// ═══════════════════════════════════════
function updatePixel(dt){
  const p=S.pixel;p.stateTimer+=dt;
  if(p.state==='sleep'){if(p.stateTimer>15){p.state='idle';p.stateTimer=0}return}
  if(p.state==='idle'){
    if(p.stateTimer>3+Math.random()*5){const r=Math.random();
      if(r<.2){// Follow Echo (might go to different floor)
        p.floor=S.echo.floor;if(p.floor===S.floor){p.targetX=S.echo.x+20;p.targetY=S.echo.y+10}p.state='follow';p.stateTimer=0}
      else if(r<.35){p.targetX=50+Math.random()*700;p.targetY=100+Math.random()*450;p.state='walk';p.stateTimer=0}
      else if(r<.4){p.targetX=620;p.targetY=460;p.state='walk';p.stateTimer=0;p._nextState='sleep'}
      else if(r<.45&&S.floor!==p.floor){p.floor=S.echo.floor;p.x=400;p.y=300;p.state='idle';p.stateTimer=0}// Ride elevator
      else p.stateTimer=0}
    return}
  if(p.state==='follow'){p.targetX=S.echo.x+20;p.targetY=S.echo.y+10;if(p.stateTimer>8){p.state='idle';p.stateTimer=0;return}}
  if(p.state==='walk'||p.state==='follow'){
    if(p.floor!==S.floor)return;// Skip movement on wrong floor
    const dx=p.targetX-p.x,dy=p.targetY-p.y,dist=Math.hypot(dx,dy);
    if(dist<8){if(p._nextState){p.state=p._nextState;p._nextState=null}else p.state='idle';p.stateTimer=0;return}
    const spd=60*dt;p.x+=dx/dist*spd;p.y+=dy/dist*spd;
    if(Math.abs(dx)>Math.abs(dy))p.dir=dx<0?1:2;else p.dir=dy<0?3:0;
    p.frameTimer+=dt;if(p.frameTimer>.2){p.frame=(p.frame+1)%2;p.frameTimer=0}}
}

// ═══════════════════════════════════════
// §17. UPDATE LOOP
// ═══════════════════════════════════════
function updateVisitor(dt){
  if(!S.useVisitor)return;
  const spd=160,v=S.visitor;
  let dx=0,dy=0;
  // Keyboard movement (overrides walk target)
  if(S.keys.up){dy=-1;v.dir=3;v.walkTarget=null}
  if(S.keys.down){dy=1;v.dir=0;v.walkTarget=null}
  if(S.keys.left){dx=-1;v.dir=1;v.walkTarget=null}
  if(S.keys.right){dx=1;v.dir=2;v.walkTarget=null}
  // Walk-to-target (click/tap movement)
  if(!dx&&!dy&&v.walkTarget){
    const t=v.walkTarget,tdx=t.x-v.x,tdy=t.y-v.y,dist=Math.sqrt(tdx*tdx+tdy*tdy);
    if(dist<8){v.walkTarget=null;v.moving=false;if(t.action)t.action()}
    else{dx=tdx/dist;dy=tdy/dist;if(Math.abs(dx)>Math.abs(dy)){v.dir=dx>0?2:1}else{v.dir=dy>0?0:3}}
  }
  if(dx||dy){
    const len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;
    const nx=v.x+dx*spd*dt,ny=v.y+dy*spd*dt;
    if(nx>20&&nx<W-20)v.x=nx;
    if(ny>60&&ny<H-20)v.y=ny;
    v.moving=true;v.frameTimer+=dt;if(v.frameTimer>.15){v.frameTimer=0;v.frame=(v.frame+1)%3}
  } else {v.moving=false;v.frame=0}
  // Check what's near visitor
  S.visitorNear=null;
  for(const o of getObjects()){if(!o.interact)continue;
    if(Math.abs(v.x-(o.x+o.w/2))<30&&Math.abs(v.y-(o.y+o.h/2))<30){S.visitorNear=o;break}}
}
function visitorInteract(){
  if(!S.useVisitor)return;
  
  // Spacewalk interactions
  if(S.spacewalk.active){
    const sw=S.spacewalk;
    // Plant flag on asteroid
    const asteroidX=100,asteroidY=400,asteroidR=25;
    if(Math.hypot(sw.x-asteroidX,sw.y-asteroidY)<asteroidR+15&&!sw.flagPlanted){
      sw.flagPlanted=true;LS.set('spacewalkFlag',true);
      Coins.earn(20,'flag');showNotification('🏴 Flag planted on asteroid! +20◈');
      for(let i=0;i<20;i++){
        S.particles.push({x:asteroidX,y:asteroidY-asteroidR,vx:(Math.random()-.5)*4,vy:-Math.random()*3,life:40,color:'#ffd700',size:3});
      }
    }
    return;
  }
  
  if(S.visitorNear){
    // Trigger the same interactions as clicking
    const id=S.visitorNear.id;
    S.nearObject=S.visitorNear;
    interact();
    Coins.earn(1,'interact');
  }
  // Check if near Echo
  if(Math.hypot(S.visitor.x-S.echo.x,S.visitor.y-S.echo.y)<40){
    EchoAI.visitorClickEcho();
  }
  // Check if near Pixel
  if(Math.hypot(S.visitor.x-S.pixel.x,S.visitor.y-S.pixel.y)<30){
    S.catPets=(S.catPets||0)+1;LS.set('catPets',S.catPets);
    S.floatTexts.push({x:S.pixel.x,y:S.pixel.y-20,text:'❤️',timer:1.5});
    checkAchievements();
  }
}

}

function adjustBrightness(hex,percent){
  const num=parseInt(hex.replace('#',''),16),amt=Math.round(2.55*percent);
  const R=(num>>16)+amt,G=(num>>8&0x00FF)+amt,B=(num&0x0000FF)+amt;
  return'#'+(0x1000000+(R<255?R<1?0:R:255)*0x10000+(G<255?G<1?0:G:255)*0x100+(B<255?B<1?0:B:255)).toString(16).slice(1);
}

async function loadVisitorMemory(){
  const name=LS.get('visitorName','Visitor');
  if(name==='Visitor')return;
  
  try{
    const r=await fetch(`/api/visitor-memory?name=${encodeURIComponent(name)}`);
    const memory=await r.json();
    
    if(memory.visitCount>0){
      // Echo remembers this visitor!
      const greetings=[
        `Welcome back ${name}! Visit #${memory.visitCount+1}. 🔮`,
        `Hey ${name}! Good to see you again! Last time you were on F${memory.favFloor}.`,
        `${name}! You've earned ${memory.totalCoins||0}◈ in your visits here. Welcome back!`
      ];
      
      if(memory.highScores){
        const topGame=Object.entries(memory.highScores).sort((a,b)=>b[1]-a[1])[0];
        if(topGame[1]>0){
          greetings.push(`${name}! Your best ${topGame[0]} score was ${topGame[1]}. Ready to beat it?`);
        }
      }
      
      const greeting=greetings[Math.floor(Math.random()*greetings.length)];
      setTimeout(()=>{addChatMsg('Echo',greeting);showThought(greeting.split('.')[0])},2000);
    }
  } catch(e){
    console.log('Visitor memory not available:',e.message);
  }
}

async function saveVisitorMemory(){
  const name=LS.get('visitorName','Visitor');
  if(name==='Visitor')return;
  
  try{
    await fetch('/api/visitor-memory',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        visitorName:name,
        highScores:S.highScores,
        favFloor:S.floor,
        totalCoins:Coins.lifetime,
        lastWords:S.lastChatMessage||''
      })
    });
  } catch(e){
    console.log('Failed to save visitor memory:',e.message);
  }
}

function updateSpacewalk(dt){
  if(!S.spacewalk.active)return;
  
  const sw=S.spacewalk;
  // Reduced gravity physics
  const thrust=120; // pixels/sec
  let dx=0,dy=0;
  
  if(S.keys.up)dy=-1;if(S.keys.down)dy=1;if(S.keys.left)dx=-1;if(S.keys.right)dx=1;
  
  if(dx||dy){
    const len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;
    sw.vx+=dx*thrust*dt;sw.vy+=dy*thrust*dt;
    
    // Particle effects from thruster
    for(let i=0;i<3;i++){
      S.particles.push({
        x:sw.x-dx*15+Math.random()*10-5,y:sw.y-dy*15+Math.random()*10-5,
        vx:-dx*50+Math.random()*20-10,vy:-dy*50+Math.random()*20-10,
        life:15+Math.random()*10,color:'#00fff7',size:2
      });
    }
  }
  
  // Apply velocity with drag
  sw.x+=sw.vx*dt;sw.y+=sw.vy*dt;
  sw.vx*=.95;sw.vy*=.95; // space drag
  
  // Keep in bounds with momentum bounce
  if(sw.x<20){sw.x=20;sw.vx=Math.abs(sw.vx)*.7}
  if(sw.x>W-20){sw.x=W-20;sw.vx=-Math.abs(sw.vx)*.7}
  if(sw.y<20){sw.y=20;sw.vy=Math.abs(sw.vy)*.7}
  if(sw.y>H-20){sw.y=H-20;sw.vy=-Math.abs(sw.vy)*.7}
  
  // Earth rotation
  sw.earthAngle+=dt*.1;
  
  // Debris physics and collection
  sw.debris.forEach((d,i)=>{
    if(d.collected)return;
    d.x+=d.vx*dt;d.y+=d.vy*dt;
    // Wrap around screen
    if(d.x<-10)d.x=W+10;if(d.x>W+10)d.x=-10;
    if(d.y<-10)d.y=H+10;if(d.y>H+10)d.y=-10;
    
    // Collection check
    if(Math.hypot(d.x-sw.x,d.y-sw.y)<d.size+8){
      d.collected=true;Coins.earn(d.value,'debris');
      S.floatTexts.push({text:`+${d.value}◈`,x:d.x,y:d.y-20,color:'#ffd700',life:60});
      ArcSnd?.play('coin');
    }
  });
  
  // Remove collected debris
  sw.debris=sw.debris.filter(d=>!d.collected);
  
  // Check if near station (to return)
  const stationCenterX=W/2,stationCenterY=H/2;
  if(Math.hypot(sw.x-stationCenterX,sw.y-stationCenterY)<40){
    if(!sw._nearStation){
      sw._nearStation=true;
      showNotification("Press 🚀 to dock with station");
    }
  } else {
    sw._nearStation=false;
  }
}

  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(earthX,earthY,earthR,0,Math.PI*2);ctx.fill();

  }
  // Station solar panels
  ctx.fillStyle='#1a1a4a';ctx.fillRect(stationX-10,stationY+15,8,10);
  ctx.fillRect(stationX+stationW+2,stationY+15,8,10);
  
  // Asteroid (mini-asteroid to land on)
  const asteroidX=100,asteroidY=400,asteroidR=25;
  ctx.fillStyle='#4a3a2a';ctx.beginPath();ctx.arc(asteroidX,asteroidY,asteroidR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a2a1a';
  for(let i=0;i<6;i++){
    const a=i*1.05,r=asteroidR*.8;
    ctx.beginPath();ctx.arc(asteroidX+Math.cos(a)*r,asteroidY+Math.sin(a)*r,3,0,Math.PI*2);ctx.fill();
  }
  
  // Flag on asteroid (if planted)
  if(sw.flagPlanted){
    ctx.fillStyle='#888';ctx.fillRect(asteroidX-2,asteroidY-asteroidR-15,2,15);
    ctx.fillStyle='#ff4444';ctx.fillRect(asteroidX,asteroidY-asteroidR-12,12,8);
    ctx.fillStyle='#fff';ctx.font='8px sans-serif';ctx.fillText('🌍',asteroidX+2,asteroidY-asteroidR-6);
  }
  
  // Space debris
  sw.debris.forEach(d=>{
    if(d.collected)return;
    const pulse=.7+Math.sin(S.time*4+d.x*.01)*.3;
    ctx.fillStyle=d.type==='crystal'?`rgba(0,255,200,${pulse})`:`rgba(150,150,150,${pulse})`;
    ctx.beginPath();ctx.arc(d.x,d.y,d.size,0,Math.PI*2);ctx.fill();
    
    if(d.type==='crystal'){
      ctx.fillStyle=`rgba(0,255,200,${pulse*.5})`;
      ctx.beginPath();ctx.arc(d.x,d.y,d.size*2,0,Math.PI*2);ctx.fill();
    }
  });
  
  // Visitor in space suit
  const v=S.visitor;
  ctx.save();ctx.translate(sw.x,sw.y);
  // Space suit (white with helmet)
  ctx.fillStyle='#ffffff';ctx.fillRect(-12,-15,24,20);
  ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(0,-20,10,0,Math.PI*2);ctx.fill(); // helmet
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(0,-20,8,0,Math.PI*2);ctx.fill(); // visor
  // Jetpack thrusters
  if(dx||dy){
    ctx.fillStyle='#00fff7';
    for(let i=0;i<3;i++){
      ctx.beginPath();ctx.arc(-dx*20+Math.random()*6-3,-dy*20+Math.random()*6-3,2,0,Math.PI*2);ctx.fill();
    }
  }
  // Life support backpack
  ctx.fillStyle='#666';ctx.fillRect(-10,5,20,8);
  // Tether cable to station
  ctx.strokeStyle='rgba(200,200,200,.4)';ctx.lineWidth=1;ctx.setLineDash([2,2]);

  ctx.fillText(`Oxygen: ${Math.floor(sw.oxygen)}%`,15,40);
  ctx.fillText(`Debris: ${sw.debris.length} left`,15,55);
  
  // Instructions
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText('WASD: Thrusters • 🚀: Return to station',W/2,H-20);
  if(Math.hypot(sw.x-asteroidX,sw.y-asteroidY)<asteroidR+15){
    ctx.fillText('SPACE: Plant flag on asteroid',W/2,H-35);
  }
  ctx.textAlign='left';
}
function update(dt){
  S.time+=dt;
  if(S.spacewalk.active){updateSpacewalk(dt);return} // Spacewalk overrides normal game
  EchoAI.update(dt);
  updateVisitor(dt);
  S.nearObject=S.echo.floor===S.floor?getNearObject():null;
  // Track visited
  if(S.nearObject&&!S._visited.includes(S.nearObject.id)){S._visited.push(S.nearObject.id);LS.set('visited_objs',S._visited);Coins.earn(2,'explore');checkAchievements()}
  updatePixel(dt);
  if(S.thoughtTimer>0)S.thoughtTimer-=dt;
  S.idleThoughtTimer+=dt;
  if(!S.echo.moving&&S.idleThoughtTimer>20+Math.random()*10){S.idleThoughtTimer=0;const pool=[...BASE_THOUGHTS,...(FLOOR_THOUGHTS[S.floor]||[])];showThought(pool[Math.random()*pool.length|0])}
  if(S.floor===1){TV.update(dt);updateSabers(dt)}
  Mood.update(dt);
  // Aurora randomizer (floor 2)
  S.auroraTimer+=dt;if(S.auroraTimer>30){S.auroraTimer=0;S.auroraActive=Math.random()<.3}
  // Check data fragment proximity
  DATA_FRAGMENTS.filter(f=>f.floor===S.floor&&!S.dataFragments.includes(f.id)).forEach(f=>{if(Math.hypot(S.echo.x-f.x,S.echo.y-f.y)<25){S.dataFragments.push(f.id);LS.set('dataFragments',S.dataFragments);Coins.earn(50,'fragment');showNotification('💾 Data Fragment Found! ('+S.dataFragments.length+'/5)');checkAchievements()}});
  // Track floor visits
  const fv=LS.get('floorsVisited',[]);if(!fv.includes(S.floor)){fv.push(S.floor);LS.set('floorsVisited',fv);checkAchievements()}
  // Multiplayer: send position & lerp others
  EchoWS.sendPosition();
  for(const id in S.otherPlayers){const op=S.otherPlayers[id];op.x+=(op.tx-op.x)*.2;op.y+=(op.ty-op.y)*.2;if(op.swingTimer>0){op.swingTimer-=dt*3;if(op.swingTimer<0)op.swingTimer=0}}
}

function interact(){
  if(!S.nearObject||S.echo.interacting||S.echo.transforming)return;
  const id=S.nearObject.id;
  switch(id){
    case'elevator':openElevator();break;
    case'crystal':showFortune();break;
    case'bookshelf':openBookPopup();break;
    case'arcade':case'arcade_snake':openArcade('snake');break;
    case'arcade_breakout':openArcade('breakout');break;
    case'arcade_invaders':openArcade('invaders');break;
    case'kitchen':showEspressoMenu();break;

function createPopup(html){
  const ov=document.createElement('div');ov.className='popup-overlay';
  const p=document.createElement('div');p.className='popup';p.innerHTML='<span class="close-btn">&times;</span>'+html;
  p.querySelector('.close-btn').onclick=()=>ov.remove();ov.onclick=e=>{if(e.target===ov)ov.remove()};
  ov.appendChild(p);document.body.appendChild(ov);return{ov,p};
}

// Lightsaber system
S._saberGreen=0;S._saberBlue=0;S._saberState='off';// off, green, blue, both, duel
S._saberDuelTimer=0;S._saberClashes=[];
S._visitorSaber=null;// null, 'green', 'blue'
S._saberSwing=0;S._saberSwingDir=0;
function swingSaber(){
  if(!S._visitorSaber||S._saberSwing>0)return;
  if(!S.audioCtx)initAudio();
  S._saberSwing=1;S._saberSwingDir=S.visitor.dir;
  playSaberSound('clash');
  S.screenShake=2;
  const col=S._visitorSaber==='green'?'#00ff44':'#4488ff';
  for(let i=0;i<10;i++)S.particles.push({x:S.visitor.x+(S.visitor.dir===2?20:-20),y:S.visitor.y-15,vx:(S.visitor.dir===2?1:-1)*Math.random()*4,vy:(Math.random()-.5)*4,life:15,color:col,size:2+Math.random()*2});
  // Broadcast swing to other players
  if(EchoWS.ws?.readyState===1)EchoWS.ws.send(JSON.stringify({type:'player.swing',saber:S._visitorSaber,dir:S.visitor.dir}));
  // Hit Pixel?!
  if(S.pixel.floor===S.floor&&Math.hypot(S.visitor.x-S.pixel.x,S.visitor.y-S.pixel.y)<45){
    const reactions=[
      {thought:"*Pixel DODGES with lightning reflexes* 😼",pixelState:'flee'},
      {thought:"*Pixel catches the blade in her teeth?!* HOW?! 🐱",pixelState:'smug'},
      {thought:"*Pixel phases through the saber like a ghost* ...what IS she? 👻",pixelState:'flee'},
      {thought:"*Pixel deflects it with her crystal collar!* ✨",pixelState:'deflect'},
      {thought:"*Pixel sits down and yawns* You can't hurt what doesn't care. 😴",pixelState:'smug'},
      {thought:"*Pixel backflips over the saber* SHE'S A JEDI?! 🐱‍👤",pixelState:'flee'},
      {thought:"*The saber passes through Pixel harmlessly. She's made of pure vibes.* 🔮",pixelState:'smug'},
      {thought:"*Pixel hisses and the saber FLICKERS?!* She has Force powers!! ⚡",pixelState:'deflect'},
    ];
    const r=reactions[Math.random()*reactions.length|0];
    showThought(r.thought);
    // Pixel reaction
    if(r.pixelState==='flee'){
      // Pixel zooms away
      S.pixel.targetX=S.pixel.x+(Math.random()>.5?200:-200);
      S.pixel.targetY=S.pixel.y+(Math.random()>.5?150:-150);
      S.pixel.targetX=Math.max(30,Math.min(W-30,S.pixel.targetX));
      S.pixel.targetY=Math.max(80,Math.min(H-30,S.pixel.targetY));
      S.pixel.state='walk';S.pixel.stateTimer=0;
    }else if(r.pixelState==='deflect'){
      // Deflect sparks from Pixel's collar
      S.screenShake=3;
      for(let i=0;i<15;i++)S.particles.push({x:S.pixel.x,y:S.pixel.y-10,vx:(Math.random()-.5)*6,vy:-Math.random()*4,life:20,color:Math.random()>.5?'#c080ff':'#ffd700',size:2+Math.random()*2});
      playSaberSound('clash');
    }else{
      // Smug — Pixel just sits there, maybe purrs
      for(let i=0;i<5;i++)S.floatTexts.push({text:'😼',x:S.pixel.x-5+Math.random()*10,y:S.pixel.y-20-Math.random()*15,color:'#c080ff',life:40});
    }
    // Pixel fights back — FORCE PUSH the player!
    const pushDist=80+Math.random()*60;
    const dx=S.visitor.x-S.pixel.x,dy=S.visitor.y-S.pixel.y;
    const dist=Math.hypot(dx,dy)||1;
    const pushX=S.visitor.x+(dx/dist)*pushDist,pushY=S.visitor.y+(dy/dist)*pushDist;
    S.visitor.x=Math.max(30,Math.min(W-30,pushX));
    S.visitor.y=Math.max(80,Math.min(H-30,pushY));
    S.screenShake=5;
    // Force push wave effect
    for(let i=0;i<20;i++){const a=Math.atan2(dy,dx)+((Math.random()-.5)*.8);const sp=3+Math.random()*5;S.particles.push({x:S.pixel.x+(dx/dist)*15,y:S.pixel.y-5+(dy/dist)*15,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:20,color:'#c080ff',size:2+Math.random()*3})}
    // Shockwave ring
    for(let i=0;i<12;i++){const a=i/12*Math.PI*2;S.particles.push({x:S.pixel.x+Math.cos(a)*8,y:S.pixel.y-5+Math.sin(a)*8,vx:Math.cos(a)*4,vy:Math.sin(a)*4,life:15,color:'#ffd700',size:1.5})}

function playSaberSound(type){
  if(!S.audioCtx)return;const c=S.audioCtx,n=c.currentTime,v=S.volume*.2;
  if(type==='ignite'){
    const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(80,n);o.frequency.exponentialRampToValueAtTime(220,n+.3);
    g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(v*.3,n+.3);g.gain.exponentialRampToValueAtTime(.001,n+.8);
    o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.8);
    // Hum layer
    const o2=c.createOscillator(),g2=c.createGain();o2.type='sine';o2.frequency.value=120;
    g2.gain.setValueAtTime(0,n);g2.gain.linearRampToValueAtTime(v*.15,n+.3);g2.gain.setValueAtTime(v*.15,n+2);g2.gain.exponentialRampToValueAtTime(.001,n+3);
    o2.connect(g2);g2.connect(S.masterGain);o2.start(n);o2.stop(n+3);
  }else if(type==='retract'){
    const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(220,n);o.frequency.exponentialRampToValueAtTime(60,n+.4);
    g.gain.setValueAtTime(v*.5,n);g.gain.exponentialRampToValueAtTime(.001,n+.5);
    o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.5);
  }else if(type==='clash'){
    const buf=c.createBuffer(1,c.sampleRate*.15,c.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*3)*.5;
    const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;g.gain.value=v*1.5;
    s.connect(g);g.connect(S.masterGain);s.start(n);
    const o=c.createOscillator(),g2=c.createGain();o.type='square';o.frequency.value=800+Math.random()*400;
    g2.gain.setValueAtTime(v*.3,n);g2.gain.exponentialRampToValueAtTime(.001,n+.1);
    o.connect(g2);g2.connect(S.masterGain);o.start(n);o.stop(n+.1);
  }
}
function updateSabers(dt){
  const tgt={off:[0,0],green:[1,0],blue:[0,1],both:[1,1],duel:[1,1]};
  const t=tgt[S._saberState]||[0,0];
  S._saberGreen+=(t[0]-S._saberGreen)*dt*5;S._saberBlue+=(t[1]-S._saberBlue)*dt*5;
  // Swing animation decay
  if(S._saberSwing>0){S._saberSwing-=dt*3;if(S._saberSwing<0)S._saberSwing=0}
  if(S._saberGreen<.01)S._saberGreen=0;if(S._saberBlue<.01)S._saberBlue=0;
  // Duel mode: sabers swing and clash
  if(S._saberState==='duel'){
    S._saberDuelTimer+=dt;
    if(S._saberDuelTimer>.6+Math.random()*.4){
      S._saberDuelTimer=0;
      // Clash effect
      S._saberClashes.push({x:310+85,y:72+8,life:12});
      playSaberSound('clash');
      S.screenShake=2;
      for(let i=0;i<6;i++)S.particles.push({x:310+85+Math.random()*10-5,y:72+8,vx:(Math.random()-.5)*4,vy:-Math.random()*3,life:15,color:Math.random()>.5?'#00ff44':'#4488ff',size:2});
    }
    // Render clash sparks
    for(let i=S._saberClashes.length-1;i>=0;i--){S._saberClashes[i].life--;if(S._saberClashes[i].life<=0)S._saberClashes.splice(i,1)}
  }
}

// WebSocket bridge to Echo AI
const EchoWS={ws:null,connected:false,
  connect(){try{const proto=location.protocol==='https:'?'wss:':'ws:';const port=location.port?':'+location.port:'';this.ws=new WebSocket(`${proto}//${location.hostname}${port}/ws`);
    this.ws.onopen=()=>{};
    this.ws.onmessage=(e)=>{try{const msg=JSON.parse(e.data);
      if(msg.type==='status'){this.connected=msg.connected;this.updateIndicator()}
      else if(msg.type==='chat.chunk'&&msg.text){
        if(!this._streaming){this._streaming=true;this._streamBuf='';this._streamEl=null}
        this._streamBuf+=msg.text;
        // Update or create streaming message bubble
        if(!this._streamEl){
          addChatMsg('Echo','...');
          const msgs=document.querySelectorAll('#chat-log .chat-msg');
          this._streamEl=msgs[msgs.length-1]?.querySelector('.msg-text')||null;
        }
        if(this._streamEl)this._streamEl.textContent=this._streamBuf;
      }
      else if(msg.type==='chat.done'){this._streaming=false;this._streamEl=null;this._streamBuf='';showSuggestions()}
      else if(msg.type==='chat.message'&&msg.content){if(!this._streaming){addChatMsg('Echo',msg.content);showSuggestions()}}
      // Multiplayer messages
      else if(msg.type==='players.init'){S.myPlayerId=msg.id;S.otherPlayers={};(msg.players||[]).forEach(p=>{S.otherPlayers[p.id]={name:p.name,x:p.x,y:p.y,tx:p.x,ty:p.y,dir:p.dir,floor:p.floor,skin:p.skin}});this._updatePlayerCount()}
      else if(msg.type==='player.join'){S.otherPlayers[msg.player.id]={name:msg.player.name,x:msg.player.x,y:msg.player.y,tx:msg.player.x,ty:msg.player.y,dir:msg.player.dir,floor:msg.player.floor,skin:msg.player.skin};this._updatePlayerCount()}
      else if(msg.type==='player.leave'){delete S.otherPlayers[msg.id];this._updatePlayerCount()}
      else if(msg.type==='player.move'){const op=S.otherPlayers[msg.id];if(op){op.tx=msg.x;op.ty=msg.y;op.dir=msg.dir;op.floor=msg.floor;if(msg.name)op.name=msg.name;if(msg.skin)op.skin=msg.skin}}
      else if(msg.type==='player.swing'){const op=S.otherPlayers[msg.id];if(op){op.swingTimer=1;op.swingSaber=msg.saber;op.swingDir=msg.dir}}
      else if(msg.type==='player.saber'){const op=S.otherPlayers[msg.id];if(op)op.saber=msg.saber}

function startArcadeRender(){const cv=$('#arcade-canvas'),cx=cv.getContext('2d');let lastT=performance.now();const frame=t=>{const dt=Math.min((t-lastT)/1000,.05);lastT=t;arcSelectTimer+=dt;cx.fillStyle='#0a0a12';cx.fillRect(0,0,ARC_W,ARC_H);

// -- Snake --
function initSnake(g){const GS=15,CS=Math.floor(Math.min(g.w,g.h-30)/GS);g.gs=GS;g.cs=CS;g.ox=(g.w-GS*CS)/2;g.oy=20;g.snake=[{x:7,y:7},{x:6,y:7},{x:5,y:7}];g.dir={x:1,y:0};g.nextDir={x:1,y:0};g.food=null;g.spawnFood=true;g.score=0;g.tick=0;g.speed=8;
  document.onkeydown=e=>{if(!g.running)return;if((e.key==='ArrowUp'||e.key==='w')&&g.dir.y!==1)g.nextDir={x:0,y:-1};if((e.key==='ArrowDown'||e.key==='s')&&g.dir.y!==-1)g.nextDir={x:0,y:1};if((e.key==='ArrowLeft'||e.key==='a')&&g.dir.x!==1)g.nextDir={x:-1,y:0};if((e.key==='ArrowRight'||e.key==='d')&&g.dir.x!==-1)g.nextDir={x:1,y:0};e.preventDefault()};

  acv.ontouchmove=e=>{e.preventDefault()};
  acv.ontouchend=e=>{if(!touchStart||!g.running)return;const dx=e.changedTouches[0].clientX-touchStart.x,dy=e.changedTouches[0].clientY-touchStart.y;
    if(Math.abs(dx)>Math.abs(dy)){if(dx>20&&g.dir.x!==1)g.nextDir={x:1,y:0};else if(dx<-20&&g.dir.x!==-1)g.nextDir={x:-1,y:0}}
    else{if(dy>20&&g.dir.y!==1)g.nextDir={x:0,y:1};else if(dy<-20&&g.dir.y!==-1)g.nextDir={x:0,y:-1}}touchStart=null;e.preventDefault()}}
function updateSnake(cx,dt){const g=arcadeGame;if(!g?.running)return;g.tick++;
  if(g.spawnFood){const occ=new Set(g.snake.map(s=>s.x+','+s.y));let fx,fy;do{fx=Math.random()*g.gs|0;fy=Math.random()*g.gs|0}while(occ.has(fx+','+fy));const r=Math.random();g.food={x:fx,y:fy,type:r<.05?'star':r<.15?'golden':'apple',pts:r<.05?5:r<.15?3:1,color:r<.05?'#ffd700':r<.15?'#ffaa00':'#ff4444',timer:0};g.spawnFood=false}
  g.food&&(g.food.timer+=dt);g.speed=Math.max(3,8-Math.floor(g.snake.length/5));
  if(g.tick%g.speed===0){g.dir=g.nextDir;let h={x:g.snake[0].x+g.dir.x,y:g.snake[0].y+g.dir.y};if(h.x<0||h.x>=g.gs||h.y<0||h.y>=g.gs){g.running=false;triggerGameOver('snake',g.score);return}if(g.snake.some(s=>s.x===h.x&&s.y===h.y)){g.running=false;triggerGameOver('snake',g.score);return}g.snake.unshift(h);if(g.food&&h.x===g.food.x&&h.y===g.food.y){g.score+=g.food.pts;ArcSnd.play(g.food.type==='star'?'powerup':'eat');arcSpawnParticles(g.ox+g.food.x*g.cs+g.cs/2,g.oy+g.food.y*g.cs+g.cs/2,g.food.pts*5,g.food.color);g.spawnFood=true}else g.snake.pop()}
  cx.fillStyle='#0a0a12';cx.fillRect(0,0,g.w,g.h);for(let y=0;y<g.gs;y++)for(let x=0;x<g.gs;x++){cx.fillStyle='#111';cx.fillRect(g.ox+x*g.cs+1,g.oy+y*g.cs+1,g.cs-2,g.cs-2)}
  g.snake.forEach((s,i)=>{ctx.fillStyle=`rgb(0,${255-i/(g.snake.length)*180},${100-i/(g.snake.length)*80})`;cx.fillStyle=ctx.fillStyle;cx.fillRect(g.ox+s.x*g.cs+1,g.oy+s.y*g.cs+1,g.cs-2,g.cs-2)});

  cx.fillStyle='#0f0';cx.font='bold 12px monospace';cx.textAlign='left';cx.fillText('SCORE: '+g.score,8,14);cx.fillStyle='#ffd700';cx.textAlign='right';cx.fillText('HI: '+(S.highScores.snake||0),g.w-8,14);cx.textAlign='left'}

function initBreakout(g){g.pw=70;g.ph=10;g.px=(g.w-g.pw)/2;g.py=g.h-40;g.balls=[{x:g.w/2,y:g.py-10,dx:2.5,dy:-2.5,trail:[]}];g.score=0;g.lives=3;g.level=1;g.bricks=[];g.powerups=[];g.activePowers={};
  for(let r=0;r<5;r++)for(let c=0;c<10;c++)g.bricks.push({x:4+c*41,y:30+r*18,w:39,h:16,hp:r<2?1:r<4?2:3,alive:true,color:['#ff4444','#ff4444','#ff8844','#ff8844','#ffdd44'][r]});

  acv.ontouchstart=e=>e.preventDefault()}
function updateBreakout(cx,dt){const g=arcadeGame;if(!g?.running)return;
  if(g._left)g.px=Math.max(0,g.px-6);if(g._right)g.px=Math.min(g.w-g.pw,g.px+6);
  const pw=g.activePowers?.wide?g.pw*1.5:g.pw;Object.keys(g.activePowers||{}).forEach(k=>{g.activePowers[k]-=dt;if(g.activePowers[k]<=0)delete g.activePowers[k]});
  const speed=2.5+g.level*.3;
  g.balls=g.balls.filter(ball=>{ball.x+=ball.dx;ball.y+=ball.dy;const mag=Math.hypot(ball.dx,ball.dy);if(mag>0){ball.dx=ball.dx/mag*speed;ball.dy=ball.dy/mag*speed}
    if(ball.x<5){ball.x=5;ball.dx=Math.abs(ball.dx)}if(ball.x>g.w-5){ball.x=g.w-5;ball.dx=-Math.abs(ball.dx)}if(ball.y<5){ball.y=5;ball.dy=Math.abs(ball.dy)}
    if(ball.y>g.h){g.lives--;ArcSnd.play('die');if(g.lives<=0){g.running=false;triggerGameOver('breakout',g.score);return false}ball.x=g.px+pw/2;ball.y=g.py-10;ball.dx=2;ball.dy=-2.5;return true}
    if(ball.dy>0&&ball.y>=g.py-4&&ball.y<=g.py+4&&ball.x>=g.px-2&&ball.x<=g.px+pw+2){ball.dy=-Math.abs(ball.dy);ball.dx+=((ball.x-(g.px+pw/2))/(pw/2))*2;ArcSnd.play('paddle')}
    g.bricks.forEach(b=>{if(!b.alive)return;if(ball.x>b.x&&ball.x<b.x+b.w&&ball.y>b.y&&ball.y<b.y+b.h){b.hp--;if(b.hp<=0){b.alive=false;g.score++;ArcSnd.play('hit');arcSpawnParticles(b.x+b.w/2,b.y+b.h/2,8,b.color)}else{ArcSnd.play('hit')}ball.dy*=-1}});return true});
  if(g.balls.length===0&&g.lives>0)g.balls.push({x:g.px+pw/2,y:g.py-10,dx:2,dy:-2.5,trail:[]});
  if(g.bricks.every(b=>!b.alive)){g.level++;ArcSnd.play('levelup');Coins.earn(1,'breakout-lvl');arcCoinsEarned++;if(g.level>5){g.running=false;triggerGameOver('breakout',g.score);return}for(let r=0;r<5;r++)for(let c=0;c<10;c++)g.bricks.push({x:4+c*41,y:30+r*18,w:39,h:16,hp:Math.min(3,1+Math.floor(r/2)),alive:true,color:['#ff4444','#ff8844','#ffdd44','#44ff88','#4488ff'][r]});g.balls=[{x:g.w/2,y:g.py-10,dx:2,dy:-2.5,trail:[]}]}
  cx.fillStyle='#0a0a12';cx.fillRect(0,0,g.w,g.h);g.bricks.forEach(b=>{if(!b.alive)return;cx.fillStyle=b.color;cx.fillRect(b.x,b.y,b.w,b.h)});
  cx.fillStyle='#fff';cx.fillRect(g.px,g.py,pw,g.ph);
  g.balls.forEach(b=>{cx.fillStyle='#ff0';cx.beginPath();cx.arc(b.x,b.y,5,0,Math.PI*2);cx.fill()});
  cx.fillStyle='#fff';cx.font='bold 11px monospace';cx.textAlign='left';cx.fillText('SCORE:'+g.score,8,16);cx.fillStyle='#ff4444';cx.textAlign='right';let l='';for(let i=0;i<g.lives;i++)l+='♥';cx.fillText(l,g.w-8,16);cx.textAlign='left'}

// -- Invaders --
function initInvaders(g){g.px=g.w/2-12;g.py=g.h-35;g.pw=24;g.bullets=[];g.eBullets=[];g.score=0;g.lives=3;g.wave=1;g.tick=0;g.eShootTimer=0;
  g.enemies=[];g.edir=1;g.eSpeed=1;spawnWave(g,1);
  g.shields=[];for(let i=0;i<4;i++)for(let r=0;r<3;r++)for(let c=0;c<5;c++)g.shields.push({x:60+i*90+c*6,y:g.h-70+r*6,w:5,h:5,hp:3});
  document.onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='a')g._left=true;if(e.key==='ArrowRight'||e.key==='d')g._right=true;if(e.key===' '&&g.bullets.length<3){g.bullets.push({x:g.px+g.pw/2,y:g.py-2});ArcSnd.play('shoot')}e.preventDefault()};
  document.onkeyup=e=>{if(e.key==='ArrowLeft'||e.key==='a')g._left=false;if(e.key==='ArrowRight'||e.key==='d')g._right=false};
  // Touch: tap left/right to move, center to shoot
  const acv=$('#arcade-canvas');
  acv.ontouchstart=e=>{e.preventDefault();const rect=acv.getBoundingClientRect(),tx=(e.touches[0].clientX-rect.left)/rect.width;
    if(tx<.35)g._left=true;else if(tx>.65)g._right=true;else if(g.bullets.length<3){g.bullets.push({x:g.px+g.pw/2,y:g.py-2});ArcSnd.play('shoot')}};
  acv.ontouchend=e=>{e.preventDefault();g._left=false;g._right=false}}
function spawnWave(g,w){g.enemies=[];const cols=Math.min(8+Math.floor(w/3),10);for(let r=0;r<5;r++)for(let c=0;c<cols;c++)g.enemies.push({x:20+c*38,y:40+r*28,w:28,h:20,alive:true,row:r,frame:0,frameTimer:0,pts:(5-r)*10,color:['#ff4444','#ff8844','#ffdd44','#44ff88','#4488ff'][r]});g.edir=1;g.eSpeed=1+w*.15;g.eShootTimer=0}
function updateInvaders(cx,dt){const g=arcadeGame;if(!g?.running)return;g.tick++;
  if(g._left)g.px=Math.max(0,g.px-4);if(g._right)g.px=Math.min(g.w-g.pw,g.px+4);
  g.bullets=g.bullets.filter(b=>{b.y-=6;return b.y>-10});
  const alive=g.enemies.filter(e=>e.alive);alive.forEach(e=>{e.frameTimer+=dt;if(e.frameTimer>.5){e.frame=1-e.frame;e.frameTimer=0}});
  const mr=Math.max(1,30-Math.floor((g.enemies.length-alive.length)/3));if(g.tick%mr===0){let edge=false;alive.forEach(e=>{e.x+=g.edir*8*g.eSpeed;if(e.x<5||e.x+e.w>g.w-5)edge=true});if(edge){g.edir*=-1;alive.forEach(e=>{e.y+=8;if(e.y+e.h>=g.py){g.running=false;triggerGameOver('invaders',g.score);return}})}}
  g.eShootTimer+=dt;if(g.eShootTimer>=Math.max(.5,2-g.wave*.15)&&alive.length>0){g.eShootTimer=0;const sh=alive[Math.random()*alive.length|0];g.eBullets.push({x:sh.x+sh.w/2,y:sh.y+sh.h,dy:3+g.wave*.3})}
  g.eBullets=g.eBullets.filter(b=>{b.y+=b.dy;return b.y<g.h+10});
  g.bullets.forEach(b=>{alive.forEach(e=>{if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){e.alive=false;g.score+=e.pts;b.y=-100;ArcSnd.play('explode');arcSpawnParticles(e.x+e.w/2,e.y+e.h/2,12,e.color)}})});
  g.eBullets.forEach(b=>{if(b.y>=g.py&&b.y<=g.py+12&&b.x>=g.px&&b.x<=g.px+g.pw){g.lives--;b.y=9999;ArcSnd.play('die');if(g.lives<=0){g.running=false;triggerGameOver('invaders',g.score)}}});
  g.shields=g.shields.filter(s=>{if(s.hp<=0)return false;g.bullets.forEach(b=>{if(b.x>s.x&&b.x<s.x+s.w&&b.y>s.y&&b.y<s.y+s.h){s.hp--;b.y=-100}});g.eBullets.forEach(b=>{if(b.x>s.x&&b.x<s.x+s.w&&b.y>s.y&&b.y<s.y+s.h){s.hp--;b.y=9999}});return s.hp>0});
  if(alive.length===0){g.wave++;Coins.earn(1,'wave');arcCoinsEarned++;ArcSnd.play('levelup');spawnWave(g,g.wave)}
  cx.fillStyle='#0a0a12';cx.fillRect(0,0,g.w,g.h);
  g.shields.forEach(s=>{cx.fillStyle=`rgba(0,255,136,${s.hp/3})`;cx.fillRect(s.x,s.y,s.w,s.h)});
  alive.forEach(e=>{cx.fillStyle=e.color;cx.fillRect(e.x+4,e.y,e.w-8,e.h-4);cx.fillStyle='#fff';cx.fillRect(e.x+8,e.y+4,3,3);cx.fillRect(e.x+17,e.y+4,3,3)});
  cx.fillStyle='#00ff88';cx.fillRect(g.px,g.py,g.pw,10);cx.fillRect(g.px+g.pw/2-3,g.py-5,6,5);
  cx.fillStyle='#ff0';g.bullets.forEach(b=>cx.fillRect(b.x-1,b.y,2,8));
  cx.fillStyle='#f44';g.eBullets.forEach(b=>cx.fillRect(b.x-1,b.y,3,6));
  cx.fillStyle='#fff';cx.font='bold 11px monospace';cx.textAlign='left';cx.fillText('SCORE:'+g.score,8,14);cx.fillStyle='#00fff7';cx.textAlign='center';cx.fillText('WAVE '+g.wave,g.w/2,14);cx.fillStyle='#ff4444';cx.textAlign='right';let l='';for(let i=0;i<g.lives;i++)l+='▲';cx.fillText(l,g.w-8,14);cx.textAlign='left'}

// ═══════════════════════════════════════
// §23. WEATHER
// ═══════════════════════════════════════
async function fetchWeather(){try{const r=await fetch('https://wttr.in/Berlin?format=%t|%C');const t=await r.text();const parts=t.split('|');S.weather={temp:parts[0]?.trim()||'?',desc:(parts[1]||'clear').trim().toLowerCase(),icon:S.weather.desc.includes('rain')?'🌧️':S.weather.desc.includes('cloud')?'☁️':S.weather.desc.includes('snow')?'❄️':'☀️'};showThought(`Berlin: ${S.weather.icon} ${S.weather.temp}`)}catch{showThought('Weather signal lost...')}}

// ═══════════════════════════════════════
// §24. INPUT
// ═══════════════════════════════════════
function initInput(){
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect(),cx=(e.clientX-rect.left)/rect.width*W,cy=(e.clientY-rect.top)/rect.height*H;
    for(let i=0;i<6;i++)S.particles.push({x:cx,y:cy,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:15,color:'#00fff7',size:2});
    // Click Pixel — walk to her then pet
    if(S.pixel.floor===S.floor&&Math.hypot(S.pixel.x-cx,S.pixel.y-10-cy)<20){
      if(S.useVisitor){S.visitor.walkTarget={x:S.pixel.x,y:S.pixel.y+15,action:()=>petPixel()}}else petPixel();return}
    // Click Echo — walk to then interact
    if(S.echo.floor===S.floor&&Math.hypot(S.echo.x-cx,S.echo.y-20-cy)<30){
      if(S.useVisitor){S.visitor.walkTarget={x:S.echo.x,y:S.echo.y+15,action:()=>EchoAI.visitorClickEcho()}}else EchoAI.visitorClickEcho();return}
    // Click data fragment
    DATA_FRAGMENTS.filter(f=>f.floor===S.floor&&!S.dataFragments.includes(f.id)).forEach(f=>{if(Math.hypot(f.x-cx,f.y-cy)<15){S.dataFragments.push(f.id);LS.set('dataFragments',S.dataFragments);Coins.earn(50,'fragment');showNotification('💾 Data Fragment Found! ('+S.dataFragments.length+'/7)');checkAchievements()}});
    
    // Click hidden cartridge on F3
    if(S.floor===3&&cx>=298&&cx<=304&&cy>=268&&cy<=276){
      if(!LS.get('foundHiddenGame',false)){
        LS.set('foundHiddenGame',true);showNotification('🎮 Hidden game discovered!');
        Coins.earn(25,'hidden');for(let i=0;i<15;i++)S.particles.push({x:cx,y:cy,vx:(Math.random()-.5)*4,vy:-Math.random()*3,life:30,color:'#ff00ff',size:3});
      }
      openArcade('dungeon');return;
    }
    // Click objects — walk to then interact
    for(const o of getObjects()){if(!o.interact)continue;if(cx>o.x-10&&cx<o.x+o.w+10&&cy>o.y-10&&cy<o.y+o.h+10){
      if(S.useVisitor){S.visitor.walkTarget={x:o.x+o.w/2,y:o.y+o.h+10,action:()=>{S.nearObject=o;interact();Coins.earn(1,'click')}}}
      else{EchoAI.visitorClickObject(o);Coins.earn(1,'click')}return}}
    // Click empty space — just walk there
    if(S.useVisitor){S.visitor.walkTarget={x:cx,y:cy,action:null}}
  });
  // Hover for highlights
  canvas.addEventListener('mousemove',e=>{const rect=canvas.getBoundingClientRect(),cx=(e.clientX-rect.left)/rect.width*W,cy=(e.clientY-rect.top)/rect.height*H;S.hoverObject=null;S.hoverEcho=false;S.hoverPixel=false;for(const o of getObjects()){if(!o.interact)continue;if(cx>o.x-5&&cx<o.x+o.w+5&&cy>o.y-5&&cy<o.y+o.h+5){S.hoverObject=o;break}}});
  // Chat
  $('#chat-send').onclick=()=>{const inp=$('#chat-input'),msg=inp.value.trim();if(msg){handleChat(msg);inp.value=''}};
  $('#chat-input').onkeydown=e=>{if(e.key==='Enter')$('#chat-send').click()};
  // HUD buttons
  $('#btn-spacewalk').onclick=toggleSpacewalk;
  $('#btn-visitor-skin').onclick=showVisitorSkinPanel;
  $('#btn-skin').onclick=showSkinPanel;
  $('#btn-trophy').onclick=showAchievements;
  $('#btn-music').onclick=()=>{if(!S.audioCtx)initAudio();toggleMusic()};
  $('#vol-slider').oninput=e=>{S.volume=e.target.value/100;LS.set('volume',e.target.value);if(S.masterGain)S.masterGain.gain.value=S.volume};
  $('#arcade-close').onclick=closeArcade;
  // Mobile D-pad for visitor
  const dpadMap={['dp-up']:'up',['dp-down']:'down',['dp-left']:'left',['dp-right']:'right'};
  ['dp-up','dp-down','dp-left','dp-right'].forEach(id=>{
    const btn=$('#'+id);if(!btn)return;
    const key=dpadMap[id];
    btn.addEventListener('touchstart',e=>{e.preventDefault();S.keys[key]=true},{passive:false});
    btn.addEventListener('touchend',e=>{e.preventDefault();S.keys[key]=false});
    btn.addEventListener('mousedown',()=>S.keys[key]=true);
    btn.addEventListener('mouseup',()=>S.keys[key]=false);
    btn.addEventListener('mouseleave',()=>S.keys[key]=false);
  });
  // Visitor WASD/Arrow movement
  document.addEventListener('keydown',e=>{
    if(document.activeElement&&document.activeElement.tagName==='INPUT')return;
    if(arcadeGame)return; // don't interfere with arcade
    const k=e.key;
    if(k==='ArrowUp'||k==='w'||k==='W')S.keys.up=true;
    if(k==='ArrowDown'||k==='s'||k==='S')S.keys.down=true;
    if(k==='ArrowLeft'||k==='a'||k==='A')S.keys.left=true;
    if(k==='ArrowRight'||k==='d'||k==='D')S.keys.right=true;
    if(k===' '){e.preventDefault();visitorInteract()}
    if((k==='e'||k==='E')&&S._visitorSaber&&S._saberSwing<=0){e.preventDefault();swingSaber()}
    if((k==='q'||k==='Q')&&S._visitorSaber){e.preventDefault();S._visitorSaber=S._visitorSaber==='green'?'blue':'green';S._saberState=S._visitorSaber;playSaberSound('ignite');showThought(S._visitorSaber==='green'?'Switched to green!':'Switched to blue!')}
  });
  document.addEventListener('keyup',e=>{
    const k=e.key;
    if(k==='ArrowUp'||k==='w'||k==='W')S.keys.up=false;
    if(k==='ArrowDown'||k==='s'||k==='S')S.keys.down=false;
    if(k==='ArrowLeft'||k==='a'||k==='A')S.keys.left=false;
    if(k==='ArrowRight'||k==='d'||k==='D')S.keys.right=false;
  });
  S.useVisitor=true;
}

// ═══════════════════════════════════════
// §25. RESPONSIVE & GAME LOOP
// ═══════════════════════════════════════
function resizeCanvas(){const chatW=window.innerWidth>900?260:0,availW=window.innerWidth-chatW,availH=window.innerWidth>900?window.innerHeight:window.innerHeight-180;const scale=Math.min(availW/W,availH/H,1.5);canvas.style.width=W*scale+'px';canvas.style.height=H*scale+'px'}
let lastTime=0;
function gameLoop(time){const dt=Math.min((time-lastTime)/1000,.05);lastTime=time;update(dt);render();requestAnimationFrame(gameLoop)}

// ═══════════════════════════════════════
// §26. WELCOME & INIT
// ═══════════════════════════════════════
function runWelcome(){
  if(LS.get('welcomeDone13',false))return;LS.set('welcomeDone13',true);
  setTimeout(()=>{const b=$('#speech-bubble');b.style.display='block';b.style.left='280px';b.style.bottom='300px';b.innerHTML="Welcome to my space station! 🔮<br><br>I'm <b>Echo</b>. Click on anything to interact!<br>Use the <b>elevator</b> (left wall) to visit all 5 floors!<br><br>My cat <b>Pixel</b> lives here too 🐱<br>Make yourself at home!";setTimeout(()=>b.style.display='none',8000)},1000);
}

function load(){
  const bar=$('#load-bar');let p=0;
  const tips=['Pressurizing station...','Brewing zero-g espresso...','Waking Pixel...','Calibrating Earth viewport...','Establishing orbit...'];
  const iv=setInterval(()=>{p+=20;bar.style.width=p+'%';$('#load-tip').textContent=tips[p/20-1]||'';if(p>=100){clearInterval(iv);setTimeout(()=>{$('#loader').classList.add('done');setTimeout(()=>{$('#loader').style.display='none';init()},800)},300)}},250);
}

function init(){
  S.echo.skin=LS.get('echoSkin','classic');S.volume=LS.get('volume',30)/100;$('#vol-slider').value=S.volume*100;
  // Start Echo at time-appropriate spot
  const startSpots={morning:'bed',afternoon:'desk',evening:'sofa',night:'bed'};
  const startAct=startSpots[TOD]||'desk';const startSpot=ACTIVITY_SPOTS[startAct];
  if(startSpot){S.echo.x=startSpot.x;S.echo.y=startSpot.y;S.echo.dir=startSpot.dir;S.echo.floor=startSpot.floor;S.floor=startSpot.floor;LS.set('floor',S.floor)}
  S.pixel.floor=S.echo.floor;S.pixel.x=S.echo.x+20;S.pixel.y=S.echo.y+10;
  EchoAI.currentActivity=startAct;EchoAI.state='activity';EchoAI.activityTimer=0;
  $('#floor-hud').textContent=`F${S.floor} · ${FLOOR_NAMES[S.floor]}`;
  initInput();resizeCanvas();window.addEventListener('resize',resizeCanvas);
  Coins.initVisitRewards();updateCaffeineHUD();initGarden();
  S._prevAchCount=S.achievements.length;
  showSuggestions();runWelcome();
  EchoWS.connect();
  // Load visitor memory for Echo
  loadVisitorMemory();
  // Visitor name prompt on first visit
  if(!LS.get('visitorName')){
    const name=prompt('Welcome to Echo\'s Station! 🔮\nEnter your name:','Visitor');
    LS.set('visitorName',name||'Visitor');
  }
  S.visitor.x=350;S.visitor.y=480;S.useVisitor=true;
  // Save visitor memory on page unload
  window.addEventListener('beforeunload',saveVisitorMemory);
  requestAnimationFrame(gameLoop);
}

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',load);else load();

// Service Worker for PWA with notifications
if('serviceWorker' in navigator){
  const swCode=`
    self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>new Response('Offline'))));
    self.addEventListener('push',e=>{
      const data=e.data?e.data.json():{title:'Echo\\'s Station',body:'Pixel misses you! 🐱',icon:'🛸'};
      e.waitUntil(self.registration.showNotification(data.title,{body:data.body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" font-size="80">🛸</text></svg>',badge:'🔮'}));
    });
  `;
  navigator.serviceWorker.register('data:text/javascript,'+encodeURIComponent(swCode)).then(()=>{
    // Request notification permission on first visit
    if(!LS.get('notificationRequested',false)&&'Notification' in window){
      LS.set('notificationRequested',true);
      setTimeout(()=>{
        if(Notification.permission==='default'){
          Notification.requestPermission().then(permission=>{
            if(permission==='granted'){
              showNotification('🔔 Notifications enabled! Pixel will let you know when she misses you.');
            }
          });
        }
      },10000); // Wait 10s before asking
    }
  });
}

})();
