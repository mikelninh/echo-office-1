  },
  
  updateSol(npc, dt) {
    // Sol moves between garden plots
    if (npc.behaviorState === 'idle' && npc.behaviorTimer > 5 + Math.random() * 5) {
      const plots = [
        {x: 200, y: 300}, {x: 400, y: 350}, {x: 600, y: 300}, {x: 300, y: 450}
      ];
      const target = plots[Math.floor(Math.random() * plots.length)];
      npc.targetX = target.x;
      npc.targetY = target.y;
      npc.moving = true;
      npc.behaviorTimer = 0;
      npc.behaviorState = 'tending';
    }
    
    // Sometimes kneels to tend plants
    if (!npc.moving && Math.random() < 0.005) {
      npc.dir = 0; // Face down to tend plants
    }
    
    // Floating leaf particles
    if (Math.random() < 0.015) {
      S.particles.push({
        x: npc.x + (Math.random() - 0.5) * 25,
        y: npc.y - 15,
        vx: (Math.random() - 0.5) * 1,
        vy: -Math.random() * 2,
        life: 80,
        color: '#44aa44',
        size: 2
      });
    }
  },
  
  updateGlitch(npc, dt) {
    // Glitch stands near arcade machines and does victory poses
    npc.glitchTimer += dt;
    
    if (npc.behaviorState === 'idle' && npc.behaviorTimer > 4 + Math.random() * 6) {
      if (Math.random() < 0.3) {
        // Victory pose
        npc.behaviorState = 'victory';
        npc.behaviorTimer = 0;
      } else {
        // Move to another arcade machine
        const machines = [
          {x: 185, y: 240}, {x: 335, y: 240}, {x: 500, y: 240}
        ];
        const target = machines[Math.floor(Math.random() * machines.length)];
        npc.targetX = target.x;
        npc.targetY = target.y;
        npc.moving = true;
        npc.behaviorTimer = 0;
      }
    }
    
    if (npc.behaviorState === 'victory' && npc.behaviorTimer > 2) {
      npc.behaviorState = 'idle';
      npc.behaviorTimer = 0;
    }
    
    // Glitch effect - occasionally flicker sprite position
    if (npc.glitchTimer > 1) {
      if (Math.random() < 0.05) {
        npc._glitchOffsetX = (Math.random() - 0.5) * 4;
        npc._glitchOffsetY = (Math.random() - 0.5) * 4;
        setTimeout(() => {
          npc._glitchOffsetX = 0;
          npc._glitchOffsetY = 0;
        }, 100);
      }
      npc.glitchTimer = 0;
    }
  },
  
  updateVoid(npc, dt) {
    // Void floats slightly and stares out at space
    npc.floatOffset += dt * 2;
    
    if (npc.behaviorState === 'idle' && npc.behaviorTimer > 10 + Math.random() * 10) {
      // Occasionally turn to look at visitor
      if (S.useVisitor && S.visitor.floor === npc.floor) {
        const dx = S.visitor.x - npc.x;
        if (Math.abs(dx) > 50) {
          npc.dir = dx > 0 ? 2 : 1;
        }
      }
      npc.behaviorTimer = 0;
    }
  },
  
  updateByte(npc, dt) {
    // Byte stands behind merchant stall, tail swishes
    npc.tailTimer += dt;
    
    if (npc.behaviorState === 'idle' && npc.behaviorTimer > 6 + Math.random() * 4) {
      // Occasionally count coins animation
      if (Math.random() < 0.4) {
        npc.behaviorState = 'counting';
        npc.behaviorTimer = 0;
      }
    }
    
    if (npc.behaviorState === 'counting' && npc.behaviorTimer > 3) {
      npc.behaviorState = 'idle';
      npc.behaviorTimer = 0;
    }
  },
  
  render(ctx) {
    // Render NPCs on current floor
    Object.values(this.npcs).forEach(npc => {
      if (npc.floor === S.floor) {
        this.renderNPC(ctx, npc);
      }
    });
    
    // Render quest collectibles on current floor
    this.collectibles.forEach(collectible => {
      if (collectible.floor === S.floor) {
        this.renderCollectible(ctx, collectible);
      }
    });
    
    // Render dialogue popup
    if (this.dialogue.active) {
      this.renderDialogue(ctx);
    }
  },
  
  renderNPC(ctx, npc) {
    const sprite = this.getNPCSprite(npc.id, npc.dir, npc.frame);
    if (!sprite) return;
    
    const scale = 3;
    const spriteW = sprite[0] ? sprite[0].length * scale : 0;
    const spriteH = sprite.length * scale;
    
    let renderX = npc.x - spriteW / 2;
    let renderY = npc.y - spriteH;
    
    // Apply special effects
    switch (npc.id) {
      case 'glitch':
        renderX += npc._glitchOffsetX || 0;
        renderY += npc._glitchOffsetY || 0;
        break;
      case 'void':
        renderY += Math.sin(npc.floatOffset) * 3; // Floating effect
        break;
    }
    
    // Draw shadow
    drawCharacterShadow(npc.x, npc.y, spriteW, S.floor);
    
    // Draw sprite
    drawSprite(ctx, renderX, renderY, sprite, scale);
    
    // Name tag
    ctx.fillStyle = 'rgba(30, 25, 45, 0.8)';
    ctx.font = '8px monospace';
    const nameText = `${npc.name} - ${npc.title}`;
    const textWidth = ctx.measureText(nameText).width;
    ctx.fillRect(npc.x - textWidth / 2 - 4, npc.y - spriteH - 18, textWidth + 8, 12);
    
    ctx.fillStyle = '#c080ff';
    ctx.textAlign = 'center';
    ctx.fillText(nameText, npc.x, npc.y - spriteH - 8);
    ctx.textAlign = 'left';
    
    // Interaction indicator when player is nearby
    if (S.useVisitor && S.visitor.floor === npc.floor) {
      const distance = Math.hypot(S.visitor.x - npc.x, S.visitor.y - npc.y);
      if (distance < 40) {
        const questState = NPCQuests.getQuestState(npc.id);
        const icon = questState === 'available' || questState === 'complete' ? '❗' : '💬';
        const pulse = 0.7 + Math.sin(S.time * 4) * 0.3;
        
        ctx.save();
        ctx.globalAlpha = pulse;
        ctx.font = '16px serif';
        ctx.textAlign = 'center';
        ctx.fillText(icon, npc.x, npc.y - spriteH - 25);
        ctx.restore();
      }
    }
  },
  
  renderCollectible(ctx, collectible) {
    const pulse = 0.6 + Math.sin(collectible.glowTimer) * 0.4;
    const glow = Math.sin(collectible.glowTimer * 2) * 3;
    
    // Glow effect
    ctx.save();
    ctx.shadowColor = collectible.color || '#ffd700';
    ctx.shadowBlur = 10 + glow;
    ctx.globalAlpha = pulse;
    
    // Draw collectible icon
    ctx.font = '16px serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = collectible.color || '#ffd700';
    ctx.fillText(collectible.icon, collectible.x, collectible.y + Math.sin(collectible.glowTimer) * 2);
    
    ctx.restore();
  },
  
  renderDialogue(ctx) {
    const dialogue = this.dialogue;
    const padding = 20;
    const maxWidth = 400;
    const lineHeight = 16;
    
    // Split text into lines
    ctx.font = '12px monospace';
    const words = dialogue.displayText.split(' ');
    const lines = [];
    let currentLine = '';
    
    words.forEach(word => {
      const testLine = currentLine + (currentLine ? ' ' : '') + word;
      if (ctx.measureText(testLine).width > maxWidth - padding * 2) {
        if (currentLine) lines.push(currentLine);
        currentLine = word;
      } else {
        currentLine = testLine;
      }
    });
    if (currentLine) lines.push(currentLine);
    
    const popupHeight = padding * 2 + lines.length * lineHeight + (dialogue.showingQuest ? 60 : 20);
    const popupWidth = maxWidth;
    const popupX = (W - popupWidth) / 2;
    const popupY = (H - popupHeight) / 2;
    
    // Background
    ctx.fillStyle = 'rgba(26, 26, 46, 0.95)';
    ctx.fillRect(popupX, popupY, popupWidth, popupHeight);
    
    // Border
    ctx.strokeStyle = '#9b59b6';
    ctx.lineWidth = 3;
    ctx.strokeRect(popupX, popupY, popupWidth, popupHeight);
    
    // NPC name
    const npc = this.npcs[dialogue.npcId];
    if (npc) {
      ctx.fillStyle = '#00fff7';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(npc.name, popupX + popupWidth / 2, popupY + 20);
    }
    
    // Dialogue text
    ctx.fillStyle = '#ddd';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    lines.forEach((line, index) => {
      ctx.fillText(line, popupX + padding, popupY + 45 + index * lineHeight);
    });
    
    // Quest buttons or continue prompt
    if (dialogue.showingQuest && dialogue.questData) {
      const buttonY = popupY + popupHeight - 35;
      
      // Accept button
      ctx.fillStyle = '#44aa44';
      ctx.fillRect(popupX + 30, buttonY, 80, 25);
      ctx.fillStyle = '#fff';
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Accept', popupX + 70, buttonY + 16);
      
      // Decline button
      ctx.fillStyle = '#aa4444';
      ctx.fillRect(popupX + 130, buttonY, 80, 25);
      ctx.fillStyle = '#fff';
      ctx.fillText('Decline', popupX + 170, buttonY + 16);
    } else if (dialogue.typewriterIndex >= dialogue.currentText.length) {
      // Continue prompt
      ctx.fillStyle = '#888';
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Press SPACE to continue, ESC to close', popupX + popupWidth / 2, popupY + popupHeight - 10);
    }
    
    // Reset text alignment
    ctx.textAlign = 'left';
  },
  
  interact(npcId) {
    const npc = this.npcs[npcId];
    if (!npc || npc.floor !== S.floor) return;
    
    if (this.dialogue.active) return; // Already in dialogue
    
    // Determine dialogue text
    let dialogueText;
    if (!npc.hasMetPlayer) {
      dialogueText = npc.dialogues.first;
      npc.hasMetPlayer = true;
    } else {
      const idle = npc.dialogues.idle;
      dialogueText = idle[Math.floor(Math.random() * idle.length)];
    }
    
    // Check for quest availability
    const questState = NPCQuests.getQuestState(npcId);
    if (questState === 'available') {
      const questData = NPCQuests.quests[npcId];
      if (questData) {
        dialogueText += `\n\n${questData.description}\n\nWill you help me?`;
        this.dialogue.showingQuest = true;
        this.dialogue.questData = questData;
      }
    } else if (questState === 'active') {
      dialogueText = NPCQuests.getProgressText(npcId);
    } else if (questState === 'complete') {
      dialogueText = NPCQuests.getCompleteText(npcId);
    }
    
    // Start dialogue
    this.dialogue.active = true;
    this.dialogue.npcId = npcId;
    this.dialogue.currentText = dialogueText;
    this.dialogue.displayText = '';
    this.dialogue.typewriterIndex = 0;
  },
  
  closeDialogue() {
    this.dialogue.active = false;
    this.dialogue.showingQuest = false;
    this.dialogue.questData = null;
    this.dialogue.npcId = null;
  },
  
  handleDialogueInput(key) {
    if (!this.dialogue.active) return false;
    
    if (key === 'Escape') {
      this.closeDialogue();
      return true;
    }
    
    if (key === ' ' || key === 'Enter') {
      if (this.dialogue.typewriterIndex < this.dialogue.currentText.length) {
        // Skip typewriter animation
        this.dialogue.typewriterIndex = this.dialogue.currentText.length;
        this.dialogue.displayText = this.dialogue.currentText;
      } else if (this.dialogue.showingQuest) {
        // Handle quest acceptance (default to accept for now)
        this.acceptQuest();
      } else {
        // Close dialogue
        this.closeDialogue();
      }
      return true;
    }
    
    return false;
  },
  
  acceptQuest() {
    if (this.dialogue.questData && this.dialogue.npcId) {
      NPCQuests.startQuest(this.dialogue.npcId);
      this.spawnQuestCollectibles(this.dialogue.npcId);
      showNotification(`Quest accepted: ${this.dialogue.questData.name}`);
    }
    this.closeDialogue();
  },
  
  spawnQuestCollectibles(npcId) {
    const questData = NPCQuests.quests[npcId];
    if (!questData || !questData.collectibles) return;
    
    questData.collectibles.forEach(collectible => {
      this.collectibles.push({
        id: collectible.id,
        questId: npcId,
        floor: collectible.floor,
        x: collectible.x,
        y: collectible.y,
        icon: collectible.icon,
        color: collectible.color,
        name: collectible.name,
        glowTimer: 0
      });
    });
  },
  
  collectItem(collectible) {
    // Play collection sound
    if (S.audioCtx) {
      const osc = S.audioCtx.createOscillator();
      const gain = S.audioCtx.createGain();
      osc.frequency.value = 800;
      gain.gain.setValueAtTime(0.1 * S.volume, S.audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, S.audioCtx.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(S.masterGain);
      osc.start();
      osc.stop(S.audioCtx.currentTime + 0.3);
    }
    
    // Collection particles
    for (let i = 0; i < 8; i++) {
      S.particles.push({
        x: collectible.x,
        y: collectible.y,
        vx: (Math.random() - 0.5) * 4,
        vy: -Math.random() * 3 - 1,
        life: 30,
        color: collectible.color,
        size: 3
      });
    }
    
    // Float text
    S.floatTexts.push({
      text: `+1 ${collectible.name}`,
      x: collectible.x,
      y: collectible.y - 10,
      color: collectible.color,
      life: 60
    });
    
    // Update quest progress
    NPCQuests.collectItem(collectible.questId, collectible.id);
  },

  // Check if visitor is near any NPC
  getNearbyNPC() {
    if (!S.useVisitor) return null;
    
    for (const npc of Object.values(this.npcs)) {
      if (npc.floor === S.floor) {
        const distance = Math.hypot(S.visitor.x - npc.x, S.visitor.y - npc.y);
        if (distance < 40) {
          return npc;
        }
      }
    }
    return null;
  }

  },
  
  // Multiplayer tracking
  otherPlayerNotes: [],
  
  init() {
    if (!S.audioCtx) return;
    
    // Create analyser for visualizer
    this.visualizer.analyser = S.audioCtx.createAnalyser();
    this.visualizer.analyser.fftSize = 256;
    this.visualizer.analyser.connect(S.masterGain);
    
    // Initialize visualizer bars
    for (let i = 0; i < 32; i++) {
      this.visualizer.bars.push(0);
    }
  },
  
  update(dt) {
    if (S.floor !== 6) return;
    
    // Update pad glow fade
    this.synthPads.forEach(pad => {
      if (pad.glow > 0) pad.glow = Math.max(0, pad.glow - dt * 3);
    });
    
    this.drumPads.forEach(pad => {
      if (pad.glow > 0) pad.glow = Math.max(0, pad.glow - dt * 3);
    });
    
    // Update turntable rotation
    if (this.turntable.spinning) {
      this.turntable.rotation += dt * (this.turntable.filterActive ? 1.5 : 3);
      if (this.turntable.rotation > Math.PI * 2) this.turntable.rotation -= Math.PI * 2;
    }
    
    // Update loop position
    if (this.loopStation.playing) {
      this.loopStation.position += dt;
      if (this.loopStation.position >= this.loopStation.loopLength) {
        this.loopStation.position = 0;
        this.replayLoop();
      }
    }
    
    // Update other players' note particles
    for (let i = this.otherPlayerNotes.length - 1; i >= 0; i--) {
      const note = this.otherPlayerNotes[i];
      note.life -= dt;
      note.y -= dt * 30;
      note.size *= (1 - dt * 0.5);
      if (note.life <= 0) {
        this.otherPlayerNotes.splice(i, 1);
      }
    }
    
    // Update visualizer
    if (this.visualizer.analyser) {
      const dataArray = new Uint8Array(this.visualizer.analyser.frequencyBinCount);
      this.visualizer.analyser.getByteFrequencyData(dataArray);
      
      for (let i = 0; i < this.visualizer.bars.length; i++) {
        const value = dataArray[i * 4] / 255;
        this.visualizer.bars[i] = this.visualizer.bars[i] * 0.8 + value * 0.2;
      }
    }
  },
  
  render() {
    if (S.floor !== 6) return;
    
    // Audio visualizer background
    ctx.save();
    ctx.globalAlpha = 0.3;
    for (let i = 0; i < this.visualizer.bars.length; i++) {
      const x = 80 + i * 20;
      const height = this.visualizer.bars[i] * 150;
      const hue = (i / this.visualizer.bars.length) * 360;
      ctx.fillStyle = `hsl(${hue}, 70%, 60%)`;
      ctx.fillRect(x, 500 - height, 15, height);
    }
    ctx.restore();
    
    // Synth Pads
    this.synthPads.forEach(pad => {
      ctx.fillStyle = pad.pressed || pad.glow > 0 ? pad.color : this.darkenColor(pad.color);
      ctx.fillRect(pad.x, pad.y, 35, 60);
      
      if (pad.glow > 0) {
        ctx.save();
        ctx.shadowColor = pad.color;
        ctx.shadowBlur = pad.glow * 20;
        ctx.fillStyle = pad.color;
        ctx.fillRect(pad.x, pad.y, 35, 60);
        ctx.restore();
      }
      
      ctx.fillStyle = '#fff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(pad.name, pad.x + 17.5, pad.y + 50);
    });
    
    // Drum Pads
    this.drumPads.forEach(pad => {
      ctx.fillStyle = pad.pressed || pad.glow > 0 ? pad.color : this.darkenColor(pad.color);
      ctx.fillRect(pad.x, pad.y, 35, 80);
      
      if (pad.glow > 0) {
        ctx.save();
        ctx.shadowColor = pad.color;
        ctx.shadowBlur = pad.glow * 20;
        ctx.fillStyle = pad.color;
        ctx.fillRect(pad.x, pad.y, 35, 80);
        ctx.restore();
      }
      
      ctx.fillStyle = '#fff';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(pad.name.toUpperCase(), pad.x + 17.5, pad.y + 70);
    });
    
    // Loop Station
    const loop = this.loopStation;
    ctx.fillStyle = loop.recording ? '#ff4444' : (loop.playing ? '#44ff44' : '#666666');
    ctx.beginPath();
    ctx.arc(loop.x, loop.y, loop.size / 2, 0, Math.PI * 2);
    ctx.fill();
    
    // Loop progress indicator
    if (loop.playing) {
      const progress = loop.position / loop.loopLength;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(loop.x, loop.y, loop.size / 2 + 5, -Math.PI/2, -Math.PI/2 + progress * Math.PI * 2);
      ctx.stroke();
    }
    
    ctx.fillStyle = '#fff';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(loop.recording ? 'REC' : (loop.playing ? 'PLAY' : 'LOOP'), loop.x, loop.y + 3);
    ctx.fillText(`${loop.events.length}/${loop.maxEvents}`, loop.x, loop.y + 15);
    
    // Drift's Turntable
    const tt = this.turntable;
    ctx.save();
    ctx.translate(tt.x, tt.y);
    ctx.rotate(tt.rotation);
    
    // Record
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(0, 0, 25, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fill();
    
    // Grooves
    for (let i = 0; i < 3; i++) {
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, 0, 8 + i * 5, 0, Math.PI * 2);
      ctx.stroke();
    }
    
    ctx.restore();
    
    // Filter indicator
    if (tt.filterActive) {
      ctx.fillStyle = '#00fff7';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LO-FI', tt.x, tt.y + 35);
    }
    
    // Other players' note particles
    this.otherPlayerNotes.forEach(note => {
      ctx.save();
      ctx.globalAlpha = note.life / note.maxLife;
      ctx.fillStyle = note.color;
      ctx.beginPath();
      ctx.arc(note.x, note.y, note.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    
    // Player count indicator
    const playerCount = Object.keys(S.otherPlayers).filter(id => S.otherPlayers[id].floor === 6).length + 1;
    ctx.fillStyle = '#c080ff';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`Now Jamming: ${playerCount} players`, 400, 250);
    
    // Instructions
    ctx.fillStyle = '#888';
    ctx.font = '9px monospace';
    ctx.fillText('Keys 1-8: Synth | Q,W,E,R: Drums | L: Loop | Click turntable for lo-fi', 400, 520);
  },
  
  handleKeyPress(key, code) {
    if (S.floor !== 6) return false;
    
    // Synth pads (keys 1-8)
    const synthKey = parseInt(key);
    if (synthKey >= 1 && synthKey <= 8) {
      this.playSynthNote(synthKey - 1);
      return true;
    }
    
    // Drum pads
    const drumPad = this.drumPads.find(p => p.key === code);
    if (drumPad) {
      this.playDrum(drumPad.name);
      return true;
    }
    
    // Loop station
    if (key.toLowerCase() === 'l') {
      this.toggleLoop();
      return true;
    }
    
    return false;
  },
  
  handleClick(x, y) {
    if (S.floor !== 6) return false;
    
    // Synth pads
    for (let i = 0; i < this.synthPads.length; i++) {
      const pad = this.synthPads[i];
      if (x >= pad.x && x <= pad.x + 35 && y >= pad.y && y <= pad.y + 60) {
        this.playSynthNote(i);
        return true;
      }
    }
    
    // Drum pads
    for (const pad of this.drumPads) {
      if (x >= pad.x && x <= pad.x + 35 && y >= pad.y && y <= pad.y + 80) {
        this.playDrum(pad.name);
        return true;
      }
    }
    
    // Loop station
    const loop = this.loopStation;
    if (Math.hypot(x - loop.x, y - loop.y) <= loop.size / 2) {
      this.toggleLoop();
      return true;
    }
    
    // Turntable
    const tt = this.turntable;
    if (Math.hypot(x - tt.x, y - tt.y) <= 25) {
      this.toggleTurntable();
      return true;
    }
    
    return false;
  },
  
  playSynthNote(index) {
    if (!S.audioCtx || index < 0 || index >= this.synthPads.length) return;
    
    const pad = this.synthPads[index];
    pad.glow = 1;
    
    // ADSR Envelope: Attack 0.02s, Decay 0.1s, Sustain 0.3, Release 0.3s
    const now = S.audioCtx.currentTime;
    const duration = 0.5;
    
    // Main oscillator
    const osc1 = S.audioCtx.createOscillator();
    const gain1 = S.audioCtx.createGain();
    
    // Detuned copy for warmth
    const osc2 = S.audioCtx.createOscillator();
    const gain2 = S.audioCtx.createGain();
    
    osc1.type = 'sine';
    osc1.frequency.value = pad.note;
    
    osc2.type = 'sine';
    osc2.frequency.value = pad.note * 1.003; // Slightly detuned
    
    // ADSR envelope
    const volume = S.volume * 0.15;
    gain1.gain.setValueAtTime(0, now);
    gain1.gain.linearRampToValueAtTime(volume, now + 0.02); // Attack
    gain1.gain.linearRampToValueAtTime(volume * 0.3, now + 0.12); // Decay to sustain
    gain1.gain.setValueAtTime(volume * 0.3, now + duration - 0.3); // Sustain
    gain1.gain.exponentialRampToValueAtTime(0.001, now + duration); // Release
    
    gain2.gain.setValueAtTime(0, now);
    gain2.gain.linearRampToValueAtTime(volume * 0.5, now + 0.02);
    gain2.gain.linearRampToValueAtTime(volume * 0.15, now + 0.12);
    gain2.gain.setValueAtTime(volume * 0.15, now + duration - 0.3);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + duration);
    
    osc1.connect(gain1);
    osc2.connect(gain2);
    gain1.connect(this.visualizer.analyser || S.masterGain);
    gain2.connect(this.visualizer.analyser || S.masterGain);
    
    osc1.start(now);
    osc2.start(now);
    osc1.stop(now + duration);
    osc2.stop(now + duration);
    
    // Visual particles
    this.createNoteParticles(pad.x + 17.5, pad.y + 30, pad.color);
    
    // Record in loop if recording
    if (this.loopStation.recording) {
      this.recordEvent('synth', index, this.loopStation.position);
    }
    
    // Send to other players
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'music.note',
        instrument: 'synth',
        note: index
      }));
    }
  },
  
  playDrum(drumName) {
    if (!S.audioCtx) return;
    
    const pad = this.drumPads.find(p => p.name === drumName);
    if (pad) pad.glow = 1;
    
    const now = S.audioCtx.currentTime;
    const volume = S.volume * 0.2;
    
    switch (drumName) {
      case 'kick':
        // Low sine sweep 150→50Hz, short
        const kickOsc = S.audioCtx.createOscillator();
        const kickGain = S.audioCtx.createGain();
        kickOsc.type = 'sine';
        kickOsc.frequency.setValueAtTime(150, now);
        kickOsc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
        kickGain.gain.setValueAtTime(volume, now);
        kickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        kickOsc.connect(kickGain);
        kickGain.connect(this.visualizer.analyser || S.masterGain);
        kickOsc.start(now);
        kickOsc.stop(now + 0.15);
        break;
        
      case 'snare':
        // Noise burst + tone at 200Hz, bandpass filtered
        const snareNoise = S.audioCtx.createBufferSource();
        const noiseBuffer = S.audioCtx.createBuffer(1, S.audioCtx.sampleRate * 0.1, S.audioCtx.sampleRate);
        const noiseData = noiseBuffer.getChannelData(0);
        for (let i = 0; i < noiseData.length; i++) {
          noiseData[i] = Math.random() * 2 - 1;
        }
        snareNoise.buffer = noiseBuffer;
        
        const snareTone = S.audioCtx.createOscillator();
        const snareFilter = S.audioCtx.createBiquadFilter();
        const snareGain = S.audioCtx.createGain();
        
        snareTone.frequency.value = 200;
        snareFilter.type = 'bandpass';
        snareFilter.frequency.value = 1000;
        snareFilter.Q.value = 1;
        
        snareGain.gain.setValueAtTime(volume, now);
        snareGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        
        snareNoise.connect(snareFilter);
        snareTone.connect(snareFilter);
        snareFilter.connect(snareGain);
        snareGain.connect(this.visualizer.analyser || S.masterGain);
        
        snareNoise.start(now);
        snareTone.start(now);
        snareNoise.stop(now + 0.1);
        snareTone.stop(now + 0.1);
        break;
        
      case 'hihat':
        // High-pass filtered noise, very short
        const hihatNoise = S.audioCtx.createBufferSource();
        const hihatBuffer = S.audioCtx.createBuffer(1, S.audioCtx.sampleRate * 0.05, S.audioCtx.sampleRate);
        const hihatData = hihatBuffer.getChannelData(0);
        for (let i = 0; i < hihatData.length; i++) {
          hihatData[i] = Math.random() * 2 - 1;
        }
        hihatNoise.buffer = hihatBuffer;
        
        const hihatFilter = S.audioCtx.createBiquadFilter();
        const hihatGain = S.audioCtx.createGain();
        
        hihatFilter.type = 'highpass';
        hihatFilter.frequency.value = 8000;
        
        hihatGain.gain.setValueAtTime(volume * 0.6, now);
        hihatGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        
        hihatNoise.connect(hihatFilter);
        hihatFilter.connect(hihatGain);
        hihatGain.connect(this.visualizer.analyser || S.masterGain);
        
        hihatNoise.start(now);
        hihatNoise.stop(now + 0.05);
        break;
        
      case 'clap':
        // Short noise burst with reverb-like decay
        const clapNoise = S.audioCtx.createBufferSource();
        const clapBuffer = S.audioCtx.createBuffer(1, S.audioCtx.sampleRate * 0.15, S.audioCtx.sampleRate);
        const clapData = clapBuffer.getChannelData(0);
        for (let i = 0; i < clapData.length; i++) {
          clapData[i] = (Math.random() * 2 - 1) * (1 - i / clapData.length);
        }
        clapNoise.buffer = clapBuffer;
        
        const clapGain = S.audioCtx.createGain();
        clapGain.gain.setValueAtTime(volume * 0.8, now);
        clapGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        
        clapNoise.connect(clapGain);
        clapGain.connect(this.visualizer.analyser || S.masterGain);
        
        clapNoise.start(now);
        clapNoise.stop(now + 0.15);
        break;
    }
    
    // Visual flash
    if (pad) {
      this.createNoteParticles(pad.x + 17.5, pad.y + 40, pad.color);
    }
    
    // Record in loop if recording
    if (this.loopStation.recording) {
      this.recordEvent('drum', drumName, this.loopStation.position);
    }
    
    // Send to other players
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'music.drum',
        drum: drumName
      }));
    }
  },
  
  toggleLoop() {
    const loop = this.loopStation;
    
    if (loop.recording) {
      // Stop recording, start playing
      loop.recording = false;
      if (loop.events.length > 0) {
        loop.playing = true;
        loop.position = 0;
        showNotification('🎵 Loop recorded! Playing...');
        
        // Send loop to other players
        if (EchoWS.ws?.readyState === 1) {
          EchoWS.ws.send(JSON.stringify({
            type: 'music.loop',
            events: loop.events
          }));
        }
      } else {
        showNotification('🔇 Empty loop cancelled');
      }
    } else if (loop.playing) {
      // Stop playing, clear loop
      loop.playing = false;
      loop.events = [];
      loop.position = 0;
      showNotification('🔇 Loop stopped');
    } else {
      // Start recording
      loop.recording = true;
      loop.events = [];
      loop.position = 0;
      showNotification('🔴 Recording loop...');
    }
  },
  
  toggleTurntable() {
    const tt = this.turntable;
    tt.filterActive = !tt.filterActive;
    tt.spinning = tt.filterActive;
    
    // Play scratch sound
    if (S.audioCtx) {
      const now = S.audioCtx.currentTime;
      const scratchNoise = S.audioCtx.createBufferSource();
      const scratchBuffer = S.audioCtx.createBuffer(1, S.audioCtx.sampleRate * 0.2, S.audioCtx.sampleRate);
      const scratchData = scratchBuffer.getChannelData(0);
      
      for (let i = 0; i < scratchData.length; i++) {
        const t = i / scratchData.length;
        scratchData[i] = (Math.random() * 2 - 1) * (1 - t) * Math.sin(t * 40);
      }
      scratchNoise.buffer = scratchBuffer;
      
      const scratchGain = S.audioCtx.createGain();
      scratchGain.gain.setValueAtTime(S.volume * 0.3, now);
      scratchGain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
      
      scratchNoise.connect(scratchGain);
      scratchGain.connect(S.masterGain);
      scratchNoise.start(now);
      scratchNoise.stop(now + 0.2);
    }
    
    showNotification(tt.filterActive ? '🎚️ Lo-fi filter ON' : '🎚️ Lo-fi filter OFF');
  },
  
  recordEvent(instrument, data, time) {
    const loop = this.loopStation;
    if (loop.events.length >= loop.maxEvents) return;
    
    loop.events.push({
      instrument,
      data,
      time
    });
  },
  
  replayLoop() {
    const loop = this.loopStation;
    loop.events.forEach(event => {
      if (Math.abs(event.time - loop.position) < 0.1) {
        if (event.instrument === 'synth') {
          this.playSynthNote(event.data);
        } else if (event.instrument === 'drum') {
          this.playDrum(event.data);
        }
      }
    });
  },
  
  createNoteParticles(x, y, color) {
    for (let i = 0; i < 6; i++) {
      S.particles.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y - 10,
        vx: (Math.random() - 0.5) * 3,
        vy: -Math.random() * 2 - 1,
        life: 30,
        color: color,
        size: 2 + Math.random() * 2
      });
    }
  },
  
  handleOtherPlayerNote(playerId, instrument, note) {
    if (S.floor !== 6) return;
    
    let x, y, color;
    
    if (instrument === 'synth' && note >= 0 && note < this.synthPads.length) {
      const pad = this.synthPads[note];
      x = pad.x + 17.5;
      y = pad.y + 30;
      color = this.darkenColor(pad.color); // Different brightness for other players
    } else if (instrument === 'drum') {
      const pad = this.drumPads.find(p => p.name === note);
      if (pad) {
        x = pad.x + 17.5;
        y = pad.y + 40;
        color = this.darkenColor(pad.color);
      }
    }
    
    if (x && y) {
      this.otherPlayerNotes.push({
        x, y, color,
        life: 1,
        maxLife: 1,
        size: 8
      });
    }
  },
  
  darkenColor(color) {
    // Make colors dimmer for other players' notes
    return color.replace(/(\d+)/g, (match) => Math.max(0, parseInt(match) * 0.6));
  }
};

// PART 2: STATION-WIDE SOUND EFFECTS
const SoundFX = {
  // Footstep system
  footsteps: {
    lastStepTime: 0,
    stepInterval: 0.25, // ~4 steps per second
    lastX: 0,
    lastY: 0,
    
    update() {
      if (!S.useVisitor) return;
      
      const now = Date.now() / 1000;
      const dx = S.visitor.x - this.lastX;
      const dy = S.visitor.y - this.lastY;
      const moving = Math.abs(dx) > 1 || Math.abs(dy) > 1;
      
      if (moving && (now - this.lastStepTime) > this.stepInterval) {
        this.playFootstep(S.floor);
        this.lastStepTime = now;
      }
      
      this.lastX = S.visitor.x;
      this.lastY = S.visitor.y;
    },
    
    playFootstep(floor) {
      if (!S.audioCtx) return;
      
      const now = S.audioCtx.currentTime;
      const volume = S.volume * 0.15; // Quiet - 15% of master
      
      switch (floor) {
        case 1: // F1 Quarters: soft thud
          this.createSoftThud(now, volume);
          break;
        case 2: // F2 Observatory: glass echo
          this.createGlassEcho(now, volume);
          break;
        case 3: // F3 Arcade: rubber squeak
          this.createRubberSqueak(now, volume);
          break;
        case 4: // F4 Garden: soil crunch
          this.createSoilCrunch(now, volume);
          break;
        case 5: // F5 Lab: metal clang
          this.createMetalClang(now, volume);
          break;
        case 6: // F6 Lounge: carpet muffled
          this.createCarpetMuffled(now, volume);
          break;
        case 7: // F7 Community: wood creak
          this.createWoodCreak(now, volume);
          break;
        case 9: // F9 Archive: stone echo
          this.createStoneEcho(now, volume);
          break;
      }
    },
    
    createSoftThud(now, volume) {
      const osc = S.audioCtx.createOscillator();
      const gain = S.audioCtx.createGain();
      const filter = S.audioCtx.createBiquadFilter();
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(80, now);
      osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
      
      filter.type = 'lowpass';
      filter.frequency.value = 200;
      
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(S.masterGain);
      
      osc.start(now);
      osc.stop(now + 0.15);
    },
    
    createGlassEcho(now, volume) {
      const osc = S.audioCtx.createOscillator();
      const gain = S.audioCtx.createGain();
      const delay = S.audioCtx.createDelay(0.3);
      const delayGain = S.audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.value = 1200;
      
      delay.delayTime.value = 0.15;
      delayGain.gain.value = 0.3;
      
      gain.gain.setValueAtTime(volume * 0.8, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      
      osc.connect(gain);
      gain.connect(S.masterGain);
      gain.connect(delay);
      delay.connect(delayGain);
      delayGain.connect(S.masterGain);
      
      osc.start(now);
      osc.stop(now + 0.1);
    },
    
    createRubberSqueak(now, volume) {
      const osc = S.audioCtx.createOscillator();
      const gain = S.audioCtx.createGain();
      
      osc.type = 'square';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.linearRampToValueAtTime(600, now + 0.05);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.08);
      
      gain.gain.setValueAtTime(volume * 0.6, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      
      osc.connect(gain);
      gain.connect(S.masterGain);
      
      osc.start(now);
      osc.stop(now + 0.08);
    },
    
    createSoilCrunch(now, volume) {
      const noise = S.audioCtx.createBufferSource();
      const buffer = S.audioCtx.createBuffer(1, S.audioCtx.sampleRate * 0.06, S.audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < data.length; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      noise.buffer = buffer;
      
      const filter = S.audioCtx.createBiquadFilter();
      const gain = S.audioCtx.createGain();
      
      filter.type = 'lowpass';
      filter.frequency.value = 800;
      
      gain.gain.setValueAtTime(volume * 0.5, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(S.masterGain);
      
      noise.start(now);
      noise.stop(now + 0.06);
    },
    
    createMetalClang(now, volume) {
      const osc1 = S.audioCtx.createOscillator();
      const osc2 = S.audioCtx.createOscillator();
      const gain = S.audioCtx.createGain();
      
      osc1.type = 'sine';
      osc1.frequency.value = 800;
      osc2.type = 'sine';
      osc2.frequency.value = 1200; // Harmonic
      
      gain.gain.setValueAtTime(volume * 0.7, now);
      gain.gain.exponentialRampToValueAtTime(volume * 0.3, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      
      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(S.masterGain);
      
      osc1.start(now);
      osc2.start(now);
      osc1.stop(now + 0.3);
      osc2.stop(now + 0.3);
    },
    
    createCarpetMuffled(now, volume) {
      const osc = S.audioCtx.createOscillator();
      const gain = S.audioCtx.createGain();
      const filter = S.audioCtx.createBiquadFilter();
      
      osc.type = 'sine';
      osc.frequency.value = 60;
      
      filter.type = 'lowpass';
      filter.frequency.value = 150;
      
      gain.gain.setValueAtTime(volume * 0.4, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(S.masterGain);
      
      osc.start(now);
      osc.stop(now + 0.12);
    },
    
    createWoodCreak(now, volume) {
      const noise = S.audioCtx.createBufferSource();
      const buffer = S.audioCtx.createBuffer(1, S.audioCtx.sampleRate * 0.1, S.audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / data.length * 0.7);
      }
      noise.buffer = buffer;
      
      const osc = S.audioCtx.createOscillator();
      const gain = S.audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.value = 120;
      
      gain.gain.setValueAtTime(volume * 0.6, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      
      noise.connect(gain);
      osc.connect(gain);
      gain.connect(S.masterGain);
      
      noise.start(now);
      osc.start(now);
      noise.stop(now + 0.1);
      osc.stop(now + 0.15);
    },
    
    createStoneEcho(now, volume) {
      const osc = S.audioCtx.createOscillator();
      const gain = S.audioCtx.createGain();
      const delay = S.audioCtx.createDelay(0.5);
      const delayGain = S.audioCtx.createGain();
      
      osc.type = 'sine';
      osc.frequency.value = 300;
      
      delay.delayTime.value = 0.25;
      delayGain.gain.value = 0.4;
      
      gain.gain.setValueAtTime(volume, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
      
      osc.connect(gain);
      gain.connect(S.masterGain);
      gain.connect(delay);
      delay.connect(delayGain);
      delayGain.connect(S.masterGain);
      
      osc.start(now);
      osc.stop(now + 0.15);
    }
  },
  
  // Elevator sounds
  elevator: {
    doorOpen() {
      if (!S.audioCtx) return;
      
      const now = S.audioCtx.currentTime;
      const noise = S.audioCtx.createBufferSource();
      const buffer = S.audioCtx.createBuffer(1, S.audioCtx.sampleRate * 0.3, S.audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      for (let i = 0; i < data.length; i++) {

      const gain = S.audioCtx.createGain();

// Enhanced Atmosphere with Reverb
const AtmosphereEnhancer = {
  reverbNode: null,
  
  init() {
    if (!S.audioCtx) return;
    
    // Create subtle reverb for all ambients
    this.reverbNode = S.audioCtx.createConvolver();
    const reverbBuffer = this.createReverbBuffer(0.3, 0.2); // feedback 0.3, mix 0.2
    this.reverbNode.buffer = reverbBuffer;
    
    // Connect to master gain
    this.reverbNode.connect(S.masterGain);
  },
  
  createReverbBuffer(feedback, mix) {
    if (!S.audioCtx) return null;
    
    const sampleRate = S.audioCtx.sampleRate;
    const length = sampleRate * 2; // 2 second reverb
    const buffer = S.audioCtx.createBuffer(2, length, sampleRate);
    
    for (let channel = 0; channel < 2; channel++) {
      const channelData = buffer.getChannelData(channel);
      for (let i = 0; i < length; i++) {
        const decay = Math.pow(1 - i / length, 2);
        channelData[i] = (Math.random() * 2 - 1) * decay * feedback;
      }
    }
    
    return buffer;
  },
  
  // Add vinyl crackle for F6
  playVinylCrackle() {
    if (!S.audioCtx || S.floor !== 6) return;
    
    const now = S.audioCtx.currentTime;
    const noise = S.audioCtx.createBufferSource();
    const buffer = S.audioCtx.createBuffer(1, S.audioCtx.sampleRate * 0.1, S.audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1) * 0.02; // Very quiet
    }
    noise.buffer = buffer;
    noise.loop = true;
    
    const filter = S.audioCtx.createBiquadFilter();
    const gain = S.audioCtx.createGain();
    
    filter.type = 'bandpass';
    filter.frequency.value = 2000;
    filter.Q.value = 2;
    
    gain.gain.value = S.volume * 0.05; // Very quiet
    
    noise.connect(filter);
    filter.connect(gain);
    gain.connect(S.masterGain);
    
    noise.start(now);
    
    // Store reference to stop later
    this.vinylCrackle = noise;
  },
  
  stopVinylCrackle() {
    if (this.vinylCrackle) {
      this.vinylCrackle.stop();
      this.vinylCrackle = null;
    }
  }
};

// WebSocket Music Event Handlers
function handleMusicWebSocket(msg) {
  if (msg.type === 'music.note' && msg.id !== S.myPlayerId) {
    MusicStudio.handleOtherPlayerNote(msg.id, msg.instrument, msg.note);
    // Play the actual sound too (quieter for other players)
    if (S.floor === 6 && msg.instrument === 'synth') {
      const pad = MusicStudio.synthPads[msg.note];
      if (pad && S.audioCtx) {
        const now = S.audioCtx.currentTime;
        const osc = S.audioCtx.createOscillator();
        const gain = S.audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = pad.note;
        gain.gain.setValueAtTime(S.volume * 0.08, now); // Quieter
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        osc.connect(gain); gain.connect(S.masterGain);
        osc.start(now); osc.stop(now + 0.3);
      }
    }
  }
  
  if (msg.type === 'music.drum' && msg.id !== S.myPlayerId) {
    MusicStudio.handleOtherPlayerNote(msg.id, 'drum', msg.drum);
    // Play drum sound (quieter)
    if (S.floor === 6) {
      // Simplified drum sounds for other players
      if (S.audioCtx) {
        const now = S.audioCtx.currentTime;
        const osc = S.audioCtx.createOscillator();
        const gain = S.audioCtx.createGain();
        
        switch (msg.drum) {
          case 'kick': osc.frequency.value = 60; break;
          case 'snare': osc.frequency.value = 200; break;
          case 'hihat': osc.frequency.value = 8000; break;
          case 'clap': osc.frequency.value = 1000; break;
        }
        
        gain.gain.setValueAtTime(S.volume * 0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.connect(gain); gain.connect(S.masterGain);
        osc.start(now); osc.stop(now + 0.1);
      }
    }
  }
  
  if (msg.type === 'music.loop' && msg.id !== S.myPlayerId) {
    // Show notification of shared loop
    if (S.floor === 6) {
      showNotification('🎵 ' + (S.otherPlayers[msg.id]?.name || 'Player') + ' shared a loop!');
    }
  }
}

const AtmosphereSystem = {
  // 1. Dynamic Lighting System
  lighting: {
    enabled: false,
    lightRadius: 120,
    scannerBonus: 80,
    darkFloors: [4, 5, 9], // F4 garden at "night", F5 lab, F9 archive
    
    isActive() {
      const floor = S.floor;
      if (!this.darkFloors.includes(floor)) return false;
      
      // F4 only dark at night
      if (floor === 4 && TOD !== 'night') return false;
      
      return true;
    },
    
    getCurrentRadius() {
      let radius = this.lightRadius;
      
      // Scanner item increases light radius
      if (S.scanner && S.scanner.active) {
        radius += this.scannerBonus;
      }
      
      return radius;
    },
    
    renderLightOverlay() {
      if (!this.isActive()) return;
      
      const player = S.useVisitor ? S.visitor : S.echo;
      const radius = this.getCurrentRadius();
      
      // Create radial gradient - dark at edges, clear at player
      const gradient = ctx.createRadialGradient(
        player.x, player.y, 0,
        player.x, player.y, radius
      );
      
      gradient.addColorStop(0, 'rgba(0,0,0,0)');
      gradient.addColorStop(0.6, 'rgba(0,0,0,0.3)');
      gradient.addColorStop(0.8, 'rgba(0,0,0,0.6)');
      gradient.addColorStop(1, 'rgba(0,0,0,0.85)');
      
      ctx.save();
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
      
      // Light sources in the world
      this.renderWorldLights();
    },
    
    renderWorldLights() {
      const floor = S.floor;
      let lightSources = [];
      
      switch(floor) {
        case 4: // Garden bioluminescence
          lightSources = [
            {x: 200, y: 300, r: 60, color: '#40ff40'},
            {x: 500, y: 350, r: 45, color: '#60ff80'},
            {x: 350, y: 200, r: 50, color: '#80ff60'},
          ];
          break;
        case 5: // Reactor glow
          lightSources = [
            {x: 400, y: 250, r: 100, color: '#4080ff'},
            {x: 600, y: 400, r: 40, color: '#ff8040'},
          ];
          break;
        case 6: // Candles (already there)
          lightSources = [
            {x: 300, y: 150, r: 35, color: '#ffaa40'},
            {x: 450, y: 300, r: 35, color: '#ffaa40'},
            {x: 650, y: 250, r: 35, color: '#ffaa40'},
          ];
          break;
      }
      
      lightSources.forEach(light => {
        const gradient = ctx.createRadialGradient(
          light.x, light.y, 0,
          light.x, light.y, light.r
        );
        
        gradient.addColorStop(0, light.color + '80');
        gradient.addColorStop(0.5, light.color + '40');
        gradient.addColorStop(1, light.color + '00');
        
        ctx.save();
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = gradient;
        ctx.fillRect(
          light.x - light.r, light.y - light.r,
          light.r * 2, light.r * 2
        );
        ctx.restore();
      });
    }
  },
  
  // 2. Ambient Sound Layers Per Floor
  ambientSound: {
    currentFloor: 0,
    audioNodes: {},
    crossfadeTime: 2.0,
    
    init() {
      if (!S.audioCtx) return;
      
      // Create ambient sound for each floor
      const floorAmbients = {
        1: () => this.createLifeSupportHum(),
        2: () => this.createSpaceAmbience(),
        3: () => this.createArcadeSounds(),
        4: () => this.createNatureSounds(),
        5: () => this.createElectricalBuzz(),
        6: () => this.createVinylCrackle(),
        7: () => this.createCrowdMurmur(),
        9: () => this.createEerieAmbient()
      };
      
      Object.entries(floorAmbients).forEach(([floor, createFn]) => {
        this.audioNodes[floor] = {
          create: createFn,
          nodes: null,
          gain: null
        };
      });
    },
    
    updateFloor(newFloor) {
      if (!S.audioCtx || !S.musicPlaying) return;
      if (this.currentFloor === newFloor) return;
      
      const oldFloor = this.currentFloor;
      this.currentFloor = newFloor;
      
      // Crossfade between ambient layers
      if (oldFloor && this.audioNodes[oldFloor] && this.audioNodes[oldFloor].gain) {
        this.audioNodes[oldFloor].gain.gain.linearRampToValueAtTime(
          0, S.audioCtx.currentTime + this.crossfadeTime
        );
      }
      
      this.startFloorAmbient(newFloor);
    },
    
    startFloorAmbient(floor) {
      if (!this.audioNodes[floor]) return;
      
      const ambient = this.audioNodes[floor];
      if (ambient.nodes) return; // Already playing
      
      const result = ambient.create();
      ambient.nodes = result.nodes;
      ambient.gain = result.gain;
      
      // Fade in
      ambient.gain.gain.setValueAtTime(0, S.audioCtx.currentTime);
      ambient.gain.gain.linearRampToValueAtTime(
        0.25 * S.volume, S.audioCtx.currentTime + this.crossfadeTime
      );
    },
    
    stopAll() {
      Object.values(this.audioNodes).forEach(ambient => {
        if (ambient.nodes && ambient.gain) {
          ambient.gain.gain.linearRampToValueAtTime(0, S.audioCtx.currentTime + 0.5);
          setTimeout(() => {
            ambient.nodes.forEach(node => {
              try { node.stop(); } catch(e) {}
            });
            ambient.nodes = null;
            ambient.gain = null;
          }, 600);
        }
      });
    },
    
    // Floor-specific ambient sound generators
    createLifeSupportHum() {
      const gain = S.audioCtx.createGain();
      const osc1 = S.audioCtx.createOscillator();
      const osc2 = S.audioCtx.createOscillator();
      
      osc1.type = 'sine';
      osc1.frequency.value = 80;
      osc2.type = 'sine';  
      osc2.frequency.value = 120;
      
      osc1.connect(gain);
      osc2.connect(gain);
      gain.connect(S.masterGain);
      
      osc1.start();
      osc2.start();
      
      // Occasional beep
      setInterval(() => {
        if (S.floor === 1 && Math.random() < 0.1) {
          const beep = S.audioCtx.createOscillator();
          const beepGain = S.audioCtx.createGain();
          beep.type = 'sine';
          beep.frequency.value = 800;
          beepGain.gain.setValueAtTime(0.1 * S.volume, S.audioCtx.currentTime);
          beepGain.gain.exponentialRampToValueAtTime(0.001, S.audioCtx.currentTime + 0.2);
          beep.connect(beepGain);
          beepGain.connect(S.masterGain);
          beep.start();
          beep.stop(S.audioCtx.currentTime + 0.2);
        }
      }, 3000);
      
      return { nodes: [osc1, osc2], gain };
    },
    
    createSpaceAmbience() {
      const gain = S.audioCtx.createGain();
      const lowRumble = S.audioCtx.createOscillator();
      const highEthereal = S.audioCtx.createOscillator();
      
      lowRumble.type = 'sine';
      lowRumble.frequency.value = 40;
      highEthereal.type = 'triangle';
      highEthereal.frequency.value = 1200;
      
      const rumbleGain = S.audioCtx.createGain();
      const etherealGain = S.audioCtx.createGain();
      
      rumbleGain.gain.value = 0.3;
      etherealGain.gain.value = 0.1;
      
      lowRumble.connect(rumbleGain);
      highEthereal.connect(etherealGain);
      rumbleGain.connect(gain);
      etherealGain.connect(gain);
      gain.connect(S.masterGain);
      
      lowRumble.start();
      highEthereal.start();
      
      return { nodes: [lowRumble, highEthereal], gain };
    },
    
    createArcadeSounds() {
      const gain = S.audioCtx.createGain();
      const nodes = [];
      
      // Distant bleeps and bloops
      const bleepInterval = setInterval(() => {
        if (S.floor === 3 && Math.random() < 0.15) {
          const bleep = S.audioCtx.createOscillator();
          const bleepGain = S.audioCtx.createGain();
          bleep.type = 'square';
          bleep.frequency.value = 400 + Math.random() * 800;
          bleepGain.gain.setValueAtTime(0.05 * S.volume, S.audioCtx.currentTime);
          bleepGain.gain.exponentialRampToValueAtTime(0.001, S.audioCtx.currentTime + 0.1);
          bleep.connect(bleepGain);
          bleepGain.connect(S.masterGain);
          bleep.start();
          bleep.stop(S.audioCtx.currentTime + 0.1);
        }
      }, 1000);
      
      return { 
        nodes: nodes, 
        gain,
        cleanup: () => clearInterval(bleepInterval)
      };
    },
    
    createNatureSounds() {
      const gain = S.audioCtx.createGain();
      const windOsc = S.audioCtx.createOscillator();
      
      windOsc.type = 'sine';
      windOsc.frequency.value = 200;
      windOsc.connect(gain);
      gain.connect(S.masterGain);
      windOsc.start();
      
      // Water drip sounds
      setInterval(() => {
        if (S.floor === 4 && Math.random() < 0.08) {
          const drip = S.audioCtx.createOscillator();
          const dripGain = S.audioCtx.createGain();
          drip.type = 'sine';
          drip.frequency.value = 600;
          dripGain.gain.setValueAtTime(0.08 * S.volume, S.audioCtx.currentTime);
          dripGain.gain.exponentialRampToValueAtTime(0.001, S.audioCtx.currentTime + 0.3);
          drip.connect(dripGain);
          dripGain.connect(S.masterGain);
          drip.start();
          drip.stop(S.audioCtx.currentTime + 0.3);
        }
      }, 4000);
      
      return { nodes: [windOsc], gain };
    },
    
    createElectricalBuzz() {
      const gain = S.audioCtx.createGain();
      const buzz = S.audioCtx.createOscillator();
      const hum = S.audioCtx.createOscillator();
      
      buzz.type = 'sawtooth';
      buzz.frequency.value = 150;
      hum.type = 'sine';
      hum.frequency.value = 60;
      
      buzz.connect(gain);
      hum.connect(gain);
      gain.connect(S.masterGain);
      
      buzz.start();
      hum.start();
      
      return { nodes: [buzz, hum], gain };
    },
    
    createVinylCrackle() {
      const gain = S.audioCtx.createGain();
      const nodes = [];
      
      // Generate vinyl crackle noise
      const crackleInterval = setInterval(() => {
        if (S.floor === 6 && Math.random() < 0.3) {
          const noise = S.audioCtx.createBufferSource();
          const buffer = S.audioCtx.createBuffer(1, S.audioCtx.sampleRate * 0.1, S.audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          
          for (let i = 0; i < data.length; i++) {
            data[i] = (Math.random() * 2 - 1) * 0.1;
          }
          
          noise.buffer = buffer;
          const noiseGain = S.audioCtx.createGain();
          noiseGain.gain.value = 0.03 * S.volume;
          
          noise.connect(noiseGain);
          noiseGain.connect(S.masterGain);
          noise.start();
        }
      }, 200);
      
      return { 
        nodes: nodes, 
        gain,
        cleanup: () => clearInterval(crackleInterval)
      };
    },
    
    createCrowdMurmur() {
      const gain = S.audioCtx.createGain();
      const lowMurmur = S.audioCtx.createOscillator();
      
      lowMurmur.type = 'triangle';
      lowMurmur.frequency.value = 100 + Math.random() * 50;
      lowMurmur.connect(gain);
      gain.connect(S.masterGain);
      lowMurmur.start();
      
      return { nodes: [lowMurmur], gain };
    },
    
    createEerieAmbient() {
      const gain = S.audioCtx.createGain();
      const nodes = [];
      
      // Occasional deep resonance
      setInterval(() => {
        if (S.floor === 9 && Math.random() < 0.05) {
          const resonance = S.audioCtx.createOscillator();
          const resGain = S.audioCtx.createGain();
          resonance.type = 'sine';
          resonance.frequency.value = 30 + Math.random() * 20;
          resGain.gain.setValueAtTime(0.1 * S.volume, S.audioCtx.currentTime);
          resGain.gain.exponentialRampToValueAtTime(0.001, S.audioCtx.currentTime + 3);
          resonance.connect(resGain);
          resGain.connect(S.masterGain);
          resonance.start();
          resonance.stop(S.audioCtx.currentTime + 3);
        }
      }, 8000);
      
      return { nodes: nodes, gain };
    }
  },
  
  // 3. Pixel Proximity Hints
  pixelHints: {
    sensingDistance: 40,
    lastSensingState: false,
    
    update() {
      if (!S.pixel) return;
      
      const nearestSecret = this.findNearestSecret();
      const isNearSecret = nearestSecret && nearestSecret.distance <= this.sensingDistance;
      
      if (isNearSecret !== this.lastSensingState) {
        this.lastSensingState = isNearSecret;
        S.pixel.sensing = isNearSecret;
        
        if (isNearSecret) {
          // Pixel animation changes - ears perk up, tail straight
          S.pixel.state = 'sensing';
          S.pixel.stateTimer = 0;
          
          // Add particle above Pixel
          S.particles.push({
            x: S.pixel.x,
            y: S.pixel.y - 20,
            vx: 0,
            vy: -0.5,
            life: 120,
            color: '#ffaa00',
            size: 8,
            text: '!',
            type: 'hint'
          });
        } else {
          if (S.pixel.state === 'sensing') {
            S.pixel.state = 'idle';
          }
        }
      }
      
      // Pixel looks towards nearest secret
      if (isNearSecret && nearestSecret) {
        S.pixel.targetX = nearestSecret.x;
        S.pixel.targetY = nearestSecret.y;
      }
    },
    
    findNearestSecret() {
      // List of secret locations per floor
      const secretLocations = {
        1: [{x: 150, y: 350, id: 'diary_room'}], // Behind bed
        4: [{x: 200, y: 400, id: 'underground_cave'}], // Garden cave
        5: [{x: 550, y: 280, id: 'hidden_lab_log'}], // Lab secret
        9: [{x: 300, y: 200, id: 'archive_depths'}] // Archive depths
      };
      
      const secrets = secretLocations[S.floor] || [];
      let nearest = null;
      let minDistance = Infinity;
      
      secrets.forEach(secret => {
        const dx = secret.x - S.pixel.x;
        const dy = secret.y - S.pixel.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < minDistance) {
          minDistance = distance;
          nearest = { ...secret, distance };
        }
      });
      
      return nearest;
    }
  },
  
  // 4. Peripheral Movement Effects
  peripheralEffects: {
    effects: [],
    lastSpawnTime: 0,
    spawnInterval: 45000, // 45 seconds
    atmosphericFloors: [2, 5, 9],
    
    update(dt) {
      const now = Date.now();
      
      // Spawn new effect occasionally
      if (this.atmosphericFloors.includes(S.floor) && 
          now - this.lastSpawnTime > this.spawnInterval + Math.random() * 15000) {
        this.spawnEffect();
        this.lastSpawnTime = now;
      }
      
      // Update existing effects
      this.effects = this.effects.filter(effect => {
        effect.x += effect.vx * dt * 60;
        effect.y += effect.vy * dt * 60;
        effect.life -= dt;
        return effect.life > 0;
      });
    },
    
    spawnEffect() {
      const side = Math.floor(Math.random() * 4); // 0=top, 1=right, 2=bottom, 3=left
      let x, y, vx, vy;
      
      switch(side) {
        case 0: // Top
          x = Math.random() * W;
          y = -20;
          vx = (Math.random() - 0.5) * 100;
          vy = 50 + Math.random() * 50;
          break;
        case 1: // Right  
          x = W + 20;
          y = Math.random() * H;
          vx = -50 - Math.random() * 50;
          vy = (Math.random() - 0.5) * 100;
          break;
        case 2: // Bottom
          x = Math.random() * W;
          y = H + 20;
          vx = (Math.random() - 0.5) * 100;
          vy = -50 - Math.random() * 50;
          break;
        case 3: // Left
          x = -20;
          y = Math.random() * H;
          vx = 50 + Math.random() * 50;
          vy = (Math.random() - 0.5) * 100;
          break;
      }
      
      this.effects.push({
        x, y, vx, vy,
        life: 0.5,
        size: 20 + Math.random() * 40,
        alpha: 0.2 + Math.random() * 0.3,
        shape: Math.random() < 0.5 ? 'shadow' : 'silhouette'
      });
    },
    
    render() {
      this.effects.forEach(effect => {
        ctx.save();
        ctx.globalAlpha = effect.alpha * (effect.life / 0.5);
        ctx.fillStyle = '#000000';
        
        if (effect.shape === 'shadow') {
          ctx.beginPath();
          ctx.ellipse(effect.x, effect.y, effect.size, effect.size * 0.3, 0, 0, Math.PI * 2);
          ctx.fill();
        } else {
          // Silhouette - rough human-ish shape
          ctx.fillRect(effect.x - effect.size/4, effect.y - effect.size/2, effect.size/2, effect.size);
          ctx.beginPath();
          ctx.arc(effect.x, effect.y - effect.size/2, effect.size/4, 0, Math.PI * 2);
          ctx.fill();
        }
        
        ctx.restore();
      });
    }
  },
  
  // 5. Window/Viewport Variations
  windowEffects: {
    starfield: [],
    shootingStars: [],
    lastShootingStar: 0,
    earthPhase: 0,
    
    init() {
      // Generate starfield for F2
      for (let i = 0; i < 100; i++) {
        this.starfield.push({
          x: Math.random() * W,
          y: Math.random() * H,
          brightness: Math.random()
        });
      }
    },
    
    update(dt) {
      this.earthPhase += dt * 0.1;
      
      // Shooting stars for F2 at night
      if (S.floor === 2 && TOD === 'night') {
        const now = Date.now();
        if (now - this.lastShootingStar > 15000 + Math.random() * 20000) {
          this.spawnShootingStar();
          this.lastShootingStar = now;
        }
      }
      
      // Update shooting stars
      this.shootingStars = this.shootingStars.filter(star => {
        star.x += star.vx * dt;
        star.y += star.vy * dt;
        star.life -= dt;
        return star.life > 0;
      });
    },
    
    spawnShootingStar() {
      this.shootingStars.push({
        x: Math.random() * W,
        y: Math.random() * 100,
        vx: 100 + Math.random() * 200,
        vy: 50 + Math.random() * 100,
        life: 2,
        tail: []
      });
    },
    
    renderF2Dome() {
      if (S.floor !== 2) return;
      
      // Dome area (adjust based on actual dome position)
      const domeX = 400, domeY = 150, domeR = 120;
      
      ctx.save();
      ctx.beginPath();
      ctx.arc(domeX, domeY, domeR, 0, Math.PI * 2);
      ctx.clip();
      
      // Base dome background
      let gradient;
      
      switch(TOD) {
        case 'morning':
          gradient = ctx.createLinearGradient(domeX, domeY - domeR, domeX, domeY + domeR);
          gradient.addColorStop(0, '#FFE4B5');
          gradient.addColorStop(1, '#87CEEB');
          break;
        case 'evening':
          gradient = ctx.createLinearGradient(domeX, domeY - domeR, domeX, domeY + domeR);
          gradient.addColorStop(0, '#FF4500');
          gradient.addColorStop(0.5, '#FF6347');
          gradient.addColorStop(1, '#4B0082');
          break;
        case 'night':
          gradient = ctx.createLinearGradient(domeX, domeY - domeR, domeX, domeY + domeR);
          gradient.addColorStop(0, '#000040');
          gradient.addColorStop(1, '#000080');
          
          // Render stars
          this.starfield.forEach(star => {
            if (star.x > domeX - domeR && star.x < domeX + domeR &&
                star.y > domeY - domeR && star.y < domeY + domeR) {
              ctx.save();
              ctx.globalAlpha = star.brightness;
              ctx.fillStyle = '#FFFFFF';
              ctx.fillRect(star.x, star.y, 1, 1);
              ctx.restore();
            }
          });
          
          // Render shooting stars
          this.shootingStars.forEach(star => {
            ctx.save();
            ctx.globalAlpha = star.life / 2;
            ctx.strokeStyle = '#FFFF88';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(star.x, star.y);
            ctx.lineTo(star.x - star.vx * 0.02, star.y - star.vy * 0.02);
            ctx.stroke();
            ctx.restore();
          });
          break;
        default: // afternoon
          gradient = ctx.createLinearGradient(domeX, domeY - domeR, domeX, domeY + domeR);
          gradient.addColorStop(0, '#87CEEB');
          gradient.addColorStop(1, '#4169E1');
          
          // Earth visible in afternoon
          ctx.save();
          ctx.translate(domeX + Math.sin(this.earthPhase) * 20, domeY + 30);
          ctx.scale(0.8, 0.8);
          ctx.fillStyle = '#6B8E23';
          ctx.beginPath();
          ctx.arc(0, 0, 30, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#4169E1';
          ctx.beginPath();
          ctx.arc(-10, -5, 12, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
          break;
      }
      
      ctx.fillStyle = gradient;
      ctx.fillRect(domeX - domeR, domeY - domeR, domeR * 2, domeR * 2);
      
      ctx.restore();
    },
    
    renderF1Window() {
      if (S.floor !== 1) return;
      
      // Window area (adjust based on actual window position)  
      const winX = 650, winY = 200, winW = 120, winH = 80;
      
      ctx.save();
      ctx.beginPath();
      ctx.rect(winX, winY, winW, winH);
      ctx.clip();
      
      // Base space view
      ctx.fillStyle = '#000040';
      ctx.fillRect(winX, winY, winW, winH);
      
      // Weather effects
      if (S.weather && S.weather.desc) {
        switch(S.weather.desc) {
          case 'rain':
            // Rain streaks
            for (let i = 0; i < 20; i++) {
              ctx.save();
              ctx.globalAlpha = 0.6;
              ctx.strokeStyle = '#87CEEB';
              ctx.lineWidth = 1;
              ctx.beginPath();
              const x = winX + Math.random() * winW;
              const y = winY + Math.random() * winH;
              ctx.moveTo(x, y);
              ctx.lineTo(x - 5, y + 15);
              ctx.stroke();
              ctx.restore();
            }
            break;
          case 'clear':
            // Clear stars
            for (let i = 0; i < 15; i++) {
              const x = winX + Math.random() * winW;
              const y = winY + Math.random() * winH;
              ctx.fillStyle = '#FFFFFF';
              ctx.fillRect(x, y, 1, 1);
            }
            break;
        }
      }
      
      ctx.restore();
    }
  },
  
  // 6. Station Breathing Effects
  stationBreathing: {
    breatheTimer: 0,
    creakTimer: 0,
    steamTimer: 0,
    pollenTimer: 0,
    dustTimer: 0,
    
    update(dt) {
      this.breatheTimer += dt;
      this.creakTimer += dt;
      this.steamTimer += dt;
      this.pollenTimer += dt;
      this.dustTimer += dt;
      
      // Hull creak sound
      if (this.creakTimer > 30 + Math.random() * 30) {
        this.creakTimer = 0;
        this.playHullCreak();
      }
      
      // F5 steam bursts
      if (S.floor === 5 && this.steamTimer > 8 + Math.random() * 12) {
        this.steamTimer = 0;
        this.createSteamBurst();
      }
      
      // F4 pollen particles
      if (S.floor === 4 && this.pollenTimer > 2) {
        this.pollenTimer = 0;
        this.createPollenParticle();
      }
      
      // F6 dust motes in candlelight
      if (S.floor === 6 && this.dustTimer > 1) {
        this.dustTimer = 0;
        this.createDustMote();
      }
    },
    
    applyScreenSway() {
      // Very gentle screen sway
      const swayX = Math.sin(this.breatheTimer * 0.5) * 0.5;
      const swayY = Math.cos(this.breatheTimer * 0.3) * 0.3;
      
      ctx.save();
      ctx.translate(swayX, swayY);
    },
    
    removeScreenSway() {
      ctx.restore();
    },
    
    playHullCreak() {
      if (!S.audioCtx) return;
      
      const creak = S.audioCtx.createOscillator();
      const creakGain = S.audioCtx.createGain();
      
      creak.type = 'sawtooth';
      creak.frequency.value = 60 + Math.random() * 40;
      creakGain.gain.setValueAtTime(0.02 * S.volume, S.audioCtx.currentTime);
      creakGain.gain.exponentialRampToValueAtTime(0.001, S.audioCtx.currentTime + 1.5);
      
      creak.connect(creakGain);
      creakGain.connect(S.masterGain);
      creak.start();
      creak.stop(S.audioCtx.currentTime + 1.5);
    },
    
    createSteamBurst() {
      // Add steam particles near pipes on F5
      const steamSources = [
        {x: 200, y: 300},
        {x: 500, y: 250},
        {x: 600, y: 400}
      ];
      
      const source = steamSources[Math.floor(Math.random() * steamSources.length)];
      
      for (let i = 0; i < 8; i++) {
        S.particles.push({
          x: source.x + (Math.random() - 0.5) * 20,
          y: source.y,
          vx: (Math.random() - 0.5) * 20,
          vy: -20 - Math.random() * 40,
          life: 60 + Math.random() * 60,
          color: '#DDDDDD',
          size: 3 + Math.random() * 4,
          type: 'steam'
        });
      }
    },
    
    createPollenParticle() {
      // Floating pollen in F4 garden
      S.particles.push({
        x: 50 + Math.random() * (W - 100),
        y: H - 20,
        vx: (Math.random() - 0.5) * 10,
        vy: -10 - Math.random() * 20,
        life: 300 + Math.random() * 200,
        color: '#FFFF80',
        size: 1 + Math.random() * 2,
        type: 'pollen'
      });
    },
    
    createDustMote() {
      // Dust motes near light sources on F6
      const lightSources = [
        {x: 300, y: 150},
        {x: 450, y: 300},
        {x: 650, y: 250}
      ];
      
      lightSources.forEach(light => {
        if (Math.random() < 0.3) {
          S.particles.push({
            x: light.x + (Math.random() - 0.5) * 60,
            y: light.y + (Math.random() - 0.5) * 60,
            vx: (Math.random() - 0.5) * 5,
            vy: -2 - Math.random() * 3,
            life: 180 + Math.random() * 120,
            color: '#FFFFAA',
            size: 1,
            type: 'dust'
          });
        }
      });
    }
  },
  
  // Main atmosphere system management
  init() {
    this.windowEffects.init();
    this.ambientSound.init();
  },
  
  update(dt) {
    this.pixelHints.update();
    this.peripheralEffects.update(dt);
    this.windowEffects.update(dt);
    this.stationBreathing.update(dt);
    
    // Check for floor change for ambient sound
    if (this.ambientSound.currentFloor !== S.floor) {
      this.ambientSound.updateFloor(S.floor);
    }
  },
  
  render() {
    // Apply station breathing sway
    this.stationBreathing.applyScreenSway();
    
    // Render floor-specific window effects
    this.windowEffects.renderF2Dome();
    this.windowEffects.renderF1Window();
    
    // Remove sway transform
    this.stationBreathing.removeScreenSway();
    
    // Render peripheral effects
    this.peripheralEffects.render();
    
    // Dynamic lighting overlay (rendered last)
    this.lighting.renderLightOverlay();
  },
  
  // Handle music toggle to start/stop ambient sounds
  onMusicToggle(playing) {
    if (playing) {
      this.ambientSound.startFloorAmbient(S.floor);
    } else {
      this.ambientSound.stopAll();
    }
  }
};

// Hook into existing systems
{
  // Initialize atmosphere system
  AtmosphereSystem.init();
  
  // Patch the music toggle to control ambient sounds
  const _origToggleMusic = toggleMusic;
  toggleMusic = function() {
    _origToggleMusic();
    AtmosphereSystem.onMusicToggle(S.musicPlaying);
  };
  
  // Patch the update loop to include atmosphere
  const _origUpdate = update;
  update = function(dt) {
    _origUpdate(dt);
    AtmosphereSystem.update(dt);
  };
  
  // Patch the render loop to include atmosphere effects
  const _origRender = render;
  render = function() {
    _origRender();
    AtmosphereSystem.render();
  };
  
  // Patch changeFloor to trigger ambient sound changes
  const _origChangeFloor = changeFloor;
  changeFloor = function(f) {
    _origChangeFloor(f);
    AtmosphereSystem.ambientSound.updateFloor(f);
  };
}

console.log('🌟 Atmosphere System: Dynamic lighting, ambient sound, peripheral effects, station breathing');

})();
</script>
