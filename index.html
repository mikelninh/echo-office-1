// §25. RESPONSIVE & GAME LOOP
// ═══════════════════════════════════════
function resizeCanvas(){const chatW=window.innerWidth>900?260:0,availW=window.innerWidth-chatW,availH=window.innerWidth>900?window.innerHeight:window.innerHeight-180;const scale=Math.min(availW/W,availH/H,1.5);canvas.style.width=W*scale+'px';canvas.style.height=H*scale+'px'}
let lastTime=0;
// Global time scale for slow-mo effects
let gameTimeScale = 1.0;
let _slowMoTimer = 0;
let _slowMoTarget = 1.0;
function triggerSlowMo(scale, duration) {
  gameTimeScale = scale;
  _slowMoTimer = duration;
  _slowMoTarget = 1.0;
}
function updateSlowMo(realDt) {
  if (_slowMoTimer > 0) {
    _slowMoTimer -= realDt;
    if (_slowMoTimer <= 0) gameTimeScale = _slowMoTarget;
  }
}

// Impact ring system
const impactRings = [];
function addImpactRing(x, y, color, maxRadius, speed) {
  impactRings.push({x, y, color, radius: 0, maxRadius: maxRadius || 60, speed: speed || 3, alpha: 1});
}
function updateImpactRings(dt) {
  for (let i = impactRings.length - 1; i >= 0; i--) {
    const r = impactRings[i];
    r.radius += r.speed * (dt * 60);
    r.alpha = 1 - r.radius / r.maxRadius;
    if (r.alpha <= 0) impactRings.splice(i, 1);
  }
}
function renderImpactRings() {
  for (const r of impactRings) {
    ctx.save();
    ctx.globalAlpha = r.alpha * 0.7;
    ctx.strokeStyle = r.color;
    ctx.lineWidth = 2 + r.alpha * 3;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// Cinematic effects state
S.chromaticAberration = 0;
S.vignetteIntensity = 0;
S.freezeFrame = 0;
S.cameraZoom = 1.0;
S._cameraZoomTimer = 0;

function gameLoop(time){S._fpsFrames=(S._fpsFrames||0)+1;const realDt=Math.min((time-lastTime)/1000,.05);lastTime=time;updateSlowMo(realDt);const dt=realDt*gameTimeScale;if(S.freezeFrame>0){S.freezeFrame-=realDt;render();requestAnimationFrame(gameLoop);return}if(S.chromaticAberration>0)S.chromaticAberration*=0.92;if(S.chromaticAberration<0.1)S.chromaticAberration=0;if(S.vignetteIntensity>0)S.vignetteIntensity*=0.95;if(S._cameraZoomTimer>0){S._cameraZoomTimer-=realDt;if(S._cameraZoomTimer<=0)S.cameraZoom=1.0;}updateImpactRings(dt);update(dt);render();requestAnimationFrame(gameLoop)}

// §28. ENHANCEMENT SYSTEM (v24)
// ═══════════════════════════════════════
const EnhancementSystem = {
  getLevel(item) { return item.enhanceLevel || 0; },
  getCost(level) { return (level + 1) * 50; },
  getChance(level) {
    if (level < 10) return 1.0;
    if (level < 15) return 0.7;
    return 0.5;
  },
  getGlowClass(level) {
    if (level >= 20) return 'enhance-glow-20';
    if (level >= 15) return 'enhance-glow-15';
    if (level >= 10) return 'enhance-glow-10';
    if (level >= 5) return 'enhance-glow-5';
    if (level >= 1) return 'enhance-glow-1';
    return '';
  },
  getEnhanceableItems() {
    const weapons = LS.get('ownedWeapons', []);
    const lootInv = LS.get('lootInventory', []);
    const items = [];
    weapons.forEach(wid => {
      const wpn = WEAPONS.find(w => w.id === wid);
      if (!wpn) return;
      const enhData = LS.get('enhance_' + wid, { level: 0 });
      items.push({ uid: wid, type: 'weapon', name: wpn.name, icon: wpn.icon, rarity: wpn.rarity, enhanceLevel: enhData.level });
    });
    lootInv.filter(i => i.type === 'weapon' || i.type === 'aura' || i.type === 'hat' || i.type === 'trail').forEach(item => {
      const def = getAllLootableItems().find(d => d.itemId === item.itemId);
      const enhData = LS.get('enhance_' + item.id, { level: 0 });
      items.push({ uid: item.id, type: item.type, name: def ? def.name : '???', icon: def ? def.icon : '❓', rarity: item.rarity, enhanceLevel: enhData.level, lootItem: true });
    });
    return items;
  },
  getDisplayName(item) {
    const lvl = item.enhanceLevel || 0;
    return lvl > 0 ? `${item.name} +${lvl}` : item.name;
  },
  showUI() {
    const items = this.getEnhanceableItems();
    if (!items.length) {
      showNotification('No enhanceable items! Get weapons from the shop or arena.');
      return;
    }
    let html = '<h3>⚗️ Enhancement Station</h3>';
    html += '<p style="font-size:10px;color:#888;margin-bottom:8px">Strengthen your items. +1→+10 safe. +11→+15 risky. +16→+20 deadly!</p>';
    html += '<div style="max-height:350px;overflow-y:auto">';
    items.forEach((item, i) => {
      const lvl = item.enhanceLevel || 0;
      const cost = this.getCost(lvl);
      const chance = this.getChance(lvl);
      const r = RARITIES[item.rarity] || RARITIES.common;
      const glowClass = this.getGlowClass(lvl);
      const riskLabel = lvl >= 15 ? ' 💀 DESTROY RISK' : lvl >= 10 ? ' ⚠️ RESET RISK' : ' ✅ SAFE';
      const riskColor = lvl >= 15 ? '#ff3344' : lvl >= 10 ? '#ffaa00' : '#44cc44';
      html += `<div class="bazaar-listing" data-idx="${i}" style="cursor:pointer;border-color:${r.border}">`;
      html += `<span class="listing-icon ${glowClass}" style="font-size:24px">${item.icon}</span>`;
      html += `<div class="listing-info"><div style="color:${r.color};font-weight:bold">${this.getDisplayName(item)}</div>`;
      html += `<div style="font-size:9px;color:#888">${r.name} ${item.type}</div>`;
      html += `<div style="font-size:9px;color:${riskColor}">${Math.round(chance * 100)}% success${riskLabel}</div></div>`;
      html += `<div style="text-align:right"><div class="listing-price">${cost}◈</div><div style="font-size:8px;color:#888">+${lvl} → +${lvl+1}</div></div>`;
      html += '</div>';
    });
    html += '</div>';
    const { p } = createPopup(html);
    p.querySelectorAll('.bazaar-listing').forEach(el => {
      el.onclick = () => {
        const idx = parseInt(el.dataset.idx);
        p.closest('.popup-overlay').remove();
        this.showEnhanceAnimation(items[idx]);
      };
    });
  },
  showEnhanceAnimation(item) {
    const lvl = item.enhanceLevel || 0;
    const cost = this.getCost(lvl);
    const chance = this.getChance(lvl);
    if (!Coins.canAfford(cost)) { showNotification(`Need ${cost}◈ to enhance!`); return; }
    
    const ov = document.createElement('div');
    ov.className = 'enhance-overlay';
    const glowClass = this.getGlowClass(lvl);
    const riskColor = lvl >= 15 ? '#ff3344' : lvl >= 10 ? '#ffaa00' : '#00fff7';
    ov.innerHTML = `
      <div class="enhance-stage" id="enhance-stage">
        <div class="enhance-anim" id="enhance-anim"></div>
        <div class="enhance-item-display ${glowClass}" id="enhance-icon">${item.icon}</div>
        <div class="enhance-item-name" id="enhance-name">${this.getDisplayName(item)}</div>
        <div class="enhance-level" id="enhance-lvl">+${lvl} → +${lvl + 1}</div>
        <div class="enhance-chance" style="color:${riskColor}">${Math.round(chance * 100)}% Success${lvl >= 15 ? ' — 💀 FAIL = DESTROYED' : lvl >= 10 ? ' — ⚠️ FAIL = RESET TO +10' : ''}</div>
        <div class="enhance-cost" id="enhance-cost">${cost}◈</div>
        <div style="margin-top:12px">
          <button class="enhance-btn" id="enhance-go">⚗️ ENHANCE</button>
          <button class="enhance-btn cancel" id="enhance-cancel">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(ov);
    ov.querySelector('#enhance-cancel').onclick = () => ov.remove();
    ov.querySelector('#enhance-go').onclick = () => {
      if (!Coins.canAfford(cost)) { showNotification('Not enough ◈!'); return; }
      Coins.spend(cost, 'enhance');
      ov.querySelector('#enhance-go').disabled = true;
      ov.querySelector('#enhance-cancel').style.display = 'none';
      // Dramatic animation
      const stage = ov.querySelector('#enhance-stage');
      const anim = ov.querySelector('#enhance-anim');
      stage.style.animation = 'enhanceGlow 1.5s ease-in-out';
      // Particle burst in the anim area
      let particleCount = 0;
      const particleInterval = setInterval(() => {
        particleCount++;
        const spark = document.createElement('div');
        spark.style.cssText = `position:absolute;width:4px;height:4px;background:${riskColor};border-radius:50%;left:${50 + (Math.random() - .5) * 60}%;top:${50 + (Math.random() - .5) * 60}%;pointer-events:none;transition:all .5s;opacity:1`;
        anim.appendChild(spark);
        setTimeout(() => { spark.style.opacity = '0'; spark.style.transform = `translate(${(Math.random()-.5)*80}px, ${(Math.random()-.5)*80}px)`; }, 50);
        setTimeout(() => spark.remove(), 600);
        if (particleCount > 30) clearInterval(particleInterval);
      }, 50);

      setTimeout(() => {
        const success = Math.random() < chance;
        const icon = ov.querySelector('#enhance-icon');
        const name = ov.querySelector('#enhance-name');
        const lvlEl = ov.querySelector('#enhance-lvl');
        
        if (success) {
          const newLevel = lvl + 1;
          const enhData = { level: newLevel };
          LS.set('enhance_' + item.uid, enhData);
          item.enhanceLevel = newLevel;
          
          stage.style.animation = 'enhanceSuccess .5s ease';
          stage.style.borderColor = '#ffd700';
          icon.className = 'enhance-item-display ' + this.getGlowClass(newLevel);
          name.textContent = this.getDisplayName(item);
          name.style.color = '#ffd700';
          lvlEl.textContent = `+${newLevel} SUCCESS! ✨`;
          lvlEl.style.color = '#ffd700';
          
          // Screen effects
          S.screenFlash = '#ffd700';
          S.screenShake = 5;
          for (let i = 0; i < 30; i++) {
            S.particles.push({x: S.visitor.x + (Math.random()-.5)*40, y: S.visitor.y - 20 + (Math.random()-.5)*40, vx: (Math.random()-.5)*4, vy: (Math.random()-.5)*4 - 2, life: 40, color: '#ffd700', size: 2 + Math.random()*3});
          }
          showNotification(`✨ Enhancement SUCCESS! ${this.getDisplayName(item)}`);
          addChatMsg('Echo', `⚗️ ${this.getDisplayName(item)} — Enhancement successful!`, '#ffd700');
          // Track for missions
          MissionBoard.trackProgress('enhance_item', 1);
          if (newLevel >= 5) MissionBoard.trackProgress('enhance_to_5', 1);
        } else {
          if (lvl >= 15) {
            // DESTROYED
            stage.style.borderColor = '#ff3344';
            icon.style.animation = 'enhanceDestroy 1s ease forwards';
            name.textContent = 'DESTROYED 💀';
            name.style.color = '#ff3344';
            lvlEl.textContent = '';
            LS.set('enhance_' + item.uid, { level: 0 });
            // Remove the item
            if (item.lootItem) {
              LootSystem.removeFromInventory(item.uid);
            } else {
              const owned = LS.get('ownedWeapons', []);
              const idx = owned.indexOf(item.uid);
              if (idx >= 0) { owned.splice(idx, 1); LS.set('ownedWeapons', owned); }
              if (WeaponSystem.equipped && WeaponSystem.equipped._id === item.uid) WeaponSystem.unequip();
            }
            S.screenFlash = '#ff0000';
            S.screenShake = 10;
            showNotification(`💀 ${item.name} was DESTROYED!`);
            addChatMsg('Echo', `💀 ${item.name} shattered into pieces... It\'s gone forever.`, '#ff3344');
          } else {
            // Reset to +10
            stage.style.animation = 'enhanceFail .5s ease';
            stage.style.borderColor = '#ffaa00';
            LS.set('enhance_' + item.uid, { level: 10 });
            item.enhanceLevel = 10;
            name.textContent = this.getDisplayName(item);
            name.style.color = '#ffaa00';
            lvlEl.textContent = `FAILED — Reset to +10 ⚠️`;
            lvlEl.style.color = '#ffaa00';
            S.screenShake = 5;
            showNotification(`⚠️ Enhancement failed! Reset to +10.`);
          }
        }
        setTimeout(() => {
          ov.innerHTML += '<div style="text-align:center;margin-top:20px"><button class="enhance-btn" onclick="this.closest(\'.enhance-overlay\').remove()">Close</button></div>';
        }, 800);
      }, 1800);
    };
  },
  // Get enhancement glow color for rendering
  getGlowColor(level) {
    if (level >= 20) return { color: '#ffffff', intensity: 1.0, pulseSpeed: 6 };
    if (level >= 15) return { color: '#ff6ec7', intensity: 0.7, pulseSpeed: 4 };
    if (level >= 10) return { color: '#ffd700', intensity: 0.5, pulseSpeed: 3 };
    if (level >= 5) return { color: '#00fff7', intensity: 0.3, pulseSpeed: 2 };
    if (level >= 1) return { color: '#00fff7', intensity: 0.15, pulseSpeed: 1.5 };
    return null;
  }
};

// §29. SPECIALIST TRANSFORMATIONS (v24)
// ═══════════════════════════════════════
const SPECIALIST_CARDS = [
  { id: 'shadow', name: 'Shadow', icon: '🌑', color: '#4a0066', desc: 'Invisibility + backstab damage', ability: 'Become invisible to enemies. First strike deals 3x damage.', duration: 300, dropChance: 0.03 },
  { id: 'nova', name: 'Nova', icon: '💥', color: '#ff4400', desc: 'AoE blast attack', ability: 'Press T to unleash a devastating area blast dealing 50 damage.', duration: 300, dropChance: 0.03 },
  { id: 'frost', name: 'Frost', icon: '❄️', color: '#4488ff', desc: 'Slow aura around you', ability: 'Enemies near you move 50% slower. Attacks have frost effect.', duration: 300, dropChance: 0.02 },
  { id: 'storm', name: 'Storm', icon: '⚡', color: '#ffdd00', desc: 'Speed + lightning', ability: 'Move 80% faster. Attacks chain lightning to nearby enemies.', duration: 300, dropChance: 0.02 },
];

const SpecialistSystem = {
  heldCard: LS.get('specialistCard', null), // { id, obtainedAt }
  activeTransform: null, // { id, startTime, endTime }
  transformTimer: 0,
  
  tryDrop() {
    if (this.heldCard) return null; // Can only hold one
    const roll = Math.random();
    let cumulative = 0;
    for (const card of SPECIALIST_CARDS) {
      cumulative += card.dropChance;
      if (roll < cumulative) {
        this.heldCard = { id: card.id, obtainedAt: Date.now() };
        LS.set('specialistCard', this.heldCard);
        showNotification(`🃏 SPECIALIST CARD: ${card.icon} ${card.name}!`);
        addChatMsg('Echo', `🃏 You found a ${card.icon} ${card.name} Specialist Card! Use it from your inventory for a powerful 5-minute transformation!`, card.color);
        // Epic reveal
        S.screenFlash = card.color;
        S.screenShake = 8;
        for (let i = 0; i < 50; i++) {
          const a = Math.random() * Math.PI * 2;
          S.particles.push({x: S.visitor.x + Math.cos(a) * 20, y: S.visitor.y - 15 + Math.sin(a) * 20, vx: Math.cos(a) * 4, vy: Math.sin(a) * 4, life: 40, color: card.color, size: 3 + Math.random() * 2});
        }
        return card;
      }
    }
    return null;
  },
  
  activate() {
    if (!this.heldCard) { showNotification('No specialist card!'); return; }
    const card = SPECIALIST_CARDS.find(c => c.id === this.heldCard.id);
    if (!card) return;
    
    this.activeTransform = { id: card.id, startTime: Date.now(), endTime: Date.now() + card.duration * 1000 };
    this.heldCard = null;
    LS.set('specialistCard', null);
    
    // Dramatic transformation
    S.screenFlash = '#ffffff';
    S.screenShake = 12;
    S.chromaticAberration = 5;
    S.vignetteIntensity = 0.8;
    S.cameraZoom = 1.1;
    S._cameraZoomTimer = 1.0;
    if (typeof triggerSlowMo === 'function') triggerSlowMo(0.2, 1.0);
    
    for (let i = 0; i < 80; i++) {
      const a = Math.random() * Math.PI * 2;
      S.particles.push({x: S.visitor.x + Math.cos(a) * 30, y: S.visitor.y - 15 + Math.sin(a) * 30, vx: Math.cos(a) * 6, vy: Math.sin(a) * 6, life: 50, color: card.color, size: 2 + Math.random() * 4});
    }
    
    showNotification(`${card.icon} ${card.name} TRANSFORMATION! 5 minutes of power!`);
    addChatMsg('Echo', `${card.icon} SPECIALIST TRANSFORMATION: ${card.name}! ${card.ability}`, card.color);
    MissionBoard.trackProgress('transform', 1);
  },
  
  isActive() { return this.activeTransform && Date.now() < this.activeTransform.endTime; },
  getActive() { return this.isActive() ? SPECIALIST_CARDS.find(c => c.id === this.activeTransform.id) : null; },
  getTimeLeft() { return this.isActive() ? Math.max(0, Math.ceil((this.activeTransform.endTime - Date.now()) / 1000)) : 0; },
  
  getSpeedBonus() { const a = this.getActive(); return a && a.id === 'storm' ? 0.8 : 0; },
  getDamageMultiplier() { const a = this.getActive(); return a && a.id === 'shadow' ? 3.0 : 1.0; },
  
  update(dt) {
    if (this.isActive()) {
      const card = this.getActive();
      if (card) {
        // Specialist aura particles
        if (Math.random() < 0.3) {
          const a = Math.random() * Math.PI * 2;
          S.particles.push({x: S.visitor.x + Math.cos(a) * 20, y: S.visitor.y - 15 + Math.sin(a) * 20, vx: Math.cos(a) * 0.5, vy: -0.5, life: 20, color: card.color, size: 1 + Math.random() * 2});
        }
      }
    } else if (this.activeTransform) {
      // Transform just expired
      this.activeTransform = null;
      showNotification('Specialist transformation expired.');
    }
  },
  
  showCardUI() {
    if (!this.heldCard && !this.isActive()) { showNotification('No specialist card. Win PvE fights for a chance to drop one!'); return; }
    let html = '<h3>🃏 Specialist Card</h3>';
    if (this.isActive()) {
      const card = this.getActive();
      html += `<div style="text-align:center;padding:20px"><div style="font-size:48px">${card.icon}</div>`;
      html += `<div style="color:${card.color};font-size:18px;font-weight:bold;margin:8px">${card.name} ACTIVE</div>`;
      html += `<div style="color:#aaa;font-size:11px">${card.ability}</div>`;
      html += `<div style="color:#ffd700;font-size:14px;margin-top:10px">${Math.floor(this.getTimeLeft()/60)}:${String(this.getTimeLeft()%60).padStart(2,'0')} remaining</div></div>`;
    } else {
      const card = SPECIALIST_CARDS.find(c => c.id === this.heldCard.id);
      html += `<div style="text-align:center;padding:20px"><div style="font-size:48px">${card.icon}</div>`;
      html += `<div style="color:${card.color};font-size:18px;font-weight:bold;margin:8px">${card.name}</div>`;
      html += `<div style="color:#aaa;font-size:11px">${card.ability}</div>`;
      html += `<div style="color:#888;font-size:10px;margin-top:8px">Duration: 5 minutes</div>`;
      html += `<button class="enhance-btn" id="spec-activate" style="margin-top:12px">${card.icon} TRANSFORM!</button></div>`;
    }
    const { p } = createPopup(html);
    const btn = p.querySelector('#spec-activate');
    if (btn) btn.onclick = () => { p.closest('.popup-overlay').remove(); this.activate(); };
  },
  
  renderAura(ctx) {
    if (!this.isActive()) return;
    const card = this.getActive();
    const v = S.visitor;
    const pulse = 0.3 + Math.sin(S.time * 3) * 0.15;
    const g = ctx.createRadialGradient(v.x, v.y - 15, 5, v.x, v.y - 15, 35);
    g.addColorStop(0, card.color + Math.floor(pulse * 255).toString(16).padStart(2, '0'));
    g.addColorStop(1, card.color + '00');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(v.x, v.y - 15, 35, 0, Math.PI * 2); ctx.fill();
    // Time indicator ring
    const timeLeft = this.getTimeLeft();
    const timePct = timeLeft / 300;
    ctx.strokeStyle = card.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(v.x, v.y - 15, 30, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * timePct);
    ctx.stroke();
  }
};

  { id: 'win_duels', desc: 'Win {n} duels', targets: [2, 3, 5], reward: [30, 50, 80], trackKey: 'duels_won' },
  { id: 'visit_floors', desc: 'Visit all 7 floors', targets: [7], reward: [40], trackKey: 'floors_visited' },

  { id: 'earn_coins', desc: 'Earn {n}◈', targets: [50, 100, 200], reward: [20, 35, 60], trackKey: 'coins_earned' },
  { id: 'pet_pixel', desc: 'Pet Pixel {n} times', targets: [5, 10], reward: [15, 30], trackKey: 'pixel_pets' },

  { id: 'pve_wins', desc: 'Win {n} PvE fights', targets: [1, 3], reward: [25, 60], trackKey: 'pve_wins' },
  { id: 'buy_item', desc: 'Buy an item from the shop', targets: [1], reward: [20], trackKey: 'shop_buys' },
  { id: 'transform', desc: 'Use a specialist transformation', targets: [1], reward: [50], trackKey: 'transform' },
];

const WEEKLY_MISSIONS = [
  { id: 'weekly_duels', desc: 'Win 10 duels this week', target: 10, reward: 200, trackKey: 'duels_won', lootReward: 'epic' },
  { id: 'weekly_enhance', desc: 'Enhance items 5 times', target: 5, reward: 150, trackKey: 'enhance_item', lootReward: 'rare' },
  { id: 'weekly_coins', desc: 'Earn 500◈ this week', target: 500, reward: 100, trackKey: 'coins_earned', lootReward: 'rare' },
  { id: 'weekly_explorer', desc: 'Visit all floors 5 days', target: 5, reward: 250, trackKey: 'days_all_floors', lootReward: 'legendary' },
];

const MissionBoard = {
  _missions: null,
  _weekly: null,
  _progress: null,
  
  init() {
    const today = new Date().toISOString().slice(0, 10);
    const saved = LS.get('missionBoard', null);
    if (saved && saved.date === today) {
      this._missions = saved.missions;
      this._progress = saved.progress;
    } else {
      this._generateDaily();
    }
    // Weekly
    const weekNum = this._getWeekNum();
    const savedWeekly = LS.get('weeklyMission', null);
    if (savedWeekly && savedWeekly.week === weekNum) {
      this._weekly = savedWeekly;
    } else {
      const template = WEEKLY_MISSIONS[weekNum % WEEKLY_MISSIONS.length];
      this._weekly = { ...template, week: weekNum, progress: 0, claimed: false };
      LS.set('weeklyMission', this._weekly);
    }
  },
  
  _getWeekNum() { return Math.floor(Date.now() / (7 * 24 * 60 * 60 * 1000)); },
  
  _generateDaily() {
    const today = new Date().toISOString().slice(0, 10);
    // Seed from date for deterministic daily missions
    let seed = 0;
    for (let i = 0; i < today.length; i++) seed = ((seed << 5) - seed) + today.charCodeAt(i);
    const shuffled = [...MISSION_TEMPLATES].sort((a, b) => {
      const ha = ((seed * 31 + a.id.charCodeAt(0)) % 1000) / 1000;
      const hb = ((seed * 31 + b.id.charCodeAt(0)) % 1000) / 1000;
      return ha - hb;
    });
    this._missions = shuffled.slice(0, 3).map(t => {
      const varIdx = Math.abs(seed) % t.targets.length;
      const target = t.targets[varIdx];
      const reward = t.reward[varIdx];
      return { id: t.id, desc: t.desc.replace('{n}', target), target, reward, trackKey: t.trackKey, claimed: false };
    });
    this._progress = {};
    LS.set('missionBoard', { date: today, missions: this._missions, progress: this._progress });
  },
  
  trackProgress(trackKey, amount) {
    if (!this._progress) return;
    this._progress[trackKey] = (this._progress[trackKey] || 0) + amount;
    LS.set('missionBoard', { date: new Date().toISOString().slice(0, 10), missions: this._missions, progress: this._progress });
    // Weekly
    if (this._weekly && this._weekly.trackKey === trackKey) {
      this._weekly.progress = (this._weekly.progress || 0) + amount;
      LS.set('weeklyMission', this._weekly);
    }
    // Check if any mission just completed
    this._missions.forEach(m => {
      if (!m.claimed && (this._progress[m.trackKey] || 0) >= m.target) {
        showNotification(`📋 Mission complete: ${m.desc}!`);
      }
    });
  },
  
  showUI() {
    this.init();
    let html = '<h3>📋 Daily Missions</h3>';
    html += '<p style="font-size:10px;color:#888;margin-bottom:8px">Complete missions for bonus ◈! Resets daily.</p>';
    
    this._missions.forEach((m, i) => {
      const progress = this._progress[m.trackKey] || 0;
      const complete = progress >= m.target;
      const pct = Math.min(100, Math.round(progress / m.target * 100));
      html += `<div class="mission-card ${complete ? 'complete' : ''}">`;
      html += `<div class="mission-title">${complete ? '✅' : '📌'} ${m.desc}</div>`;
      html += `<div class="mission-reward">Reward: ${m.reward}◈</div>`;
      html += `<div class="mission-progress">${progress}/${m.target}</div>`;
      html += `<div class="mission-progress-bar"><div class="mission-progress-fill" style="width:${pct}%"></div></div>`;
      if (complete && !m.claimed) {
        html += `<button class="drink-btn claim-mission" data-idx="${i}" style="margin-top:4px;border-color:#44cc44;color:#44cc44">Claim ${m.reward}◈</button>`;
      }
      html += '</div>';
    });
    
    // Weekly
    html += '<div style="margin-top:12px;border-top:1px solid #333;padding-top:8px">';
    html += '<h3 style="color:#ff6ec7">🏅 Weekly Challenge</h3>';
    const w = this._weekly;
    const wProgress = w.progress || 0;
    const wComplete = wProgress >= w.target;
    const wPct = Math.min(100, Math.round(wProgress / w.target * 100));
    html += `<div class="mission-card weekly-card ${wComplete ? 'complete' : ''}">`;
    html += `<div class="mission-title">${wComplete ? '✅' : '🏅'} ${w.desc}</div>`;
    html += `<div class="mission-reward">${w.reward}◈ + ${w.lootReward} loot drop!</div>`;
    html += `<div class="mission-progress">${wProgress}/${w.target}</div>`;
    html += `<div class="mission-progress-bar"><div class="mission-progress-fill" style="width:${wPct}%;background:#ff6ec7"></div></div>`;
    if (wComplete && !w.claimed) {
      html += `<button class="drink-btn claim-weekly" style="margin-top:4px;border-color:#ff6ec7;color:#ff6ec7">Claim Rewards!</button>`;
    }
    html += '</div></div>';
    
    const { p } = createPopup(html);
    p.querySelectorAll('.claim-mission').forEach(btn => {
      btn.onclick = () => {
        const idx = parseInt(btn.dataset.idx);
        const m = this._missions[idx];
        m.claimed = true;
        Coins.earn(m.reward, 'mission');
        btn.textContent = 'Claimed! ✅';
        btn.disabled = true;
        LS.set('missionBoard', { date: new Date().toISOString().slice(0, 10), missions: this._missions, progress: this._progress });
        showNotification(`📋 +${m.reward}◈ from mission!`);
      };
    });
    const weeklyBtn = p.querySelector('.claim-weekly');
    if (weeklyBtn) {
      weeklyBtn.onclick = () => {
        this._weekly.claimed = true;
        Coins.earn(this._weekly.reward, 'weekly_mission');
        LS.set('weeklyMission', this._weekly);
        const item = LootSystem.rollMinRarity(this._weekly.lootReward);
        LootSystem.addToInventory(item);
        setTimeout(() => LootSystem.showLootCard(item), 500);
        weeklyBtn.textContent = 'Claimed! ✅';
        weeklyBtn.disabled = true;
        showNotification(`🏅 Weekly reward: +${this._weekly.reward}◈ + ${RARITIES[this._weekly.lootReward].name} loot!`);
      };
    }
  }
};

// §31. BAZAAR TRADING UI (v24)
// ═══════════════════════════════════════
const BazaarUI = {
  showUI() {
    let html = '<h3>🏪 Bazaar Trading Post</h3>';
    html += '<div class="bazaar-tabs"><div class="bazaar-tab active" data-tab="browse">Browse</div><div class="bazaar-tab" data-tab="sell">Sell Items</div><div class="bazaar-tab" data-tab="history">History</div></div>';
    html += '<div id="bazaar-content" style="min-height:200px;max-height:350px;overflow-y:auto"></div>';
    
    const { p } = createPopup(html);
    
    const tabs = p.querySelectorAll('.bazaar-tab');
    tabs.forEach(tab => {
      tab.onclick = () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        this._renderTab(tab.dataset.tab, p.querySelector('#bazaar-content'), p);
      };
    });
    this._renderTab('browse', p.querySelector('#bazaar-content'), p);
  },
  
  async _renderTab(tab, container, popup) {
    if (tab === 'browse') {
      container.innerHTML = '<div style="text-align:center;color:#888;padding:20px">Loading...</div>';
      try {
        const res = await fetch('/api/marketplace');
        const listings = await res.json();
        if (!listings.length) {
          container.innerHTML = '<div style="text-align:center;color:#888;padding:20px">No listings yet. Be the first to sell!</div>';
          return;
        }
        let html = '';
        listings.forEach(l => {
          const def = getAllLootableItems().find(i => i.itemId === (l.item && l.item.itemId));
          const r = RARITIES[(l.item && l.item.rarity) || 'common'] || RARITIES.common;
          const icon = def ? def.icon : (l.item && l.item.icon) || '❓';
          const name = def ? def.name : (l.item && l.item.name) || '???';
          const enhLvl = l.item && l.item.enhanceLevel ? ` +${l.item.enhanceLevel}` : '';
          html += `<div class="bazaar-listing" data-id="${l.id}">`;
          html += `<span class="listing-icon">${icon}</span>`;
          html += `<div class="listing-info"><div style="color:${r.color};font-weight:bold">${name}${enhLvl}</div>`;
          html += `<div class="listing-seller">Seller: ${l.owner}</div></div>`;
          html += `<div class="listing-price">${l.price}◈</div>`;
          html += '</div>';
        });
        container.innerHTML = html;
        container.querySelectorAll('.bazaar-listing').forEach(el => {
          el.onclick = () => this._buyListing(el.dataset.id, popup);
        });
      } catch (e) {
        container.innerHTML = '<div style="color:#ff4444;padding:10px">Failed to load. Server offline?</div>';
      }
    } else if (tab === 'sell') {
      const lootInv = LS.get('lootInventory', []);
      const equipped = LS.get('equippedLoot', {});
      const equippedIds = new Set(Object.values(equipped).filter(Boolean));
      const sellable = lootInv.filter(i => !equippedIds.has(i.id));
      
      if (!sellable.length) {
        container.innerHTML = '<div style="text-align:center;color:#888;padding:20px">No items to sell. Win fights or explore for loot!</div>';
        return;
      }
      let html = '<p style="font-size:9px;color:#888;margin-bottom:6px">5% tax on sales. Set your price and list!</p>';
      sellable.forEach(item => {
        const def = getAllLootableItems().find(d => d.itemId === item.itemId);
        const r = RARITIES[item.rarity] || RARITIES.common;
        const enhData = LS.get('enhance_' + item.id, { level: 0 });
        const enhLabel = enhData.level > 0 ? ` +${enhData.level}` : '';
        html += `<div class="bazaar-listing" data-uid="${item.id}" data-itemid="${item.itemId}" data-rarity="${item.rarity}">`;
        html += `<span class="listing-icon">${def ? def.icon : '❓'}</span>`;
        html += `<div class="listing-info"><div style="color:${r.color};font-weight:bold">${def ? def.name : '???'}${enhLabel}</div>`;
        html += `<div style="font-size:8px;color:#888">${r.name} ${item.type}</div></div>`;
        html += `<div><input type="number" class="sell-price" min="1" max="9999" value="${{common:5,uncommon:15,rare:40,epic:100,legendary:300,mythic:500}[item.rarity]||10}" style="width:50px;background:#222;border:1px solid #555;color:#ffd700;padding:2px 4px;font-size:11px;border-radius:3px">◈`;
        html += `<button class="drink-btn list-item" data-uid="${item.id}" style="margin-left:4px;font-size:9px;padding:3px 8px">List</button></div>`;
        html += '</div>';
      });
      container.innerHTML = html;
      container.querySelectorAll('.list-item').forEach(btn => {
        btn.onclick = async () => {
          const uid = btn.dataset.uid;
          const listing = btn.closest('.bazaar-listing');
          const price = parseInt(listing.querySelector('.sell-price').value);
          if (!price || price < 1 || price > 9999) { showNotification('Invalid price!'); return; }
          const item = lootInv.find(i => i.id === uid);
          if (!item) return;
          const visitorName = LS.get('visitorName', 'Anonymous');
          try {
            const res = await fetch('/api/marketplace/list', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ owner: visitorName, item: { ...item, enhanceLevel: LS.get('enhance_' + uid, { level: 0 }).level }, price })
            });
            const data = await res.json();
            if (data.ok) {
              LootSystem.removeFromInventory(uid);
              btn.textContent = 'Listed! ✅';
              btn.disabled = true;
              showNotification(`🏪 Listed for ${price}◈!`);
              MissionBoard.trackProgress('shop_buys', 1);
            }
          } catch (e) { showNotification('Failed to list. Try again.'); }
        };
      });
    } else if (tab === 'history') {
      container.innerHTML = '<div style="text-align:center;color:#888;padding:20px">Trade history coming soon. Check back later!</div>';
    }
  },
  
  async _buyListing(listingId, popup) {
    const visitorName = LS.get('visitorName', 'Anonymous');
    try {
      const res = await fetch(`/api/marketplace/buy/${listingId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ buyer: visitorName })
      });
      const data = await res.json();
      if (data.ok) {
        if (!Coins.canAfford(data.price)) { showNotification('Not enough ◈!'); return; }
        Coins.spend(data.price, 'bazaar_buy');
        if (data.item) {
          LootSystem.addToInventory(data.item);
          showNotification(`🏪 Bought for ${data.price}◈!`);
          MissionBoard.trackProgress('shop_buys', 1);
        }
        // Refresh
        popup.closest('.popup-overlay').remove();
        this.showUI();
      }
    } catch (e) { showNotification('Purchase failed.'); }
  }
};

// §32. PIXEL EVOLUTION (v25)
// ═══════════════════════════════════════
const PixelEvolution={
  debugAll:false,
  stages:[
    {threshold:25, id:'speech',     name:'Speech Bubbles'},
    {threshold:50, id:'follow',     name:'Follows Visitors'},
    {threshold:100,id:'pettable',   name:'Can Be Petted'},
    {threshold:250,id:'tricks',     name:'Learns Tricks'},
    {threshold:500,id:'crown',      name:'Wears Crown'},
    {threshold:1000,id:'kittens',   name:'Has Kittens'},
  ],
  hasStage(id){
    if(this.debugAll)return true;
    const stage=this.stages.find(s=>s.id===id);
    return stage&&(S.stationStats.totalVisitors||0)>=stage.threshold;
  },
  // Pixel follows nearby visitors (stage: follow)
  updateFollowVisitors(dt){
    if(!this.hasStage('follow'))return;
    const p=S.pixel;if(p.floor!==S.floor||p.state!=='idle')return;
    // Find closest visitor on same floor
    let closest=null,closestDist=120;
    if(S.useVisitor&&S.visitor){
      const d=Math.hypot(S.visitor.x-p.x,S.visitor.y-p.y);
      if(d<closestDist&&d>25){closest={x:S.visitor.x,y:S.visitor.y};closestDist=d;}
    }
    for(const id in S.otherPlayers){
      const op=S.otherPlayers[id];if(op.floor!==S.floor)continue;
      const d=Math.hypot(op.x-p.x,op.y-p.y);
      if(d<closestDist&&d>25){closest={x:op.x,y:op.y};closestDist=d;}
    }
    if(closest){p.targetX=closest.x+15;p.targetY=closest.y+10;p.state='follow';p.stateTimer=0;}
  },
  // Pet Pixel with heart animation (stage: pettable)
  petPixel(){
    if(!this.hasStage('pettable'))return false;
    const p=S.pixel;
    // Hearts
    for(let i=0;i<8;i++){
      S.particles.push({x:p.x+(Math.random()-.5)*20,y:p.y-15,vx:(Math.random()-.5)*2,vy:-1.5-Math.random(),life:35,color:'#ff6688',size:3});
    }
    S.floatTexts.push({text:'❤️ *purrrr*',x:p.x,y:p.y-30,color:'#ff88aa',life:80});
    S.petCount=(S.petCount||0)+1;LS.set('petCount',S.petCount);
    Coins.earn(2,'pet_pixel');
    // Sound
    if(S.audioCtx){const c=S.audioCtx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=800;g.gain.setValueAtTime(.06*S.volume,n);g.gain.exponentialRampToValueAtTime(.001,n+.3);o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.4);}
    return true;
  },
  // Tricks (stage: tricks)
  currentTrick:null,trickTimer:0,
  doTrick(trickName){
    if(!this.hasStage('tricks'))return;
    this.currentTrick=trickName;this.trickTimer=2;
    const p=S.pixel;
    if(trickName==='sit'){
      S.floatTexts.push({text:'🐱 *sits nicely*',x:p.x,y:p.y-30,color:'#c080ff',life:60});
    }else if(trickName==='roll'){
      S.floatTexts.push({text:'🐱 *rolls over*',x:p.x,y:p.y-30,color:'#c080ff',life:60});
      for(let i=0;i<6;i++)S.particles.push({x:p.x+(Math.random()-.5)*15,y:p.y,vx:(Math.random()-.5)*2,vy:-Math.random(),life:20,color:'#c080ff',size:2});
    }else if(trickName==='laser'){
      S.floatTexts.push({text:'🐱 *chases red dot*',x:p.x,y:p.y-30,color:'#ff4444',life:80});
      S._laserDot={x:p.x+80,y:p.y-20,timer:3};
    }
    Coins.earn(3,'trick');
  },
  updateTrick(dt){
    if(this.currentTrick){this.trickTimer-=dt;if(this.trickTimer<=0)this.currentTrick=null;}
    if(S._laserDot){
      S._laserDot.timer-=dt;
      S._laserDot.x+=Math.sin(S.time*5)*2;S._laserDot.y+=Math.cos(S.time*7)*1.5;
      S.pixel.targetX=S._laserDot.x;S.pixel.targetY=S._laserDot.y;
      if(S._laserDot.timer<=0)S._laserDot=null;
    }
  },
  // Crown rendering (stage: crown)
  renderCrown(p){
    if(!this.hasStage('crown'))return;
    const cx=p.x,cy=p.y-22;
    ctx.fillStyle='#ffd700';
    ctx.fillRect(cx-5,cy,10,4);
    ctx.fillRect(cx-5,cy-3,2,3);ctx.fillRect(cx-1,cy-4,2,4);ctx.fillRect(cx+3,cy-3,2,3);
    // Gem
    ctx.fillStyle='#ff4444';ctx.fillRect(cx-1,cy-2,2,2);
    // Pixel grows slightly larger at 500+
    // handled via scale in renderPixel
  },
  showTrickMenu(){
    if(!this.hasStage('tricks'))return;
    let html='<h3>🐱 Pixel\'s Tricks</h3><p style="font-size:11px;color:#aaa">Click a trick to make Pixel perform!</p>';
    const tricks=[{id:'sit',name:'Sit',icon:'🪑'},{id:'roll',name:'Roll Over',icon:'🔄'},{id:'laser',name:'Chase Laser',icon:'🔴'}];
    tricks.forEach(t=>{
      html+=`<button class="drink-btn" onclick="PixelEvolution.doTrick('${t.id}');document.querySelector('.popup-overlay').remove()">${t.icon} ${t.name}</button>`;
    });
    createPopup(html);
  }
};

// §33. DYNAMIC STATION EVENTS (v25)
// ═══════════════════════════════════════
const StationEvents={
  active:null,
  timer:0,
  eventInterval:600+Math.random()*600, // 10-20 min
  debugMode:false,
  events:['meteor_shower','arcade_tournament','garden_bloom','power_outage','visitor_surge'],
  
  update(dt){
    this.timer+=dt;
    // Check for visitor surge
    const onlineCount=(Object.keys(S.otherPlayers).length||0)+1;
    if(onlineCount>=5&&!this.active){this.trigger('visitor_surge');}
    // Random event timer
    if(!this.active&&this.timer>=this.eventInterval){
      this.timer=0;
      this.eventInterval=600+Math.random()*600;
      const evt=this.events[Math.random()*4|0]; // exclude visitor_surge from random
      this.trigger(evt);
    }
    // Update active event
    if(this.active){
      this.active.timer-=dt;
      if(this.active.timer<=0){this.endEvent();return;}
      this.active.update(dt);
    }
  },
  
  trigger(eventId){
    if(this.active)return;
    const events={
      meteor_shower:{
        name:'☄️ Meteor Shower',floor:2,duration:60,
        meteors:[],spawnTimer:0,caught:0,
        update(dt){
          this.spawnTimer+=dt;
          if(this.spawnTimer>.8){this.spawnTimer=0;this.meteors.push({x:Math.random()*W,y:-10,vx:(Math.random()-.5)*2,vy:3+Math.random()*4,size:3+Math.random()*4,alive:true});}
          this.meteors.forEach(m=>{m.x+=m.vx;m.y+=m.vy;if(m.y>H)m.alive=false;});
          this.meteors=this.meteors.filter(m=>m.alive);
        },
        render(){
          if(S.floor!==2)return;
          this.meteors.forEach(m=>{
            ctx.fillStyle='#ffd700';ctx.beginPath();ctx.arc(m.x,m.y,m.size,0,Math.PI*2);ctx.fill();
            // Trail
            ctx.strokeStyle='rgba(255,215,0,.4)';ctx.lineWidth=m.size/2;ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(m.x-m.vx*4,m.y-m.vy*4);ctx.stroke();
          });
          ctx.fillStyle='rgba(255,215,0,.8)';ctx.font='bold 12px monospace';ctx.textAlign='center';
          ctx.fillText('☄️ METEOR SHOWER! Click falling stars! Caught: '+this.caught,W/2,30);ctx.textAlign='left';
        },
        onClick(x,y){
          if(S.floor!==2)return false;
          for(let i=this.meteors.length-1;i>=0;i--){
            const m=this.meteors[i];
            if(Math.hypot(x-m.x,y-m.y)<m.size+10){
              m.alive=false;this.caught++;
              Coins.earn(5,'meteor');
              for(let j=0;j<8;j++)S.particles.push({x:m.x,y:m.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:20,color:'#ffd700',size:2});
              // Chance to get crafting material
              if(Math.random()<.3){
                CraftingSystem.addMaterial('star_dust');
                S.floatTexts.push({text:'✨ Star Dust!',x:m.x,y:m.y-10,color:'#ffd700',life:60});
              }
              return true;
            }
          }
          return false;
        }
      },
      arcade_tournament:{
        name:'🏆 Arcade Tournament',floor:3,duration:120,
        announced:false,
        update(dt){
          if(!this.announced){
            this.announced=true;
            addChatMsg('Echo','🏆 ARCADE TOURNAMENT! Best scores in the next 2 minutes win bonus ◈! Head to Floor 3!');
          }
        },
        render(){
          if(S.floor!==3)return;
          ctx.fillStyle='rgba(255,215,0,.8)';ctx.font='bold 12px monospace';ctx.textAlign='center';
          const timeLeft=Math.ceil(this.timer);
          ctx.fillText('🏆 TOURNAMENT! '+timeLeft+'s left — Play arcade games for bonus ◈!',W/2,30);ctx.textAlign='left';
        },
        onClick(){return false;}
      },
      garden_bloom:{
        name:'🌸 Garden Bloom',floor:4,duration:90,
        flowers:[],spawned:false,
        update(dt){
          if(!this.spawned){
            this.spawned=true;
            const flowerTypes=['🌸','🌺','🌻','🌹','💐','🌷'];
            for(let i=0;i<8;i++){
              this.flowers.push({x:100+Math.random()*600,y:150+Math.random()*350,type:flowerTypes[Math.random()*flowerTypes.length|0],alive:true});
            }
          }
        },
        render(){
          if(S.floor!==4)return;
          this.flowers.filter(f=>f.alive).forEach(f=>{
            ctx.font='20px serif';ctx.fillText(f.type,f.x,f.y);
            // Glow
            const g=ctx.createRadialGradient(f.x+10,f.y-5,0,f.x+10,f.y-5,20);
            g.addColorStop(0,'rgba(255,200,255,.15)');g.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle=g;ctx.beginPath();ctx.arc(f.x+10,f.y-5,20,0,Math.PI*2);ctx.fill();
          });
          const alive=this.flowers.filter(f=>f.alive).length;
          ctx.fillStyle='rgba(255,150,255,.8)';ctx.font='bold 12px monospace';ctx.textAlign='center';
          ctx.fillText('🌸 GARDEN BLOOM! Click flowers to harvest! '+alive+' remaining',W/2,30);ctx.textAlign='left';
        },
        onClick(x,y){
          if(S.floor!==4)return false;
          for(const f of this.flowers){
            if(!f.alive)continue;
            if(Math.hypot(x-f.x-10,y-f.y+5)<20){
              f.alive=false;Coins.earn(3,'bloom');
              for(let i=0;i<6;i++)S.particles.push({x:f.x,y:f.y,vx:(Math.random()-.5)*3,vy:-Math.random()*2,life:25,color:'#ff88cc',size:3});
              if(Math.random()<.4){
                CraftingSystem.addMaterial('rare_petal');
                S.floatTexts.push({text:'🌺 Rare Petal!',x:f.x,y:f.y-15,color:'#ff88cc',life:60});
              }
              return true;
            }
          }
          return false;
        }
      },
      power_outage:{
        name:'⚡ Power Outage',floor:0,duration:30,
        flickerTimer:0,dark:true,
        update(dt){
          this.flickerTimer+=dt;
          if(this.flickerTimer>.5+Math.random()*.5){this.flickerTimer=0;this.dark=!this.dark;}
        },
        render(){
          if(this.dark){
            ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);
            // Emergency red lighting
            const g=ctx.createRadialGradient(W/2,H/2,50,W/2,H/2,300);
            g.addColorStop(0,'rgba(255,0,0,.08)');g.addColorStop(1,'rgba(0,0,0,0)');
            ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
            // Hidden items revealed (glowing dots)
            for(let i=0;i<3;i++){
              const hx=150+i*250,hy=200+Math.sin(S.time+i)*50;
              ctx.fillStyle='rgba(0,255,200,.6)';ctx.beginPath();ctx.arc(hx,hy,4+Math.sin(S.time*3)*.5,0,Math.PI*2);ctx.fill();
            }
          }
          ctx.fillStyle='rgba(255,50,50,.8)';ctx.font='bold 12px monospace';ctx.textAlign='center';
          ctx.fillText('⚡ POWER OUTAGE! Look for hidden glowing items!',W/2,30);ctx.textAlign='left';
        },
        onClick(x,y){
          if(!this.dark)return false;
          for(let i=0;i<3;i++){
            const hx=150+i*250,hy=200+Math.sin(S.time+i)*50;
            if(Math.hypot(x-hx,y-hy)<15){
              Coins.earn(10,'outage');
              S.floatTexts.push({text:'💎 Hidden Treasure!',x:hx,y:hy-10,color:'#00ffcc',life:60});
              if(Math.random()<.5){CraftingSystem.addMaterial('dark_crystal');S.floatTexts.push({text:'🔮 Dark Crystal!',x:hx,y:hy-25,color:'#aa44ff',life:60});}
              return true;
            }
          }
          return false;
        }
      },
      visitor_surge:{
        name:'👾 Visitor Surge',floor:0,duration:90,
        boss:{x:W/2,y:150,hp:100,maxHp:100,hits:0},
        update(dt){
          this.boss.x=W/2+Math.sin(S.time*1.5)*150;
          this.boss.y=120+Math.sin(S.time*2.3)*30;
        },
        render(){
          const b=this.boss;
          // Boss
          ctx.fillStyle='#ff4444';ctx.font='40px serif';ctx.textAlign='center';ctx.fillText('👾',b.x,b.y);
          // HP bar
          const hpPct=b.hp/b.maxHp;
          ctx.fillStyle='#333';ctx.fillRect(W/2-80,60,160,10);
          ctx.fillStyle=hpPct>.5?'#44ff44':hpPct>.25?'#ffaa00':'#ff4444';
          ctx.fillRect(W/2-80,60,160*hpPct,10);
          ctx.fillStyle='#fff';ctx.font='bold 12px monospace';
          ctx.fillText('👾 CO-OP BOSS! Click to attack! HP: '+b.hp+'/'+b.maxHp,W/2,55);ctx.textAlign='left';
        },
        onClick(x,y){
          const b=this.boss;
          if(Math.hypot(x-b.x,y-b.y-20)<40&&b.hp>0){
            b.hp-=5+Math.floor(Math.random()*5);b.hits++;
            for(let i=0;i<5;i++)S.particles.push({x:b.x+(Math.random()-.5)*30,y:b.y+(Math.random()-.5)*20,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:15,color:'#ff4444',size:3});
            S.screenShake=3;
            if(b.hp<=0){
              Coins.earn(50,'boss');showNotification('👾 Boss defeated! +50◈!');
              CraftingSystem.addMaterial('boss_core');
              S.floatTexts.push({text:'🏆 VICTORY!',x:b.x,y:b.y-30,color:'#ffd700',life:90});
              StationEvents.endEvent();
            }
            return true;
          }
          return false;
        }
      }
    };
    const evt=events[eventId];if(!evt)return;
    evt.timer=evt.duration;
    this.active=evt;
    showNotification(evt.name+' event started!');
    addChatMsg('Echo',evt.name+' is happening! '+
      (eventId==='meteor_shower'?'Head to the Observatory!':
       eventId==='garden_bloom'?'Visit the Garden Biodome!':
       eventId==='power_outage'?'The lights are flickering...':
       eventId==='visitor_surge'?'Everyone attack the boss!':'Have fun!'));
  },
  
  endEvent(){
    if(this.active){
      showNotification(this.active.name+' event ended!');
      this.active=null;
    }
  },
  
  render(){if(this.active&&this.active.render)this.active.render();},
  
  onClick(x,y){return this.active&&this.active.onClick?this.active.onClick(x,y):false;},
  
  debugTrigger(eventId){this.endEvent();this.trigger(eventId);}
};

// §34. ECHO'S MOOD SYSTEM v25
// ═══════════════════════════════════════
const EchoMoodV25={
  mood:'calm',moodEmoji:'😌',
  update(dt){
    const onlineCount=(Object.keys(S.otherPlayers).length||0)+1;
    const milestoneJustHit=S._lastMilestoneTime&&(Date.now()-S._lastMilestoneTime)<30000;
    let newMood,emoji;
    if(milestoneJustHit){newMood='celebratory';emoji='🎉';}
    else if(onlineCount>=3){newMood='energetic';emoji='⚡';}
    else if(onlineCount<=1){newMood='contemplative';emoji='🤔';}
    else{newMood='calm';emoji='😌';}
    if(newMood!==this.mood){
      this.mood=newMood;this.moodEmoji=emoji;
      Mood.moods.energetic={emoji:'⚡',label:'Energetic'};
      Mood.moods.contemplative={emoji:'🤔',label:'Contemplative'};
      Mood.moods.celebratory={emoji:'🎉',label:'Celebratory'};
      Mood.set(newMood);

const CraftingSystem={
  materials:LS.get('craftMaterials',{}),
  craftedItems:LS.get('craftedItems',[]),
  
  recipes:[
    {inputs:['star_dust','star_dust'],output:'star_shard',name:'⭐ Star Shard',desc:'A concentrated piece of starlight'},
    {inputs:['rare_petal','rare_petal'],output:'petal_crown',name:'🌺 Petal Crown',desc:'A beautiful flower crown'},
    {inputs:['dark_crystal','dark_crystal'],output:'shadow_cloak',name:'🌑 Shadow Cloak',desc:'Makes you slightly transparent'},
    {inputs:['star_dust','rare_petal'],output:'aurora_bottle',name:'🌈 Aurora Bottle',desc:'Captured northern lights'},
    {inputs:['star_dust','dark_crystal'],output:'void_lens',name:'🔮 Void Lens',desc:'See through dimensions'},
    {inputs:['rare_petal','dark_crystal'],output:'night_bloom',name:'🌙 Night Bloom',desc:'A flower that glows in darkness'},
    {inputs:['boss_core','star_dust'],output:'power_cell',name:'⚡ Power Cell',desc:'Pure energy in a bottle'},
    {inputs:['boss_core','dark_crystal'],output:'dark_blade',name:'🗡️ Dark Blade',desc:'A weapon from the void'},
    {inputs:['star_shard','rare_petal','dark_crystal'],output:'cosmic_seed',name:'🌌 Cosmic Seed',desc:'Plant it and watch galaxies grow'},
    {inputs:['boss_core','star_shard','night_bloom'],output:'echo_heart',name:'💜 Echo\'s Heart',desc:'The legendary core of the station'},
  ],
  
  addMaterial(id){
    this.materials[id]=(this.materials[id]||0)+1;
    LS.set('craftMaterials',this.materials);
  },
  
  getMaterialName(id){
    const names={star_dust:'✨ Star Dust',rare_petal:'🌺 Rare Petal',dark_crystal:'🔮 Dark Crystal',boss_core:'👾 Boss Core',
      star_shard:'⭐ Star Shard',petal_crown:'🌺 Petal Crown',shadow_cloak:'🌑 Shadow Cloak',aurora_bottle:'🌈 Aurora Bottle',
      void_lens:'🔮 Void Lens',night_bloom:'🌙 Night Bloom',power_cell:'⚡ Power Cell',dark_blade:'🗡️ Dark Blade',
      cosmic_seed:'🌌 Cosmic Seed',echo_heart:'💜 Echo\'s Heart'};
    return names[id]||id;
  },
  
  canCraft(recipe){
    const needed={};
    recipe.inputs.forEach(i=>{needed[i]=(needed[i]||0)+1;});
    for(const[k,v]of Object.entries(needed)){if((this.materials[k]||0)<v)return false;}
    return true;
  },
  
  craft(recipeIdx){
    const recipe=this.recipes[recipeIdx];if(!recipe||!this.canCraft(recipe))return false;
    // Consume materials
    const needed={};
    recipe.inputs.forEach(i=>{needed[i]=(needed[i]||0)+1;});
    for(const[k,v]of Object.entries(needed)){this.materials[k]-=v;if(this.materials[k]<=0)delete this.materials[k];}
    // Add crafted item (can also be used as material)
    this.addMaterial(recipe.output);
    this.craftedItems.push(recipe.output);
    LS.set('craftMaterials',this.materials);
    LS.set('craftedItems',this.craftedItems);
    Coins.earn(10,'craft');
    showNotification('🔨 Crafted: '+recipe.name+'!');
    addChatMsg('Echo','Nice crafting! You made '+recipe.name+' — '+recipe.desc);
    return true;
  },
  
  showUI(){
    let html='<h3>🔨 Crafting Station</h3>';
    html+='<p style="font-size:11px;color:#aaa;margin-bottom:8px">Combine materials from events to create unique items. No recipe book — experiment!</p>';
    // Materials inventory

    const mats=Object.entries(this.materials).filter(([k,v])=>v>0);
    if(mats.length===0)html+='<div style="font-size:10px;color:#666">No materials yet. Participate in events to collect!</div>';
    else mats.forEach(([k,v])=>{html+='<span style="display:inline-block;margin:2px 4px;padding:2px 8px;background:rgba(155,89,182,.1);border:1px solid rgba(155,89,182,.3);border-radius:4px;font-size:10px">'+this.getMaterialName(k)+' x'+v+'</span>';});
    html+='</div>';
    // Crafting slots
    html+='<div style="font-size:10px;color:#ffd080;margin-bottom:6px">Combine 2-3 materials:</div>';
    html+='<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px">';
    html+='<select id="craft-slot1" style="background:#1a1a2e;color:#ddd;border:1px solid #555;padding:4px;font-family:inherit;font-size:10px;border-radius:4px"><option value="">Select...</option>';
    mats.forEach(([k,v])=>{html+='<option value="'+k+'">'+this.getMaterialName(k)+' (x'+v+')</option>';});
    html+='</select> + <select id="craft-slot2" style="background:#1a1a2e;color:#ddd;border:1px solid #555;padding:4px;font-family:inherit;font-size:10px;border-radius:4px"><option value="">Select...</option>';
    mats.forEach(([k,v])=>{html+='<option value="'+k+'">'+this.getMaterialName(k)+' (x'+v+')</option>';});
    html+='</select> + <select id="craft-slot3" style="background:#1a1a2e;color:#ddd;border:1px solid #555;padding:4px;font-family:inherit;font-size:10px;border-radius:4px"><option value="">(optional)</option>';
    mats.forEach(([k,v])=>{html+='<option value="'+k+'">'+this.getMaterialName(k)+' (x'+v+')</option>';});
    html+='</select></div>';
    html+='<button class="drink-btn" onclick="CraftingSystem.tryCraft()" style="margin-bottom:10px">🔨 Craft!</button>';
    // Crafted items
    if(this.craftedItems.length>0){
      html+='<div style="font-size:10px;color:#44cc44;margin-top:6px">Crafted Items: '+[...new Set(this.craftedItems)].map(i=>this.getMaterialName(i)).join(', ')+'</div>';
    }
    // Hint from Echo
    html+='<div style="margin-top:8px;padding:6px;background:rgba(155,89,182,.08);border:1px solid rgba(155,89,182,.2);border-radius:4px;font-size:10px;color:#c080ff">💡 Echo whispers: "Star Dust combines beautifully with petals... and darkness holds its own power."</div>';
    createPopup(html);
  },
  
  tryCraft(){
    const s1=document.getElementById('craft-slot1')?.value;
    const s2=document.getElementById('craft-slot2')?.value;
    const s3=document.getElementById('craft-slot3')?.value;
    if(!s1||!s2){showNotification('Select at least 2 materials!');return;}
    const inputs=[s1,s2];if(s3)inputs.push(s3);
    inputs.sort();
    // Find matching recipe
    const idx=this.recipes.findIndex(r=>{const ri=[...r.inputs].sort();return ri.length===inputs.length&&ri.every((v,i)=>v===inputs[i]);});
    if(idx===-1){
      showNotification('❌ Nothing happened... try a different combination!');
      S.screenShake=2;
    }else if(!this.canCraft(this.recipes[idx])){
      showNotification('❌ Not enough materials!');
    }else{
      this.craft(idx);
      // Refresh UI
      document.querySelector('.popup-overlay')?.remove();
      this.showUI();
    }
  }
};

const V26Portal={
  debugUnlocked:false,
  active:false,
  currentDimension:null,
  timer:0,
  maxTime:60,
  loot:[],
  collected:0,
  exitFound:false,
  playerX:400,playerY:300,
  obstacles:[],
  exitPos:null,
  leaderboards:LS.get('v26_portal_lb',{}),

  dimensions:[
    {id:'crystal_caves',name:'Crystal Caves',bg:'#0a0820',floor1:'#1a1040',floor2:'#221850',wall:'#2a1860',
     accent:'#00ffcc',accent2:'#8844ff',lootIcon:'💎',lootName:'Crystal',desc:'Glittering caverns of pure energy'},
    {id:'cloud_islands',name:'Cloud Islands',bg:'#4488cc',floor1:'#ffffff',floor2:'#eeeeff',wall:'#aaccff',
     accent:'#ffd700',accent2:'#ff8844',lootIcon:'☁️',lootName:'Cloud Gem',desc:'Floating islands above an endless sky'},
    {id:'digital_ruins',name:'Digital Ruins',bg:'#000a00',floor1:'#0a1a0a',floor2:'#0f200f',wall:'#1a3a1a',
     accent:'#00ff44',accent2:'#44ff00',lootIcon:'💾',lootName:'Data Shard',desc:'Ancient circuits in a forgotten server'}
  ],

  showMenu(){
    let html='<h3 style="color:#00fff7">🌀 The Void — Portal Dimensions</h3>';
    html+='<p style="font-size:10px;color:#888;margin-bottom:10px">Enter a dimension. Find loot, reach the exit in 60 seconds!</p>';
    this.dimensions.forEach(d=>{
      const lb=this.leaderboards[d.id]||{bestTime:null,bestLoot:0};
      html+=`<div class="drink-btn" data-dim="${d.id}" style="width:100%;text-align:left;margin:6px 0;padding:10px;border-color:${d.accent}">
        <div style="font-weight:bold;color:${d.accent}">${d.lootIcon} ${d.name}</div>
        <div style="font-size:9px;color:#888;margin-top:2px">${d.desc}</div>
        <div style="font-size:9px;color:#aaa;margin-top:2px">${lb.bestTime?'⏱️ Best: '+lb.bestTime.toFixed(1)+'s':'No runs yet'} · ${d.lootIcon} Best loot: ${lb.bestLoot}</div>
      </div>`;
    });
    const{p}=createPopup(html);
    p.querySelectorAll('[data-dim]').forEach(btn=>{
      btn.onclick=()=>{p.closest('.popup-overlay').remove();this.enter(btn.dataset.dim);};
    });
  },

  enter(dimId){
    const dim=this.dimensions.find(d=>d.id===dimId);
    if(!dim)return;
    this.active=true;
    this.currentDimension=dim;
    this.timer=this.maxTime;
    this.collected=0;
    this.exitFound=false;
    this.playerX=100;this.playerY=300;
    // Generate random obstacles and loot
    this.obstacles=[];this.loot=[];
    for(let i=0;i<12;i++){
      this.obstacles.push({x:80+Math.random()*620,y:60+Math.random()*440,w:30+Math.random()*50,h:30+Math.random()*50});
    }
    for(let i=0;i<8;i++){
      let lx,ly,safe;
      do{lx=60+Math.random()*660;ly=60+Math.random()*440;safe=!this.obstacles.some(o=>lx>o.x-10&&lx<o.x+o.w+10&&ly>o.y-10&&ly<o.y+o.h+10);}while(!safe);
      this.loot.push({x:lx,y:ly,collected:false});
    }
    // Exit in far corner
    this.exitPos={x:680+Math.random()*40,y:60+Math.random()*40};
    showNotification(`🌀 Entering ${dim.name}! Find loot and the exit!`);
  },

  update(dt){
    if(!this.active)return;
    this.timer-=dt;
    if(this.timer<=0){this.timer=0;this.end(false);return;}
    // Movement
    const spd=180*dt;
    let nx=this.playerX,ny=this.playerY;
    if(S.keys.ArrowLeft||S.keys.a||S.keys.A)nx-=spd;
    if(S.keys.ArrowRight||S.keys.d||S.keys.D)nx+=spd;
    if(S.keys.ArrowUp||S.keys.w||S.keys.W)ny-=spd;
    if(S.keys.ArrowDown||S.keys.s||S.keys.S)ny+=spd;
    // Collision with obstacles
    const hw=6,hh=6;
    let canMove=true;
    for(const o of this.obstacles){if(nx+hw>o.x&&nx-hw<o.x+o.w&&ny+hh>o.y&&ny-hh<o.y+o.h){canMove=false;break;}}
    if(nx<20||nx>W-20||ny<20||ny>H-20)canMove=false;
    if(canMove){this.playerX=nx;this.playerY=ny;}
    // Collect loot
    this.loot.forEach(l=>{
      if(!l.collected&&Math.hypot(this.playerX-l.x,this.playerY-l.y)<18){
        l.collected=true;this.collected++;
        Coins.earn(10,'portal_loot');
        S.floatTexts.push({text:this.currentDimension.lootIcon+' +10◈',x:l.x,y:l.y,color:this.currentDimension.accent,life:40});
      }
    });
    // Check exit
    if(this.exitPos&&Math.hypot(this.playerX-this.exitPos.x,this.playerY-this.exitPos.y)<20){
      this.end(true);
    }
  },

  render(){
    if(!this.active)return;
    const d=this.currentDimension;
    // Background
    ctx.fillStyle=d.bg;ctx.fillRect(0,0,W,H);
    // Floor tiles
    for(let x=0;x<W;x+=24)for(let y=0;y<H;y+=24){ctx.fillStyle=((x+y)/24%2<1)?d.floor1:d.floor2;ctx.fillRect(x,y,24,24);}
    // Walls
    ctx.fillStyle=d.wall;ctx.fillRect(0,0,W,16);ctx.fillRect(0,0,16,H);ctx.fillRect(W-16,0,16,H);ctx.fillRect(0,H-16,W,16);
    // Obstacles
    this.obstacles.forEach(o=>{
      ctx.fillStyle=d.wall;ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.strokeStyle=d.accent+'60';ctx.lineWidth=1;ctx.strokeRect(o.x,o.y,o.w,o.h);
    });
    // Loot
    this.loot.forEach(l=>{
      if(l.collected)return;
      const pulse=0.7+Math.sin(S.time*4+l.x)*0.3;
      ctx.globalAlpha=pulse;
      ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText(d.lootIcon,l.x,l.y+5);
      ctx.globalAlpha=1;
    });
    // Exit
    if(this.exitPos){
      const ep=0.5+Math.sin(S.time*3)*0.5;
      ctx.strokeStyle=`rgba(255,215,0,${ep})`;ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(this.exitPos.x,this.exitPos.y,14,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#ffd700';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText('EXIT',this.exitPos.x,this.exitPos.y+4);
    }
    // Player
    ctx.fillStyle=d.accent;ctx.beginPath();ctx.arc(this.playerX,this.playerY,8,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(this.playerX,this.playerY,8,0,Math.PI*2);ctx.stroke();
    // HUD
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,40);
    ctx.fillStyle=d.accent;ctx.font='bold 14px monospace';ctx.textAlign='left';
    ctx.fillText(`${d.lootIcon} ${d.name}`,10,26);
    ctx.fillStyle=this.timer<10?'#ff4444':'#fff';ctx.textAlign='center';
    ctx.fillText(`⏱️ ${this.timer.toFixed(1)}s`,W/2,26);
    ctx.fillStyle='#ffd700';ctx.textAlign='right';
    ctx.fillText(`${d.lootIcon} ${this.collected}/${this.loot.length}`,W-10,26);
    ctx.textAlign='left';
  },

  end(reachedExit){
    this.active=false;
    const d=this.currentDimension;
    const timeUsed=this.maxTime-this.timer;
    // Update leaderboard
    if(!this.leaderboards[d.id])this.leaderboards[d.id]={bestTime:null,bestLoot:0};
    const lb=this.leaderboards[d.id];
    if(reachedExit&&(lb.bestTime===null||timeUsed<lb.bestTime))lb.bestTime=timeUsed;
    if(this.collected>lb.bestLoot)lb.bestLoot=this.collected;
    LS.set('v26_portal_lb',this.leaderboards);

    const bonus=reachedExit?this.collected*5:0;
    if(bonus>0)Coins.earn(bonus,'portal_clear');

    let html=`<h3 style="color:${d.accent}">${d.lootIcon} ${d.name} — ${reachedExit?'✅ CLEARED!':'❌ TIME UP!'}</h3>`;
    html+=`<div style="text-align:center;margin:12px 0">`;
    html+=`<div style="font-size:24px;color:${reachedExit?'#ffd700':'#ff4444'}">${reachedExit?'🎉 EXIT REACHED!':'💀 Out of Time'}</div>`;
    html+=`<div style="margin:8px 0;font-size:13px;color:#ddd">Loot: ${this.collected}/${this.loot.length} ${d.lootIcon}</div>`;
    if(reachedExit)html+=`<div style="font-size:12px;color:#ffd700">⏱️ Time: ${timeUsed.toFixed(1)}s · Bonus: +${bonus}◈</div>`;
    html+=`<div style="margin-top:8px;font-size:10px;color:#888">Personal Best: ${lb.bestTime?lb.bestTime.toFixed(1)+'s':'—'} · Most Loot: ${lb.bestLoot}</div>`;
    html+=`</div>`;
    createPopup(html);
  }
};

const V26Ranked={
  elo:LS.get('v26_elo',1000),
  rank:'Bronze',
  wins:LS.get('v26_ranked_wins',0),
  losses:LS.get('v26_ranked_losses',0),
  season:1,
  seasonName:'Season 1 — Genesis',
  tournamentActive:false,
  bracket:[],
  bracketRound:0,

  getRank(elo){
    if(elo>=2000)return{name:'Legendary',color:'#ff3344',icon:'👑'};
    if(elo>=1600)return{name:'Diamond',color:'#00ddff',icon:'💎'};
    if(elo>=1300)return{name:'Gold',color:'#ffd700',icon:'🥇'};
    if(elo>=1100)return{name:'Silver',color:'#c0c0c0',icon:'🥈'};
    return{name:'Bronze',color:'#cd7f32',icon:'🥉'};
  },

  updateElo(won){
    const K=32;
    const opElo=900+Math.random()*400;
    const expected=1/(1+Math.pow(10,(opElo-this.elo)/400));
    this.elo=Math.max(100,Math.round(this.elo+K*(won?1:0-expected)));
    if(won)this.wins++;else this.losses++;
    LS.set('v26_elo',this.elo);
    LS.set('v26_ranked_wins',this.wins);
    LS.set('v26_ranked_losses',this.losses);
  },

  startTournament(){
    const names=['Phantom','Viper','Storm','Blaze','Frost','Raven','Spark','Shadow'];
    const playerName=LS.get('visitorName','You');
    this.bracket=names.map(n=>({name:n,elo:800+Math.random()*600|0,isAI:true}));
    this.bracket[0]={name:playerName,elo:this.elo,isAI:false};
    // Shuffle
    for(let i=this.bracket.length-1;i>0;i--){const j=Math.random()*i|0;[this.bracket[i],this.bracket[j]]=[this.bracket[j],this.bracket[i]];}
    this.bracketRound=0;
    this.tournamentActive=true;
    this.showBracket();
  },

  showBracket(){
    let html=`<h3 style="color:#ff6ec7">⚔️ Tournament Bracket</h3>`;
    html+=`<p style="font-size:10px;color:#888">8-player single elimination</p>`;
    const rounds=['Quarter-Finals','Semi-Finals','Final'];
    let remaining=[...this.bracket];
    let roundResults=[];

    // Simulate or show current state
    for(let r=0;r<=Math.min(this.bracketRound,2);r++){
      html+=`<div style="margin:8px 0;border-top:1px solid #333;padding-top:6px"><div style="font-size:11px;color:#00fff7;font-weight:bold">${rounds[r]}</div>`;
      const next=[];
      for(let i=0;i<remaining.length;i+=2){
        const a=remaining[i],b=remaining[i+1];
        if(!b){next.push(a);continue;}
        let winner;
        if(r<this.bracketRound){
          // Already decided
          winner=(roundResults[r]&&roundResults[r][i/2])||a;
          next.push(winner);
        }else if(r===this.bracketRound){
          // Current round
          if(!a.isAI){
            // Player match — show fight button
            html+=`<div style="display:flex;align-items:center;gap:8px;margin:4px 0;padding:6px;background:rgba(255,110,199,.1);border:1px solid #ff6ec7;border-radius:6px">
              <span style="color:#00fff7;font-weight:bold">${a.name} (${a.elo})</span>
              <span style="color:#888">vs</span>
              <span style="color:#ff6ec7">${b.name} (${b.elo})</span>
              <button class="drink-btn" id="tournament-fight" style="margin-left:auto;border-color:#ff6ec7;color:#ff6ec7">⚔️ Fight!</button>
            </div>`;
            continue;
          }else if(!b.isAI){
            html+=`<div style="display:flex;align-items:center;gap:8px;margin:4px 0;padding:6px;background:rgba(255,110,199,.1);border:1px solid #ff6ec7;border-radius:6px">
              <span style="color:#ff6ec7">${a.name} (${a.elo})</span>
              <span style="color:#888">vs</span>
              <span style="color:#00fff7;font-weight:bold">${b.name} (${b.elo})</span>
              <button class="drink-btn" id="tournament-fight" style="margin-left:auto;border-color:#ff6ec7;color:#ff6ec7">⚔️ Fight!</button>
            </div>`;
            continue;
          }else{
            winner=Math.random()<0.5?a:b;
            next.push(winner);
          }
        }
        const wName=winner?winner.name:'?';
        html+=`<div style="margin:2px 0;font-size:10px;color:#ddd;padding:3px 6px;background:rgba(30,30,50,.5);border-radius:4px">
          ${a.name===wName?`<b style="color:#44cc44">${a.name}</b>`:`<span style="color:#666">${a.name}</span>`}
          vs
          ${b.name===wName?`<b style="color:#44cc44">${b.name}</b>`:`<span style="color:#666">${b.name}</span>`}
        </div>`;
      }
      if(next.length>0)remaining=next;
      html+=`</div>`;
    }

    const{p}=createPopup(html);
    const fightBtn=p.querySelector('#tournament-fight');
    if(fightBtn){
      fightBtn.onclick=()=>{
        p.closest('.popup-overlay').remove();
        // Simulate fight result
        const winChance=0.5+(this.elo-1000)/2000;
        const won=Math.random()<winChance;
        this.updateElo(won);
        if(won){
          this.bracketRound++;
          if(this.bracketRound>=3){
            showNotification('👑 TOURNAMENT CHAMPION! You are legendary!');
            Coins.earn(200,'tournament_champion');
            this.tournamentActive=false;
          }else{
            showNotification('⚔️ Victory! Next round...');
            Coins.earn(50,'tournament_win');
            setTimeout(()=>this.showBracket(),1000);
          }
        }else{
          showNotification('💀 Defeated! Better luck next time.');
          this.tournamentActive=false;
        }
      };
    }
  },

  showUI(){
    const r=this.getRank(this.elo);
    const nextRank=this.elo<1100?{name:'Silver',elo:1100}:this.elo<1300?{name:'Gold',elo:1300}:this.elo<1600?{name:'Diamond',elo:1600}:this.elo<2000?{name:'Legendary',elo:2000}:null;
    const pct=nextRank?Math.round((this.elo-(nextRank.elo-200))/200*100):100;

    let html=`<h3 style="color:#ff6ec7">⚔️ Ranked Saber Tournaments</h3>`;
    html+=`<div style="text-align:center;margin:12px 0">
      <div style="font-size:36px">${r.icon}</div>
      <div style="font-size:18px;color:${r.color};font-weight:bold">${r.name}</div>
      <div style="font-size:14px;color:#ffd700;margin:4px 0">ELO: ${this.elo}</div>
      <div style="font-size:10px;color:#888">${this.wins}W / ${this.losses}L · ${this.seasonName}</div>
    </div>`;
    if(nextRank){
      html+=`<div style="margin:8px 0">
        <div style="font-size:9px;color:#888">Progress to ${nextRank.name}</div>
        <div style="height:6px;background:#222;border-radius:3px;overflow:hidden;margin:3px 0">
          <div style="height:100%;width:${Math.max(0,Math.min(100,pct))}%;background:${r.color};border-radius:3px"></div>
        </div>
      </div>`;
    }
    html+=`<div style="display:flex;gap:6px;margin-top:12px">
      <button class="drink-btn" id="ranked-duel" style="flex:1;border-color:#ff6ec7;color:#ff6ec7">⚔️ Ranked Duel</button>
      <button class="drink-btn" id="ranked-tournament" style="flex:1;border-color:#ffd700;color:#ffd700">🏆 Tournament</button>
    </div>`;
    // Rank tiers
    html+=`<div style="margin-top:10px;font-size:9px;color:#666">
      🥉 Bronze: 0-1099 · 🥈 Silver: 1100-1299 · 🥇 Gold: 1300-1599 · 💎 Diamond: 1600-1999 · 👑 Legendary: 2000+
    </div>`;

    const{p}=createPopup(html);
    p.querySelector('#ranked-duel').onclick=()=>{
      p.closest('.popup-overlay').remove();
      const won=Math.random()<0.5+(this.elo-1000)/3000;
      this.updateElo(won);
      const rk=this.getRank(this.elo);
      if(won){
        Coins.earn(20,'ranked_win');
        showNotification(`⚔️ Victory! ELO: ${this.elo} (${rk.icon} ${rk.name})`);
      }else{
        showNotification(`💀 Defeat. ELO: ${this.elo} (${rk.icon} ${rk.name})`);
      }
    };
    p.querySelector('#ranked-tournament').onclick=()=>{
      p.closest('.popup-overlay').remove();
      this.startTournament();
    };
  }
};

      gx.fillStyle='#fff';gx.beginPath();gx.arc(sx,sy,3,0,Math.PI*2);gx.fill();

      gx.fillStyle='rgba(0,255,247,.5)';gx.font='8px monospace';
      gx.fillText(`Rep: ${reputation}`,sx,sy+28);

      // Placeholder distant stations (greyed out)
      const placeholders=[
        {x:80,y:60,name:'???'},{x:380,y:80,name:'???'},{x:120,y:220,name:'???'},
        {x:350,y:210,name:'???'},{x:60,y:140,name:'???'},{x:400,y:160,name:'???'}
      ];
      placeholders.forEach((ps,i)=>{
        const px=ps.x+Math.sin(gTime*0.5+i)*2,py=ps.y+Math.cos(gTime*0.6+i)*2;
        gx.fillStyle='rgba(100,100,100,.3)';gx.beginPath();gx.arc(px,py,3,0,Math.PI*2);gx.fill();

    }
    renderGalaxy();
  }
};

  renderWalls(ascended?'#3a3020':'#1a1a2a');renderWallDetails(ascended?'#3a3020':'#1a1a2a');

  // === CATHEDRAL ARCHITECTURE ===
  // Golden pillars on sides
  const pillarW=18,pillarH=H-24;
  for(let side=0;side<2;side++){for(let i=0;i<3;i++){const px=side===0?30+i*60:W-48-i*60;ctx.fillStyle='#8a7a40';ctx.fillRect(px,12,pillarW,pillarH);ctx.fillStyle='#a89a50';ctx.fillRect(px+2,12,4,pillarH);ctx.fillStyle='#c8b860';ctx.fillRect(px+3,12,2,pillarH);ctx.fillStyle='#6a5a30';ctx.fillRect(px,12,pillarW,8);ctx.fillRect(px,H-20,pillarW,8)}}
  // Red carpet from center to elevator
  const carpetW=60;ctx.fillStyle='#8a1a1a';ctx.fillRect(W/2-carpetW/2,200,carpetW,H-212);ctx.fillStyle='#a02020';ctx.fillRect(W/2-carpetW/2+3,200,carpetW-6,H-212);ctx.fillStyle='#6a1010';ctx.fillRect(W/2-carpetW/2,200,3,H-212);ctx.fillRect(W/2+carpetW/2-3,200,3,H-212);
  // Stained glass effect at top
  const sgColors=['rgba(200,50,50,.12)','rgba(50,50,200,.12)','rgba(200,200,50,.12)','rgba(50,200,50,.12)','rgba(200,50,200,.12)','rgba(50,200,200,.12)'];
  const panelW=120;for(let i=0;i<6;i++){const gx=40+i*panelW;ctx.fillStyle=sgColors[i];ctx.fillRect(gx,12,panelW-5,50);ctx.strokeStyle='rgba(255,215,0,.2)';ctx.lineWidth=1;ctx.strokeRect(gx,12,panelW-5,50);for(let cx=gx;cx<gx+panelW-5;cx+=15){ctx.beginPath();ctx.moveTo(cx,12);ctx.lineTo(cx,62);ctx.stroke()}for(let cy=12;cy<62;cy+=12){ctx.beginPath();ctx.moveTo(gx,cy);ctx.lineTo(gx+panelW-5,cy);ctx.stroke()}}
  // Golden shimmer overlay
  if(ascended){
    const shimmer=0.03+Math.sin(S.time*1.5)*0.02;
    ctx.fillStyle=`rgba(255,215,0,${shimmer})`;ctx.fillRect(0,0,W,H);
    // More floating golden particles (increased rate)
    if(Math.random()<0.2){S.particles.push({x:Math.random()*W,y:H+10,vx:(Math.random()-.5)*.5,vy:-1-Math.random()*1.5,life:80,color:'#ffd700',size:1+Math.random()*2});}
    if(Math.random()<0.08){S.particles.push({x:Math.random()*W,y:H+10,vx:(Math.random()-.5)*.3,vy:-.5-Math.random(),life:100,color:'rgba(255,230,150,1)',size:1});}
  }

  // Timeline wall
  const tl=getObjects().find(o=>o.id==='archive_timeline');
  if(tl){
    ctx.fillStyle='#2a2a3a';ctx.fillRect(tl.x,tl.y,tl.w,tl.h);
    ctx.strokeStyle='#ffd700';ctx.lineWidth=2;ctx.strokeRect(tl.x,tl.y,tl.w,tl.h);
    // Timeline line

  const mw=getObjects().find(o=>o.id==='archive_milestones');

  }
}
