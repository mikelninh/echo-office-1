// ─── 1. STAT REROLLING ─────────────────────────────────────────
const StatReroll = {
  getRerollCount(itemUid) { return LS.get('rerollCount_' + itemUid, 0); },
  getCost(itemUid) { return 30 + 10 * this.getRerollCount(itemUid); },

  showUI(itemUid) {
    const inv = LS.get('lootInventory', []);
    const item = inv.find(i => i.id === itemUid);
    if (!item) { showNotification('Item not found!'); return; }
    const def = getAllLootableItems().find(i => i.itemId === item.itemId) || { name: '???', icon: '❓' };
    const r = RARITIES[item.rarity] || RARITIES.common;
    const cost = this.getCost(itemUid);
    const rerolls = this.getRerollCount(itemUid);

    if (!item.stats || item.stats.length === 0) { showNotification('This item has no stats to reroll!'); return; }
    if (!Coins.canAfford(cost)) { showNotification('Need ' + cost + '◈ to reroll!'); return; }

    // Generate new stats (preview)
    const newStats = rollStats(item.rarity);
    // Ensure same count as original
    while (newStats.length < item.stats.length) {
      const statKeys = Object.keys(STAT_TYPES);
      const used = new Set(newStats.map(s => s.type));
      let type;
      do { type = statKeys[Math.floor(Math.random() * statKeys.length)]; } while (used.has(type));
      const cfg = { common:{valMin:1,valMax:3}, uncommon:{valMin:3,valMax:6}, rare:{valMin:5,valMax:10}, epic:{valMin:8,valMax:15}, legendary:{valMin:12,valMax:18}, mythic:{valMin:15,valMax:20} }[item.rarity] || {valMin:1,valMax:3};
      newStats.push({ type, value: cfg.valMin + Math.floor(Math.random() * (cfg.valMax - cfg.valMin + 1)) });
    }
    while (newStats.length > item.stats.length) newStats.pop();

    // Build comparison UI
    let html = '<h3>🎲 Stat Reroll</h3>';
    html += '<div style="text-align:center;margin-bottom:8px"><span style="font-size:28px">' + def.icon + '</span>';
    html += '<div style="color:' + r.color + ';font-weight:bold">' + def.name + '</div>';
    html += '<span class="rarity-badge ' + item.rarity + '">' + r.name + '</span>';
    html += '<div style="font-size:9px;color:#888;margin-top:4px">Rerolls: ' + rerolls + ' · Cost: <span style="color:#ffd700">' + cost + '◈</span></div></div>';

    html += '<div style="display:flex;gap:12px;justify-content:center;margin:12px 0">';
    // Old stats
    html += '<div style="flex:1;padding:8px;background:rgba(255,50,50,.08);border:1px solid rgba(255,50,50,.3);border-radius:8px">';
    html += '<div style="font-size:10px;color:#ff5555;margin-bottom:6px;text-align:center">OLD STATS</div>';
    item.stats.forEach(s => {
      const st = STAT_TYPES[s.type];
      html += '<div style="font-size:11px;color:#888;text-decoration:line-through;margin:3px 0">' + st.icon + ' ' + st.name + ' +' + s.value + '%</div>';
    });
    html += '</div>';
    // New stats
    html += '<div style="flex:1;padding:8px;background:rgba(0,255,100,.08);border:1px solid rgba(0,255,100,.3);border-radius:8px">';
    html += '<div style="font-size:10px;color:#44ff88;margin-bottom:6px;text-align:center">NEW STATS</div>';
    newStats.forEach(s => {
      const st = STAT_TYPES[s.type];
      html += '<div style="font-size:11px;color:#44ff88;font-weight:bold;margin:3px 0">' + st.icon + ' ' + st.name + ' +' + s.value + '%</div>';
    });
    html += '</div></div>';

    html += '<div style="text-align:center;font-size:9px;color:#ff8844;margin-bottom:8px">⚠️ Cost is deducted whether you accept or not!</div>';
    html += '<div style="display:flex;gap:8px;justify-content:center">';
    html += '<button class="enhance-btn" id="reroll-accept">✅ Accept New</button>';
    html += '<button class="enhance-btn cancel" id="reroll-reject">❌ Keep Old</button>';
    html += '</div>';

    const { p } = createPopup(html);

    // Deduct cost immediately
    Coins.spend(cost, 'stat_reroll');
    LS.set('rerollCount_' + itemUid, rerolls + 1);

    p.querySelector('#reroll-accept').onclick = () => {
      item.stats = newStats;
      const inv2 = LS.get('lootInventory', []);
      const idx = inv2.findIndex(i => i.id === itemUid);
      if (idx >= 0) { inv2[idx] = item; LS.set('lootInventory', inv2); }
      showNotification('✨ Stats rerolled!');
      S.screenFlash = '#44ff88';
      p.closest('.popup-overlay').remove();
    };
    p.querySelector('#reroll-reject').onclick = () => {
      showNotification('Kept old stats. ◈ spent.');
      p.closest('.popup-overlay').remove();
    };
  }
};

// ─── 2. WEAPON DURABILITY + REPAIR ─────────────────────────────
const DurabilitySystem = {
  RARITY_MULT: { common: 0.2, uncommon: 0.3, rare: 0.5, epic: 0.8, legendary: 1.2, mythic: 1.5 },

  getDurability(weaponId) { return LS.get('durability_' + weaponId, 100); },
  setDurability(weaponId, val) { LS.set('durability_' + weaponId, Math.max(0, Math.min(100, val))); },

  loseDurability(type) {
    if (!WeaponSystem.equipped) return;
    const wid = WeaponSystem.equipped._id;
    const loss = type === 'pvp' ? (5 + Math.floor(Math.random() * 4)) : (3 + Math.floor(Math.random() * 3));
    const cur = this.getDurability(wid);
    this.setDurability(wid, cur - loss);
    const newDur = this.getDurability(wid);
    if (newDur <= 0) {
      showNotification('⚠️ Weapon broken! 50% damage. Visit Repair Station!');
    } else if (newDur <= 20) {
      showNotification('🔧 Weapon durability low: ' + newDur + '/100');
    }
  },

  getRepairCost(weaponId, rarity) {
    const cur = this.getDurability(weaponId);
    const mult = this.RARITY_MULT[rarity] || 0.5;
    return Math.ceil((100 - cur) * mult);
  },

  repair(weaponId) {
    this.setDurability(weaponId, 100);
    showNotification('🔧 Weapon fully repaired!');
  },

  getDamageMultiplier(weaponId) {
    return this.getDurability(weaponId) <= 0 ? 0.5 : 1.0;
  },

  showRepairUI() {
    const owned = LS.get('ownedWeapons', []);
    if (owned.length === 0) { showNotification('No weapons to repair!'); return; }
    let html = '<h3>🔧 Repair Station</h3>';
    html += '<p style="font-size:10px;color:#888;margin-bottom:10px">Restore weapon durability. Broken weapons deal 50% damage!</p>';
    owned.forEach(wid => {
      const wpn = WEAPONS.find(w => w.id === wid);
      if (!wpn) return;
      const dur = this.getDurability(wid);
      const cost = this.getRepairCost(wid, wpn.rarity);
      const r = RARITIES[wpn.rarity] || RARITIES.common;
      const pct = dur;
      const barColor = dur > 50 ? '#44cc44' : dur > 20 ? '#ffaa00' : '#ff3344';
      html += '<div class="bazaar-listing" style="border-color:' + r.border + '">';
      html += '<span class="listing-icon" style="font-size:24px">' + wpn.icon + '</span>';
      html += '<div class="listing-info"><div style="color:' + r.color + ';font-weight:bold">' + wpn.name + '</div>';
      html += '<div style="margin:3px 0;height:6px;background:#222;border-radius:3px;overflow:hidden"><div style="width:' + pct + '%;height:100%;background:' + barColor + ';border-radius:3px;transition:width .3s"></div></div>';
      html += '<div style="font-size:9px;color:' + barColor + '">' + dur + '/100' + (dur <= 0 ? ' ⚠️ BROKEN' : '') + '</div></div>';
      if (dur < 100) {
        html += '<button class="enhance-btn" data-repair="' + wid + '" data-cost="' + cost + '" style="font-size:11px;padding:6px 12px">' + cost + '◈ Repair</button>';
      } else {
        html += '<div style="font-size:10px;color:#44cc44">✅ Full</div>';
      }
      html += '</div>';
    });
    const { p } = createPopup(html);
    p.querySelectorAll('[data-repair]').forEach(btn => {
      btn.onclick = () => {
        const wid = btn.dataset.repair;
        const cost = parseInt(btn.dataset.cost);
        if (!Coins.canAfford(cost)) { showNotification('Need ' + cost + '◈!'); return; }
        Coins.spend(cost, 'repair');
        this.repair(wid);
        p.closest('.popup-overlay').remove();
        this.showRepairUI();
      };
    });
  }
};

  getInventory() { return LS.get('consumableInv', []); },
  setInventory(inv) { LS.set('consumableInv', inv); },
  getActive() { return LS.get('activeConsumables', []); },
  setActive(list) { LS.set('activeConsumables', list); },

  buy(itemId) {
    const item = this.ITEMS.find(i => i.id === itemId);
    if (!item) return;
    if (!Coins.canAfford(item.cost)) { showNotification('Need ' + item.cost + '◈!'); return; }
    Coins.spend(item.cost, 'consumable');
    const inv = this.getInventory();
    inv.push(itemId);
    this.setInventory(inv);
    showNotification('Bought ' + item.icon + ' ' + item.name + '!');
  },

  use(invIndex) {
    const inv = this.getInventory();
    if (invIndex >= inv.length) return;
    const itemId = inv[invIndex];
    const item = this.ITEMS.find(i => i.id === itemId);
    if (!item) return;

    // Instant effects
    if (item.effect === 'repair') {
      if (!WeaponSystem.equipped) { showNotification('No weapon equipped!'); return; }
      DurabilitySystem.repair(WeaponSystem.equipped._id);
      inv.splice(invIndex, 1);
      this.setInventory(inv);
      return;
    }

    // Check if already active
    const active = this.getActive();
    if (active.find(a => a.id === itemId)) { showNotification('Already active!'); return; }

    // Activate
    const entry = { id: itemId, start: Date.now() };
    if (item.uses) entry.usesLeft = item.uses;
    if (item.duration > 0) entry.expires = Date.now() + item.duration;
    active.push(entry);
    this.setActive(active);
    inv.splice(invIndex, 1);
    this.setInventory(inv);
    showNotification(item.icon + ' ' + item.name + ' activated!');
  },

  isActive(effectType) {
    const active = this.getActive();
    const now = Date.now();
    return active.some(a => {
      const item = this.ITEMS.find(i => i.id === a.id);
      if (!item || item.effect !== effectType) return false;
      if (a.expires && now > a.expires) return false;
      if (a.usesLeft !== undefined && a.usesLeft <= 0) return false;
      return true;
    });
  },

  consumeUse(effectType) {
    const active = this.getActive();
    const entry = active.find(a => {
      const item = this.ITEMS.find(i => i.id === a.id);
      return item && item.effect === effectType && (a.usesLeft === undefined || a.usesLeft > 0);
    });
    if (entry && entry.usesLeft !== undefined) {
      entry.usesLeft--;
      if (entry.usesLeft <= 0) {
        const idx = active.indexOf(entry);
        active.splice(idx, 1);
        showNotification('Shield Orb expired!');
      }
      this.setActive(active);
    }
  },

  cleanup() {
    const active = this.getActive();
    const now = Date.now();
    const cleaned = active.filter(a => {
      if (a.expires && now > a.expires) return false;
      if (a.usesLeft !== undefined && a.usesLeft <= 0) return false;
      return true;
    });
    if (cleaned.length !== active.length) this.setActive(cleaned);
  },

  renderHUD() {
    this.cleanup();
    let el = document.getElementById('consumable-hud');
    if (!el) {
      el = document.createElement('div');
      el.id = 'consumable-hud';
      el.style.cssText = 'position:fixed;top:60px;left:10px;z-index:3500;display:flex;gap:4px;flex-wrap:wrap;pointer-events:none';
      document.body.appendChild(el);
    }
    const active = this.getActive();
    const now = Date.now();
    if (active.length === 0) { el.innerHTML = ''; return; }
    let html = '';
    active.forEach(a => {
      const item = this.ITEMS.find(i => i.id === a.id);
      if (!item) return;
      let timeStr = '';
      if (a.expires) {
        const left = Math.max(0, Math.ceil((a.expires - now) / 1000));
        const min = Math.floor(left / 60);
        const sec = left % 60;
        timeStr = min + ':' + (sec < 10 ? '0' : '') + sec;
      } else if (a.usesLeft !== undefined) {
        timeStr = a.usesLeft + ' use' + (a.usesLeft !== 1 ? 's' : '');
      }
      html += '<div style="background:rgba(0,0,0,.7);border:1px solid rgba(0,255,247,.4);border-radius:6px;padding:2px 6px;font-size:9px;color:#fff;font-family:monospace">';
      html += item.icon + ' <span style="color:#00fff7">' + timeStr + '</span></div>';
    });
    el.innerHTML = html;
  }
};

  },

// Patch LootSystem.roll to use pity
const _origLootRoll = LootSystem.roll.bind(LootSystem);
LootSystem.roll = function(bonusLuck) {
  PitySystem.increment();
  const forced = PitySystem.shouldForce();
  if (forced) {
    PitySystem.check(forced);
    showNotification(forced === 'mythic' ? '🌟 MYTHIC PITY! 200 rolls!' : '⭐ LEGENDARY PITY! 50 rolls!');
    return this.rollWithRarity(forced);
  }
  // Add luck elixir bonus
  let luck = bonusLuck || 0;

  const item = _origLootRoll(luck);

// ─── 5. QUARTERS RENT ──────────────────────────────────────────
const RentSystem = {
  DAILY_RENT: 5,
  check() {
    const today = new Date().toISOString().slice(0, 10);
    const lastRentDay = LS.get('lastRentDay', null);
    if (lastRentDay === today) return;
    if (!lastRentDay) { LS.set('lastRentDay', today); return; } // first visit, no rent

    const daysMissed = Math.floor((new Date(today) - new Date(lastRentDay)) / (1000 * 60 * 60 * 24));
    if (daysMissed <= 0) return;

    const totalRent = daysMissed * this.DAILY_RENT;
    if (Coins.canAfford(totalRent)) {
      Coins.spend(totalRent, 'rent');
      LS.set('lastRentDay', today);
      LS.set('rentPaid', true);
      showNotification('🏠 Quarters rent: ' + totalRent + '◈ deducted (' + daysMissed + ' day' + (daysMissed > 1 ? 's' : '') + ')');
    } else {
      LS.set('rentPaid', false);
      LS.set('lastRentDay', today);
      showNotification('🏠 Can\'t afford rent! Quarters locked. Pay ' + this.DAILY_RENT + '◈ to restore.');
    }
  },
  isLocked() { return LS.get('rentPaid', true) === false; },
  payRent() {
    if (!this.isLocked()) { showNotification('Rent is paid!'); return; }
    if (!Coins.canAfford(this.DAILY_RENT)) { showNotification('Need ' + this.DAILY_RENT + '◈!'); return; }
    Coins.spend(this.DAILY_RENT, 'rent');
    LS.set('rentPaid', true);
    showNotification('🏠 Quarters restored!');
  }
};

const RoomTiers = {
  getCurrentTier() { return LS.get('roomTier', 'starter'); },
  setTier(t) { LS.set('roomTier', t); },
  getTotalVisits() { return LS.get('roomTotalVisits', 0); },
  setTotalVisits(v) { LS.set('roomTotalVisits', v); },

  canUpgrade(targetTier) {
    const cur = TIER_ORDER.indexOf(this.getCurrentTier());
    const tgt = TIER_ORDER.indexOf(targetTier);
    if (tgt <= cur) return { ok:false, reason:'Already at or above this tier' };
    const td = ROOM_TIERS[targetTier];
    if (this.getTotalVisits() < td.visitReq) return { ok:false, reason:`Need ${td.visitReq} visits (have ${this.getTotalVisits()})` };
    if (!Coins.canAfford(td.cost)) return { ok:false, reason:`Need ${td.cost}◈` };
    return { ok:true };
  },

  upgrade(targetTier) {
    const check = this.canUpgrade(targetTier);
    if (!check.ok) { showNotification(check.reason); return false; }
    const td = ROOM_TIERS[targetTier];
    Coins.spend(td.cost, 'room_upgrade');
    this.setTier(targetTier);
    // Save tier to server
    const name = LS.get('visitorName','Visitor');
    fetch(`/api/rooms/${encodeURIComponent(name)}/settings`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tier: targetTier })
    }).catch(()=>{});
    showNotification(`🎉 Room upgraded to ${td.name}!`);
    // Celebration
    for(let i=0;i<20;i++){
      S.floatTexts.push({text:['🎉','⭐','✨','🎊'][i%4], x:W/2+Math.random()*200-100, y:H/2+Math.random()*100-50, color:td.color, life:80});
    }
    return true;
  },

  getSlotCount() { return ROOM_TIERS[this.getCurrentTier()].slots; },

  showUpgradeUI() {
    const cur = this.getCurrentTier();
    const curIdx = TIER_ORDER.indexOf(cur);
    const visits = this.getTotalVisits();
    const td = ROOM_TIERS[cur];

    let html = `<h3>🏠 Room Tier: <span style="color:${td.color}">${td.icon} ${td.name}</span></h3>`;
    html += `<p style="font-size:10px;color:#888">Size: ${td.width}×${td.height} · Slots: ${td.slots} · Visits: ${visits}</p>`;
    html += '<div style="margin-top:10px">';

    TIER_ORDER.forEach((tid, i) => {
      const t = ROOM_TIERS[tid];
      const isCurrent = tid === cur;
      const isPast = i < curIdx;
      const isNext = i === curIdx + 1;
      const canUp = this.canUpgrade(tid);
      const visitPct = Math.min(100, Math.round(visits / Math.max(1, t.visitReq) * 100));

      html += `<div style="margin:6px 0;padding:8px;border:1px solid ${isCurrent ? '#00fff7' : isPast ? '#333' : t.color};border-radius:6px;background:${isCurrent ? 'rgba(0,255,247,.08)' : 'rgba(0,0,0,.3)'}${isPast ? ';opacity:.5' : ''}">`;
      html += `<div style="display:flex;justify-content:space-between;align-items:center">`;
      html += `<span style="color:${t.color};font-weight:bold">${t.icon} ${t.name}</span>`;
      if (isCurrent) html += `<span style="font-size:9px;color:#00fff7">CURRENT</span>`;
      else if (isPast) html += `<span style="font-size:9px;color:#666">✓</span>`;
      else if (canUp.ok) html += `<button class="drink-btn tier-upgrade-btn" data-tier="${tid}" style="font-size:9px;padding:2px 8px;border-color:${t.color};color:${t.color}">Upgrade ${t.cost}◈</button>`;
      else html += `<span style="font-size:8px;color:#666">${canUp.reason}</span>`;
      html += `</div>`;
      html += `<div style="font-size:9px;color:#888;margin-top:3px">${t.width}×${t.height} · ${t.slots} slots · ${t.visitReq} visits needed</div>`;
      if (!isCurrent && !isPast && t.visitReq > 0) {
        html += `<div style="margin-top:4px;background:#222;border-radius:3px;height:6px;overflow:hidden"><div style="width:${visitPct}%;height:100%;background:${t.color};border-radius:3px"></div></div>`;
      }
      html += `</div>`;
    });

    html += '</div>';
    const {p} = createPopup(html);
    p.querySelectorAll('.tier-upgrade-btn').forEach(btn => {
      btn.onclick = () => {
        if (this.upgrade(btn.dataset.tier)) p.closest('.popup-overlay').remove();
      };
    });
  }
};

const CreatorLevel = {
  getLevel() {
    const visits = RoomTiers.getTotalVisits();
    const rating = parseFloat(LS.get('roomAvgRating', 0));
    const isTop10 = LS.get('roomIsTop10', false);
    let level = CREATOR_LEVELS[0];
    for (const lv of CREATOR_LEVELS) {
      if (visits >= lv.visitReq) {
        if (lv.ratingReq > 0 && rating < lv.ratingReq) continue;
        if (lv.topReq && !isTop10) continue;
        level = lv;
      }
    }
    return level;
  },

  getLevelIndex() {
    return CREATOR_LEVELS.indexOf(this.getLevel());
  },

  getUnlockedFurniture() {
    const idx = this.getLevelIndex();
    const unlocked = {};
    CREATOR_LEVELS.forEach((lv, i) => {
      if (i <= idx && CREATOR_FURNITURE[lv.id]) {
        Object.assign(unlocked, CREATOR_FURNITURE[lv.id]);
      }
    });
    return unlocked;
  },

  checkLevelUp() {
    const prev = LS.get('creatorLevelId', 'novice');
    const cur = this.getLevel().id;
    if (cur !== prev) {
      LS.set('creatorLevelId', cur);
      const lv = this.getLevel();
      showNotification(`🎉 Creator Level Up: ${lv.icon} ${lv.name}!`);
      // Celebration animation
      for(let i=0;i<15;i++){
        S.floatTexts.push({text:lv.icon, x:W/2+Math.random()*300-150, y:H/2+Math.random()*200-100, color:'#ffd700', life:90});
      }
    }
  },

  showProfile() {
    const lv = this.getLevel();
    const lvIdx = this.getLevelIndex();
    const visits = RoomTiers.getTotalVisits();
    const rating = parseFloat(LS.get('roomAvgRating', 0));
    const tier = ROOM_TIERS[RoomTiers.getCurrentTier()];
    const tipsReceived = parseInt(LS.get('roomTipsReceived', 0));

    let html = `<h3>${lv.icon} Creator Profile</h3>`;
    html += `<div style="text-align:center;margin:10px 0">`;
    html += `<div style="font-size:28px">${lv.icon}</div>`;
    html += `<div style="color:#ffd700;font-weight:bold;font-size:14px">${lv.name}</div>`;
    html += `<div style="font-size:9px;color:#888">${lv.perk}</div>`;
    html += `</div>`;

    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0">`;
    html += `<div style="background:rgba(0,255,247,.06);padding:6px;border-radius:4px;text-align:center"><div style="color:#00fff7;font-size:16px;font-weight:bold">${visits}</div><div style="font-size:8px;color:#888">Total Visits</div></div>`;
    html += `<div style="background:rgba(255,215,0,.06);padding:6px;border-radius:4px;text-align:center"><div style="color:#ffd700;font-size:16px;font-weight:bold">${rating ? rating.toFixed(1) + '★' : 'N/A'}</div><div style="font-size:8px;color:#888">Avg Rating</div></div>`;
    html += `<div style="background:rgba(255,110,199,.06);padding:6px;border-radius:4px;text-align:center"><div style="color:#ff6ec7;font-size:16px;font-weight:bold">${tier.icon} ${tier.name}</div><div style="font-size:8px;color:#888">Room Tier</div></div>`;
    html += `<div style="background:rgba(255,215,0,.06);padding:6px;border-radius:4px;text-align:center"><div style="color:#ffd700;font-size:16px;font-weight:bold">${tipsReceived}◈</div><div style="font-size:8px;color:#888">Tips Received</div></div>`;
    html += `</div>`;

    // Level progress
    html += `<div style="margin-top:10px"><div style="font-size:10px;color:#888;margin-bottom:4px">Creator Progression</div>`;
    CREATOR_LEVELS.forEach((cl, i) => {
      const unlocked = i <= lvIdx;
      html += `<div style="display:flex;align-items:center;gap:6px;margin:3px 0;opacity:${unlocked?1:.4}">`;
      html += `<span style="font-size:14px">${cl.icon}</span>`;
      html += `<div><div style="font-size:10px;color:${unlocked?'#fff':'#666'};font-weight:bold">${cl.name}</div>`;
      html += `<div style="font-size:8px;color:#888">${cl.perk}</div></div>`;
      if (unlocked && i === lvIdx) html += `<span style="font-size:8px;color:#00fff7;margin-left:auto">◄ YOU</span>`;
      html += `</div>`;
    });
    html += `</div>`;

    createPopup(html);
  }
};

// ─── ROOM RATING SYSTEM ─────────────────────────────────────────
const RoomRating = {
  async rate(ownerName, rating) {
    const visitor = LS.get('visitorName', 'Anonymous');
    if (visitor === ownerName || visitor === 'Anonymous') { showNotification('Cannot rate!'); return; }
    try {
      const res = await fetch(`/api/rooms/${encodeURIComponent(ownerName)}/rate`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ rating, visitor })
      });
      const data = await res.json();
      if (data.ok) {
        showNotification(`⭐ Rated ${rating}/5!`);
        LS.set('rated_' + ownerName, rating);
      }
    } catch { showNotification('Rating failed!'); }
  },

  showRateUI(ownerName) {
    const existing = LS.get('rated_' + ownerName, 0);
    let html = `<h3>⭐ Rate Room</h3>`;
    html += `<p style="font-size:10px;color:#888;margin-bottom:12px">Rate ${ownerName}'s room</p>`;
    html += `<div style="text-align:center;font-size:32px;margin:16px 0" id="star-row">`;
    for (let i = 1; i <= 5; i++) {
      html += `<span class="rate-star" data-val="${i}" style="cursor:pointer;margin:0 4px;opacity:${i<=existing?.8:.3}">${i<=existing?'★':'☆'}</span>`;
    }
    html += `</div>`;
    if (existing) html += `<p style="text-align:center;font-size:9px;color:#888">Your rating: ${existing}/5 (click to update)</p>`;
    const {p} = createPopup(html);
    p.querySelectorAll('.rate-star').forEach(star => {
      star.onmouseenter = () => {
        const v = parseInt(star.dataset.val);
        p.querySelectorAll('.rate-star').forEach(s => {
          s.textContent = parseInt(s.dataset.val) <= v ? '★' : '☆';
          s.style.opacity = parseInt(s.dataset.val) <= v ? 1 : .3;
        });
      };
      star.onclick = () => {
        this.rate(ownerName, parseInt(star.dataset.val));
        p.closest('.popup-overlay').remove();
      };
    });
  },

  // Weekly rewards (simulated — check if can collect)
  canCollectWeekly() {
    const last = LS.get('lastWeeklyRewardCollect', 0);
    return Date.now() - last > 7 * 24 * 60 * 60 * 1000;
  },

  async collectWeekly() {
    if (!this.canCollectWeekly()) { showNotification('Already collected this week!'); return; }
    try {
      const res = await fetch('/api/rooms');
      const rooms = await res.json();
      rooms.sort((a, b) => (b.avgRating || 0) - (a.avgRating || 0));
      const myName = LS.get('visitorName', 'Visitor');
      const myIdx = rooms.findIndex(r => r.owner === myName);
      let reward = 0;
      if (myIdx === 0) reward = 200;
      else if (myIdx >= 1 && myIdx <= 4) reward = 100;
      else if (myIdx >= 5 && myIdx <= 9) reward = 50;
      if (reward > 0) {
        Coins.earn(reward, 'weekly_rating');
        LS.set('lastWeeklyRewardCollect', Date.now());
        showNotification(`🏆 Weekly Rating Reward: +${reward}◈ (#${myIdx + 1} rated room!)`);
      } else {
        showNotification('Your room needs to be in the top 10 rated to earn weekly rewards!');
      }
    } catch { showNotification('Failed to check rankings!'); }
  }
};

// ─── ENTRY FEES ─────────────────────────────────────────────────
const EntryFee = {
  getMyFee() { return LS.get('roomEntryFee', 0); },
  setMyFee(fee) {
    fee = Math.max(0, Math.min(25, fee));
    LS.set('roomEntryFee', fee);
    const name = LS.get('visitorName','Visitor');
    fetch(`/api/rooms/${encodeURIComponent(name)}/settings`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ entryFee: fee })
    }).catch(()=>{});
  },

  showEntryDialog(room, callback) {
    const fee = room.entryFee || 0;
    if (fee <= 0) { callback(); return; }
    if (!Coins.canAfford(fee)) { showNotification(`Need ${fee}◈ entry fee!`); return; }
    const {p} = createPopup(`
      <h3>🚪 Room Entry Fee</h3>
      <p style="text-align:center;margin:12px 0">
        Enter <b style="color:#00fff7">${room.name}</b>?<br>
        <span style="font-size:20px;color:#ffd700;margin:8px 0;display:block">${fee}◈</span>
        <span style="font-size:9px;color:#888">Fee goes to room owner</span>
      </p>
      <div style="text-align:center">
        <button class="drink-btn" id="entry-cancel">Cancel</button>
        <button class="drink-btn" id="entry-pay" style="border-color:#ffd700;color:#ffd700">Pay & Enter</button>
      </div>
    `);
    p.querySelector('#entry-cancel').onclick = () => p.closest('.popup-overlay').remove();
    p.querySelector('#entry-pay').onclick = () => {
      if (Coins.spend(fee, 'entry_fee')) {
        // Credit owner
        fetch(`/api/rooms/${encodeURIComponent(room.owner)}/earn`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ amount: Math.min(fee, 10), source:'entry_fee', visitor: LS.get('visitorName','Visitor') })
        }).catch(()=>{});
        callback();
      } else { showNotification('Not enough ◈!'); }
      p.closest('.popup-overlay').remove();
    };
  }
};

// ─── FEATURED ROOM MARKETPLACE ──────────────────────────────────
const FeaturedMarketplace = {
  COST_PER_DAY: 50,
  MAX_SLOTS: 3,

  async showUI() {
    try {
      const rooms = await (await fetch('/api/rooms')).json();
      const now = Date.now();
      const featured = rooms.filter(r => r.featuredUntil && r.featuredUntil > now);
      const myName = LS.get('visitorName', 'Visitor');
      const myRoom = rooms.find(r => r.owner === myName);
      const myFeatured = myRoom && myRoom.featuredUntil && myRoom.featuredUntil > now;

      let html = `<h3 style="color:#ffd700">⭐ Featured Room Marketplace</h3>`;
      html += `<p style="font-size:10px;color:#888">Feature your room for 50◈/day! (${this.MAX_SLOTS} slots)</p>`;

      // Current featured
      html += `<div style="margin:10px 0"><div style="font-size:10px;color:#ffd700;margin-bottom:4px">Currently Featured (${featured.length}/${this.MAX_SLOTS})</div>`;
      if (featured.length === 0) {
        // Show top rated as auto-featured
        const topRated = rooms.filter(r => r.avgRating > 0).sort((a,b) => (b.avgRating||0) - (a.avgRating||0)).slice(0, 3);
        if (topRated.length > 0) {
          html += `<div style="font-size:9px;color:#666;margin-bottom:4px">Auto-featuring top-rated rooms:</div>`;
          topRated.forEach(r => {
            html += `<div style="padding:4px 8px;border:1px solid #444;border-radius:4px;margin:3px 0;font-size:10px">🌟 ${r.name} by <span style="color:#ff6ec7">${r.owner}</span> · ${(r.avgRating||0).toFixed(1)}★</div>`;
          });
        } else {
          html += `<div style="font-size:9px;color:#555">No featured rooms — slots available!</div>`;
        }
      } else {
        featured.forEach(r => {
          const timeLeft = Math.max(0, Math.round((r.featuredUntil - now) / 3600000));
          html += `<div style="padding:6px 8px;border:1px solid #ffd700;border-radius:4px;margin:3px 0;background:rgba(255,215,0,.05)">`;
          html += `<div style="font-size:11px;color:#ffd700;font-weight:bold">⭐ ${r.name}</div>`;
          html += `<div style="font-size:9px;color:#888">by ${r.owner} · ${timeLeft}h remaining</div>`;
          html += `</div>`;
        });
      }
      html += `</div>`;

      // Buy feature slot
      if (myRoom && !myFeatured && featured.length < this.MAX_SLOTS) {
        html += `<button class="drink-btn" id="buy-featured" style="width:100%;border-color:#ffd700;color:#ffd700;margin-top:8px">⭐ Feature My Room (${this.COST_PER_DAY}◈/day)</button>`;
      } else if (myFeatured) {
        const timeLeft = Math.round((myRoom.featuredUntil - now) / 3600000);
        html += `<div style="text-align:center;color:#ffd700;font-size:10px;margin-top:8px">Your room is featured! (${timeLeft}h left)</div>`;
      } else if (!myRoom) {
        html += `<div style="text-align:center;color:#666;font-size:10px;margin-top:8px">Create a room first!</div>`;
      } else if (featured.length >= this.MAX_SLOTS) {
        html += `<div style="text-align:center;color:#666;font-size:10px;margin-top:8px">All slots taken! Try later.</div>`;
      }

      const {p} = createPopup(html);
      const buyBtn = p.querySelector('#buy-featured');
      if (buyBtn) {
        buyBtn.onclick = () => {
          if (!Coins.canAfford(this.COST_PER_DAY)) { showNotification(`Need ${this.COST_PER_DAY}◈!`); return; }
          Coins.spend(this.COST_PER_DAY, 'featured_room');
          const until = Date.now() + 24 * 60 * 60 * 1000;
          fetch(`/api/rooms/${encodeURIComponent(myName)}/settings`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ featuredUntil: until })
          }).then(() => {
            showNotification('⭐ Your room is now featured for 24h!');
            p.closest('.popup-overlay').remove();
          }).catch(() => showNotification('Failed!'));
        };
      }
    } catch { showNotification('Failed to load marketplace!'); }
  }
};

// ─── ENHANCED ROOM INFO HUD (with rating, tip history, entry fee) ──
const _origUpdateRoomInfoHUD = RoomSystem.updateRoomInfoHUD.bind(RoomSystem);
RoomSystem.updateRoomInfoHUD = function() {
  const hud = $('#room-info-hud');
  if (!this.currentRoom || !this.visitingOwner) { hud.style.display = 'none'; return; }
  const r = this.currentRoom;
  const isOwnRoom = r.owner === LS.get('visitorName', 'Visitor');
  const tierInfo = ROOM_TIERS[r.tier || 'starter'] || ROOM_TIERS.starter;
  const ratingStr = r.avgRating ? `${r.avgRating.toFixed(1)}★(${r.ratingCount})` : 'No ratings';
  const feeStr = r.entryFee > 0 ? `💳${r.entryFee}◈` : '🆓FREE';
  const featuredStr = r.featuredUntil && r.featuredUntil > Date.now() ? ' ⭐FEATURED' : '';

  hud.style.display = 'block';
  hud.innerHTML = `${tierInfo.icon} <b style="color:#00fff7">${r.name}</b>${featuredStr} by <b style="color:#ff6ec7">${r.owner}</b> · 👁️ ${r.visitors||0} · ${ratingStr} · ${feeStr} · 💰 ${r.earnings||0}◈` +
    (!isOwnRoom ? ` <span id="tip-room-btn" style="cursor:pointer;margin-left:4px;padding:2px 6px;background:rgba(255,215,0,.2);border:1px solid #ffd700;border-radius:4px;color:#ffd700;font-size:9px">💰 Tip</span> <span id="rate-room-btn" style="cursor:pointer;padding:2px 6px;background:rgba(255,255,0,.1);border:1px solid #ff0;border-radius:4px;color:#ff0;font-size:9px">⭐ Rate</span> <span id="like-room-btn" style="cursor:pointer;padding:2px 6px;background:rgba(255,110,199,.15);border:1px solid #ff6ec7;border-radius:4px;color:#ff6ec7;font-size:9px">❤️</span>` : '');

  const tipBtn = hud.querySelector('#tip-room-btn');
  if (tipBtn) tipBtn.onclick = () => this.showTipPopup(r.owner);
  const likeBtn = hud.querySelector('#like-room-btn');
  if (likeBtn) likeBtn.onclick = () => this.likeRoom(r.owner);
  const rateBtn = hud.querySelector('#rate-room-btn');
  if (rateBtn) rateBtn.onclick = () => RoomRating.showRateUI(r.owner);
};

// ─── ENHANCED TIP POPUP (min 5◈, no max) ───────────────────────
RoomSystem.showTipPopup = function(ownerName) {
  const myCoins = Coins.count;
  if (myCoins < 5) { showNotification('Need at least 5◈ to tip!'); return; }
  const maxTip = myCoins;
  const {p} = createPopup(`
    <h3>💰 Tip ${ownerName}</h3>
    <p style="font-size:11px;color:#888;margin-bottom:8px">Send ◈ to show appreciation! (min 5◈)</p>
    <p style="text-align:center;font-size:24px;color:#ffd700;margin:12px 0" id="tip-amount-display">5◈</p>
    <input type="range" class="tip-slider" id="tip-slider" min="5" max="${maxTip}" value="5" style="width:100%">
    <p style="text-align:center;font-size:10px;color:#666">Your balance: ${myCoins}◈</p>
    <div style="text-align:center;margin-top:12px">
      <button class="drink-btn" id="tip-cancel">Cancel</button>
      <button class="drink-btn" id="tip-send" style="border-color:#ffd700;color:#ffd700">Send Tip 💰</button>
    </div>
  `);
  const slider = p.querySelector('#tip-slider');
  const display = p.querySelector('#tip-amount-display');
  slider.oninput = () => { display.textContent = slider.value + '◈'; };
  p.querySelector('#tip-cancel').onclick = () => p.closest('.popup-overlay').remove();
  p.querySelector('#tip-send').onclick = async () => {
    const amount = parseInt(slider.value);
    if (amount < 5) { showNotification('Minimum tip is 5◈!'); return; }
    if (!Coins.canAfford(amount)) { showNotification('Not enough ◈!'); return; }
    Coins.spend(amount, 'tip');
    try {
      await fetch(`/api/rooms/${encodeURIComponent(ownerName)}/tip`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: Math.min(amount, 50), tipper: LS.get('visitorName', 'Anonymous') })
      });
      showNotification(`💰 Tipped ${ownerName} ${amount}◈!`);
      if (this.currentRoom) { this.currentRoom.earnings = (this.currentRoom.earnings || 0) + amount; this.updateRoomInfoHUD(); }
    } catch { showNotification('Tip failed!'); }
    p.closest('.popup-overlay').remove();
  };
};

// ─── PATCH loadRoom to check entry fee ──────────────────────────
const _origLoadRoom = RoomSystem.loadRoom.bind(RoomSystem);
RoomSystem.loadRoom = async function(ownerName) {
  try {
    const response = await fetch(`/api/rooms/${encodeURIComponent(ownerName)}`);
    const room = await response.json();
    // Check entry fee
    if (room.entryFee > 0 && room.owner !== LS.get('visitorName', 'Visitor')) {
      EntryFee.showEntryDialog(room, () => _doLoadRoom.call(this, ownerName, room));
    } else {
      _doLoadRoom.call(this, ownerName, room);
    }
  } catch { showNotification('Failed to load room!'); }
};

async function _doLoadRoom(ownerName, room) {
  RoomSystem.currentRoom = room;
  RoomSystem.visitingOwner = ownerName;
  RoomSystem.isInBuilder = false;
  S.floor = 8;
  $('#floor-hud').textContent = `🏠 ${room.name}`;
  // Record visit
  const visitRes = await fetch(`/api/rooms/${encodeURIComponent(ownerName)}/visit`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ visitor: LS.get('visitorName', 'Anonymous') })
  }).catch(()=>({json:()=>({})}));
  const visitData = await visitRes.json().catch(()=>({}));
  if (visitData.visitors) room.visitors = visitData.visitors;
  RoomSystem.updateRoomInfoHUD();
  showNotification(`Visiting ${room.name}!`);
  // Check creator level-up for room owner (if it's us visiting our own)
  CreatorLevel.checkLevelUp();
}

// ─── PATCH showRoomList to show ratings, fees, creator badges, featured ──
RoomSystem.showRoomList = async function() {
  try {
    const [roomsRes, lbRes] = await Promise.all([fetch('/api/rooms'), fetch('/api/rooms/leaderboard')]);
    const rooms = await roomsRes.json();
    const leaderboard = await lbRes.json().catch(()=>[]);
    const now = Date.now();

    rooms.sort((a,b) => ((b.visitors||0)+(b.likes||0)) - ((a.visitors||0)+(a.likes||0)));

    let html = '<h3>🏘️ Visit Rooms</h3><p style="font-size:10px;color:#888;margin-bottom:8px">Explore rooms created by visitors!</p>';

    if (rooms.length === 0) {
      html += '<p style="color:#666">No public rooms yet!</p>';
    } else {
      rooms.forEach((room, i) => {
        const medal = i === 0 ? '🥇 ' : i === 1 ? '🥈 ' : i === 2 ? '🥉 ' : '';
        const tierInfo = ROOM_TIERS[room.tier || 'starter'] || ROOM_TIERS.starter;
        const ratingStr = room.avgRating ? `${room.avgRating.toFixed(1)}★` : '';
        const feeStr = room.entryFee > 0 ? `💳${room.entryFee}◈` : '<span style="color:#0f0;font-size:8px">FREE</span>';
        const isFeatured = room.featuredUntil && room.featuredUntil > now;
        const featuredBorder = isFeatured ? 'border-color:#ffd700;background:rgba(255,215,0,.06)' : '';

        html += `
          <div class="drink-btn" style="width:100%;text-align:left;margin:4px 0;padding:8px 12px;${featuredBorder}" data-owner="${room.owner}">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div style="font-weight:bold;color:#00fff7">${medal}${isFeatured?'⭐ ':''}${room.name} ${tierInfo.icon}</div>
              <div style="font-size:9px;color:#ffd700">${feeStr} · 💰 ${room.earnings||0}◈</div>
            </div>
            <div style="font-size:9px;color:#888;margin-top:2px">by <b style="color:#ff6ec7">${room.owner}</b> · 👁️ ${room.visitors||0} · ❤️ ${room.likes||0}${ratingStr ? ' · '+ratingStr : ''}</div>
          </div>
        `;
      });
    }

    // Top rated
    const rated = rooms.filter(r => r.avgRating > 0).sort((a,b) => (b.avgRating||0)-(a.avgRating||0));
    if (rated.length > 0) {
      html += '<div style="margin-top:12px;border-top:1px solid #333;padding-top:8px"><h3 style="font-size:12px;color:#ff0">⭐ Top Rated</h3>';
      rated.slice(0,5).forEach((r,i) => {
        html += `<div style="font-size:10px;margin:2px 0;color:#ddd">${i+1}. <b style="color:#ff6ec7">${r.owner}</b> — ${r.avgRating.toFixed(1)}★ (${r.ratingCount} ratings)</div>`;
      });
      html += '</div>';
    }

    // Earnings leaderboard
    if (leaderboard.length > 0) {
      html += '<div style="margin-top:8px;border-top:1px solid #333;padding-top:8px"><h3 style="font-size:12px;color:#ffd700">🏆 Top Earners</h3>';
      leaderboard.slice(0,5).forEach((r,i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
        html += `<div style="font-size:10px;margin:2px 0;color:#ddd">${medal} <b style="color:#ff6ec7">${r.owner}</b> — <span style="color:#ffd700">${r.earnings}◈</span></div>`;
      });
      html += '</div>';
    }

    const { p } = createPopup(html);
    p.querySelectorAll('[data-owner]').forEach(btn => {
      btn.onclick = () => {
        RoomSystem.loadRoom(btn.dataset.owner);
        p.closest('.popup-overlay').remove();

    showNotification('Failed to load room list!');
  }
};

  const creatorFurn = CreatorLevel.getUnlockedFurniture();

    html += `<p style="color:#ff6666;font-size:10px;margin-bottom:8px">⚠️ Max slots reached! Upgrade room tier for more.</p>`;
  }

  // Group by section
  const sections = [
    { label: '🏠 Basic', items: Object.entries(FURNITURE_TYPES) },

      const hasSlot = placedCount < tierSlots;
      const hasRequirement = !furn.requirement || (furn.requirement === 'pet_pixel_100' && S.petCount >= 100);
      if (!hasRequirement && furn.requirement) {
        html += `<div class="drink-btn" style="opacity:.3;cursor:not-allowed">${furn.icon} ${furn.name} — ${furn.requirement.replace(/_/g,' ')}</div>`;

      }
    });
  });

  // Buttons
  html += `<div style="margin-top:10px;border-top:1px solid #333;padding-top:8px">`;
  html += `<button class="drink-btn" id="cat-tier-btn" style="width:100%;border-color:#00fff7;color:#00fff7">🏠 Room Tiers & Upgrades</button>`;
  html += `<button class="drink-btn" id="cat-creator-btn" style="width:100%;border-color:#ffd700;color:#ffd700;margin-top:4px">${lv.icon} Creator Profile</button>`;
  html += `<button class="drink-btn" id="cat-settings-btn" style="width:100%;margin-top:4px">⚙️ Room Settings</button>`;
  html += `</div>`;

  const {p} = createPopup(html);
  // Register creator furniture types temporarily for placement
  Object.assign(FURNITURE_TYPES, creatorFurn);

  p.querySelectorAll('.furniture-item').forEach(btn => {
    btn.onclick = () => {
      const type = btn.dataset.type;
      const furn = allFurn[type];
      if (!furn) return;
      if (RoomSystem.furniture.length >= tierSlots) { showNotification('Max furniture slots! Upgrade tier.'); return; }
      if (!Coins.canAfford(furn.cost)) { showNotification(`Need ${furn.cost}◈!`); return; }
      RoomSystem.selectedFurniture = furn;
      RoomSystem.selectedFurniture._type = type;
      RoomSystem.builderMode = 'place';
      showNotification(`Click to place ${furn.name}`);
      p.closest('.popup-overlay').remove();

  const tierBtn = p.querySelector('#cat-tier-btn');

  const creatorBtn = p.querySelector('#cat-creator-btn');
  if (creatorBtn) creatorBtn.onclick = () => { p.closest('.popup-overlay').remove(); CreatorLevel.showProfile(); };
  const settingsBtn = p.querySelector('#cat-settings-btn');
  if (settingsBtn) settingsBtn.onclick = () => { p.closest('.popup-overlay').remove(); showRoomSettingsEnhanced(); };
};

// ─── SYNC VISIT COUNT FROM SERVER ───────────────────────────────
(async function syncVisitCount() {
  const myName = LS.get('visitorName', 'Visitor');
  if (myName === 'Visitor') return;
  try {
    const res = await fetch(`/api/rooms/${encodeURIComponent(myName)}`);
    if (res.ok) {
      const room = await res.json();
      RoomTiers.setTotalVisits(room.visitors || 0);
      LS.set('roomAvgRating', room.avgRating || 0);
      // Check top 10
      const allRes = await fetch('/api/rooms');
      const all = await allRes.json();
      all.sort((a,b) => (b.avgRating||0) - (a.avgRating||0));
      const myIdx = all.findIndex(r => r.owner === myName);
      LS.set('roomIsTop10', myIdx >= 0 && myIdx < 10);
      // Check creator level-up
      CreatorLevel.checkLevelUp();
    }
  } catch {}
})();

// ─── 3. ELEVATOR TRANSITION ────────────────────────────────────
const ElevatorTransition = {
  active: false,
  phase: 0, // 0=close, 1=pause, 2=show, 3=open
  timer: 0,
  targetFloor: 0,
  overlay: null,

  play(targetFloor, callback) {
    if (this.active) return;
    this.active = true;
    this.targetFloor = targetFloor;
    const ov = document.createElement('div');
    ov.id = 'elev-transition';
    ov.innerHTML = `
      <div id="elev-left"></div>
      <div id="elev-right"></div>
      <div id="elev-label"></div>
    `;
    document.body.appendChild(ov);
    this.overlay = ov;
    const left = ov.querySelector('#elev-left');
    const right = ov.querySelector('#elev-right');
    const label = ov.querySelector('#elev-label');

    // Phase 1: doors close (400ms)
    left.style.transform = 'translateX(-100%)';
    right.style.transform = 'translateX(100%)';
    requestAnimationFrame(() => {
      left.style.transform = 'translateX(0)';
      right.style.transform = 'translateX(0)';
    });

    // Phase 2: pause + shake (200ms)
    setTimeout(() => {
      ov.style.animation = 'elevShake .2s';
      callback(); // actually change the floor
    }, 420);

    // Phase 3: show label (300ms)
    const cleanName = (FLOOR_NAMES[targetFloor]||'').replace(/[^\w\s''—]/g,'').trim();
    setTimeout(() => {
      label.textContent = `FLOOR ${targetFloor} — ${cleanName}`;
      label.style.opacity = '1';
    }, 650);

    // Phase 4: doors open (400ms)
    setTimeout(() => {
      label.style.opacity = '0';
      left.style.transform = 'translateX(-100%)';
      right.style.transform = 'translateX(100%)';
    }, 950);

    // Cleanup
    setTimeout(() => {
      ov.remove();
      this.active = false;
    }, 1400);
  }
};

const CoinArcs = {
  coins: [],
  spawn(sourceX, sourceY, amount) {

    const hudEl = document.querySelector('#coin-hud');
    const hudRect = hudEl ? hudEl.getBoundingClientRect() : {left:30,top:20};

    const canvasRect = canvasEl ? canvasEl.getBoundingClientRect() : {left:0,top:0};
    // Convert game coords to screen coords approx
    const scaleX = canvasRect.width / W;
    const scaleY = canvasRect.height / H;
    const screenSX = canvasRect.left + sourceX * scaleX;
    const screenSY = canvasRect.top + sourceY * scaleY;
    const targetX = hudRect.left + hudRect.width/2;
    const targetY = hudRect.top + hudRect.height/2;

    for (let i = 0; i < count; i++) {
      const delay = i * 80;
      setTimeout(() => {
        const coin = document.createElement('div');

        coin.textContent = '◈';
        coin.style.left = screenSX + 'px';
        coin.style.top = screenSY + 'px';
        document.body.appendChild(coin);
        // Animate via quadratic bezier
        const cpX = (screenSX + targetX) / 2 + (Math.random() - .5) * 60;
        const cpY = Math.min(screenSY, targetY) - 40 - Math.random() * 40;
        const duration = 500 + Math.random() * 200;
        const start = performance.now();
        function animCoin(now) {
          const t = Math.min((now - start) / duration, 1);
          const u = 1 - t;
          const x = u*u*screenSX + 2*u*t*cpX + t*t*targetX;
          const y = u*u*screenSY + 2*u*t*cpY + t*t*targetY;
          coin.style.left = x + 'px';
          coin.style.top = y + 'px';
          coin.style.opacity = String(1 - t * 0.3);
          if (t < 1) requestAnimationFrame(animCoin);
          else {
            coin.remove();
            // Bump the counter
            const counter = document.querySelector('#coin-hud');
            if (counter) {
              counter.style.transform = 'scale(1.3)';
              setTimeout(() => counter.style.transform = 'scale(1)', 150);
            }
          }
        }
        requestAnimationFrame(animCoin);
      }, delay);
    }
  }
};

const InteractionSparkle = {
  sparkles: [],
  lastNear: null,
  labelAlpha: 0,
  update(dt) {
    const near = S.visitorNear || S.nearObject;
    if (near && near !== this.lastNear) {
      this.labelAlpha = 0;
    }
    this.lastNear = near;
    if (near) {
      this.labelAlpha = Math.min(1, this.labelAlpha + dt * 2);
      // Spawn sparkles around the object
      if (Math.random() < dt * 3) {
        this.sparkles.push({
          x: near.x + Math.random() * (near.w || 30),
          y: near.y + Math.random() * (near.h || 30),
          life: 1 + Math.random(),
          maxLife: 1 + Math.random(),
          size: 1 + Math.random() * 2
        });
      }
    } else {
      this.labelAlpha = Math.max(0, this.labelAlpha - dt * 3);
    }
    // Update sparkles
    for (let i = this.sparkles.length - 1; i >= 0; i--) {
      this.sparkles[i].life -= dt;
      this.sparkles[i].y -= dt * 8;
      if (this.sparkles[i].life <= 0) this.sparkles.splice(i, 1);
    }
  },
  render() {
    // Sparkle particles
    for (const sp of this.sparkles) {
      const alpha = sp.life / sp.maxLife;
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.7})`;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, sp.size * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    // Fading label
    const near = S.visitorNear || S.nearObject;
    if (near && near.label && this.labelAlpha > 0.01) {
      ctx.save();
      ctx.globalAlpha = this.labelAlpha;
      ctx.fillStyle = '#ffd080';
      ctx.font = 'bold 9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(near.label, near.x + (near.w || 30) / 2, near.y - 6);

      ctx.restore();

  }

function getElementMultiplier(atk,def){
  if(!atk||!def)return 1.0;
  const a=atk.toLowerCase(),d=def.toLowerCase();
  if(a===d||a==='energy'||d==='energy')return 1.0;
  if((a==='fire'&&d==='ice')||(a==='ice'&&d==='lightning')||(a==='lightning'&&d==='fire'))return 1.5;
  if((a==='ice'&&d==='fire')||(a==='lightning'&&d==='ice')||(a==='fire'&&d==='lightning'))return 0.75;
  if((a==='light'&&d==='dark')||(a==='dark'&&d==='light'))return 1.5;
  return 1.0;
}

BazaarUI._econ3RenderTab=async function(tab,container,popup){
  if(tab==='browse'){
    container.innerHTML='<div style="text-align:center;color:#888;padding:20px">Loading...</div>';
    let listings=[],fromServer=false;
    try{const r=await fetch('/api/marketplace');listings=await r.json();fromServer=true;}catch(e){listings=LS.get('bazaar_offline_listings',[]);}
    if(!listings.length){container.innerHTML='<div style="text-align:center;color:#888;padding:20px">'+(fromServer?'No listings.':'⚠️ Offline')+'</div>';return;}
    let html=fromServer?'':'<div style="font-size:8px;color:#ff8800;margin-bottom:6px">⚠️ Offline mode</div>';
    listings.forEach(l=>{
      const def=getAllLootableItems().find(i=>i.itemId===(l.item&&l.item.itemId));
      const r=RARITIES[(l.item&&l.item.rarity)||'common']||RARITIES.common;
      const icon=def?def.icon:(l.item&&l.item.icon)||'❓';
      const name=def?def.name:(l.item&&l.item.name)||'???';
      const enh=l.item&&l.item.enhanceLevel?' +'+l.item.enhanceLevel:'';
      const ta=l.createdAt?_timeSince(l.createdAt):'';
      html+=`<div class="bazaar-listing" data-id="${l.id}"><span class="listing-icon">${icon}</span>`;
      html+=`<div class="listing-info"><div style="color:${r.color};font-weight:bold">${name}${enh}</div>`;
      html+=`<div class="listing-seller">Seller: ${l.owner}${ta?' · '+ta:''}</div></div>`;
      html+=`<div class="listing-price">${l.price}◈<div style="font-size:7px;color:#888">+${Math.max(1,Math.ceil(l.price*0.05))}◈ tax</div></div></div>`;
    });
    container.innerHTML=html;
    if(fromServer)LS.set('bazaar_offline_listings',listings);
    container.querySelectorAll('.bazaar-listing').forEach(el=>{el.onclick=()=>this._econ3Buy(el.dataset.id,popup);});
  }else if(tab==='mylistings'){
    container.innerHTML='<div style="text-align:center;color:#888;padding:20px">Loading...</div>';
    const myName=LS.get('visitorName','Anonymous');
    try{
      const r=await fetch('/api/marketplace');const all=await r.json();
      const mine=all.filter(l=>l.owner===myName);
      if(!mine.length){container.innerHTML='<div style="text-align:center;color:#888;padding:20px">No active listings.</div>';return;}
      let html='';
      mine.forEach(l=>{
        const def=getAllLootableItems().find(i=>i.itemId===(l.item&&l.item.itemId));
        const r2=RARITIES[(l.item&&l.item.rarity)||'common']||RARITIES.common;
        html+=`<div class="bazaar-listing"><span class="listing-icon">${def?def.icon:'❓'}</span>`;
        html+=`<div class="listing-info"><div style="color:${r2.color}">${def?def.name:'???'}</div></div>`;
        html+=`<div class="listing-price">${l.price}◈</div>`;
        html+=`<button class="drink-btn cancel-listing" data-id="${l.id}" style="font-size:8px;padding:2px 6px;border-color:#ff4444;color:#ff4444">Cancel</button></div>`;
      });
      container.innerHTML=html;
      container.querySelectorAll('.cancel-listing').forEach(btn=>{
        btn.onclick=async()=>{
          try{await fetch('/api/marketplace/cancel/'+btn.dataset.id,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({owner:myName})});
          btn.textContent='Cancelled';btn.disabled=true;showNotification('Listing cancelled');}catch{showNotification('Failed');}
        };
      });
    }catch{container.innerHTML='<div style="color:#ff4444;padding:10px">Server offline</div>';}
  }else{
    await this._renderTab(tab,container,popup);
    // Inject listing fee notice on sell tab
    if(tab==='sell'){
      const fi=document.createElement('div');fi.style.cssText='font-size:9px;color:#ff8800;margin-bottom:6px';
      fi.textContent='📋 5% listing fee (non-refundable) + 5% sale tax on purchase';
      container.insertBefore(fi,container.firstChild);
      // Wrap list buttons to charge fee
      container.querySelectorAll('.list-item').forEach(btn=>{
        const orig=btn.onclick;
        btn.onclick=async()=>{
          const listing=btn.closest('.bazaar-listing');
          const price=parseInt(listing.querySelector('.sell-price').value);
          if(!price||price<1)return;
          const fee=Math.max(1,Math.ceil(price*0.05));
          if(!Coins.canAfford(fee)){showNotification('Need '+fee+'◈ listing fee!');return;}
          Coins.spend(fee,'bazaar_listing_fee');
          showNotification('Paid '+fee+'◈ listing fee');
          if(orig)await orig();
        };
      });
    }
  }
};

BazaarUI._econ3Buy=async function(listingId,popup){
  const buyer=LS.get('visitorName','Anonymous');
  try{
    const res=await fetch('/api/marketplace/buy/'+listingId,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({buyer})});
    const data=await res.json();
    if(data.ok){
      const tax=Math.max(1,Math.ceil(data.price*0.05));
      const total=data.price+tax;
      if(!Coins.canAfford(total)){showNotification('Need '+total+'◈ ('+data.price+'◈ + '+tax+'◈ tax)!');return;}
      Coins.spend(total,'bazaar_buy');
      if(data.item){LootSystem.addToInventory(data.item);showNotification('🏪 Bought for '+data.price+'◈ + '+tax+'◈ tax!');MissionBoard.trackProgress('shop_buys',1);}
      popup.closest('.popup-overlay').remove();this.showUI();
    }
  }catch{showNotification('Purchase failed.');}
};

// ─── 5. CREATOR ROYALTIES FOUNDATION ────────────────────────────
const CreatorRoyalties={
  trackVisit(roomOwner,customItemIds){
    if(!customItemIds||!customItemIds.length)return;
    const myName=LS.get('visitorName','Anonymous');
    if(myName===roomOwner)return;
    const rd=LS.get('creator_royalties',{});
    customItemIds.forEach(cid=>{
      if(!rd[cid])rd[cid]={visitors:[],totalVisits:0,earned:0};
      if(!rd[cid].visitors.includes(myName)){
        rd[cid].visitors.push(myName);rd[cid].totalVisits++;
        if(rd[cid].totalVisits%10===0){rd[cid].earned++;Coins.earn(1,'creator_royalty');}
      }
    });
    LS.set('creator_royalties',rd);
  },
  getMyRoyalties(){
    const myItems=CustomItems.getAll().filter(i=>i.creator===LS.get('visitorName','Anonymous'));
    const rd=LS.get('creator_royalties',{});
    let total=0;
    const items=myItems.map(i=>{const d=rd[i.id]||{totalVisits:0,earned:0};total+=d.earned||0;return{name:i.name,icon:i.icon,visits:d.totalVisits||0,earned:d.earned||0};});
    return{items,total};
  },
  showTab(){
    const{items,total}=this.getMyRoyalties();
    let h='<h3 style="color:#ffd700">💰 Creator Royalties</h3>';
    h+='<div style="font-size:12px;color:#ffd700;margin:8px 0">Total earned: '+total+'◈</div>';
    h+='<p style="font-size:9px;color:#888">Earn 1◈ per 10 unique room visits with your custom items.</p>';
    if(!items.length)h+='<div style="text-align:center;color:#888;padding:20px">No custom items yet.</div>';
    else items.forEach(i=>{h+='<div class="bazaar-listing"><span class="listing-icon">'+i.icon+'</span><div class="listing-info"><div style="color:#c080ff">'+i.name+'</div><div style="font-size:8px;color:#888">'+i.visits+' unique visits</div></div><div class="listing-price">'+i.earned+'◈</div></div>';});
    createPopup(h);
  }
};

  _createHUD(){
    if(document.getElementById('onboarding-hud'))return;

    el.id='onboarding-hud';
    el.className='show';
    el.innerHTML='<span class="step-text"></span><button class="skip-btn">Skip tutorial</button>';
    document.body.appendChild(el);

      this._complete();
      addChatMsg('Echo','Tutorial skipped! Explore freely — I\'m here if you need me. 🔮');

  _updateHUD(){
    const el=document.getElementById('onboarding-hud');
    if(!el)return;
    const labels={
      1:'Welcome',2:'Pet Pixel',3:'Visit the shop',
      4:'Pick a skin',5:'Try the elevator',6:'Visit Floor 2'
    };
    el.querySelector('.step-text').textContent=`📋 Step ${this.step}/6 — ${labels[this.step]||''}`;

    if(typeof QuestTracker!=='undefined')QuestTracker.render();

  _showChips(texts,cb){
    const el=$('#chat-suggestions');
    el.innerHTML='';
    texts.forEach(text=>{
      const chip=document.createElement('div');
      chip.className='suggest-chip';
      chip.textContent=text;
      chip.onclick=()=>{
        addChatMsg('You',text,'#ff6ec7');
        el.innerHTML='';
        cb(text);
      };
      el.appendChild(chip);
    });
  },

  // Called from petPixel
  onPetPixel(){
    if(!this.active||this.step!==2)return;
    this.step=3;
    this._updateHUD();
    Coins.earn(10,'onboarding_bonus');
    setTimeout(()=>{
      addChatMsg('Echo','Nice! Pixel likes you. Here, take these. ◈+10 🎁');
      setTimeout(()=>{
        addChatMsg('Echo','Now let\'s check out the shop — I bet there\'s a skin that suits you.');
        this._showChips(['Take me to the shop!'],(choice)=>{
          this.step=4;
          this._updateHUD();
          LS.set('onboardingFreeSkin',true);
          showVisitorSkinPanel();
          addChatMsg('Echo','Pick anything you like! My treat for the first one. 🎁');
        });
      },1500);
    },800);
  },

  // Called from skin purchase
  onSkinBuy(){
    if(!this.active||this.step!==4)return;
    LS.set('onboardingFreeSkin',false);
    this.step=5;
    this._updateHUD();
    setTimeout(()=>{
      addChatMsg('Echo','Looking good! 😎');
      setTimeout(()=>{
        addChatMsg('Echo','There are 9 floors on this station. Each one is different. Try the elevator — Floor 2 has the best view in space. 🛗');
        this.step=5;
        this._updateHUD();
      },1500);
    },800);
  },

  // Called from changeFloor
  onFloorChange(f){
    if(!this.active)return;
    if(this.step===5&&f!==1){
      this.step=6;
      this._updateHUD();
    }
    if(this.step===6&&f===2){
      setTimeout(()=>{
        addChatMsg('Echo','Beautiful, right? ✨ Take your time exploring. If you need me, just use the chat. I\'m always here.');
        this._complete();
      },1500);
    }
  },

  _complete(){
    this.active=false;
    this.step=0;
    LS.set('hasCompletedOnboarding',true);
    const el=document.getElementById('onboarding-hud');
    if(el)el.remove();
    if(typeof QuestTracker!=='undefined')QuestTracker.render();
  }
};

      }

      // Daily missions
      missions.forEach(m=>{
        if(m.claimed)return;
        const p=progress[m.trackKey]||0;
        const pct=Math.min(100,Math.round(p/m.target*100));
        html+=`<div class="qt-mission"><div>${m.desc} <span style="float:right;color:#ffd700">${m.reward}◈</span></div><div class="qt-bar"><div class="qt-bar-fill" style="width:${pct}%"></div></div><div style="color:#666;font-size:8px">${p}/${m.target}</div></div>`;
      });

      html+=`<div class="qt-mission"><div>💾 Data Fragments <span style="float:right;color:#00fff7">${fragments}/${totalFragments}</span></div><div class="qt-bar"><div class="qt-bar-fill" style="width:${fragments/totalFragments*100}%;background:#00fff7"></div></div></div>`;

// --- 4. PEACEFUL COIN PATHS ---
const PeacefulCoins={
  _missions:null,

  init(){
    const today=new Date().toISOString().slice(0,10);
    const saved=LS.get('peacefulMissions',null);
    if(saved&&saved.date===today){
      this._missions=saved.missions;
    } else {
      this._generate(today);
    }
  },

  _generate(today){
    const allMissions=[
      {id:'explore_floor',desc:'Visit a new floor',icon:'🗺️',target:1,reward:10,trackKey:'peaceful_explore'},
      {id:'photo_f2',desc:'Stand still on F2 for 10s',icon:'📸',target:10,reward:15,trackKey:'peaceful_photo_timer'},
      {id:'harvest_plant',desc:'Harvest a grown plant',icon:'🌱',target:1,reward:10,trackKey:'peaceful_harvest'},
      {id:'decorate',desc:'Place 3 items in your room',icon:'🏠',target:3,reward:20,trackKey:'peaceful_decorate'},
      {id:'visit_room',desc:'Visit someone\'s room',icon:'🏘️',target:1,reward:5,trackKey:'peaceful_visit_room'},
      {id:'pet_pixel_5',desc:'Pet Pixel 5 times',icon:'🐱',target:5,reward:12,trackKey:'peaceful_pets'},
      {id:'interact_5',desc:'Interact with 5 objects',icon:'🔍',target:5,reward:10,trackKey:'peaceful_interact'},
      {id:'telescope',desc:'Find a constellation',icon:'🔭',target:1,reward:8,trackKey:'peaceful_telescope'},
    ];
    // Pick 3 random
    let seed=0;
    for(let i=0;i<today.length;i++)seed=((seed<<5)-seed)+today.charCodeAt(i)+7;
    const shuffled=[...allMissions].sort((a,b)=>{
      return((seed*37+a.id.charCodeAt(0))%1000)-((seed*37+b.id.charCodeAt(0))%1000);
    });
    this._missions=shuffled.slice(0,3).map(m=>({...m,progress:0,claimed:false}));
    LS.set('peacefulMissions',{date:today,missions:this._missions});
  },

  getActiveMissions(){
    if(!this._missions)this.init();
    return(this._missions||[]).filter(m=>!m.claimed);
  },

  trackProgress(trackKey,amount){
    if(!this._missions)return;
    let changed=false;
    this._missions.forEach(m=>{
      if(m.trackKey===trackKey&&!m.claimed){
        m.progress=(m.progress||0)+amount;
        if(m.progress>=m.target&&!m.claimed){
          m.claimed=true;
          Coins.earn(m.reward,'peaceful_mission');
          showNotification(`${m.icon} Mission complete: ${m.desc}! +${m.reward}◈`);
          addChatMsg('Echo',`${m.icon} Nice work! Mission complete: ${m.desc} — +${m.reward}◈`,'#44cc44');
        }
        changed=true;
      }
    });
    if(changed){
      LS.set('peacefulMissions',{date:new Date().toISOString().slice(0,10),missions:this._missions});
      QuestTracker.render();
    }
  }
};

      <h3 style="margin:0 0 8px">🐛 Report a Bug</h3>
      <p style="font-size:10px;color:#888;margin:0 0 10px">Describe what happened. Game state & error logs are captured automatically and sent to Echo for review.</p>
      <textarea id="bug-desc" placeholder="What went wrong? What were you doing when it happened?" style="width:100%;height:80px;background:#1a1a2e;border:1px solid #555;color:#eee;border-radius:6px;padding:8px;font-family:inherit;font-size:11px;resize:vertical"></textarea>
      <div style="margin-top:6px">
        <label style="font-size:10px;color:#888;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="bug-screenshot" checked> Include screenshot
        </label>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
        <button id="bug-cancel" style="background:#333;border:1px solid #555;color:#aaa;padding:6px 16px;border-radius:6px;cursor:pointer;font-family:inherit">Cancel</button>
        <button id="bug-send" style="background:#e74c3c;border:none;color:#fff;padding:6px 16px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:bold">Send Report 🐛</button>
      </div>
      <div id="bug-status" style="font-size:10px;color:#888;margin-top:8px;text-align:center"></div>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelector('#bug-cancel').onclick=()=>ov.remove();
    ov.querySelector('#bug-send').onclick=async()=>{
      const desc=ov.querySelector('#bug-desc').value.trim();
      if(!desc){ov.querySelector('#bug-desc').style.borderColor='#e74c3c';return}
      const status=ov.querySelector('#bug-status');
      status.textContent='Capturing state...';status.style.color='#00fff7';
      const report={description:desc,state:BugReport.captureState()};
      // Screenshot
      if(ov.querySelector('#bug-screenshot').checked){
        try{report.screenshot=document.querySelector('#game').toDataURL('image/jpeg',0.5)}catch(e){report.screenshot='capture_failed'}
      }
      status.textContent='Sending...';
      try{
        const r=await fetch('/api/bug-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(report)});
        if(r.ok){
          status.textContent='✅ Bug report sent! Echo will review it.';status.style.color='#2ecc71';
          showNotification('🐛 Bug report sent — Echo will look into it!');
          addChatMsg('Echo','Got your bug report! I will investigate and fix it in the next update. Thanks for helping improve the station! 🔧');
          setTimeout(()=>ov.remove(),2000);
        }else{status.textContent='❌ Failed to send. Try again?';status.style.color='#e74c3c'}
      }catch(e){status.textContent='❌ Network error. Server might be down.';status.style.color='#e74c3c'}
    };
    setTimeout(()=>ov.querySelector('#bug-desc')?.focus(),100);
  }
};

  collectibles: [],
  
  update(dt) {
    // Update NPC behaviors and animations
    Object.values(this.npcs).forEach(npc => {
      this.updateNPC(npc, dt);
    });
    
    // Update dialogue typewriter effect
    if (this.dialogue.active && this.dialogue.typewriterIndex < this.dialogue.currentText.length) {
      this.dialogue.typewriterIndex += this.dialogue.typewriterSpeed;
      this.dialogue.displayText = this.dialogue.currentText.slice(0, Math.floor(this.dialogue.typewriterIndex));
    }
    
    // Update collectibles (glowing effect)
    this.collectibles.forEach(collectible => {
      collectible.glowTimer = (collectible.glowTimer || 0) + dt * 4;
    });
    
    // Check collectible pickup
    if (S.useVisitor) {
      this.collectibles = this.collectibles.filter(collectible => {
        const distance = Math.hypot(S.visitor.x - collectible.x, S.visitor.y - collectible.y);
        if (distance < 20) {
          this.collectItem(collectible);
          return false; // Remove from array
        }
        return true;
      });
    }
  },
  
  updateNPC(npc, dt) {
    // Animation frame timer
    if (npc.moving) {
      npc.frameTimer += dt;
      if (npc.frameTimer > 0.3) {
        npc.frame = npc.frame ? 0 : 1;
        npc.frameTimer = 0;
      }
    } else {
      npc.frame = 0;
    }
    
    // Behavior timer
    npc.behaviorTimer += dt;
    
    // Special behavior updates
    switch (npc.id) {
      case 'nova':
        this.updateNova(npc, dt);
        break;
      case 'drift':
        this.updateDrift(npc, dt);
        break;
      case 'sol':
        this.updateSol(npc, dt);
        break;
      case 'glitch':
        this.updateGlitch(npc, dt);
        break;
      case 'void':
        this.updateVoid(npc, dt);
        break;
      case 'byte':
        this.updateByte(npc, dt);
        break;
    }
    
    // Movement logic
    if (npc.moving) {
      const dx = npc.targetX - npc.x;
      const dy = npc.targetY - npc.y;
      const distance = Math.hypot(dx, dy);
      
      if (distance < 5) {
        npc.x = npc.targetX;
        npc.y = npc.targetY;
        npc.moving = false;
        npc.behaviorState = 'idle';
      } else {
        const speed = 60;
        npc.x += (dx / distance) * speed * dt;
        npc.y += (dy / distance) * speed * dt;
        
        // Update direction based on movement
        if (Math.abs(dx) > Math.abs(dy)) {
          npc.dir = dx > 0 ? 2 : 1;
        } else {
          npc.dir = dy > 0 ? 0 : 3;
        }
      }
    }
  },
  
  updateNova(npc, dt) {
    // Nova wanders around F5 between workbenches
    if (npc.behaviorState === 'idle' && npc.behaviorTimer > 3 + Math.random() * 4) {
      const spots = [
        {x: 200, y: 300}, {x: 500, y: 200}, {x: 600, y: 400}, {x: 300, y: 350}
      ];
      const target = spots[Math.floor(Math.random() * spots.length)];
      npc.targetX = target.x;
      npc.targetY = target.y;
      npc.moving = true;
      npc.behaviorTimer = 0;
      npc.behaviorState = 'wandering';
    }
    
    // Occasionally create spark particles
    if (Math.random() < 0.02) {
      for (let i = 0; i < 3; i++) {
        S.particles.push({
          x: npc.x + (Math.random() - 0.5) * 20,
          y: npc.y - 10,
          vx: (Math.random() - 0.5) * 3,
          vy: -Math.random() * 3,
          life: 15,
          color: '#ffaa00',
          size: 2
        });
      }
    }
  },
  
  updateDrift(npc, dt) {
    // Drift sits near record player, occasionally sways to music
    if (npc.behaviorState === 'idle' && npc.behaviorTimer > 8 + Math.random() * 6) {
      const spots = [
        {x: 400, y: 200}, {x: 600, y: 450}, {x: 500, y: 400}
      ];
      const target = spots[Math.floor(Math.random() * spots.length)];
      npc.targetX = target.x;
      npc.targetY = target.y;
      npc.moving = true;
      npc.behaviorTimer = 0;
      npc.behaviorState = 'moving';
    }
    
    // Gentle purple aura particles

        y: npc.y - 20,
        vx: 0,
        vy: -0.5,
        life: 60,
        color: 'rgba(155, 89, 182, 0.6)',

      });
