<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#f0e8d8;font-family:'Courier New',monospace;overflow:hidden;height:100vh;width:100vw;user-select:none;display:flex;align-items:center;justify-content:center}
#loader{position:fixed;inset:0;z-index:20000;background:#0a0a14;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .8s;font-family:'Courier New',monospace}
#loader.done{opacity:0;pointer-events:none}
#loader h1{font-size:28px;color:#fff;letter-spacing:6px;text-shadow:0 0 30px #9b59b6}
#load-bar-wrap{width:280px;height:6px;background:#1a1a2a;border:1px solid #333;margin-top:16px;border-radius:3px;overflow:hidden}
#load-bar{width:0%;height:100%;background:linear-gradient(90deg,#9b59b6,#ff6ec7,#00fff7);transition:width .3s}
#load-tip{color:#666;font-size:11px;margin-top:12px}
#boot-log{width:280px;margin-top:14px;text-align:left;font-size:10px;line-height:1.8;color:#4a4a6a;max-height:140px;overflow:hidden}
#boot-log .boot-line{opacity:0;animation:bootLineIn .3s forwards}
#boot-log .boot-line.ok{color:#44cc44}
#boot-log .boot-line.warn{color:#ffaa00}
#boot-log .boot-line.highlight{color:#00fff7;font-weight:bold}
@keyframes bootLineIn{to{opacity:1}}
#game-wrap{position:relative;display:flex;gap:0}
canvas{display:block;image-rendering:pixelated;background:#1a1418}
#hud{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:8px;align-items:center;background:rgba(10,10,20,.75);border:2px solid rgba(100,100,140,.4);border-radius:14px;padding:6px 14px;backdrop-filter:blur(6px)}
.hud-btn{width:40px;height:40px;background:rgba(20,20,40,.85);border:2px solid #555;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;transition:all .2s}
.hud-btn:hover{border-color:#00fff7;box-shadow:0 0 12px rgba(0,255,247,.35)}
.hud-btn.active{border-color:#ff6ec7;background:rgba(255,110,199,.15);box-shadow:0 0 10px rgba(255,110,199,.3)}
#more-menu{display:none;position:absolute;bottom:54px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.9);border:2px solid rgba(100,100,140,.5);border-radius:12px;padding:8px 12px;gap:8px;backdrop-filter:blur(6px);z-index:51}
#coin-hud{position:absolute;top:8px;left:8px;z-index:50;display:flex;align-items:center;gap:5px;background:rgba(10,10,20,.85);border:2px solid #554400;border-radius:8px;padding:5px 12px;font-size:15px;color:#ffd700;font-weight:bold;cursor:pointer;transition:border-color .2s}
#coin-hud:hover{border-color:#ffd700}
#floor-hud{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(10,10,20,.85);border:2px solid #9b59b6;border-radius:8px;padding:5px 14px;font-size:13px;color:#c080ff;font-weight:bold}
#discovery-hud{position:absolute;top:8px;right:8px;z-index:50;background:rgba(10,10,20,.85);border:2px solid #00fff7;border-radius:8px;padding:5px 14px;font-size:11px;color:#00fff7;font-weight:bold}
#interact-prompt{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(10,10,20,.9);border:2px solid #ffd080;border-radius:8px;padding:6px 14px;font-size:12px;color:#ffd080;display:none;white-space:nowrap;pointer-events:none}
#volume-ctrl{position:absolute;top:44px;left:8px;z-index:50;display:flex;align-items:center;gap:4px}
#volume-ctrl span{font-size:11px}
#vol-slider{width:60px;height:4px;-webkit-appearance:none;background:#333;outline:none;border-radius:2px}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:#00fff7;border-radius:50%;cursor:pointer}
#caffeine-hud{display:none}
#mood-hud{display:none}
#speech-bubble{position:absolute;z-index:200;background:rgba(255,255,255,.95);border:2px solid #9b59b6;border-radius:12px;padding:10px 14px;font-size:11px;color:#222;max-width:260px;display:none;pointer-events:none;line-height:1.4}
#speech-bubble::after{content:'';position:absolute;bottom:-8px;left:20px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #9b59b6}
.obj-highlight{position:absolute;z-index:60;border:2px solid #ffd080;border-radius:4px;pointer-events:none;animation:objPulse 1s ease-in-out infinite alternate;font-size:9px;color:#ffd080;text-align:center;padding-top:2px;background:rgba(255,208,128,.08)}
@keyframes objPulse{from{opacity:.4;transform:scale(.98)}to{opacity:1;transform:scale(1.02)}}
#chat-panel{width:280px;height:100%;background:linear-gradient(180deg,rgba(10,10,30,.97),rgba(15,12,25,.97));border-left:1px solid rgba(155,89,182,.3);display:flex;flex-direction:column;font-size:12px;flex-shrink:0;backdrop-filter:blur(10px)}
#chat-title{padding:10px 14px;background:linear-gradient(90deg,rgba(155,89,182,.2),rgba(0,255,247,.1));font-size:13px;color:#00fff7;cursor:pointer;letter-spacing:1px;border-bottom:1px solid rgba(155,89,182,.2);display:flex;align-items:center;justify-content:space-between}
#chat-log{flex:1;overflow-y:auto;padding:10px 12px;line-height:1.6;scroll-behavior:smooth}
#chat-log::-webkit-scrollbar{width:3px}
#chat-log::-webkit-scrollbar-thumb{background:rgba(155,89,182,.4);border-radius:3px}
#chat-log::-webkit-scrollbar-track{background:transparent}
.chat-msg{margin-bottom:8px;display:flex;flex-direction:column;animation:msgSlideIn .3s ease-out}
.chat-msg .name{font-size:10px;font-weight:600;margin-bottom:2px;opacity:.8}
.chat-msg .msg-text{background:rgba(30,30,60,.6);border:1px solid rgba(100,100,150,.2);border-radius:12px;border-top-left-radius:4px;padding:8px 12px;font-size:11px;line-height:1.5;color:#e0dce8;max-width:95%;word-wrap:break-word}
.chat-msg.from-echo .msg-text{background:rgba(155,89,182,.12);border-color:rgba(155,89,182,.25);border-top-left-radius:12px;border-top-right-radius:4px}
.chat-msg.from-you .msg-text{background:rgba(255,110,199,.1);border-color:rgba(255,110,199,.2);margin-left:auto;border-top-right-radius:4px;border-top-left-radius:12px}
.chat-msg.from-you .name{text-align:right}
.chat-msg.from-system .msg-text{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.15);text-align:center;font-size:10px;color:#ffd080;margin:0 auto}
@keyframes msgSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.typing-indicator{display:flex;align-items:center;gap:3px;padding:8px 12px;margin-bottom:8px}
.typing-indicator span{width:6px;height:6px;background:rgba(155,89,182,.5);border-radius:50%;animation:typingBounce .6s ease-in-out infinite}
.typing-indicator span:nth-child(2){animation-delay:.15s}
.typing-indicator span:nth-child(3){animation-delay:.3s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
#chat-input-wrap{display:flex;align-items:center;padding:8px 10px;gap:6px;border-top:1px solid rgba(155,89,182,.15);background:rgba(10,10,25,.5)}
#chat-input{flex:1;background:rgba(40,35,60,.5);border:1px solid rgba(100,100,150,.25);border-radius:20px;color:#e0dce8;padding:8px 14px;font-family:inherit;font-size:11px;outline:none;transition:border-color .2s}
#chat-input:focus{border-color:rgba(155,89,182,.5);background:rgba(50,45,70,.5)}
#chat-input::placeholder{color:rgba(200,200,220,.3)}
#chat-send{width:34px;height:34px;background:linear-gradient(135deg,#9b59b6,#8e44ad);border:none;border-radius:50%;cursor:pointer;font-size:13px;color:#fff;display:flex;align-items:center;justify-content:center;transition:transform .15s,box-shadow .2s;flex-shrink:0}
#chat-send:hover{transform:scale(1.1);box-shadow:0 0 12px rgba(155,89,182,.4)}
#chat-send:active{transform:scale(.95)}
#chat-suggestions{padding:6px 10px;display:flex;flex-wrap:wrap;gap:4px;border-top:1px solid rgba(100,100,150,.1)}
.suggest-chip{border-radius:20px;padding:5px 12px;font-size:10px;background:rgba(155,89,182,.1);border:1px solid rgba(155,89,182,.2);color:#c8a8e8;cursor:pointer;margin:0;font-family:inherit;transition:all .2s;white-space:nowrap}
.suggest-chip:hover{background:rgba(155,89,182,.25);border-color:rgba(155,89,182,.4);color:#e0c8f8;transform:translateY(-1px)}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:5000;display:flex;align-items:center;justify-content:center}
.popup{background:#1a1a2e;border:3px solid #9b59b6;border-radius:10px;padding:18px;max-width:520px;width:90%;color:#ddd;position:relative;font-size:12px;max-height:80vh;overflow-y:auto}
.popup h3{color:#00fff7;margin-bottom:8px;font-size:15px}
.popup .close-btn{position:absolute;top:6px;right:10px;cursor:pointer;font-size:18px;color:#888;z-index:1}.popup .close-btn:hover{color:#fff}
.drink-btn{display:inline-block;padding:5px 12px;margin:4px;background:#2a2a4a;border:1px solid #00fff7;color:#00fff7;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px}
.drink-btn:hover{background:#3a3a5a}
#elevator-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:7000;align-items:center;justify-content:center}
#elevator-overlay.show{display:flex}
.floor-btn{display:block;width:220px;padding:12px 18px;margin:6px auto;background:#1a1a2e;border:2px solid #555;border-radius:8px;color:#ddd;cursor:pointer;font-family:inherit;font-size:13px;text-align:left;transition:all .2s}
.floor-btn:hover,.floor-btn.kbd-selected{border-color:#00fff7;background:#2a2a4e;box-shadow:0 0 12px rgba(0,255,247,.3)}
.drink-btn.kbd-selected{border-color:#ff6ec7;background:#3a3a5a;box-shadow:0 0 10px rgba(255,110,199,.3)}
.skin-card.kbd-selected{border-color:#00fff7;box-shadow:0 0 12px rgba(0,255,247,.4)}
.floor-btn.current{border-color:#ff6ec7;background:rgba(255,110,199,.15)}
.floor-btn.locked{opacity:.4;cursor:not-allowed}
#arcade-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:6000;flex-direction:column;align-items:center;justify-content:center}
#arcade-overlay.show{display:flex}
#arcade-crt{position:relative;width:420px;max-width:95vw;aspect-ratio:4/3.5;background:#111;border-radius:24px;box-shadow:0 0 60px rgba(0,255,136,.15),0 0 120px rgba(0,0,0,.8),inset 0 0 40px rgba(0,0,0,.5);border:6px solid #222;overflow:hidden}
#arcade-crt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:10;border-radius:18px}
#arcade-crt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.4) 100%);pointer-events:none;z-index:11;border-radius:18px}
#arcade-canvas{width:100%;height:100%;display:block;image-rendering:pixelated}
#arcade-close{position:absolute;top:10px;right:16px;font-size:28px;color:#555;cursor:pointer;z-index:20;transition:color .2s}
#arcade-close:hover{color:#ff6ec7}
#arcade-glow{position:absolute;inset:-20px;border-radius:40px;pointer-events:none;z-index:-1;transition:box-shadow .3s}
.achievement{display:flex;align-items:center;gap:8px;padding:8px;margin:4px 0;background:rgba(30,30,50,.8);border-radius:6px;border:1px solid #333}
.achievement.unlocked{border-color:#f0a030;background:rgba(50,40,20,.5)}
.achievement .badge{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:22px;filter:grayscale(1);opacity:.4}
.achievement.unlocked .badge{filter:none;opacity:1}
.achievement .info{font-size:11px}.achievement .info .title{color:#00fff7;font-weight:bold}
.skin-card{display:inline-flex;flex-direction:column;align-items:center;width:100px;height:120px;margin:4px;cursor:pointer;border:2px solid #333;border-radius:10px;padding:8px;font-size:10px;color:#aaa;transition:all .25s;background:rgba(20,20,40,.5);position:relative}
.skin-card:hover,.skin-card.active{border-color:#ff6ec7;transform:translateY(-2px)}
.skin-card.active{box-shadow:0 0 16px rgba(255,110,199,.4),inset 0 0 8px rgba(255,110,199,.1);animation:worn-glow 2s ease-in-out infinite}
@keyframes worn-glow{0%,100%{box-shadow:0 0 12px rgba(255,110,199,.3)}50%{box-shadow:0 0 22px rgba(255,110,199,.6)}}
.skin-card .icon{font-size:34px;margin-bottom:6px}
.skin-card .lock{font-size:9px;color:#ffd700}
.skin-card .owned-check{position:absolute;top:4px;right:4px;width:18px;height:18px;background:#0c3;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:bold}
.loot-mystery{filter:brightness(.55) blur(1px)}.loot-mystery::after{content:'?';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:#fff;text-shadow:0 0 16px rgba(155,89,182,.8);z-index:2;filter:none}
.skin-card.rarity-mythic{background:linear-gradient(135deg,rgba(255,0,100,.1),rgba(155,0,255,.1))}.skin-card.rarity-legendary{background:linear-gradient(135deg,rgba(255,170,0,.1),rgba(255,100,0,.1))}.skin-card.rarity-epic{background:linear-gradient(135deg,rgba(155,89,182,.1),rgba(100,50,200,.1))}.skin-card.rarity-rare{background:linear-gradient(135deg,rgba(0,150,255,.08),rgba(0,80,200,.08))}
.notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9000;background:rgba(20,20,40,.95);border:2px solid #f0a030;border-radius:8px;padding:8px 18px;color:#ffd080;font-size:13px;animation:notifIn .3s ease,notifOut .3s ease 2.7s forwards;pointer-events:none}
@keyframes notifIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes notifOut{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}
.coin-float{position:fixed;font-family:monospace;font-size:14px;font-weight:bold;color:#ffd700;pointer-events:none;z-index:700;animation:coinFloat 1.5s ease forwards}
@keyframes coinFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
/* Virtual Joystick for Mobile */
#virtual-joystick{position:fixed;bottom:25px;left:25px;width:100px;height:100px;z-index:9000;touch-action:none;display:none}
#joystick-base{width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.15);border:3px solid rgba(255,255,255,.35);position:relative;box-shadow:0 0 15px rgba(255,255,255,.1)}
#joystick-knob{width:45px;height:45px;border-radius:50%;background:rgba(255,255,255,.5);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all .08s ease;box-shadow:0 0 10px rgba(255,255,255,.2)}

/* Action Buttons for Mobile */
#action-buttons{position:fixed;bottom:20px;right:20px;z-index:9000;display:none;flex-direction:column;gap:10px}
.action-btn{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.25);border:3px solid rgba(255,255,255,.5);color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-tap-highlight-color:transparent;box-shadow:0 0 10px rgba(255,255,255,.1)}
.action-btn:active{background:rgba(255,255,255,.5);transform:scale(.9);box-shadow:0 0 20px rgba(255,255,255,.3)}
.action-btn.attack-btn{background:rgba(255,50,50,.3);border-color:rgba(255,100,100,.6);box-shadow:0 0 15px rgba(255,50,50,.2)}
.action-btn.attack-btn:active{background:rgba(255,50,50,.5)}

/* Mobile Chat Drawer */
#chat-drawer-toggle{display:none;position:fixed;bottom:0;left:0;right:0;height:30px;background:rgba(10,10,20,.95);border-top:2px solid #333;color:#00fff7;z-index:100;cursor:pointer;align-items:center;justify-content:center}
#chat-drawer-toggle::before{content:'💬 Echo\'s Chat - Tap to expand'}

/* Welcome Wardrobe Popup */
#welcome-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:8000;display:flex;align-items:center;justify-content:center}
#welcome-popup{background:#1a1a2e;border:3px solid #9b59b6;border-radius:12px;padding:24px;max-width:400px;width:90%;color:#ddd;text-align:center}
#welcome-popup h2{color:#00fff7;margin-bottom:6px;font-size:20px}
#welcome-popup .subtitle{color:#c080ff;font-size:11px;margin-bottom:16px}
#welcome-popup input[type="text"]{width:80%;background:#111;border:2px solid #555;color:#fff;padding:8px 12px;font-family:inherit;font-size:14px;border-radius:6px;text-align:center;outline:none;margin:8px 0}
#welcome-popup input[type="text"]:focus{border-color:#00fff7}
.welcome-skins{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:12px 0}
.welcome-skin{width:60px;height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px solid #333;border-radius:8px;padding:4px;transition:all .2s}
.welcome-skin:hover{border-color:#c080ff}
.welcome-skin.selected{border-color:#00fff7;background:rgba(0,255,247,.1);box-shadow:0 0 12px rgba(0,255,247,.3)}
.welcome-skin .ws-icon{font-size:24px}
.welcome-skin .ws-label{font-size:8px;color:#aaa;margin-top:2px}
#welcome-go{display:inline-block;padding:10px 32px;margin-top:12px;background:linear-gradient(135deg,#9b59b6,#ff6ec7);border:none;color:#fff;cursor:pointer;font-family:inherit;font-size:14px;font-weight:bold;border-radius:8px;transition:transform .2s,box-shadow .2s}
#welcome-go:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,110,199,.4)}
/* Room Info HUD */
#room-info-hud{position:absolute;top:38px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(10,10,20,.9);border:2px solid #c080ff;border-radius:8px;padding:4px 14px;font-size:11px;color:#ddd;display:none;white-space:nowrap;max-width:90%}
/* Tip popup */
.tip-slider{width:80%;margin:8px auto;display:block;-webkit-appearance:none;background:#333;height:6px;border-radius:3px;outline:none}
.tip-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#ffd700;border-radius:50%;cursor:pointer}
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.015) 2px,rgba(0,0,0,.015) 4px)}
/* v24: Enhancement System */
.enhance-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:6500;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'Courier New',monospace}
.enhance-stage{width:320px;padding:24px;background:#1a1a2e;border:3px solid #00fff7;border-radius:12px;text-align:center;position:relative;overflow:hidden}
.enhance-item-display{font-size:42px;margin:10px 0}
.enhance-item-name{font-size:16px;color:#fff;font-weight:bold;margin:4px 0}
.enhance-level{font-size:28px;color:#ffd700;font-weight:bold;margin:8px 0}
.enhance-bar{width:100%;height:8px;background:#333;border-radius:4px;overflow:hidden;margin:10px 0}
.enhance-bar-fill{height:100%;transition:width .3s;border-radius:4px}
.enhance-cost{font-size:13px;color:#ffd700;margin:6px 0}
.enhance-chance{font-size:11px;margin:4px 0}
.enhance-btn{display:inline-block;padding:10px 28px;background:linear-gradient(135deg,#00fff7,#0088aa);border:none;color:#000;font-weight:bold;font-family:inherit;font-size:14px;border-radius:8px;cursor:pointer;transition:transform .15s,box-shadow .2s;margin:8px 4px}
.enhance-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(0,255,247,.4)}
.enhance-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.enhance-btn.danger{background:linear-gradient(135deg,#ff3344,#aa0011)}
.enhance-btn.cancel{background:#333;color:#aaa}
.enhance-anim{position:absolute;inset:0;pointer-events:none;z-index:2}

  <div style="position:relative;flex-shrink:0">

    <div id="floor-hud">F1 · Echo's Quarters</div>

    <div id="caffeine-hud"></div>

    <div id="room-info-hud"></div>

    <!-- RPG Inventory Panel -->

    <!-- Action Buttons for Mobile -->

      <div class="action-btn" id="btn-saber-switch" style="display:none">🔄</div>
      <div class="action-btn attack-btn" id="btn-saber-swing" style="display:none">⚔️</div>
      <div class="action-btn" id="btn-interact">⚡</div>

  <!-- Mobile Chat Drawer Toggle -->
  <div id="chat-drawer-toggle"></div>
  
  <div id="chat-panel">
    <div id="chat-title"><span>💬 Echo's Chat</span><span id="chat-status" style="width:8px;height:8px;border-radius:50%;background:#44cc44;box-shadow:0 0 6px #44cc44;flex-shrink:0"></span></div>
    <div id="chat-log"></div>
    <div id="chat-input-wrap"><input id="chat-input" placeholder="Say something..." maxlength="200"><button id="chat-send">↑</button></div>
    <div id="chat-suggestions"></div>
  </div>
</div>

<div id="arcade-overlay"><div id="arcade-close">✕</div><div id="arcade-glow"></div><div id="arcade-crt"><div id="arcade-screen"><canvas id="arcade-canvas" width="420" height="380"></canvas></div></div></div>

<script>
(()=>{
'use strict';
/* ═══════════════════════════════════════════════════════════════
   ECHO'S STATION v13 — THE DREAM BUILD
   A 5-floor space station with Echo, Pixel, and infinite vibes
   ═══════════════════════════════════════════════════════════════ */

const $=s=>document.querySelector(s);
const LS={get:(k,d)=>{try{const v=localStorage.getItem('echo13_'+k);return v?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem('echo13_'+k,JSON.stringify(v))}catch{}}};

// ═══════════════════════════════════════
// §1. CANVAS & CONSTANTS
// ═══════════════════════════════════════
const canvas=$('#game'),ctx=canvas.getContext('2d');
const W=800,H=600;
const COL={floorBase:'#6a5548',floorLight:'#7a6558',floorDark:'#5a4538',purple:'#9b59b6',pink:'#ff6ec7',cyan:'#00fff7',amber:'#f0a030',warm:'#ffd080'};

// ═══════════════════════════════════════
// §2. GAME STATE (S)
// ═══════════════════════════════════════
const S={
  floor:LS.get('floor',1),
  echo:{x:400,y:450,dir:0,frame:0,frameTimer:0,moving:false,skin:LS.get('echoSkin','classic'),sitting:false,interacting:false,transforming:false,transformTimer:0,transformSkin:null,floor:1},
  pixel:{x:430,y:460,dir:0,frame:0,frameTimer:0,state:'idle',stateTimer:0,targetX:430,targetY:460,floor:1},
  visitor:{x:350,y:480,dir:0,frame:0,frameTimer:0,moving:false,skin:LS.get('visitorSkin','hooded')},
  keys:{},useVisitor:false,
  nearObject:null,hoverObject:null,hoverEcho:false,hoverPixel:false,
  musicPlaying:false,audioCtx:null,masterGain:null,volume:LS.get('volume',30)/100,
  caffeine:LS.get('caffeine',0),petCount:LS.get('petCount',0),fortuneCount:LS.get('fortuneCount',0),
  booksRead:LS.get('booksRead',[]),skinChanges:LS.get('skinChanges',[]),
  highScores:LS.get('highScores',{snake:0,breakout:0,invaders:0}),
  guestbook:LS.get('guestbook',[]),achievements:LS.get('achievements',[]),
  garden:null,weather:{temp:'?',desc:'clear',icon:'☀️'},
  thoughtText:'',thoughtTimer:0,idleThoughtTimer:0,
  dustMotes:[],particles:[],floatTexts:[],
  time:0,screenShake:0,screenFlash:null,
  dataFragments:LS.get('dataFragments',[]),// IDs of found fragments
  constellationsFound:LS.get('constellationsFound',[]),
  prizeItems:LS.get('prizeItems',[]),// bought prize items
  hotChocCount:LS.get('hotChocCount',0),
  auroraActive:false,auroraTimer:0,
  // Station stats & milestones
  stationStats:{totalVisitors:0,totalVisits:0,totalDuels:0,totalClashes:0,stationLevel:1,milestones:[],createdAt:Date.now()},
  kittens:[],// Station kittens for 1000+ milestone
  seasonalParticles:[],// Seasonal effects
  spacewalk:{active:false,x:W/2,y:H/2,vx:0,vy:0,oxygen:100,debris:[],earthAngle:0,flagPlanted:LS.get('spacewalkFlag',false)},
  _visited:LS.get('visited_objs',[]),_prevAchCount:0,
  otherPlayers:{},myPlayerId:null,
  
  // Sprint A+B: Hidden Depth & Puzzles
  discovery:{
    floorsVisited:LS.get('discovery_floors',[1]),// Floors the player has visited
    secretsFound:LS.get('discovery_secrets',[]),// Secret room IDs found
    puzzlesSolved:LS.get('discovery_puzzles',[]),// Puzzle IDs solved
    dataFragmentsFound:LS.get('discovery_fragments',[]),// Data fragment IDs
    hiddenRooms:LS.get('hidden_rooms',{}),// Per-room state
  },
  scanner:{
    unlocked:LS.get('scanner_unlocked',false),
    active:false,// Toggled with Tab key
  },
  secretRooms:{
    current:null,// Current secret room ID ('diary','cave','lab','core')
    fadeTimer:0,// Screen transition timer
    returning:false,// Whether we're returning to main floor
  },
  puzzles:{
    constellation:{active:false,stars:[],correctSequence:[2,7,12,18,25],currentSequence:[],completed:LS.get('puzzle_constellation',false)},
    garden:{plots:[{seed:null,grown:false},{seed:null,grown:false},{seed:null,grown:false},{seed:null,grown:false}],completed:LS.get('puzzle_garden',false)},
    crossFloor:{codeFound:LS.get('cross_code_found',false),terminalUnlocked:LS.get('cross_terminal',false)},
    elevator:{sequence:[],targetSequence:[1,9,5,3],completed:LS.get('puzzle_elevator',false)},
  },
};

// ═══════════════════════════════════════
// §2b. DUEL SYSTEM
// ═══════════════════════════════════════
const DuelSystem = {
  active: false,
  myHP: 100,
  opponentHP: 100,
  opponentId: null,
  opponentName: '',
  round: 1,
  maxRounds: 3,
  myWins: 0,
  opWins: 0,
  stunTimer: 0,
  dodgeCooldown: 0,
  blockHeld: false,
  iFrames: 0,
  comboCount: 0,
  comboTimer: 0,
  challengeTimer: 0,
  isChallenger: false,
  isPendingChallenge: false,
  roundTimer: 60,
  inArena: false,
  
  reset() {
    this.active = false;
    this.myHP = 100;
    this.opponentHP = 100;
    this.opponentId = null;
    this.opponentName = '';
    this.round = 1;
    this.myWins = 0;
    this.opWins = 0;
    this.stunTimer = 0;
    this.dodgeCooldown = 0;
    this.blockHeld = false;
    this.iFrames = 0;
    this.comboCount = 0;
    this.comboTimer = 0;
    this.challengeTimer = 0;
    this.isChallenger = false;
    this.isPendingChallenge = false;
    this.roundTimer = 60;
    this.isPvE = false;
  },
  
  update(dt) {
    if (this.challengeTimer > 0) {
      this.challengeTimer -= dt;
      if (this.challengeTimer <= 0) {
        this.isPendingChallenge = false;
        showNotification('Duel challenge expired.');
      }
    }
    
    if (this.active) {
      this.roundTimer -= dt;
      if (this.roundTimer <= 0) {
        this.endRound('timeout');
      }
      
      if (this.stunTimer > 0) {
        this.stunTimer -= dt;
      }
      
      if (this.dodgeCooldown > 0) {
        this.dodgeCooldown -= dt;
      }
      
      if (this.iFrames > 0) {
        this.iFrames -= dt;
      }
      
      if (this.comboTimer > 0) {
        this.comboTimer -= dt;
        if (this.comboTimer <= 0) {
          this.comboCount = 0;
        }
      }
    }
    
    // Check arena proximity for auto-challenges
    if (S.floor === 3 && !this.active && !this.isPendingChallenge) {
      const arenaCenter = { x: 400, y: 300 };
      const inArena = Math.hypot(S.visitor.x - arenaCenter.x, S.visitor.y - arenaCenter.y) < 100;
      
      if (inArena !== this.inArena) {
        this.inArena = inArena;
        if (inArena && (S._visitorSaber || WeaponSystem.equipped)) {
          this.checkAutoChallenge();
        }
      }
    }
  },
  
  checkAutoChallenge() {
    // Check for other players in arena with sabers
    for (const [id, player] of Object.entries(S.otherPlayers)) {
      if (player.floor === 3 && player.saber) {
        const arenaCenter = { x: 400, y: 300 };
        const playerInArena = Math.hypot(player.x - arenaCenter.x, player.y - arenaCenter.y) < 100;
        
        if (playerInArena && Math.hypot(S.visitor.x - player.x, S.visitor.y - player.y) < 50) {
          // Show duel prompt
          showInteractPrompt(`⚔️ Press E to duel ${player.name}!`);
          return;
        }
      }
    }
  },
  
  sendChallenge(targetId, targetName) {
    if (this.active || this.isPendingChallenge) return;
    
    this.isPendingChallenge = true;
    this.challengeTimer = 5; // 5 second timeout
    this.opponentId = targetId;
    this.opponentName = targetName;
    this.isChallenger = true;
    
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'duel.request',
        targetId: targetId
      }));
    }
    
    showNotification(`Duel challenge sent to ${targetName}!`);
  },
  
  acceptChallenge(challengerId, challengerName) {
    if (this.active) return;
    
    this.active = true;
    this.opponentId = challengerId;
    this.opponentName = challengerName;
    this.isChallenger = false;
    this.round = 1;
    this.myHP = 100;
    this.opponentHP = 100;
    this.myWins = 0;
    this.opWins = 0;
    this.roundTimer = 60;
    
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'duel.accept',
        challengerId: challengerId
      }));
    }
    
    this.startRound();
  },
  
  startRound() {
    showNotification(`DUEL START - Round ${this.round}/${this.maxRounds}`);
    this.myHP = 100;
    this.opponentHP = 100;
    this.roundTimer = 60;
    this.stunTimer = 0;
    this.iFrames = 0;
    this.comboCount = 0;
    
    // 3-2-1-FIGHT countdown with screen pulse
    let countdown = 3;
    const countdownInterval = setInterval(() => {
      if (countdown > 0) {
        showNotification(`${countdown}...`, 1000);
        S.screenShake = 2;
        S.vignetteIntensity = 0.3;
        S.floatTexts.push({text:String(countdown), x:W/2, y:H/2, color:'#ffffff', life:30});
        countdown--;
      } else {
        showNotification('FIGHT!', 1000);
        S.screenShake = 6;
        triggerSlowMo(0.5, 0.3);
        addImpactRing(W/2, H/2, '#ff4400', 120, 5);
        S.floatTexts.push({text:'FIGHT!', x:W/2, y:H/2, color:'#ff4400', life:40});
        clearInterval(countdownInterval);
      }
    }, 1000);
  },
  
  attack() {
    if (!this.active || this.stunTimer > 0) return;
    if (!S._visitorSaber && !(typeof WeaponSystem !== 'undefined' && WeaponSystem.equipped)) return;
    
    // If weapon equipped, use weapon system
    if (WeaponSystem.equipped) {
      const dmg = WeaponSystem.attack();
      if (dmg) {
        this.comboCount = WeaponSystem._comboCount;
        this.comboTimer = WeaponSystem._comboTimer;
      }
      return;
    }
    
    // Fallback: saber attack
    this.comboCount++;
    this.comboTimer = 2;
    
    let damage = 15;
    if (this.comboCount === 3) {
      damage = 30;
      showNotification('COMBO!');
    }
    
    // PvE: damage AI fighter directly
    if (this.isPvE && AIFighter.active) {
      const dist = Math.hypot(S.visitor.x - AIFighter.x, S.visitor.y - AIFighter.y);
      if (dist < 70) {
        AIFighter.takeDamage(damage);
        if (AIFighter.fighter && AIFighter.fighter.id === 'echo_clone') {
          AIFighter._playerAttackPattern.push(AIFighter._thinkTimer);
          if (AIFighter._playerAttackPattern.length > 10) AIFighter._playerAttackPattern.shift();
        }
      }
      swingSaber();
      return;
    }
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'duel.attack',
        damage: damage,
        combo: this.comboCount === 3
      }));
    }
    
    swingSaber();
  },
  
  block(holding) {
    if (!this.active || this.stunTimer > 0) return;
    
    this.blockHeld = holding;
    
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'duel.block',
        holding: holding
      }));
    }
  },
  
  dodge(direction) {
    if (!this.active || this.stunTimer > 0 || this.dodgeCooldown > 0 || this.iFrames > 0) return;
    
    this.dodgeCooldown = 1.5; // 1.5 second cooldown
    this.iFrames = 0.3; // 0.3 second invincibility
    
    // Move player 80px in direction
    const moveDistance = 80;
    switch (direction) {
      case 'up': S.visitor.y = Math.max(60, S.visitor.y - moveDistance); break;
      case 'down': S.visitor.y = Math.min(H - 20, S.visitor.y + moveDistance); break;
      case 'left': S.visitor.x = Math.max(20, S.visitor.x - moveDistance); break;
      case 'right': S.visitor.x = Math.min(W - 20, S.visitor.x + moveDistance); break;
    }
    
    // Afterimage trail effect — 3 ghost copies
    for (let i = 0; i < 3; i++) {
      const fade = 1 - (i * 0.25);
      const ox = direction === 'left' ? 25 * (i+1) : direction === 'right' ? -25 * (i+1) : 0;
      const oy = direction === 'up' ? 25 * (i+1) : direction === 'down' ? -25 * (i+1) : 0;
      S.particles.push({
        x: S.visitor.x + ox, y: S.visitor.y + oy,
        vx: 0, vy: 0, life: 18 - (i * 4),
        color: `rgba(0,255,255,${fade})`, size: 10
      });
      // Extra shimmer
      S.particles.push({x:S.visitor.x+ox+(Math.random()-.5)*10, y:S.visitor.y+oy-10, vx:(Math.random()-.5)*2, vy:-1, life:12, color:'#88ffff', size:2});
    }
    S.floatTexts.push({text:'DODGE!', x:S.visitor.x-15, y:S.visitor.y-50, color:'#00fff7', life:25});
    showNotification('DODGE!');
  },
  
  takeDamage(damage, type) {
    if (!this.active || this.iFrames > 0) return;
    
    this.myHP = Math.max(0, this.myHP - damage);
    
    // Visual effects - scaled by damage
    S.screenFlash = '#ff0000';
    S.screenShake = Math.min(12, 3 + damage / 5);
    
    // Heavy hit cinematic (>30 damage)
    if (damage > 30) {
      triggerSlowMo(0.3, 0.2);
      S.chromaticAberration = 2;
      S.vignetteIntensity = 0.5;
      addImpactRing(S.visitor.x, S.visitor.y - 15, '#ff4444', 70, 4);
    } else if (damage > 20) {
      triggerSlowMo(0.6, 0.15);
    }
    
    // Damage number
    S.floatTexts.push({
      text: `-${damage}`,
      x: S.visitor.x,
      y: S.visitor.y - 40,
      color: damage > 30 ? '#ff0000' : '#ff4444',
      life: 60
    });
    
    // Knockback
    const knockback = 20;
    // Simple knockback away from opponent
    if (S.otherPlayers[this.opponentId]) {
      const op = S.otherPlayers[this.opponentId];
      const dx = S.visitor.x - op.x;
      const dy = S.visitor.y - op.y;
      const dist = Math.hypot(dx, dy) || 1;
      S.visitor.x += (dx / dist) * knockback;
      S.visitor.y += (dy / dist) * knockback;
    }
    
    if (this.myHP <= 0) {
      this.endRound('defeat');
    }
  },
  
  endRound(reason) {
    if (reason === 'victory' || (reason === 'timeout' && this.myHP > this.opponentHP)) {
      this.myWins++;
      showNotification('ROUND WON!');
      
      // Cinematic round win
      triggerSlowMo(0.2, 1.0);
      S.screenFlash = '#ffd700';
      S.vignetteIntensity = 0.5;
      addImpactRing(S.visitor.x, S.visitor.y - 15, '#ffd700', 100, 3);
      
      // Victory confetti burst
      for (let i = 0; i < 30; i++) {
        S.particles.push({
          x: S.visitor.x + (Math.random() - 0.5) * 40,
          y: S.visitor.y - 20,
          vx: (Math.random() - 0.5) * 4,
          vy: -Math.random() * 6 - 2,
          life: 60,
          color: ['#ffd700', '#ff6ec7', '#00fff7'][Math.floor(Math.random() * 3)],
          size: 3
        });
      }
    } else {
      this.opWins++;
      showNotification('ROUND LOST!');
    }
    
    if (this.myWins >= Math.ceil(this.maxRounds / 2)) {
      this.endDuel('victory');
    } else if (this.opWins >= Math.ceil(this.maxRounds / 2)) {
      this.endDuel('defeat');
    } else {
      this.round++;
      setTimeout(() => this.startRound(), 3000);
    }
  },
  
  endDuel(result) {
    this.active = false;
    const stats = LS.get('duelStats', {duelsWon:0, duelsLost:0, totalDamage:0, winStreak:0});
    const comboScore = this.comboCount;
    const perfectWin = result === 'victory' && this.myHP >= 100;
    
    if (result === 'victory') {
      // PvE rewards
      if (this.isPvE && AIFighter.fighter) {
        const aiF = AIFighter.fighter;
        const aiWins = LS.get('aiWins', {});
        aiWins[aiF.id] = (aiWins[aiF.id] || 0) + 1;
        LS.set('aiWins', aiWins);
        Coins.earn(aiF.reward, 'pve_win');
        addChatMsg('Echo', `${aiF.icon} ${aiF.name} defeated! +${aiF.reward}◈`, '#44cc44');
        // v24: Track PvE wins for missions
        if (typeof MissionBoard !== 'undefined') MissionBoard.trackProgress('pve_wins', 1);
        // v24: Specialist card drop chance from PvE
        if (typeof SpecialistSystem !== 'undefined') SpecialistSystem.tryDrop();
      }
      stats.duelsWon++;
      stats.winStreak = (stats.winStreak || 0) + 1;
      if (typeof MissionBoard !== 'undefined') MissionBoard.trackProgress('duels_won', 1);
      const coinReward = 25 + Math.min(comboScore * 2, 20);
      showNotification('VICTORY! +' + coinReward + '\u25C8');
      Coins.earn(coinReward, 'duel_win');
      
      // Loot: combo score & perfect win affect rarity
      setTimeout(() => {
        if (perfectWin) {
          // Perfect win: epic+ guaranteed
          const item = LootSystem.rollMinRarity('epic');
          LootSystem.addToInventory(item);
          LootSystem.showLootCard(item);
          showNotification('\u{1F396}\uFE0F PERFECT WIN! Epic+ loot!');
        } else if (stats.winStreak >= 10 && Math.random() < 0.25) {
          // 10-win streak: 25% legendary
          const item = LootSystem.rollMinRarity('legendary');
          LootSystem.addToInventory(item);
          LootSystem.showLootCard(item);
          showNotification('\u{1F525} 10-WIN STREAK! Legendary chance!');
        } else {
          // Normal: combo affects rarity odds
          const bonusLuck = (LootSystem.getStatBonuses().luck || 0) + Math.min(comboScore * 2, 20);
          LootSystem.drop('duel_win', bonusLuck);
        }
        // Chance to drop a weapon on duel win
        if (Math.random() < 0.08 + (perfectWin ? 0.12 : 0) + (stats.winStreak >= 5 ? 0.05 : 0)) {
          const droppable = WEAPONS.filter(w => {
            if (w.skinLock && S.visitor.skin !== w.skinLock) return false;
            if (!w.lootOnly && w.cost > 0) return false; // only drop loot-only or purchasable
            return true;
          });
          if (droppable.length > 0) {
            const pick = droppable[Math.floor(Math.random() * droppable.length)];
            WeaponSystem.awardWeapon(pick.id);
          }
        }
      }, 2000);
      
      // Full cinematic victory
      triggerSlowMo(0.15, 1.5);
      S.screenFlash = '#ffffff';
      S.chromaticAberration = 4;
      S.vignetteIntensity = 0.7;
      S.cameraZoom = 1.08; S._cameraZoomTimer = 1.5;
      if(perfectWin){S.freezeFrame=0.3;S.floatTexts.push({text:'⭐ PERFECT WIN ⭐', x:W/2, y:H/2-40, color:'#ffffff', life:150})}
      S.floatTexts.push({text:'VICTORY!', x:W/2, y:H/2, color:'#ffd700', life:150});
      addImpactRing(W/2, H/2, '#ffd700', 150, 2);
      addImpactRing(W/2, H/2, '#ffffff', 120, 3);
      for (let i = 0; i < 80; i++) {
        S.particles.push({x:W/2+(Math.random()-.5)*200, y:H/2+(Math.random()-.5)*100, vx:(Math.random()-.5)*6, vy:(Math.random()-.5)*6-2, life:120, color:['#ffd700','#ff6ec7','#00fff7','#ffffff'][Math.floor(Math.random()*4)], size:3+Math.random()*3});
      }
    } else {
      stats.duelsLost++;
      stats.winStreak = 0;
      showNotification('DEFEATED! +5\u25C8');
      Coins.earn(5, 'duel_loss');
      S.floatTexts.push({text:'DEFEATED', x:W/2-40, y:H/2, color:'#ff4444', life:120});
    }
    
    LS.set('duelStats', stats);
    
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({type:'duel.end', result:result}));
    }
    
    this.reset();
    // Clean up PvE state
    this.isPvE = false;
    AIFighter.active = false;
    AIFighter.fighter = null;
  }
};

// ═══════════════════════════════════════
// §2c. PvE AI FIGHTER SYSTEM
// ═══════════════════════════════════════
const AI_FIGHTERS = [
  {id:'trainbot',name:'Train-Bot',icon:'🤖',color:'#888888',difficulty:'easy',hp:80,dmg:8,speed:0.6,blockChance:0.1,dodgeChance:0.05,attackRate:1.8,desc:'A slow training dummy. Perfect for beginners.',reward:10},
  {id:'sparky',name:'Sparky',icon:'⚡',color:'#ffdd00',difficulty:'easy',hp:100,dmg:12,speed:0.8,blockChance:0.15,dodgeChance:0.1,attackRate:1.4,desc:'Quick but fragile. Watch for lightning jabs!',reward:15},
  {id:'iron_guard',name:'Iron Guard',icon:'🛡️',color:'#4488ff',difficulty:'medium',hp:150,dmg:15,speed:0.5,blockChance:0.35,dodgeChance:0.1,attackRate:1.6,desc:'Heavy armor, slow attacks. Break through the defense!',reward:25},
  {id:'shadow_fox',name:'Shadow Fox',icon:'🦊',color:'#ff6600',difficulty:'medium',hp:90,dmg:18,speed:1.2,blockChance:0.1,dodgeChance:0.35,attackRate:1.0,desc:'Fast and evasive. Hard to pin down.',reward:30},
  {id:'berserker',name:'Berserker',icon:'👹',color:'#cc2222',difficulty:'hard',hp:200,dmg:25,speed:0.7,blockChance:0.05,dodgeChance:0.15,attackRate:0.7,desc:'Raw power. Gets faster when low on HP!',reward:50},
  {id:'echo_clone',name:'Echo\'s Shadow',icon:'🔮',color:'#9b59b6',difficulty:'hard',hp:120,dmg:20,speed:1.0,blockChance:0.25,dodgeChance:0.25,attackRate:0.9,desc:'A mirror of Echo itself. Adapts to your style.',reward:60},
];

const AIFighter = {
  active: false,
  fighter: null,
  x: 500, y: 300,
  dir: 3,
  hp: 100,
  maxHp: 100,
  state: 'idle',
  stateTimer: 0,
  attackCooldown: 0,
  blockTimer: 0,
  iFrames: 0,
  frame: 0,
  _moveTimer: 0,
  _thinkTimer: 0,
  _enraged: false,
  _adaptTimer: 0,
  _playerAttackPattern: [],

  start(fighterId) {
    const f = AI_FIGHTERS.find(a => a.id === fighterId);
    if (!f) return;
    this.fighter = f;
    this.active = true;
    this.hp = f.hp;
    this.maxHp = f.hp;
    this.x = 550;
    this.y = 280;
    this.dir = 3;
    this.state = 'idle';
    this.stateTimer = 0;
    this.attackCooldown = 1.5;
    this.blockTimer = 0;
    this.iFrames = 0;
    this._enraged = false;
    this._adaptTimer = 0;
    this._playerAttackPattern = [];
    
    DuelSystem.active = true;
    DuelSystem.opponentId = '__ai__';
    DuelSystem.opponentName = f.name;
    DuelSystem.opponentHP = f.hp;
    DuelSystem.myHP = 100;
    DuelSystem.round = 1;
    DuelSystem.maxRounds = 1;
    DuelSystem.myWins = 0;
    DuelSystem.opWins = 0;
    DuelSystem.roundTimer = 90;
    DuelSystem.isPvE = true;
    
    showNotification(`⚔️ ${f.icon} ${f.name} appears!`);
    addChatMsg('Echo', `${f.icon} ${f.name}: ${f.desc}`, '#ffaa00');
    
    let cd = 3;
    const cdInterval = setInterval(() => {
      if (cd > 0) {
        S.floatTexts.push({text: String(cd), x: W/2, y: H/2-30, color: '#ffffff', life: 50});
        if(typeof triggerSlowMo==='function')triggerSlowMo(0.7,0.3);
        S.screenShake = 2;
        cd--;
      } else {
        S.floatTexts.push({text: 'FIGHT!', x: W/2, y: H/2-30, color: '#ff4444', life: 60});
        if(typeof addImpactRing==='function')addImpactRing(W/2, H/2, '#ff4444', 80, 4);
        if(typeof triggerSlowMo==='function')triggerSlowMo(0.5,0.3);
        S.screenShake = 5;
        clearInterval(cdInterval);
      }
    }, 1000);
  },

  update(dt) {
    if (!this.active) return;
    const f = this.fighter;
    
    this._moveTimer += dt;
    if (this._moveTimer > 0.3) { this._moveTimer = 0; this.frame = this.frame ? 0 : 1; }
    
    if (this.attackCooldown > 0) this.attackCooldown -= dt;
    if (this.blockTimer > 0) this.blockTimer -= dt;
    if (this.iFrames > 0) this.iFrames -= dt;
    if (this.stateTimer > 0) this.stateTimer -= dt;
    
    if (f.id === 'berserker' && !this._enraged && this.hp < this.maxHp * 0.3) {
      this._enraged = true;
      showNotification('👹 BERSERKER ENRAGED!');
      S.screenFlash = '#ff0000';
      S.screenShake = 8;
      addChatMsg('Echo', '👹 The Berserker enters a frenzy! Watch out!', '#ff4444');
    }
    
    const speedMult = this._enraged ? 1.6 : 1.0;
    const atkMult = this._enraged ? 0.5 : 1.0;
    
    this._thinkTimer -= dt;
    if (this._thinkTimer <= 0 && this.state !== 'stunned' && this.state !== 'defeated') {
      this._thinkTimer = 0.3 + Math.random() * 0.3;
      
      const distToPlayer = Math.hypot(this.x - S.visitor.x, this.y - S.visitor.y);
      const attackRange = 60;
      
      if (distToPlayer > attackRange + 30) {
        this.state = 'approach';
      } else if (distToPlayer <= attackRange) {
        const roll = Math.random();
        
        let effectiveBlockChance = f.blockChance;
        let effectiveDodgeChance = f.dodgeChance;
        if (f.id === 'echo_clone' && this._playerAttackPattern.length > 3) {
          const avgInterval = this._playerAttackPattern.reduce((a,b) => a+b, 0) / this._playerAttackPattern.length;
          if (avgInterval < 0.8) { effectiveBlockChance += 0.2; }
        }
        
        if (this.attackCooldown <= 0 && roll < 0.5) {
          this.state = 'attack';
          this.stateTimer = 0.4;
          this.attackCooldown = f.attackRate * atkMult;
        } else if (roll < 0.5 + effectiveBlockChance) {
          this.state = 'block';
          this.stateTimer = 0.5 + Math.random() * 0.5;
          this.blockTimer = this.stateTimer;
        } else if (roll < 0.5 + effectiveBlockChance + effectiveDodgeChance) {
          this.state = 'dodge';
          this.stateTimer = 0.3;
          const angle = Math.atan2(S.visitor.y - this.y, S.visitor.x - this.x) + (Math.random() > 0.5 ? Math.PI/2 : -Math.PI/2);
          this.x += Math.cos(angle) * 50;
          this.y += Math.sin(angle) * 50;
          this.x = Math.max(320, Math.min(580, this.x));
          this.y = Math.max(180, Math.min(400, this.y));
          for (let i = 0; i < 3; i++) {
            S.particles.push({x: this.x + (Math.random()-.5)*20, y: this.y - 15, vx: 0, vy: 0, life: 15, color: f.color, size: 6 - i*2});
          }
          S.floatTexts.push({text: 'DODGE!', x: this.x, y: this.y - 40, color: '#00fff7', life: 30});
        } else {
          this.state = 'idle';
          this.stateTimer = 0.3;
        }
      }
    }
    
    if (this.state === 'approach') {
      const dx = S.visitor.x - this.x;
      const dy = S.visitor.y - this.y;
      const dist = Math.hypot(dx, dy) || 1;
      const spd = 80 * f.speed * speedMult * dt;
      this.x += (dx / dist) * spd;
      this.y += (dy / dist) * spd;
      this.dir = dx < 0 ? 3 : 2;
    }
    
    if (this.state === 'attack' && this.stateTimer <= 0.2 && this.stateTimer > 0.15) {
      const dist = Math.hypot(this.x - S.visitor.x, this.y - S.visitor.y);
      if (dist < 70) {
        if (DuelSystem.blockHeld) {
          S.floatTexts.push({text: 'BLOCKED!', x: S.visitor.x, y: S.visitor.y - 50, color: '#4488ff', life: 40});
          S.screenShake = 2;
          showNotification('Blocked!');
        } else if (DuelSystem.iFrames > 0) {
          // Player dodged
        } else {
          const dmg = f.dmg + Math.floor(Math.random() * 5);
          DuelSystem.takeDamage(dmg, 'ai');
          DuelSystem.opponentHP = this.hp;
        }
      }
      const facing = this.dir === 2 ? 1 : -1;
      for (let i = 0; i < 6; i++) {
        S.particles.push({x: this.x + facing * 20, y: this.y - 15 + (Math.random()-.5)*15, vx: facing * (2 + Math.random()*3), vy: (Math.random()-.5)*2, life: 12, color: f.color, size: 2 + Math.random()*2});
      }
      S.screenShake = Math.max(S.screenShake || 0, 3);
    }
    
    if (this.stateTimer <= 0 && (this.state === 'attack' || this.state === 'dodge' || this.state === 'block' || this.state === 'stunned')) {
      this.state = 'idle';
    }
    
    this.x = Math.max(300, Math.min(600, this.x));
    this.y = Math.max(180, Math.min(420, this.y));
  },

  takeDamage(dmg) {
    if (this.iFrames > 0) return false;
    if (this.state === 'block' && this.blockTimer > 0) {
      S.floatTexts.push({text: 'BLOCKED!', x: this.x, y: this.y - 50, color: '#4488ff', life: 40});
      S.screenShake = 2;
      dmg = Math.floor(dmg * 0.2);
    }
    
    this.hp = Math.max(0, this.hp - dmg);
    this.iFrames = 0.3;
    DuelSystem.opponentHP = this.hp;
    
    S.floatTexts.push({text: '-' + dmg, x: this.x + (Math.random()-.5)*20, y: this.y - 35, color: '#ff4444', life: 45});
    S.screenShake = Math.max(S.screenShake || 0, dmg > 20 ? 6 : 3);
    for (let i = 0; i < 5; i++) {
      S.particles.push({x: this.x, y: this.y - 15, vx: (Math.random()-.5)*4, vy: (Math.random()-.5)*4, life: 15, color: '#ff4444', size: 2});
    }
    
    if (dmg > 20) {
      this.state = 'stunned';
      this.stateTimer = 0.5;
    }
    
    if (this.hp <= 0) {
      this.state = 'defeated';
      this.active = false;
      DuelSystem.endRound('victory');
      return true;
    }
    return true;
  },

  render(ctx) {
    if (!this.active && this.state !== 'defeated') return;
    const f = this.fighter;
    if (!f) return;
    
    const flash = this.iFrames > 0 && Math.floor(S.time * 15) % 2 === 0;
    
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(this.x, this.y + 2, 14, 4, 0, 0, Math.PI * 2); ctx.fill();
    
    ctx.save();
    if (flash) { ctx.globalAlpha = 0.5; }
    
    const c = f.color;
    const w = 12, h = 24;
    const bx = this.x - w/2, by = this.y - h;
    const breathe = this.state === 'idle' ? Math.sin(S.time * 2) * 1 : 0;
    const lean = this.state === 'attack' ? (this.dir === 2 ? 4 : -4) : 0;
    
    ctx.translate(lean, breathe);
    
    if (this.state === 'block') {
      ctx.fillStyle = 'rgba(68,136,255,0.3)';
      ctx.beginPath(); ctx.arc(this.x, this.y - h/2, 18, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(this.x, this.y - h/2, 18, 0, Math.PI * 2); ctx.stroke();
    }
    
    ctx.fillStyle = flash ? '#ffffff' : c;
    ctx.fillRect(bx + 2, by, w - 4, 8);
    if (!flash) {
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(bx + 3, by + 3, 2, 2);
      ctx.fillRect(bx + w - 5, by + 3, 2, 2);
    }
    ctx.fillStyle = flash ? '#ffffff' : c;
    ctx.fillRect(bx + 1, by + 8, w - 2, 10);
    const legOff = this.state === 'approach' ? Math.sin(S.time * 8) * 2 : 0;
    ctx.fillRect(bx + 2, by + 18 + legOff, 3, 6);
    ctx.fillRect(bx + w - 5, by + 18 - legOff, 3, 6);
    
    if (this.state === 'attack') {
      const facing = this.dir === 2 ? 1 : -1;
      ctx.fillStyle = '#ffdddd';
      ctx.fillRect(this.x + facing * 12, this.y - 18, facing * 10, 3);
      ctx.fillStyle = '#ff4444';
      ctx.fillRect(this.x + facing * 20, this.y - 20, 4, 6);
    }
    
    ctx.restore();
    
    const barW = 30, barH = 4;
    const hpPct = this.hp / this.maxHp;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(this.x - barW/2, by - 8, barW, barH);
    ctx.fillStyle = hpPct > 0.5 ? '#44cc44' : hpPct > 0.25 ? '#ffaa00' : '#ff3344';
    ctx.fillRect(this.x - barW/2, by - 8, barW * hpPct, barH);
    ctx.strokeStyle = '#666'; ctx.lineWidth = 0.5;
    ctx.strokeRect(this.x - barW/2, by - 8, barW, barH);
    
    ctx.fillStyle = f.color;
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(f.icon + ' ' + f.name, this.x, by - 12);
    ctx.textAlign = 'left';
    
    if (this._enraged) {
      const pulse = 0.3 + Math.sin(S.time * 6) * 0.2;
      const g = ctx.createRadialGradient(this.x, this.y - 12, 2, this.x, this.y - 12, 25);
      g.addColorStop(0, `rgba(255,0,0,${pulse})`);
      g.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(this.x, this.y - 12, 25, 0, Math.PI * 2); ctx.fill();
    }
  }
};

function showPvEMenu() {
  let html = '<h3>⚔️ Arena Challenge</h3>';
  html += '<p style="font-size:10px;color:#888;margin-bottom:10px">Choose your opponent. Defeat them for ◈ and loot!</p>';
  
  const duelStats = LS.get('duelStats', {duelsWon:0});
  const aiWins = LS.get('aiWins', {});
  
  ['easy','medium','hard'].forEach(diff => {
    const fighters = AI_FIGHTERS.filter(f => f.difficulty === diff);
    const diffColor = diff === 'easy' ? '#44cc44' : diff === 'medium' ? '#ffaa00' : '#ff3344';
    const diffLabel = diff.charAt(0).toUpperCase() + diff.slice(1);
    
    const totalEasyWins = AI_FIGHTERS.filter(f => f.difficulty === 'easy').reduce((sum, f) => sum + (aiWins[f.id] || 0), 0);
    const totalMediumWins = AI_FIGHTERS.filter(f => f.difficulty === 'medium').reduce((sum, f) => sum + (aiWins[f.id] || 0), 0);
    const locked = (diff === 'medium' && totalEasyWins < 2) || (diff === 'hard' && totalMediumWins < 2);
    
    html += `<div style="margin:8px 0"><div style="font-size:11px;color:${diffColor};font-weight:bold;margin-bottom:4px">${diffLabel} ${locked ? '🔒' : ''}</div>`;
    
    if (locked) {
      const need = diff === 'medium' ? `Win ${2 - totalEasyWins} more Easy fights` : `Win ${2 - totalMediumWins} more Medium fights`;
      html += `<div style="font-size:9px;color:#666;padding:4px">${need} to unlock</div>`;
    } else {
      html += '<div style="display:flex;flex-wrap:wrap;gap:4px">';
      fighters.forEach(f => {
        const wins = aiWins[f.id] || 0;
        html += `<div class="drink-btn ai-fighter-card" data-fighter="${f.id}" style="border-color:${f.color};min-width:120px;text-align:left;padding:8px">`;
        html += `<div style="font-size:14px">${f.icon}</div>`;
        html += `<div style="font-size:10px;color:${diffColor};font-weight:bold">${f.name}</div>`;
        html += `<div style="font-size:8px;color:#888">${f.desc}</div>`;
        html += `<div style="font-size:8px;margin-top:3px"><span style="color:#ff4444">HP:${f.hp}</span> <span style="color:#ffaa00">DMG:${f.dmg}</span> <span style="color:#00fff7">SPD:${f.speed}</span></div>`;
        html += `<div style="font-size:8px;color:#ffd700">Reward: ${f.reward}◈</div>`;
        if (wins > 0) html += `<div style="font-size:7px;color:#44cc44">Defeated ×${wins}</div>`;
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });
  
  html += '<div style="margin-top:10px;border-top:1px solid #333;padding-top:8px;text-align:center">';
  html += '<div style="font-size:9px;color:#666">Or wait for another player to challenge in PvP! 👥</div>';
  html += '</div>';
  
  const {p} = createPopup(html);
  
  p.querySelectorAll('.ai-fighter-card').forEach(card => {
    card.onclick = () => {
      const fid = card.dataset.fighter;
      p.closest('.popup-overlay').remove();
      // Auto-equip a basic sword if player has no weapon
      if(!WeaponSystem.equipped && !S._visitorSaber){
        const owned=LS.get('ownedWeapons',[]);
        if(owned.length>0){WeaponSystem.equip(owned[0])}
        else{
          // Give free arena training sword
          if(!owned.includes('training_sword')){owned.push('training_sword');LS.set('ownedWeapons',owned)}
          WeaponSystem.equip('training_sword');
          showNotification('🗡️ Arena lent you a Training Sword!');
        }
      }
      S.visitor.x = 350;
      S.visitor.y = 300;
      setTimeout(() => AIFighter.start(fid), 500);
    };
  });
}

const RoomSystem = {
  currentRoom: null,
  isInBuilder: false,
  builderMode: 'view', // 'view', 'place', 'select'
  selectedFurniture: null,
  placingFurniture: false,
  visitingOwner: null, // who owns the room we're visiting (null = our own)
  
  furniture: LS.get('userRoomFurniture', []),
  wallColor: LS.get('userRoomWallColor', '#2a2a4a'),
  floorColor: LS.get('userRoomFloorColor', '#6a5548'),
  roomName: LS.get('userRoomName', 'My Room'),
  
  showBuilder() {
    this.isInBuilder = true;
    this.builderMode = 'view';
    this.currentRoom = null;
    this.visitingOwner = null;
    S.floor = 8; // Special floor for room builder
    $('#floor-hud').textContent = '🏠 My Room';
    $('#room-info-hud').style.display = 'none';
    showNotification('Room Builder - Click catalog to add furniture!');
  },
  
  exitBuilder() {
    this.isInBuilder = false;
    this.currentRoom = null;
    this.visitingOwner = null;
    $('#room-info-hud').style.display = 'none';
    changeFloor(1); // Return to F1
  },
  
  placeFurniture(type, x, y) {
    const furnitureType = FURNITURE_TYPES[type];
    if (!furnitureType) return;
    
    if (!Coins.canAfford(furnitureType.cost)) {
      showNotification(`Need ${furnitureType.cost}◈!`);
      return;
    }
    
    if (furnitureType.cost > 0) {
      Coins.spend(furnitureType.cost, 'furniture');
    }
    
    const newFurniture = {
      id: Date.now().toString(),
      type: type,
      x: Math.max(50, Math.min(750, x)),
      y: Math.max(100, Math.min(550, y)),
      variant: 0
    };
    
    this.furniture.push(newFurniture);
    this.save();
    
    showNotification(`Placed ${furnitureType.name}!`);
    this.builderMode = 'view';
    this.selectedFurniture = null;
  },
  
  removeFurniture(furnitureId) {
    this.furniture = this.furniture.filter(f => f.id !== furnitureId);
    this.save();
    showNotification('Furniture removed!');
  },
  
  save() {
    LS.set('userRoomFurniture', this.furniture);
    LS.set('userRoomWallColor', this.wallColor);
    LS.set('userRoomFloorColor', this.floorColor);
    LS.set('userRoomName', this.roomName);
    
    // Save to server
    const visitorName = LS.get('visitorName', 'Visitor');
    if (visitorName !== 'Visitor' && EchoWS.ws?.readyState === 1) {
      const roomData = {
        name: this.roomName,
        owner: visitorName,
        wallColor: this.wallColor,
        floorColor: this.floorColor,
        furniture: this.furniture,
        likes: 0,
        visitors: 0,
        isPublic: true,
        createdAt: Date.now()
      };
      
      fetch(`/api/rooms/${encodeURIComponent(visitorName)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(roomData)
      }).catch(console.error);
    }
  },
  
  async loadRoom(ownerName) {
    try {
      const response = await fetch(`/api/rooms/${encodeURIComponent(ownerName)}`);
      const room = await response.json();
      
      this.currentRoom = room;
      this.visitingOwner = ownerName;
      this.isInBuilder = false;
      S.floor = 8; // Visit room as custom floor
      $('#floor-hud').textContent = `🏠 ${room.name}`;
      
      // Record visit
      const visitRes = await fetch(`/api/rooms/${encodeURIComponent(ownerName)}/visit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ visitor: LS.get('visitorName', 'Anonymous') })
      });
      const visitData = await visitRes.json().catch(()=>({}));
      if (visitData.visitors) room.visitors = visitData.visitors;
      
      // Show room info HUD
      this.updateRoomInfoHUD();
      
      showNotification(`Visiting ${room.name}!`);
    } catch (error) {
      showNotification('Failed to load room!');
      console.error(error);
    }
  },
  
  updateRoomInfoHUD() {
    const hud = $('#room-info-hud');
    if (!this.currentRoom || !this.visitingOwner) {
      hud.style.display = 'none';
      return;
    }
    const r = this.currentRoom;
    const isOwnRoom = r.owner === LS.get('visitorName', 'Visitor');
    hud.style.display = 'block';
    hud.innerHTML = `🏠 <b style="color:#00fff7">${r.name}</b> by <b style="color:#ff6ec7">${r.owner}</b> · 👁️ ${r.visitors||0} · ❤️ ${r.likes||0} · 💰 ${r.earnings||0}◈` +
      (!isOwnRoom ? ` <span id="tip-room-btn" style="cursor:pointer;margin-left:6px;padding:2px 8px;background:rgba(255,215,0,.2);border:1px solid #ffd700;border-radius:4px;color:#ffd700">💰 Tip</span> <span id="like-room-btn" style="cursor:pointer;padding:2px 8px;background:rgba(255,110,199,.15);border:1px solid #ff6ec7;border-radius:4px;color:#ff6ec7">❤️ Like</span>` : '');
    
    // Attach event handlers
    const tipBtn = hud.querySelector('#tip-room-btn');
    if (tipBtn) tipBtn.onclick = () => this.showTipPopup(r.owner);
    const likeBtn = hud.querySelector('#like-room-btn');
    if (likeBtn) likeBtn.onclick = () => this.likeRoom(r.owner);
  },
  
  showTipPopup(ownerName) {
    const myCoins = Coins.count;
    const maxTip = Math.min(50, myCoins);
    if (maxTip < 1) { showNotification('Need at least 1◈ to tip!'); return; }
    const {p} = createPopup(`
      <h3>💰 Tip ${ownerName}</h3>
      <p style="font-size:11px;color:#888;margin-bottom:8px">Send ◈ to show appreciation!</p>
      <p style="text-align:center;font-size:24px;color:#ffd700;margin:12px 0" id="tip-amount-display">5◈</p>
      <input type="range" class="tip-slider" id="tip-slider" min="1" max="${maxTip}" value="${Math.min(5,maxTip)}">
      <p style="text-align:center;font-size:10px;color:#666">Your balance: ${myCoins}◈</p>
      <div style="text-align:center;margin-top:12px">
        <button class="drink-btn" id="tip-cancel">Cancel</button>
        <button class="drink-btn" id="tip-send" style="border-color:#ffd700;color:#ffd700">Send Tip 💰</button>
      </div>
    `);
    const slider = p.querySelector('#tip-slider');
    const display = p.querySelector('#tip-amount-display');
    slider.oninput = () => { display.textContent = slider.value + '◈'; };
    p.querySelector('#tip-cancel').onclick = () => p.closest('.popup-overlay').remove();
    p.querySelector('#tip-send').onclick = async () => {
      const amount = parseInt(slider.value);
      if (!Coins.canAfford(amount)) { showNotification('Not enough ◈!'); return; }
      Coins.spend(amount, 'tip');
      try {
        await fetch(`/api/rooms/${encodeURIComponent(ownerName)}/tip`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, tipper: LS.get('visitorName', 'Anonymous') })
        });
        showNotification(`💰 Tipped ${ownerName} ${amount}◈!`);
        if (this.currentRoom) { this.currentRoom.earnings = (this.currentRoom.earnings || 0) + amount; this.updateRoomInfoHUD(); }
      } catch { showNotification('Tip failed!'); }
      p.closest('.popup-overlay').remove();
    };
  },
  
  async earnForOwner(amount, source) {
    if (!this.visitingOwner) return;
    const myName = LS.get('visitorName', 'Visitor');
    if (myName === this.visitingOwner || myName === 'Visitor') return;
    try {
      await fetch(`/api/rooms/${encodeURIComponent(this.visitingOwner)}/earn`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount, source, visitor: myName })
      });
      if (this.currentRoom) { this.currentRoom.earnings = (this.currentRoom.earnings || 0) + amount; this.updateRoomInfoHUD(); }
      S.floatTexts.push({text:`+${amount}◈ → ${this.visitingOwner}`,x:W/2,y:60,color:'#ffd700',life:50});
    } catch {}
  },
  
  async showRoomList() {
    try {
      const [roomsRes, lbRes] = await Promise.all([
        fetch('/api/rooms'),
        fetch('/api/rooms/leaderboard')
      ]);
      const rooms = await roomsRes.json();
      const leaderboard = await lbRes.json().catch(()=>[]);
      
      // Sort rooms by popularity (visitors + likes)
      rooms.sort((a,b) => ((b.visitors||0)+(b.likes||0)) - ((a.visitors||0)+(a.likes||0)));
      
      let html = '<h3>🏘️ Visit Rooms</h3><p style="font-size:10px;color:#888;margin-bottom:8px">Explore rooms created by visitors!</p>';
      
      if (rooms.length === 0) {
        html += '<p style="color:#666">No public rooms yet. Use the elevator to create yours!</p>';
      } else {
        rooms.forEach((room, i) => {
          const medal = i === 0 ? '🥇 ' : i === 1 ? '🥈 ' : i === 2 ? '🥉 ' : '';
          html += `
            <div class="drink-btn" style="width:100%;text-align:left;margin:4px 0;padding:8px 12px" data-owner="${room.owner}">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div style="font-weight:bold;color:#00fff7">${medal}${room.name}</div>
                <div style="font-size:9px;color:#ffd700">💰 ${room.earnings||0}◈</div>
              </div>
              <div style="font-size:9px;color:#888;margin-top:2px">by <b style="color:#ff6ec7">${room.owner}</b> · 👁️ ${room.visitors||0} · ❤️ ${room.likes||0}</div>
            </div>
          `;
        });
      }
      
      // Earnings leaderboard
      if (leaderboard.length > 0) {
        html += '<div style="margin-top:12px;border-top:1px solid #333;padding-top:8px"><h3 style="font-size:12px;color:#ffd700">🏆 Top Earners</h3>';
        leaderboard.slice(0,5).forEach((r,i) => {
          const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
          html += `<div style="font-size:10px;margin:2px 0;color:#ddd">${medal} <b style="color:#ff6ec7">${r.owner}</b> — <span style="color:#ffd700">${r.earnings}◈</span> (${r.visitors} visits, ${r.likes} ❤️)</div>`;
        });
        html += '</div>';
      }
      
      const { p } = createPopup(html);
      p.querySelectorAll('[data-owner]').forEach(btn => {
        btn.onclick = () => {
          const owner = btn.dataset.owner;
          this.loadRoom(owner);
          p.closest('.popup-overlay').remove();
        };
      });
    } catch (error) {
      showNotification('Failed to load room list!');
      console.error(error);
    }
  },
  
  async likeRoom(ownerName) {
    try {
      await fetch(`/api/rooms/${encodeURIComponent(ownerName)}/like`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ visitor: LS.get('visitorName', 'Anonymous') })
      });
      showNotification('❤️ Room liked!');
    } catch (error) {
      showNotification('Already liked today!');
    }
  }
};

// ═══════════════════════════════════════
// §6b. DISCOVERY SYSTEM (Sprint A+B)
// ═══════════════════════════════════════
const DiscoverySystem = {
  updateDiscovery(type, id) {
    const d = S.discovery;
    let updated = false;
    
    switch(type) {
      case 'floor':
        if (!d.floorsVisited.includes(id)) {
          d.floorsVisited.push(id);
          LS.set('discovery_floors', d.floorsVisited);
          updated = true;
        }
        break;
      case 'secret':
        if (!d.secretsFound.includes(id)) {
          d.secretsFound.push(id);
          LS.set('discovery_secrets', d.secretsFound);
          S.floatTexts.push({text:'Secret Found!', x: S.visitor.x, y: S.visitor.y-30, color:'#00fff7', life:90});
          updated = true;
        }
        break;
      case 'puzzle':
        if (!d.puzzlesSolved.includes(id)) {
          d.puzzlesSolved.push(id);
          LS.set('discovery_puzzles', d.puzzlesSolved);
          S.floatTexts.push({text:'Puzzle Solved!', x: S.visitor.x, y: S.visitor.y-30, color:'#ff6ec7', life:90});
          updated = true;
        }
        break;
      case 'fragment':
        if (!d.dataFragmentsFound.includes(id)) {
          d.dataFragmentsFound.push(id);
          LS.set('discovery_fragments', d.dataFragmentsFound);
          S.floatTexts.push({text:'Data Fragment ◇', x: S.visitor.x, y: S.visitor.y-30, color:'#ffd700', life:90});
          updated = true;
        }
        break;
    }
    
    if (updated) {
      this.updatePercentage();
      this.checkScannerUnlock();
    }
  },
  
  calculatePercentage() {
    // Total discoverable content:
    // 9 floors + 4 secrets (3 hidden rooms + Floor 0) + 4 puzzles + estimated fragments
    const maxFloors = 9;
    const maxSecrets = 4; // diary, cave, lab, core
    const maxPuzzles = 4; // constellation, garden, cross-floor, elevator
    const maxFragments = 4; // One per secret room
    
    const d = S.discovery;
    const floors = Math.min(d.floorsVisited.length, maxFloors);
    const secrets = Math.min(d.secretsFound.length, maxSecrets);
    const puzzles = Math.min(d.puzzlesSolved.length, maxPuzzles);
    const fragments = Math.min(d.dataFragmentsFound.length, maxFragments);
    
    const total = floors + secrets + puzzles + fragments;
    const maxTotal = maxFloors + maxSecrets + maxPuzzles + maxFragments;
    
    return Math.floor((total / maxTotal) * 100);
  },
  
  updatePercentage() {
    const percent = this.calculatePercentage();
    const hud = $('#discovery-hud');
    if (hud) {
      hud.textContent = `Station Mapped: ${percent}%`;
    }
  },
  
  checkScannerUnlock() {
    if (!S.scanner.unlocked && S.discovery.floorsVisited.length >= 5) {
      S.scanner.unlocked = true;
      LS.set('scanner_unlocked', true);
      showNotification('🔍 Scanner unlocked! Press TAB to toggle.');
      addChatMsg('Echo', 'The scanner module is now active. Use it to reveal hidden station elements.');
    }
  }
};

const SecretRooms = {
  secretWalls: {
    1: [{x: 650, y: 350, w: 10, h: 40, room: 'diary', hint: '#2a2a3a'}], // Behind bed area
    4: [{x: 150, y: 480, w: 30, h: 20, room: 'cave', hint: '#1a2a1a'}], // Bush/mushroom area
    5: [{x: 350, y: 100, w: 15, h: 30, room: 'lab', hint: '#3a1a2a'}], // Wall panel
  },
  
  checkSecretWallCollision() {
    if (S.secretRooms.current) return; // Already in a secret room
    
    const walls = this.secretWalls[S.floor];
    if (!walls) return;
    
    for (let wall of walls) {
      const vx = S.visitor.x;
      const vy = S.visitor.y;
      
      if (vx >= wall.x && vx <= wall.x + wall.w && 
          vy >= wall.y && vy <= wall.y + wall.h) {
        this.enterSecretRoom(wall.room);
        break;
      }
    }
  },
  
  enterSecretRoom(roomId) {
    S.secretRooms.current = roomId;
    S.secretRooms.fadeTimer = 30; // Fade duration
    S.secretRooms.returning = false;
    
    // Position visitor at room entrance
    switch(roomId) {
      case 'diary':
        S.visitor.x = 100;
        S.visitor.y = 300;
        break;
      case 'cave':
        S.visitor.x = 150;
        S.visitor.y = 450;
        break;
      case 'lab':
        S.visitor.x = 200;
        S.visitor.y = 250;
        break;
      case 'core':
        S.visitor.x = 400;
        S.visitor.y = 300;
        break;
    }
    
    DiscoverySystem.updateDiscovery('secret', roomId);
  },
  
  exitSecretRoom() {
    if (!S.secretRooms.current) return;
    
    S.secretRooms.fadeTimer = 30;
    S.secretRooms.returning = true;
    
    // Return to main floor
    setTimeout(() => {

// §6d. PIXEL HINT SYSTEM (Sprint A)
// ═══════════════════════════════════════
const PixelHints = {
  hintTimer: 0,
  currentHint: null,
  earTwitchTimer: 0,
  
  update(dt) {
    this.hintTimer -= dt;
    this.earTwitchTimer -= dt;
    
    // Occasionally give hints (every 10-20 seconds)
    if (this.hintTimer <= 0 && !this.currentHint) {
      this.hintTimer = 600 + Math.random() * 600; // 10-20 seconds
      this.checkForSecrets();
    }
    
    // Move Pixel toward hint location
    if (this.currentHint) {
      const dx = this.currentHint.x - S.pixel.x;
      const dy = this.currentHint.y - S.pixel.y;
      const dist = Math.hypot(dx, dy);
      
      if (dist > 15) {
        // Move toward hint
        S.pixel.targetX = this.currentHint.x;
        S.pixel.targetY = this.currentHint.y;
        S.pixel.state = 'walking';
      } else {
        // Arrived at hint location - sit and stare
        S.pixel.state = 'hinting';
        S.pixel.stateTimer = 300; // Hint for 5 seconds
        
        // Ear twitch animation
        if (this.earTwitchTimer <= 0) {
          this.earTwitchTimer = 60 + Math.random() * 120;
        }
        
        // Clear hint after hinting for a while
        if (S.pixel.stateTimer <= 0) {
          this.currentHint = null;
          S.pixel.state = 'idle';
        }
      }
    }
  },
  
  checkForSecrets() {
    const walls = SecretRooms.secretWalls[S.floor];
    if (!walls || walls.length === 0) return;
    
    // Pick a random secret wall to hint at
    const wall = walls[Math.floor(Math.random() * walls.length)];
    
    // Only hint if the secret hasn't been found yet
    if (!S.discovery.secretsFound.includes(wall.room)) {
      this.currentHint = {
        x: wall.x + wall.w / 2,
        y: wall.y + wall.h / 2
      };
    }
  },
  
  renderHintEffects() {
    if (S.pixel.state === 'hinting') {
      // Draw attention indicator above Pixel
      const px = S.pixel.x;
      const py = S.pixel.y - 30;
      const bounce = Math.sin(S.time * 8) * 3;
      
      ctx.fillStyle = '#ffff00';
      ctx.font = '14px monospace';
      ctx.fillText('!', px, py + bounce);
      
      // Ear twitch effect
      if (this.earTwitchTimer > 45) {
        ctx.fillStyle = '#ff6ec7';
        ctx.beginPath();
        ctx.arc(px + 8, py + 20, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
};

      const star = S.puzzles.constellation.stars[i];

      const isTarget = S.puzzles.constellation.correctSequence.includes(i);

      if (Math.hypot(x - star.x, y - star.y) < 15) {

function initGarden(){
  let g=LS.get('garden',null);
  if(!g){g=PLANT_TYPES.map(pt=>({type:pt.id,planted:Date.now(),lastWatered:0,stage:0,wilting:false}));LS.set('garden',g)}
  S.garden=g;
  const now=Date.now(),day=86400000;
  S.garden.forEach(p=>{const ds=Math.floor((now-p.planted)/day);const dw=p.lastWatered?Math.floor((now-p.lastWatered)/day):999;p.wilting=dw>2;if(!p.wilting)p.stage=Math.min(4,ds)});
}
function waterPlant(idx){
  if(idx<0||idx>=S.garden.length)return;const p=S.garden[idx];
  const now=Date.now(),day=86400000,today=Math.floor(now/day),lastDay=p.lastWatered?Math.floor(p.lastWatered/day):0;
  if(lastDay===today){showThought("Already watered today!");return}
  p.lastWatered=now;p.wilting=false;p.stage=Math.min(4,Math.floor((now-p.planted)/day));
  LS.set('garden',S.garden);showThought(`Watered the ${PLANT_TYPES.find(t=>t.id===p.type).name}! 💧`);
  Coins.earn(1,'water');
}
function harvestPlant(idx){
  if(idx<0||idx>=S.garden.length)return;const p=S.garden[idx];
  if(p.stage<4){showThought("Not ready yet!");return}
  const coins=5+Math.floor(Math.random()*11);
  Coins.earn(coins,'harvest');showThought(`Harvested! +${coins}◈ 🌸`);
  p.planted=Date.now();p.stage=0;p.lastWatered=0;LS.set('garden',S.garden);checkAchievements();
}

function renderSkinPreview(skinId,canvas){
  const grid=getVisitorSprite(skinId,0,0);

  const c=canvas.getContext('2d');
  const gw=grid[0].length,gh=grid.length;
  const scale=Math.min(Math.floor(canvas.width/gw),Math.floor(canvas.height/gh));
  const ox=Math.floor((canvas.width-gw*scale)/2),oy=Math.floor((canvas.height-gh*scale)/2);

  return true;
}

// FLOOR MATERIAL SYSTEM
// ═══════════════════════════════════════
function renderFloorMaterial(type){
  const seed=(x,y)=>((x*2654435761)^(y*2246822519))>>>0;
  if(type==='metal'){
    // Riveted metal panels 32x32
    for(let y=0;y<H;y+=32)for(let x=0;x<W;x+=32){
      const s=seed(x,y);const shade=s%12;
      ctx.fillStyle=`rgb(${52+shade},${48+shade},${56+shade})`;ctx.fillRect(x,y,32,32);
      // Panel gap lines
      ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(x,y,32,1);ctx.fillRect(x,y,1,32);
      // Rivet dots in corners
      ctx.fillStyle='rgba(140,130,150,.4)';
      ctx.fillRect(x+2,y+2,2,2);ctx.fillRect(x+28,y+2,2,2);ctx.fillRect(x+2,y+28,2,2);ctx.fillRect(x+28,y+28,2,2);
      // Occasional scuff marks
      if(s%7===0){ctx.fillStyle='rgba(0,0,0,.12)';ctx.fillRect(x+(s%20)+4,y+(s%14)+8,8+s%6,1)}
    }
  }else if(type==='tech'){
    // Dark panels with glowing grid
    ctx.fillStyle='#0e0e14';ctx.fillRect(0,0,W,H);
    for(let y=0;y<H;y+=40)for(let x=0;x<W;x+=40){
      const glow=.06+Math.sin(S.time*.8+x*.01+y*.01)*.03;
      ctx.strokeStyle=`rgba(0,200,255,${glow})`;ctx.lineWidth=1;ctx.strokeRect(x,y,40,40);
      // Node dots at intersections
      ctx.fillStyle=`rgba(0,200,255,${glow*2})`;ctx.fillRect(x-1,y-1,2,2);
    }
  }else if(type==='soil'){
    // Earthy organic noise
    for(let y=0;y<H;y+=8)for(let x=0;x<W;x+=8){
      const s=seed(x,y);const r=40+(s%25),g=32+(s%18),b=20+(s%10);
      ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fillRect(x,y,8,8);
      // Pebble/root details
      if(s%13===0){ctx.fillStyle='rgba(80,70,50,.5)';ctx.fillRect(x+s%5,y+s%4,3,2)}
      if(s%19===0){ctx.fillStyle='rgba(50,60,30,.4)';ctx.fillRect(x+s%6,y+s%5,1,4)}
    }
  }else if(type==='carpet'){
    // Warm fabric weave
    for(let y=0;y<H;y+=4)for(let x=0;x<W;x+=4){
      const s=seed(x,y);const shade=s%8;
      ctx.fillStyle=`rgb(${50+shade},${40+shade},${55+shade})`;ctx.fillRect(x,y,4,4);
      // Weave texture - alternating horizontal/vertical emphasis
      if((x+y)%8<4){ctx.fillStyle='rgba(70,60,80,.15)';ctx.fillRect(x,y+1,4,1)}
      else{ctx.fillStyle='rgba(70,60,80,.15)';ctx.fillRect(x+1,y,1,4)}
    }
    // Worn paths near center (where furniture typically is)
    ctx.fillStyle='rgba(60,50,65,.08)';
    ctx.fillRect(100,250,600,8);ctx.fillRect(380,150,8,350);
  }else if(type==='stone'){
    // Clean stone tiles 48x48
    for(let y=0;y<H;y+=48)for(let x=0;x<W;x+=48){
      const s=seed(x,y);const shade=s%15;
      ctx.fillStyle=`rgb(${42+shade},${42+shade},${42+shade})`;ctx.fillRect(x,y,48,48);
      // Mortar lines
      ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(x,y,48,2);ctx.fillRect(x,y,2,48);
      // Subtle per-tile variation
      if(s%5===0){ctx.fillStyle='rgba(255,255,255,.03)';ctx.fillRect(x+4,y+4,40,40)}
    }
  }else if(type==='gold'){
    // Golden marble tiles
    for(let y=0;y<H;y+=40)for(let x=0;x<W;x+=40){
      const s=seed(x,y);const shade=s%10;
      ctx.fillStyle=`rgb(${50+shade},${45+shade},${30+shade})`;ctx.fillRect(x,y,40,40);
      // Mortar
      ctx.fillStyle='rgba(180,160,80,.15)';ctx.fillRect(x,y,40,1);ctx.fillRect(x,y,1,40);
      // Vein-like lines
      ctx.strokeStyle='rgba(200,180,100,.08)';ctx.lineWidth=1;ctx.beginPath();
      ctx.moveTo(x+s%20,y);ctx.quadraticCurveTo(x+20+s%10,y+20,x+s%30+10,y+40);ctx.stroke();
      // Shimmer on some tiles
      if(s%6===0){const sh=.04+Math.sin(S.time*1.5+x*.1+y*.1)*.03;
        ctx.fillStyle=`rgba(255,215,0,${sh})`;ctx.fillRect(x+4,y+4,32,32)}
    }
  }
}

    ctx.fillStyle='rgba(0,255,247,.06)';ctx.beginPath();ctx.ellipse(x+2,y+2,scaleX,scaleY,0,0,Math.PI*2);ctx.fill();

  else if(f===6){scaleY=6;color='rgba(30,10,0,.2)';} // candles: warm, longer
  ctx.fillStyle=color;ctx.beginPath();ctx.ellipse(x+offX,y+2,scaleX,scaleY,0,0,Math.PI*2);ctx.fill();
}

// PIXEL IDLE MICRO-ANIMATIONS
// ═══════════════════════════════════════
const PixelIdle={
  timer:0,earTwitch:0,tailFlick:0,headTilt:0,stretch:0,
  lastX:0,lastY:0,
  update(dt){
    const p=S.pixel;
    if(p.x!==this.lastX||p.y!==this.lastY){this.timer=0;this.lastX=p.x;this.lastY=p.y;return}
    this.timer+=dt;
    // Decay animation counters
    if(this.earTwitch>0)this.earTwitch-=dt*10;
    if(this.tailFlick>0)this.tailFlick-=dt*8;
    if(this.headTilt>0)this.headTilt-=dt*6;
    if(this.stretch>0)this.stretch-=dt*4;
    // Trigger animations at intervals
    if(this.timer>3&&this.timer<3.15)this.earTwitch=1;
    if(this.timer>8&&this.timer<8.15)this.tailFlick=1;
    if(this.timer>15&&this.timer<15.15)this.headTilt=1;
    if(this.timer>30&&this.timer<30.15)this.stretch=1;
    // Reset cycle
    if(this.timer>33)this.timer=0;
  },
  getOffsets(){
    return{
      earDy:this.earTwitch>0?-Math.round(this.earTwitch):0,
      tailDy:this.tailFlick>0?-Math.round(this.tailFlick*2):0,
      headDx:this.headTilt>0?Math.round(this.headTilt):0,
      stretchDy:this.stretch>0?-Math.round(this.stretch*2):0
    };
  }
};

// ECHO 4TH WALL BREAK
// ═══════════════════════════════════════
const Echo4thWall={
  timer:0,active:false,bubble:'',bubbleTimer:0,
  emojis:['👀','🤔','😏','✨','🐱'],
  update(dt){
    if(!S.useVisitor)return;
    if(S.echo.floor!==S.floor||S.visitor.floor!==S.floor)return;
    if(this.active){
      this.bubbleTimer-=dt;
      if(this.bubbleTimer<=0){this.active=false;this.timer=0}
      return;
    }
    this.timer+=dt;
    if(this.timer>=55+Math.random()*10){
      this.active=true;
      this.bubble=this.emojis[Math.random()*this.emojis.length|0];
      this.bubbleTimer=2;
      // Face the visitor
      const dx=S.visitor.x-S.echo.x;
      if(Math.abs(dx)>5)S.echo.dir=dx<0?1:2;
      else S.echo.dir=0;
    }
  },
  render(){
    if(!this.active)return;
    const e=S.echo;if(e.floor!==S.floor)return;
    const bx=e.x,by=e.y-50;
    // Thought bubble
    ctx.fillStyle='rgba(255,255,255,.9)';
    ctx.beginPath();ctx.ellipse(bx,by,12,10,0,0,Math.PI*2);ctx.fill();
    // Bubble tail dots
    ctx.beginPath();ctx.arc(bx-4,by+12,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bx-6,by+17,2,0,Math.PI*2);ctx.fill();
    // Emoji
    ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillStyle='#000';
    ctx.fillText(this.bubble,bx,by+4);ctx.textAlign='left';
  }
};

function renderElevator(){
  const e=getObjects().find(o=>o.id==='elevator');if(!e)return;
  // Elevator shaft
  ctx.fillStyle='#2a2a3a';ctx.fillRect(e.x,e.y,e.w,e.h);

function renderPixel(){

  const collarY=p.y-sprH+6*scale;
  const cg=ctx.createRadialGradient(p.x,collarY,0,p.x,collarY,scale*4);

  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(p.x,collarY,scale*4,0,Math.PI*2);ctx.fill();
