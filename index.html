function updateSpacewalk(dt){
  if(!S.spacewalk.active)return;
  
  const sw=S.spacewalk;
  // Reduced gravity physics
  const thrust=120; // pixels/sec
  let dx=0,dy=0;
  
  if(S.keys.up)dy=-1;if(S.keys.down)dy=1;if(S.keys.left)dx=-1;if(S.keys.right)dx=1;
  
  if(dx||dy){
    const len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;
    sw.vx+=dx*thrust*dt;sw.vy+=dy*thrust*dt;
    
    // Particle effects from thruster
    for(let i=0;i<3;i++){
      S.particles.push({
        x:sw.x-dx*15+Math.random()*10-5,y:sw.y-dy*15+Math.random()*10-5,
        vx:-dx*50+Math.random()*20-10,vy:-dy*50+Math.random()*20-10,
        life:15+Math.random()*10,color:'#00fff7',size:2
      });
    }
  }
  
  // Apply velocity with drag
  sw.x+=sw.vx*dt;sw.y+=sw.vy*dt;
  sw.vx*=.95;sw.vy*=.95; // space drag
  
  // Keep in bounds with momentum bounce
  if(sw.x<20){sw.x=20;sw.vx=Math.abs(sw.vx)*.7}
  if(sw.x>W-20){sw.x=W-20;sw.vx=-Math.abs(sw.vx)*.7}
  if(sw.y<20){sw.y=20;sw.vy=Math.abs(sw.vy)*.7}
  if(sw.y>H-20){sw.y=H-20;sw.vy=-Math.abs(sw.vy)*.7}
  
  // Earth rotation
  sw.earthAngle+=dt*.1;
  
  // Debris physics and collection
  sw.debris.forEach((d,i)=>{
    if(d.collected)return;
    d.x+=d.vx*dt;d.y+=d.vy*dt;
    // Wrap around screen
    if(d.x<-10)d.x=W+10;if(d.x>W+10)d.x=-10;
    if(d.y<-10)d.y=H+10;if(d.y>H+10)d.y=-10;
    
    // Collection check
    if(Math.hypot(d.x-sw.x,d.y-sw.y)<d.size+8){
      d.collected=true;Coins.earn(d.value,'debris');
      S.floatTexts.push({text:`+${d.value}◈`,x:d.x,y:d.y-20,color:'#ffd700',life:60});
      ArcSnd?.play('coin');
      // Rare chance for loot drop from debris
      LootSystem.drop('eva_debris',LootSystem.getStatBonuses().luck||0);
    }
  });
  
  // Remove collected debris
  sw.debris=sw.debris.filter(d=>!d.collected);
  
  // Check if near station (to return)
  const stationCenterX=W/2,stationCenterY=H/2;
  if(Math.hypot(sw.x-stationCenterX,sw.y-stationCenterY)<40){
    if(!sw._nearStation){
      sw._nearStation=true;
      showNotification("Press 🚀 to dock with station");
    }
  } else {
    sw._nearStation=false;
  }
}

function renderSpacewalk(){
  if(!S.spacewalk.active)return;
  
  const sw=S.spacewalk;
  
  // Deep space background
  ctx.fillStyle='#000005';ctx.fillRect(0,0,W,H);
  
  // Distant stars
  for(let i=0;i<200;i++){
    const bright=.1+Math.sin(S.time+i*.3)*.3;
    ctx.fillStyle=`rgba(255,255,255,${bright})`;
    const sx=((i*37+13)%W),sy=((i*23+7)%H);
    ctx.fillRect(sx,sy,i%7?1:2,i%7?1:2);
  }
  
  // Earth (in background)
  const earthX=W-150,earthY=100,earthR=60;
  const grd=ctx.createRadialGradient(earthX,earthY,0,earthX,earthY,earthR);
  grd.addColorStop(0,'#4a90e2');grd.addColorStop(.7,'#2a5aa0');grd.addColorStop(1,'#1a3060');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(earthX,earthY,earthR,0,Math.PI*2);ctx.fill();
  
  // Earth continents (rotating)
  ctx.fillStyle='#3a8a3a';
  for(let i=0;i<8;i++){
    const a=sw.earthAngle+i*.8,r=earthR*.8;
    const x=earthX+Math.cos(a)*r*.6,y=earthY+Math.sin(a)*r*.4;
    ctx.beginPath();ctx.arc(x,y,8+i*2,0,Math.PI*2);ctx.fill();
  }
  
  // Earth clouds
  ctx.fillStyle='rgba(255,255,255,.3)';
  for(let i=0;i<12;i++){
    const a=sw.earthAngle*.7+i*.6,r=earthR*.9;
    const x=earthX+Math.cos(a)*r*.7,y=earthY+Math.sin(a)*r*.5;
    ctx.beginPath();ctx.arc(x,y,4+i*1.5,0,Math.PI*2);ctx.fill();
  }
  
  // Space station (small lit rectangle in center)
  const stationX=W/2-30,stationY=H/2-20,stationW=60,stationH=40;
  ctx.fillStyle='#2a2a3a';ctx.fillRect(stationX,stationY,stationW,stationH);
  // Station windows (glowing)
  for(let i=0;i<4;i++){
    ctx.fillStyle=`rgba(255,180,80,${.6+Math.sin(S.time*2+i)*.3})`;
    ctx.fillRect(stationX+8+i*12,stationY+10,8,6);
    ctx.fillRect(stationX+8+i*12,stationY+24,8,6);
  }
  // Station solar panels
  ctx.fillStyle='#1a1a4a';ctx.fillRect(stationX-10,stationY+15,8,10);
  ctx.fillRect(stationX+stationW+2,stationY+15,8,10);
  
  // Asteroid (mini-asteroid to land on)
  const asteroidX=100,asteroidY=400,asteroidR=25;
  ctx.fillStyle='#4a3a2a';ctx.beginPath();ctx.arc(asteroidX,asteroidY,asteroidR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a2a1a';
  for(let i=0;i<6;i++){
    const a=i*1.05,r=asteroidR*.8;
    ctx.beginPath();ctx.arc(asteroidX+Math.cos(a)*r,asteroidY+Math.sin(a)*r,3,0,Math.PI*2);ctx.fill();
  }
  
  // Flag on asteroid (if planted)
  if(sw.flagPlanted){
    ctx.fillStyle='#888';ctx.fillRect(asteroidX-2,asteroidY-asteroidR-15,2,15);
    ctx.fillStyle='#ff4444';ctx.fillRect(asteroidX,asteroidY-asteroidR-12,12,8);
    ctx.fillStyle='#fff';ctx.font='8px sans-serif';ctx.fillText('🌍',asteroidX+2,asteroidY-asteroidR-6);
  }
  
  // Space debris
  sw.debris.forEach(d=>{
    if(d.collected)return;
    const pulse=.7+Math.sin(S.time*4+d.x*.01)*.3;
    ctx.fillStyle=d.type==='crystal'?`rgba(0,255,200,${pulse})`:`rgba(150,150,150,${pulse})`;
    ctx.beginPath();ctx.arc(d.x,d.y,d.size,0,Math.PI*2);ctx.fill();
    
    if(d.type==='crystal'){
      ctx.fillStyle=`rgba(0,255,200,${pulse*.5})`;
      ctx.beginPath();ctx.arc(d.x,d.y,d.size*2,0,Math.PI*2);ctx.fill();
    }
  });
  
  // Visitor in space suit
  const v=S.visitor;
  ctx.save();ctx.translate(sw.x,sw.y);
  // Space suit (white with helmet)
  ctx.fillStyle='#ffffff';ctx.fillRect(-12,-15,24,20);
  ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(0,-20,10,0,Math.PI*2);ctx.fill(); // helmet
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(0,-20,8,0,Math.PI*2);ctx.fill(); // visor
  // Jetpack thrusters
  if(dx||dy){
    ctx.fillStyle='#00fff7';
    for(let i=0;i<3;i++){
      ctx.beginPath();ctx.arc(-dx*20+Math.random()*6-3,-dy*20+Math.random()*6-3,2,0,Math.PI*2);ctx.fill();
    }
  }
  // Life support backpack
  ctx.fillStyle='#666';ctx.fillRect(-10,5,20,8);
  // Tether cable to station
  ctx.strokeStyle='rgba(200,200,200,.4)';ctx.lineWidth=1;ctx.setLineDash([2,2]);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(stationX+stationW/2-sw.x,stationY+stationH/2-sw.y);ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
  
  // HUD overlay for EVA
  ctx.fillStyle='rgba(0,0,0,.8)';ctx.fillRect(10,10,150,60);
  ctx.strokeStyle='#00fff7';ctx.lineWidth=1;ctx.strokeRect(10,10,150,60);
  ctx.fillStyle='#00fff7';ctx.font='10px monospace';
  ctx.fillText('EVA MODE',15,25);
  ctx.fillText(`Oxygen: ${Math.floor(sw.oxygen)}%`,15,40);
  ctx.fillText(`Debris: ${sw.debris.length} left`,15,55);
  
  // Instructions
  ctx.fillStyle='rgba(255,255,255,.8)';ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillText('WASD: Thrusters • ESC or 🚀: Return to station',W/2,H-20);
  // Draw EXIT button on canvas (clickable)
  ctx.fillStyle='rgba(255,60,60,.9)';ctx.fillRect(W-110,10,100,32);ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(W-110,10,100,32);
  ctx.fillStyle='#fff';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('EXIT EVA',W-60,31);ctx.textAlign='left';
  if(Math.hypot(sw.x-asteroidX,sw.y-asteroidY)<asteroidR+15){
    ctx.fillText('SPACE: Plant flag on asteroid',W/2,H-35);
  }
  ctx.textAlign='left';
}
function update(dt){
  S.time+=dt;
  if(S.spacewalk.active){updateSpacewalk(dt);return} // Spacewalk overrides normal game
  
  // Update systems
  DuelSystem.update(dt);
  
  EchoAI.update(dt);
  updateVisitor(dt);
  S.nearObject=S.echo.floor===S.floor?getNearObject():null;
  // Track visited
  if(S.nearObject&&!S._visited.includes(S.nearObject.id)){S._visited.push(S.nearObject.id);LS.set('visited_objs',S._visited);Coins.earn(2,'explore');checkAchievements()}
  updatePixel(dt);
  updateKittens(dt);
  updateSeasonalEffects(dt);
  updatePixelTalks(dt);
  if(S.thoughtTimer>0)S.thoughtTimer-=dt;
  S.idleThoughtTimer+=dt;
  if(!S.echo.moving&&S.idleThoughtTimer>20+Math.random()*10){S.idleThoughtTimer=0;const pool=[...BASE_THOUGHTS,...(FLOOR_THOUGHTS[S.floor]||[])];showThought(pool[Math.random()*pool.length|0])}
  if(S.floor===1){TV.update(dt);updateSabers(dt)}
  Mood.update(dt);
  // Aurora randomizer (floor 2)
  S.auroraTimer+=dt;if(S.auroraTimer>30){S.auroraTimer=0;S.auroraActive=Math.random()<.3}
  // Check data fragment proximity
  DATA_FRAGMENTS.filter(f=>f.floor===S.floor&&!S.dataFragments.includes(f.id)).forEach(f=>{if(Math.hypot(S.echo.x-f.x,S.echo.y-f.y)<25){S.dataFragments.push(f.id);LS.set('dataFragments',S.dataFragments);Coins.earn(50,'fragment');showNotification('💾 Data Fragment Found! ('+S.dataFragments.length+'/5)');checkAchievements()}});
  // Track floor visits
  const fv=LS.get('floorsVisited',[]);if(!fv.includes(S.floor)){fv.push(S.floor);LS.set('floorsVisited',fv);checkAchievements()}
  // Update mobile controls
  if(typeof MobileControls!=='undefined')MobileControls.updateActionButtons();
  // Multiplayer: send position & lerp others
  EchoWS.sendPosition();
  for(const id in S.otherPlayers){const op=S.otherPlayers[id];op.x+=(op.tx-op.x)*.2;op.y+=(op.ty-op.y)*.2;if(op.swingTimer>0){op.swingTimer-=dt*3;if(op.swingTimer<0)op.swingTimer=0}}
}

function toggleSabers(){
  if(!S._visitorSaber){
    S._visitorSaber='green';
    S._saberGreen=0;S._saberBlue=0;
    const target=S._visitorSaber==='green'?'_saberGreen':'_saberBlue';
    const iv=setInterval(()=>{
      S[target]+=0.1;
      if(S[target]>=1){S[target]=1;clearInterval(iv)}
    },50);
    playSaberSound('ignite');
    showThought('Green saber ignited! ⚔️');
  } else {
    // Switch saber
    S._visitorSaber=S._visitorSaber==='green'?'blue':'green';
    S._saberGreen=0;S._saberBlue=0;
    const target=S._visitorSaber==='green'?'_saberGreen':'_saberBlue';
    const iv=setInterval(()=>{
      S[target]+=0.1;
      if(S[target]>=1){S[target]=1;clearInterval(iv)}
    },50);
    playSaberSound('ignite');
    showThought(`Switched to ${S._visitorSaber} saber! ⚔️`);
  }
  
  if(ws?.readyState===1){
    ws.send(JSON.stringify({type:'player.saber',saber:S._visitorSaber}));
  }
  
  if(typeof MobileControls!=='undefined')MobileControls.updateActionButtons();
}

function swingSaber(){
  if(!S._visitorSaber)return;
  S._saberSwing=1;
  setTimeout(()=>S._saberSwing=0,600);
  // Send swing to multiplayer
  if(S.useVisitor&&ws?.readyState===1){
    ws.send(JSON.stringify({type:'player.swing',saber:S._visitorSaber,dir:S.visitor.dir}));
  }
  playSaberSound('swing');
}

function updateSabers(dt){
  // Animate saber ignition
  if(S._saberSwing>0){
    S._saberSwing-=dt*1.67; // 600ms duration
    if(S._saberSwing<=0)S._saberSwing=0;
  }
}

function playSaberSound(type){
  if(!S.audioCtx)return;
  const c=S.audioCtx,n=c.currentTime,v=S.volume*.2;
  const o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(S.masterGain);
  
  if(type==='ignite'){
    o.type='sawtooth';
    o.frequency.setValueAtTime(80,n);
    o.frequency.exponentialRampToValueAtTime(800,n+.6);
    g.gain.setValueAtTime(v,n);
    g.gain.exponentialRampToValueAtTime(.001,n+.8);
    o.start(n);o.stop(n+.8);
  } else if(type==='swing'){
    o.type='sine';
    o.frequency.setValueAtTime(400,n);
    o.frequency.exponentialRampToValueAtTime(200,n+.4);
    g.gain.setValueAtTime(v*.5,n);
    g.gain.exponentialRampToValueAtTime(.001,n+.5);
    o.start(n);o.stop(n+.5);
  } else if(type==='clash'){
    o.type='square';
    o.frequency.setValueAtTime(800,n);
    o.frequency.setValueAtTime(1200,n+.1);
    o.frequency.exponentialRampToValueAtTime(300,n+.8);
    g.gain.setValueAtTime(v*1.5,n);
    g.gain.exponentialRampToValueAtTime(.001,n+.8);
    o.start(n);o.stop(n+.8);
  }
}

function createPopup(html){
  const ov=document.createElement('div');ov.className='popup-overlay';
  const p=document.createElement('div');p.className='popup';p.innerHTML='<span class="close-btn">&times;</span>'+html;
  function closePopup(){ov.remove();document.removeEventListener('keydown',popupKeyNav)}
  p.querySelector('.close-btn').onclick=closePopup;
  ov.onclick=e=>{if(e.target===ov)closePopup()};
  ov.appendChild(p);document.body.appendChild(ov);
  
  // Arrow key navigation for buttons inside popups
  let popupIdx=-1;
  function getNavBtns(){return[...p.querySelectorAll('.drink-btn,.skin-card,.floor-btn,button')]}
  function updatePopupSel(newIdx){
    const btns=getNavBtns();if(!btns.length)return;
    if(popupIdx>=0&&popupIdx<btns.length)btns[popupIdx].classList.remove('kbd-selected');
    popupIdx=((newIdx%btns.length)+btns.length)%btns.length;
    btns[popupIdx].classList.add('kbd-selected');
    btns[popupIdx].scrollIntoView({block:'nearest'});
  }
  function popupKeyNav(e){
    const btns=getNavBtns();if(!btns.length)return;
    if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();e.stopPropagation();updatePopupSel(popupIdx<=0?btns.length-1:popupIdx-1)}
    else if(e.key==='ArrowDown'||e.key==='ArrowRight'){e.preventDefault();e.stopPropagation();updatePopupSel(popupIdx+1)}
    else if(e.key==='Enter'){e.preventDefault();e.stopPropagation();if(popupIdx>=0&&popupIdx<btns.length)btns[popupIdx].click()}
    else if(e.key==='Escape'){e.preventDefault();closePopup()}
  }
  document.addEventListener('keydown',popupKeyNav);
  
  return{ov,p};
}

function showPortalDimension(){
  const {p}=createPopup(`
    <h3 style="color:#00fff7">🌀 Portal Dimension</h3>
    <div style="background:#000008;height:200px;position:relative;overflow:hidden;border-radius:8px;margin:10px 0">
      <canvas id="portal-canvas" width="380" height="200" style="display:block"></canvas>
    </div>
    <p style="color:#aaa;font-size:11px;text-align:center">A glimpse into infinite possibilities...</p>
  `);
  
  // Render mini starfield with floating islands
  const portalCanvas=p.querySelector('#portal-canvas');
  const portalCtx=portalCanvas.getContext('2d');
  
  let portalTime=0;
  const portalAnim=()=>{
    portalTime+=0.016;
    
    // Deep space background
    portalCtx.fillStyle='#000008';
    portalCtx.fillRect(0,0,380,200);
    
    // Swirling starfield
    for(let i=0;i<150;i++){
      const angle=portalTime*0.5+i*0.1;
      const radius=50+i*1.2;
      const x=190+Math.cos(angle)*radius*(0.5+Math.sin(portalTime+i)*0.3);
      const y=100+Math.sin(angle)*radius*0.3;
      
      if(x>0&&x<380&&y>0&&y<200){
        const brightness=0.3+Math.sin(portalTime*2+i)*0.4;
        portalCtx.fillStyle=`rgba(255,255,255,${brightness})`;
        portalCtx.fillRect(x,y,1,1);
      }
    }
    
    // Floating islands
    const islands=[
      {x:100,y:80,size:20,color:'#4a8a4a'},
      {x:280,y:60,size:25,color:'#8a6a4a'},
      {x:200,y:140,size:30,color:'#6a4a8a'}
    ];
    
    islands.forEach((island,i)=>{
      const float=Math.sin(portalTime*1.5+i*2)*8;
      const ix=island.x+Math.cos(portalTime*0.3+i)*10;
      const iy=island.y+float;
      
      // Island glow
      const glow=portalCtx.createRadialGradient(ix,iy,0,ix,iy,island.size*1.5);
      glow.addColorStop(0,island.color+'80');
      glow.addColorStop(1,'rgba(0,0,0,0)');
      portalCtx.fillStyle=glow;
      portalCtx.beginPath();
      portalCtx.arc(ix,iy,island.size*1.5,0,Math.PI*2);
      portalCtx.fill();
      
      // Island solid
      portalCtx.fillStyle=island.color;
      portalCtx.beginPath();
      portalCtx.arc(ix,iy,island.size,0,Math.PI*2);
      portalCtx.fill();
      
      // Island details
      portalCtx.fillStyle='#2a4a2a';
      portalCtx.fillRect(ix-island.size*0.3,iy-island.size*0.1,island.size*0.6,island.size*0.2);
    });
    
    // Portal energy swirls
    portalCtx.strokeStyle='rgba(0,255,200,0.6)';
    portalCtx.lineWidth=2;
    for(let i=0;i<5;i++){
      const spiralAngle=portalTime*3+i*1.2;
      const spiralRadius=30+i*8;
      portalCtx.beginPath();
      for(let a=0;a<Math.PI*4;a+=0.2){
        const sx=190+Math.cos(spiralAngle+a)*spiralRadius*(1-a/(Math.PI*4));
        const sy=100+Math.sin(spiralAngle+a)*spiralRadius*0.5*(1-a/(Math.PI*4));
        if(a===0)portalCtx.moveTo(sx,sy);
        else portalCtx.lineTo(sx,sy);
      }
      portalCtx.stroke();
    }
    
    if(p.closest('.popup-overlay')){
      requestAnimationFrame(portalAnim);
    }
  };
  
  requestAnimationFrame(portalAnim);
  showThought("Infinite dimensions unfold before me... 🌀");
}

function showItemShop(initialTab){
  const tab=initialTab||'skins';
  const ownedSkins=LS.get('visitorSkinsOwned',[]);
  const ownedAcc=LS.get('visitorAccessories',[]);
  const equipped=LS.get('equippedAccessories',{hat:null,trail:null,aura:null,pet:null});
  const ownedFurniture=LS.get('ownedFurniture',[]);

  let html='<h3>🛒 Item Shop</h3><p style="font-size:10px;color:#888;margin-bottom:6px">Balance: <span style="color:#ffd700">' + Coins.count + '◈</span></p>';
  html+='<div class="shop-tabs">';
  html+='<div class="shop-tab'+(tab==='skins'?' active':'')+'" data-tab="skins">👔 Skins</div>';
  html+='<div class="shop-tab'+(tab==='furniture'?' active':'')+'" data-tab="furniture">🪑 Furniture</div>';
  html+='<div class="shop-tab'+(tab==='accessories'?' active':'')+'" data-tab="accessories">✨ Accessories</div>';
  html+='<div class="shop-tab'+(tab==='market'?' active':'')+'" data-tab="market">🏪 Market</div>';
  html+='</div>';

  // Skins tab
  html+='<div class="shop-content" data-content="skins" style="'+(tab!=='skins'?'display:none':'')+'">';
  html+='<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px">';
  VISITOR_SKINS.forEach(sk=>{
    const owned=sk.cost===0||ownedSkins.includes(sk.id);
    const current=S.visitor.skin===sk.id;
    const isLootOnly=sk.lootOnly||sk.cost<0;
    const r=RARITIES[sk.rarity||'common']||RARITIES.common;
    html+='<div class="skin-card'+(current?' active':'')+' rarity-'+(sk.rarity||'common')+'" data-action="buy-skin" data-id="'+sk.id+'" data-cost="'+sk.cost+'" style="border-color:'+r.border+'">';
    if(sk.hasSprite)html+='<canvas class="skin-preview" data-skin="'+sk.id+'" width="48" height="48" style="display:block;margin:0 auto 2px;image-rendering:pixelated"></canvas>';
    else html+='<div class="icon">'+sk.icon+'</div>';
    html+='<div style="font-size:9px">'+sk.label+'</div>';
    html+='<span class="rarity-badge '+(sk.rarity||'common')+'" style="font-size:7px">'+r.name+'</span>';
    if(isLootOnly)html+='<span class="loot-only-badge">LOOT ONLY</span>';
    else html+='<div class="lock" style="font-size:8px;color:'+(owned?'#0f0':'#ffd700')+'">'+(current?'WORN':owned?'OWNED':sk.cost+'◈')+'</div>';
    html+='</div>';
  });
  html+='</div></div>';

  // Furniture tab
  html+='<div class="shop-content" data-content="furniture" style="'+(tab!=='furniture'?'display:none':'')+'">';
  html+='<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px">';
  Object.entries(FURNITURE_TYPES).forEach(([key,ft])=>{
    if(ft.requirement)return;
    const owned=ownedFurniture.includes(key);
    const r=RARITIES[ft.rarity||'common']||RARITIES.common;
    html+='<div class="acc-card'+(owned?' owned':'')+' rarity-'+(ft.rarity||'common')+'" data-action="buy-furn" data-id="'+key+'" data-cost="'+ft.cost+'" style="border-color:'+r.border+'">';
    html+='<div class="acc-icon">'+ft.icon+'</div><div style="font-size:9px">'+ft.name+'</div>';
    html+='<span class="rarity-badge '+(ft.rarity||'common')+'" style="font-size:7px">'+r.name+'</span>';
    html+='<div class="acc-price">'+(ft.cost===0?'FREE':ft.cost+'◈')+'</div></div>';
  });
  html+='</div></div>';

  // Accessories tab
  html+='<div class="shop-content" data-content="accessories" style="'+(tab!=='accessories'?'display:none':'')+'">';
  const accTypes=[{label:'🎩 Hats',type:'hat'},{label:'✨ Trails',type:'trail'},{label:'🟣 Auras',type:'aura'},{label:'🤖 Mini Pets',type:'pet'}];
  accTypes.forEach(at=>{
    html+='<div style="margin:6px 0"><div style="font-size:10px;color:#c080ff;margin-bottom:4px">'+at.label+'</div><div style="display:flex;flex-wrap:wrap;gap:3px">';
    ACCESSORY_ITEMS.filter(a=>a.type===at.type).forEach(acc=>{
      const owned=ownedAcc.includes(acc.id);
      const isEquipped=equipped[acc.type]===acc.id;
      const isLootOnly=acc.lootOnly||acc.cost<0;
      const r=RARITIES[acc.rarity||'common']||RARITIES.common;
      html+='<div class="acc-card'+(owned?' owned':'')+(isEquipped?' equipped':'')+' rarity-'+(acc.rarity||'common')+'" data-action="buy-acc" data-id="'+acc.id+'" data-cost="'+acc.cost+'" data-type="'+acc.type+'" style="border-color:'+r.border+'">';
      html+='<div class="acc-icon">'+acc.icon+'</div><div style="font-size:9px">'+acc.name+'</div>';
      html+='<span class="rarity-badge '+(acc.rarity||'common')+'" style="font-size:7px">'+r.name+'</span>';
      if(isLootOnly)html+='<span class="loot-only-badge">LOOT ONLY</span>';
      else html+='<div class="acc-price">'+(isEquipped?'EQUIPPED':owned?'OWNED':acc.cost+'◈')+'</div>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  // Market tab (replaces Special)
  html+='<div class="shop-content" data-content="market" style="'+(tab!=='market'?'display:none':'')+'">';
  html+='<div style="text-align:center;padding:16px"><div style="font-size:28px;margin-bottom:6px">🏪</div>';
  html+='<div style="color:#c080ff;font-size:12px;margin-bottom:8px">Player Marketplace</div>';
  html+='<div style="color:#888;font-size:10px;margin-bottom:12px">Buy and sell loot drops with other visitors!</div>';
  html+='<button class="drink-btn" id="open-marketplace" style="border-color:#ffd700;color:#ffd700">Browse Marketplace 🏪</button>';
  html+='</div>';
  // Show loot inventory preview
  const lootInv=LS.get('lootInventory',[]);
  if(lootInv.length>0){
    html+='<div style="border-top:1px solid #333;padding-top:8px;margin-top:8px"><div style="font-size:10px;color:#c080ff;margin-bottom:6px">📦 Your Loot ('+lootInv.length+' items)</div><div style="display:flex;flex-wrap:wrap;gap:2px">';
    lootInv.slice(0,8).forEach(item=>{html+=renderItemCard(item)});
    html+='</div></div>';
  }
  html+='</div>';

  const{p}=createPopup(html);

  // Render skin preview canvases (v19)
  p.querySelectorAll('.skin-preview').forEach(cv=>{
    renderSkinPreview(cv.dataset.skin,cv);
  });

  // Open marketplace button
  const mpBtn=p.querySelector('#open-marketplace');
  if(mpBtn)mpBtn.onclick=()=>{p.closest('.popup-overlay').remove();Marketplace.showUI()};

  // Tab switching
  p.querySelectorAll('.shop-tab').forEach(t=>{
    t.onclick=()=>{
      p.querySelectorAll('.shop-tab').forEach(tt=>tt.classList.remove('active'));
      t.classList.add('active');
      p.querySelectorAll('.shop-content').forEach(c=>c.style.display='none');
      const content=p.querySelector('[data-content="'+t.dataset.tab+'"]');
      if(content)content.style.display='';
    };
  });

  // Buy skin
  p.querySelectorAll('[data-action="buy-skin"]').forEach(card=>{
    card.onclick=()=>{
      const id=card.dataset.id,cost=parseInt(card.dataset.cost)||0;
      if(cost<0){showNotification('This item can only drop from loot! 🎁');return}
      const owned=cost===0||LS.get('visitorSkinsOwned',[]).includes(id);
      if(!owned){
        if(!Coins.canAfford(cost)){showNotification('Need more ◈!');return}
        Coins.spend(cost,'skin');
        const skins=LS.get('visitorSkinsOwned',[]);skins.push(id);LS.set('visitorSkinsOwned',skins);
        showNotification('Purchased '+VISITOR_SKINS.find(s=>s.id===id).label+'!');
      }
      p.closest('.popup-overlay').remove();setTimeout(()=>visitorTransform(id),200);
    };
  });

  // Buy furniture
  p.querySelectorAll('[data-action="buy-furn"]').forEach(card=>{
    card.onclick=()=>{
      const id=card.dataset.id,cost=parseInt(card.dataset.cost)||0;
      const inv=LS.get('ownedFurniture',[]);
      if(inv.includes(id)){showNotification('Already in inventory!');return}
      if(cost>0&&!Coins.canAfford(cost)){showNotification('Need more ◈!');return}
      if(cost>0)Coins.spend(cost,'furniture');
      inv.push(id);LS.set('ownedFurniture',inv);
      showNotification('Added '+FURNITURE_TYPES[id].name+' to inventory! 🎒');
      p.closest('.popup-overlay').remove();showItemShop('furniture');
    };
  });

  // Buy/equip accessories
  p.querySelectorAll('[data-action="buy-acc"]').forEach(card=>{
    card.onclick=()=>{
      const id=card.dataset.id,cost=parseInt(card.dataset.cost)||0,type=card.dataset.type;
      if(cost<0){showNotification('This item can only drop from loot! 🎁');return}
      const owned=LS.get('visitorAccessories',[]);
      const eq=LS.get('equippedAccessories',{hat:null,trail:null,aura:null,pet:null});
      if(!owned.includes(id)){
        if(!Coins.canAfford(cost)){showNotification('Need more ◈!');return}
        Coins.spend(cost,'accessory');
        owned.push(id);LS.set('visitorAccessories',owned);
        showNotification('Purchased '+ACCESSORY_ITEMS.find(a=>a.id===id).name+'!');
      }
      // Equip/unequip
      if(eq[type]===id){eq[type]=null;showNotification('Unequipped!')}
      else{eq[type]=id;showNotification('Equipped '+ACCESSORY_ITEMS.find(a=>a.id===id).name+'!')}
      LS.set('equippedAccessories',eq);
      p.closest('.popup-overlay').remove();showItemShop('accessories');
    };
  });
}

function showInventory(){
  const ownedSkins=LS.get('visitorSkinsOwned',[]);
  const ownedAcc=LS.get('visitorAccessories',[]);
  const equipped=LS.get('equippedAccessories',{hat:null,trail:null,aura:null,pet:null});
  const ownedFurniture=LS.get('ownedFurniture',[]);

  let html='<h3>🎒 Inventory</h3>';

  // Skins section
  html+='<div class="inv-section"><h4>👔 Skins</h4>';
  const allSkins=VISITOR_SKINS.filter(s=>s.cost===0||ownedSkins.includes(s.id));
  if(allSkins.length===0)html+='<div style="font-size:10px;color:#666">No skins yet</div>';
  else allSkins.forEach(sk=>{
    const worn=S.visitor.skin===sk.id;
    html+='<div class="inv-item'+(worn?' equipped':'')+'" data-action="equip-skin" data-id="'+sk.id+'">'+sk.icon+' '+sk.label+(worn?' ✓':'')+'</div>';
  });
  html+='</div>';

  // Accessories section
  const accTypes=[{label:'🎩 Hats',type:'hat'},{label:'✨ Trails',type:'trail'},{label:'🟣 Auras',type:'aura'},{label:'🤖 Mini Pets',type:'pet'}];
  accTypes.forEach(at=>{
    const items=ACCESSORY_ITEMS.filter(a=>a.type===at.type&&ownedAcc.includes(a.id));
    if(items.length===0)return;
    html+='<div class="inv-section"><h4>'+at.label+'</h4>';
    items.forEach(acc=>{
      const isEq=equipped[acc.type]===acc.id;
      html+='<div class="inv-item'+(isEq?' equipped':'')+'" data-action="equip-acc" data-id="'+acc.id+'" data-type="'+acc.type+'">'+acc.icon+' '+acc.name+(isEq?' ✓':'')+'</div>';
    });
    html+='</div>';
  });

  // Furniture section
  if(ownedFurniture.length>0){
    html+='<div class="inv-section"><h4>🪑 Furniture</h4>';
    ownedFurniture.forEach(fid=>{
      const ft=FURNITURE_TYPES[fid];if(!ft)return;
      html+='<div class="inv-item">'+ft.icon+' '+ft.name+'</div>';
    });
    html+='</div>';
  }

  if(ownedAcc.length===0&&ownedFurniture.length===0&&lootInv.length===0)
    html+='<p style="font-size:10px;color:#666;text-align:center;margin-top:12px">Visit the 🛒 Item Shop to buy accessories!</p>';

  // Loot inventory section
  const lootInv=LS.get('lootInventory',[]);
  const equippedLoot=LS.get('equippedLoot',{});
  if(lootInv.length>0){
    html+='<div class="inv-section"><h4>🎁 Loot Items ('+lootInv.length+')</h4>';
    // Show stat bonuses
    const bonuses=LootSystem.getStatBonuses();
    const activeStats=Object.entries(bonuses).filter(([k,v])=>v>0);
    if(activeStats.length>0){
      html+='<div style="margin-bottom:6px;padding:4px 8px;background:rgba(0,255,247,.05);border:1px solid rgba(0,255,247,.2);border-radius:4px;font-size:9px">';
      html+='<span style="color:#00fff7">Active Bonuses:</span> ';
      html+=activeStats.map(([k,v])=>STAT_TYPES[k].icon+'+'+v+'%').join(' ');
      html+='</div>';
    }
    html+='<div style="display:flex;flex-wrap:wrap;gap:2px">';
    lootInv.forEach(item=>{
      const isEq=Object.values(equippedLoot).includes(item.id);
      html+=renderItemCard(item,{equipped:isEq});
    });
    html+='</div></div>';
  }

  const{p}=createPopup(html);

  // Equip skin
  p.querySelectorAll('[data-action="equip-skin"]').forEach(el=>{
    el.onclick=()=>{
      S.visitor.skin=el.dataset.id;LS.set('visitorSkin',el.dataset.id);
      showNotification('Equipped '+VISITOR_SKINS.find(s=>s.id===el.dataset.id).label+'!');
      p.closest('.popup-overlay').remove();showInventory();
    };
  });

  // Equip/unequip accessory
  p.querySelectorAll('[data-action="equip-acc"]').forEach(el=>{
    el.onclick=()=>{
      const eq=LS.get('equippedAccessories',{hat:null,trail:null,aura:null,pet:null});
      const type=el.dataset.type,id=el.dataset.id;
      if(eq[type]===id){eq[type]=null;showNotification('Unequipped!')}
      else{eq[type]=id;showNotification('Equipped '+ACCESSORY_ITEMS.find(a=>a.id===id).name+'!')}
      LS.set('equippedAccessories',eq);
      p.closest('.popup-overlay').remove();showInventory();
    };
  });

  // Loot item click — equip/unequip or inspect
  p.querySelectorAll('.item-card[data-uid]').forEach(el=>{
    el.onclick=()=>{
      const uid=el.dataset.uid;
      const item=lootInv.find(i=>i.id===uid);
      if(!item)return;
      const def=getAllLootableItems().find(i=>i.itemId===item.itemId)||{name:'???',icon:'❓'};
      const r=RARITIES[item.rarity]||RARITIES.common;
      const eq=LS.get('equippedLoot',{});
      const isEq=Object.values(eq).includes(uid);
      
      let detailHtml='<h3 style="color:'+r.color+'">'+def.icon+' '+def.name+'</h3>';
      detailHtml+='<span class="rarity-badge '+item.rarity+'">'+r.name+'</span>';
      detailHtml+='<span style="font-size:9px;color:#888;margin-left:6px">'+item.type+'</span>';
      if(item.stats&&item.stats.length>0){
        detailHtml+='<div style="margin:10px 0">';
        item.stats.forEach(s=>{
          const st=STAT_TYPES[s.type];
          const pct=s.value/st.max*100;
          detailHtml+=`<div style="display:flex;align-items:center;gap:6px;margin:4px 0;font-size:11px"><span>${st.icon}</span><span style="width:60px">${st.name}</span><div style="flex:1;height:6px;background:#333;border-radius:3px"><div style="width:${pct}%;height:100%;background:${r.color};border-radius:3px"></div></div><span style="color:${r.color}">+${s.value}%</span></div>`;
        });
        detailHtml+='</div>';
      }
      detailHtml+='<div style="display:flex;gap:6px;margin-top:12px">';
      detailHtml+=`<button class="drink-btn" id="loot-equip" style="border-color:${isEq?'#ff6666':'#00fff7'};color:${isEq?'#ff6666':'#00fff7'}">${isEq?'Unequip':'Equip'}</button>`;
      detailHtml+='<button class="drink-btn" id="loot-sell" style="border-color:#ffd700;color:#ffd700">Sell on Market</button>';
      detailHtml+='</div>';
      
      const{p:dp}=createPopup(detailHtml);
      dp.querySelector('#loot-equip').onclick=()=>{
        const eq2=LS.get('equippedLoot',{});
        if(isEq){
          Object.keys(eq2).forEach(k=>{if(eq2[k]===uid)eq2[k]=null});
          showNotification('Unequipped!');
        }else{
          eq2[item.type]=uid;
          showNotification('Equipped '+def.name+'!');
        }
        LS.set('equippedLoot',eq2);
        dp.closest('.popup-overlay').remove();
        p.closest('.popup-overlay').remove();
        showInventory();
      };
      dp.querySelector('#loot-sell').onclick=()=>{
        const price=prompt(`List ${def.name} for how many ◈? (1-9999)`);
        if(price&&parseInt(price)>=1){
          Marketplace.listItem(item,parseInt(price)).then(ok=>{
            if(ok){dp.closest('.popup-overlay').remove();p.closest('.popup-overlay').remove();showInventory()}
          });
        }
      };
    };
  });
}

// Daily Login Reward System
const DailyReward={
  REWARDS:[5,10,15,20,30,40,75],
  check(){
    const today=new Date().toISOString().slice(0,10);
    const lastDay=LS.get('lastLoginDay',null);
    if(lastDay===today)return;// Already claimed today

    let streak=LS.get('loginStreak',0);
    const lastDate=lastDay?new Date(lastDay):null;
    const todayDate=new Date(today);

    // Check if consecutive day
    if(lastDate){
      const diff=Math.floor((todayDate-lastDate)/(1000*60*60*24));
      if(diff===1){streak++}
      else if(diff>1){streak=0}// Streak broken
    }
    if(streak>=7)streak=0;// Reset after day 7

    const reward=this.REWARDS[streak]||5;
    LS.set('lastLoginDay',today);
    LS.set('loginStreak',streak+1);

    // Show reward popup after short delay
    setTimeout(()=>this.showPopup(streak+1,reward),1500);
  },
  showPopup(day,amount){
    Coins.earn(amount,'daily_login');
    const streakDots=this.REWARDS.map((r,i)=>{
      const done=i<day;const current=i===day-1;
      return '<div style="display:inline-flex;flex-direction:column;align-items:center;margin:0 3px;opacity:'+(done?'1':'0.4')+'">'+
        '<div style="width:24px;height:24px;border-radius:50%;border:2px solid '+(current?'#ffd700':done?'#00fff7':'#555')+';background:'+(current?'rgba(255,215,0,.2)':done?'rgba(0,255,247,.1)':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:10px">'+(done?'✓':i+1)+'</div>'+
        '<div style="font-size:8px;color:#ffd700;margin-top:2px">'+r+'◈</div></div>';
    }).join('');

    const{p}=createPopup(
      '<div class="daily-reward">'+
      '<div style="font-size:14px;color:#c080ff;margin-bottom:4px">📅 Daily Login Reward</div>'+
      '<div style="font-size:11px;color:#888;margin-bottom:12px">Day '+day+' of 7</div>'+
      '<div class="reward-amount">+'+amount+'◈</div>'+
      '<div style="margin:16px 0;display:flex;justify-content:center;align-items:center">'+streakDots+'</div>'+
      '<div style="font-size:10px;color:#888">'+(day<7?'Come back tomorrow for '+(this.REWARDS[day]||5)+'◈!':'Streak complete! 🎉 Resets tomorrow.')+'</div>'+
      '</div>'
    );

    // Reward particles
    for(let i=0;i<25;i++){
      S.particles.push({x:W/2+(Math.random()-.5)*200,y:H/2+(Math.random()-.5)*100,vx:(Math.random()-.5)*4,vy:-Math.random()*3-1,life:50+Math.random()*30,color:['#ffd700','#ff6ec7','#00fff7'][Math.floor(Math.random()*3)],size:2+Math.random()*2});
    }
    // Day 7: guaranteed rare+ loot drop!
    if(day===7){
      setTimeout(()=>{
        LootSystem.drop('daily7');
        showNotification('🎁 Day 7 bonus loot drop!');
      },2000);
    }
  }
};

// All lootable items (skins + accessories that can drop)
function getAllLootableItems(){
  const items=[];
  VISITOR_SKINS.forEach(s=>items.push({itemId:s.id,name:s.label,icon:s.icon,type:'skin',rarity:s.rarity||'common',lootOnly:!!s.lootOnly}));
  ACCESSORY_ITEMS.forEach(a=>items.push({itemId:a.id,name:a.name,icon:a.icon,type:a.type,rarity:a.rarity||'common',lootOnly:!!a.lootOnly}));
  return items;
}

// Roll random stats based on rarity
function rollStats(rarity){
  const statKeys=Object.keys(STAT_TYPES);
  const cfg={
    common:{min:0,max:1,valMin:1,valMax:3},
    uncommon:{min:1,max:1,valMin:3,valMax:6},
    rare:{min:1,max:2,valMin:5,valMax:10},
    epic:{min:2,max:2,valMin:8,valMax:15},
    legendary:{min:2,max:3,valMin:12,valMax:18},
    mythic:{min:3,max:3,valMin:15,valMax:20},
  }[rarity]||{min:0,max:1,valMin:1,valMax:3};
  const count=cfg.min+Math.floor(Math.random()*(cfg.max-cfg.min+1));
  const stats=[];
  const usedTypes=new Set();
  for(let i=0;i<count;i++){
    let type;
    do{type=statKeys[Math.floor(Math.random()*statKeys.length)]}while(usedTypes.has(type));
    usedTypes.add(type);
    const val=cfg.valMin+Math.floor(Math.random()*(cfg.valMax-cfg.valMin+1));
    stats.push({type,value:Math.min(val,STAT_TYPES[type].max)});
  }
  return stats;
}

// Generate unique inventory item
function createInventoryItem(itemId,type,rarity){
  return{
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    itemId,type,rarity,
    stats:rollStats(rarity),
    timestamp:Date.now()
  };
}

const LootSystem={
  // Roll a random loot item with rarity determined by weighted random
  roll(bonusLuck){
    const luck=bonusLuck||0;
    const r=Math.random()*(1-luck*0.01);
    let rarity='common';
    if(r<0.02)rarity='mythic';
    else if(r<0.07)rarity='legendary';
    else if(r<0.17)rarity='epic';
    else if(r<0.35)rarity='rare';
    else if(r<0.60)rarity='uncommon';
    return this.rollWithRarity(rarity);
  },
  // Roll with minimum rarity guarantee
  rollMinRarity(minRarity){
    const tiers=['common','uncommon','rare','epic','legendary','mythic'];
    const minIdx=tiers.indexOf(minRarity);
    const r=Math.random();
    let rarity=minRarity;
    if(r<0.05&&minIdx<5)rarity=tiers[minIdx+2]||tiers[5];
    else if(r<0.20&&minIdx<4)rarity=tiers[minIdx+1];
    return this.rollWithRarity(rarity);
  },
  // Roll specific rarity
  rollWithRarity(rarity){
    const items=getAllLootableItems().filter(i=>i.rarity===rarity);
    if(!items.length){
      // Fallback: get any item and override rarity
      const all=getAllLootableItems();
      const item=all[Math.floor(Math.random()*all.length)];
      return createInventoryItem(item.itemId,item.type,rarity);
    }
    const item=items[Math.floor(Math.random()*items.length)];
    return createInventoryItem(item.itemId,item.type,rarity);
  },
  // Add item to loot inventory
  addToInventory(item){
    const inv=LS.get('lootInventory',[]);
    inv.push(item);
    LS.set('lootInventory',inv);
    return item;
  },
  // Remove item from loot inventory
  removeFromInventory(itemUniqueId){
    const inv=LS.get('lootInventory',[]);
    const idx=inv.findIndex(i=>i.id===itemUniqueId);
    if(idx>=0)inv.splice(idx,1);
    LS.set('lootInventory',inv);
  },
  // Get total equipped stat bonuses
  getStatBonuses(){
    const bonuses={};
    Object.keys(STAT_TYPES).forEach(k=>bonuses[k]=0);
    const inv=LS.get('lootInventory',[]);
    const equipped=LS.get('equippedLoot',{});
    Object.values(equipped).forEach(uid=>{
      if(!uid)return;
      const item=inv.find(i=>i.id===uid);
      if(item&&item.stats){
        item.stats.forEach(s=>{bonuses[s.type]=(bonuses[s.type]||0)+s.value});
      }
    });
    return bonuses;
  },
  // Show loot drop with epic card animation
  showLootCard(item){
    const r=RARITIES[item.rarity]||RARITIES.common;
    const itemDef=getAllLootableItems().find(i=>i.itemId===item.itemId)||{name:'???',icon:'❓'};
    
    // Burst particles matching rarity
    const particleCount={common:8,uncommon:15,rare:25,epic:40,legendary:60,mythic:80}[item.rarity]||10;
    for(let i=0;i<particleCount;i++){
      const a=Math.random()*Math.PI*2;
      S.particles.push({x:W/2+Math.cos(a)*30,y:H/2+Math.sin(a)*30,vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4),life:40+Math.random()*30,color:r.color,size:2+Math.random()*3});
    }

    // Play sound based on rarity
    this._playLootSound(item.rarity);

    // Create loot card overlay
    const ov=document.createElement('div');
    ov.className='loot-overlay';
    const shimmerClass=item.rarity==='mythic'?' shimmer-mythic':item.rarity==='legendary'?' shimmer-legendary':(item.rarity==='epic'?' shimmer-epic':'');
    let statsHtml='';
    if(item.stats&&item.stats.length>0){
      statsHtml='<div class="loot-stats">';
      item.stats.forEach(s=>{
        const st=STAT_TYPES[s.type];
        const pct=s.value/st.max*100;
        statsHtml+=`<div class="loot-stat"><span>${st.icon}</span><span>${st.name} +${s.value}%</span><div class="stat-bar"><div class="stat-fill" style="width:${pct}%;background:${r.color}"></div></div></div>`;
      });
      statsHtml+='</div>';
    }
    ov.innerHTML=`
      <div class="loot-card${shimmerClass}" style="border-color:${r.border};${r.glow?'box-shadow:0 0 30px '+r.glow+',0 0 60px '+r.glow+'44;':''}">
        <div class="loot-icon">${itemDef.icon}</div>
        <div class="loot-name" style="color:${r.color}">${itemDef.name}</div>
        <span class="rarity-badge ${item.rarity}">${r.name}</span>
        ${statsHtml}
        <div style="font-size:9px;color:#666;margin-top:6px">${itemDef.type}</div>
        <button class="loot-close">Collect</button>
      </div>
    `;
    document.body.appendChild(ov);
    ov.querySelector('.loot-close').onclick=()=>ov.remove();
    ov.onclick=e=>{if(e.target===ov)ov.remove()};
    // Auto-close after 8s
    setTimeout(()=>{if(ov.parentNode)ov.remove()},8000);
  },
  _playLootSound(rarity){
    if(!S.audioCtx)return;
    const c=S.audioCtx,n=c.currentTime,v=S.volume*.2;
    const notes={
      common:[440],
      uncommon:[440,554],
      rare:[440,554,659],
      epic:[440,554,659,880],
      legendary:[440,554,659,880,1047],
      mythic:[440,554,659,880,1047,1319],
    }[rarity]||[440];
    notes.forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type=rarity==='mythic'?'square':'sine';
      o.frequency.value=freq;
      g.gain.setValueAtTime(v,n+i*.08);
      g.gain.exponentialRampToValueAtTime(.001,n+i*.08+.3);
      o.connect(g);g.connect(S.masterGain);
      o.start(n+i*.08);o.stop(n+i*.08+.35);
    });
  },
  // Trigger a loot drop from a source
  drop(source,bonusLuck){
    let item;
    if(source==='daily7')item=this.rollMinRarity('rare');
    else if(source==='arcade_highscore')item=this.rollMinRarity('uncommon');
    else if(source==='duel_win')item=this.roll(bonusLuck||0);
    else if(source==='eva_debris'){if(Math.random()>0.15)return null;item=this.roll(bonusLuck||0)}
    else if(source==='room_visit'){if(Math.random()>0.05)return null;item=this.roll(bonusLuck||0)}
    else item=this.roll(bonusLuck||0);

    this.addToInventory(item);
    this.showLootCard(item);
    showNotification(`🎁 Loot drop! ${RARITIES[item.rarity].name} item!`);
    return item;
  }
};

// Marketplace client
const Marketplace={
  listings:[],
  async load(){
    try{const r=await fetch('/api/marketplace');this.listings=await r.json()}catch{this.listings=[]}
  },
  async listItem(item,price){
    const owner=LS.get('visitorName','Visitor');
    if(owner==='Visitor'){showNotification('Set your name first!');return false}
    try{
      const r=await fetch('/api/marketplace/list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({owner,item,price})});
      const data=await r.json();
      if(data.ok){showNotification('Listed on marketplace!');LootSystem.removeFromInventory(item.id);return true}
      else{showNotification('Failed to list!');return false}
    }catch{showNotification('Marketplace error!');return false}
  },
  async buyItem(listingId){
    const buyer=LS.get('visitorName','Visitor');
    if(buyer==='Visitor'){showNotification('Set your name first!');return false}
    try{
      const r=await fetch(`/api/marketplace/buy/${listingId}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({buyer})});
      const data=await r.json();
      if(data.ok){
        if(!Coins.canAfford(data.price)){showNotification('Not enough ◈!');return false}
        Coins.spend(data.price,'marketplace');
        LootSystem.addToInventory(data.item);
        showNotification('Purchased from marketplace!');
        return true;
      }
      return false;
    }catch{showNotification('Purchase failed!');return false}
  },
  async cancelListing(listingId){
    const owner=LS.get('visitorName','Visitor');
    try{
      const r=await fetch(`/api/marketplace/cancel/${listingId}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({owner})});
      const data=await r.json();
      if(data.ok)showNotification('Listing cancelled!');
      return data.ok;
    }catch{return false}
  },
  async showUI(){
    await this.load();
    const myName=LS.get('visitorName','Visitor');
    let filter='all';
    const renderMP=(filterType)=>{
      let filtered=this.listings;
      if(filterType&&filterType!=='all')filtered=filtered.filter(l=>(l.item?.type||'skin')===filterType);
      filtered.sort((a,b)=>a.price-b.price);
      
      let html='<h3>🏪 Marketplace</h3><p style="font-size:10px;color:#888;margin-bottom:6px">Balance: <span style="color:#ffd700">'+Coins.count+'◈</span></p>';
      html+='<div class="mp-filters">';
      ['all','skin','hat','trail','aura','pet'].forEach(f=>{
        html+=`<div class="mp-filter${f===filterType?' active':''}" data-filter="${f}">${f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)}</div>`;
      });
      html+='</div>';

      if(filtered.length===0){
        html+='<div style="text-align:center;padding:30px;color:#666"><div style="font-size:24px;margin-bottom:8px">🏪</div>No listings yet. Sell loot from your inventory!</div>';
      }else{
        filtered.forEach(l=>{
          const r=RARITIES[l.item?.rarity||'common']||RARITIES.common;
          const isMine=l.owner===myName;
          html+=`<div class="mp-listing rarity-${l.item?.rarity||'common'}">
            <div class="mp-icon">${l.item?.icon||'❓'}</div>
            <div class="mp-info">
              <div class="mp-name" style="color:${r.color}">${l.item?.name||'Unknown'}</div>
              <span class="rarity-badge ${l.item?.rarity||'common'}">${r.name}</span>
              <div class="mp-seller">by ${l.owner}${l.item?.stats?.length?' · '+l.item.stats.map(s=>STAT_TYPES[s.type].icon+s.value+'%').join(' '):''}</div>
            </div>
            <div class="mp-price">${l.price}◈</div>
            ${isMine?`<button class="mp-buy" data-cancel="${l.id}" style="border-color:#ff6666;color:#ff6666">Cancel</button>`:`<button class="mp-buy" data-buy="${l.id}" data-price="${l.price}">Buy</button>`}
          </div>`;
        });
      }
      
      // Sell section
      const inv=LS.get('lootInventory',[]);
      if(inv.length>0){
        html+='<div style="margin-top:12px;border-top:1px solid #333;padding-top:8px"><div style="font-size:11px;color:#c080ff;margin-bottom:6px">📦 Sell from Inventory</div>';
        inv.slice(0,12).forEach(item=>{
          const def=getAllLootableItems().find(i=>i.itemId===item.itemId)||{name:'???',icon:'❓'};
          const r=RARITIES[item.rarity]||RARITIES.common;
          html+=`<div class="inv-item" data-sell="${item.id}" data-name="${def.name}" style="border-color:${r.border}">${def.icon} <span style="color:${r.color}">${def.name}</span></div>`;
        });
        html+='</div>';
      }
      return html;
    };

    const{p}=createPopup(renderMP('all'));

    // Filter clicks
    p.querySelectorAll('.mp-filter').forEach(el=>{
      el.onclick=()=>{
        filter=el.dataset.filter;
        p.innerHTML='<span class="close-btn">&times;</span>'+renderMP(filter);
        p.querySelector('.close-btn').onclick=()=>p.closest('.popup-overlay').remove();
        attachMPHandlers(p);
      };
    });

    const attachMPHandlers=(container)=>{
      container.querySelectorAll('[data-buy]').forEach(btn=>{
        btn.onclick=async()=>{
          const price=parseInt(btn.dataset.price);
          if(!Coins.canAfford(price)){showNotification('Need more ◈!');return}
          await this.buyItem(btn.dataset.buy);
          container.closest('.popup-overlay').remove();
          this.showUI();
        };
      });
      container.querySelectorAll('[data-cancel]').forEach(btn=>{
        btn.onclick=async()=>{
          await this.cancelListing(btn.dataset.cancel);
          container.closest('.popup-overlay').remove();
          this.showUI();
        };
      });
      container.querySelectorAll('[data-sell]').forEach(el=>{
        el.onclick=()=>{
          const itemId=el.dataset.sell;
          const name=el.dataset.name;
          const price=prompt(`Sell ${name} for how many ◈? (1-9999)`);
          if(price&&parseInt(price)>=1&&parseInt(price)<=9999){
            const inv=LS.get('lootInventory',[]);
            const item=inv.find(i=>i.id===itemId);
            if(item){
              this.listItem(item,parseInt(price)).then(ok=>{
                if(ok){container.closest('.popup-overlay').remove();this.showUI()}
              });
            }
          }
        };
      });
      container.querySelectorAll('.mp-filter').forEach(el2=>{
        el2.onclick=()=>{
          filter=el2.dataset.filter;
          container.innerHTML='<span class="close-btn">&times;</span>'+renderMP(filter);
          container.querySelector('.close-btn').onclick=()=>container.closest('.popup-overlay').remove();
          attachMPHandlers(container);
        };
      });
    };
    attachMPHandlers(p);
  }
};

// Accessory rendering on visitor (aura rendered separately before avatar)
function renderVisitorAccessories(cx,v){
  const eq=LS.get('equippedAccessories',{hat:null,trail:null,aura:null,pet:null});
  const sc=3,sz=10;
  const headX=v.x,headY=v.y-sz*sc;

  // Hat (render above head)
  if(eq.hat){
    const hatItem=ACCESSORY_ITEMS.find(a=>a.id===eq.hat);
    if(hatItem&&hatItem.render){
      cx.save();
      hatItem.render(cx,headX,headY+2,S.time);
      cx.restore();
    }
  }

  // Trail (render particles when moving)
  if(eq.trail&&v.moving){
    const trailItem=ACCESSORY_ITEMS.find(a=>a.id===eq.trail);
    if(trailItem&&Math.random()<.4){
      const colors=trailItem.trailColor;
      S.particles.push({
        x:v.x+(Math.random()-.5)*8,
        y:v.y+(Math.random()-.5)*4,
        vx:(Math.random()-.5)*1.5,
        vy:-Math.random()*1.5-.5,
        life:15+Math.random()*10,
        color:colors[Math.floor(Math.random()*colors.length)],
        size:trailItem.trailSize||2
      });
    }
  }

  // Mini Pet (follows at offset)
  if(eq.pet){
    const petItem=ACCESSORY_ITEMS.find(a=>a.id===eq.pet);
    if(petItem){
      // Pet follows with a bobbing motion
      const petState=S._petState||(S._petState={x:v.x+18,y:v.y+5});
      const tgtX=v.x+18,tgtY=v.y+5;
      petState.x+=(tgtX-petState.x)*.08;
      petState.y+=(tgtY-petState.y)*.08;
      const bob=Math.sin(S.time*3)*2;
      const px=petState.x,py=petState.y+bob;

      if(eq.pet==='pet_robot'){
        // Tiny robot
        cx.fillStyle='#c0c0c0';cx.fillRect(px-4,py-8,8,6);// head
        cx.fillStyle='#ff0000';cx.fillRect(px-1,py-7,2,1);cx.fillRect(px+1,py-7,2,1);// eyes
        cx.fillStyle='#a0a0a0';cx.fillRect(px-5,py-2,10,6);// body
        cx.fillStyle='#808080';cx.fillRect(px-3,py+4,2,3);cx.fillRect(px+1,py+4,2,3);// legs
        // Antenna
        cx.fillStyle='#ffd700';cx.fillRect(px,py-11,1,3);
        cx.fillStyle=`rgba(255,215,0,${.5+Math.sin(S.time*6)*.3})`;cx.fillRect(px-1,py-12,3,2);
      }else if(eq.pet==='pet_fairy'){
        // Tiny fairy
        cx.fillStyle='#ff69b4';cx.beginPath();cx.arc(px,py-4,3,0,Math.PI*2);cx.fill();// body
        cx.fillStyle=`rgba(255,215,0,${.4+Math.sin(S.time*4)*.3})`;
        // Wings
        cx.beginPath();cx.ellipse(px-4,py-5,3,5,-.3,0,Math.PI*2);cx.fill();
        cx.beginPath();cx.ellipse(px+4,py-5,3,5,.3,0,Math.PI*2);cx.fill();
        // Sparkle trail
        if(Math.random()<.3)S.particles.push({x:px+(Math.random()-.5)*6,y:py-4,vx:(Math.random()-.5),vy:Math.random()*.5,life:12,color:'#ffd700',size:1});
      }else if(eq.pet==='pet_shadow'){
        // Shadow Clone — dark copy that follows with delay
        if(!S._shadowHistory)S._shadowHistory=[];
        S._shadowHistory.push({x:v.x,y:v.y,dir:v.dir,t:S.time});
        if(S._shadowHistory.length>30)S._shadowHistory.shift();
        const delayed=S._shadowHistory[0]||{x:v.x,y:v.y,dir:v.dir};
        const sx=delayed.x+20,sy=delayed.y;
        cx.globalAlpha=0.35;
        cx.fillStyle='#1a1a2a';
        cx.fillRect(sx-8,sy-30,16,24);// body
        cx.fillRect(sx-6,sy-36,12,8);// head
        cx.fillStyle='#4a4a6a';
        cx.fillRect(sx-4,sy-34,3,2);cx.fillRect(sx+1,sy-34,3,2);// eyes
        cx.globalAlpha=1;
        // Dark particles
        if(Math.random()<.2)S.particles.push({x:sx+(Math.random()-.5)*8,y:sy-15,vx:0,vy:-0.5,life:15,color:'rgba(26,26,42,0.6)',size:2});
      }
    }
  }

  // Void Walker skin glitch effect
  if(v.skin==='void_walker'&&S.visitor.moving){
    if(Math.random()<.4){
      const gx=v.x+(Math.random()-.5)*20,gy=v.y-15+(Math.random()-.5)*20;
      cx.fillStyle=`rgba(255,51,68,${.2+Math.random()*.3})`;
      cx.fillRect(gx,gy,Math.random()*8+2,1);
    }
  }

  // Time Warp aura rendering
  const eqLoot=LS.get('equippedLoot',{});
  const lootInvForRender=LS.get('lootInventory',[]);
  const twItem=lootInvForRender.find(i=>i.id===eqLoot.aura&&i.itemId==='aura_timewarp');
  if(twItem){
    const ripples=3;
    for(let i=0;i<ripples;i++){
      const phase=S.time*2+i*(Math.PI*2/ripples);
      const radius=15+Math.sin(phase)*8;
      const alpha=0.08+Math.sin(phase+1)*0.04;
      cx.strokeStyle=`rgba(100,180,255,${alpha})`;
      cx.lineWidth=1;
      cx.beginPath();
      cx.arc(v.x,v.y-15,radius,0,Math.PI*2);
      cx.stroke();
    }
  }

  // Phoenix Wings trail rendering
  const pwItem=lootInvForRender.find(i=>i.id===eqLoot.trail&&i.itemId==='trail_phoenix');
  if(pwItem&&v.moving){
    for(let i=0;i<3;i++){
      S.particles.push({
        x:v.x+(Math.random()-.5)*12,
        y:v.y+(Math.random()-.5)*6,
        vx:(Math.random()-.5)*2,
        vy:-Math.random()*3-1,
        life:20+Math.random()*15,
        color:['#ff2200','#ff6600','#ffaa00','#ffdd44','#ffffff'][Math.floor(Math.random()*5)],
        size:2+Math.random()*3
      });
    }
  }
}

// Lightsaber system
S._saberGreen=0;S._saberBlue=0;S._saberState='off';// off, green, blue, both, duel
S._saberDuelTimer=0;S._saberClashes=[];
S._visitorSaber=null;// null, 'green', 'blue'
S._saberSwing=0;S._saberSwingDir=0;
function swingSaber(){
  if(!S._visitorSaber||S._saberSwing>0)return;
  if(!S.audioCtx)initAudio();
  S._saberSwing=1;S._saberSwingDir=S.visitor.dir;
  playSaberSound('clash');
  S.screenShake=2;
  const col=S._visitorSaber==='green'?'#00ff44':'#4488ff';

  // Broadcast saber state to other players

function playSaberSound(type){
  if(!S.audioCtx)return;const c=S.audioCtx,n=c.currentTime,v=S.volume*.2;
  if(type==='ignite'){
    const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(80,n);o.frequency.exponentialRampToValueAtTime(220,n+.3);
    g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(v*.3,n+.3);g.gain.exponentialRampToValueAtTime(.001,n+.8);
    o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.8);
    // Hum layer
    const o2=c.createOscillator(),g2=c.createGain();o2.type='sine';o2.frequency.value=120;
    g2.gain.setValueAtTime(0,n);g2.gain.linearRampToValueAtTime(v*.15,n+.3);g2.gain.setValueAtTime(v*.15,n+2);g2.gain.exponentialRampToValueAtTime(.001,n+3);
    o2.connect(g2);g2.connect(S.masterGain);o2.start(n);o2.stop(n+3);
  }else if(type==='retract'){
    const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(220,n);o.frequency.exponentialRampToValueAtTime(60,n+.4);
    g.gain.setValueAtTime(v*.5,n);g.gain.exponentialRampToValueAtTime(.001,n+.5);
    o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.5);
  }else if(type==='clash'){
    const buf=c.createBuffer(1,c.sampleRate*.15,c.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*3)*.5;
    const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;g.gain.value=v*1.5;
    s.connect(g);g.connect(S.masterGain);s.start(n);
    const o=c.createOscillator(),g2=c.createGain();o.type='square';o.frequency.value=800+Math.random()*400;
    g2.gain.setValueAtTime(v*.3,n);g2.gain.exponentialRampToValueAtTime(.001,n+.1);
    o.connect(g2);g2.connect(S.masterGain);o.start(n);o.stop(n+.1);
  }
}
function updateSabers(dt){
  const tgt={off:[0,0],green:[1,0],blue:[0,1],both:[1,1],duel:[1,1]};
  const t=tgt[S._saberState]||[0,0];
  S._saberGreen+=(t[0]-S._saberGreen)*dt*5;S._saberBlue+=(t[1]-S._saberBlue)*dt*5;
  // Swing animation decay
  if(S._saberSwing>0){S._saberSwing-=dt*3;if(S._saberSwing<0)S._saberSwing=0}
  if(S._saberGreen<.01)S._saberGreen=0;if(S._saberBlue<.01)S._saberBlue=0;
  // Duel mode: sabers swing and clash
  if(S._saberState==='duel'){
    S._saberDuelTimer+=dt;
    if(S._saberDuelTimer>.6+Math.random()*.4){
      S._saberDuelTimer=0;
      // Clash effect
      S._saberClashes.push({x:310+85,y:72+8,life:12});
      playSaberSound('clash');
      S.screenShake=2;
      for(let i=0;i<6;i++)S.particles.push({x:310+85+Math.random()*10-5,y:72+8,vx:(Math.random()-.5)*4,vy:-Math.random()*3,life:15,color:Math.random()>.5?'#00ff44':'#4488ff',size:2});
    }
    // Render clash sparks
    for(let i=S._saberClashes.length-1;i>=0;i--){S._saberClashes[i].life--;if(S._saberClashes[i].life<=0)S._saberClashes.splice(i,1)}
  }
}

function openElevator(){
  const ov=$('#elevator-overlay');ov.className='show';
  let html='<div class="popup" style="max-width:280px"><span class="close-btn">&times;</span><h3>🛗 Elevator</h3>';
  
  // Regular floors 1-7
  for(let f=1;f<=7;f++){
    const locked=f===5&&Coins.lifetime<500;
    const current=f===S.floor&&!RoomSystem.currentRoom;
    html+=`<button class="floor-btn${current?' current':''}${locked?' locked':''}" data-floor="${f}">${current?'► ':''}F${f} — ${FLOOR_NAMES[f]}${locked?' (🔒 500◈ lifetime)':''}</button>`;
  }
  
  // Divider
  html+='<div style="border-top:1px solid #444;margin:6px 0"></div>';
  
  // My Room
  const hasRoom=RoomSystem.furniture.length>0||LS.get('userRoomName','My Room')!=='My Room';
  const f8Current=S.floor===8&&!RoomSystem.currentRoom;
  html+=`<button class="floor-btn${f8Current?' current':''}" data-floor="8" style="border-color:#c080ff">${f8Current?'► ':''}🏠 ${hasRoom?'My Room':'Create Room'}</button>`;
  
  // Visit Rooms option
  html+=`<button class="floor-btn" data-action="visit" style="border-color:#ffd700">🏘️ Visit Rooms</button>`;
  
  html+='</div>';ov.innerHTML=html;
  ov.querySelector('.close-btn').onclick=()=>{ov.className='';removeElevatorKeyNav()};
  ov.onclick=e=>{if(e.target===ov){ov.className='';removeElevatorKeyNav()}};
  
  const allBtns=[...ov.querySelectorAll('.floor-btn')];
  let menuIdx=Math.min(S.floor-1,allBtns.length-1);
  allBtns[menuIdx].classList.add('kbd-selected');
  
  function updateSelection(newIdx){
    allBtns[menuIdx].classList.remove('kbd-selected');
    menuIdx=((newIdx%allBtns.length)+allBtns.length)%allBtns.length;
    allBtns[menuIdx].classList.add('kbd-selected');
    allBtns[menuIdx].scrollIntoView({block:'nearest'});
  }
  
  function elevatorKeyHandler(e){
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){e.preventDefault();updateSelection(menuIdx-1)}
    else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){e.preventDefault();updateSelection(menuIdx+1)}
    else if(e.key==='Enter'||e.key===' '){e.preventDefault();allBtns[menuIdx].click()}
    else if(e.key==='Escape'){e.preventDefault();ov.className='';removeElevatorKeyNav()}
  }
  
  function removeElevatorKeyNav(){document.removeEventListener('keydown',elevatorKeyHandler)}
  document.addEventListener('keydown',elevatorKeyHandler);
  
  allBtns.forEach((btn,i)=>{
    btn.onmouseenter=()=>updateSelection(i);
    btn.onclick=()=>{
      removeElevatorKeyNav();
      if(btn.dataset.action==='visit'){
        RoomSystem.showRoomList();
        ov.className='';
        return;
      }
      
      const f=parseInt(btn.dataset.floor);
      if(f===5&&Coins.lifetime<500){showNotification('Need 500◈ lifetime to unlock!');return}
      if(f===8){
        RoomSystem.showBuilder();
        ov.className='';
        return;
      }
      if(f===S.floor){ov.className='';return}
      changeFloor(f);ov.className='';
    };
  });
}

function changeFloor(f){
  S.floor=f;LS.set('floor',f);
  S.echo.floor=f;S.echo.x=80;S.echo.y=300;S.echo.moving=false;
  S.pixel.floor=f;S.pixel.x=100;S.pixel.y=310;

}

  send(msg){if(this.connected&&this.ws?.readyState===1){this.ws.send(JSON.stringify({type:'chat.send',message:msg}));return true}return false},

function openArcade(game){
  $('#arcade-overlay').className='show';arcadeState='select';
  selectedGame=ARCADE_GAMES.indexOf(game);if(selectedGame<0)selectedGame=0;
  arcSelectTimer=0;arcParticles.length=0;
  const cv=$('#arcade-canvas');cv.width=ARC_W;cv.height=ARC_H;
  if(arcadeKeyHandler)document.removeEventListener('keydown',arcadeKeyHandler);
  arcadeKeyHandler=handleArcadeKeys;document.addEventListener('keydown',arcadeKeyHandler);
  cv.onclick=e=>{if(arcadeState==='select')startInsertCoin();else if(arcadeState==='gameover')startInsertCoin()};
  startArcadeRender();
}
function closeArcade(){$('#arcade-overlay').className='';if(arcadeLoop)cancelAnimationFrame(arcadeLoop);arcadeLoop=null;arcadeGame=null;if(arcadeKeyHandler){document.removeEventListener('keydown',arcadeKeyHandler);arcadeKeyHandler=null}document.onkeydown=null;document.onkeyup=null}
function handleArcadeKeys(e){
  if(arcadeState==='select'){if(e.key==='ArrowLeft'||e.key==='a'){selectedGame=(selectedGame+2)%3;ArcSnd.play('select')}else if(e.key==='ArrowRight'||e.key==='d'){selectedGame=(selectedGame+1)%3;ArcSnd.play('select')}else if(e.key==='Enter'||e.key===' ')startInsertCoin();else if(e.key==='Escape')closeArcade();e.preventDefault()}
  else if(arcadeState==='gameover'){if(arcIsHighScore&&arcInitialsInput.length<3&&e.key.length===1&&/[a-zA-Z0-9]/.test(e.key)){arcInitialsInput+=e.key.toUpperCase();if(arcInitialsInput.length===3)saveLeaderboardEntry()}else if(e.key==='Enter')startInsertCoin();else if(e.key==='Escape')closeArcade();e.preventDefault()}
  else if(arcadeState==='inserting')e.preventDefault();
}
function startInsertCoin(){if(!Coins.canAfford(1)){showNotification('Need ◈!');return}arcadeState='inserting';arcInsertTimer=0;ArcSnd.play('coin');Coins.spend(1,'arcade')}
function saveLeaderboardEntry(){const lb=arcadeLeaderboard[arcLastGame]||[];lb.push({name:arcInitialsInput||'AAA',score:arcLastScore,date:Date.now()});lb.sort((a,b)=>b.score-a.score);if(lb.length>5)lb.length=5;arcadeLeaderboard[arcLastGame]=lb;LS.set('arcadeLeaderboard',arcadeLeaderboard)}
function startArcadeRender(){const cv=$('#arcade-canvas'),cx=cv.getContext('2d');let lastT=performance.now();const frame=t=>{const dt=Math.min((t-lastT)/1000,.05);lastT=t;arcSelectTimer+=dt;cx.fillStyle='#0a0a12';cx.fillRect(0,0,ARC_W,ARC_H);
  if(arcadeState==='select')renderSelectScreen(cx);
  else if(arcadeState==='inserting'){arcInsertTimer+=dt;cx.textAlign='center';const prog=arcInsertTimer/1.2;cx.fillStyle='#ffd700';cx.font='bold 36px monospace';cx.fillText('◈',ARC_W/2,-30+prog*ARC_H*.6);if(prog>.3){cx.fillStyle='#ffd700';cx.font='bold 24px monospace';cx.fillText('INSERT COIN',ARC_W/2,ARC_H/2)}cx.textAlign='left';if(arcInsertTimer>1.2){arcadeState='playing';startArcadeGame()}}
  else if(arcadeState==='playing'&&arcadeGame){if(arcadeGame.type==='snake')updateSnake(cx,dt);else if(arcadeGame.type==='breakout')updateBreakout(cx,dt);else if(arcadeGame.type==='invaders')updateInvaders(cx,dt)}
  else if(arcadeState==='gameover'){arcGameOverTimer+=dt;renderGameOver(cx)}
  arcUpdateParticles(cx);const gc=arcadeState==='playing'?['#00ff88','#ff6ec7','#4488ff'][selectedGame]:'#00ff88';$('#arcade-glow').style.boxShadow=`0 0 80px ${gc}33`;
  arcadeLoop=requestAnimationFrame(frame)};arcadeLoop=requestAnimationFrame(frame)}
function renderSelectScreen(cx){cx.fillStyle='#00ff88';cx.font='bold 28px monospace';cx.textAlign='center';cx.shadowColor='#00ff88';cx.shadowBlur=15;cx.fillText('ECHO ARCADE',ARC_W/2,50);cx.shadowBlur=0;
  const pw=100,gap=20,sx=(ARC_W-pw*3-gap*2)/2;ARCADE_GAMES.forEach((g,i)=>{const x=sx+i*(pw+gap),y=90,sel=i===selectedGame;cx.strokeStyle=sel?'#00fff7':'#333';cx.lineWidth=sel?3:1;cx.strokeRect(x,y,pw,80);cx.fillStyle='#0a0a1a';cx.fillRect(x+1,y+1,pw-2,78);cx.fillStyle=sel?'#fff':'#888';cx.font=(sel?'bold ':'')+'12px monospace';cx.fillText(ARCADE_LABELS[i],x+pw/2,y+95)});
  cx.fillStyle='#ffd700';cx.font='11px monospace';cx.fillText('HIGH: '+(S.highScores[ARCADE_GAMES[selectedGame]]||0),ARC_W/2,210);
  cx.fillStyle='#555';cx.font='11px monospace';cx.fillText('← → SELECT   ENTER TO PLAY',ARC_W/2,280);cx.fillStyle='#ffd700';cx.font='bold 13px monospace';cx.fillText('◈ '+Coins.count,ARC_W/2,320);cx.textAlign='left'}
function startArcadeGame(){arcadeGame={type:ARCADE_GAMES[selectedGame],score:0,running:true,w:ARC_W,h:ARC_H};arcCoinsEarned=0;
  if(arcadeGame.type==='snake')initSnake(arcadeGame);else if(arcadeGame.type==='breakout')initBreakout(arcadeGame);else if(arcadeGame.type==='invaders')initInvaders(arcadeGame)}
function triggerGameOver(game,score){arcadeState='gameover';arcGameOverTimer=0;arcLastScore=score;arcLastGame=game;arcInitialsInput='';ArcSnd.play('die');
  arcCoinsEarned=Math.floor(score/10);arcIsHighScore=score>(S.highScores[game]||0);
  if(arcIsHighScore){S.highScores[game]=score;LS.set('highScores',S.highScores);Coins.earn(25,'highscore');arcCoinsEarned+=25;ArcSnd.play('highscore');checkAchievements();
    // Loot drop on high score!
    setTimeout(()=>LootSystem.drop('arcade_highscore',LootSystem.getStatBonuses().luck||0),1500);
  } else if(score>=20){
    // Small chance for loot on decent score
    const luckBonus=LootSystem.getStatBonuses().luck||0;
    if(Math.random()<0.15+luckBonus*0.005)setTimeout(()=>LootSystem.drop('arcade_win',luckBonus),1500);
  }
  if(arcCoinsEarned>0)Coins.earn(arcCoinsEarned,'arcade')}
function renderGameOver(cx){cx.textAlign='center';cx.fillStyle='#ff4444';cx.font='bold 32px monospace';cx.fillText('GAME OVER',ARC_W/2,60);cx.fillStyle='#fff';cx.font='18px monospace';cx.fillText('SCORE: '+arcLastScore,ARC_W/2,100);cx.fillStyle='#ffd700';cx.font='14px monospace';cx.fillText('HIGH: '+(S.highScores[arcLastGame]||0),ARC_W/2,125);
  if(arcIsHighScore){cx.fillStyle=Math.sin(arcGameOverTimer*8)>.0?'#ffd700':'#ff6ec7';cx.font='bold 20px monospace';cx.fillText('★ NEW HIGH SCORE! ★',ARC_W/2,155);cx.fillStyle='#00fff7';cx.font='bold 28px monospace';cx.fillText(arcInitialsInput.padEnd(3,'_').split('').join(' '),ARC_W/2,195)}
  cx.fillStyle='#ffd700';cx.font='bold 16px monospace';cx.fillText('+'+arcCoinsEarned+'◈',ARC_W/2,230);cx.fillStyle='#555';cx.font='11px monospace';cx.fillText('ENTER TO PLAY AGAIN | ESC TO EXIT',ARC_W/2,280);cx.textAlign='left'}

// -- Snake --
function initSnake(g){const GS=15,CS=Math.floor(Math.min(g.w,g.h-30)/GS);g.gs=GS;g.cs=CS;g.ox=(g.w-GS*CS)/2;g.oy=20;g.snake=[{x:7,y:7},{x:6,y:7},{x:5,y:7}];g.dir={x:1,y:0};g.nextDir={x:1,y:0};g.food=null;g.spawnFood=true;g.score=0;g.tick=0;g.speed=8;
  document.onkeydown=e=>{if(!g.running)return;if((e.key==='ArrowUp'||e.key==='w')&&g.dir.y!==1)g.nextDir={x:0,y:-1};if((e.key==='ArrowDown'||e.key==='s')&&g.dir.y!==-1)g.nextDir={x:0,y:1};if((e.key==='ArrowLeft'||e.key==='a')&&g.dir.x!==1)g.nextDir={x:-1,y:0};if((e.key==='ArrowRight'||e.key==='d')&&g.dir.x!==-1)g.nextDir={x:1,y:0};e.preventDefault()};
  // Swipe controls for mobile
  let touchStart=null;
  const acv=$('#arcade-canvas');
  acv.ontouchstart=e=>{touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault()};
  acv.ontouchmove=e=>{e.preventDefault()};
  acv.ontouchend=e=>{if(!touchStart||!g.running)return;const dx=e.changedTouches[0].clientX-touchStart.x,dy=e.changedTouches[0].clientY-touchStart.y;
    if(Math.abs(dx)>Math.abs(dy)){if(dx>20&&g.dir.x!==1)g.nextDir={x:1,y:0};else if(dx<-20&&g.dir.x!==-1)g.nextDir={x:-1,y:0}}
    else{if(dy>20&&g.dir.y!==1)g.nextDir={x:0,y:1};else if(dy<-20&&g.dir.y!==-1)g.nextDir={x:0,y:-1}}touchStart=null;e.preventDefault()}}
function updateSnake(cx,dt){const g=arcadeGame;if(!g?.running)return;g.tick++;
  if(g.spawnFood){const occ=new Set(g.snake.map(s=>s.x+','+s.y));let fx,fy;do{fx=Math.random()*g.gs|0;fy=Math.random()*g.gs|0}while(occ.has(fx+','+fy));const r=Math.random();g.food={x:fx,y:fy,type:r<.05?'star':r<.15?'golden':'apple',pts:r<.05?5:r<.15?3:1,color:r<.05?'#ffd700':r<.15?'#ffaa00':'#ff4444',timer:0};g.spawnFood=false}
  g.food&&(g.food.timer+=dt);g.speed=Math.max(3,12-Math.floor(g.snake.length/4));
  if(g.tick%g.speed===0){g.dir=g.nextDir;let h={x:g.snake[0].x+g.dir.x,y:g.snake[0].y+g.dir.y};if(h.x<0||h.x>=g.gs||h.y<0||h.y>=g.gs){g.running=false;triggerGameOver('snake',g.score);return}if(g.snake.some(s=>s.x===h.x&&s.y===h.y)){g.running=false;triggerGameOver('snake',g.score);return}g.snake.unshift(h);if(g.food&&h.x===g.food.x&&h.y===g.food.y){g.score+=g.food.pts;ArcSnd.play(g.food.type==='star'?'powerup':'eat');arcSpawnParticles(g.ox+g.food.x*g.cs+g.cs/2,g.oy+g.food.y*g.cs+g.cs/2,g.food.pts*5,g.food.color);g.spawnFood=true}else g.snake.pop()}
  cx.fillStyle='#0a0a12';cx.fillRect(0,0,g.w,g.h);for(let y=0;y<g.gs;y++)for(let x=0;x<g.gs;x++){cx.fillStyle='#111';cx.fillRect(g.ox+x*g.cs+1,g.oy+y*g.cs+1,g.cs-2,g.cs-2)}
  g.snake.forEach((s,i)=>{ctx.fillStyle=`rgb(0,${255-i/(g.snake.length)*180},${100-i/(g.snake.length)*80})`;cx.fillStyle=ctx.fillStyle;cx.fillRect(g.ox+s.x*g.cs+1,g.oy+s.y*g.cs+1,g.cs-2,g.cs-2)});
  if(g.food){cx.fillStyle=g.food.color;cx.fillRect(g.ox+g.food.x*g.cs+2,g.oy+g.food.y*g.cs+2,g.cs-4,g.cs-4)}
  cx.fillStyle='#0f0';cx.font='bold 12px monospace';cx.textAlign='left';cx.fillText('SCORE: '+g.score,8,14);cx.fillStyle='#ffd700';cx.textAlign='right';cx.fillText('HI: '+(S.highScores.snake||0),g.w-8,14);cx.textAlign='left'}

// -- Breakout --
function initBreakout(g){g.pw=70;g.ph=10;g.px=(g.w-g.pw)/2;g.py=g.h-40;g.balls=[{x:g.w/2,y:g.py-10,dx:2.5,dy:-2.5,trail:[]}];g.score=0;g.lives=3;g.level=1;g.bricks=[];g.powerups=[];g.activePowers={};
  for(let r=0;r<5;r++)for(let c=0;c<10;c++)g.bricks.push({x:4+c*41,y:30+r*18,w:39,h:16,hp:r<2?1:r<4?2:3,alive:true,color:['#ff4444','#ff4444','#ff8844','#ff8844','#ffdd44'][r]});
  document.onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='a')g._left=true;if(e.key==='ArrowRight'||e.key==='d')g._right=true;e.preventDefault()};
  document.onkeyup=e=>{if(e.key==='ArrowLeft'||e.key==='a')g._left=false;if(e.key==='ArrowRight'||e.key==='d')g._right=false};
  // Touch: drag to move paddle
  const acv=$('#arcade-canvas');
  acv.ontouchmove=e=>{e.preventDefault();const rect=acv.getBoundingClientRect(),tx=(e.touches[0].clientX-rect.left)/rect.width*g.w;g.px=Math.max(0,Math.min(g.w-g.pw,tx-g.pw/2))};
  acv.ontouchstart=e=>e.preventDefault()}
function updateBreakout(cx,dt){const g=arcadeGame;if(!g?.running)return;
  if(g._left)g.px=Math.max(0,g.px-6);if(g._right)g.px=Math.min(g.w-g.pw,g.px+6);
  const pw=g.activePowers?.wide?g.pw*1.5:g.pw;Object.keys(g.activePowers||{}).forEach(k=>{g.activePowers[k]-=dt;if(g.activePowers[k]<=0)delete g.activePowers[k]});
  const speed=2.5+g.level*.3;
  g.balls=g.balls.filter(ball=>{ball.x+=ball.dx;ball.y+=ball.dy;const mag=Math.hypot(ball.dx,ball.dy);if(mag>0){ball.dx=ball.dx/mag*speed;ball.dy=ball.dy/mag*speed}
    if(ball.x<5){ball.x=5;ball.dx=Math.abs(ball.dx)}if(ball.x>g.w-5){ball.x=g.w-5;ball.dx=-Math.abs(ball.dx)}if(ball.y<5){ball.y=5;ball.dy=Math.abs(ball.dy)}
    if(ball.y>g.h){g.lives--;ArcSnd.play('die');if(g.lives<=0){g.running=false;triggerGameOver('breakout',g.score);return false}ball.x=g.px+pw/2;ball.y=g.py-10;ball.dx=2;ball.dy=-2.5;return true}
    if(ball.dy>0&&ball.y>=g.py-4&&ball.y<=g.py+4&&ball.x>=g.px-2&&ball.x<=g.px+pw+2){ball.dy=-Math.abs(ball.dy);ball.dx+=((ball.x-(g.px+pw/2))/(pw/2))*2;ArcSnd.play('paddle')}
    g.bricks.forEach(b=>{if(!b.alive)return;if(ball.x>b.x&&ball.x<b.x+b.w&&ball.y>b.y&&ball.y<b.y+b.h){b.hp--;if(b.hp<=0){b.alive=false;g.score++;ArcSnd.play('hit');arcSpawnParticles(b.x+b.w/2,b.y+b.h/2,8,b.color)}else{ArcSnd.play('hit')}ball.dy*=-1}});return true});
  if(g.balls.length===0&&g.lives>0)g.balls.push({x:g.px+pw/2,y:g.py-10,dx:2,dy:-2.5,trail:[]});
  if(g.bricks.every(b=>!b.alive)){g.level++;ArcSnd.play('levelup');Coins.earn(1,'breakout-lvl');arcCoinsEarned++;if(g.level>5){g.running=false;triggerGameOver('breakout',g.score);return}for(let r=0;r<5;r++)for(let c=0;c<10;c++)g.bricks.push({x:4+c*41,y:30+r*18,w:39,h:16,hp:Math.min(3,1+Math.floor(r/2)),alive:true,color:['#ff4444','#ff8844','#ffdd44','#44ff88','#4488ff'][r]});g.balls=[{x:g.w/2,y:g.py-10,dx:2,dy:-2.5,trail:[]}]}
  cx.fillStyle='#0a0a12';cx.fillRect(0,0,g.w,g.h);g.bricks.forEach(b=>{if(!b.alive)return;cx.fillStyle=b.color;cx.fillRect(b.x,b.y,b.w,b.h)});
  cx.fillStyle='#fff';cx.fillRect(g.px,g.py,pw,g.ph);
  g.balls.forEach(b=>{cx.fillStyle='#ff0';cx.beginPath();cx.arc(b.x,b.y,5,0,Math.PI*2);cx.fill()});
  cx.fillStyle='#fff';cx.font='bold 11px monospace';cx.textAlign='left';cx.fillText('SCORE:'+g.score,8,16);cx.fillStyle='#ff4444';cx.textAlign='right';let l='';for(let i=0;i<g.lives;i++)l+='♥';cx.fillText(l,g.w-8,16);cx.textAlign='left'}

// -- Invaders --
function initInvaders(g){g.px=g.w/2-12;g.py=g.h-35;g.pw=24;g.bullets=[];g.eBullets=[];g.score=0;g.lives=3;g.wave=1;g.tick=0;g.eShootTimer=0;
  g.enemies=[];g.edir=1;g.eSpeed=1;spawnWave(g,1);
  g.shields=[];for(let i=0;i<4;i++)for(let r=0;r<3;r++)for(let c=0;c<5;c++)g.shields.push({x:60+i*90+c*6,y:g.h-70+r*6,w:5,h:5,hp:3});
  document.onkeydown=e=>{if(e.key==='ArrowLeft'||e.key==='a')g._left=true;if(e.key==='ArrowRight'||e.key==='d')g._right=true;if(e.key===' '&&g.bullets.length<3){g.bullets.push({x:g.px+g.pw/2,y:g.py-2});ArcSnd.play('shoot')}e.preventDefault()};
  document.onkeyup=e=>{if(e.key==='ArrowLeft'||e.key==='a')g._left=false;if(e.key==='ArrowRight'||e.key==='d')g._right=false};
  // Touch: tap left/right to move, center to shoot
  const acv=$('#arcade-canvas');
  acv.ontouchstart=e=>{e.preventDefault();const rect=acv.getBoundingClientRect(),tx=(e.touches[0].clientX-rect.left)/rect.width;
    if(tx<.35)g._left=true;else if(tx>.65)g._right=true;else if(g.bullets.length<3){g.bullets.push({x:g.px+g.pw/2,y:g.py-2});ArcSnd.play('shoot')}};
  acv.ontouchend=e=>{e.preventDefault();g._left=false;g._right=false}}
function spawnWave(g,w){g.enemies=[];const cols=Math.min(8+Math.floor(w/3),10);for(let r=0;r<5;r++)for(let c=0;c<cols;c++)g.enemies.push({x:20+c*38,y:40+r*28,w:28,h:20,alive:true,row:r,frame:0,frameTimer:0,pts:(5-r)*10,color:['#ff4444','#ff8844','#ffdd44','#44ff88','#4488ff'][r]});g.edir=1;g.eSpeed=1+w*.15;g.eShootTimer=0}
function updateInvaders(cx,dt){const g=arcadeGame;if(!g?.running)return;g.tick++;
  if(g._left)g.px=Math.max(0,g.px-4);if(g._right)g.px=Math.min(g.w-g.pw,g.px+4);
  g.bullets=g.bullets.filter(b=>{b.y-=6;return b.y>-10});
  const alive=g.enemies.filter(e=>e.alive);alive.forEach(e=>{e.frameTimer+=dt;if(e.frameTimer>.5){e.frame=1-e.frame;e.frameTimer=0}});
  const mr=Math.max(1,30-Math.floor((g.enemies.length-alive.length)/3));if(g.tick%mr===0){let edge=false;alive.forEach(e=>{e.x+=g.edir*8*g.eSpeed;if(e.x<5||e.x+e.w>g.w-5)edge=true});if(edge){g.edir*=-1;alive.forEach(e=>{e.y+=8;if(e.y+e.h>=g.py){g.running=false;triggerGameOver('invaders',g.score);return}})}}
  g.eShootTimer+=dt;if(g.eShootTimer>=Math.max(.5,2-g.wave*.15)&&alive.length>0){g.eShootTimer=0;const sh=alive[Math.random()*alive.length|0];g.eBullets.push({x:sh.x+sh.w/2,y:sh.y+sh.h,dy:3+g.wave*.3})}
  g.eBullets=g.eBullets.filter(b=>{b.y+=b.dy;return b.y<g.h+10});
  g.bullets.forEach(b=>{alive.forEach(e=>{if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){e.alive=false;g.score+=e.pts;b.y=-100;ArcSnd.play('explode');arcSpawnParticles(e.x+e.w/2,e.y+e.h/2,12,e.color)}})});
  g.eBullets.forEach(b=>{if(b.y>=g.py&&b.y<=g.py+12&&b.x>=g.px&&b.x<=g.px+g.pw){g.lives--;b.y=9999;ArcSnd.play('die');if(g.lives<=0){g.running=false;triggerGameOver('invaders',g.score)}}});
  g.shields=g.shields.filter(s=>{if(s.hp<=0)return false;g.bullets.forEach(b=>{if(b.x>s.x&&b.x<s.x+s.w&&b.y>s.y&&b.y<s.y+s.h){s.hp--;b.y=-100}});g.eBullets.forEach(b=>{if(b.x>s.x&&b.x<s.x+s.w&&b.y>s.y&&b.y<s.y+s.h){s.hp--;b.y=9999}});return s.hp>0});
  if(alive.length===0){g.wave++;Coins.earn(1,'wave');arcCoinsEarned++;ArcSnd.play('levelup');spawnWave(g,g.wave)}
  cx.fillStyle='#0a0a12';cx.fillRect(0,0,g.w,g.h);
  g.shields.forEach(s=>{cx.fillStyle=`rgba(0,255,136,${s.hp/3})`;cx.fillRect(s.x,s.y,s.w,s.h)});
  alive.forEach(e=>{cx.fillStyle=e.color;cx.fillRect(e.x+4,e.y,e.w-8,e.h-4);cx.fillStyle='#fff';cx.fillRect(e.x+8,e.y+4,3,3);cx.fillRect(e.x+17,e.y+4,3,3)});
  cx.fillStyle='#00ff88';cx.fillRect(g.px,g.py,g.pw,10);cx.fillRect(g.px+g.pw/2-3,g.py-5,6,5);
  cx.fillStyle='#ff0';g.bullets.forEach(b=>cx.fillRect(b.x-1,b.y,2,8));
  cx.fillStyle='#f44';g.eBullets.forEach(b=>cx.fillRect(b.x-1,b.y,3,6));
  cx.fillStyle='#fff';cx.font='bold 11px monospace';cx.textAlign='left';cx.fillText('SCORE:'+g.score,8,14);cx.fillStyle='#00fff7';cx.textAlign='center';cx.fillText('WAVE '+g.wave,g.w/2,14);cx.fillStyle='#ff4444';cx.textAlign='right';let l='';for(let i=0;i<g.lives;i++)l+='▲';cx.fillText(l,g.w-8,14);cx.textAlign='left'}
