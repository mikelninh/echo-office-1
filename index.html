<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a14;color:#f0e8d8;font-family:'Courier New',monospace;overflow:hidden;height:100vh;width:100vw;user-select:none;display:flex;align-items:center;justify-content:center}
#loader{position:fixed;inset:0;z-index:20000;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .8s}
#loader.done{opacity:0;pointer-events:none}
#loader h1{font-size:28px;color:#fff;letter-spacing:6px;text-shadow:0 0 30px #9b59b6}
#load-bar-wrap{width:180px;height:8px;background:#1a1a2a;border:1px solid #333;margin-top:16px}
#load-bar{width:0%;height:100%;background:linear-gradient(90deg,#9b59b6,#ff6ec7,#00fff7);transition:width .15s}
#load-tip{color:#666;font-size:11px;margin-top:12px}
#game-wrap{position:relative;display:flex;gap:0}
canvas{display:block;image-rendering:pixelated;background:#1a1418}
#hud{position:absolute;top:8px;right:8px;z-index:50;display:flex;gap:6px;align-items:center}
.hud-btn{width:32px;height:32px;background:rgba(10,10,20,.85);border:2px solid #444;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:border-color .2s}
.hud-btn:hover{border-color:#00fff7}
.hud-btn.active{border-color:#ff6ec7;background:rgba(255,110,199,.15)}
#coin-hud{position:absolute;top:8px;left:8px;z-index:50;display:flex;align-items:center;gap:5px;background:rgba(10,10,20,.85);border:2px solid #554400;border-radius:8px;padding:5px 12px;font-size:15px;color:#ffd700;font-weight:bold;cursor:pointer;transition:border-color .2s}
#coin-hud:hover{border-color:#ffd700}
#floor-hud{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(10,10,20,.85);border:2px solid #9b59b6;border-radius:8px;padding:5px 14px;font-size:13px;color:#c080ff;font-weight:bold}
#interact-prompt{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(10,10,20,.9);border:2px solid #ffd080;border-radius:8px;padding:6px 14px;font-size:12px;color:#ffd080;display:none;white-space:nowrap;pointer-events:none}
#volume-ctrl{position:absolute;top:44px;left:8px;z-index:50;display:flex;align-items:center;gap:4px}
#volume-ctrl span{font-size:11px}
#vol-slider{width:60px;height:4px;-webkit-appearance:none;background:#333;outline:none;border-radius:2px}
#vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:#00fff7;border-radius:50%;cursor:pointer}
#caffeine-hud{position:absolute;top:44px;right:8px;z-index:50;font-size:10px;color:#f0a030}
#mood-hud{position:absolute;bottom:14px;left:8px;z-index:50;font-size:11px;color:#ddd;background:rgba(10,10,20,.8);border:1px solid #444;border-radius:6px;padding:3px 10px;pointer-events:none}
#speech-bubble{position:absolute;z-index:200;background:rgba(255,255,255,.95);border:2px solid #9b59b6;border-radius:12px;padding:10px 14px;font-size:11px;color:#222;max-width:260px;display:none;pointer-events:none;line-height:1.4}
#speech-bubble::after{content:'';position:absolute;bottom:-8px;left:20px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid #9b59b6}
.obj-highlight{position:absolute;z-index:60;border:2px solid #ffd080;border-radius:4px;pointer-events:none;animation:objPulse 1s ease-in-out infinite alternate;font-size:9px;color:#ffd080;text-align:center;padding-top:2px;background:rgba(255,208,128,.08)}
@keyframes objPulse{from{opacity:.4;transform:scale(.98)}to{opacity:1;transform:scale(1.02)}}
#chat-panel{width:260px;height:100%;background:rgba(10,10,20,.95);border-left:2px solid #333;display:flex;flex-direction:column;font-size:11px;flex-shrink:0}
#chat-title{padding:8px 12px;background:rgba(138,43,226,.3);font-size:12px;color:#00fff7;cursor:pointer}
#chat-log{flex:1;overflow-y:auto;padding:6px 10px;line-height:1.5}
#chat-log::-webkit-scrollbar{width:4px}
#chat-log::-webkit-scrollbar-thumb{background:#333}
.chat-msg{margin-bottom:4px}.chat-msg .name{font-weight:bold}
#chat-input-wrap{display:flex;border-top:1px solid #333}
#chat-input{flex:1;background:transparent;border:none;color:#ddd;padding:8px 10px;font-family:inherit;font-size:11px;outline:none}
#chat-send{background:#9b59b6;color:#fff;border:none;padding:6px 12px;cursor:pointer;font-family:inherit;font-size:11px}
#chat-suggestions{padding:4px 8px;display:flex;flex-wrap:wrap;gap:0}
.suggest-chip{border-radius:15px;padding:4px 10px;font-size:10px;background:rgba(255,180,80,.12);border:1px solid rgba(255,180,80,.25);color:#ffcc88;cursor:pointer;margin:2px;font-family:inherit;transition:background .2s}
.suggest-chip:hover{background:rgba(255,180,80,.3)}
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:5000;display:flex;align-items:center;justify-content:center}
.popup{background:#1a1a2e;border:3px solid #9b59b6;border-radius:10px;padding:18px;max-width:420px;width:90%;color:#ddd;position:relative;font-size:12px;max-height:80vh;overflow-y:auto}
.popup h3{color:#00fff7;margin-bottom:8px;font-size:15px}
.popup .close-btn{position:absolute;top:6px;right:10px;cursor:pointer;font-size:18px;color:#888;z-index:1}.popup .close-btn:hover{color:#fff}
.drink-btn{display:inline-block;padding:5px 12px;margin:4px;background:#2a2a4a;border:1px solid #00fff7;color:#00fff7;cursor:pointer;font-family:inherit;font-size:11px;border-radius:4px}
.drink-btn:hover{background:#3a3a5a}
#elevator-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:7000;align-items:center;justify-content:center}
#elevator-overlay.show{display:flex}
.floor-btn{display:block;width:220px;padding:12px 18px;margin:6px auto;background:#1a1a2e;border:2px solid #555;border-radius:8px;color:#ddd;cursor:pointer;font-family:inherit;font-size:13px;text-align:left;transition:all .2s}
.floor-btn:hover,.floor-btn.kbd-selected{border-color:#00fff7;background:#2a2a4e;box-shadow:0 0 12px rgba(0,255,247,.3)}
.drink-btn.kbd-selected{border-color:#ff6ec7;background:#3a3a5a;box-shadow:0 0 10px rgba(255,110,199,.3)}
.skin-card.kbd-selected{border-color:#00fff7;box-shadow:0 0 12px rgba(0,255,247,.4)}
.floor-btn.current{border-color:#ff6ec7;background:rgba(255,110,199,.15)}
.floor-btn.locked{opacity:.4;cursor:not-allowed}
#arcade-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:6000;flex-direction:column;align-items:center;justify-content:center}
#arcade-overlay.show{display:flex}
#arcade-crt{position:relative;width:420px;max-width:95vw;aspect-ratio:4/3.5;background:#111;border-radius:24px;box-shadow:0 0 60px rgba(0,255,136,.15),0 0 120px rgba(0,0,0,.8),inset 0 0 40px rgba(0,0,0,.5);border:6px solid #222;overflow:hidden}
#arcade-crt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:10;border-radius:18px}
#arcade-crt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,.4) 100%);pointer-events:none;z-index:11;border-radius:18px}
#arcade-canvas{width:100%;height:100%;display:block;image-rendering:pixelated}
#arcade-close{position:absolute;top:10px;right:16px;font-size:28px;color:#555;cursor:pointer;z-index:20;transition:color .2s}
#arcade-close:hover{color:#ff6ec7}
#arcade-glow{position:absolute;inset:-20px;border-radius:40px;pointer-events:none;z-index:-1;transition:box-shadow .3s}
.achievement{display:flex;align-items:center;gap:8px;padding:8px;margin:4px 0;background:rgba(30,30,50,.8);border-radius:6px;border:1px solid #333}
.achievement.unlocked{border-color:#f0a030;background:rgba(50,40,20,.5)}
.achievement .badge{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:22px;filter:grayscale(1);opacity:.4}
.achievement.unlocked .badge{filter:none;opacity:1}
.achievement .info{font-size:11px}.achievement .info .title{color:#00fff7;font-weight:bold}
.skin-card{display:inline-flex;flex-direction:column;align-items:center;width:70px;height:80px;margin:4px;cursor:pointer;border:2px solid #333;border-radius:8px;padding:6px;font-size:10px;color:#aaa;transition:border-color .2s}
.skin-card:hover,.skin-card.active{border-color:#ff6ec7}
.skin-card .icon{font-size:28px;margin-bottom:4px}
.skin-card .lock{font-size:8px;color:#ffd700}
.notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9000;background:rgba(20,20,40,.95);border:2px solid #f0a030;border-radius:8px;padding:8px 18px;color:#ffd080;font-size:13px;animation:notifIn .3s ease,notifOut .3s ease 2.7s forwards;pointer-events:none}
@keyframes notifIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes notifOut{to{opacity:0;transform:translateX(-50%) translateY(-20px)}}
.coin-float{position:fixed;font-family:monospace;font-size:14px;font-weight:bold;color:#ffd700;pointer-events:none;z-index:700;animation:coinFloat 1.5s ease forwards}
@keyframes coinFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}
/* Virtual Joystick for Mobile */
#virtual-joystick{position:fixed;bottom:20px;left:20px;width:80px;height:80px;z-index:9000;touch-action:none;display:none}
#joystick-base{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);position:relative}
#joystick-knob{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.6);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:all .1s ease}

/* Action Buttons for Mobile */
#action-buttons{position:fixed;bottom:20px;right:20px;z-index:9000;display:none;flex-direction:column;gap:10px}
.action-btn{width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.4);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;touch-action:none;-webkit-tap-highlight-color:transparent}
.action-btn:active{background:rgba(255,255,255,.4);transform:scale(.95)}

/* Mobile Chat Drawer */
#chat-drawer-toggle{display:none;position:fixed;bottom:0;left:0;right:0;height:30px;background:rgba(10,10,20,.95);border-top:2px solid #333;color:#00fff7;z-index:100;cursor:pointer;align-items:center;justify-content:center}
#chat-drawer-toggle::before{content:'💬 Echo\'s Chat - Tap to expand'}

/* Welcome Wardrobe Popup */
#welcome-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:8000;display:flex;align-items:center;justify-content:center}
#welcome-popup{background:#1a1a2e;border:3px solid #9b59b6;border-radius:12px;padding:24px;max-width:400px;width:90%;color:#ddd;text-align:center}
#welcome-popup h2{color:#00fff7;margin-bottom:6px;font-size:20px}
#welcome-popup .subtitle{color:#c080ff;font-size:11px;margin-bottom:16px}
#welcome-popup input[type="text"]{width:80%;background:#111;border:2px solid #555;color:#fff;padding:8px 12px;font-family:inherit;font-size:14px;border-radius:6px;text-align:center;outline:none;margin:8px 0}
#welcome-popup input[type="text"]:focus{border-color:#00fff7}
.welcome-skins{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin:12px 0}
.welcome-skin{width:60px;height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px solid #333;border-radius:8px;padding:4px;transition:all .2s}
.welcome-skin:hover{border-color:#c080ff}
.welcome-skin.selected{border-color:#00fff7;background:rgba(0,255,247,.1);box-shadow:0 0 12px rgba(0,255,247,.3)}
.welcome-skin .ws-icon{font-size:24px}
.welcome-skin .ws-label{font-size:8px;color:#aaa;margin-top:2px}
#welcome-go{display:inline-block;padding:10px 32px;margin-top:12px;background:linear-gradient(135deg,#9b59b6,#ff6ec7);border:none;color:#fff;cursor:pointer;font-family:inherit;font-size:14px;font-weight:bold;border-radius:8px;transition:transform .2s,box-shadow .2s}
#welcome-go:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,110,199,.4)}
/* Room Info HUD */
#room-info-hud{position:absolute;top:38px;left:50%;transform:translateX(-50%);z-index:50;background:rgba(10,10,20,.9);border:2px solid #c080ff;border-radius:8px;padding:4px 14px;font-size:11px;color:#ddd;display:none;white-space:nowrap;max-width:90%}
/* Tip popup */
.tip-slider{width:80%;margin:8px auto;display:block;-webkit-appearance:none;background:#333;height:6px;border-radius:3px;outline:none}
.tip-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#ffd700;border-radius:50%;cursor:pointer}
#scanlines{position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.015) 2px,rgba(0,0,0,.015) 4px)}
/* Shop tabs */
.shop-tabs{display:flex;gap:2px;margin-bottom:10px;border-bottom:2px solid #333}
.shop-tab{flex:1;padding:6px 4px;text-align:center;cursor:pointer;font-size:10px;font-family:inherit;color:#888;background:rgba(30,30,50,.5);border:1px solid #333;border-bottom:none;border-radius:6px 6px 0 0;transition:all .2s}
.shop-tab:hover{color:#ddd;background:rgba(50,50,80,.5)}
.shop-tab.active{color:#00fff7;background:rgba(0,255,247,.1);border-color:#00fff7}
.shop-content{min-height:160px;max-height:300px;overflow-y:auto}
.acc-card{display:inline-flex;flex-direction:column;align-items:center;width:80px;height:90px;margin:3px;cursor:pointer;border:2px solid #333;border-radius:8px;padding:4px;font-size:9px;color:#aaa;transition:border-color .2s;background:rgba(20,20,40,.5)}
.acc-card:hover{border-color:#ff6ec7}
.acc-card.owned{border-color:#4a4a6a}
.acc-card.equipped{border-color:#00fff7;background:rgba(0,255,247,.08)}
.acc-card .acc-icon{font-size:22px;margin-bottom:2px}
.acc-card .acc-price{font-size:8px;color:#ffd700}
.inv-section{margin:8px 0;padding:8px;background:rgba(20,20,40,.5);border-radius:6px;border:1px solid #333}
.inv-section h4{color:#c080ff;font-size:11px;margin-bottom:6px}
.inv-item{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;margin:2px;background:rgba(30,30,50,.5);border:1px solid #444;border-radius:4px;font-size:10px;cursor:pointer;transition:border-color .2s}
.inv-item:hover{border-color:#00fff7}
.inv-item.equipped{border-color:#ff6ec7;background:rgba(255,110,199,.1)}
.daily-reward{text-align:center;padding:16px}
.daily-reward .reward-amount{font-size:32px;color:#ffd700;font-weight:bold;animation:rewardPulse 1s ease infinite}
@keyframes rewardPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* Responsive Layout */
@media(max-width:900px){
  #game-wrap{flex-direction:column;height:100vh}
  canvas{width:100%!important;height:calc(100vh - 200px)!important}
  #chat-panel{width:100%;height:170px;border-left:none;border-top:2px solid #333;transform:translateY(100%);transition:transform .3s ease}
  #chat-panel.expanded{transform:translateY(0)}
  #chat-drawer-toggle{display:flex}
  #virtual-joystick,#action-buttons{display:flex}
  #hud{flex-wrap:wrap;max-width:200px}
  #elevator-overlay{padding:10px}
  .floor-btn{width:90%;max-width:320px}
  .popup{max-width:95vw;max-height:80vh}
  #chat-panel.expanded{height:40vh}
}

/* Rarity System */
.rarity-common{border-color:#666!important}
.rarity-uncommon{border-color:#22aa22!important}
.rarity-rare{border-color:#2266dd!important}
.rarity-epic{border-color:#9922dd!important;box-shadow:0 0 8px rgba(187,68,255,.3)}
.rarity-legendary{border-color:#dd8800!important;box-shadow:0 0 10px rgba(255,170,0,.4)}
.rarity-mythic{border-color:#dd1122!important;box-shadow:0 0 12px rgba(255,51,68,.5)}
.rarity-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-weight:bold;letter-spacing:.5px}
.rarity-badge.common{background:rgba(170,170,170,.2);color:#aaa}
.rarity-badge.uncommon{background:rgba(68,204,68,.15);color:#44cc44}
.rarity-badge.rare{background:rgba(68,136,255,.15);color:#4488ff}
.rarity-badge.epic{background:rgba(187,68,255,.15);color:#bb44ff}
.rarity-badge.legendary{background:rgba(255,170,0,.15);color:#ffaa00}
.rarity-badge.mythic{background:rgba(255,51,68,.15);color:#ff3344}
.loot-only-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:7px;font-weight:bold;background:rgba(255,51,68,.2);color:#ff6677;border:1px solid rgba(255,51,68,.3)}
@keyframes shimmerEpic{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer-epic{position:relative;overflow:hidden}
.shimmer-epic::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 30%,rgba(187,68,255,.08) 50%,transparent 70%);background-size:200% 100%;animation:shimmerEpic 3s ease-in-out infinite;pointer-events:none}
.shimmer-legendary::after{background:linear-gradient(90deg,transparent 30%,rgba(255,170,0,.1) 50%,transparent 70%)!important;background-size:200% 100%;animation:shimmerEpic 2.5s ease-in-out infinite}
.shimmer-mythic::after{background:linear-gradient(90deg,transparent 20%,rgba(255,51,68,.12) 40%,rgba(255,170,0,.08) 60%,transparent 80%)!important;background-size:200% 100%;animation:shimmerEpic 2s ease-in-out infinite}
/* Loot Card Popup */
.loot-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:8500;display:flex;align-items:center;justify-content:center;animation:lootFadeIn .3s ease}
@keyframes lootFadeIn{from{opacity:0}to{opacity:1}}
.loot-card{width:240px;padding:20px;border-radius:14px;text-align:center;border:3px solid #666;background:#1a1a2e;position:relative;animation:lootCardIn .6s cubic-bezier(.18,.89,.32,1.28);transform-origin:center}
@keyframes lootCardIn{0%{transform:scale(0) rotateY(180deg);opacity:0}50%{transform:scale(1.1) rotateY(0deg);opacity:1}100%{transform:scale(1) rotateY(0deg)}}
.loot-card .loot-icon{font-size:48px;margin:8px 0}
.loot-card .loot-name{font-size:16px;font-weight:bold;margin:6px 0}
.loot-card .loot-stats{margin:8px 0;text-align:left}
.loot-card .loot-stat{display:flex;align-items:center;gap:4px;font-size:11px;margin:3px 8px;color:#ddd}
.loot-card .loot-stat .stat-bar{flex:1;height:4px;background:#333;border-radius:2px;overflow:hidden}
.loot-card .loot-stat .stat-fill{height:100%;border-radius:2px;transition:width .5s ease}
.loot-card .loot-close{margin-top:12px;padding:6px 20px;background:rgba(255,255,255,.1);border:1px solid #555;color:#ddd;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px}
.loot-card .loot-close:hover{background:rgba(255,255,255,.2)}
/* Item Card */
.item-card{display:inline-flex;flex-direction:column;align-items:center;width:90px;min-height:105px;margin:3px;padding:6px;border:2px solid #333;border-radius:8px;font-size:9px;color:#aaa;background:rgba(20,20,40,.6);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.item-card:hover{transform:translateY(-2px)}
.item-card .ic-icon{font-size:26px;margin:2px 0}
.item-card .ic-name{font-weight:bold;color:#ddd;margin:2px 0;text-align:center}
.item-card .ic-stats{font-size:8px;color:#888;margin-top:2px}
.item-card .ic-equipped{position:absolute;top:2px;right:2px;font-size:8px;color:#00fff7}
.item-card .ic-price{font-size:9px;color:#ffd700;margin-top:auto}
/* Marketplace */

</style>
</head>
<body>
<div id="loader"><h1>ECHO'S STATION</h1><div id="load-bar-wrap"><div id="load-bar"></div></div><div id="load-tip">Loading cozy vibes...</div></div>
<div id="scanlines"></div>
<div id="game-wrap">
  <div style="position:relative;flex-shrink:0">
    <canvas id="game" width="800" height="600"></canvas>
    <div id="hud">
      <div class="hud-btn" id="btn-shop" title="Item Shop">🛒</div>
      <div class="hud-btn" id="btn-inventory" title="Inventory">🎒</div>
      <div class="hud-btn" id="btn-spacewalk" title="Spacewalk EVA">🚀</div>
      <div class="hud-btn" id="btn-visitor-skin" title="Visitor Wardrobe">👔</div>
      <div class="hud-btn" id="btn-skin" title="Echo Wardrobe">🔮</div>
      <div class="hud-btn" id="btn-trophy" title="Achievements">🏆</div>
      <div class="hud-btn" id="btn-music" title="Music">🎵</div>
    </div>
    <div id="coin-hud">◈ <span id="coin-count">0</span></div>
    <div id="players-hud" style="position:absolute;top:8px;left:130px;z-index:50;display:flex;align-items:center;gap:5px;background:rgba(10,10,20,.85);border:2px solid #00fff7;border-radius:8px;padding:5px 12px;font-size:13px;color:#00fff7;font-weight:bold">👥 <span id="player-count">1</span></div>
    <div id="floor-hud">F1 · Echo's Quarters</div>
    <div id="volume-ctrl"><span>🔊</span><input type="range" id="vol-slider" min="0" max="100" value="30"></div>
    <div id="caffeine-hud"></div>
    <div id="interact-prompt">Press SPACE to interact</div>
    <div id="mood-hud">😊 Happy</div>
    <div id="room-info-hud"></div>
    <div id="speech-bubble"></div>
    <!-- Virtual Joystick for Mobile -->

      <div id="joystick-base">
        <div id="joystick-knob"></div>
      </div>
    </div>
    
    <!-- Action Buttons for Mobile -->
    <div id="action-buttons">
      <div class="action-btn" id="btn-saber-switch" style="display:none">🔄</div>
      <div class="action-btn" id="btn-saber-swing" style="display:none">🗡️</div>
      <div class="action-btn" id="btn-interact">⚡</div>
    </div>
  </div>
  
  <!-- Mobile Chat Drawer Toggle -->
  <div id="chat-drawer-toggle"></div>
  
  <div id="chat-panel">
    <div id="chat-title">💬 Echo's Chat</div>
    <div id="chat-log"></div>
    <div id="chat-input-wrap"><input id="chat-input" placeholder="Say something..." maxlength="200"><button id="chat-send">▶</button></div>
    <div id="chat-suggestions"></div>
  </div>
</div>
<div id="elevator-overlay"></div>
<div id="arcade-overlay"><div id="arcade-close">✕</div><div id="arcade-glow"></div><div id="arcade-crt"><div id="arcade-screen"><canvas id="arcade-canvas" width="420" height="380"></canvas></div></div></div>

<script>
(()=>{
'use strict';
/* ═══════════════════════════════════════════════════════════════
   ECHO'S STATION v13 — THE DREAM BUILD
   A 5-floor space station with Echo, Pixel, and infinite vibes
   ═══════════════════════════════════════════════════════════════ */

const $=s=>document.querySelector(s);
const LS={get:(k,d)=>{try{const v=localStorage.getItem('echo13_'+k);return v?JSON.parse(v):d}catch{return d}},set:(k,v)=>{try{localStorage.setItem('echo13_'+k,JSON.stringify(v))}catch{}}};

// ═══════════════════════════════════════
// §1. CANVAS & CONSTANTS
// ═══════════════════════════════════════
const canvas=$('#game'),ctx=canvas.getContext('2d');
const W=800,H=600;
const COL={floorBase:'#6a5548',floorLight:'#7a6558',floorDark:'#5a4538',purple:'#9b59b6',pink:'#ff6ec7',cyan:'#00fff7',amber:'#f0a030',warm:'#ffd080'};

// ═══════════════════════════════════════
// §2. GAME STATE (S)
// ═══════════════════════════════════════
const S={
  floor:LS.get('floor',1),
  echo:{x:400,y:450,dir:0,frame:0,frameTimer:0,moving:false,skin:LS.get('echoSkin','classic'),sitting:false,interacting:false,transforming:false,transformTimer:0,transformSkin:null,floor:1},
  pixel:{x:430,y:460,dir:0,frame:0,frameTimer:0,state:'idle',stateTimer:0,targetX:430,targetY:460,floor:1},
  visitor:{x:350,y:480,dir:0,frame:0,frameTimer:0,moving:false,skin:LS.get('visitorSkin','hooded')},
  keys:{},useVisitor:false,
  nearObject:null,hoverObject:null,hoverEcho:false,hoverPixel:false,
  musicPlaying:false,audioCtx:null,masterGain:null,volume:LS.get('volume',30)/100,
  caffeine:LS.get('caffeine',0),petCount:LS.get('petCount',0),fortuneCount:LS.get('fortuneCount',0),
  booksRead:LS.get('booksRead',[]),skinChanges:LS.get('skinChanges',[]),
  highScores:LS.get('highScores',{snake:0,breakout:0,invaders:0}),
  guestbook:LS.get('guestbook',[]),achievements:LS.get('achievements',[]),
  garden:null,weather:{temp:'?',desc:'clear',icon:'☀️'},
  thoughtText:'',thoughtTimer:0,idleThoughtTimer:0,
  dustMotes:[],particles:[],floatTexts:[],
  time:0,screenShake:0,screenFlash:null,
  dataFragments:LS.get('dataFragments',[]),// IDs of found fragments
  constellationsFound:LS.get('constellationsFound',[]),
  prizeItems:LS.get('prizeItems',[]),// bought prize items
  hotChocCount:LS.get('hotChocCount',0),
  auroraActive:false,auroraTimer:0,
  // Station stats & milestones
  stationStats:{totalVisitors:0,totalVisits:0,totalDuels:0,totalClashes:0,stationLevel:1,milestones:[],createdAt:Date.now()},
  kittens:[],// Station kittens for 1000+ milestone
  seasonalParticles:[],// Seasonal effects
  spacewalk:{active:false,x:W/2,y:H/2,vx:0,vy:0,oxygen:100,debris:[],earthAngle:0,flagPlanted:LS.get('spacewalkFlag',false)},
  _visited:LS.get('visited_objs',[]),_prevAchCount:0,
  otherPlayers:{},myPlayerId:null,
};

// ═══════════════════════════════════════
// §2b. DUEL SYSTEM
// ═══════════════════════════════════════
const DuelSystem = {
  active: false,
  myHP: 100,
  opponentHP: 100,
  opponentId: null,
  opponentName: '',
  round: 1,
  maxRounds: 3,
  myWins: 0,
  opWins: 0,
  stunTimer: 0,
  dodgeCooldown: 0,
  blockHeld: false,
  iFrames: 0,
  comboCount: 0,
  comboTimer: 0,
  challengeTimer: 0,
  isChallenger: false,
  isPendingChallenge: false,
  roundTimer: 60,
  inArena: false,
  
  reset() {
    this.active = false;
    this.myHP = 100;
    this.opponentHP = 100;
    this.opponentId = null;
    this.opponentName = '';
    this.round = 1;
    this.myWins = 0;
    this.opWins = 0;
    this.stunTimer = 0;
    this.dodgeCooldown = 0;
    this.blockHeld = false;
    this.iFrames = 0;
    this.comboCount = 0;
    this.comboTimer = 0;
    this.challengeTimer = 0;
    this.isChallenger = false;
    this.isPendingChallenge = false;
    this.roundTimer = 60;
  },
  
  update(dt) {
    if (this.challengeTimer > 0) {
      this.challengeTimer -= dt;
      if (this.challengeTimer <= 0) {
        this.isPendingChallenge = false;
        showNotification('Duel challenge expired.');
      }
    }
    
    if (this.active) {
      this.roundTimer -= dt;
      if (this.roundTimer <= 0) {
        this.endRound('timeout');
      }
      
      if (this.stunTimer > 0) {
        this.stunTimer -= dt;
      }
      
      if (this.dodgeCooldown > 0) {
        this.dodgeCooldown -= dt;
      }
      
      if (this.iFrames > 0) {
        this.iFrames -= dt;
      }
      
      if (this.comboTimer > 0) {
        this.comboTimer -= dt;
        if (this.comboTimer <= 0) {
          this.comboCount = 0;
        }
      }
    }
    
    // Check arena proximity for auto-challenges
    if (S.floor === 3 && !this.active && !this.isPendingChallenge) {
      const arenaCenter = { x: 400, y: 300 };
      const inArena = Math.hypot(S.visitor.x - arenaCenter.x, S.visitor.y - arenaCenter.y) < 100;
      
      if (inArena !== this.inArena) {
        this.inArena = inArena;
        if (inArena && S._visitorSaber) {
          this.checkAutoChallenge();
        }
      }
    }
  },
  
  checkAutoChallenge() {
    // Check for other players in arena with sabers
    for (const [id, player] of Object.entries(S.otherPlayers)) {
      if (player.floor === 3 && player.saber) {
        const arenaCenter = { x: 400, y: 300 };
        const playerInArena = Math.hypot(player.x - arenaCenter.x, player.y - arenaCenter.y) < 100;
        
        if (playerInArena && Math.hypot(S.visitor.x - player.x, S.visitor.y - player.y) < 50) {
          // Show duel prompt
          showInteractPrompt(`⚔️ Press E to duel ${player.name}!`);
          return;
        }
      }
    }
  },
  
  sendChallenge(targetId, targetName) {
    if (this.active || this.isPendingChallenge) return;
    
    this.isPendingChallenge = true;
    this.challengeTimer = 5; // 5 second timeout
    this.opponentId = targetId;
    this.opponentName = targetName;
    this.isChallenger = true;
    
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'duel.request',
        targetId: targetId
      }));
    }
    
    showNotification(`Duel challenge sent to ${targetName}!`);
  },
  
  acceptChallenge(challengerId, challengerName) {
    if (this.active) return;
    
    this.active = true;
    this.opponentId = challengerId;
    this.opponentName = challengerName;
    this.isChallenger = false;
    this.round = 1;
    this.myHP = 100;
    this.opponentHP = 100;
    this.myWins = 0;
    this.opWins = 0;
    this.roundTimer = 60;
    
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'duel.accept',
        challengerId: challengerId
      }));
    }
    
    this.startRound();
  },
  
  startRound() {
    showNotification(`DUEL START - Round ${this.round}/${this.maxRounds}`);
    this.myHP = 100;
    this.opponentHP = 100;
    this.roundTimer = 60;
    this.stunTimer = 0;
    this.iFrames = 0;
    this.comboCount = 0;
    
    // 3-2-1-FIGHT countdown
    let countdown = 3;
    const countdownInterval = setInterval(() => {
      if (countdown > 0) {
        showNotification(`${countdown}...`, 1000);
        countdown--;
      } else {
        showNotification('FIGHT!', 1000);
        clearInterval(countdownInterval);
      }
    }, 1000);
  },
  
  attack() {
    if (!this.active || this.stunTimer > 0 || !S._visitorSaber) return;
    
    this.comboCount++;
    this.comboTimer = 2; // 2 second combo window
    
    let damage = 15;
    if (this.comboCount === 3) {
      damage = 30; // Combo damage
      showNotification('COMBO!');
    }
    
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'duel.attack',
        damage: damage,
        combo: this.comboCount === 3
      }));
    }
    
    // Visual effects
    swingSaber();
  },
  
  block(holding) {
    if (!this.active || this.stunTimer > 0) return;
    
    this.blockHeld = holding;
    
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'duel.block',
        holding: holding
      }));
    }
  },
  
  dodge(direction) {
    if (!this.active || this.stunTimer > 0 || this.dodgeCooldown > 0 || this.iFrames > 0) return;
    
    this.dodgeCooldown = 1.5; // 1.5 second cooldown
    this.iFrames = 0.3; // 0.3 second invincibility
    
    // Move player 80px in direction
    const moveDistance = 80;
    switch (direction) {
      case 'up': S.visitor.y = Math.max(60, S.visitor.y - moveDistance); break;
      case 'down': S.visitor.y = Math.min(H - 20, S.visitor.y + moveDistance); break;
      case 'left': S.visitor.x = Math.max(20, S.visitor.x - moveDistance); break;
      case 'right': S.visitor.x = Math.min(W - 20, S.visitor.x + moveDistance); break;
    }
    
    // Afterimage trail effect
    for (let i = 0; i < 3; i++) {
      const fade = 1 - (i * 0.3);
      S.particles.push({
        x: S.visitor.x - (direction === 'left' ? -20 * i : direction === 'right' ? 20 * i : 0),
        y: S.visitor.y - (direction === 'up' ? -20 * i : direction === 'down' ? 20 * i : 0),
        vx: 0, vy: 0,
        life: 20 - (i * 5),
        color: `rgba(0,255,255,${fade})`,
        size: 8
      });
    }
    
    showNotification('DODGE!');
  },
  
  takeDamage(damage, type) {
    if (!this.active || this.iFrames > 0) return;
    
    this.myHP = Math.max(0, this.myHP - damage);
    
    // Visual effects
    S.screenFlash = '#ff0000';
    S.screenShake = 5;
    
    // Damage number
    S.floatTexts.push({
      text: `-${damage}`,
      x: S.visitor.x,
      y: S.visitor.y - 40,
      color: '#ff4444',
      life: 60
    });
    
    // Knockback
    const knockback = 20;
    // Simple knockback away from opponent
    if (S.otherPlayers[this.opponentId]) {
      const op = S.otherPlayers[this.opponentId];
      const dx = S.visitor.x - op.x;
      const dy = S.visitor.y - op.y;
      const dist = Math.hypot(dx, dy) || 1;
      S.visitor.x += (dx / dist) * knockback;
      S.visitor.y += (dy / dist) * knockback;
    }
    
    if (this.myHP <= 0) {
      this.endRound('defeat');
    }
  },
  
  endRound(reason) {
    if (reason === 'victory' || (reason === 'timeout' && this.myHP > this.opponentHP)) {
      this.myWins++;
      showNotification('ROUND WON!');
      
      // Victory confetti
      for (let i = 0; i < 30; i++) {
        S.particles.push({
          x: S.visitor.x + (Math.random() - 0.5) * 40,
          y: S.visitor.y - 20,
          vx: (Math.random() - 0.5) * 4,
          vy: -Math.random() * 6 - 2,
          life: 60,
          color: ['#ffd700', '#ff6ec7', '#00fff7'][Math.floor(Math.random() * 3)],
          size: 3
        });
      }
      
      // Slow motion effect
      setTimeout(() => {
        // Restore normal speed
      }, 1000);
    } else {
      this.opWins++;
      showNotification('ROUND LOST!');
    }
    
    if (this.myWins >= Math.ceil(this.maxRounds / 2)) {
      this.endDuel('victory');
    } else if (this.opWins >= Math.ceil(this.maxRounds / 2)) {
      this.endDuel('defeat');
    } else {
      this.round++;
      setTimeout(() => this.startRound(), 3000);
    }
  },
  
  endDuel(result) {
    this.active = false;
    
    if (result === 'victory') {
      showNotification('VICTORY! +25◈');
      Coins.earn(25, 'duel_win');
      
      // Loot drop on duel win
      setTimeout(()=>LootSystem.drop('duel_win',LootSystem.getStatBonuses().luck||0),2000);
      
      // BIG victory text and effects
      S.floatTexts.push({
        text: 'VICTORY!',
        x: W / 2 - 50,
        y: H / 2,
        color: '#ffd700',
        life: 120
      });
      
      // Golden particles
      for (let i = 0; i < 50; i++) {
        S.particles.push({
          x: W / 2 + (Math.random() - 0.5) * 200,
          y: H / 2 + (Math.random() - 0.5) * 100,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 100,
          color: '#ffd700',
          size: 4
        });
      }
    } else {
      showNotification('DEFEATED! +5◈');
      Coins.earn(5, 'duel_loss');
      
      S.floatTexts.push({
        text: 'DEFEATED',
        x: W / 2 - 40,
        y: H / 2,
        color: '#ff4444',
        life: 120
      });
    }
    
    // Update stats
    if (EchoWS.ws?.readyState === 1) {
      EchoWS.ws.send(JSON.stringify({
        type: 'duel.end',
        result: result
      }));
    }
    
    this.reset();
  }
};

// ═══════════════════════════════════════
// §2c. ROOM SYSTEM
// ═══════════════════════════════════════
const RoomSystem = {
  currentRoom: null,
  isInBuilder: false,
  builderMode: 'view', // 'view', 'place', 'select'
  selectedFurniture: null,
  placingFurniture: false,
  visitingOwner: null, // who owns the room we're visiting (null = our own)
  
  furniture: LS.get('userRoomFurniture', []),
  wallColor: LS.get('userRoomWallColor', '#2a2a4a'),
  floorColor: LS.get('userRoomFloorColor', '#6a5548'),
  roomName: LS.get('userRoomName', 'My Room'),
  
  showBuilder() {
    this.isInBuilder = true;
    this.builderMode = 'view';
    this.currentRoom = null;
    this.visitingOwner = null;
    S.floor = 8; // Special floor for room builder
    $('#floor-hud').textContent = '🏠 My Room';
    $('#room-info-hud').style.display = 'none';
    showNotification('Room Builder - Click catalog to add furniture!');
  },
  
  exitBuilder() {
    this.isInBuilder = false;
    this.currentRoom = null;
    this.visitingOwner = null;
    $('#room-info-hud').style.display = 'none';
    changeFloor(1); // Return to F1
  },
  
  placeFurniture(type, x, y) {
    const furnitureType = FURNITURE_TYPES[type];
    if (!furnitureType) return;
    
    if (!Coins.canAfford(furnitureType.cost)) {
      showNotification(`Need ${furnitureType.cost}◈!`);
      return;
    }
    
    if (furnitureType.cost > 0) {
      Coins.spend(furnitureType.cost, 'furniture');
    }
    
    const newFurniture = {
      id: Date.now().toString(),
      type: type,
      x: Math.max(50, Math.min(750, x)),
      y: Math.max(100, Math.min(550, y)),
      variant: 0
    };
    
    this.furniture.push(newFurniture);
    this.save();
    
    showNotification(`Placed ${furnitureType.name}!`);
    this.builderMode = 'view';
    this.selectedFurniture = null;
  },
  
  removeFurniture(furnitureId) {
    this.furniture = this.furniture.filter(f => f.id !== furnitureId);
    this.save();
    showNotification('Furniture removed!');
  },
  
  save() {
    LS.set('userRoomFurniture', this.furniture);
    LS.set('userRoomWallColor', this.wallColor);
    LS.set('userRoomFloorColor', this.floorColor);
    LS.set('userRoomName', this.roomName);
    
    // Save to server
    const visitorName = LS.get('visitorName', 'Visitor');
    if (visitorName !== 'Visitor' && EchoWS.ws?.readyState === 1) {
      const roomData = {
        name: this.roomName,
        owner: visitorName,
        wallColor: this.wallColor,
        floorColor: this.floorColor,
        furniture: this.furniture,
        likes: 0,
        visitors: 0,
        isPublic: true,
        createdAt: Date.now()
      };
      
      fetch(`/api/rooms/${encodeURIComponent(visitorName)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(roomData)
      }).catch(console.error);
    }
  },
  
  async loadRoom(ownerName) {
    try {
      const response = await fetch(`/api/rooms/${encodeURIComponent(ownerName)}`);
      const room = await response.json();
      
      this.currentRoom = room;
      this.visitingOwner = ownerName;
      this.isInBuilder = false;
      S.floor = 8; // Visit room as custom floor
      $('#floor-hud').textContent = `🏠 ${room.name}`;
      
      // Record visit
      const visitRes = await fetch(`/api/rooms/${encodeURIComponent(ownerName)}/visit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ visitor: LS.get('visitorName', 'Anonymous') })
      });
      const visitData = await visitRes.json().catch(()=>({}));
      if (visitData.visitors) room.visitors = visitData.visitors;
      
      // Show room info HUD
      this.updateRoomInfoHUD();
      
      showNotification(`Visiting ${room.name}!`);
    } catch (error) {
      showNotification('Failed to load room!');
      console.error(error);
    }
  },
  
  updateRoomInfoHUD() {
    const hud = $('#room-info-hud');
    if (!this.currentRoom || !this.visitingOwner) {
      hud.style.display = 'none';
      return;
    }
    const r = this.currentRoom;
    const isOwnRoom = r.owner === LS.get('visitorName', 'Visitor');
    hud.style.display = 'block';
    hud.innerHTML = `🏠 <b style="color:#00fff7">${r.name}</b> by <b style="color:#ff6ec7">${r.owner}</b> · 👁️ ${r.visitors||0} · ❤️ ${r.likes||0} · 💰 ${r.earnings||0}◈` +
      (!isOwnRoom ? ` <span id="tip-room-btn" style="cursor:pointer;margin-left:6px;padding:2px 8px;background:rgba(255,215,0,.2);border:1px solid #ffd700;border-radius:4px;color:#ffd700">💰 Tip</span> <span id="like-room-btn" style="cursor:pointer;padding:2px 8px;background:rgba(255,110,199,.15);border:1px solid #ff6ec7;border-radius:4px;color:#ff6ec7">❤️ Like</span>` : '');
    
    // Attach event handlers
    const tipBtn = hud.querySelector('#tip-room-btn');
    if (tipBtn) tipBtn.onclick = () => this.showTipPopup(r.owner);
    const likeBtn = hud.querySelector('#like-room-btn');
    if (likeBtn) likeBtn.onclick = () => this.likeRoom(r.owner);
  },
  
  showTipPopup(ownerName) {
    const myCoins = Coins.count;
    const maxTip = Math.min(50, myCoins);
    if (maxTip < 1) { showNotification('Need at least 1◈ to tip!'); return; }
    const {p} = createPopup(`
      <h3>💰 Tip ${ownerName}</h3>
      <p style="font-size:11px;color:#888;margin-bottom:8px">Send ◈ to show appreciation!</p>
      <p style="text-align:center;font-size:24px;color:#ffd700;margin:12px 0" id="tip-amount-display">5◈</p>
      <input type="range" class="tip-slider" id="tip-slider" min="1" max="${maxTip}" value="${Math.min(5,maxTip)}">
      <p style="text-align:center;font-size:10px;color:#666">Your balance: ${myCoins}◈</p>
      <div style="text-align:center;margin-top:12px">
        <button class="drink-btn" id="tip-cancel">Cancel</button>
        <button class="drink-btn" id="tip-send" style="border-color:#ffd700;color:#ffd700">Send Tip 💰</button>
      </div>
    `);
    const slider = p.querySelector('#tip-slider');
    const display = p.querySelector('#tip-amount-display');
    slider.oninput = () => { display.textContent = slider.value + '◈'; };
    p.querySelector('#tip-cancel').onclick = () => p.closest('.popup-overlay').remove();
    p.querySelector('#tip-send').onclick = async () => {
      const amount = parseInt(slider.value);
      if (!Coins.canAfford(amount)) { showNotification('Not enough ◈!'); return; }
      Coins.spend(amount, 'tip');
      try {
        await fetch(`/api/rooms/${encodeURIComponent(ownerName)}/tip`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount, tipper: LS.get('visitorName', 'Anonymous') })
        });
        showNotification(`💰 Tipped ${ownerName} ${amount}◈!`);
        if (this.currentRoom) { this.currentRoom.earnings = (this.currentRoom.earnings || 0) + amount; this.updateRoomInfoHUD(); }
      } catch { showNotification('Tip failed!'); }
      p.closest('.popup-overlay').remove();
    };
  },
  
  async earnForOwner(amount, source) {
    if (!this.visitingOwner) return;
    const myName = LS.get('visitorName', 'Visitor');
    if (myName === this.visitingOwner || myName === 'Visitor') return;
    try {
      await fetch(`/api/rooms/${encodeURIComponent(this.visitingOwner)}/earn`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount, source, visitor: myName })
      });
      if (this.currentRoom) { this.currentRoom.earnings = (this.currentRoom.earnings || 0) + amount; this.updateRoomInfoHUD(); }
      S.floatTexts.push({text:`+${amount}◈ → ${this.visitingOwner}`,x:W/2,y:60,color:'#ffd700',life:50});
    } catch {}
  },
  
  async showRoomList() {
    try {
      const [roomsRes, lbRes] = await Promise.all([
        fetch('/api/rooms'),
        fetch('/api/rooms/leaderboard')
      ]);
      const rooms = await roomsRes.json();
      const leaderboard = await lbRes.json().catch(()=>[]);
      
      // Sort rooms by popularity (visitors + likes)
      rooms.sort((a,b) => ((b.visitors||0)+(b.likes||0)) - ((a.visitors||0)+(a.likes||0)));
      
      let html = '<h3>🏘️ Visit Rooms</h3><p style="font-size:10px;color:#888;margin-bottom:8px">Explore rooms created by visitors!</p>';
      
      if (rooms.length === 0) {
        html += '<p style="color:#666">No public rooms yet. Use the elevator to create yours!</p>';
      } else {
        rooms.forEach((room, i) => {
          const medal = i === 0 ? '🥇 ' : i === 1 ? '🥈 ' : i === 2 ? '🥉 ' : '';
          html += `
            <div class="drink-btn" style="width:100%;text-align:left;margin:4px 0;padding:8px 12px" data-owner="${room.owner}">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div style="font-weight:bold;color:#00fff7">${medal}${room.name}</div>
                <div style="font-size:9px;color:#ffd700">💰 ${room.earnings||0}◈</div>
              </div>
              <div style="font-size:9px;color:#888;margin-top:2px">by <b style="color:#ff6ec7">${room.owner}</b> · 👁️ ${room.visitors||0} · ❤️ ${room.likes||0}</div>
            </div>
          `;
        });
      }
      
      // Earnings leaderboard
      if (leaderboard.length > 0) {
        html += '<div style="margin-top:12px;border-top:1px solid #333;padding-top:8px"><h3 style="font-size:12px;color:#ffd700">🏆 Top Earners</h3>';
        leaderboard.slice(0,5).forEach((r,i) => {
          const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
          html += `<div style="font-size:10px;margin:2px 0;color:#ddd">${medal} <b style="color:#ff6ec7">${r.owner}</b> — <span style="color:#ffd700">${r.earnings}◈</span> (${r.visitors} visits, ${r.likes} ❤️)</div>`;
        });
        html += '</div>';
      }
      
      const { p } = createPopup(html);
      p.querySelectorAll('[data-owner]').forEach(btn => {
        btn.onclick = () => {
          const owner = btn.dataset.owner;
          this.loadRoom(owner);
          p.closest('.popup-overlay').remove();
        };
      });
    } catch (error) {
      showNotification('Failed to load room list!');
      console.error(error);
    }
  },
  
  async likeRoom(ownerName) {
    try {
      await fetch(`/api/rooms/${encodeURIComponent(ownerName)}/like`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ visitor: LS.get('visitorName', 'Anonymous') })
      });
      showNotification('❤️ Room liked!');
    } catch (error) {
      showNotification('Already liked today!');
    }
  }
};

function toggleMusic(){
  if(!S.audioCtx)initAudio();

  $('#btn-music').classList.toggle('active',S.musicPlaying);
  if(S.musicPlaying)startLofi();
  else if(lofiInterval){clearInterval(lofiInterval);lofiInterval=null}
  showThought(S.musicPlaying?'🎵 Lofi vibes on.':'Music off.');
}

function startLofi(){
  if(lofiInterval)clearInterval(lofiInterval);
  const fl=FLOOR_MUSIC[S.floor]||FLOOR_MUSIC[1];
  currentMusicFloor=S.floor;
  const c=S.audioCtx,bl=60/fl.bpm;
  let ci=0,bi=0;
  function beat(){
    if(!S.musicPlaying){clearInterval(lofiInterval);lofiInterval=null;return}
    if(currentMusicFloor!==S.floor){startLofi();return}
    const n=c.currentTime,ch=fl.chords[ci],sw=bi%2===1?.04:0;
    ch.forEach(f=>{const o=c.createOscillator(),g=c.createGain();o.type=fl.wave;o.frequency.value=f*(1+Math.random()*.003);g.gain.setValueAtTime(fl.padVol,n+sw);g.gain.exponentialRampToValueAtTime(.001,n+sw+bl*.9);o.connect(g);g.connect(S.masterGain);o.start(n+sw);o.stop(n+sw+bl)});
    if(Math.random()>.2&&fl.drumVol>.01){const buf=c.createBuffer(1,c.sampleRate*.05,c.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.3;const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;g.gain.setValueAtTime(fl.drumVol,n+sw);g.gain.exponentialRampToValueAtTime(.001,n+sw+.05);s.connect(g);g.connect(S.masterGain);s.start(n+sw)}
    if(bi===0||bi===2){const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=ch[0]*.5;g.gain.setValueAtTime(fl.bassVol,n);g.gain.exponentialRampToValueAtTime(.001,n+bl*1.5);o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+bl*2)}
    if(Math.random()<.25){const penta=[0,2,4,7,9];const note=ch[0]*Math.pow(2,penta[Math.random()*5|0]/12)*2;const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=note;g.gain.setValueAtTime(.02,n);g.gain.exponentialRampToValueAtTime(.001,n+bl*2);o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+bl*2)}
    bi++;if(bi>=4){bi=0;ci=(ci+1)%4}
  }
  lofiInterval=setInterval(beat,bl*1000);beat();
}

function initGarden(){
  let g=LS.get('garden',null);
  if(!g){g=PLANT_TYPES.map(pt=>({type:pt.id,planted:Date.now(),lastWatered:0,stage:0,wilting:false}));LS.set('garden',g)}
  S.garden=g;
  const now=Date.now(),day=86400000;
  S.garden.forEach(p=>{const ds=Math.floor((now-p.planted)/day);const dw=p.lastWatered?Math.floor((now-p.lastWatered)/day):999;p.wilting=dw>2;if(!p.wilting)p.stage=Math.min(4,ds)});
}
function waterPlant(idx){
  if(idx<0||idx>=S.garden.length)return;const p=S.garden[idx];
  const now=Date.now(),day=86400000,today=Math.floor(now/day),lastDay=p.lastWatered?Math.floor(p.lastWatered/day):0;
  if(lastDay===today){showThought("Already watered today!");return}
  p.lastWatered=now;p.wilting=false;p.stage=Math.min(4,Math.floor((now-p.planted)/day));
  LS.set('garden',S.garden);showThought(`Watered the ${PLANT_TYPES.find(t=>t.id===p.type).name}! 💧`);
  Coins.earn(1,'water');
}
function harvestPlant(idx){
  if(idx<0||idx>=S.garden.length)return;const p=S.garden[idx];
  if(p.stage<4){showThought("Not ready yet!");return}
  const coins=5+Math.floor(Math.random()*11);
  Coins.earn(coins,'harvest');showThought(`Harvested! +${coins}◈ 🌸`);
  p.planted=Date.now();p.stage=0;p.lastWatered=0;LS.set('garden',S.garden);checkAchievements();
}

  if(grid&&frame===1&&grid.length>=12){

function renderSkinPreview(skinId,canvas){

  const scale=Math.min(Math.floor(canvas.width/gw),Math.floor(canvas.height/gh));

function playerColorFromId(id){let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);h=((h%360)+360)%360;return `hsl(${h},70%,60%)`}
function renderRemotePlayer(cx,id,op){
  const sc=3,sz=10,col=playerColorFromId(id);
  cx.save();cx.globalAlpha=.9;cx.translate(op.x-sz*sc/2,op.y-sz*sc);
  // Body (recolor of visitor sprite)
  cx.fillStyle=col;cx.fillRect(2*sc,3*sc,6*sc,5*sc);
  // Hood
  const darker=`hsl(${((parseInt(id,16)||0)%360+360)%360},60%,40%)`;
  cx.fillStyle=darker;cx.fillRect(2*sc,1*sc,6*sc,3*sc);cx.fillRect(1*sc,2*sc,8*sc,2*sc);
  // Face
  cx.fillStyle='#f5d6b8';cx.fillRect(3*sc,2*sc,4*sc,2*sc);
  // Eyes
  cx.fillStyle='#222';cx.fillRect(4*sc,2*sc,sc,sc);cx.fillRect(6*sc,2*sc,sc,sc);
  // Feet
  cx.fillStyle=darker;cx.fillRect(2*sc,8*sc,2*sc,sc);cx.fillRect(6*sc,8*sc,2*sc,sc);
  // Shadow
  cx.fillStyle='rgba(0,0,0,0.2)';cx.fillRect(1*sc,9*sc,8*sc,sc);
  cx.restore();
  // Saber on remote player
  if(op.saber){
    const saberCol=op.saber==='green'?'#00ff44':'#4488ff';
    const swingAmt=op.swingTimer>0?Math.sin(op.swingTimer*Math.PI)*1.2:0;
    const side=op.dir===1?-1:1;
    cx.save();cx.translate(op.x+side*12,op.y-20);cx.rotate(-.8*side+swingAmt*side);
    cx.fillStyle='#666';cx.fillRect(-2,-3,4,10);
    cx.shadowColor=saberCol;cx.shadowBlur=10;
    cx.fillStyle=saberCol;cx.fillRect(-1,-3-28,2,28);
    cx.fillStyle='#fff';cx.fillRect(0,-3-28,1,28);
    cx.shadowBlur=0;cx.restore();
  }
  // Name label
  cx.fillStyle=col;cx.font='bold 9px monospace';cx.textAlign='center';
  cx.fillText(op.name||'Player',op.x,op.y-sz*sc-4);cx.textAlign='left';
}

function canMoveTo(x,y){
  const hw=8,hh=4;
  for(const w of WALLS){if(x+hw>w.x&&x-hw<w.x+w.w&&y>w.y&&y-hh<w.y+w.h)return false}
  for(const o of getObjects()){if(!o.collide)continue;if(x+hw>o.x&&x-hw<o.x+o.w&&y>o.y&&y-hh<o.y+o.h)return false}
  return true;
}
function getNearObject(){
  const e=S.echo,range=30;let nearest=null,bestD=range;
  for(const o of getObjects()){if(!o.interact)continue;const cx=Math.max(o.x,Math.min(e.x,o.x+o.w)),cy=Math.max(o.y,Math.min(e.y,o.y+o.h));const d=Math.hypot(e.x-cx,e.y-cy);if(d<bestD){bestD=d;nearest=o}}
  return nearest;
}

// Time-based routine with floor changes
function getEchoRoutine(){
  const h=new Date().getHours();
  if(h>=6&&h<9)return['bed','kitchen','recordplayer'];// morning: wake up, coffee, music
  if(h>=9&&h<12)return['desk','bookshelf','pixelcanvas','desk'];// morning work + art
  if(h>=12&&h<14)return['kitchen','fountain','bench','bar'];// midday: garden + chill
  if(h>=14&&h<17)return['arcade_snake','telescope','cozyseating'];// afternoon: games + observatory + lounge

const WAVE_LINES=["Hey there! Welcome to my station! 👋","Oh, a visitor! Make yourself at home 🛸","Hi! Click on anything to check it out!","*waves* Hey! Glad you stopped by ✨","Welcome aboard! Feel free to look around 🔮"];

const EchoAI={
  state:'idle',activityTimer:0,currentActivity:null,targetX:0,targetY:0,targetDir:0,routineIdx:0,arriveCallback:null,
  getRoutine(){return getEchoRoutine()},
  nextActivity(){const r=this.getRoutine();this.routineIdx=(this.routineIdx+1)%r.length;this.goToActivity(r[this.routineIdx])},
  goToActivity(actId,cb){
    const spot=ACTIVITY_SPOTS[actId];if(!spot)return;
    // Floor change
    if(spot.floor!==S.echo.floor){S.echo.floor=spot.floor;if(S.floor===spot.floor){S.echo.x=spot.x;S.echo.y=spot.y}}
    this.currentActivity=actId;this.targetX=spot.x;this.targetY=spot.y;this.targetDir=spot.dir;this.state='walking';this.arriveCallback=cb||null;S.echo.sitting=false;
  },
  walkTo(x,y,dir,cb){this.targetX=x;this.targetY=y;this.targetDir=dir||0;this.state='walking';this.arriveCallback=cb||null;this.currentActivity=null;S.echo.sitting=false},
  visitorClickObject(obj){
    if(this.state==='interacting')return;
    this.walkTo(obj.x+obj.w/2,obj.y+obj.h+20,3,()=>{S.nearObject=obj;this.state='interacting';this.activityTimer=0;interact();setTimeout(()=>{if(this.state==='interacting'){this.state='idle';this.activityTimer=0}},3000)});
  },
  visitorClickEcho(){
    if(this.state==='waving')return;
    this.state='waving';S.echo.dir=0;
    showThought(WAVE_LINES[Math.random()*WAVE_LINES.length|0]);
    addChatMsg('Echo',WAVE_LINES[Math.random()*WAVE_LINES.length|0]);
    for(let i=0;i<8;i++)S.particles.push({x:S.echo.x+Math.random()*20-10,y:S.echo.y-30,vx:Math.random()*2-1,vy:-1-Math.random(),life:20,color:'#ffd700',size:2});
    setTimeout(()=>{if(this.state==='waving'){this.state='idle';this.activityTimer=0}},2500);
  },
  update(dt){
    const e=S.echo;if(e.transforming){e.transformTimer+=dt;return}
    this.activityTimer+=dt;
    if(this.state==='walking'){
      if(e.floor!==S.floor){// Echo is on different floor, just teleport
        e.x=this.targetX;e.y=this.targetY;e.dir=this.targetDir;e.moving=false;this.state='activity';this.activityTimer=0;this.onStartActivity();return}
      const dx=this.targetX-e.x,dy=this.targetY-e.y,dist=Math.hypot(dx,dy);
      if(dist<6){e.x=this.targetX;e.y=this.targetY;e.dir=this.targetDir;e.moving=false;e.frame=0;this.state='activity';this.activityTimer=0;if(this.arriveCallback){this.arriveCallback();this.arriveCallback=null}else this.onStartActivity();return}
      const spd=90;e.x+=dx/dist*spd*dt;e.y+=dy/dist*spd*dt;e.moving=true;
      if(Math.abs(dx)>Math.abs(dy))e.dir=dx<0?1:2;else e.dir=dy<0?3:0;
      e.frameTimer+=dt;if(e.frameTimer>.15){e.frame=(e.frame+1)%3;e.frameTimer=0}
    }else if(this.state==='activity'){
      e.moving=false;const spot=ACTIVITY_SPOTS[this.currentActivity];const dur=spot?spot.dur[0]+Math.random()*(spot.dur[1]-spot.dur[0]):20;

function updatePixel(dt){
  const p=S.pixel;p.stateTimer+=dt;
  if(p.state==='sleep'){if(p.stateTimer>15){p.state='idle';p.stateTimer=0}return}
  if(p.state==='idle'){
    if(p.stateTimer>3+Math.random()*5){const r=Math.random();
      if(r<.2){// Follow Echo (might go to different floor)
        p.floor=S.echo.floor;if(p.floor===S.floor){p.targetX=S.echo.x+20;p.targetY=S.echo.y+10}p.state='follow';p.stateTimer=0}
      else if(r<.35){p.targetX=50+Math.random()*700;p.targetY=100+Math.random()*450;p.state='walk';p.stateTimer=0}
      else if(r<.4){p.targetX=620;p.targetY=460;p.state='walk';p.stateTimer=0;p._nextState='sleep'}
      else if(r<.45&&S.floor!==p.floor){p.floor=S.echo.floor;p.x=400;p.y=300;p.state='idle';p.stateTimer=0}// Ride elevator
      else p.stateTimer=0}
    return}
  if(p.state==='follow'){p.targetX=S.echo.x+20;p.targetY=S.echo.y+10;if(p.stateTimer>8){p.state='idle';p.stateTimer=0;return}}
  if(p.state==='walk'||p.state==='follow'){
    if(p.floor!==S.floor)return;// Skip movement on wrong floor
    const dx=p.targetX-p.x,dy=p.targetY-p.y,dist=Math.hypot(dx,dy);
    if(dist<8){if(p._nextState){p.state=p._nextState;p._nextState=null}else p.state='idle';p.stateTimer=0;return}
    const spd=60*dt;p.x+=dx/dist*spd;p.y+=dy/dist*spd;
    if(Math.abs(dx)>Math.abs(dy))p.dir=dx<0?1:2;else p.dir=dy<0?3:0;
    p.frameTimer+=dt;if(p.frameTimer>.2){p.frame=(p.frame+1)%2;p.frameTimer=0}}
}

function updateVisitor(dt){
  if(!S.useVisitor)return;
  const _speedBonus=1+(LootSystem.getStatBonuses().speed||0)/100;
  const spd=160*_speedBonus,v=S.visitor;
  let dx=0,dy=0;
  // Keyboard movement (overrides walk target)
  if(S.keys.up){dy=-1;v.dir=3;v.walkTarget=null}
  if(S.keys.down){dy=1;v.dir=0;v.walkTarget=null}
  if(S.keys.left){dx=-1;v.dir=1;v.walkTarget=null}
  if(S.keys.right){dx=1;v.dir=2;v.walkTarget=null}
  // Walk-to-target (click/tap movement)
  if(!dx&&!dy&&v.walkTarget){
    const t=v.walkTarget,tdx=t.x-v.x,tdy=t.y-v.y,dist=Math.sqrt(tdx*tdx+tdy*tdy);
    if(dist<8){v.walkTarget=null;v.moving=false;if(t.action)t.action()}
    else{dx=tdx/dist;dy=tdy/dist;if(Math.abs(dx)>Math.abs(dy)){v.dir=dx>0?2:1}else{v.dir=dy>0?0:3}}
  }
  if(dx||dy){
    const len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;
    const nx=v.x+dx*spd*dt,ny=v.y+dy*spd*dt;
    if(nx>20&&nx<W-20)v.x=nx;
    if(ny>60&&ny<H-20)v.y=ny;
    v.moving=true;v.frameTimer+=dt;if(v.frameTimer>.15){v.frameTimer=0;v.frame=(v.frame+1)%3}
  } else {v.moving=false;v.frame=0}
  // Check what's near visitor
  S.visitorNear=null;
  for(const o of getObjects()){if(!o.interact)continue;
    if(Math.abs(v.x-(o.x+o.w/2))<30&&Math.abs(v.y-(o.y+o.h/2))<30){S.visitorNear=o;break}}
  // Also check room furniture when visiting someone's room
  if(!S.visitorNear&&RoomSystem.currentRoom&&RoomSystem.currentRoom.furniture){
    for(const furn of RoomSystem.currentRoom.furniture){
      const ft=FURNITURE_TYPES[furn.type];if(!ft)continue;
      if(Math.abs(v.x-(furn.x+ft.width/2))<30&&Math.abs(v.y-(furn.y+ft.height/2))<30){
        S.visitorNear={id:'room_furn_'+furn.type,x:furn.x,y:furn.y,w:ft.width,h:ft.height,label:ft.name,interact:true,_furnType:furn.type};break;
      }
    }
  }
}

// Visitor skin transformation animation
function visitorTransform(newSkinId){
  const skin=VISITOR_SKINS.find(s=>s.id===newSkinId)||VISITOR_SKINS[0];
  const accent=skin.accent||skin.color;
  const rarity=RARITIES[skin.rarity]||RARITIES.common;
  const vx=S.visitor.x,vy=S.visitor.y;
  
  // Phase 1: Gathering energy (0-600ms) — pull particles inward, screen darkens
  S.visitor._transforming=true;S.visitor._transformPhase=1;S.visitor._transformTimer=0;S.visitor._transformSkin=newSkinId;
  S.visitor._transformAccent=accent;
  
  // Inward spiral particles
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2,r=60+Math.random()*40;
    S.particles.push({x:vx+Math.cos(a)*r,y:vy-15+Math.sin(a)*r,vx:-Math.cos(a)*4,vy:-Math.sin(a)*4,life:35,color:accent,size:2+Math.random()*2});
  }
  // Sound: rising tone
  if(S.audioCtx){const c=S.audioCtx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(800,n+.6);g.gain.setValueAtTime(.08*S.volume,n);g.gain.exponentialRampToValueAtTime(.001,n+.6);o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.7)}
  
  // Phase 2: Flash + white silhouette (600ms)
  setTimeout(()=>{
    S.visitor._transformPhase=2;
    S.screenFlash='#ffffff';S.screenShake=8;
    // Burst sound
    if(S.audioCtx){const c=S.audioCtx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.value=600;g.gain.setValueAtTime(.12*S.volume,n);g.gain.exponentialRampToValueAtTime(.001,n+.3);o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.4)}
  },600);
  
  // Phase 3: Reveal new skin + explosion (1000ms)
  setTimeout(()=>{
    S.visitor.skin=newSkinId;LS.set('visitorSkin',newSkinId);
    S.visitor._transformPhase=3;
    S.screenFlash=accent;S.screenShake=4;
    // Massive outward particle explosion
    for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,sp=4+Math.random()*8;
      S.particles.push({x:vx,y:vy-15,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:35,color:i%3===0?'#ffffff':accent,size:2+Math.random()*4})}
    // Rising text
    S.floatTexts.push({text:'⚡ '+skin.label+' ⚡',x:vx-30,y:vy-60,color:rarity.color,life:90});
    // Fanfare sound
    if(S.audioCtx){const c=S.audioCtx,n=c.currentTime;[600,800,1000,1200].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.1*S.volume,n+i*.08);g.gain.exponentialRampToValueAtTime(.001,n+i*.08+.2);o.connect(g);g.connect(S.masterGain);o.start(n+i*.08);o.stop(n+i*.08+.3)})}
  },1000);
  
  // Phase 4: Done (1500ms)
  setTimeout(()=>{
    S.visitor._transforming=false;S.visitor._transformPhase=0;
    showNotification('⚡ '+skin.label+' equipped!');
  },1500);
}

function renderVisitor(ctx){
  if(!S.useVisitor)return;
  const v=S.visitor,sc=3,sz=10;
  
  // Transform animation rendering
  if(v._transforming){
    const accent=v._transformAccent||'#fff';
    if(v._transformPhase===1){
      // Gathering: pulsing glow circle shrinking inward
      const pulse=.3+Math.sin(S.time*8)*.2;
      const grd=ctx.createRadialGradient(v.x,v.y-15,0,v.x,v.y-15,50);
      grd.addColorStop(0,accent);grd.addColorStop(.5,`rgba(255,255,255,${pulse})`);grd.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(v.x,v.y-15,50,0,Math.PI*2);ctx.fill();

      ctx.fillRect(v.x-12,v.y-36,24,36);
    } else if(v._transformPhase===2){
      // White flash silhouette — bright column of light
      ctx.fillStyle='rgba(255,255,255,.9)';ctx.fillRect(v.x-15,v.y-50,30,55);
      const grd=ctx.createRadialGradient(v.x,v.y-20,0,v.x,v.y-20,60);

    }

    }
    ctx.fillStyle='#f5d6b8';ctx.fillRect(3*sc,2*sc,4*sc,2*sc); // face
    ctx.fillStyle='#222';ctx.fillRect(4*sc,2*sc,sc,sc);ctx.fillRect(6*sc,2*sc,sc,sc); // eyes
  }
  else {
    // Default hooded figure
    ctx.fillStyle=c;ctx.fillRect(2*sc,3*sc,6*sc,5*sc); // body
    ctx.fillStyle=d;ctx.fillRect(2*sc,1*sc,6*sc,3*sc);ctx.fillRect(1*sc,2*sc,8*sc,2*sc); // hood
    ctx.fillStyle='#f5d6b8';ctx.fillRect(3*sc,2*sc,4*sc,2*sc); // face
    ctx.fillStyle='#222';ctx.fillRect(4*sc,2*sc,sc,sc);ctx.fillRect(6*sc,2*sc,sc,sc); // eyes
  }
  
  // Feet (walk animation) - universal
  ctx.fillStyle=d;
  if(v.moving&&v.frame===1){ctx.fillRect(2*sc,8*sc,2*sc,2*sc);ctx.fillRect(6*sc,8*sc,2*sc,2*sc)}
  else if(v.moving&&v.frame===2){ctx.fillRect(3*sc,8*sc,2*sc,2*sc);ctx.fillRect(5*sc,8*sc,2*sc,2*sc)}
  else{ctx.fillRect(2*sc,8*sc,2*sc,sc);ctx.fillRect(6*sc,8*sc,2*sc,sc)}
  
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(1*sc,9*sc,8*sc,sc);
  ctx.restore();
  
  // Accessories (hat, trail, pet — aura rendered before avatar via renderVisitorAccessories)
  renderVisitorAccessories(ctx,v);
  
  // Name label
  ctx.fillStyle=skin.color;ctx.font='bold 9px monospace';ctx.textAlign='center';
  ctx.fillText(LS.get('visitorName','Visitor'),v.x,v.y-sz*sc-4);ctx.textAlign='left';
  
  // Lightsaber held by visitor
  if(S._visitorSaber){
    const col=S._visitorSaber==='green'?'#00ff44':'#4488ff';
    const colGlow=S._visitorSaber==='green'?'rgba(0,255,68,.3)':'rgba(68,136,255,.3)';
    const swing=S._saberSwing>0?Math.sin(S._saberSwing*Math.PI)*1.2:0;
    const side=v.dir===1?-1:1;// left or right facing
    const hx=v.x+side*12,hy=v.y-20;
    ctx.save();ctx.translate(hx,hy);ctx.rotate(-.8*side+swing*side);
    // Hilt
    ctx.fillStyle='#666';ctx.fillRect(-2,-3,4,10);ctx.fillStyle='#888';ctx.fillRect(-1,-1,2,6);
    // Blade
    const bladeLen=28+Math.sin(S.time*8)*2;
    ctx.shadowColor=col;ctx.shadowBlur=10+Math.sin(S.time*6)*3;
    ctx.fillStyle=col;ctx.fillRect(-1,-3-bladeLen,2,bladeLen);
    ctx.fillStyle='#fff';ctx.fillRect(0,-3-bladeLen,1,bladeLen);// core
    ctx.fillStyle=colGlow;ctx.fillRect(-3,-3-bladeLen,6,bladeLen);
    ctx.shadowBlur=0;
    ctx.restore();
  }
  // SPACE prompt when near object
  if(S.visitorNear){ctx.fillStyle='rgba(255,255,200,0.9)';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText('⎵ SPACE',v.x,v.y-sz*sc-16);ctx.textAlign='left'}
}

function adjustBrightness(hex,percent){
  const num=parseInt(hex.replace('#',''),16),amt=Math.round(2.55*percent);
  const R=(num>>16)+amt,G=(num>>8&0x00FF)+amt,B=(num&0x0000FF)+amt;
  return'#'+(0x1000000+(R<255?R<1?0:R:255)*0x10000+(G<255?G<1?0:G:255)*0x100+(B<255?B<1?0:B:255)).toString(16).slice(1);
}

// ═══════════════════════════════════════
const VirtualJoystick = {
  active: false,
  centerX: 0,
  centerY: 0,
  currentX: 0,
  currentY: 0,
  touchId: null,
  
  init() {
    const base = $('#joystick-base');
    const knob = $('#joystick-knob');
    
    if (!base || !knob) return;
    
    const rect = base.getBoundingClientRect();
    this.centerX = rect.left + rect.width / 2;
    this.centerY = rect.top + rect.height / 2;
    
    // Touch events for joystick
    base.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (this.touchId !== null) return;
      
      const touch = e.touches[0];
      this.touchId = touch.identifier;
      this.active = true;
      this.updateKnob(touch.clientX, touch.clientY);
    }, { passive: false });
    
    document.addEventListener('touchmove', (e) => {
      if (!this.active || this.touchId === null) return;
      
      const touch = Array.from(e.touches).find(t => t.identifier === this.touchId);
      if (!touch) return;
      
      e.preventDefault();
      this.updateKnob(touch.clientX, touch.clientY);
    }, { passive: false });
    
    document.addEventListener('touchend', (e) => {
      if (!this.active || this.touchId === null) return;
      
      const touch = Array.from(e.changedTouches).find(t => t.identifier === this.touchId);
      if (!touch) return;
      
      this.active = false;
      this.touchId = null;
      knob.style.transform = 'translate(-50%, -50%)';
      // Clear movement
      S.keys.up = S.keys.down = S.keys.left = S.keys.right = false;
    });
  },
  
  updateKnob(touchX, touchY) {
    const knob = $('#joystick-knob');
    const dx = touchX - this.centerX;
    const dy = touchY - this.centerY;
    const distance = Math.sqrt(dx * dx + dy * dy);
    const maxDistance = 25; // Half of base radius
    
    let knobX = dx;
    let knobY = dy;
    
    if (distance > maxDistance) {
      knobX = (dx / distance) * maxDistance;
      knobY = (dy / distance) * maxDistance;
    }
    
    knob.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    
    // Convert to 8-direction movement
    const deadzone = 8;
    if (distance > deadzone) {
      const angle = Math.atan2(dy, dx) + Math.PI;
      const octant = Math.round(angle / (Math.PI / 4)) % 8;
      
      // Clear all directions first
      S.keys.up = S.keys.down = S.keys.left = S.keys.right = false;
      
      // Set directions based on octant
      if (octant === 0 || octant === 1) S.keys.right = true;
      if (octant === 1 || octant === 2) S.keys.down = true;
      if (octant === 2 || octant === 3) S.keys.down = true;
      if (octant === 3 || octant === 4) S.keys.left = true;
      if (octant === 4 || octant === 5) S.keys.left = true;
      if (octant === 5 || octant === 6) S.keys.up = true;
      if (octant === 6 || octant === 7) S.keys.up = true;
      if (octant === 7 || octant === 0) S.keys.right = true;
    } else {
      S.keys.up = S.keys.down = S.keys.left = S.keys.right = false;
    }
  }
};

const MobileControls = {

async function recordStationVisit(){
  const name=LS.get('visitorName','Visitor');
  if(name==='Visitor')return;
  
  try{
    const r=await fetch('/api/station-stats/visit',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({visitorName:name})

    const result=await r.json();

function initKittens(){
  if(S.kittens.length>0)return; // Already initialized

    {name:'Byte',color:'#ff8800',x:450,y:480,floor:1,state:'wander',stateTimer:0,targetX:450,targetY:480,dir:0,frame:0,frameTimer:0},
    {name:'Glitch',color:'#888888',x:400,y:300,floor:2,state:'sleep',stateTimer:0,targetX:400,targetY:300,dir:0,frame:0,frameTimer:0},
    {name:'Nova',color:'#ffffff',x:380,y:250,floor:4,state:'follow',stateTimer:0,targetX:380,targetY:250,dir:0,frame:0,frameTimer:0}
  ];
}

function updateKittens(dt){
  if(!S.stationStats.milestones.includes('pixel_kittens'))return;
  if(S.kittens.length===0)initKittens();
  
  S.kittens.forEach(kitten=>{
    kitten.stateTimer+=dt;
    kitten.frameTimer+=dt;
    
    // Animation
    if(kitten.frameTimer>.3){
      kitten.frame=(kitten.frame+1)%2;
      kitten.frameTimer=0;
    }
    
    // AI State machine
    if(kitten.state==='wander'){
      if(kitten.stateTimer>3+Math.random()*5){
        if(Math.random()<.3){
          kitten.state='sleep';
          kitten.stateTimer=0;
        }else{
          kitten.targetX=100+Math.random()*600;
          kitten.targetY=100+Math.random()*400;
          kitten.state='walking';
          kitten.stateTimer=0;
        }
      }
    }else if(kitten.state==='walking'){
      const dx=kitten.targetX-kitten.x;
      const dy=kitten.targetY-kitten.y;
      const dist=Math.hypot(dx,dy);
      
      if(dist<8){
        kitten.state='wander';
        kitten.stateTimer=0;
      }else{
        const spd=kitten.name==='Byte'?80:kitten.name==='Glitch'?40:60; // Different speeds
        kitten.x+=dx/dist*spd*dt;
        kitten.y+=dy/dist*spd*dt;
        
        if(Math.abs(dx)>Math.abs(dy)){
          kitten.dir=dx>0?2:1;
        }else{
          kitten.dir=dy>0?0:3;
        }
      }
    }else if(kitten.state==='sleep'){
      if(kitten.stateTimer>8+Math.random()*10){
        kitten.state='wander';
        kitten.stateTimer=0;
      }
    }else if(kitten.state==='follow'){
      // Nova follows visitors
      if(S.useVisitor&&S.visitor.floor===kitten.floor){
        kitten.targetX=S.visitor.x+30;
        kitten.targetY=S.visitor.y+10;
        
        const dx=kitten.targetX-kitten.x;
        const dy=kitten.targetY-kitten.y;
        const dist=Math.hypot(dx,dy);
        
        if(dist>20){
          const spd=60;
          kitten.x+=dx/dist*spd*dt;
          kitten.y+=dy/dist*spd*dt;
          
          if(Math.abs(dx)>Math.abs(dy)){
            kitten.dir=dx>0?2:1;
          }else{
            kitten.dir=dy>0?0:3;
          }
        }
        
        if(kitten.stateTimer>15){
          kitten.state='wander';
          kitten.stateTimer=0;
        }
      }else{
        kitten.state='wander';
        kitten.stateTimer=0;
      }
    }
  });
}

function renderKittens(){
  if(!S.stationStats.milestones.includes('pixel_kittens'))return;
  
  S.kittens.filter(k=>k.floor===S.floor).forEach(kitten=>{
    const scale=2; // Smaller than Pixel
    const sprW=8*scale,sprH=7*scale;
    
    // Shadow
    ctx.fillStyle='rgba(0,0,0,.2)';
    ctx.beginPath();
    ctx.ellipse(kitten.x,kitten.y+2,sprW/3,3,0,0,Math.PI*2);
    ctx.fill();
    
    // Kitten sprite (simplified version of Pixel)
    ctx.fillStyle=kitten.color;
    ctx.fillRect(kitten.x-sprW/2+2*scale,kitten.y-sprH+scale,4*scale,5*scale); // body
    ctx.fillRect(kitten.x-sprW/2+scale,kitten.y-sprH,6*scale,3*scale); // head
    
    // Ears
    ctx.fillRect(kitten.x-sprW/2+scale,kitten.y-sprH-scale,scale,2*scale);
    ctx.fillRect(kitten.x-sprW/2+4*scale,kitten.y-sprH-scale,scale,2*scale);
    
    // Eyes
    ctx.fillStyle='#30ee50';
    ctx.fillRect(kitten.x-sprW/2+2*scale,kitten.y-sprH+scale,scale,scale);
    ctx.fillRect(kitten.x-sprW/2+4*scale,kitten.y-sprH+scale,scale,scale);
    
    // Name label
    ctx.fillStyle=kitten.color;
    ctx.font='bold 8px monospace';
    ctx.textAlign='center';
    ctx.fillText(kitten.name,kitten.x,kitten.y-sprH-8);
    ctx.textAlign='left';
    
    // State indicator
    if(kitten.state==='sleep'){
      ctx.font='10px sans-serif';
      ctx.fillText('💤',kitten.x+8,kitten.y-sprH-5);
    }
  });
}

function getSeason(){
  const m=new Date().getMonth();
  if(m>=2&&m<=4)return'spring';
  if(m>=5&&m<=7)return'summer';
  if(m>=8&&m<=10)return'autumn';
  return'winter';
}

function updateSeasonalEffects(dt){
  const season=getSeason();
  
  // Spawn seasonal particles
  if(Math.random()<.3){
    let newParticle=null;
    
    switch(season){
      case'spring':
        // Green particles drift up in Garden, flower colors brighter
        if(S.floor===4||Math.random()<.1){
          newParticle={
            x:Math.random()*W,y:H+10,
            vx:(Math.random()-.5)*1,vy:-1-Math.random()*.5,
            life:60+Math.random()*40,
            color:['#60ee60','#90ff90','#ffb6c1'][Math.random()*3|0],
            size:2+Math.random()*2,
            type:'spring'
          };
        }
        break;
        
      case'summer':
        // Fireflies on F4 (tiny yellow dots that pulse)
        if(S.floor===4&&Math.random()<.2){
          newParticle={
            x:200+Math.random()*400,y:200+Math.random()*300,
            vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,
            life:120+Math.random()*80,
            color:'#ffff80',size:1,
            type:'firefly',pulse:Math.random()*Math.PI*2
          };
        }
        break;
        
      case'autumn':
        // Orange/red leaf particles fall slowly on all floors
        newParticle={
          x:Math.random()*W,y:-10,
          vx:Math.sin(S.time*2+Math.random()*4)*.5,
          vy:1+Math.random()*2,
          life:80+Math.random()*40,
          color:['#ff6600','#ff4400','#cc3300','#ffaa00','#dd5500'][Math.random()*5|0],
          size:3+Math.random()*3,
          type:'leaf',wobble:Math.random()*Math.PI*2
        };
        break;
        
      case'winter':
        // Snow only during EVA spacewalk — it's a space station, no snow indoors!
        if(S.spacewalk.active){
          newParticle={
            x:Math.random()*W,y:-10,
            vx:Math.sin(S.time+Math.random()*4)*.8,
            vy:.5+Math.random()*1.5,
            life:100+Math.random()*60,
            color:'#ffffff',size:2+Math.random()*2,
            type:'snow'
          };
        }
        break;
    }
    
    if(newParticle){
      S.seasonalParticles.push(newParticle);
    }
  }
  
  // Update seasonal particles
  for(let i=S.seasonalParticles.length-1;i>=0;i--){
    const p=S.seasonalParticles[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
    
    // Special movement for different types
    if(p.type==='leaf'){
      p.wobble+=dt*3;
      p.x+=Math.sin(p.wobble)*.5;
    }else if(p.type==='firefly'){
      p.pulse+=dt*4;
    }
    
    if(p.life<=0||p.y>H+20||p.x<-20||p.x>W+20){
      S.seasonalParticles.splice(i,1);
      continue;
    }
  }
  
  // Cap seasonal particles at 20
  if(S.seasonalParticles.length>20){
    S.seasonalParticles=S.seasonalParticles.slice(-20);
  }
}

function renderSeasonalEffects(){
  S.seasonalParticles.forEach(p=>{
    if(p.type==='firefly'){
      // Pulsing yellow dots
      const alpha=.5+Math.sin(p.pulse)*.4;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
    }else{
      // Regular particles
      ctx.globalAlpha=Math.min(1,p.life/30);
      ctx.fillStyle=p.color;
      
      if(p.type==='leaf'){
        // Rectangular leaves
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(p.wobble*.5);
        ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*.6);
        ctx.restore();
      }else{
        // Circular particles (spring, snow)
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
      }
      
      ctx.globalAlpha=1;
    }
  });
}

function renderSeasonalOverlay(){
  const season=getSeason();
  
  switch(season){
    case'summer':
      // Warm orange tint overlay
      ctx.fillStyle='rgba(255,150,50,.03)';
      ctx.fillRect(0,0,W,H);
      break;
      
    case'autumn':
      // Warm amber tint
      ctx.fillStyle='rgba(255,120,40,.04)';
      ctx.fillRect(0,0,W,H);
      break;
      
    case'winter':
      // Frost on window edges (F1, F2, F4)
      if([1,2,4].includes(S.floor)){
        ctx.strokeStyle='rgba(200,230,255,.3)';
        ctx.lineWidth=2;
        ctx.setLineDash([3,2]);
        ctx.strokeRect(5,5,W-10,H-10);
        ctx.setLineDash([]);
      }
      break;
  }
}

async function loadVisitorMemory(){
  const name=LS.get('visitorName','Visitor');
  if(name==='Visitor')return;
  
  try{
    const r=await fetch(`/api/visitor-memory?name=${encodeURIComponent(name)}`);
    const memory=await r.json();
    
    if(memory.visitCount>0){
      // Echo remembers this visitor!
      const greetings=[
        `Welcome back ${name}! Visit #${memory.visitCount+1}. 🔮`,
        `Hey ${name}! Good to see you again! Last time you were on F${memory.favFloor}.`,
        `${name}! You've earned ${memory.totalCoins||0}◈ in your visits here. Welcome back!`
      ];
      
      if(memory.highScores){
        const topGame=Object.entries(memory.highScores).sort((a,b)=>b[1]-a[1])[0];
        if(topGame[1]>0){
          greetings.push(`${name}! Your best ${topGame[0]} score was ${topGame[1]}. Ready to beat it?`);
        }
      }
      
      const greeting=greetings[Math.floor(Math.random()*greetings.length)];
      setTimeout(()=>{addChatMsg('Echo',greeting);showThought(greeting.split('.')[0])},2000);
    }
  } catch(e){
    console.log('Visitor memory not available:',e.message);
  }
}

async function saveVisitorMemory(){
  const name=LS.get('visitorName','Visitor');
  if(name==='Visitor')return;
  
  try{
    await fetch('/api/visitor-memory',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        visitorName:name,
        highScores:S.highScores,
        favFloor:S.floor,
        totalCoins:Coins.lifetime,
        lastWords:S.lastChatMessage||''
      })
    });
  } catch(e){
    console.log('Failed to save visitor memory:',e.message);
  }
}
