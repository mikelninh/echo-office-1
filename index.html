    ctx.shadowColor='#ff0000';ctx.shadowBlur=8;ctx.beginPath();ctx.arc(S._laserDot.x,S._laserDot.y,2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }

  ctx.fillStyle='rgba(30,25,45,.7)';ctx.font='8px monospace';const tw=ctx.measureText('Pixel 🐱').width;ctx.fillRect(p.x-tw/2-3,p.y-sprH-14,tw+6,11);ctx.fillStyle='#c080ff';ctx.textAlign='center';ctx.fillText('Pixel 🐱',p.x,p.y-sprH-6);ctx.textAlign='left';

function renderFloatTexts(){
  for(let i=S.floatTexts.length-1;i>=0;i--){const f=S.floatTexts[i];f.y-=.5;f.life--;if(!f._maxLife)f._maxLife=f.life+1;if(f.life<=0){S.floatTexts.splice(i,1);continue}
    const t=1-f.life/f._maxLife; // 0->1 progress
    const fadeAlpha=Math.min(1,f.life/30);
    // Pop-in scale
    const popScale=t<0.1?0.5+t*5:1.0;
    ctx.save();ctx.translate(f.x,f.y);ctx.scale(popScale,popScale);
    const isVictory=f.text==='VICTORY!';const isPerfect=f.text&&f.text.includes('PERFECT');
    const isCombo=f.text&&f.text.includes('HIT x');const isDmg=f.text&&f.text.startsWith('-');
    if(isVictory){
      ctx.globalAlpha=fadeAlpha;ctx.font='bold 40px monospace';ctx.textAlign='center';
      ctx.shadowColor='#ffd700';ctx.shadowBlur=20;ctx.strokeStyle='#aa8800';ctx.lineWidth=3;ctx.strokeText(f.text,0,0);
      ctx.fillStyle='#ffd700';ctx.fillText(f.text,0,0);ctx.shadowBlur=0;
    }else if(isPerfect){
      ctx.globalAlpha=fadeAlpha;ctx.font='bold 30px monospace';ctx.textAlign='center';
      const hue=(S.time*200)%360;ctx.strokeStyle=`hsl(${hue},100%,60%)`;ctx.lineWidth=2;ctx.strokeText(f.text,0,0);
      ctx.fillStyle='#ffffff';ctx.fillText(f.text,0,0);
    }else if(isCombo){
      const comboNum=parseInt(f.text.match(/\d+/)||'2');const sz=Math.min(24,14+comboNum*1.5);
      ctx.globalAlpha=fadeAlpha;ctx.font=`bold ${sz}px monospace`;ctx.textAlign='center';
      ctx.shadowColor=f.color||'#00fff7';ctx.shadowBlur=10;
      ctx.fillStyle=f.color||'#00fff7';ctx.fillText(f.text,0,0);ctx.shadowBlur=0;
    }else if(isDmg){
      const dmgVal=Math.abs(parseInt(f.text)||10);const sz=Math.min(22,12+dmgVal/8);

    }else{
      ctx.globalAlpha=fadeAlpha;ctx.fillStyle=f.color||'#ffd700';ctx.font='bold 12px monospace';ctx.fillText(f.text,0,0);
    }
    ctx.restore()}
}

function renderUserRoom(room){
  // Render custom room
  const baseColor=room.floorColor||'#6a5548';
  const lightColor=adjustBrightness(baseColor,10);
  renderFloorTiles(baseColor,lightColor);
  
  // Walls
  ctx.fillStyle=room.wallColor||'#2a2a4a';
  ctx.fillRect(0,0,W,70);
  ctx.fillStyle=adjustBrightness(room.wallColor||'#2a2a4a',10);
  ctx.fillRect(0,70,W,4);
  
  // Side walls (always present)
  ctx.fillStyle='#2a2040';ctx.fillRect(0,0,12,H);ctx.fillRect(W-12,0,12,H);ctx.fillRect(0,H-12,W,12);
  
  // Elevator (always present)
  renderElevator();
  
  // Render furniture
  if(room.furniture){
    room.furniture.forEach(furn=>{
      renderFurniture(furn);
    });
  }
  
  // Room info bar at top
  ctx.fillStyle='rgba(10,10,20,.85)';
  ctx.fillRect(80,74,W-160,22);
  ctx.strokeStyle='#c080ff';
  ctx.lineWidth=1;
  ctx.strokeRect(80,74,W-160,22);
  ctx.font='9px monospace';ctx.textAlign='center';
  ctx.fillStyle='#ddd';
  const infoText=`🏠 ${room.name} by ${room.owner} · 👁️ ${room.visitors||0} · ❤️ ${room.likes||0} · 💰 ${room.earnings||0}◈`;
  ctx.fillText(infoText,W/2,88);
  ctx.textAlign='left';
}

function renderFurniture(furn){
  const type=FURNITURE_TYPES[furn.type];
  if(!type)return;
  
  const x=furn.x,y=furn.y,w=type.width,h=type.height;
  
  // Simple furniture rendering - just colored rectangles with icons for now
  const colors={
    basic_chair:'#8a4a2a',basic_table:'#6a4a2a',basic_lamp:'#ffd700',basic_rug:'#8a6a4a',
    poster:'#2a2a4a',comfy_chair:'#4a6a8a',desk:'#5a4030',bookshelf:'#4a3020',
    plant_pot:'#2a4a2a',neon_sign:'#ff00ff',arcade_cabinet:'#2a1a4a',tv:'#1a1a2a',
    fish_tank:'rgba(0,80,120,.8)',lightsaber_rack:'#3a3a3a',crystal_ball:'#6a3a8a',
    jukebox:'#8a3a3a',pixel_plushie:'#333',trophy:'#ffd700'
  };
  
  ctx.fillStyle=colors[furn.type]||'#666';
  ctx.fillRect(x,y,w,h);
  
  // Icon overlay
  ctx.font='20px sans-serif';
  ctx.textAlign='center';
  ctx.fillText(type.icon,x+w/2,y+h/2+7);
  ctx.textAlign='left';
  
  // Selection highlight for builder
  if(RoomSystem.isInBuilder&&RoomSystem.builderMode==='select'){
    ctx.strokeStyle='rgba(255,255,255,.5)';
    ctx.lineWidth=2;
    ctx.strokeRect(x-2,y-2,w+4,h+4);
  }
}

function playerColorFromId(id){let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);h=((h%360)+360)%360;return `hsl(${h},70%,60%)`}
function renderRemotePlayer(cx,id,op){
  const sc=3,sz=10,col=playerColorFromId(id);
  cx.save();cx.globalAlpha=.9;cx.translate(op.x-sz*sc/2,op.y-sz*sc);
  // Body (recolor of visitor sprite)
  cx.fillStyle=col;cx.fillRect(2*sc,3*sc,6*sc,5*sc);
  // Hood
  const darker=`hsl(${((parseInt(id,16)||0)%360+360)%360},60%,40%)`;
  cx.fillStyle=darker;cx.fillRect(2*sc,1*sc,6*sc,3*sc);cx.fillRect(1*sc,2*sc,8*sc,2*sc);
  // Face
  cx.fillStyle='#f5d6b8';cx.fillRect(3*sc,2*sc,4*sc,2*sc);
  // Eyes
  cx.fillStyle='#222';cx.fillRect(4*sc,2*sc,sc,sc);cx.fillRect(6*sc,2*sc,sc,sc);
  // Feet
  cx.fillStyle=darker;cx.fillRect(2*sc,8*sc,2*sc,sc);cx.fillRect(6*sc,8*sc,2*sc,sc);
  // Shadow
  cx.fillStyle='rgba(0,0,0,0.2)';cx.fillRect(1*sc,9*sc,8*sc,sc);
  cx.restore();
  // Saber on remote player
  if(op.saber){
    const saberCol=op.saber==='green'?'#00ff44':'#4488ff';
    const swingAmt=op.swingTimer>0?Math.sin(op.swingTimer*Math.PI)*1.2:0;
    const side=op.dir===1?-1:1;
    cx.save();cx.translate(op.x+side*12,op.y-20);cx.rotate(-.8*side+swingAmt*side);
    cx.fillStyle='#666';cx.fillRect(-2,-3,4,10);
    cx.shadowColor=saberCol;cx.shadowBlur=10;
    cx.fillStyle=saberCol;cx.fillRect(-1,-3-28,2,28);
    cx.fillStyle='#fff';cx.fillRect(0,-3-28,1,28);
    cx.shadowBlur=0;cx.restore();
  }
  // Name label
  cx.fillStyle=col;cx.font='bold 9px monospace';cx.textAlign='center';
  cx.fillText(op.name||'Player',op.x,op.y-sz*sc-4);cx.textAlign='left';
}

  if(S.spacewalk.active){renderSpacewalk();ctx.restore();return}
  
  // Render current floor or secret room
  if (S.secretRooms.current) {
    SecretRooms.renderSecretRoom(S.secretRooms.current);
  } else {
    if(S.floor===1)renderFloor1();
    else if(S.floor===2)renderFloor2();

  if(AIFighter.active)chars.push({y:AIFighter.y,r:()=>AIFighter.render(ctx)});

  // Fade transition for secret rooms
  if (S.secretRooms.fadeTimer > 0) {
    const alpha = S.secretRooms.fadeTimer / 30;

  if(S.chromaticAberration>0.1){const ca=S.chromaticAberration;const imgData=ctx.getImageData(0,0,W,H);ctx.globalAlpha=0.15;ctx.drawImage(canvas,-ca,0);ctx.drawImage(canvas,ca,0);ctx.globalAlpha=1}
  // Vignette overlay
  if(S.vignetteIntensity>0.05){const vg=ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.8);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(0,0,0,${S.vignetteIntensity})`);ctx.fillStyle=vg;ctx.fillRect(0,0,W,H)}
  if(S.screenFlash){ctx.fillStyle=S.screenFlash;ctx.globalAlpha=.3;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;S.screenFlash=null}
  renderHoverHighlight();
  // Duel HUD (during active duel)
  if(DuelSystem.active){

  else if(WeaponSystem.equipped&&!S._visitorSaber){

  else if(S._visitorSaber){const col=S._visitorSaber==='green'?'#00ff44':'#4488ff';ctx.fillStyle='rgba(10,10,20,.85)';ctx.fillRect(W/2-60,H-28,120,22);ctx.strokeStyle=col;ctx.lineWidth=1;ctx.strokeRect(W/2-60,H-28,120,22);ctx.fillStyle=col;ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText('\u2694\uFE0F E:Swing  Q:Block  Double-tap WASD:Dodge',W/2,H-13);ctx.textAlign='left'}
  // Time of day overlay
  if(TOD==='night'){ctx.fillStyle='rgba(0,0,30,.15)';ctx.fillRect(0,0,W,H)}

function canMoveTo(x,y){
  const hw=8,hh=4;
  for(const w of WALLS){if(x+hw>w.x&&x-hw<w.x+w.w&&y>w.y&&y-hh<w.y+w.h)return false}
  for(const o of getObjects()){if(!o.collide)continue;if(x+hw>o.x&&x-hw<o.x+o.w&&y>o.y&&y-hh<o.y+o.h)return false}
  return true;
}
function getNearObject(){
  const e=S.echo,range=30;let nearest=null,bestD=range;
  for(const o of getObjects()){if(!o.interact)continue;const cx=Math.max(o.x,Math.min(e.x,o.x+o.w)),cy=Math.max(o.y,Math.min(e.y,o.y+o.h));const d=Math.hypot(e.x-cx,e.y-cy);if(d<bestD){bestD=d;nearest=o}}
  return nearest;
}

// Time-based routine with floor changes
function getEchoRoutine(){
  const h=new Date().getHours();
  if(h>=6&&h<9)return['bed','kitchen','recordplayer'];// morning: wake up, coffee, music
  if(h>=9&&h<12)return['desk','bookshelf','pixelcanvas','desk'];// morning work + art

const WAVE_LINES=["Hey there! Welcome to my station! 👋","Oh, a visitor! Make yourself at home 🛸","Hi! Click on anything to check it out!","*waves* Hey! Glad you stopped by ✨","Welcome aboard! Feel free to look around 🔮"];

const EchoAI={
  state:'idle',activityTimer:0,currentActivity:null,targetX:0,targetY:0,targetDir:0,routineIdx:0,arriveCallback:null,
  getRoutine(){return getEchoRoutine()},
  nextActivity(){const r=this.getRoutine();this.routineIdx=(this.routineIdx+1)%r.length;this.goToActivity(r[this.routineIdx])},
  goToActivity(actId,cb){
    const spot=ACTIVITY_SPOTS[actId];if(!spot)return;
    // Floor change
    if(spot.floor!==S.echo.floor){S.echo.floor=spot.floor;if(S.floor===spot.floor){S.echo.x=spot.x;S.echo.y=spot.y}}
    this.currentActivity=actId;this.targetX=spot.x;this.targetY=spot.y;this.targetDir=spot.dir;this.state='walking';this.arriveCallback=cb||null;S.echo.sitting=false;
  },
  walkTo(x,y,dir,cb){this.targetX=x;this.targetY=y;this.targetDir=dir||0;this.state='walking';this.arriveCallback=cb||null;this.currentActivity=null;S.echo.sitting=false},
  visitorClickObject(obj){
    if(this.state==='interacting')return;
    this.walkTo(obj.x+obj.w/2,obj.y+obj.h+20,3,()=>{S.nearObject=obj;this.state='interacting';this.activityTimer=0;interact();setTimeout(()=>{if(this.state==='interacting'){this.state='idle';this.activityTimer=0}},3000)});
  },
  visitorClickEcho(){
    if(this.state==='waving')return;
    this.state='waving';S.echo.dir=0;
    showThought(WAVE_LINES[Math.random()*WAVE_LINES.length|0]);
    addChatMsg('Echo',WAVE_LINES[Math.random()*WAVE_LINES.length|0]);
    for(let i=0;i<8;i++)S.particles.push({x:S.echo.x+Math.random()*20-10,y:S.echo.y-30,vx:Math.random()*2-1,vy:-1-Math.random(),life:20,color:'#ffd700',size:2});
    setTimeout(()=>{if(this.state==='waving'){this.state='idle';this.activityTimer=0}},2500);
  },
  update(dt){
    const e=S.echo;if(e.transforming){e.transformTimer+=dt;return}
    this.activityTimer+=dt;
    if(this.state==='walking'){
      if(e.floor!==S.floor){// Echo is on different floor, just teleport
        e.x=this.targetX;e.y=this.targetY;e.dir=this.targetDir;e.moving=false;this.state='activity';this.activityTimer=0;this.onStartActivity();return}
      const dx=this.targetX-e.x,dy=this.targetY-e.y,dist=Math.hypot(dx,dy);
      if(dist<6){e.x=this.targetX;e.y=this.targetY;e.dir=this.targetDir;e.moving=false;e.frame=0;this.state='activity';this.activityTimer=0;if(this.arriveCallback){this.arriveCallback();this.arriveCallback=null}else this.onStartActivity();return}
      const spd=90;e.x+=dx/dist*spd*dt;e.y+=dy/dist*spd*dt;e.moving=true;
      if(Math.abs(dx)>Math.abs(dy))e.dir=dx<0?1:2;else e.dir=dy<0?3:0;
      e.frameTimer+=dt;if(e.frameTimer>.15){e.frame=(e.frame+1)%3;e.frameTimer=0}
    }else if(this.state==='activity'){
      e.moving=false;const spot=ACTIVITY_SPOTS[this.currentActivity];const dur=spot?spot.dur[0]+Math.random()*(spot.dur[1]-spot.dur[0]):20;
      if(this.activityTimer>dur)this.nextActivity();
    }else if(this.state==='idle'){
      e.moving=false;if(this.activityTimer>2)this.nextActivity();
    }else{e.moving=false}
  },
  onStartActivity(){
    const act=this.currentActivity,e=S.echo;
    const thoughts={desk:"Let's write some code.",kitchen:"Coffee time ☕",bed:"Just a quick nap...",sofa:"Time to relax...",crystal:"What does the future hold...",window:"Earth is beautiful...",arcade:"Quick game break!",record:"🎵 Lofi vibes.",growlab:"How are my plants?",server:"All systems nominal.",telescope:"The stars are magnificent tonight...",viewchairs:"So peaceful up here...",hotchoc:"Hot cocoa weather...",fountain:"The water is soothing...",bench:"Nice to sit in nature...",portal:"The portal hums...",workbench:"Let me tinker..."};
    if(thoughts[act])showThought(thoughts[act]);
    if(act==='desk'||act==='sofa'||act==='bed'||act==='viewchairs'||act==='bench')e.sitting=true;
    if(act==='kitchen'){S.caffeine++;LS.set('caffeine',S.caffeine);updateCaffeineHUD()}
    if(act==='record'&&!S.musicPlaying)toggleMusic();
  }
};

function updatePixel(dt){
  const p=S.pixel;p.stateTimer+=dt;
  if(p.state==='sleep'){if(p.stateTimer>15){p.state='idle';p.stateTimer=0}return}
  if(p.state==='idle'){
    if(p.stateTimer>3+Math.random()*5){const r=Math.random();
      if(r<.2){// Follow Echo (might go to different floor)
        p.floor=S.echo.floor;if(p.floor===S.floor){p.targetX=S.echo.x+20;p.targetY=S.echo.y+10}p.state='follow';p.stateTimer=0}
      else if(r<.35){p.targetX=50+Math.random()*700;p.targetY=100+Math.random()*450;p.state='walk';p.stateTimer=0}
      else if(r<.4){p.targetX=620;p.targetY=460;p.state='walk';p.stateTimer=0;p._nextState='sleep'}
      else if(r<.45&&S.floor!==p.floor){p.floor=S.echo.floor;p.x=400;p.y=300;p.state='idle';p.stateTimer=0}// Ride elevator
      else p.stateTimer=0}
    return}
  if(p.state==='follow'){p.targetX=S.echo.x+20;p.targetY=S.echo.y+10;if(p.stateTimer>8){p.state='idle';p.stateTimer=0;return}}
  if(p.state==='walk'||p.state==='follow'){
    if(p.floor!==S.floor)return;// Skip movement on wrong floor
    const dx=p.targetX-p.x,dy=p.targetY-p.y,dist=Math.hypot(dx,dy);

function updateVisitor(dt){
  if(!S.useVisitor)return;
  const _dripSpd=(LS.get('equippedAccessories',{}).shoes==='shoe_boost'?0.05:0);
  const _speedBonus=1+(LootSystem.getStatBonuses().speed||0)/100+(typeof SpecialistSystem!=='undefined'?SpecialistSystem.getSpeedBonus():0)+_dripSpd;
  const spd=160*_speedBonus,v=S.visitor;
  
  // Dash cooldown
  if(S._dashCooldown>0)S._dashCooldown-=dt;
  
  // Smooth dash interpolation
  if(v._dashing&&v._dashTimer>0){
    v._dashTimer-=dt;
    const totalDur=v._dashDuration||0.18;
    const progress=1-(v._dashTimer/totalDur);
    // Ease-out curve for satisfying deceleration
    const eased=1-Math.pow(1-Math.min(progress,1),3);
    v.x=v._dashStartX+(v._dashTargetX-v._dashStartX)*eased;
    v.y=v._dashStartY+(v._dashTargetY-v._dashStartY)*eased;
    v.moving=true;
    // Trail particles during dash
    if(Math.random()<0.6){
      S.particles.push({x:v.x+(Math.random()-.5)*10,y:v.y+(Math.random()-.5)*5,vx:(Math.random()-.5)*1,vy:(Math.random()-.5)*1,life:8,color:'rgba(0,255,247,0.3)',size:3+Math.random()*2});
    }
    if(v._dashTimer<=0){
      v._dashing=false;
      v.x=v._dashTargetX;
      v.y=v._dashTargetY;
    }
    return; // Skip normal movement during dash
  }
  
  let dx=0,dy=0;
  // Keyboard movement (overrides walk target)
  if(S.keys.up){dy=-1;v.dir=3;v.walkTarget=null}
  if(S.keys.down){dy=1;v.dir=0;v.walkTarget=null}
  if(S.keys.left){dx=-1;v.dir=1;v.walkTarget=null}
  if(S.keys.right){dx=1;v.dir=2;v.walkTarget=null}
  // Walk-to-target (click/tap movement)
  if(!dx&&!dy&&v.walkTarget){
    const t=v.walkTarget,tdx=t.x-v.x,tdy=t.y-v.y,dist=Math.sqrt(tdx*tdx+tdy*tdy);
    if(dist<8){v.walkTarget=null;v.moving=false;if(t.action)t.action()}
    else{dx=tdx/dist;dy=tdy/dist;if(Math.abs(dx)>Math.abs(dy)){v.dir=dx>0?2:1}else{v.dir=dy>0?0:3}}
  }
  if(dx||dy){
    const len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;
    const nx=v.x+dx*spd*dt,ny=v.y+dy*spd*dt;
    if(nx>20&&nx<W-20)v.x=nx;
    if(ny>60&&ny<H-20)v.y=ny;
    v.moving=true;v.frameTimer+=dt;if(v.frameTimer>.15){v.frameTimer=0;v.frame=(v.frame+1)%3}
  } else {v.moving=false;v.frame=0}
  // Check what's near visitor
  S.visitorNear=null;
  for(const o of getObjects()){if(!o.interact)continue;
    if(Math.abs(v.x-(o.x+o.w/2))<30&&Math.abs(v.y-(o.y+o.h/2))<30){S.visitorNear=o;break}}
  // Also check room furniture when visiting someone's room
  if(!S.visitorNear&&RoomSystem.currentRoom&&RoomSystem.currentRoom.furniture){
    for(const furn of RoomSystem.currentRoom.furniture){
      const ft=FURNITURE_TYPES[furn.type];if(!ft)continue;
      if(Math.abs(v.x-(furn.x+ft.width/2))<30&&Math.abs(v.y-(furn.y+ft.height/2))<30){
        S.visitorNear={id:'room_furn_'+furn.type,x:furn.x,y:furn.y,w:ft.width,h:ft.height,label:ft.name,interact:true,_furnType:furn.type};break;
      }
    }
  }
}
function visitorInteract(){
  if(!S.useVisitor)return;

    const sw=S.spacewalk;
    // Plant flag on asteroid
    const asteroidX=100,asteroidY=400,asteroidR=25;
    if(Math.hypot(sw.x-asteroidX,sw.y-asteroidY)<asteroidR+15&&!sw.flagPlanted){
      sw.flagPlanted=true;LS.set('spacewalkFlag',true);
      Coins.earn(20,'flag');showNotification('🏴 Flag planted on asteroid! +20◈');
      for(let i=0;i<20;i++){

      }

  }
  
  // Don't interact if a popup is already open
  if(document.querySelector('.popup-overlay'))return;
  
  if(S.visitorNear){
    const id=S.visitorNear.id;
    S.nearObject=S.visitorNear;
    interact();

  if(Math.hypot(S.visitor.x-S.echo.x,S.visitor.y-S.echo.y)<40){

}
// Visitor skin transformation animation
function visitorTransform(newSkinId){
  const skin=VISITOR_SKINS.find(s=>s.id===newSkinId)||VISITOR_SKINS[0];
  const accent=skin.accent||skin.color;
  const rarity=RARITIES[skin.rarity]||RARITIES.common;
  const vx=S.visitor.x,vy=S.visitor.y;
  
  // Phase 1: Gathering energy (0-600ms) — pull particles inward, screen darkens
  S.visitor._transforming=true;S.visitor._transformPhase=1;S.visitor._transformTimer=0;S.visitor._transformSkin=newSkinId;
  S.visitor._transformAccent=accent;
  
  // Inward spiral particles
  for(let i=0;i<30;i++){
    const a=Math.random()*Math.PI*2,r=60+Math.random()*40;
    S.particles.push({x:vx+Math.cos(a)*r,y:vy-15+Math.sin(a)*r,vx:-Math.cos(a)*4,vy:-Math.sin(a)*4,life:35,color:accent,size:2+Math.random()*2});
  }
  // Sound: rising tone
  if(S.audioCtx){const c=S.audioCtx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(800,n+.6);g.gain.setValueAtTime(.08*S.volume,n);g.gain.exponentialRampToValueAtTime(.001,n+.6);o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.7)}
  
  // Phase 2: Flash + white silhouette (600ms)
  setTimeout(()=>{
    S.visitor._transformPhase=2;
    S.screenFlash='#ffffff';S.screenShake=8;
    // Burst sound
    if(S.audioCtx){const c=S.audioCtx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.value=600;g.gain.setValueAtTime(.12*S.volume,n);g.gain.exponentialRampToValueAtTime(.001,n+.3);o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.4)}
  },600);
  
  // Phase 3: Reveal new skin + explosion (1000ms)
  setTimeout(()=>{
    S.visitor.skin=newSkinId;LS.set('visitorSkin',newSkinId);
    S.visitor._transformPhase=3;
    S.screenFlash=accent;S.screenShake=4;
    // Massive outward particle explosion
    for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,sp=4+Math.random()*8;
      S.particles.push({x:vx,y:vy-15,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:35,color:i%3===0?'#ffffff':accent,size:2+Math.random()*4})}
    // Rising text
    S.floatTexts.push({text:'⚡ '+skin.label+' ⚡',x:vx-30,y:vy-60,color:rarity.color,life:90});
    // Fanfare sound
    if(S.audioCtx){const c=S.audioCtx,n=c.currentTime;[600,800,1000,1200].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.1*S.volume,n+i*.08);g.gain.exponentialRampToValueAtTime(.001,n+i*.08+.2);o.connect(g);g.connect(S.masterGain);o.start(n+i*.08);o.stop(n+i*.08+.3)})}
  },1000);
  
  // Phase 4: Done (1500ms)
  setTimeout(()=>{
    S.visitor._transforming=false;S.visitor._transformPhase=0;
    showNotification('⚡ '+skin.label+' equipped!');

    ctx.fillStyle='#60ff60';ctx.fillRect(3*sc,0,sc,2*sc);ctx.fillRect(6*sc,0,sc,2*sc);
    ctx.fillStyle='#ffff00';ctx.fillRect(3*sc,-sc,sc,sc);ctx.fillRect(6*sc,-sc,sc,sc); // antenna tips
    ctx.fillStyle='#222';ctx.fillRect(3*sc,2*sc,2*sc,sc);ctx.fillRect(6*sc,2*sc,2*sc,sc); // big eyes
  }
  else if(skin.id==='robot'){
    // Silver metallic
    ctx.fillStyle='#c0c0c0';ctx.fillRect(2*sc,3*sc,6*sc,5*sc); // body
    ctx.fillStyle='#a0a0a0';ctx.fillRect(2*sc,1*sc,6*sc,3*sc); // head
    ctx.strokeStyle='#808080';ctx.lineWidth=1;
    ctx.strokeRect(2*sc,1*sc,6*sc,3*sc);ctx.strokeRect(2*sc,3*sc,6*sc,5*sc); // panel lines
    ctx.fillStyle='#ff0000';ctx.fillRect(4*sc,2*sc,sc,sc);ctx.fillRect(6*sc,2*sc,sc,sc); // red LED eyes
  }
  else if(skin.id==='ghost'){
    // Translucent white
    ctx.globalAlpha=0.7;
    ctx.fillStyle='#f0f0f0';ctx.fillRect(2*sc,2*sc,6*sc,6*sc);
    // Wavy bottom
    for(let i=0;i<6;i++){
      const wave=Math.sin(S.time*4+i)*sc;
      ctx.fillRect((2+i)*sc,8*sc+wave,sc,sc);
    }
    ctx.fillStyle='#222';ctx.fillRect(4*sc,2*sc,sc,sc);ctx.fillRect(6*sc,2*sc,sc,sc); // eyes
    ctx.globalAlpha=1;
  }
  else if(skin.id==='star'){
    // Golden sparkle
    ctx.fillStyle='#ffd700';ctx.fillRect(2*sc,3*sc,6*sc,5*sc); // body
    ctx.fillStyle='#ffaa00';ctx.fillRect(2*sc,1*sc,6*sc,3*sc); // head
    // Sparkle effects
    for(let i=0;i<5;i++){
      const sparkle=Math.sin(S.time*6+i*1.2)*.5+.5;
      ctx.fillStyle=`rgba(255,255,255,${sparkle})`;
      ctx.fillRect((1+i*2)*sc,(1+i%3)*sc,sc,sc);
    }
    ctx.fillStyle='#f5d6b8';ctx.fillRect(3*sc,2*sc,4*sc,2*sc); // face
    ctx.fillStyle='#222';ctx.fillRect(4*sc,2*sc,sc,sc);ctx.fillRect(6*sc,2*sc,sc,sc); // eyes
  }
  else {
    // Default hooded figure — enhanced
    ctx.fillStyle=c;ctx.fillRect(2*sc,3*sc,6*sc,5*sc); // body
    ctx.fillStyle=d;ctx.fillRect(2*sc,1*sc,6*sc,3*sc);ctx.fillRect(1*sc,2*sc,8*sc,2*sc); // hood
    // Hair detail at top of head
    const hairColor=c+'cc';ctx.fillStyle=d;ctx.fillRect(3*sc,1*sc,sc,sc);ctx.fillRect(6*sc,1*sc,sc,sc);
    ctx.fillStyle='#f5d6b8';ctx.fillRect(3*sc,2*sc,4*sc,2*sc); // face
    // Eyes with highlight
    ctx.fillStyle='#222';ctx.fillRect(4*sc,2*sc,sc,sc);ctx.fillRect(6*sc,2*sc,sc,sc);
    ctx.fillStyle='#ffffff';ctx.fillRect(4*sc+Math.floor(sc*.6),2*sc,Math.ceil(sc*.4),Math.ceil(sc*.4));ctx.fillRect(6*sc+Math.floor(sc*.6),2*sc,Math.ceil(sc*.4),Math.ceil(sc*.4));
    // Small mouth
    ctx.fillStyle='#c09080';ctx.fillRect(5*sc,3*sc+Math.floor(sc*.5),sc,Math.ceil(sc*.3));
    // Hands at arm bottoms
    ctx.fillStyle='#f5d6b8';ctx.fillRect(2*sc,7*sc,sc,sc);ctx.fillRect(7*sc,7*sc,sc,sc);
    // Shoe highlight
    ctx.fillStyle=d;ctx.fillRect(2*sc,8*sc,2*sc,Math.ceil(sc*.3));ctx.fillRect(6*sc,8*sc,2*sc,Math.ceil(sc*.3));
  }
  
  // Feet (walk animation) - universal
  ctx.fillStyle=d;
  if(v.moving&&v.frame===1){ctx.fillRect(2*sc,8*sc,2*sc,2*sc);ctx.fillRect(6*sc,8*sc,2*sc,2*sc)}
  else if(v.moving&&v.frame===2){ctx.fillRect(3*sc,8*sc,2*sc,2*sc);ctx.fillRect(5*sc,8*sc,2*sc,2*sc)}
  else{ctx.fillRect(2*sc,8*sc,2*sc,sc);ctx.fillRect(6*sc,8*sc,2*sc,sc)}
  
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(1*sc,9*sc,8*sc,sc);
  ctx.restore();
  
  // Accessories (hat, trail, pet — aura rendered before avatar via renderVisitorAccessories)
  renderVisitorAccessories(ctx,v);
  
  // Name label
  ctx.fillStyle=skin.color;ctx.font='bold 9px monospace';ctx.textAlign='center';
  ctx.fillText(LS.get('visitorName','Visitor'),v.x,v.y-sz*sc-4);ctx.textAlign='left';
  
  // Lightsaber held by visitor
  if(S._visitorSaber){
    const col=S._visitorSaber==='green'?'#00ff44':'#4488ff';
    const colGlow=S._visitorSaber==='green'?'rgba(0,255,68,.3)':'rgba(68,136,255,.3)';
    const swing=S._saberSwing>0?Math.sin(S._saberSwing*Math.PI)*1.2:0;
    const side=v.dir===1?-1:1;// left or right facing
    const hx=v.x+side*12,hy=v.y-20;
    ctx.save();ctx.translate(hx,hy);ctx.rotate(-.8*side+swing*side);
    // Hilt
    ctx.fillStyle='#666';ctx.fillRect(-2,-3,4,10);ctx.fillStyle='#888';ctx.fillRect(-1,-1,2,6);
    // Blade
    const bladeLen=28+Math.sin(S.time*8)*2;
    ctx.shadowColor=col;ctx.shadowBlur=10+Math.sin(S.time*6)*3;
    ctx.fillStyle=col;ctx.fillRect(-1,-3-bladeLen,2,bladeLen);
    ctx.fillStyle='#fff';ctx.fillRect(0,-3-bladeLen,1,bladeLen);// core
    ctx.fillStyle=colGlow;ctx.fillRect(-3,-3-bladeLen,6,bladeLen);
    ctx.shadowBlur=0;
    ctx.restore();
  }
  // Weapon rendering (v20)
  if(WeaponSystem.equipped && !S._visitorSaber){
    WeaponSystem.renderWeapon(ctx, v.x, v.y, v.dir, S.time);
  }
  // Weapon icon badge next to name
  if(WeaponSystem.equipped){
    const wi=WeaponSystem.equipped.icon||'';
    ctx.font='10px serif';ctx.textAlign='left';
    ctx.fillText(wi, v.x+ctx.measureText(LS.get('visitorName','Visitor')).width/2+4, v.y-sz*sc-4);
    ctx.textAlign='left';
  }
  // SPACE prompt when near object
  if(S.visitorNear){ctx.fillStyle='rgba(255,255,200,0.9)';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText('\u23B5 SPACE',v.x,v.y-sz*sc-16);ctx.textAlign='left'}
}

function adjustBrightness(hex,percent){
  const num=parseInt(hex.replace('#',''),16),amt=Math.round(2.55*percent);
  const R=(num>>16)+amt,G=(num>>8&0x00FF)+amt,B=(num&0x0000FF)+amt;
  return'#'+(0x1000000+(R<255?R<1?0:R:255)*0x10000+(G<255?G<1?0:G:255)*0x100+(B<255?B<1?0:B:255)).toString(16).slice(1);
}

// §26a. VIRTUAL JOYSTICK & MOBILE CONTROLS
// ═══════════════════════════════════════
const VirtualJoystick = {
  active: false,
  centerX: 0,
  centerY: 0,
  currentX: 0,
  currentY: 0,
  touchId: null,
  
  init() {
    const base = $('#joystick-base');
    const knob = $('#joystick-knob');
    
    if (!base || !knob) return;
    
    const rect = base.getBoundingClientRect();
    this.centerX = rect.left + rect.width / 2;
    this.centerY = rect.top + rect.height / 2;
    
    // Touch events for joystick
    base.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (this.touchId !== null) return;
      
      // Recalculate center on each touch (handles scroll/resize)
      const rect = base.getBoundingClientRect();
      this.centerX = rect.left + rect.width / 2;
      this.centerY = rect.top + rect.height / 2;
      
      const touch = e.touches[0];
      this.touchId = touch.identifier;
      this.active = true;
      this.updateKnob(touch.clientX, touch.clientY);
    }, { passive: false });
    
    document.addEventListener('touchmove', (e) => {
      if (!this.active || this.touchId === null) return;
      
      const touch = Array.from(e.touches).find(t => t.identifier === this.touchId);
      if (!touch) return;
      
      e.preventDefault();
      this.updateKnob(touch.clientX, touch.clientY);
    }, { passive: false });
    
    document.addEventListener('touchend', (e) => {
      if (!this.active || this.touchId === null) return;
      
      const touch = Array.from(e.changedTouches).find(t => t.identifier === this.touchId);
      if (!touch) return;
      
      this.active = false;
      this.touchId = null;
      knob.style.transform = 'translate(-50%, -50%)';
      // Clear movement
      S.keys.up = S.keys.down = S.keys.left = S.keys.right = false;
    });
  },
  
  updateKnob(touchX, touchY) {
    const knob = $('#joystick-knob');
    const dx = touchX - this.centerX;
    const dy = touchY - this.centerY;
    const distance = Math.sqrt(dx * dx + dy * dy);
    const maxDistance = 35; // Half of base radius
    
    let knobX = dx;
    let knobY = dy;
    
    if (distance > maxDistance) {
      knobX = (dx / distance) * maxDistance;
      knobY = (dy / distance) * maxDistance;
    }
    
    knob.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
    
    // Convert to 4-direction movement based on joystick angle
    const deadzone = 8;
    if (distance > deadzone) {
      const angle = Math.atan2(dy, dx); // radians: 0=right, PI/2=down, PI=left, -PI/2=up
      
      // Clear all directions first
      S.keys.up = S.keys.down = S.keys.left = S.keys.right = false;
      
      // 8-directional: set based on angle quadrants with diagonals
      const deg = angle * 180 / Math.PI;
      if (deg > -67.5 && deg < 67.5) S.keys.right = true;
      if (deg > 22.5 && deg < 157.5) S.keys.down = true;
      if (deg > 112.5 || deg < -112.5) S.keys.left = true;
      if (deg > -157.5 && deg < -22.5) S.keys.up = true;
    } else {
      S.keys.up = S.keys.down = S.keys.left = S.keys.right = false;
    }
  }
};

async function loadStationStats(){

    S.stationStats=await r.json();
    initMilestones();
  }catch(e){
    console.log('Station stats not available:',e.message);
  }
}

async function recordStationVisit(){
  const name=LS.get('visitorName','Visitor');
  if(name==='Visitor')return;
  
  try{
    const r=await fetch('/api/station-stats/visit',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({visitorName:name})
    });
    const result=await r.json();
    if(result.newMilestones?.length>0){
      result.newMilestones.forEach(milestoneId=>{
        triggerMilestone(milestoneId);
      });
    }
  }catch(e){
    console.log('Failed to record visit:',e.message);
  }
}

function updateKittens(dt){
  if(!S.stationStats.milestones.includes('pixel_kittens'))return;
  if(S.kittens.length===0)initKittens();
  
  S.kittens.forEach(kitten=>{
    kitten.stateTimer+=dt;
    kitten.frameTimer+=dt;
    
    // Animation
    if(kitten.frameTimer>.3){
      kitten.frame=(kitten.frame+1)%2;
      kitten.frameTimer=0;
    }
    
    // AI State machine
    if(kitten.state==='wander'){
      if(kitten.stateTimer>3+Math.random()*5){
        if(Math.random()<.3){
          kitten.state='sleep';
          kitten.stateTimer=0;
        }else{
          kitten.targetX=100+Math.random()*600;
          kitten.targetY=100+Math.random()*400;
          kitten.state='walking';
          kitten.stateTimer=0;
        }
      }
    }else if(kitten.state==='walking'){
      const dx=kitten.targetX-kitten.x;
      const dy=kitten.targetY-kitten.y;
      const dist=Math.hypot(dx,dy);
      
      if(dist<8){
        kitten.state='wander';
        kitten.stateTimer=0;
      }else{
        const spd=kitten.name==='Byte'?80:kitten.name==='Glitch'?40:60; // Different speeds
        kitten.x+=dx/dist*spd*dt;
        kitten.y+=dy/dist*spd*dt;
        
        if(Math.abs(dx)>Math.abs(dy)){
          kitten.dir=dx>0?2:1;
        }else{
          kitten.dir=dy>0?0:3;
        }
      }
    }else if(kitten.state==='sleep'){
      if(kitten.stateTimer>8+Math.random()*10){
        kitten.state='wander';
        kitten.stateTimer=0;
      }
    }else if(kitten.state==='follow'){
      // Nova follows visitors
      if(S.useVisitor&&S.visitor.floor===kitten.floor){
        kitten.targetX=S.visitor.x+30;
        kitten.targetY=S.visitor.y+10;
        
        const dx=kitten.targetX-kitten.x;
        const dy=kitten.targetY-kitten.y;
        const dist=Math.hypot(dx,dy);
        
        if(dist>20){
          const spd=60;
          kitten.x+=dx/dist*spd*dt;
          kitten.y+=dy/dist*spd*dt;
          
          if(Math.abs(dx)>Math.abs(dy)){
            kitten.dir=dx>0?2:1;
          }else{
            kitten.dir=dy>0?0:3;
          }
        }
        
        if(kitten.stateTimer>15){
          kitten.state='wander';
          kitten.stateTimer=0;
        }
      }else{
        kitten.state='wander';
        kitten.stateTimer=0;
      }
    }
  });
}

function renderKittens(){

    ctx.fillRect(kitten.x-sprW/2+scale,kitten.y-sprH,6*scale,3*scale); // head
    
    // Ears
    ctx.fillRect(kitten.x-sprW/2+scale,kitten.y-sprH-scale,scale,2*scale);
    ctx.fillRect(kitten.x-sprW/2+4*scale,kitten.y-sprH-scale,scale,2*scale);
    
    // Eyes
    ctx.fillStyle='#30ee50';
    ctx.fillRect(kitten.x-sprW/2+2*scale,kitten.y-sprH+scale,scale,scale);
    ctx.fillRect(kitten.x-sprW/2+4*scale,kitten.y-sprH+scale,scale,scale);

}

function getSeason(){
  const m=new Date().getMonth();
  if(m>=2&&m<=4)return'spring';
  if(m>=5&&m<=7)return'summer';
  if(m>=8&&m<=10)return'autumn';
  return'winter';
}

function updateSeasonalEffects(dt){
  const season=getSeason();
  
  // Spawn seasonal particles
  if(Math.random()<.3){
    let newParticle=null;
    
    switch(season){
      case'spring':
        // Green particles drift up in Garden, flower colors brighter
        if(S.floor===4||Math.random()<.1){
          newParticle={
            x:Math.random()*W,y:H+10,
            vx:(Math.random()-.5)*1,vy:-1-Math.random()*.5,
            life:60+Math.random()*40,
            color:['#60ee60','#90ff90','#ffb6c1'][Math.random()*3|0],
            size:2+Math.random()*2,
            type:'spring'
          };
        }
        break;
        
      case'summer':
        // Fireflies on F4 (tiny yellow dots that pulse)
        if(S.floor===4&&Math.random()<.2){
          newParticle={
            x:200+Math.random()*400,y:200+Math.random()*300,
            vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,
            life:120+Math.random()*80,
            color:'#ffff80',size:1,
            type:'firefly',pulse:Math.random()*Math.PI*2
          };
        }
        break;
        
      case'autumn':
        // Orange/red leaf particles fall slowly on all floors
        newParticle={
          x:Math.random()*W,y:-10,
          vx:Math.sin(S.time*2+Math.random()*4)*.5,
          vy:1+Math.random()*2,
          life:80+Math.random()*40,
          color:['#ff6600','#ff4400','#cc3300','#ffaa00','#dd5500'][Math.random()*5|0],
          size:3+Math.random()*3,
          type:'leaf',wobble:Math.random()*Math.PI*2
        };
        break;
        
      case'winter':
        // Snow only during EVA spacewalk — it's a space station, no snow indoors!
        if(S.spacewalk.active){
          newParticle={
            x:Math.random()*W,y:-10,
            vx:Math.sin(S.time+Math.random()*4)*.8,
            vy:.5+Math.random()*1.5,
            life:100+Math.random()*60,
            color:'#ffffff',size:2+Math.random()*2,
            type:'snow'
          };
        }
        break;
    }
    
    if(newParticle){
      S.seasonalParticles.push(newParticle);
    }
  }
  
  // Update seasonal particles
  for(let i=S.seasonalParticles.length-1;i>=0;i--){
    const p=S.seasonalParticles[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.life--;
    
    // Special movement for different types
    if(p.type==='leaf'){
      p.wobble+=dt*3;
      p.x+=Math.sin(p.wobble)*.5;
    }else if(p.type==='firefly'){
      p.pulse+=dt*4;
    }
    
    if(p.life<=0||p.y>H+20||p.x<-20||p.x>W+20){
      S.seasonalParticles.splice(i,1);
      continue;
    }
  }
  
  // Cap seasonal particles at 20
  if(S.seasonalParticles.length>20){
    S.seasonalParticles=S.seasonalParticles.slice(-20);
  }
}

function renderSeasonalEffects(){
  S.seasonalParticles.forEach(p=>{
    if(p.type==='firefly'){
      // Pulsing yellow dots
      const alpha=.5+Math.sin(p.pulse)*.4;
      ctx.globalAlpha=alpha;
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
      ctx.globalAlpha=1;
    }else{
      // Regular particles
      ctx.globalAlpha=Math.min(1,p.life/30);
      ctx.fillStyle=p.color;
      
      if(p.type==='leaf'){
        // Rectangular leaves
        ctx.save();
        ctx.translate(p.x,p.y);
        ctx.rotate(p.wobble*.5);
        ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*.6);
        ctx.restore();
      }else{
        // Circular particles (spring, snow)
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
      }
      
      ctx.globalAlpha=1;
    }
  });
}

function renderSeasonalOverlay(){
  const season=getSeason();
  
  switch(season){
    case'summer':
      // Warm orange tint overlay
      ctx.fillStyle='rgba(255,150,50,.03)';
      ctx.fillRect(0,0,W,H);
      break;
      
    case'autumn':
      // Warm amber tint
      ctx.fillStyle='rgba(255,120,40,.04)';
      ctx.fillRect(0,0,W,H);
      break;
      
    case'winter':
      // Frost on window edges (F1, F2, F4)
      if([1,2,4].includes(S.floor)){
        ctx.strokeStyle='rgba(200,230,255,.3)';
        ctx.lineWidth=2;
        ctx.setLineDash([3,2]);
        ctx.strokeRect(5,5,W-10,H-10);
        ctx.setLineDash([]);
      }
      break;
  }
}

function timeAgo(ts){
  if(!ts)return'a while';
  const diff=Date.now()-ts;const s=diff/1000;
  if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  const d=Math.floor(s/86400);
  if(d===1)return'yesterday';if(d<7)return d+' days ago';
  if(d<30)return Math.floor(d/7)+' week'+(Math.floor(d/7)>1?'s':'')+' ago';
  return Math.floor(d/30)+' month'+(Math.floor(d/30)>1?'s':'')+' ago';
}

async function loadVisitorMemory(){
  const name=LS.get('visitorName','Visitor');
  if(name==='Visitor')return;
  
  // Track local visit data
  const localData=LS.get('visitorLocalData',{firstVisit:Date.now(),visitCount:0,totalTime:0,floorTime:{}});
  localData.visitCount++;
  localData.lastVisit=Date.now();
  LS.set('visitorLocalData',localData);
  
  // Track floor time
  if(!S._floorTimeTracker){
    S._floorTimeTracker=setInterval(()=>{
      const ld=LS.get('visitorLocalData',{floorTime:{}});
      ld.floorTime=ld.floorTime||{};
      ld.floorTime[S.floor]=(ld.floorTime[S.floor]||0)+5;
      ld.totalTime=(ld.totalTime||0)+5;
      LS.set('visitorLocalData',ld);
    },5000);
  }
  
  try{
    const r=await fetch(`/api/visitor-memory?name=${encodeURIComponent(name)}`);
    const memory=await r.json();
    
    if(memory.visitCount>0){
      const ago=timeAgo(memory.lastVisit);
      const greetings=[
        `Welcome back, ${name}! 🔮 You were here ${ago}. Visit #${memory.visitCount+1}!`,
        `${name}! Good to see you again! Last time was ${ago} — you spent the most time on F${memory.favFloor}.`,
        `Hey ${name}! ${ago} since your last visit. You've earned ${memory.totalCoins||0}◈ total across all sessions!`,
      ];
      
      if(memory.highScores){
        const topGame=Object.entries(memory.highScores).sort((a,b)=>b[1]-a[1])[0];
        if(topGame&&topGame[1]>0){
          greetings.push(`${name}! Back to beat your ${topGame[0]} record of ${topGame[1]}? You were here ${ago}. Let's go! 🕹️`);
        }
      }
      
      const greeting=greetings[Math.floor(Math.random()*greetings.length)];
      setTimeout(()=>{addChatMsg('Echo',greeting);showThought(greeting.split('.')[0])},2000);
    }
  } catch(e){
    console.log('Visitor memory not available:',e.message);
  }
}

async function saveVisitorMemory(){
  const name=LS.get('visitorName','Visitor');
  if(name==='Visitor')return;
  
  try{
    await fetch('/api/visitor-memory',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        visitorName:name,
        highScores:S.highScores,
        favFloor:S.floor,
        totalCoins:Coins.lifetime,
        lastWords:S.lastChatMessage||''
      })
    });
  } catch(e){
    console.log('Failed to save visitor memory:',e.message);
  }
}

        });

    showThought("EVA mode activated! 🚀");

  }
}

function updateSpacewalk(dt){
  if(!S.spacewalk.active)return;
  
  const sw=S.spacewalk;
  // Reduced gravity physics
  const thrust=120; // pixels/sec
  let dx=0,dy=0;
  
  if(S.keys.up)dy=-1;if(S.keys.down)dy=1;if(S.keys.left)dx=-1;if(S.keys.right)dx=1;
  
  if(dx||dy){
    const len=Math.sqrt(dx*dx+dy*dy);dx/=len;dy/=len;
    sw.vx+=dx*thrust*dt;sw.vy+=dy*thrust*dt;
    
    // Particle effects from thruster
    for(let i=0;i<3;i++){
      S.particles.push({
        x:sw.x-dx*15+Math.random()*10-5,y:sw.y-dy*15+Math.random()*10-5,
        vx:-dx*50+Math.random()*20-10,vy:-dy*50+Math.random()*20-10,
        life:15+Math.random()*10,color:'#00fff7',size:2
      });
    }
  }
  
  // Apply velocity with drag
  sw.x+=sw.vx*dt;sw.y+=sw.vy*dt;
  sw.vx*=.95;sw.vy*=.95; // space drag
  
  // Keep in bounds with momentum bounce
  if(sw.x<20){sw.x=20;sw.vx=Math.abs(sw.vx)*.7}
  if(sw.x>W-20){sw.x=W-20;sw.vx=-Math.abs(sw.vx)*.7}
  if(sw.y<20){sw.y=20;sw.vy=Math.abs(sw.vy)*.7}
  if(sw.y>H-20){sw.y=H-20;sw.vy=-Math.abs(sw.vy)*.7}
  
  // Earth rotation
  sw.earthAngle+=dt*.1;
  
  // Debris physics and collection
  sw.debris.forEach((d,i)=>{
    if(d.collected)return;
    d.x+=d.vx*dt;d.y+=d.vy*dt;
    // Wrap around screen
    if(d.x<-10)d.x=W+10;if(d.x>W+10)d.x=-10;
    if(d.y<-10)d.y=H+10;if(d.y>H+10)d.y=-10;
    
    // Collection check
    if(Math.hypot(d.x-sw.x,d.y-sw.y)<d.size+8){
      d.collected=true;Coins.earn(d.value,'debris');
      S.floatTexts.push({text:`+${d.value}◈`,x:d.x,y:d.y-20,color:'#ffd700',life:60});
      ArcSnd?.play('coin');
      // Rare chance for loot drop from debris
      LootSystem.drop('eva_debris',LootSystem.getStatBonuses().luck||0);
    }
  });
  
  // Remove collected debris
  sw.debris=sw.debris.filter(d=>!d.collected);
  
  // Check if near station (to return)
  const stationCenterX=W/2,stationCenterY=H/2;
  if(Math.hypot(sw.x-stationCenterX,sw.y-stationCenterY)<40){
    if(!sw._nearStation){
      sw._nearStation=true;
      showNotification("Press 🚀 to dock with station");
    }
  } else {
    sw._nearStation=false;
  }
}

function renderSpacewalk(){
  if(!S.spacewalk.active)return;
  
  const sw=S.spacewalk;
  
  // Deep space background
  ctx.fillStyle='#000005';ctx.fillRect(0,0,W,H);
  
  // Distant stars
  for(let i=0;i<200;i++){
    const bright=.1+Math.sin(S.time+i*.3)*.3;
    ctx.fillStyle=`rgba(255,255,255,${bright})`;
    const sx=((i*37+13)%W),sy=((i*23+7)%H);
    ctx.fillRect(sx,sy,i%7?1:2,i%7?1:2);
  }
  
  // Earth (in background)
  const earthX=W-150,earthY=100,earthR=60;
  const grd=ctx.createRadialGradient(earthX,earthY,0,earthX,earthY,earthR);
  grd.addColorStop(0,'#4a90e2');grd.addColorStop(.7,'#2a5aa0');grd.addColorStop(1,'#1a3060');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(earthX,earthY,earthR,0,Math.PI*2);ctx.fill();
  
  // Earth continents (rotating)
  ctx.fillStyle='#3a8a3a';
  for(let i=0;i<8;i++){
    const a=sw.earthAngle+i*.8,r=earthR*.8;
    const x=earthX+Math.cos(a)*r*.6,y=earthY+Math.sin(a)*r*.4;
    ctx.beginPath();ctx.arc(x,y,8+i*2,0,Math.PI*2);ctx.fill();
  }
  
  // Earth clouds
  ctx.fillStyle='rgba(255,255,255,.3)';
  for(let i=0;i<12;i++){
    const a=sw.earthAngle*.7+i*.6,r=earthR*.9;
    const x=earthX+Math.cos(a)*r*.7,y=earthY+Math.sin(a)*r*.5;
    ctx.beginPath();ctx.arc(x,y,4+i*1.5,0,Math.PI*2);ctx.fill();
  }
  
  // Space station (small lit rectangle in center)
  const stationX=W/2-30,stationY=H/2-20,stationW=60,stationH=40;
  ctx.fillStyle='#2a2a3a';ctx.fillRect(stationX,stationY,stationW,stationH);
  // Station windows (glowing)
  for(let i=0;i<4;i++){
    ctx.fillStyle=`rgba(255,180,80,${.6+Math.sin(S.time*2+i)*.3})`;
    ctx.fillRect(stationX+8+i*12,stationY+10,8,6);
    ctx.fillRect(stationX+8+i*12,stationY+24,8,6);
  }
  // Station solar panels
  ctx.fillStyle='#1a1a4a';ctx.fillRect(stationX-10,stationY+15,8,10);
  ctx.fillRect(stationX+stationW+2,stationY+15,8,10);
  
  // Asteroid (mini-asteroid to land on)
  const asteroidX=100,asteroidY=400,asteroidR=25;
  ctx.fillStyle='#4a3a2a';ctx.beginPath();ctx.arc(asteroidX,asteroidY,asteroidR,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a2a1a';
  for(let i=0;i<6;i++){
    const a=i*1.05,r=asteroidR*.8;
    ctx.beginPath();ctx.arc(asteroidX+Math.cos(a)*r,asteroidY+Math.sin(a)*r,3,0,Math.PI*2);ctx.fill();
  }
  
  // Flag on asteroid (if planted)
  if(sw.flagPlanted){
    ctx.fillStyle='#888';ctx.fillRect(asteroidX-2,asteroidY-asteroidR-15,2,15);
    ctx.fillStyle='#ff4444';ctx.fillRect(asteroidX,asteroidY-asteroidR-12,12,8);
    ctx.fillStyle='#fff';ctx.font='8px sans-serif';ctx.fillText('🌍',asteroidX+2,asteroidY-asteroidR-6);
  }
  
  // Space debris
  sw.debris.forEach(d=>{
    if(d.collected)return;
    const pulse=.7+Math.sin(S.time*4+d.x*.01)*.3;
    ctx.fillStyle=d.type==='crystal'?`rgba(0,255,200,${pulse})`:`rgba(150,150,150,${pulse})`;
    ctx.beginPath();ctx.arc(d.x,d.y,d.size,0,Math.PI*2);ctx.fill();
    
    if(d.type==='crystal'){
      ctx.fillStyle=`rgba(0,255,200,${pulse*.5})`;
      ctx.beginPath();ctx.arc(d.x,d.y,d.size*2,0,Math.PI*2);ctx.fill();
    }
  });
  
  // Visitor in space suit
  const v=S.visitor;
  ctx.save();ctx.translate(sw.x,sw.y);
  // Space suit (white with helmet)
  ctx.fillStyle='#ffffff';ctx.fillRect(-12,-15,24,20);
  ctx.fillStyle='#e0e0e0';ctx.beginPath();ctx.arc(0,-20,10,0,Math.PI*2);ctx.fill(); // helmet
  ctx.fillStyle='#222';ctx.beginPath();ctx.arc(0,-20,8,0,Math.PI*2);ctx.fill(); // visor
  // Jetpack thrusters
  if(dx||dy){
    ctx.fillStyle='#00fff7';
    for(let i=0;i<3;i++){
      ctx.beginPath();ctx.arc(-dx*20+Math.random()*6-3,-dy*20+Math.random()*6-3,2,0,Math.PI*2);ctx.fill();
    }
  }
  // Life support backpack
  ctx.fillStyle='#666';ctx.fillRect(-10,5,20,8);
  // Tether cable to station
  ctx.strokeStyle='rgba(200,200,200,.4)';ctx.lineWidth=1;ctx.setLineDash([2,2]);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(stationX+stationW/2-sw.x,stationY+stationH/2-sw.y);ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
  
  // HUD overlay for EVA

function toggleSabers(){
  if(!S._visitorSaber){
    S._visitorSaber='green';
    S._saberGreen=0;S._saberBlue=0;
    const target=S._visitorSaber==='green'?'_saberGreen':'_saberBlue';
    const iv=setInterval(()=>{
      S[target]+=0.1;
      if(S[target]>=1){S[target]=1;clearInterval(iv)}
    },50);
    playSaberSound('ignite');
    showThought('Green saber ignited! ⚔️');
  } else {
    // Switch saber
    S._visitorSaber=S._visitorSaber==='green'?'blue':'green';
    S._saberGreen=0;S._saberBlue=0;
    const target=S._visitorSaber==='green'?'_saberGreen':'_saberBlue';
    const iv=setInterval(()=>{
      S[target]+=0.1;
      if(S[target]>=1){S[target]=1;clearInterval(iv)}
    },50);
    playSaberSound('ignite');
    showThought(`Switched to ${S._visitorSaber} saber! ⚔️`);
  }

function swingSaber(){
  if(!S._visitorSaber)return;
  S._saberSwing=1;
  setTimeout(()=>S._saberSwing=0,600);
  // Send swing to multiplayer
  if(S.useVisitor&&ws?.readyState===1){
    ws.send(JSON.stringify({type:'player.swing',saber:S._visitorSaber,dir:S.visitor.dir}));
  }
  playSaberSound('swing');
  // Check if hitting Pixel!
  checkPixelHit();
}

function checkPixelHit(){
  const p=S.pixel,v=S.visitor;
  if(p.floor!==S.floor)return;
  const dist=Math.hypot(p.x-v.x,p.y-v.y);
  if(dist>50)return;
  
  if(!S._pixelAnger)S._pixelAnger=0;
  S._pixelAnger++;
  
  // Pixel dodges! Quick jump away from visitor
  const angle=Math.atan2(p.y-v.y,p.x-v.x);
  const dodgeDist=40+Math.random()*30;
  p.x=Math.max(30,Math.min(770,p.x+Math.cos(angle)*dodgeDist));
  p.y=Math.max(100,Math.min(580,p.y+Math.sin(angle)*dodgeDist));
  
  // Dodge particles (cat scatter!)
  for(let i=0;i<8;i++){S.particles.push({x:p.x,y:p.y-10,vx:(Math.random()-.5)*4,vy:-Math.random()*3,life:15,color:'#ffaa22',size:2})}
  
  if(S._pixelAnger<=2){
    showThought("Meow?! 😾");
    S.floatTexts.push({text:'❗',x:p.x,y:p.y-30,color:'#ff4444',life:40});
  } else if(S._pixelAnger<=5){
    showThought("Stop that!! 🙀");
    S.floatTexts.push({text:'💢',x:p.x,y:p.y-30,color:'#ff2222',life:40});
    // Pixel hisses — sparks!
    for(let i=0;i<12;i++){S.particles.push({x:p.x,y:p.y-15,vx:(Math.random()-.5)*6,vy:-Math.random()*4,life:20,color:i%2?'#ff4444':'#ffaa22',size:1+Math.random()*2})}
  } else {
    // Pixel fights back! Force push!
    showThought("HISSSS!! ⚡🐱");
    S.floatTexts.push({text:'💥 FORCE PUSH!',x:p.x-20,y:p.y-40,color:'#bb44ff',life:60});
    // Knockback the visitor!
    const pushAngle=Math.atan2(v.y-p.y,v.x-p.x);
    v.x=Math.max(30,Math.min(770,v.x+Math.cos(pushAngle)*80));
    v.y=Math.max(100,Math.min(580,v.y+Math.sin(pushAngle)*80));
    S.screenShake=8;
    // Epic particle burst from Pixel
    for(let i=0;i<25;i++){const a=Math.random()*Math.PI*2,sp=3+Math.random()*5;S.particles.push({x:p.x,y:p.y-10,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:25,color:i%3===0?'#ffffff':i%3===1?'#bb44ff':'#ffaa22',size:2+Math.random()*3})}
    // Purple shockwave ring
    for(let i=0;i<20;i++){const a=i/20*Math.PI*2;S.particles.push({x:p.x+Math.cos(a)*5,y:p.y-10+Math.sin(a)*5,vx:Math.cos(a)*4,vy:Math.sin(a)*4,life:15,color:'#bb44ff',size:3})}
    // Sound
    if(S.audioCtx){const c=S.audioCtx,n=c.currentTime,o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(400,n);o.frequency.exponentialRampToValueAtTime(100,n+.3);g.gain.setValueAtTime(.15*S.volume,n);g.gain.exponentialRampToValueAtTime(.001,n+.3);o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.4)}
    S._pixelAnger=0; // Resets after force push
    // Pixel earns respect
    if(!S._pixelRespect){S._pixelRespect=true;showNotification("🐱 Pixel respects your fighting spirit! +10◈");Coins.earn(10,'pixel_respect')}
  }
  // Anger decays after 5 seconds
  clearTimeout(S._pixelAngerTimeout);
  S._pixelAngerTimeout=setTimeout(()=>{S._pixelAnger=Math.max(0,S._pixelAnger-2)},5000);
}


function updateSabers(dt){
  // Animate saber ignition
  if(S._saberSwing>0){
    S._saberSwing-=dt*1.67; // 600ms duration
    if(S._saberSwing<=0)S._saberSwing=0;
  }
}

function playSaberSound(type){
  if(!S.audioCtx)return;
  const c=S.audioCtx,n=c.currentTime,v=S.volume*.2;
  const o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(S.masterGain);
  
  if(type==='ignite'){
    o.type='sawtooth';
    o.frequency.setValueAtTime(80,n);
    o.frequency.exponentialRampToValueAtTime(800,n+.6);
    g.gain.setValueAtTime(v,n);
    g.gain.exponentialRampToValueAtTime(.001,n+.8);
    o.start(n);o.stop(n+.8);
  } else if(type==='swing'){
    o.type='sine';
    o.frequency.setValueAtTime(400,n);
    o.frequency.exponentialRampToValueAtTime(200,n+.4);
    g.gain.setValueAtTime(v*.5,n);
    g.gain.exponentialRampToValueAtTime(.001,n+.5);
    o.start(n);o.stop(n+.5);
  } else if(type==='clash'){
    o.type='square';
    o.frequency.setValueAtTime(800,n);
    o.frequency.setValueAtTime(1200,n+.1);
    o.frequency.exponentialRampToValueAtTime(300,n+.8);
    g.gain.setValueAtTime(v*1.5,n);
    g.gain.exponentialRampToValueAtTime(.001,n+.8);
    o.start(n);o.stop(n+.8);
  }
}

function createPopup(html){
  const ov=document.createElement('div');ov.className='popup-overlay';
  const p=document.createElement('div');p.className='popup';p.innerHTML='<span class="close-btn">&times;</span>'+html;
  function closePopup(){ov.remove();document.removeEventListener('keydown',popupKeyNav)}
  p.querySelector('.close-btn').onclick=closePopup;
  ov.onclick=e=>{if(e.target===ov)closePopup()};
  ov.appendChild(p);document.body.appendChild(ov);
  
  // Arrow key navigation for buttons inside popups
  let popupIdx=-1;
  function getNavBtns(){return[...p.querySelectorAll('.drink-btn,.skin-card,.floor-btn,button')]}
  function updatePopupSel(newIdx){
    const btns=getNavBtns();if(!btns.length)return;
    if(popupIdx>=0&&popupIdx<btns.length)btns[popupIdx].classList.remove('kbd-selected');
    popupIdx=((newIdx%btns.length)+btns.length)%btns.length;
    btns[popupIdx].classList.add('kbd-selected');
    btns[popupIdx].scrollIntoView({block:'nearest'});
  }
  function popupKeyNav(e){
    const btns=getNavBtns();if(!btns.length)return;
    if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();e.stopPropagation();updatePopupSel(popupIdx<=0?btns.length-1:popupIdx-1)}
    else if(e.key==='ArrowDown'||e.key==='ArrowRight'){e.preventDefault();e.stopPropagation();updatePopupSel(popupIdx+1)}
    else if(e.key==='Enter'){e.preventDefault();e.stopPropagation();if(popupIdx>=0&&popupIdx<btns.length)btns[popupIdx].click()}
    else if(e.key==='Escape'){e.preventDefault();closePopup()}
  }
  document.addEventListener('keydown',popupKeyNav);
  
  return{ov,p};
}

function showPortalDimension(){
  const {p}=createPopup(`
    <h3 style="color:#00fff7">🌀 Portal Dimension</h3>
    <div style="background:#000008;height:200px;position:relative;overflow:hidden;border-radius:8px;margin:10px 0">
      <canvas id="portal-canvas" width="380" height="200" style="display:block"></canvas>
    </div>
    <p style="color:#aaa;font-size:11px;text-align:center">A glimpse into infinite possibilities...</p>
  `);
  
  // Render mini starfield with floating islands
  const portalCanvas=p.querySelector('#portal-canvas');
  const portalCtx=portalCanvas.getContext('2d');
  
  let portalTime=0;
  const portalAnim=()=>{
    portalTime+=0.016;
    
    // Deep space background
    portalCtx.fillStyle='#000008';
    portalCtx.fillRect(0,0,380,200);
    
    // Swirling starfield
    for(let i=0;i<150;i++){
      const angle=portalTime*0.5+i*0.1;
      const radius=50+i*1.2;
      const x=190+Math.cos(angle)*radius*(0.5+Math.sin(portalTime+i)*0.3);
      const y=100+Math.sin(angle)*radius*0.3;
      
      if(x>0&&x<380&&y>0&&y<200){
        const brightness=0.3+Math.sin(portalTime*2+i)*0.4;
        portalCtx.fillStyle=`rgba(255,255,255,${brightness})`;
        portalCtx.fillRect(x,y,1,1);
      }
    }
    
    // Floating islands
    const islands=[
      {x:100,y:80,size:20,color:'#4a8a4a'},
      {x:280,y:60,size:25,color:'#8a6a4a'},
      {x:200,y:140,size:30,color:'#6a4a8a'}
    ];
    
    islands.forEach((island,i)=>{
      const float=Math.sin(portalTime*1.5+i*2)*8;
      const ix=island.x+Math.cos(portalTime*0.3+i)*10;
      const iy=island.y+float;
      
      // Island glow
      const glow=portalCtx.createRadialGradient(ix,iy,0,ix,iy,island.size*1.5);
      glow.addColorStop(0,island.color+'80');
      glow.addColorStop(1,'rgba(0,0,0,0)');
      portalCtx.fillStyle=glow;
      portalCtx.beginPath();
      portalCtx.arc(ix,iy,island.size*1.5,0,Math.PI*2);
      portalCtx.fill();
      
      // Island solid
      portalCtx.fillStyle=island.color;
      portalCtx.beginPath();
      portalCtx.arc(ix,iy,island.size,0,Math.PI*2);
      portalCtx.fill();
      
      // Island details
      portalCtx.fillStyle='#2a4a2a';
      portalCtx.fillRect(ix-island.size*0.3,iy-island.size*0.1,island.size*0.6,island.size*0.2);
    });
    
    // Portal energy swirls
    portalCtx.strokeStyle='rgba(0,255,200,0.6)';
    portalCtx.lineWidth=2;
    for(let i=0;i<5;i++){
      const spiralAngle=portalTime*3+i*1.2;
      const spiralRadius=30+i*8;
      portalCtx.beginPath();
      for(let a=0;a<Math.PI*4;a+=0.2){
        const sx=190+Math.cos(spiralAngle+a)*spiralRadius*(1-a/(Math.PI*4));
        const sy=100+Math.sin(spiralAngle+a)*spiralRadius*0.5*(1-a/(Math.PI*4));
        if(a===0)portalCtx.moveTo(sx,sy);
        else portalCtx.lineTo(sx,sy);
      }
      portalCtx.stroke();
    }
    
    if(p.closest('.popup-overlay')){
      requestAnimationFrame(portalAnim);
    }
  };
  
  requestAnimationFrame(portalAnim);
  showThought("Infinite dimensions unfold before me... 🌀");
}

      const isEq=_eqWpn===wpn.id;
      const isLoot=wpn.lootOnly||wpn.cost<0;
      const locked=wpn.skinLock&&S.visitor.skin!==wpn.skinLock;
      const r=RARITIES[wpn.rarity]||RARITIES.common;
      const wShim=wpn.rarity==='mythic'?' shimmer-mythic':wpn.rarity==='legendary'?' shimmer-legendary':wpn.rarity==='epic'?' shimmer-epic':'';
      html+='<div class="wpn-card'+(isEq?' equipped':'')+wShim+' rarity-'+wpn.rarity+'" data-action="shop-wpn" data-id="'+wpn.id+'" style="border-color:'+r.border+';--rarity-glow:'+(r.glow||'transparent')+'">';
      html+='<div class="wpn-icon">'+wpn.icon+'</div>';
      html+='<div class="wpn-name" style="color:'+r.color+'">'+wpn.name+'</div>';
      html+='<span class="rarity-badge '+wpn.rarity+'" style="font-size:7px"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:'+r.color+';margin-right:2px;vertical-align:middle"></span>'+r.name+'</span>';
      if(wpn.element)html+='<div style="font-size:7px;color:'+({fire:'#ff6600',ice:'#4488ff',lightning:'#ffdd00',energy:'#00ddff',light:'#ffd700'}[wpn.element]||'#aaa')+'">'+wpn.element+'</div>';
      if(wpn.special)html+='<div class="wpn-special">'+wpn.special+'</div>';
      if(isLoot)html+='<span class="shop-loot-badge">LOOT ONLY</span>';
      else if(locked)html+='<div style="font-size:8px;color:#ff4444">\u{1F512} '+wpn.skinLock+'</div>';
      else html+='<div class="wpn-price">'+(isEq?'EQUIPPED':isOwned?'OWNED':wpn.cost+'\u25C8')+'</div>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  if(_eqWpn)html+='<div style="text-align:center;margin-top:8px"><button class="drink-btn" data-action="unequip-wpn" style="border-color:#ff4444;color:#ff4444">Unequip Weapon</button></div>';
  html+='</div>';

  // Furniture tab
  html+='<div class="shop-content" data-content="furniture" style="'+(tab!=='furniture'?'display:none':'')+'">';
  html+='<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px">';
  Object.entries(FURNITURE_TYPES).forEach(([key,ft])=>{
    if(ft.requirement)return;
    const owned=ownedFurniture.includes(key);
    const r=RARITIES[ft.rarity||'common']||RARITIES.common;
    html+='<div class="acc-card'+(owned?' owned':'')+' rarity-'+(ft.rarity||'common')+'" data-action="buy-furn" data-id="'+key+'" data-cost="'+ft.cost+'" style="border-color:'+r.border+'">';
    html+='<div class="acc-icon">'+ft.icon+'</div><div style="font-size:9px">'+ft.name+'</div>';
    html+='<span class="rarity-badge '+(ft.rarity||'common')+'" style="font-size:7px">'+r.name+'</span>';
    html+='<div class="acc-price">'+(ft.cost===0?'FREE':ft.cost+'◈')+'</div></div>';
  });
  html+='</div></div>';

  // Accessories tab
  html+='<div class="shop-content" data-content="accessories" style="'+(tab!=='accessories'?'display:none':'')+'">';
  const accTypes=[{label:'🎩 Hats',type:'hat'},{label:'✨ Trails',type:'trail'},{label:'🟣 Auras',type:'aura'},{label:'🐾 Mini Pets & Fairies',type:'pet'}];
  accTypes.forEach(at=>{
    html+='<div style="margin:6px 0"><div style="font-size:10px;color:#c080ff;margin-bottom:4px">'+at.label+'</div><div style="display:flex;flex-wrap:wrap;gap:3px">';
    ACCESSORY_ITEMS.filter(a=>a.type===at.type).forEach(acc=>{
      const owned=ownedAcc.includes(acc.id);
      const isEquipped=equipped[acc.type]===acc.id;
      const isLootOnly=acc.lootOnly||acc.cost<0;
      const r=RARITIES[acc.rarity||'common']||RARITIES.common;
      const isNew=newItemIds.includes(acc.id);
      const shimCls3=acc.rarity==='mythic'?' shimmer-mythic':acc.rarity==='legendary'?' shimmer-legendary':acc.rarity==='epic'?' shimmer-epic':'';
      html+='<div class="acc-card'+(owned?' owned':'')+(isEquipped?' equipped':'')+shimCls3+' rarity-'+(acc.rarity||'common')+'" data-action="buy-acc" data-id="'+acc.id+'" data-cost="'+acc.cost+'" data-type="'+acc.type+'" style="border-color:'+r.border+';--rarity-glow:'+(r.glow||'transparent')+';position:relative">';
      if(isNew)html+='<span class="shop-new-badge">\u{1F195}</span>';
      html+='<div class="acc-icon">'+acc.icon+'</div><div style="font-size:9px;color:'+r.color+'">'+acc.name+'</div>';
      html+='<span class="rarity-badge '+(acc.rarity||'common')+'" style="font-size:7px"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:'+r.color+';margin-right:2px;vertical-align:middle"></span>'+r.name+'</span>';
      if(acc.fairyElement)html+='<div style="font-size:7px;color:'+r.color+'">'+acc.fairyElement+'</div>';
      if(isLootOnly)html+='<span class="shop-loot-badge">LOOT ONLY</span>';
      else html+='<div class="acc-price">'+(isEquipped?'EQUIPPED':owned?'OWNED':acc.cost+'◈')+'</div>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  // Drip tab (v22 streetwear)
  html+='<div class="shop-content" data-content="drip" style="'+(tab!=='drip'?'display:none':'')+'">';
  const dripTypes=[{label:'👟 Shoes',type:'shoes'},{label:'🥤 Drinks',type:'held'},{label:'⛓️ Chains',type:'chain'},{label:'🕶️ Glasses',type:'glasses'},{label:'⌚ Watches',type:'watch'}];
  dripTypes.forEach(dt=>{
    const items=ACCESSORY_ITEMS.filter(a=>a.type===dt.type);
    if(!items.length)return;
    html+='<div style="margin:6px 0"><div style="font-size:10px;color:#ff6ec7;margin-bottom:4px">'+dt.label+'</div><div style="display:flex;flex-wrap:wrap;gap:3px">';
    items.forEach(acc=>{
      const owned=ownedAcc.includes(acc.id);
      const isEquipped=equipped[acc.type]===acc.id;
      const isLootOnly=acc.lootOnly||acc.cost<0;
      const r=RARITIES[acc.rarity||'common']||RARITIES.common;
      const shimCls4=acc.rarity==='mythic'?' shimmer-mythic':acc.rarity==='legendary'?' shimmer-legendary':acc.rarity==='epic'?' shimmer-epic':'';
      html+='<div class="acc-card'+(owned?' owned':'')+(isEquipped?' equipped':'')+shimCls4+' rarity-'+(acc.rarity||'common')+'" data-action="buy-acc" data-id="'+acc.id+'" data-cost="'+acc.cost+'" data-type="'+acc.type+'" style="border-color:'+r.border+';--rarity-glow:'+(r.glow||'transparent')+'">';
      html+='<div class="acc-icon">'+acc.icon+'</div><div style="font-size:9px;color:'+r.color+'">'+acc.name+'</div>';
      html+='<span class="rarity-badge '+(acc.rarity||'common')+'" style="font-size:7px"><span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:'+r.color+';margin-right:2px;vertical-align:middle"></span>'+r.name+'</span>';
      if(acc.desc)html+='<div style="font-size:7px;color:#888;margin-top:1px">'+acc.desc+'</div>';
      if(isLootOnly)html+='<span class="shop-loot-badge">LOOT ONLY</span>';
      else html+='<div class="acc-price">'+(isEquipped?'EQUIPPED':owned?'OWNED':acc.cost+'◈')+'</div>';
      html+='</div>';
    });
    html+='</div></div>';
  });
  html+='</div>';

  // Market tab (replaces Special)
  html+='<div class="shop-content" data-content="market" style="'+(tab!=='market'?'display:none':'')+'">';
  html+='<div style="text-align:center;padding:16px"><div style="font-size:28px;margin-bottom:6px">🏪</div>';
  html+='<div style="color:#c080ff;font-size:12px;margin-bottom:8px">Player Marketplace</div>';
  html+='<div style="color:#888;font-size:10px;margin-bottom:12px">Buy and sell loot drops with other visitors!</div>';
  html+='<button class="drink-btn" id="open-marketplace" style="border-color:#ffd700;color:#ffd700">Browse Marketplace 🏪</button>';
  html+='</div>';
  // Show loot inventory preview
  const lootInv=LS.get('lootInventory',[]);
  if(lootInv.length>0){
    html+='<div style="border-top:1px solid #333;padding-top:8px;margin-top:8px"><div style="font-size:10px;color:#c080ff;margin-bottom:6px">📦 Your Loot ('+lootInv.length+' items)</div><div style="display:flex;flex-wrap:wrap;gap:2px">';
    lootInv.slice(0,8).forEach(item=>{html+=renderItemCard(item)});
    html+='</div></div>';
  }
  html+='</div>';

  const{p}=createPopup(html);

  // Render skin preview canvases (v19)
  p.querySelectorAll('.skin-preview').forEach(cv=>{
    renderSkinPreview(cv.dataset.skin,cv);
  });

  // Open marketplace button
  const mpBtn=p.querySelector('#open-marketplace');
  if(mpBtn)mpBtn.onclick=()=>{p.closest('.popup-overlay').remove();Marketplace.showUI()};

  // Tab switching
  p.querySelectorAll('.shop-tab').forEach(t=>{
    t.onclick=()=>{
      p.querySelectorAll('.shop-tab').forEach(tt=>tt.classList.remove('active'));
      t.classList.add('active');
      p.querySelectorAll('.shop-content').forEach(c=>c.style.display='none');
      const content=p.querySelector('[data-content="'+t.dataset.tab+'"]');
      if(content)content.style.display='';
    };
  });

  // Buy skin
  p.querySelectorAll('[data-action="buy-skin"]').forEach(card=>{
    card.onclick=()=>{
      const id=card.dataset.id,cost=parseInt(card.dataset.cost)||0;
      if(cost<0){showNotification('This item can only drop from loot! 🎁');return}
      const owned=cost===0||LS.get('visitorSkinsOwned',[]).includes(id);
      if(!owned){
        if(!Coins.canAfford(cost)){showNotification('Need more ◈!');return}
        Coins.spend(cost,'skin');
        const skins=LS.get('visitorSkinsOwned',[]);skins.push(id);LS.set('visitorSkinsOwned',skins);
        showNotification('Purchased '+VISITOR_SKINS.find(s=>s.id===id).label+'!');
      }
      p.closest('.popup-overlay').remove();setTimeout(()=>visitorTransform(id),200);
    };
  });

  // Buy furniture
  p.querySelectorAll('[data-action="buy-furn"]').forEach(card=>{
    card.onclick=()=>{
      const id=card.dataset.id,cost=parseInt(card.dataset.cost)||0;
      const inv=LS.get('ownedFurniture',[]);
      if(inv.includes(id)){showNotification('Already in inventory!');return}
      if(cost>0&&!Coins.canAfford(cost)){showNotification('Need more ◈!');return}
      if(cost>0)Coins.spend(cost,'furniture');
      inv.push(id);LS.set('ownedFurniture',inv);
      showNotification('Added '+FURNITURE_TYPES[id].name+' to inventory! 🎒');
      p.closest('.popup-overlay').remove();showItemShop('furniture');
    };
  });

  // Buy/equip accessories
  p.querySelectorAll('[data-action="buy-acc"]').forEach(card=>{
    card.onclick=()=>{
      const id=card.dataset.id,cost=parseInt(card.dataset.cost)||0,type=card.dataset.type;
      if(cost<0){showNotification('This item can only drop from loot! 🎁');return}
      const owned=LS.get('visitorAccessories',[]);
      const eq=LS.get('equippedAccessories',{hat:null,trail:null,aura:null,pet:null,shoes:null,held:null,chain:null,glasses:null,watch:null});
      if(!owned.includes(id)){
        if(!Coins.canAfford(cost)){showNotification('Need more ◈!');return}
        Coins.spend(cost,'accessory');
        owned.push(id);LS.set('visitorAccessories',owned);
        showNotification('Purchased '+ACCESSORY_ITEMS.find(a=>a.id===id).name+'!');
      }
      // Equip/unequip
      if(eq[type]===id){eq[type]=null;showNotification('Unequipped!')}
      else{eq[type]=id;showNotification('Equipped '+ACCESSORY_ITEMS.find(a=>a.id===id).name+'!')}
      LS.set('equippedAccessories',eq);
      p.closest('.popup-overlay').remove();showItemShop('accessories');
    };
  });

  // Buy/equip weapons (v20)
  p.querySelectorAll('[data-action="shop-wpn"]').forEach(card=>{
    card.onclick=()=>{
      const id=card.dataset.id;
      const wpn=WEAPONS.find(w=>w.id===id);
      if(!wpn)return;
      if(wpn.lootOnly||wpn.cost<0){showNotification('This weapon drops from loot only!');return}
      if(wpn.skinLock&&S.visitor.skin!==wpn.skinLock){showNotification('Requires '+wpn.skinLock+' skin!');return}
      const ownedW=LS.get('ownedWeapons',[]);
      if(ownedW.includes(id)){
        if(WeaponSystem.equipped&&WeaponSystem.equipped._id===id){WeaponSystem.unequip();showNotification('Unequipped!')}
        else{WeaponSystem.equip(id);showNotification('Equipped '+wpn.name+'!')}
        p.closest('.popup-overlay').remove();showItemShop('weapons');
        return;
      }
      WeaponSystem.buy(id);
      p.closest('.popup-overlay').remove();showItemShop('weapons');
    };
  });
  const _uneqW=p.querySelector('[data-action="unequip-wpn"]');
  if(_uneqW)_uneqW.onclick=()=>{WeaponSystem.unequip();showNotification('Weapon unequipped!');p.closest('.popup-overlay').remove()};
}

// ═══ RPG Inventory Panel ═══
function toggleInventoryPanel(){
  const panel=document.getElementById('rpg-inventory');
  if(panel.classList.contains('open')){closeInventoryPanel();return}
  renderInventoryPanel();
  panel.classList.add('open');
  document.getElementById('btn-inventory').classList.add('active');
}
function closeInventoryPanel(){
  const panel=document.getElementById('rpg-inventory');
  panel.classList.remove('open');
  document.getElementById('btn-inventory').classList.remove('active');
}
function renderInventoryPanel(){
  const panel=document.getElementById('rpg-inventory');
  const ownedSkins=LS.get('visitorSkinsOwned',[]);
  const ownedAcc=LS.get('visitorAccessories',[]);
  const equipped=LS.get('equippedAccessories',{hat:null,trail:null,aura:null,pet:null,shoes:null,held:null,chain:null,glasses:null,watch:null});
  const ownedWpnIds=LS.get('ownedWeapons',[]);
  const lootInv=LS.get('lootInventory',[]);
  const equippedLoot=LS.get('equippedLoot',{});
  const bonuses=LootSystem.getStatBonuses();

  // Helper: get item info for equip slots
  function slotInfo(type){
    if(type==='skin'){
      const sk=VISITOR_SKINS.find(s=>s.id===S.visitor.skin)||VISITOR_SKINS[0];
      const r=RARITIES[sk.rarity||'common']||RARITIES.common;
      return{icon:sk.icon,name:sk.label,r:r,id:sk.id};
    }
    if(type==='weapon'){
      if(!WeaponSystem.equipped)return null;
      const w=WEAPONS.find(w2=>w2.id===WeaponSystem.equipped._id);
      if(!w)return null;
      const r=RARITIES[w.rarity]||RARITIES.common;
      return{icon:w.icon,name:w.name,r:r,id:w.id};
    }
    const accId=equipped[type];
    if(!accId)return null;
    const acc=ACCESSORY_ITEMS.find(a=>a.id===accId);
    if(!acc)return null;
    const r=RARITIES[acc.rarity||'common']||RARITIES.common;
    return{icon:acc.icon,name:acc.name,r:r,id:acc.id};
  }
  function renderSlot(type,label,emptyIcon){
    const info=slotInfo(type);
    const hasItem=!!info;
    const rarCls=info?('rarity-'+(Object.entries(RARITIES).find(function(e){return e[1]===info.r})||['common'])[0]):'';
    const borderCol=info?info.r.border:'#333';
    const glowCol=info&&info.r.glow?info.r.glow:null;
    return '<div class="equip-slot'+(hasItem?' has-item ':' ')+rarCls+'" data-unequip="'+type+'" style="--rarity-border:'+borderCol+';--rarity-glow:'+(glowCol||'transparent')+';border-color:'+borderCol+'">'
      +(hasItem?'<div class="slot-icon">'+info.icon+'</div><div class="slot-name">'+info.name+'</div>':'<div class="slot-empty">'+emptyIcon+'</div>')
      +'<div class="slot-label">'+label+'</div></div>';
  }

  let html='<div class="rpg-header"><h3>🎒 Inventory</h3><span class="rpg-close">&times;</span></div>';

  // ⚔️ Equipped section
  html+='<div class="rpg-section"><div class="rpg-section-header" data-section="equipped">\u2694\uFE0F Equipped <span class="toggle">▾</span></div>';
  html+='<div class="rpg-section-body" data-body="equipped"><div class="equip-grid">';
  html+=renderSlot('skin','Skin','👤');
  html+=renderSlot('weapon','Weapon','⚔️');
  html+=renderSlot('hat','Hat','🎩');
  html+=renderSlot('trail','Trail','✨');
  html+=renderSlot('aura','Aura','🟣');
  html+=renderSlot('pet','Pet','🐾');
  html+=renderSlot('shoes','Shoes','👟');
  html+=renderSlot('held','Drink','🥤');
  html+=renderSlot('chain','Chain','⛓️');
  html+=renderSlot('glasses','Glasses','🕶️');
  html+=renderSlot('watch','Watch','⌚');
  html+='</div></div></div>';

  // 📊 Stats section
  html+='<div class="rpg-section"><div class="rpg-section-header" data-section="stats">\u{1F4CA} Stats <span class="toggle">▾</span></div>';
  html+='<div class="rpg-section-body" data-body="stats"><div class="stat-bars">';
  const statColors={speed:'#00fff7',defense:'#4488ff',luck:'#ffd700',power:'#ff4444',charisma:'#ff6ec7'};
  Object.entries(STAT_TYPES).forEach(function(e){
    var k=e[0],st=e[1];
    const val=bonuses[k]||0;
    const pct=Math.min(val/st.max*100,100);
    html+='<div class="stat-row"><span class="stat-icon">'+st.icon+'</span><span class="stat-label">'+st.name+'</span>'
      +'<div class="stat-bar-wrap"><div class="stat-bar" style="width:'+pct+'%;background:'+(statColors[k]||'#888')+'"></div></div>'
      +'<span class="stat-val"'+(val>0?' style="color:'+(statColors[k]||'#888')+'"':'')+'>'+val+'%</span></div>';
  });
  html+='</div></div></div>';

  // 🎒 Backpack section
  html+='<div class="rpg-section" style="flex:1"><div class="rpg-section-header" data-section="backpack">\u{1F392} Backpack <span class="toggle">▾</span></div>';
  html+='<div class="rpg-section-body" data-body="backpack">';
  html+='<div class="bp-filters">';
  var filterTypes=['All','Skins','Weapons','Hats','Trails','Auras','Pets','Drip'];
  filterTypes.forEach(function(ft){html+='<span class="bp-filter'+(ft==='All'?' active':'')+'" data-bpf="'+ft+'">'+ft+'</span>';});
  html+='</div><div class="bp-grid" id="bp-grid">';
  html+=renderBackpackItems('All',ownedSkins,ownedAcc,equipped,ownedWpnIds,lootInv,equippedLoot);
  html+='</div></div></div>';

  panel.innerHTML=html;

  // Attach handlers
  panel.querySelector('.rpg-close').onclick=closeInventoryPanel;
  // Collapsible sections
  panel.querySelectorAll('.rpg-section-header').forEach(function(hdr){
    hdr.onclick=function(){
      hdr.classList.toggle('collapsed');
      var body=panel.querySelector('[data-body="'+hdr.dataset.section+'"]');
      if(body)body.classList.toggle('hidden');
    };
  });
  // Filter tabs
  panel.querySelectorAll('.bp-filter').forEach(function(f){
    f.onclick=function(){
      panel.querySelectorAll('.bp-filter').forEach(function(ff){ff.classList.remove('active')});
      f.classList.add('active');
      document.getElementById('bp-grid').innerHTML=renderBackpackItems(f.dataset.bpf,ownedSkins,ownedAcc,equipped,ownedWpnIds,lootInv,equippedLoot);
      attachBackpackHandlers(panel);
    };
  });
  // Unequip from equip slots
  panel.querySelectorAll('[data-unequip]').forEach(function(el){
    el.onclick=function(){
      var type=el.dataset.unequip;
      if(type==='skin')return;// Can't unequip skin
      if(type==='weapon'){if(WeaponSystem.equipped){WeaponSystem.unequip();showNotification('Weapon unequipped!');renderInventoryPanel()}return}
      var eq2=LS.get('equippedAccessories',{hat:null,trail:null,aura:null,pet:null,shoes:null,held:null,chain:null,glasses:null,watch:null});
      if(eq2[type]){eq2[type]=null;LS.set('equippedAccessories',eq2);showNotification('Unequipped!');renderInventoryPanel()}
    };
  });
  attachBackpackHandlers(panel);
}
function renderBackpackItems(filter,ownedSkins,ownedAcc,equipped,ownedWpnIds,lootInv,equippedLoot){
  var html='';
  // Skins
  if(filter==='All'||filter==='Skins'){
    VISITOR_SKINS.filter(function(s){return s.cost===0||ownedSkins.includes(s.id)}).forEach(function(sk){
      var worn=S.visitor.skin===sk.id;
      var r=RARITIES[sk.rarity||'common']||RARITIES.common;
      var rarCls='rarity-'+(sk.rarity||'common');
      html+='<div class="bp-item '+rarCls+(worn?' equipped-bp':'')+'" data-bp-action="skin" data-id="'+sk.id+'" style="border-color:'+r.border+';--rarity-glow:'+(r.glow||'transparent')+'">'
        +'<div class="bp-icon">'+sk.icon+'</div><div class="bp-name">'+sk.label+'</div>'
        +'<div class="bp-equip">'+(worn?'WORN':'EQUIP')+'</div></div>';
    });
  }
  // Weapons
  if(filter==='All'||filter==='Weapons'){
    ownedWpnIds.forEach(function(wid){
      var wpn=WEAPONS.find(function(w){return w.id===wid});if(!wpn)return;
      var isEq=WeaponSystem.equipped&&WeaponSystem.equipped._id===wid;
      var r=RARITIES[wpn.rarity]||RARITIES.common;
      html+='<div class="bp-item rarity-'+wpn.rarity+(isEq?' equipped-bp':'')+'" data-bp-action="weapon" data-id="'+wid+'" style="border-color:'+r.border+';--rarity-glow:'+(r.glow||'transparent')+'">'
        +'<div class="bp-icon">'+wpn.icon+'</div><div class="bp-name">'+wpn.name+'</div>'
        +'<div class="bp-equip">'+(isEq?'ON':'EQUIP')+'</div></div>';
    });
  }
  // Accessories by type
  var accFilterMap={Hats:'hat',Trails:'trail',Auras:'aura',Pets:'pet'};
  var dripFilterTypes=['shoes','held','chain','glasses','watch'];
  var accFilter=filter==='All'?null:filter==='Drip'?'_drip':accFilterMap[filter];
  ACCESSORY_ITEMS.forEach(function(acc){
    if(!ownedAcc.includes(acc.id))return;
    if(accFilter==='_drip'){if(!dripFilterTypes.includes(acc.type))return}
    else if(accFilter&&acc.type!==accFilter)return;
    if(filter!=='All'&&!accFilter)return;
    var isEq=equipped[acc.type]===acc.id;
    var r=RARITIES[acc.rarity||'common']||RARITIES.common;

const DailyReward={
  REWARDS:[5,10,15,20,30,40,75],
  check(){
    const today=new Date().toISOString().slice(0,10);
    const lastDay=LS.get('lastLoginDay',null);
    if(lastDay===today)return;// Already claimed today

    let streak=LS.get('loginStreak',0);
    const lastDate=lastDay?new Date(lastDay):null;
    const todayDate=new Date(today);

    // Check if consecutive day
    if(lastDate){
      const diff=Math.floor((todayDate-lastDate)/(1000*60*60*24));
      if(diff===1){streak++}
      else if(diff>1){streak=0}// Streak broken

    if(streak>=7)streak=0;// Reset after day 7

    const reward=this.REWARDS[streak]||5;
    LS.set('lastLoginDay',today);

    // Show reward popup after short delay
    setTimeout(()=>this.showPopup(streak+1,reward),1500);
