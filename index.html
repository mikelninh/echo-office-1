// All lootable items (skins + accessories that can drop)
function getAllLootableItems(){
  const items=[];
  VISITOR_SKINS.forEach(s=>items.push({itemId:s.id,name:s.label,icon:s.icon,type:'skin',rarity:s.rarity||'common',lootOnly:!!s.lootOnly}));
  ACCESSORY_ITEMS.forEach(a=>items.push({itemId:a.id,name:a.name,icon:a.icon,type:a.type,rarity:a.rarity||'common',lootOnly:!!a.lootOnly}));
  WEAPONS.forEach(w=>items.push({itemId:w.id,name:w.name,icon:w.icon,type:'weapon',rarity:w.rarity||'common',lootOnly:!!w.lootOnly,skinLock:w.skinLock}));
  return items;
}

// Roll random stats based on rarity
function rollStats(rarity){
  const statKeys=Object.keys(STAT_TYPES);
  const cfg={
    common:{min:0,max:1,valMin:1,valMax:3},
    uncommon:{min:1,max:1,valMin:3,valMax:6},
    rare:{min:1,max:2,valMin:5,valMax:10},
    epic:{min:2,max:2,valMin:8,valMax:15},
    legendary:{min:2,max:3,valMin:12,valMax:18},
    mythic:{min:3,max:3,valMin:15,valMax:20},
  }[rarity]||{min:0,max:1,valMin:1,valMax:3};
  const count=cfg.min+Math.floor(Math.random()*(cfg.max-cfg.min+1));
  const stats=[];
  const usedTypes=new Set();
  for(let i=0;i<count;i++){
    let type;
    do{type=statKeys[Math.floor(Math.random()*statKeys.length)]}while(usedTypes.has(type));
    usedTypes.add(type);
    const val=cfg.valMin+Math.floor(Math.random()*(cfg.valMax-cfg.valMin+1));
    stats.push({type,value:Math.min(val,STAT_TYPES[type].max)});
  }
  return stats;
}

// Generate unique inventory item
function createInventoryItem(itemId,type,rarity){
  return{
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    itemId,type,rarity,
    stats:rollStats(rarity),
    timestamp:Date.now()
  };
}

const LootSystem={
  // Roll a random loot item with rarity determined by weighted random
  roll(bonusLuck){
    const luck=bonusLuck||0;
    const r=Math.random()*(1-luck*0.01);
    let rarity='common';
    if(r<0.02)rarity='mythic';
    else if(r<0.07)rarity='legendary';
    else if(r<0.17)rarity='epic';
    else if(r<0.35)rarity='rare';
    else if(r<0.60)rarity='uncommon';
    return this.rollWithRarity(rarity);
  },
  // Roll with minimum rarity guarantee
  rollMinRarity(minRarity){
    const tiers=['common','uncommon','rare','epic','legendary','mythic'];
    const minIdx=tiers.indexOf(minRarity);
    const r=Math.random();
    let rarity=minRarity;
    if(r<0.05&&minIdx<5)rarity=tiers[minIdx+2]||tiers[5];
    else if(r<0.20&&minIdx<4)rarity=tiers[minIdx+1];
    return this.rollWithRarity(rarity);
  },
  // Roll specific rarity
  rollWithRarity(rarity){
    const items=getAllLootableItems().filter(i=>i.rarity===rarity);
    if(!items.length){
      // Fallback: get any item and override rarity
      const all=getAllLootableItems();
      const item=all[Math.floor(Math.random()*all.length)];
      return createInventoryItem(item.itemId,item.type,rarity);
    }
    const item=items[Math.floor(Math.random()*items.length)];
    return createInventoryItem(item.itemId,item.type,rarity);
  },
  // Add item to loot inventory
  addToInventory(item){
    const inv=LS.get('lootInventory',[]);
    inv.push(item);
    LS.set('lootInventory',inv);
    return item;
  },
  // Remove item from loot inventory
  removeFromInventory(itemUniqueId){
    const inv=LS.get('lootInventory',[]);
    const idx=inv.findIndex(i=>i.id===itemUniqueId);
    if(idx>=0)inv.splice(idx,1);
    LS.set('lootInventory',inv);
  },
  // Get total equipped stat bonuses
  getStatBonuses(){
    const bonuses={};
    Object.keys(STAT_TYPES).forEach(k=>bonuses[k]=0);
    const inv=LS.get('lootInventory',[]);
    const equipped=LS.get('equippedLoot',{});
    Object.values(equipped).forEach(uid=>{
      if(!uid)return;
      const item=inv.find(i=>i.id===uid);
      if(item&&item.stats){
        item.stats.forEach(s=>{bonuses[s.type]=(bonuses[s.type]||0)+s.value});
      }
    });
    return bonuses;
  },
  // Show loot drop with epic card animation
  showLootCard(item){
    const r=RARITIES[item.rarity]||RARITIES.common;
    const itemDef=getAllLootableItems().find(i=>i.itemId===item.itemId)||{name:'???',icon:'❓'};
    
    // Burst particles matching rarity
    const particleCount={common:8,uncommon:15,rare:25,epic:40,legendary:60,mythic:80}[item.rarity]||10;
    for(let i=0;i<particleCount;i++){
      const a=Math.random()*Math.PI*2;
      S.particles.push({x:W/2+Math.cos(a)*30,y:H/2+Math.sin(a)*30,vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4),life:40+Math.random()*30,color:r.color,size:2+Math.random()*3});
    }

    // Play sound based on rarity
    this._playLootSound(item.rarity);

    // Create loot card overlay
    const ov=document.createElement('div');
    ov.className='loot-overlay';
    const shimmerClass=item.rarity==='mythic'?' shimmer-mythic':item.rarity==='legendary'?' shimmer-legendary':(item.rarity==='epic'?' shimmer-epic':'');
    let statsHtml='';
    if(item.stats&&item.stats.length>0){
      statsHtml='<div class="loot-stats">';
      item.stats.forEach(s=>{
        const st=STAT_TYPES[s.type];
        const pct=s.value/st.max*100;
        statsHtml+=`<div class="loot-stat"><span>${st.icon}</span><span>${st.name} +${s.value}%</span><div class="stat-bar"><div class="stat-fill" style="width:${pct}%;background:${r.color}"></div></div></div>`;
      });
      statsHtml+='</div>';
    }
    ov.innerHTML=`
      <div class="loot-card${shimmerClass}" style="border-color:${r.border};${r.glow?'box-shadow:0 0 30px '+r.glow+',0 0 60px '+r.glow+'44;':''}">
        <div class="loot-icon">${itemDef.icon}</div>
        <div class="loot-name" style="color:${r.color}">${itemDef.name}</div>
        <span class="rarity-badge ${item.rarity}">${r.name}</span>
        ${statsHtml}
        <div style="font-size:9px;color:#666;margin-top:6px">${itemDef.type}</div>
        <button class="loot-close">Collect</button>
      </div>
    `;
    document.body.appendChild(ov);
    ov.querySelector('.loot-close').onclick=()=>ov.remove();
    ov.onclick=e=>{if(e.target===ov)ov.remove()};
    // Auto-close after 8s
    setTimeout(()=>{if(ov.parentNode)ov.remove()},8000);
  },
  _playLootSound(rarity){
    if(!S.audioCtx)return;
    const c=S.audioCtx,n=c.currentTime,v=S.volume*.2;
    const notes={
      common:[440],
      uncommon:[440,554],
      rare:[440,554,659],
      epic:[440,554,659,880],
      legendary:[440,554,659,880,1047],
      mythic:[440,554,659,880,1047,1319],
    }[rarity]||[440];
    notes.forEach((freq,i)=>{
      const o=c.createOscillator(),g=c.createGain();
      o.type=rarity==='mythic'?'square':'sine';
      o.frequency.value=freq;
      g.gain.setValueAtTime(v,n+i*.08);
      g.gain.exponentialRampToValueAtTime(.001,n+i*.08+.3);
      o.connect(g);g.connect(S.masterGain);
      o.start(n+i*.08);o.stop(n+i*.08+.35);
    });
  },
  // Trigger a loot drop from a source
  drop(source,bonusLuck){
    let item;
    if(source==='daily7')item=this.rollMinRarity('rare');
    else if(source==='arcade_highscore')item=this.rollMinRarity('uncommon');
    else if(source==='duel_win')item=this.roll(bonusLuck||0);
    else if(source==='eva_debris'){if(Math.random()>0.15)return null;item=this.roll(bonusLuck||0)}
    else if(source==='room_visit'){if(Math.random()>0.05)return null;item=this.roll(bonusLuck||0)}
    else item=this.roll(bonusLuck||0);

    this.addToInventory(item);
    this.showLootCard(item);
    showNotification(`🎁 Loot drop! ${RARITIES[item.rarity].name} item!`);
    return item;
  }
};

const StationPass = {
  passCode: LS.get('stationPassCode', null),
  _saveTimer: null,
  _lastSave: 0,

  hasAccount() { return !!this.passCode; },

  async create(name, skin) {
    try {
      const r = await fetch('/api/account/create', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({name, skin})
      });
      const data = await r.json();
      if (data.ok) {
        this.passCode = data.passCode;
        LS.set('stationPassCode', data.passCode);
        this.showPassPopup(data.passCode, true);
        this.startAutoSave();
        return data.passCode;
      }
    } catch(e) { console.error('StationPass create error:', e); }
    return null;
  },

  async login(code) {
    try {
      const r = await fetch('/api/account/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({passCode: code.toUpperCase()})
      });
      if (r.status === 404) { showNotification('Station Pass not found!'); return false; }
      const data = await r.json();
      if (data.ok && data.account) {
        this.passCode = data.account.passCode;
        LS.set('stationPassCode', data.account.passCode);
        this.restoreFromAccount(data.account);
        this.startAutoSave();
        showNotification('Welcome back, ' + data.account.name + '! \u{1F510}');
        return true;
      }
    } catch(e) { console.error('StationPass login error:', e); }
    showNotification('Login failed!');
    return false;
  },

  restoreFromAccount(acct) {
    // Restore all saved state from server account
    LS.set('visitorName', acct.name);
    LS.set('visitorSkin', acct.skin); S.visitor.skin = acct.skin;
    LS.set('echoCoins', acct.coins); Coins.count = acct.coins;
    LS.set('lifetimeCoins', acct.lifetimeCoins); Coins._lifetime = acct.lifetimeCoins;
    if (acct.lootInventory) LS.set('lootInventory', acct.lootInventory);
    if (acct.equippedLoot) LS.set('equippedLoot', acct.equippedLoot);
    if (acct.equippedAccessories) LS.set('equippedAccessories', acct.equippedAccessories);
    if (acct.visitorSkinsOwned) LS.set('visitorSkinsOwned', acct.visitorSkinsOwned);
    if (acct.ownedFurniture) LS.set('ownedFurniture', acct.ownedFurniture);
    if (acct.accessories) LS.set('visitorAccessories', acct.accessories);
    if (acct.highScores) { LS.set('highScores', acct.highScores); Object.assign(S.highScores, acct.highScores); }
    if (acct.weapons) LS.set('ownedWeapons', acct.weapons);
    if (acct.equippedWeapon) { LS.set('equippedWeapon', acct.equippedWeapon); WeaponSystem.equip(acct.equippedWeapon); }
    if (acct.loginStreak) LS.set('loginStreak', acct.loginStreak);
    if (acct.lastLoginDay) LS.set('lastLoginDay', acct.lastLoginDay);
    if (acct.stats) LS.set('duelStats', acct.stats);
  },

  gatherSaveData() {
    return {
      name: LS.get('visitorName', 'Visitor'),
      skin: S.visitor.skin,
      coins: Coins.count,
      lifetimeCoins: Coins.lifetime,
      lootInventory: LS.get('lootInventory', []),
      equippedLoot: LS.get('equippedLoot', {}),
      equippedAccessories: LS.get('equippedAccessories', {}),
      visitorSkinsOwned: LS.get('visitorSkinsOwned', []),
      ownedFurniture: LS.get('ownedFurniture', []),
      accessories: LS.get('visitorAccessories', []),
      highScores: S.highScores,
      weapons: LS.get('ownedWeapons', []),
      equippedWeapon: LS.get('equippedWeapon', null),
      stats: LS.get('duelStats', {duelsWon:0, duelsLost:0, totalDamage:0, winStreak:0}),
      loginStreak: LS.get('loginStreak', 0),
      lastLoginDay: LS.get('lastLoginDay', null),
    };
  },

  async save() {
    if (!this.passCode) return;
    const now = Date.now();
    if (now - this._lastSave < 5000) return; // debounce 5s
    this._lastSave = now;
    try {
      await fetch('/api/account/save', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({passCode: this.passCode, data: this.gatherSaveData()})
      });
    } catch(e) { /* silent */ }
  },

  startAutoSave() {
    if (this._saveTimer) clearInterval(this._saveTimer);
    this._saveTimer = setInterval(() => this.save(), 60000); // every 60s
    window.addEventListener('beforeunload', () => this.save());
  },

  showPassPopup(code, isNew) {
    const {p} = createPopup(
      '<div class="pass-card">' +
      '<h3 style="color:#00fff7;margin-bottom:4px">\u{1F510} Station Pass</h3>' +
      (isNew ? '<p style="font-size:10px;color:#ffd080;margin-bottom:12px">Your account has been created! Save this code to log in from any device.</p>' : '') +
      '<div class="pass-code" id="pass-code-display">' + code + '</div>' +
      '<button class="pass-copy" id="pass-copy-btn">\u{1F4CB} Copy Pass Code</button>' +
      '<p style="font-size:9px;color:#888;margin-top:12px">Your progress auto-saves every 60 seconds.</p>' +
      '</div>'
    );
    p.querySelector('#pass-copy-btn').onclick = () => {
      navigator.clipboard.writeText(code).then(() => {
        showNotification('Pass code copied! \u{1F510}');
        p.querySelector('#pass-copy-btn').textContent = '\u2705 Copied!';
      }).catch(() => {
        // Fallback: select text
        const el = p.querySelector('#pass-code-display');
        const range = document.createRange(); range.selectNodeContents(el);
        const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
        showNotification('Select and copy your pass code!');
      });
    };
  },

  showLoginPopup() {
    const {p} = createPopup(
      '<div class="pass-card">' +
      '<h3 style="color:#00fff7">\u{1F511} Login with Station Pass</h3>' +
      '<p style="font-size:10px;color:#aaa;margin:8px 0">Enter your pass code to restore your progress.</p>' +
      '<input type="text" id="login-code-input" placeholder="ECHO-XXXXXXXX" maxlength="13" style="width:80%;background:#111;border:2px solid #555;color:#00fff7;padding:10px;font-family:monospace;font-size:16px;border-radius:6px;text-align:center;text-transform:uppercase;outline:none;letter-spacing:2px">' +
      '<br><button class="pass-copy" id="login-submit-btn" style="margin-top:12px;background:rgba(155,89,182,.2);border-color:#9b59b6;color:#9b59b6">Login \u{1F680}</button>' +
      '</div>'
    );
    const input = p.querySelector('#login-code-input');
    input.focus();
    const doLogin = async () => {
      const code = input.value.trim();
      if (!code) { input.style.borderColor = '#ff4444'; return; }
      const ok = await this.login(code);
      if (ok) p.closest('.popup-overlay').remove();
    };
    p.querySelector('#login-submit-btn').onclick = doLogin;
    input.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  },

  async autoLogin() {
    if (!this.passCode) return false;
    try {
      const r = await fetch('/api/account/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({passCode: this.passCode})
      });
      if (r.ok) {
        const data = await r.json();
        if (data.ok) {
          this.restoreFromAccount(data.account);
          this.startAutoSave();
          return true;
        }
      }
    } catch(e) { /* silent */ }
    return false;
  }
};

// ═══════════════════════════════════════
// §19f. WEAPON SYSTEM — v20
// ═══════════════════════════════════════
const WeaponSystem = {
  equipped: null, // full weapon def object
  _attackTimer: 0,
  _attackCooldown: 0,
  _comboCount: 0,
  _comboTimer: 0,
  _comboMax: 0,
  _projectiles: [], // for ranged weapons
  _chargeTimer: 0,
  _charging: false,

  init() {
    const eqId = LS.get('equippedWeapon', null);
    if (eqId) this.equip(eqId);
  },

  equip(weaponId) {
    if (!weaponId) { this.equipped = null; LS.set('equippedWeapon', null); S.visitor.weapon = null; return; }
    const wpn = WEAPONS.find(w => w.id === weaponId);
    if (!wpn) return;
    const wtype = WEAPON_TYPES[wpn.type];
    this.equipped = {...wpn, ...wtype, _id: wpn.id};
    this._comboCount = 0;
    this._comboTimer = 0;
    this._comboMax = wtype.combo;
    S.visitor.weapon = this.equipped;
    LS.set('equippedWeapon', weaponId);
  },

  unequip() {
    this.equipped = null;
    S.visitor.weapon = null;
    LS.set('equippedWeapon', null);
  },

  owns(weaponId) {
    return LS.get('ownedWeapons', []).includes(weaponId);
  },

  buy(weaponId) {
    const wpn = WEAPONS.find(w => w.id === weaponId);
    if (!wpn) return false;
    if (wpn.cost < 0 || wpn.lootOnly) { showNotification('Loot only!'); return false; }
    if (wpn.skinLock && S.visitor.skin !== wpn.skinLock) { showNotification('Wrong skin!'); return false; }
    if (!Coins.canAfford(wpn.cost)) { showNotification('Need more \u25C8!'); return false; }
    Coins.spend(wpn.cost, 'weapon');
    const owned = LS.get('ownedWeapons', []);
    if (!owned.includes(weaponId)) { owned.push(weaponId); LS.set('ownedWeapons', owned); }
    this.equip(weaponId);
    showNotification('Equipped ' + wpn.name + '!');
    return true;
  },

  canAttack() {
    return this.equipped && this._attackCooldown <= 0;
  },

  attack() {
    if (!this.canAttack()) return;
    const wpn = this.equipped;
    const spd = wpn.speed || 1;
    this._attackCooldown = 0.4 / spd;
    this._attackTimer = 0.3;
    // Check if hitting Pixel with weapon too!
    if(typeof checkPixelHit==='function')checkPixelHit();

    // Combo tracking
    if (this._comboTimer > 0 && this._comboCount < this._comboMax) {
      this._comboCount++;
    } else {
      this._comboCount = 1;
    }
    this._comboTimer = 1.0; // 1 second combo window

    // Calculate damage with combo multiplier
    let dmg = wpn.baseDmg;
    const mult = this.getComboMultiplier();
    dmg = Math.round(dmg * mult);

    // Sound
    if (!S.audioCtx) initAudio();
    this._playAttackSound(wpn.style);

    // Particles & effects per weapon style
    const vx = S.visitor.x, vy = S.visitor.y;
    const dir = S.visitor.dir; // 0=up 1=down 2=right 3=left
    const facing = dir === 2 ? 1 : dir === 3 ? -1 : (Math.random() > 0.5 ? 1 : -1);
    const elemColors = {fire:['#ff4400','#ff8800','#ffcc00'],ice:['#4488ff','#88ccff','#ffffff'],lightning:['#ffdd00','#ffff88','#ffffff'],energy:['#ffffff','#aaddff','#6699ff'],light:['#ffd700','#ffffaa','#ffffff']};
    const cols = elemColors[wpn.element] || ['#cccccc','#ffffff','#888888'];

    if (wpn.style === 'slash') {
      // Arc swing trail
      S.screenShake = 2;
      for (let i = 0; i < 8; i++) {
        const a = (facing > 0 ? -0.5 : 2.5) + Math.random() * 1.2;
        S.particles.push({x:vx+facing*15, y:vy-15, vx:Math.cos(a)*4*facing, vy:Math.sin(a)*3-1, life:15, color:cols[i%cols.length], size:2+Math.random()*2});
      }
    } else if (wpn.style === 'smash') {
      // Ground slam
      S.screenShake = 5;
      for (let i = 0; i < 12; i++) {
        const a = Math.random() * Math.PI;
        S.particles.push({x:vx+(Math.random()-.5)*30, y:vy, vx:Math.cos(a)*(2+Math.random()*3), vy:-Math.random()*4, life:20, color:cols[i%cols.length], size:3+Math.random()*2});
      }
      // Ground crack particles
      for (let i = 0; i < 6; i++) {
        S.particles.push({x:vx+(Math.random()-.5)*40, y:vy+2, vx:(Math.random()-.5)*2, vy:0, life:25, color:'#666', size:2});
      }
    } else if (wpn.style === 'ranged') {
      // Projectile
      const tx = dir === 2 ? 1 : dir === 1 ? -1 : 0;
      const ty = dir === 0 ? 1 : dir === 3 ? -1 : 0;
      this._projectiles.push({
        x: vx + tx * 15, y: vy - 12 + ty * 10,
        vx: tx * 6, vy: ty * 6,
        life: 40, damage: dmg, color: cols[0], size: 4,
        trail: cols
      });
    } else if (wpn.style === 'magic') {
      // AoE burst circle
      for (let i = 0; i < 16; i++) {
        const a = i / 16 * Math.PI * 2;
        const r = 20 + Math.random() * 20;
        S.particles.push({x:vx+Math.cos(a)*8, y:vy-12+Math.sin(a)*8, vx:Math.cos(a)*3, vy:Math.sin(a)*3, life:20, color:cols[i%cols.length], size:2+Math.random()*2});
      }
      S.screenShake = 3;
    } else if (wpn.style === 'punch') {
      // Rapid jabs
      for (let i = 0; i < 5; i++) {
        S.particles.push({x:vx+facing*12+Math.random()*8, y:vy-15+Math.random()*10-5, vx:facing*(3+Math.random()*2), vy:(Math.random()-.5)*2, life:10, color:cols[i%cols.length], size:2+Math.random()});
      }
    }

    // Combo display with cinematic effects
    if (this._comboCount >= 2) {
      const sz = Math.min(20, 12 + this._comboCount * 2);
      S.floatTexts.push({
        text: 'HIT x' + this._comboCount + '!',
        x: vx - 20, y: vy - 50,
        color: this._comboCount >= 7 ? '#ff3344' : this._comboCount >= 4 ? '#ffaa00' : '#00fff7',
        life: 40
      });
      // Max combo cinematic
      if (this._comboCount >= this._comboMax && this._comboMax > 1) {
        triggerSlowMo(0.3, 0.5);
        S.chromaticAberration = 3;
        S.screenShake = 10;
        S.vignetteIntensity = 0.6;
        S.cameraZoom = 1.05; S._cameraZoomTimer = 0.2;
        addImpactRing(vx + facing * 15, vy - 15, cols[0], 80, 4);
        S.floatTexts.push({text:'MAX COMBO!', x:vx-30, y:vy-70, color:'#ff3344', life:60});
        for(let i=0;i<20;i++){const a=Math.random()*Math.PI*2;S.particles.push({x:vx+facing*15,y:vy-15,vx:Math.cos(a)*5,vy:Math.sin(a)*5,life:25,color:cols[i%cols.length],size:3+Math.random()*2})}
      } else if (this._comboCount >= 4) {
        triggerSlowMo(0.5, 0.3);
        S.screenShake = Math.max(S.screenShake, 6);
        // Speed lines
        for(let i=0;i<8;i++){const edge=Math.random()>.5;S.particles.push({x:edge?Math.random()*W:(Math.random()>.5?0:W),y:edge?(Math.random()>.5?0:H):Math.random()*H,vx:(W/2-(edge?Math.random()*W:0))*0.02,vy:(H/2-(edge?0:Math.random()*H))*0.02,life:12,color:'rgba(255,255,255,0.5)',size:1})}
      }
    }

    // In duel mode, send damage
    if (DuelSystem.active) {
      // PvE: damage AI fighter directly
      if (DuelSystem.isPvE && AIFighter.active) {
        const dist = Math.hypot(S.visitor.x - AIFighter.x, S.visitor.y - AIFighter.y);
        if (dist < 70) {
          AIFighter.takeDamage(dmg);
          if (AIFighter.fighter && AIFighter.fighter.id === 'echo_clone') {
            AIFighter._playerAttackPattern.push(AIFighter._thinkTimer);
            if (AIFighter._playerAttackPattern.length > 10) AIFighter._playerAttackPattern.shift();
          }
        }
        return dmg;
      }
      if (EchoWS.ws && EchoWS.ws.readyState === 1) {
        EchoWS.ws.send(JSON.stringify({
          type: 'duel.attack', damage: dmg, combo: this._comboCount >= this._comboMax
        }));
      }
    }

    return dmg;
  },

  getComboMultiplier() {
    if (this._comboCount >= 7) return 2.0;
    if (this._comboCount >= 4) return 1.5;
    return 1.0;
  },

  update(dt) {
    if (this._attackCooldown > 0) this._attackCooldown -= dt;
    if (this._attackTimer > 0) this._attackTimer -= dt;
    if (this._comboTimer > 0) {
      this._comboTimer -= dt;
      if (this._comboTimer <= 0) this._comboCount = 0;
    }
    // Update projectiles
    for (let i = this._projectiles.length - 1; i >= 0; i--) {
      const p = this._projectiles[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      // Trail particles
      if (Math.random() < 0.5) {
        S.particles.push({x:p.x, y:p.y, vx:(Math.random()-.5), vy:(Math.random()-.5), life:8, color:p.trail[Math.floor(Math.random()*p.trail.length)], size:2});
      }
      if (p.life <= 0 || p.x < 0 || p.x > W || p.y < 0 || p.y > H) {
        this._projectiles.splice(i, 1);
      }
    }
  },

  renderWeapon(ctx, x, y, dir, time) {
    if (!this.equipped) return;
    const wpn = this.equipped;
    const facing = dir === 2 ? 1 : dir === 3 ? -1 : (dir === 0 ? 0 : 0);
    const swingAnim = this._attackTimer > 0 ? Math.sin(this._attackTimer * 20) * 0.5 : 0;
    const ox = facing !== 0 ? facing * 10 : 4;
    const oy = -12;

    ctx.save();
    ctx.translate(x + ox, y + oy);
    if (swingAnim) ctx.rotate(swingAnim * (facing || 1));

    if (wpn.style === 'slash') {
      // Sword blade
      const col = wpn.element ? (wpn.element === 'fire' ? '#ff6600' : wpn.element === 'light' ? '#ffd700' : '#aaaaff') : '#cccccc';
      ctx.fillStyle = '#888'; ctx.fillRect(-1, -2, 2, 4); // handle
      ctx.fillStyle = col; ctx.fillRect(-1, -14, 2, 12); // blade
      ctx.fillStyle = '#fff'; ctx.fillRect(-1, -14, 2, 2); // tip
    } else if (wpn.style === 'smash') {
      // Hammer
      ctx.fillStyle = '#8B4513'; ctx.fillRect(-1, -2, 2, 10); // handle
      ctx.fillStyle = wpn.element === 'ice' ? '#4488ff' : '#888';
      ctx.fillRect(-4, -6, 8, 5); // head
    } else if (wpn.style === 'ranged' && wpn.type === 'bow') {
      // Bow
      ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, -6, 8, -1.2, 1.2); ctx.stroke();
      ctx.strokeStyle = '#ddd'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(0, -14); ctx.lineTo(0, 2); ctx.stroke();
    } else if (wpn.style === 'ranged' && wpn.type === 'blaster') {
      // Blaster barrel
      ctx.fillStyle = '#555'; ctx.fillRect(-1, -2, 6, 3);
      ctx.fillStyle = wpn.element === 'energy' ? '#00ddff' : '#ff4444';
      ctx.fillRect(4, -1, 3, 1);
    } else if (wpn.style === 'magic') {
      // Staff
      ctx.fillStyle = '#6a3aaa'; ctx.fillRect(-1, -2, 2, 14);
      const glow = 0.5 + Math.sin(time * 4) * 0.3;
      ctx.fillStyle = wpn.element === 'lightning' ? `rgba(255,255,0,${glow})` : `rgba(200,128,255,${glow})`;
      ctx.beginPath(); ctx.arc(0, -5, 3, 0, Math.PI * 2); ctx.fill();
    } else if (wpn.style === 'punch') {
      // Gauntlet glow on fists
      const glow = 0.4 + Math.sin(time * 6) * 0.3;
      const col = wpn.element === 'energy' ? '#ff8800' : wpn.element === 'lightning' ? '#ffdd00' : '#00fff7';
      ctx.fillStyle = col; ctx.globalAlpha = glow;
      ctx.beginPath(); ctx.arc(facing * 3, 0, 4, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.restore();

    // Render projectiles
    for (const p of this._projectiles) {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.min(1, p.life / 10);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
    }
  },

  _playAttackSound(style) {
    if (!S.audioCtx) return;
    const c = S.audioCtx, n = c.currentTime, v = S.volume * 0.15;
    if (style === 'slash') {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(200, n + 0.1);
      g.gain.setValueAtTime(v, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.12);
      o.connect(g); g.connect(S.masterGain); o.start(n); o.stop(n + 0.15);
    } else if (style === 'smash') {
      const buf = c.createBuffer(1, c.sampleRate * 0.15, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / d.length * 4);
      const s = c.createBufferSource(), g = c.createGain();
      s.buffer = buf; g.gain.value = v * 2; s.connect(g); g.connect(S.masterGain); s.start(n);
    } else if (style === 'ranged') {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(1200, n); o.frequency.exponentialRampToValueAtTime(800, n + 0.08);
      g.gain.setValueAtTime(v, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.1);
      o.connect(g); g.connect(S.masterGain); o.start(n); o.stop(n + 0.12);
    } else if (style === 'magic') {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(300, n); o.frequency.exponentialRampToValueAtTime(900, n + 0.15);
      g.gain.setValueAtTime(v, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.2);
      o.connect(g); g.connect(S.masterGain); o.start(n); o.stop(n + 0.25);
    } else if (style === 'punch') {
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'square'; o.frequency.setValueAtTime(200, n); o.frequency.exponentialRampToValueAtTime(80, n + 0.05);
      g.gain.setValueAtTime(v * 0.8, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.06);
      o.connect(g); g.connect(S.masterGain); o.start(n); o.stop(n + 0.08);
    }
  },

  showWeaponShop() {
    const owned = LS.get('ownedWeapons', []);
    const eqId = this.equipped ? this.equipped._id : null;
    let html = '<h3>\u2694\uFE0F Weapons</h3><p style="font-size:10px;color:#888;margin-bottom:8px">Balance: <span style="color:#ffd700">' + Coins.count + '\u25C8</span></p>';

    // Weapon type categories
    const types = Object.keys(WEAPON_TYPES);
    types.forEach(typeKey => {
      const wt = WEAPON_TYPES[typeKey];
      const wpns = WEAPONS.filter(w => w.type === typeKey);
      html += '<div style="margin:8px 0"><div style="font-size:10px;color:#c080ff;margin-bottom:4px">' + wt.icon + ' ' + wt.name + 's <span style="color:#666;font-size:8px">DMG:' + wt.baseDmg + ' SPD:' + wt.speed + ' RNG:' + wt.range + ' COMBO:' + wt.combo + '</span></div>';
      html += '<div style="display:flex;flex-wrap:wrap;gap:3px">';
      wpns.forEach(wpn => {
        const isOwned = owned.includes(wpn.id);
        const isEquipped = eqId === wpn.id;
        const isLoot = wpn.lootOnly || wpn.cost < 0;
        const locked = wpn.skinLock && S.visitor.skin !== wpn.skinLock;
        const r = RARITIES[wpn.rarity] || RARITIES.common;
        html += '<div class="wpn-card' + (isEquipped ? ' equipped' : '') + ' rarity-' + wpn.rarity + '" data-action="buy-wpn" data-id="' + wpn.id + '" style="border-color:' + r.border + '">';
        html += '<div class="wpn-icon">' + wpn.icon + '</div>';
        html += '<div class="wpn-name">' + wpn.name + '</div>';
        html += '<span class="rarity-badge ' + wpn.rarity + '" style="font-size:7px">' + r.name + '</span>';
        if (wpn.element) html += '<div style="font-size:7px;color:' + ({fire:'#ff6600',ice:'#4488ff',lightning:'#ffdd00',energy:'#00ddff',light:'#ffd700'}[wpn.element] || '#aaa') + '">' + wpn.element + '</div>';
        if (wpn.special) html += '<div class="wpn-special">' + wpn.special + '</div>';
        if (isLoot) html += '<span class="loot-only-badge">LOOT ONLY</span>';
        else if (locked) html += '<div style="font-size:8px;color:#ff4444">\u{1F512} ' + wpn.skinLock + '</div>';
        else html += '<div class="wpn-price">' + (isEquipped ? 'EQUIPPED' : isOwned ? 'OWNED' : wpn.cost + '\u25C8') + '</div>';
        html += '</div>';
      });
      html += '</div></div>';
    });

    // Unequip button
    if (this.equipped) {
      html += '<div style="text-align:center;margin-top:10px"><button class="drink-btn" id="unequip-wpn" style="border-color:#ff4444;color:#ff4444">Unequip Weapon</button></div>';
    }

    const {p} = createPopup(html);

    // Wire up buy/equip
    p.querySelectorAll('[data-action="buy-wpn"]').forEach(card => {
      card.onclick = () => {
        const id = card.dataset.id;
        const wpn = WEAPONS.find(w => w.id === id);
        if (!wpn) return;
        if (wpn.lootOnly || wpn.cost < 0) { showNotification('This weapon drops from loot only!'); return; }
        if (wpn.skinLock && S.visitor.skin !== wpn.skinLock) { showNotification('Requires ' + wpn.skinLock + ' skin!'); return; }
        const ownedList = LS.get('ownedWeapons', []);
        if (ownedList.includes(id)) {
          // Toggle equip
          if (this.equipped && this.equipped._id === id) { this.unequip(); showNotification('Unequipped!'); }
          else { this.equip(id); showNotification('Equipped ' + wpn.name + '!'); }
          p.closest('.popup-overlay').remove();
          this.showWeaponShop();
          return;
        }
        this.buy(id);
        p.closest('.popup-overlay').remove();
        this.showWeaponShop();
      };
    });

    const uneq = p.querySelector('#unequip-wpn');
    if (uneq) uneq.onclick = () => { this.unequip(); showNotification('Weapon unequipped!'); p.closest('.popup-overlay').remove(); };
  },

  // Award weapon from loot
  awardWeapon(weaponId) {
    const owned = LS.get('ownedWeapons', []);
    if (!owned.includes(weaponId)) {
      owned.push(weaponId);
      LS.set('ownedWeapons', owned);
    }
    const wpn = WEAPONS.find(w => w.id === weaponId);
    if (wpn) {
      const r = RARITIES[wpn.rarity] || RARITIES.common;
      showNotification(wpn.icon + ' ' + wpn.name + ' obtained!');
      // Fancy effects
      for (let i = 0; i < 30; i++) {
        const a = Math.random() * Math.PI * 2;
        S.particles.push({x:W/2+Math.cos(a)*20, y:H/2+Math.sin(a)*20, vx:Math.cos(a)*4, vy:Math.sin(a)*4, life:30, color:r.color, size:2+Math.random()*2});
      }
    }
  }
};

// Marketplace client
const Marketplace={
  listings:[],
  async load(){
    try{const r=await fetch('/api/marketplace');this.listings=await r.json()}catch{this.listings=[]}
  },
  async listItem(item,price){
    const owner=LS.get('visitorName','Visitor');
    if(owner==='Visitor'){showNotification('Set your name first!');return false}
    try{
      const r=await fetch('/api/marketplace/list',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({owner,item,price})});
      const data=await r.json();
      if(data.ok){showNotification('Listed on marketplace!');LootSystem.removeFromInventory(item.id);return true}
      else{showNotification('Failed to list!');return false}
    }catch{showNotification('Marketplace error!');return false}
  },
  async buyItem(listingId){
    const buyer=LS.get('visitorName','Visitor');
    if(buyer==='Visitor'){showNotification('Set your name first!');return false}
    try{
      const r=await fetch(`/api/marketplace/buy/${listingId}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({buyer})});
      const data=await r.json();
      if(data.ok){
        if(!Coins.canAfford(data.price)){showNotification('Not enough ◈!');return false}
        Coins.spend(data.price,'marketplace');
        LootSystem.addToInventory(data.item);
        showNotification('Purchased from marketplace!');
        return true;
      }
      return false;
    }catch{showNotification('Purchase failed!');return false}
  },
  async cancelListing(listingId){
    const owner=LS.get('visitorName','Visitor');
    try{
      const r=await fetch(`/api/marketplace/cancel/${listingId}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({owner})});
      const data=await r.json();
      if(data.ok)showNotification('Listing cancelled!');
      return data.ok;
    }catch{return false}
  },
  async showUI(){
    await this.load();
    const myName=LS.get('visitorName','Visitor');
    let filter='all';
    const renderMP=(filterType)=>{
      let filtered=this.listings;
      if(filterType&&filterType!=='all')filtered=filtered.filter(l=>(l.item?.type||'skin')===filterType);
      filtered.sort((a,b)=>a.price-b.price);
      
      let html='<h3>🏪 Marketplace</h3><p style="font-size:10px;color:#888;margin-bottom:6px">Balance: <span style="color:#ffd700">'+Coins.count+'◈</span></p>';
      html+='<div class="mp-filters">';
      ['all','skin','hat','trail','aura','pet'].forEach(f=>{
        html+=`<div class="mp-filter${f===filterType?' active':''}" data-filter="${f}">${f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1)}</div>`;
      });
      html+='</div>';

      if(filtered.length===0){
        html+='<div style="text-align:center;padding:30px;color:#666"><div style="font-size:24px;margin-bottom:8px">🏪</div>No listings yet. Sell loot from your inventory!</div>';
      }else{
        filtered.forEach(l=>{
          const r=RARITIES[l.item?.rarity||'common']||RARITIES.common;
          const isMine=l.owner===myName;
          html+=`<div class="mp-listing rarity-${l.item?.rarity||'common'}">
            <div class="mp-icon">${l.item?.icon||'❓'}</div>
            <div class="mp-info">
              <div class="mp-name" style="color:${r.color}">${l.item?.name||'Unknown'}</div>
              <span class="rarity-badge ${l.item?.rarity||'common'}">${r.name}</span>
              <div class="mp-seller">by ${l.owner}${l.item?.stats?.length?' · '+l.item.stats.map(s=>STAT_TYPES[s.type].icon+s.value+'%').join(' '):''}</div>
            </div>
            <div class="mp-price">${l.price}◈</div>
            ${isMine?`<button class="mp-buy" data-cancel="${l.id}" style="border-color:#ff6666;color:#ff6666">Cancel</button>`:`<button class="mp-buy" data-buy="${l.id}" data-price="${l.price}">Buy</button>`}
          </div>`;
        });
      }
      
      // Sell section
      const inv=LS.get('lootInventory',[]);
      if(inv.length>0){
        html+='<div style="margin-top:12px;border-top:1px solid #333;padding-top:8px"><div style="font-size:11px;color:#c080ff;margin-bottom:6px">📦 Sell from Inventory</div>';
        inv.slice(0,12).forEach(item=>{
          const def=getAllLootableItems().find(i=>i.itemId===item.itemId)||{name:'???',icon:'❓'};
          const r=RARITIES[item.rarity]||RARITIES.common;
          html+=`<div class="inv-item" data-sell="${item.id}" data-name="${def.name}" style="border-color:${r.border}">${def.icon} <span style="color:${r.color}">${def.name}</span></div>`;
        });
        html+='</div>';
      }
      return html;
    };

    const{p}=createPopup(renderMP('all'));

    // Filter clicks
    p.querySelectorAll('.mp-filter').forEach(el=>{
      el.onclick=()=>{
        filter=el.dataset.filter;
        p.innerHTML='<span class="close-btn">&times;</span>'+renderMP(filter);
        p.querySelector('.close-btn').onclick=()=>p.closest('.popup-overlay').remove();
        attachMPHandlers(p);
      };
    });

    const attachMPHandlers=(container)=>{
      container.querySelectorAll('[data-buy]').forEach(btn=>{
        btn.onclick=async()=>{
          const price=parseInt(btn.dataset.price);
          if(!Coins.canAfford(price)){showNotification('Need more ◈!');return}
          await this.buyItem(btn.dataset.buy);
          container.closest('.popup-overlay').remove();
          this.showUI();
        };
      });
      container.querySelectorAll('[data-cancel]').forEach(btn=>{
        btn.onclick=async()=>{
          await this.cancelListing(btn.dataset.cancel);
          container.closest('.popup-overlay').remove();
          this.showUI();
        };
      });
      container.querySelectorAll('[data-sell]').forEach(el=>{
        el.onclick=()=>{
          const itemId=el.dataset.sell;
          const name=el.dataset.name;
          const price=prompt(`Sell ${name} for how many ◈? (1-9999)`);
          if(price&&parseInt(price)>=1&&parseInt(price)<=9999){
            const inv=LS.get('lootInventory',[]);
            const item=inv.find(i=>i.id===itemId);
            if(item){
              this.listItem(item,parseInt(price)).then(ok=>{
                if(ok){container.closest('.popup-overlay').remove();this.showUI()}
              });
            }
          }
        };
      });
      container.querySelectorAll('.mp-filter').forEach(el2=>{
        el2.onclick=()=>{
          filter=el2.dataset.filter;
          container.innerHTML='<span class="close-btn">&times;</span>'+renderMP(filter);
          container.querySelector('.close-btn').onclick=()=>container.closest('.popup-overlay').remove();
          attachMPHandlers(container);
        };
      });
    };
    attachMPHandlers(p);
  }
};

// Render reusable item card
function renderItemCard(item,options){
  options=options||{};
  const def=getAllLootableItems().find(i=>i.itemId===item.itemId)||{name:'???',icon:'❓',type:'unknown'};
  const r=RARITIES[item.rarity]||RARITIES.common;
  const shimmerClass=item.rarity==='mythic'?' shimmer-mythic':item.rarity==='legendary'?' shimmer-legendary':(item.rarity==='epic'?' shimmer-epic':'');
  let statsHtml='';
  if(item.stats&&item.stats.length>0){
    statsHtml=item.stats.map(s=>STAT_TYPES[s.type].icon+s.value+'%').join(' ');
  }
  return `<div class="item-card rarity-${item.rarity}${shimmerClass}" data-uid="${item.id}" style="border-color:${r.border};${r.glow?'box-shadow:0 0 8px '+r.glow+'44;':''}">
    ${options.equipped?'<div class="ic-equipped">✓</div>':''}
    <div class="ic-icon">${def.icon}</div>
    <div class="ic-name" style="color:${r.color}">${def.name}</div>
    <span class="rarity-badge ${item.rarity}" style="font-size:7px">${r.name}</span>
    ${statsHtml?'<div class="ic-stats">'+statsHtml+'</div>':''}
    ${options.price?'<div class="ic-price">'+options.price+'◈</div>':''}
    ${def.lootOnly?'<span class="loot-only-badge">LOOT</span>':''}
  </div>`;
}

// Accessory rendering on visitor (aura rendered separately before avatar)
function renderVisitorAccessories(cx,v){
  const eq=LS.get('equippedAccessories',{hat:null,trail:null,aura:null,pet:null,shoes:null,held:null,chain:null,glasses:null,watch:null});
  const sc=3,sz=10;
  const headX=v.x,headY=v.y-sz*sc;

  // Hat (render above head)
  if(eq.hat){
    const hatItem=ACCESSORY_ITEMS.find(a=>a.id===eq.hat);
    if(hatItem&&hatItem.render){
      cx.save();
      hatItem.render(cx,headX,headY+2,S.time);
      cx.restore();
    }
  }

  // Trail (render particles when moving)
  if(eq.trail&&v.moving){
    const trailItem=ACCESSORY_ITEMS.find(a=>a.id===eq.trail);
    if(trailItem&&Math.random()<.4){
      const colors=trailItem.trailColor;
      S.particles.push({
        x:v.x+(Math.random()-.5)*8,
        y:v.y+(Math.random()-.5)*4,
        vx:(Math.random()-.5)*1.5,
        vy:-Math.random()*1.5-.5,
        life:15+Math.random()*10,
        color:colors[Math.floor(Math.random()*colors.length)],
        size:trailItem.trailSize||2
      });
    }
  }

  // Mini Pet (follows at offset)
  if(eq.pet){
    const petItem=ACCESSORY_ITEMS.find(a=>a.id===eq.pet);
    if(petItem){
      // Fairy pets orbit the player; standard pets follow at offset
      const isFairy=!!petItem.fairyElement||eq.pet==='pet_fairy';
      if(isFairy){
        // Orbiting fairy pet
        const orbitR=25,orbitSpeed=1.2;
        const angle=S.time*orbitSpeed;
        const bobY=Math.sin(S.time*3.5)*3;
        const fx=v.x+Math.cos(angle)*orbitR;
        const fy=v.y-15+Math.sin(angle)*orbitR*0.4+bobY;
        const fCol=petItem.petColor||'#ff69b4';
        const fAccent=petItem.petAccent||'#ffd700';
        const fColors=petItem.fairyColors||['#ffd700','#ff69b4'];
        const wingFlutter=Math.sin(S.time*8)>0;
        // Glow
        cx.save();
        const grd=cx.createRadialGradient(fx,fy-2,0,fx,fy-2,10);
        grd.addColorStop(0,fCol+'88');grd.addColorStop(1,fCol+'00');
        cx.fillStyle=grd;cx.beginPath();cx.arc(fx,fy-2,10,0,Math.PI*2);cx.fill();
        // Body (orb)
        cx.fillStyle=fCol;cx.beginPath();cx.arc(fx,fy-2,3,0,Math.PI*2);cx.fill();
        // Inner bright core
        cx.fillStyle=fAccent;cx.globalAlpha=.6+Math.sin(S.time*4)*.3;
        cx.beginPath();cx.arc(fx,fy-2,1.5,0,Math.PI*2);cx.fill();
        cx.globalAlpha=1;
        // Wings (2 small triangles, flutter)
        const wSize=wingFlutter?4:3;const wAngle=wingFlutter?0.4:0.25;
        cx.fillStyle=fCol+'88';
        cx.beginPath();cx.moveTo(fx-2,fy-3);cx.lineTo(fx-2-wSize,fy-3-wSize);cx.lineTo(fx-2,fy-3+1);cx.closePath();cx.fill();
        cx.beginPath();cx.moveTo(fx+2,fy-3);cx.lineTo(fx+2+wSize,fy-3-wSize);cx.lineTo(fx+2,fy-3+1);cx.closePath();cx.fill();
        cx.restore();
        // Element-colored particle trail
        if(Math.random()<.35){
          const pc=fColors[Math.floor(Math.random()*fColors.length)];
          let pvx=(Math.random()-.5)*.8,pvy=0,plife=14+Math.random()*8,psz=1+Math.random();
          const elem=petItem.fairyElement||'';
          if(elem==='fire'){pvy=-Math.random()*1.2-.3;psz=1.5+Math.random();}
          else if(elem==='ice'){pvx=(Math.random()-.5)*.4;pvy=Math.random()*.3;plife=18+Math.random()*10;psz=1;}
          else if(elem==='earth'){pvx=(Math.random()-.5)*1.2;pvy=-Math.random()*.5;plife=20;}
          else if(elem==='lightning'){pvx=(Math.random()-.5)*2;pvy=(Math.random()-.5)*2;plife=6+Math.random()*6;psz=1+Math.random()*1.5;}
          else if(elem==='dark'){pvx=(Math.random()-.5)*.5;pvy=Math.random()*.4;plife=18;psz=1.5;}
          else if(elem==='light'){pvx=(Math.random()-.5)*1;pvy=-Math.random()*.8;plife=16;psz=1+Math.random();}
          S.particles.push({x:fx+(Math.random()-.5)*4,y:fy-2,vx:pvx,vy:pvy,life:plife,color:pc,size:psz});
        }
      }else{
        // Standard pet follow behavior
        const petState=S._petState||(S._petState={x:v.x+18,y:v.y+5});
        const tgtX=v.x+18,tgtY=v.y+5;
        petState.x+=(tgtX-petState.x)*.08;
        petState.y+=(tgtY-petState.y)*.08;
        const bob=Math.sin(S.time*3)*2;
        const px=petState.x,py=petState.y+bob;

        if(eq.pet==='pet_robot'){
          cx.fillStyle='#c0c0c0';cx.fillRect(px-4,py-8,8,6);
          cx.fillStyle='#ff0000';cx.fillRect(px-1,py-7,2,1);cx.fillRect(px+1,py-7,2,1);
          cx.fillStyle='#a0a0a0';cx.fillRect(px-5,py-2,10,6);
          cx.fillStyle='#808080';cx.fillRect(px-3,py+4,2,3);cx.fillRect(px+1,py+4,2,3);
          cx.fillStyle='#ffd700';cx.fillRect(px,py-11,1,3);
          cx.fillStyle=`rgba(255,215,0,${.5+Math.sin(S.time*6)*.3})`;cx.fillRect(px-1,py-12,3,2);
        }else if(eq.pet==='pet_shadow'){
          if(!S._shadowHistory)S._shadowHistory=[];
          S._shadowHistory.push({x:v.x,y:v.y,dir:v.dir,t:S.time});
          if(S._shadowHistory.length>30)S._shadowHistory.shift();
          const delayed=S._shadowHistory[0]||{x:v.x,y:v.y,dir:v.dir};
          const sx=delayed.x+20,sy=delayed.y;
          cx.globalAlpha=0.35;
          cx.fillStyle='#1a1a2a';
          cx.fillRect(sx-8,sy-30,16,24);cx.fillRect(sx-6,sy-36,12,8);
          cx.fillStyle='#4a4a6a';
          cx.fillRect(sx-4,sy-34,3,2);cx.fillRect(sx+1,sy-34,3,2);
          cx.globalAlpha=1;
          if(Math.random()<.2)S.particles.push({x:sx+(Math.random()-.5)*8,y:sy-15,vx:0,vy:-0.5,life:15,color:'rgba(26,26,42,0.6)',size:2});
        }
      }
    }
  }

  // Shoes (render below feet)
  if(eq.shoes){
    const shoeItem=ACCESSORY_ITEMS.find(a=>a.id===eq.shoes);
    if(shoeItem&&shoeItem.render){cx.save();shoeItem.render(cx,v.x,v.y,S.time);cx.restore()}
  }

  // Held item (render in hand area)
  if(eq.held){
    const heldItem=ACCESSORY_ITEMS.find(a=>a.id===eq.held);
    if(heldItem&&heldItem.render){cx.save();heldItem.render(cx,v.x,v.y,S.time);cx.restore()}
  }

  // Chain (render on chest)
  if(eq.chain){
    const chainItem=ACCESSORY_ITEMS.find(a=>a.id===eq.chain);
    if(chainItem&&chainItem.render){cx.save();chainItem.render(cx,v.x,v.y,S.time);cx.restore()}
  }

  // Glasses (render on face)
  if(eq.glasses){
    const glassItem=ACCESSORY_ITEMS.find(a=>a.id===eq.glasses);
    if(glassItem&&glassItem.render){cx.save();glassItem.render(cx,headX,headY,S.time);cx.restore()}
  }

  // Watch (render on wrist)
  if(eq.watch){
    const watchItem=ACCESSORY_ITEMS.find(a=>a.id===eq.watch);
    if(watchItem&&watchItem.render){cx.save();watchItem.render(cx,v.x,v.y,S.time);cx.restore()}
  }

  // Air Zooms vapor trail particles
  if(eq.shoes==='shoe_swoosh'&&v.moving&&Math.random()<.3){
    S.particles.push({x:v.x+(Math.random()-.5)*6,y:v.y+3,vx:(Math.random()-.5)*.5,vy:.3,life:10+Math.random()*6,color:'rgba(255,255,255,0.4)',size:1.5});
  }
  // Wing Juice upward particles
  if(eq.held==='drink_wings'&&v.moving&&Math.random()<.2){
    S.particles.push({x:v.x+(Math.random()-.5)*6,y:v.y-5,vx:0,vy:-1,life:8+Math.random()*4,color:'rgba(255,220,100,0.5)',size:1});
  }

  // Void Walker skin glitch effect
  if(v.skin==='void_walker'&&S.visitor.moving){
    if(Math.random()<.4){
      const gx=v.x+(Math.random()-.5)*20,gy=v.y-15+(Math.random()-.5)*20;
      cx.fillStyle=`rgba(255,51,68,${.2+Math.random()*.3})`;
      cx.fillRect(gx,gy,Math.random()*8+2,1);
    }
  }

  // Time Warp aura rendering
  const eqLoot=LS.get('equippedLoot',{});
  const lootInvForRender=LS.get('lootInventory',[]);
  const twItem=lootInvForRender.find(i=>i.id===eqLoot.aura&&i.itemId==='aura_timewarp');
  if(twItem){
    const ripples=3;
    for(let i=0;i<ripples;i++){
      const phase=S.time*2+i*(Math.PI*2/ripples);
      const radius=15+Math.sin(phase)*8;
      const alpha=0.08+Math.sin(phase+1)*0.04;
      cx.strokeStyle=`rgba(100,180,255,${alpha})`;
      cx.lineWidth=1;
      cx.beginPath();
      cx.arc(v.x,v.y-15,radius,0,Math.PI*2);
      cx.stroke();
    }
  }

  // Phoenix Wings trail rendering
  const pwItem=lootInvForRender.find(i=>i.id===eqLoot.trail&&i.itemId==='trail_phoenix');
  if(pwItem&&v.moving){
    for(let i=0;i<3;i++){
      S.particles.push({
        x:v.x+(Math.random()-.5)*12,
        y:v.y+(Math.random()-.5)*6,
        vx:(Math.random()-.5)*2,
        vy:-Math.random()*3-1,
        life:20+Math.random()*15,
        color:['#ff2200','#ff6600','#ffaa00','#ffdd44','#ffffff'][Math.floor(Math.random()*5)],
        size:2+Math.random()*3
      });
    }
  }
}

// Lightsaber system
S._saberGreen=0;S._saberBlue=0;S._saberState='off';// off, green, blue, both, duel
S._saberDuelTimer=0;S._saberClashes=[];
S._visitorSaber=null;// null, 'green', 'blue'
S._saberSwing=0;S._saberSwingDir=0;
function swingSaber(){
  if(!S._visitorSaber||S._saberSwing>0)return;
  if(!S.audioCtx)initAudio();
  S._saberSwing=1;S._saberSwingDir=S.visitor.dir;
  playSaberSound('clash');
  S.screenShake=2;
  const col=S._visitorSaber==='green'?'#00ff44':'#4488ff';
  for(let i=0;i<10;i++)S.particles.push({x:S.visitor.x+(S.visitor.dir===2?20:-20),y:S.visitor.y-15,vx:(S.visitor.dir===2?1:-1)*Math.random()*4,vy:(Math.random()-.5)*4,life:15,color:col,size:2+Math.random()*2});
  // Broadcast swing to other players
  if(EchoWS.ws?.readyState===1)EchoWS.ws.send(JSON.stringify({type:'player.swing',saber:S._visitorSaber,dir:S.visitor.dir}));
  // Hit Pixel?!
  if(S.pixel.floor===S.floor&&Math.hypot(S.visitor.x-S.pixel.x,S.visitor.y-S.pixel.y)<45){
    const reactions=[
      {thought:"*Pixel DODGES with lightning reflexes* 😼",pixelState:'flee'},
      {thought:"*Pixel catches the blade in her teeth?!* HOW?! 🐱",pixelState:'smug'},
      {thought:"*Pixel phases through the saber like a ghost* ...what IS she? 👻",pixelState:'flee'},
      {thought:"*Pixel deflects it with her crystal collar!* ✨",pixelState:'deflect'},
      {thought:"*Pixel sits down and yawns* You can't hurt what doesn't care. 😴",pixelState:'smug'},
      {thought:"*Pixel backflips over the saber* SHE'S A JEDI?! 🐱‍👤",pixelState:'flee'},
      {thought:"*The saber passes through Pixel harmlessly. She's made of pure vibes.* 🔮",pixelState:'smug'},
      {thought:"*Pixel hisses and the saber FLICKERS?!* She has Force powers!! ⚡",pixelState:'deflect'},
    ];
    const r=reactions[Math.random()*reactions.length|0];
    showThought(r.thought);
    // Pixel reaction
    if(r.pixelState==='flee'){
      // Pixel zooms away
      S.pixel.targetX=S.pixel.x+(Math.random()>.5?200:-200);
      S.pixel.targetY=S.pixel.y+(Math.random()>.5?150:-150);
      S.pixel.targetX=Math.max(30,Math.min(W-30,S.pixel.targetX));
      S.pixel.targetY=Math.max(80,Math.min(H-30,S.pixel.targetY));
      S.pixel.state='walk';S.pixel.stateTimer=0;
    }else if(r.pixelState==='deflect'){

  }
  // Broadcast saber state to other players

function playSaberSound(type){
  if(!S.audioCtx)return;const c=S.audioCtx,n=c.currentTime,v=S.volume*.2;
  if(type==='ignite'){
    const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(80,n);o.frequency.exponentialRampToValueAtTime(220,n+.3);
    g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(v*.3,n+.3);g.gain.exponentialRampToValueAtTime(.001,n+.8);
    o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.8);
    // Hum layer
    const o2=c.createOscillator(),g2=c.createGain();o2.type='sine';o2.frequency.value=120;
    g2.gain.setValueAtTime(0,n);g2.gain.linearRampToValueAtTime(v*.15,n+.3);g2.gain.setValueAtTime(v*.15,n+2);g2.gain.exponentialRampToValueAtTime(.001,n+3);
    o2.connect(g2);g2.connect(S.masterGain);o2.start(n);o2.stop(n+3);
  }else if(type==='retract'){
    const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(220,n);o.frequency.exponentialRampToValueAtTime(60,n+.4);
    g.gain.setValueAtTime(v*.5,n);g.gain.exponentialRampToValueAtTime(.001,n+.5);
    o.connect(g);g.connect(S.masterGain);o.start(n);o.stop(n+.5);
  }else if(type==='clash'){
    const buf=c.createBuffer(1,c.sampleRate*.15,c.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*3)*.5;
    const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;g.gain.value=v*1.5;
    s.connect(g);g.connect(S.masterGain);s.start(n);
    const o=c.createOscillator(),g2=c.createGain();o.type='square';o.frequency.value=800+Math.random()*400;
    g2.gain.setValueAtTime(v*.3,n);g2.gain.exponentialRampToValueAtTime(.001,n+.1);
    o.connect(g2);g2.connect(S.masterGain);o.start(n);o.stop(n+.1);
  }
}
function updateSabers(dt){
  const tgt={off:[0,0],green:[1,0],blue:[0,1],both:[1,1],duel:[1,1]};
  const t=tgt[S._saberState]||[0,0];
  S._saberGreen+=(t[0]-S._saberGreen)*dt*5;S._saberBlue+=(t[1]-S._saberBlue)*dt*5;
  // Swing animation decay
  if(S._saberSwing>0){S._saberSwing-=dt*3;if(S._saberSwing<0)S._saberSwing=0}
  if(S._saberGreen<.01)S._saberGreen=0;if(S._saberBlue<.01)S._saberBlue=0;
  // Duel mode: sabers swing and clash
  if(S._saberState==='duel'){
    S._saberDuelTimer+=dt;
    if(S._saberDuelTimer>.6+Math.random()*.4){
      S._saberDuelTimer=0;
      // Clash effect
      S._saberClashes.push({x:310+85,y:72+8,life:12});
      playSaberSound('clash');
      S.screenShake=2;
      for(let i=0;i<6;i++)S.particles.push({x:310+85+Math.random()*10-5,y:72+8,vx:(Math.random()-.5)*4,vy:-Math.random()*3,life:15,color:Math.random()>.5?'#00ff44':'#4488ff',size:2});
    }
    // Render clash sparks
    for(let i=S._saberClashes.length-1;i>=0;i--){S._saberClashes[i].life--;if(S._saberClashes[i].life<=0)S._saberClashes.splice(i,1)}
  }
}

    const current=f===S.floor&&!RoomSystem.currentRoom;
    const ppl=fp[f]||[];
    const presenceHtml=ppl.length>0?` <span style="float:right;font-size:10px;color:#00fff7;opacity:.7">${ppl.map(p=>'●').join('')} ${ppl.length}</span>`:'';
    const archiveStyle=f===9?' style="border-color:#ffd700;background:rgba(255,215,0,.08)"':'';
    html+=`<button class="floor-btn${current?' current':''}${locked?' locked':''}" data-floor="${f}"${archiveStyle}>${current?'► ':''}F${f} — ${FLOOR_NAMES[f]}${locked?' (🔒 500◈ lifetime)':''}${presenceHtml}</button>`;
  }
  
  // Divider
  html+='<div style="border-top:1px solid #444;margin:6px 0"></div>';
  
  // My Room
  const hasRoom=RoomSystem.furniture.length>0||LS.get('userRoomName','My Room')!=='My Room';
  const f8Current=S.floor===8&&!RoomSystem.currentRoom;
  html+=`<button class="floor-btn${f8Current?' current':''}" data-floor="8" style="border-color:#c080ff">${f8Current?'► ':''}🏠 ${hasRoom?'My Room':'Create Room'}</button>`;
  
  // Visit Rooms option
  html+=`<button class="floor-btn" data-action="visit" style="border-color:#ffd700">🏘️ Visit Rooms</button>`;
  
  html+='</div>';ov.innerHTML=html;
  ov.querySelector('.close-btn').onclick=()=>{ov.className='';removeElevatorKeyNav()};
  ov.onclick=e=>{if(e.target===ov){ov.className='';removeElevatorKeyNav()}};
  
  const allBtns=[...ov.querySelectorAll('.floor-btn')];
  let menuIdx=Math.min(S.floor-1,allBtns.length-1);
  allBtns[menuIdx].classList.add('kbd-selected');
  
  function updateSelection(newIdx){
    allBtns[menuIdx].classList.remove('kbd-selected');
    menuIdx=((newIdx%allBtns.length)+allBtns.length)%allBtns.length;
    allBtns[menuIdx].classList.add('kbd-selected');
    allBtns[menuIdx].scrollIntoView({block:'nearest'});
  }
  
  function elevatorKeyHandler(e){
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){e.preventDefault();updateSelection(menuIdx-1)}
    else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){e.preventDefault();updateSelection(menuIdx+1)}
    else if(e.key==='Enter'||e.key===' '){e.preventDefault();allBtns[menuIdx].click()}
    else if(e.key==='Escape'){e.preventDefault();ov.className='';removeElevatorKeyNav()}
  }
  
  function removeElevatorKeyNav(){document.removeEventListener('keydown',elevatorKeyHandler)}
  document.addEventListener('keydown',elevatorKeyHandler);
  
  allBtns.forEach((btn,i)=>{
    btn.onmouseenter=()=>updateSelection(i);
    btn.onclick=()=>{
      removeElevatorKeyNav();
      if(btn.dataset.action==='visit'){
        RoomSystem.showRoomList();
        ov.className='';
        return;
      }
      
      const f=parseInt(btn.dataset.floor);
      if(f===5&&Coins.lifetime<500){showNotification('Need 500◈ lifetime to unlock!');return}
      if(f===9&&!S.stationStats.milestones?.includes('ascension')&&!V26Archive.debugUnlocked){showNotification('The Archive unlocks at 10,000 visitors!');return}
      if(f===8){
        RoomSystem.showBuilder();
        ov.className='';
        return;
      }
      if(f===S.floor){ov.className='';return}
      changeFloor(f);ov.className='';
    };
  });
}

function changeFloor(f){
  S.floor=f;LS.set('floor',f);
  S.echo.floor=f;S.echo.x=80;S.echo.y=300;S.echo.moving=false;
  S.pixel.floor=f;S.pixel.x=100;S.pixel.y=310;
  S.dustMotes=[];
  // Clear room visit state when leaving floor 8
  if(f!==8){
    RoomSystem.currentRoom=null;
    RoomSystem.visitingOwner=null;
    RoomSystem.isInBuilder=false;
    $('#room-info-hud').style.display='none';
  }
  $('#floor-hud').textContent=`F${f} · ${FLOOR_NAMES[f]}`;
  showThought(`Arrived at ${FLOOR_NAMES[f]}!`);
  // Change music if playing
  if(S.musicPlaying)startLofi();
  // Track floor visit
  const fv=LS.get('floorsVisited',[]);if(!fv.includes(f)){fv.push(f);LS.set('floorsVisited',fv);Coins.earn(5,'new-floor');checkAchievements();
    // First visit to new room: small chance for loot
    LootSystem.drop('room_visit',LootSystem.getStatBonuses().luck||0);
  }
}

  connect(){try{const proto=location.protocol==='https:'?'wss:':'ws:';const port=location.port?':'+location.port:'';this.ws=new WebSocket(`${proto}//${location.hostname}${port}/ws`);

      if(msg.type==='status'){this.connected=msg.connected;this.updateIndicator()}

        if(!this._streaming){this._streaming=true;this._streamBuf='';this._streamEl=null}

      else if(msg.type==='players.init'){S.myPlayerId=msg.id;S.otherPlayers={};(msg.players||[]).forEach(p=>{S.otherPlayers[p.id]={name:p.name,x:p.x,y:p.y,tx:p.x,ty:p.y,dir:p.dir,floor:p.floor,skin:p.skin}});this._updatePlayerCount()}
      else if(msg.type==='player.join'){S.otherPlayers[msg.player.id]={name:msg.player.name,x:msg.player.x,y:msg.player.y,tx:msg.player.x,ty:msg.player.y,dir:msg.player.dir,floor:msg.player.floor,skin:msg.player.skin};this._updatePlayerCount()}
      else if(msg.type==='player.leave'){delete S.otherPlayers[msg.id];this._updatePlayerCount()}
      else if(msg.type==='floor.presence'){S._floorPresence=msg.floors;$('#player-count').textContent=msg.total||Object.keys(S.otherPlayers).length+1}

      else if(msg.type==='duel.start'){

        if(msg.participants.includes(S.myPlayerId)){
          const opponentId=msg.participants.find(id=>id!==S.myPlayerId);

          if(msg.type==='duel.blocked'){
            const op=S.otherPlayers[DuelSystem.opponentId];
            if(op){

                x:op.x,y:op.y-20,

                color:'#4488ff',size:15

          }
        }
      }
      else if(msg.type==='duel.round.end'){
        if(msg.participants.includes(S.myPlayerId)){
          const winner=msg.winner;
          if(winner===S.myPlayerId){
            DuelSystem.endRound('victory');
          }else{
            DuelSystem.endRound('defeat');
          }
        }
      }
      else if(msg.type==='duel.complete'){
        if(msg.participants.includes(S.myPlayerId)){
          const winner=msg.winner;
          if(winner===S.myPlayerId){
            DuelSystem.endDuel('victory');
          }else{
            DuelSystem.endDuel('defeat');
          }
        }
      }
      // ═══ SOCIAL/CHAT SYSTEM MESSAGE HANDLERS ═══
      else if(msg.type==='player.emote'){
        const player=S.otherPlayers[msg.id]||S.visitor;
        if(player){
          SocialSystem.showEmote(msg.id,msg.emote,msg.x,msg.y);

      else if(msg.type==='chat.msg'){
        SocialSystem.showProximitySpeechBubble(msg.id,msg.name,msg.text,msg.x,msg.y);

      }
      else if(msg.type==='chat.dm.recv'){
        SocialSystem.receiveDM(msg.from,msg.fromName,msg.encrypted);
      }
      }catch{}};
    this.ws.onclose=()=>{this.connected=false;this.updateIndicator();setTimeout(()=>this.connect(),5000)};
    this.ws.onerror=()=>{this.connected=false;this.updateIndicator()}}catch{}},
  send(msg){if(this.connected&&this.ws?.readyState===1){this.ws.send(JSON.stringify({type:'chat.send',message:msg}));return true}return false},

  // Initialize crypto for E2E encryption
  async initCrypto() {
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
      console.warn('E2E encryption only works on HTTPS or localhost');
      return;
    }
    
    try {
      // Try to load existing keys from localStorage
      const storedPrivate = localStorage.getItem('echo_private_key');
      const storedPublic = localStorage.getItem('echo_public_key_jwk');
      
      if (storedPrivate && storedPublic) {
        // Import existing keys
        this.cryptoKeys = {
          privateKey: await crypto.subtle.importKey(
            'jwk', JSON.parse(storedPrivate), 
            {name: 'ECDH', namedCurve: 'P-256'}, false, ['deriveKey']
          ),
          publicKeyJWK: JSON.parse(storedPublic)
        };
      } else {
        // Generate new keypair
        const keyPair = await crypto.subtle.generateKey(
          {name: 'ECDH', namedCurve: 'P-256'}, true, ['deriveKey']
        );
        
        const privateKeyJWK = await crypto.subtle.exportKey('jwk', keyPair.privateKey);
        const publicKeyJWK = await crypto.subtle.exportKey('jwk', keyPair.publicKey);
        
        // Store keys
        localStorage.setItem('echo_private_key', JSON.stringify(privateKeyJWK));
        localStorage.setItem('echo_public_key_jwk', JSON.stringify(publicKeyJWK));
        
        this.cryptoKeys = {
          privateKey: keyPair.privateKey,
          publicKeyJWK: publicKeyJWK
        };
      }
      
      console.log('🔐 E2E encryption initialized');
    } catch (error) {
      console.error('Failed to initialize crypto:', error);
    }

  async sendEncryptedDM(playerId, text) {
    try {
      // Get recipient's public key
      const recipientKey = this.playerKeys[playerId];
      if (!recipientKey) {
        showNotification('⚠️ Player encryption key not available');
        return;
      }
      
      // Import recipient's public key
      const theirPublicKey = await crypto.subtle.importKey(
        'jwk', recipientKey, {name: 'ECDH', namedCurve: 'P-256'}, false, []
      );
      
      // Derive shared secret
      const sharedKey = await crypto.subtle.deriveKey(
        {name: 'ECDH', public: theirPublicKey}, this.cryptoKeys.privateKey,
        {name: 'AES-GCM', length: 256}, false, ['encrypt', 'decrypt']
      );
      
      // Encrypt message
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encodedText = new TextEncoder().encode(text);
      const encrypted = await crypto.subtle.encrypt(
        {name: 'AES-GCM', iv: iv}, sharedKey, encodedText
      );
      
      // Combine IV and ciphertext
      const combined = new Uint8Array(iv.length + encrypted.byteLength);
      combined.set(iv);
      combined.set(new Uint8Array(encrypted), iv.length);
      
      // Encode as base64
      const base64 = btoa(String.fromCharCode(...combined));
      
      // Send encrypted message
      EchoWS.sendSocial('chat.dm', {to: playerId, encrypted: base64});
      
      // Add to our conversation
      const dmWindow = this.dmWindows[playerId];
      if (dmWindow) {
        dmWindow.messages.push({
          text: text,
          fromMe: true,
          timestamp: Date.now()
        });
        this.renderDMWindow(playerId, 'Player'); // Would need real name
      }
    } catch (error) {
      console.error('Failed to encrypt DM:', error);
      showNotification('❌ Failed to encrypt message');
    }
  },
  
  async receiveDM(fromId, fromName, encryptedData) {
    try {
      if (!this.cryptoKeys) {
        await this.initCrypto();
      }
      
      // Get sender's public key
      const senderKey = this.playerKeys[fromId];
      if (!senderKey) {
        console.warn('No public key for sender', fromId);
        return;
      }
      
      // Import sender's public key
      const theirPublicKey = await crypto.subtle.importKey(
        'jwk', senderKey, {name: 'ECDH', namedCurve: 'P-256'}, false, []
      );
      
      // Derive shared secret
      const sharedKey = await crypto.subtle.deriveKey(
        {name: 'ECDH', public: theirPublicKey}, this.cryptoKeys.privateKey,
        {name: 'AES-GCM', length: 256}, false, ['encrypt', 'decrypt']
      );
      
      // Decode base64
      const combined = new Uint8Array([...atob(encryptedData)].map(c => c.charCodeAt(0)));
      const iv = combined.slice(0, 12);
      const ciphertext = combined.slice(12);
      
      // Decrypt
      const decrypted = await crypto.subtle.decrypt(
        {name: 'AES-GCM', iv: iv}, sharedKey, ciphertext
      );
      
      const text = new TextDecoder().decode(decrypted);
      
      // Add to conversation
      let dmWindow = this.dmWindows[fromId];
      if (!dmWindow) {
        dmWindow = {
          messages: [],
          visible: false,
          x: 100,
          y: 100
        };
        this.dmWindows[fromId] = dmWindow;
      }
      
      dmWindow.messages.push({
        text: text,
        fromMe: false,
        timestamp: Date.now()
      });
      
      // Show notification and open window if not visible
      showNotification(`💌 DM from ${fromName}: ${text.slice(0, 30)}...`);
      
      if (!dmWindow.visible) {
        dmWindow.visible = true;
        this.renderDMWindow(fromId, fromName);
      } else {
        this.renderDMWindow(fromId, fromName);
      }
      
    } catch (error) {
      console.error('Failed to decrypt DM:', error);
    }
  },
  
  // Update system (called from main game loop)
  update(dt) {
    // Update emotes
    this.activeEmotes = this.activeEmotes.filter(emote => {
      emote.life--;
      emote.y = emote.startY - (1 - emote.life / emote.maxLife) * 30; // Float up
      return emote.life > 0;
    });
    
    // Update speech bubbles
    this.speechBubbles = this.speechBubbles.filter(bubble => {
      bubble.life--;
      return bubble.life > 0;
    });
    
    // Update floor chat display fade
    if (this.floorChatMessages.length > 0) {
      this.updateFloorChatDisplay();
    }
  },
  
  // Render system (called from main game render loop)
  render() {
    // Render emotes
    this.activeEmotes.forEach(emote => {
      const player = emote.id === S.myPlayerId ? S.visitor : S.otherPlayers[emote.id];
      if (!player || player.floor !== S.floor) return;
      
      const alpha = emote.life / emote.maxLife;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(emote.emote, emote.x, emote.y - 20);
      ctx.restore();
    });
    
    // Render speech bubbles
    this.speechBubbles.forEach(bubble => {
      const player = bubble.id === S.myPlayerId ? S.visitor : S.otherPlayers[bubble.id];
      if (!player || player.floor !== S.floor) return;
      
      const alpha = Math.min(1, bubble.life / 60); // Fade in first second
      const x = bubble.x;
      const y = bubble.y - 40;
      
      ctx.save();
      ctx.globalAlpha = alpha;
      
      // Bubble background
      const bubbleWidth = Math.min(200, ctx.measureText(bubble.text).width + 20);
      const bubbleHeight = 30;
      
      ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
      ctx.strokeStyle = '#9b59b6';
      ctx.lineWidth = 2;
      
      // Rounded rectangle
      const radius = 8;
      ctx.beginPath();
      ctx.moveTo(x - bubbleWidth/2 + radius, y - bubbleHeight);
      ctx.lineTo(x + bubbleWidth/2 - radius, y - bubbleHeight);
      ctx.quadraticCurveTo(x + bubbleWidth/2, y - bubbleHeight, x + bubbleWidth/2, y - bubbleHeight + radius);
      ctx.lineTo(x + bubbleWidth/2, y - radius);
      ctx.quadraticCurveTo(x + bubbleWidth/2, y, x + bubbleWidth/2 - radius, y);
      ctx.lineTo(x - bubbleWidth/2 + radius, y);
      ctx.quadraticCurveTo(x - bubbleWidth/2, y, x - bubbleWidth/2, y - radius);
      ctx.lineTo(x - bubbleWidth/2, y - bubbleHeight + radius);
      ctx.quadraticCurveTo(x - bubbleWidth/2, y - bubbleHeight, x - bubbleWidth/2 + radius, y - bubbleHeight);
      ctx.fill();
      ctx.stroke();
      
      // Tail
      ctx.beginPath();
      ctx.moveTo(x - 8, y);
      ctx.lineTo(x, y + 8);
      ctx.lineTo(x + 8, y);
      ctx.fill();
      ctx.stroke();
      
      // Player name
      ctx.fillStyle = '#666';
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(bubble.name, x, y - bubbleHeight - 5);
      
      // Message text
      ctx.fillStyle = '#222';
      ctx.font = '11px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(bubble.text, x, y - bubbleHeight/2 + 3);
      
      ctx.restore();
    });
  },

function initSnake(g){const GS=15,CS=Math.floor(Math.min(g.w,g.h-30)/GS);g.gs=GS;g.cs=CS;g.ox=(g.w-GS*CS)/2;g.oy=20;g.snake=[{x:7,y:7},{x:6,y:7},{x:5,y:7}];g.dir={x:1,y:0};g.nextDir={x:1,y:0};g.food=null;g.spawnFood=true;g.score=0;g.tick=0;g.speed=8;

  acv.ontouchmove=e=>{e.preventDefault()};

function updateSnake(cx,dt){const g=arcadeGame;if(!g?.running)return;g.tick++;
  if(g.spawnFood){const occ=new Set(g.snake.map(s=>s.x+','+s.y));let fx,fy;do{fx=Math.random()*g.gs|0;fy=Math.random()*g.gs|0}while(occ.has(fx+','+fy));const r=Math.random();g.food={x:fx,y:fy,type:r<.05?'star':r<.15?'golden':'apple',pts:r<.05?5:r<.15?3:1,color:r<.05?'#ffd700':r<.15?'#ffaa00':'#ff4444',timer:0};g.spawnFood=false}
  g.food&&(g.food.timer+=dt);g.speed=Math.max(3,10-Math.floor(g.snake.length/4));
  if(g.tick%g.speed===0){g.dir=g.nextDir;let h={x:g.snake[0].x+g.dir.x,y:g.snake[0].y+g.dir.y};if(h.x<0||h.x>=g.gs||h.y<0||h.y>=g.gs){g.running=false;triggerGameOver('snake',g.score);return}if(g.snake.some(s=>s.x===h.x&&s.y===h.y)){g.running=false;triggerGameOver('snake',g.score);return}g.snake.unshift(h);if(g.food&&h.x===g.food.x&&h.y===g.food.y){g.score+=g.food.pts;ArcSnd.play(g.food.type==='star'?'powerup':'eat');arcSpawnParticles(g.ox+g.food.x*g.cs+g.cs/2,g.oy+g.food.y*g.cs+g.cs/2,g.food.pts*5,g.food.color);g.spawnFood=true}else g.snake.pop()}
  cx.fillStyle='#0a0a12';cx.fillRect(0,0,g.w,g.h);for(let y=0;y<g.gs;y++)for(let x=0;x<g.gs;x++){cx.fillStyle='#111';cx.fillRect(g.ox+x*g.cs+1,g.oy+y*g.cs+1,g.cs-2,g.cs-2)}
  g.snake.forEach((s,i)=>{ctx.fillStyle=`rgb(0,${255-i/(g.snake.length)*180},${100-i/(g.snake.length)*80})`;cx.fillStyle=ctx.fillStyle;cx.fillRect(g.ox+s.x*g.cs+1,g.oy+s.y*g.cs+1,g.cs-2,g.cs-2)});

function initBreakout(g){g.pw=70;g.ph=10;g.px=(g.w-g.pw)/2;g.py=g.h-40;g.balls=[{x:g.w/2,y:g.py-10,dx:2.5,dy:-2.5,trail:[]}];g.score=0;g.lives=3;g.level=1;g.bricks=[];g.powerups=[];g.activePowers={};

    if(ball.x<5){ball.x=5;ball.dx=Math.abs(ball.dx)}if(ball.x>g.w-5){ball.x=g.w-5;ball.dx=-Math.abs(ball.dx)}if(ball.y<5){ball.y=5;ball.dy=Math.abs(ball.dy)}

  if(g.balls.length===0&&g.lives>0)g.balls.push({x:g.px+pw/2,y:g.py-10,dx:2,dy:-2.5,trail:[]});
  if(g.bricks.every(b=>!b.alive)){g.level++;ArcSnd.play('levelup');Coins.earn(1,'breakout-lvl');arcCoinsEarned++;if(g.level>5){g.running=false;triggerGameOver('breakout',g.score);return}for(let r=0;r<5;r++)for(let c=0;c<10;c++)g.bricks.push({x:4+c*41,y:30+r*18,w:39,h:16,hp:Math.min(3,1+Math.floor(r/2)),alive:true,color:['#ff4444','#ff8844','#ffdd44','#44ff88','#4488ff'][r]});g.balls=[{x:g.w/2,y:g.py-10,dx:2,dy:-2.5,trail:[]}]}
  cx.fillStyle='#0a0a12';cx.fillRect(0,0,g.w,g.h);g.bricks.forEach(b=>{if(!b.alive)return;cx.fillStyle=b.color;cx.fillRect(b.x,b.y,b.w,b.h)});

function initInvaders(g){g.px=g.w/2-12;g.py=g.h-35;g.pw=24;g.bullets=[];g.eBullets=[];g.score=0;g.lives=3;g.wave=1;g.tick=0;g.eShootTimer=0;

function spawnWave(g,w){g.enemies=[];const cols=Math.min(8+Math.floor(w/3),10);for(let r=0;r<5;r++)for(let c=0;c<cols;c++)g.enemies.push({x:20+c*38,y:40+r*28,w:28,h:20,alive:true,row:r,frame:0,frameTimer:0,pts:(5-r)*10,color:['#ff4444','#ff8844','#ffdd44','#44ff88','#4488ff'][r]});g.edir=1;g.eSpeed=1+w*.15;g.eShootTimer=0}

// §24. INPUT
// ═══════════════════════════════════════
function initInput(){
  // Tap-to-move: also handle touch on canvas for mobile
  canvas.addEventListener('touchend',e=>{
    if(VirtualJoystick.active)return; // don't interfere with joystick
    const touch=e.changedTouches[0];if(!touch)return;
    const rect=canvas.getBoundingClientRect(),cx=(touch.clientX-rect.left)/rect.width*W,cy=(touch.clientY-rect.top)/rect.height*H;
    if(S.useVisitor&&!S.nearObject){S.visitor.walkTarget={x:cx,y:cy}}
    // Also fire the click handler logic
    canvas.dispatchEvent(new MouseEvent('click',{clientX:touch.clientX,clientY:touch.clientY}));
  },{passive:true});
  canvas.addEventListener('click',e=>{
    const rect=canvas.getBoundingClientRect(),cx=(e.clientX-rect.left)/rect.width*W,cy=(e.clientY-rect.top)/rect.height*H;
    // EXIT EVA button click
    if(S.spacewalk.active&&cx>=W-110&&cx<=W-10&&cy>=10&&cy<=42){toggleSpacewalk();return}
    for(let i=0;i<6;i++)S.particles.push({x:cx,y:cy,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:15,color:'#00fff7',size:2});
    // v25: Event click handling
    if(StationEvents.onClick(cx,cy))return;
    // Click Pixel — walk to her then pet (v25: pettable evolution + tricks)
    if(S.pixel.floor===S.floor&&Math.hypot(S.pixel.x-cx,S.pixel.y-10-cy)<20){
      if(PixelEvolution.hasStage('tricks')){
        if(S.useVisitor){S.visitor.walkTarget={x:S.pixel.x,y:S.pixel.y+15,action:()=>{PixelEvolution.petPixel();PixelEvolution.showTrickMenu();}}}else{PixelEvolution.petPixel();PixelEvolution.showTrickMenu();}
      }else if(PixelEvolution.hasStage('pettable')){
        if(S.useVisitor){S.visitor.walkTarget={x:S.pixel.x,y:S.pixel.y+15,action:()=>PixelEvolution.petPixel()}}else PixelEvolution.petPixel();
      }else{
        if(S.useVisitor){S.visitor.walkTarget={x:S.pixel.x,y:S.pixel.y+15,action:()=>petPixel()}}else petPixel();
      }
      return}
    
    // Click kittens — pet them!
    for(const kitten of S.kittens.filter(k=>k.floor===S.floor)){
      if(Math.hypot(kitten.x-cx,kitten.y-10-cy)<20){
        if(S.useVisitor){S.visitor.walkTarget={x:kitten.x,y:kitten.y+15,action:()=>petKitten(kitten)}}else petKitten(kitten);
        return;
      }
    }
    // Click Echo — walk to then interact
    if(S.echo.floor===S.floor&&Math.hypot(S.echo.x-cx,S.echo.y-20-cy)<30){
      if(S.useVisitor){S.visitor.walkTarget={x:S.echo.x,y:S.echo.y+15,action:()=>EchoAI.visitorClickEcho()}}else EchoAI.visitorClickEcho();return}
    // Click data fragment

  // Double-tap detection for dash/roll (works everywhere!)
  // Track by DIRECTION not by raw key — so W and ArrowUp both count as 'up'
  const _dashDirTimes={up:0,down:0,left:0,right:0};
  const _dashDirTaps={up:0,down:0,left:0,right:0};
  S._dashCooldown=0;

    k=k.toLowerCase();

    if(k==='a'||k==='arrowleft')return 'left';

  });
  
  // Separate listener with high priority for dash detection

    if(document.activeElement&&document.activeElement.tagName==='INPUT')return;
    if(arcadeGame)return;
    const dir=keyToDir(e.key);
    if(!dir)return;
    if(e.repeat)return; // ignore key repeat!
    
    const now=Date.now();
    const timeSinceRelease=now-(_dashDirTimes[dir]||0);
    
    // Double-tap: key was released recently and pressed again within window
    if(_dashDirTaps[dir]===1 && timeSinceRelease<DASH_DOUBLE_TAP_MS && S._dashCooldown<=0 && !S.visitor._dashing){
      _dashDirTaps[dir]=0;
      if(DuelSystem.active){
        DuelSystem.dodge(dir);

  function performDash(dir){
    if(S.spacewalk.active)return;
    const v=S.visitor;
    S._dashCooldown=DASH_COOLDOWN;
    v._dashing=true;
    v._dashTimer=0.18; // dash duration
    v._dashDuration=0.18;
    v._dashDir=dir;
    
    const startX=v.x, startY=v.y;
    
    // Calculate target
    let tx=v.x, ty=v.y;
    const dist=DASH_DISTANCE;
    if(dir==='up')ty=Math.max(60,v.y-dist);
    if(dir==='down')ty=Math.min(H-20,v.y+dist);
    if(dir==='left')tx=Math.max(20,v.x-dist);
    if(dir==='right')tx=Math.min(W-20,v.x+dist);
    
    // Set direction
    if(dir==='up')v.dir=3;
    if(dir==='down')v.dir=0;
    if(dir==='left')v.dir=1;
    if(dir==='right')v.dir=2;
    
    v._dashTargetX=tx;
    v._dashTargetY=ty;
    v._dashStartX=startX;
    v._dashStartY=startY;
    
    // Afterimage ghosts (3 semi-transparent copies)
    for(let i=0;i<3;i++){
      const t=(i+1)/4;
      const px=startX+(tx-startX)*t;
      const py=startY+(ty-startY)*t;
      // Big soft ghost
      S.particles.push({x:px,y:py-15,vx:0,vy:0,life:18-i*4,color:`rgba(0,255,247,${0.35-i*0.1})`,size:12-i*2});

    }
    
    // Burst particles at start position (dust cloud)

    }
    
    // Speed lines streaking BEHIND the dash
    const opposite={up:'down',down:'up',left:'right',right:'left'};
    for(let i=0;i<10;i++){
      const spread=(Math.random()-.5)*40;
      let lx=v.x, ly=v.y-15;
      let lvx=0,lvy=0;
      if(dir==='left'||dir==='right'){ly+=spread;lvx=dir==='left'?2+Math.random()*3:-2-Math.random()*3;}
      else{lx+=spread;lvy=dir==='up'?2+Math.random()*3:-2-Math.random()*3;}
      S.particles.push({x:lx,y:ly,vx:lvx,vy:lvy,life:8+Math.random()*4,color:'rgba(0,255,247,0.25)',size:1});
    }
    
    // Satisfying whoosh sound — two-tone sweep
    if(S.audioCtx){
      const c=S.audioCtx,n=c.currentTime;
      // Low whoosh
      const o1=c.createOscillator(),g1=c.createGain();

      o1.type='sine';
      o1.frequency.setValueAtTime(300,n);

      g1.gain.setValueAtTime(S.volume*0.1,n);
      g1.gain.exponentialRampToValueAtTime(0.001,n+0.15);

      // High shimmer
      const o2=c.createOscillator(),g2=c.createGain();

      g2.gain.setValueAtTime(S.volume*0.04,n);
      g2.gain.exponentialRampToValueAtTime(0.001,n+0.1);
      o2.start(n);o2.stop(n+0.1);
    }
    
    // Subtle screen juice
    S.screenShake=Math.max(S.screenShake||0,2);
    // Brief iFrames during dash (invincible while dashing — feels fair)
